<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Documento</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:#f1f5f9;min-height:100vh;margin:0}
.loading{text-align:center;padding:60px 20px;color:#64748b}
.error{text-align:center;padding:60px 20px;color:#ef4444}
.toolbar{display:flex;gap:8px;justify-content:center;padding:16px;flex-wrap:wrap}
.btn{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-blue{background:#1e40af;color:#fff}.btn-blue:hover{background:#1e3a8a}
#doc-container{max-width:210mm;margin:0 auto}
@media print{
  body{background:#fff}
  .toolbar,.no-print{display:none!important}
}
</style>
</head>
<body>
<div id="app">
  <div class="loading">
    <div style="font-size:32px;margin-bottom:12px">⏳</div>
    <p>Cargando documento...</p>
  </div>
</div>

<!-- Carga el renderer unificado (mismo que usa el ERP) -->
<script src="js/comercial/html-documento.js"></script>

<script>
const SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdza2txcWhicG55Y3Z1aW9xZXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU1OTksImV4cCI6MjA5MDQ1MTU5OX0.4ArVhR9_qh6frtBrWZRRIssr3Zgavv41SdfOgyg27KE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const params = new URLSearchParams(window.location.search);
const token = params.get('t') || params.get('token');

function showError(msg) {
  document.getElementById('app').innerHTML = `<div class="error"><div style="font-size:48px;margin-bottom:12px">❌</div><h2>${msg}</h2><p style="color:#64748b;margin-top:8px">Contacte con la empresa que le envió el enlace.</p></div>`;
}

function fmtD(s){ return s ? new Date(s).toLocaleDateString('es-ES') : '—'; }

// Simula window.EMPRESA a partir de los campos emp_* de la vista
function setEmpresaFromView(d) {
  window.EMPRESA = {
    nombre:       d.emp_nombre || '',
    razon_social: d.emp_razon || '',
    cif:          d.emp_cif || '',
    direccion:    d.emp_direccion || '',
    cp:           d.emp_cp || '',
    municipio:    d.emp_municipio || '',
    provincia:    d.emp_provincia || '',
    telefono:     d.emp_telefono || '',
    email:        d.emp_email || '',
    logo_url:     d.emp_logo || ''
  };
}

// Construye el objeto cfg que espera _buildHtmlDocumento
function buildCfg(tipo, d) {
  const cfg = {
    tipo: tipo,
    numero: d.numero || '',
    fecha: d.fecha,
    cliente: {
      nombre:    d.cli_nombre || '',
      nif:       d.cli_nif || '',
      direccion: d.cli_direccion || ''
    },
    lineas:         d.lineas || [],
    base_imponible: d.base_imponible,
    total_iva:      d.total_iva,
    total:          d.total,
    observaciones:  d.observaciones || d.notas || '',
    firma_zona:     false,
    datos_extra:    []
  };

  if (d.serie) cfg.datos_extra.push(['Serie', d.serie]);
  if (tipo === 'FACTURA' && d.fecha_vencimiento) {
    cfg.datos_extra.push(['Vencimiento', fmtD(d.fecha_vencimiento)]);
  }
  if (d.retencion) cfg.datos_extra.push(['Retención', d.retencion + ' €']);

  // VeriFactu
  if (d.verifactu_qr_url) cfg.verifactu_qr_url = d.verifactu_qr_url;
  if (d.verifactu_csv) cfg.verifactu_csv = d.verifactu_csv;
  if (d.verifactu_estado) cfg.verifactu_estado = d.verifactu_estado;

  return cfg;
}

async function init() {
  if (!token) { showError('Enlace no válido'); return; }

  // 1) Factura
  const { data: fac } = await sb.from('vista_factura_publica').select('*').eq('acceso_token', token).maybeSingle();
  if (fac) {
    document.title = 'Factura ' + (fac.numero || '');
    renderDoc('FACTURA', fac);
    return;
  }

  // 2) Albarán
  const { data: alb } = await sb.from('vista_albaran_publico').select('*').eq('acceso_token', token).maybeSingle();
  if (alb) {
    document.title = 'Albarán ' + (alb.numero || '');
    renderDoc('ALBARÁN', alb);
    return;
  }

  // 3) Presupuesto → redirige a firma.html
  const { data: pres } = await sb.from('presupuestos').select('id').eq('firma_token', token).maybeSingle();
  if (pres) { location.replace('firma.html?token=' + token); return; }

  showError('Documento no encontrado o enlace expirado');
}

function renderDoc(tipo, d) {
  // 1) Simular EMPRESA global
  setEmpresaFromView(d);

  // 2) Construir cfg
  const cfg = buildCfg(tipo, d);

  // 3) Generar HTML con el renderer unificado
  const htmlDoc = window._buildHtmlDocumento(cfg);

  // 4) Extraer solo el contenido del <body>
  const tmp = document.createElement('div');
  tmp.innerHTML = htmlDoc;
  const bodyContent = tmp.querySelector('.doc');
  const styleNode = tmp.querySelector('style');

  // 5) Montar en la página
  document.getElementById('app').innerHTML = `
    <div class="toolbar no-print">
      <button class="btn btn-blue" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
    </div>
    ${styleNode ? '<style>' + styleNode.textContent + '</style>' : ''}
    <div id="doc-container">${bodyContent ? bodyContent.outerHTML : ''}</div>
  `;
}

init();
</script>
</body>
</html>
