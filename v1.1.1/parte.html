<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parte de Trabajo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--azul:#2563EB;--verde:#16A34A;--rojo:#DC2626;--gris-50:#F8FAFC;--gris-100:#F1F5F9;--gris-200:#E2E8F0;--gris-400:#94A3B8;--gris-500:#64748B;--gris-600:#475569;--gris-800:#1E293B;--font:'Segoe UI',system-ui,-apple-system,sans-serif;--radius:12px}
body{font-family:var(--font);background:var(--gris-50);color:var(--gris-800);min-height:100vh}
.header{background:var(--azul);color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:13px;opacity:.8;margin-top:4px}
.container{max-width:600px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-title{font-size:13px;font-weight:700;color:var(--azul);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.field{margin-bottom:10px}
.field-label{font-size:11px;font-weight:700;color:var(--gris-500);text-transform:uppercase;margin-bottom:2px}
.field-value{font-size:14px;color:var(--gris-800);line-height:1.4}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.badge-completado{background:#DCFCE7;color:var(--verde)}
.badge-revisado{background:#DBEAFE;color:var(--azul)}
.badge-facturado{background:#F3E8FF;color:#7C3AED}
.foto-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.foto-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer}
.firma-img{max-width:100%;border:1px solid var(--gris-200);border-radius:8px;background:#fff}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--gris-500)}
.loading .spinner{width:40px;height:40px;border:4px solid var(--gris-200);border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px 20px;color:var(--rojo)}
.mat-table{width:100%;border-collapse:collapse;font-size:13px}
.mat-table th{text-align:left;padding:6px 8px;background:var(--gris-100);font-size:11px;color:var(--gris-500);font-weight:700}
.mat-table td{padding:6px 8px;border-bottom:1px solid var(--gris-100)}
.footer{text-align:center;padding:20px;color:var(--gris-400);font-size:12px}
</style>
</head>
<body>

<div class="header">
  <h1 id="empresaNombre">Parte de Trabajo</h1>
  <p id="parteNumero"></p>
</div>

<div class="container" id="content">
  <div class="loading" id="loadingScreen">
    <div class="spinner"></div>
    <p>Cargando parte de trabajo...</p>
  </div>
</div>

<script>
const SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdza2txcWhicG55Y3Z1aW9xZXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU1OTksImV4cCI6MjA5MDQ1MTU5OX0.4ArVhR9_qh6frtBrWZRRIssr3Zgavv41SdfOgyg27KE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const params = new URLSearchParams(window.location.search);
const parteId = params.get('id');

async function cargarParte() {
  if (!parteId) {
    document.getElementById('content').innerHTML = '<div class="error"><h2>⚠️ Enlace no válido</h2><p>No se ha proporcionado un identificador de parte.</p></div>';
    return;
  }

  try {
    // Cargar parte
    const { data: parte, error } = await sb.from('partes_trabajo').select('*').eq('id', parteId).single();
    if (error || !parte) {
      document.getElementById('content').innerHTML = '<div class="error"><h2>⚠️ Parte no encontrado</h2><p>El parte solicitado no existe o no está disponible.</p></div>';
      return;
    }

    // Solo mostrar partes completados/revisados/facturados
    if (!['completado','revisado','facturado'].includes(parte.estado)) {
      document.getElementById('content').innerHTML = '<div class="error"><h2>⏳ Parte en proceso</h2><p>Este parte de trabajo aún no ha sido completado.</p></div>';
      return;
    }

    // Cargar empresa
    if (parte.empresa_id) {
      const { data: emp } = await sb.from('empresas').select('nombre,telefono,email,logo_url').eq('id', parte.empresa_id).single();
      if (emp) {
        document.getElementById('empresaNombre').textContent = emp.nombre || 'Parte de Trabajo';
      }
    }

    // Cargar trabajo para dirección/cliente
    let trabajo = null;
    if (parte.trabajo_id) {
      const { data: trab } = await sb.from('trabajos').select('*').eq('id', parte.trabajo_id).single();
      if (trab) trabajo = trab;
    }

    document.getElementById('parteNumero').textContent = `Parte nº ${parte.numero || parteId}`;

    renderParte(parte, trabajo);
  } catch(e) {
    console.error('Error:', e);
    document.getElementById('content').innerHTML = '<div class="error"><h2>❌ Error</h2><p>No se pudo cargar el parte. Inténtelo de nuevo.</p></div>';
  }
}

function formatFecha(f) {
  if (!f) return '-';
  const d = new Date(f + 'T00:00:00');
  return d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function estadoBadge(e) {
  const cls = { completado:'badge-completado', revisado:'badge-revisado', facturado:'badge-facturado' };
  const lbl = { completado:'Completado', revisado:'Revisado', facturado:'Facturado' };
  return `<span class="badge ${cls[e] || ''}">${lbl[e] || e}</span>`;
}

function renderParte(p, trab) {
  const dir = p.direccion || (trab ? trab.direccion_obra_texto : '') || '';
  const titulo = p.trabajo_titulo || (trab ? trab.titulo : '') || '';

  let html = '';

  // Info general
  html += `<div class="card">
    <div class="card-title">📋 Información</div>
    <div class="field">
      <div class="field-label">Fecha</div>
      <div class="field-value">${formatFecha(p.fecha)}</div>
    </div>
    <div class="field">
      <div class="field-label">Estado</div>
      <div class="field-value">${estadoBadge(p.estado)}</div>
    </div>
    ${titulo ? `<div class="field"><div class="field-label">Trabajo</div><div class="field-value">${titulo}</div></div>` : ''}
    ${dir ? `<div class="field"><div class="field-label">Dirección</div><div class="field-value">${dir}</div></div>` : ''}
  </div>`;

  // Descripción del trabajo
  if (p.descripcion) {
    html += `<div class="card">
      <div class="card-title">🔧 Trabajo realizado</div>
      <div class="field-value" style="white-space:pre-wrap">${p.descripcion}</div>
    </div>`;
  }

  // Trabajos pendientes
  if (p.trabajos_pendientes) {
    html += `<div class="card" style="border-left:3px solid orange">
      <div class="card-title" style="color:orange">⚠️ Trabajos pendientes</div>
      <div class="field-value" style="white-space:pre-wrap">${p.trabajos_pendientes}</div>
    </div>`;
  }

  // Materiales
  if (p.materiales && p.materiales.length) {
    html += `<div class="card">
      <div class="card-title">📦 Materiales utilizados</div>
      <table class="mat-table">
        <tr><th>Material</th><th style="text-align:right">Cant.</th></tr>
        ${p.materiales.map(m => `<tr><td>${m.nombre || m.descripcion || '-'}</td><td style="text-align:right">${m.cantidad || 1}</td></tr>`).join('')}
      </table>
    </div>`;
  }

  // Fotos
  if (p.fotos && p.fotos.length) {
    html += `<div class="card">
      <div class="card-title">📷 Fotos (${p.fotos.length})</div>
      <div class="foto-grid">
        ${p.fotos.map(f => `<img src="${f}" onclick="window.open('${f}','_blank')" alt="Foto">`).join('')}
      </div>
    </div>`;
  }

  // Firma receptor
  if (p.firma_url) {
    html += `<div class="card">
      <div class="card-title">✍️ Firma - Persona responsable en la visita</div>
      ${p.cliente_nombre_firma ? `<div class="field"><div class="field-label">Nombre</div><div class="field-value">${p.cliente_nombre_firma}</div></div>` : ''}
      ${p.cliente_dni ? `<div class="field"><div class="field-label">DNI/NIF</div><div class="field-value">${p.cliente_dni}</div></div>` : ''}
      <img src="${p.firma_url}" class="firma-img" alt="Firma">
    </div>`;
  }

  // Firma operario
  if (p.firma_operario_url) {
    html += `<div class="card">
      <div class="card-title">👷 Firma del operario</div>
      ${p.operario_nombre_firma ? `<div class="field"><div class="field-label">Nombre</div><div class="field-value">${p.operario_nombre_firma}</div></div>` : ''}
      <img src="${p.firma_operario_url}" class="firma-img" alt="Firma operario">
    </div>`;
  }

  html += `<div class="footer">Documento generado por Instalo ERP</div>`;

  document.getElementById('content').innerHTML = html;
}

cargarParte();
</script>
</body>
</html>
