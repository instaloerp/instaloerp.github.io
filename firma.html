    document.title = 'Firma de presupuesto';

  // 2) Buscar mandato SEPA por token
  const { data: cli } = await sb.from('clientes').select('*').eq('mandato_sepa_token', token).maybeSingle();
  if (cli) {
    if (cli.mandato_sepa_estado === 'firmado' && cli.mandato_sepa_firma_url) {
      document.getElementById('app').innerHTML = `<div class="success"><div style="font-size:48px;margin-bottom:12px">✅</div><h2>Mandato SEPA ya firmado</h2><p style="color:#64748b">Este mandato fue firmado el ${cli.mandato_sepa_fecha||''}. Gracias.</p></div>`;

function fmtE(n) { return (n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' \u20ac'; }

function renderPresupuesto(pres, emp, cli) {
  const lineas = pres.lineas || [];
  let lineasHtml = '';
  lineas.forEach(l => {
    if (l.tipo === 'capitulo' || l.tipo === 'subcapitulo') {
      lineasHtml += `<tr class="cap-row"><td colspan="4">${l.tipo==='subcapitulo'?'&nbsp;&nbsp;':''}${l.titulo||''}</td></tr>`;
      return;
    }
    const sub = (l.cant||0)*(l.precio||0)*(1-((l.dto||0)/100));
    lineasHtml += `<tr><td>${l.desc||''}</td><td style="text-align:right">${l.cant||0}</td><td style="text-align:right">${fmtE(l.precio||0)}</td><td style="text-align:right;font-weight:700">${fmtE(sub)}</td></tr>`;
  });

  document.getElementById('app').innerHTML = `
    <div class="card header">
      <h1>${emp?.nombre||'Empresa'}</h1>
      <p>${emp?.razon_social||''} · CIF: ${emp?.cif||''}</p>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div><div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;font-weight:700">Presupuesto</div><div style="font-size:20px;font-weight:800;color:#1e40af">${pres.numero||''}</div></div>

        <div class="info-item"><div class="info-label">Referencia</div><div class="info-value">${pres.titulo||'—'}</div></div>

      <table><tbody>
        <tr><td style="text-align:right;color:#64748b">Base imponible</td><td style="text-align:right;font-weight:700;width:120px">${fmtE(pres.base_imponible||0)}</td></tr>
        <tr><td style="text-align:right;color:#64748b">IVA</td><td style="text-align:right;font-weight:700;width:120px">${fmtE(pres.total_iva||0)}</td></tr>
        <tr class="total-row"><td style="text-align:right">TOTAL</td><td style="text-align:right;width:120px">${fmtE(pres.total||0)}</td></tr>
      </tbody></table>
      ${pres.observaciones ? `<div style="margin-top:12px;padding:12px;background:#f8fafc;border-radius:8px;font-size:12px;color:#64748b">${pres.observaciones}</div>` : ''}

      <h2>Firma del cliente</h2>
      <p style="font-size:13px;color:#64748b;margin-bottom:12px">Dibuja tu firma en el recuadro</p>
      <canvas id="firmaCanvas" width="500" height="180"></canvas>
      <div style="margin-top:8px;display:flex;flex-direction:column;align-items:center;gap:8px">
        <input type="text" id="firmaNombre" placeholder="Nombre completo del firmante" style="padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;width:100%;max-width:400px;text-align:center">
        <input type="text" id="firmaDni" placeholder="DNI / NIF del firmante" style="padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;width:100%;max-width:400px;text-align:center">
        <input type="email" id="firmaEmail" placeholder="Correo electrónico (para recibir copia firmada)" style="padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;width:100%;max-width:400px;text-align:center">
      </div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:4px">
        <button class="btn btn-gray" onclick="limpiarFirma()">Limpiar</button>
        <button class="btn btn-green" onclick="enviarFirma()">✅ Firmar y aprobar</button>
      </div>
    </div>`;

  initCanvas();

// ── Canvas de firma ──
let drawing = false;
let ctx = null;
function initCanvas() {
  const canvas = document.getElementById('firmaCanvas');
  ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - rect.left) * (canvas.width/rect.width), y: (t.clientY - rect.top) * (canvas.height/rect.height) };
  };

  const start = (e) => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
  const move = (e) => { if (!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
  const end = () => { drawing = false; };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);
}

function limpiarFirma() {
  const canvas = document.getElementById('firmaCanvas');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function isCanvasEmpty() {
  const canvas = document.getElementById('firmaCanvas');
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  for (let i = 3; i < data.length; i += 4) { if (data[i] > 0) return false; }
  return true;
}

// ── Recoger datos del dispositivo ──
async function recogerDatosDispositivo() {
  const info = {
    navegador: navigator.userAgent,
    plataforma: navigator.platform || navigator.userAgentData?.platform || '—',
    idioma: navigator.language,
    pantalla: `${screen.width}x${screen.height}`,
    ventana: `${window.innerWidth}x${window.innerHeight}`,
    tactil: 'ontouchstart' in window || navigator.maxTouchPoints > 0,
    zona_horaria: Intl.DateTimeFormat().resolvedOptions().timeZone,
    fecha_local: new Date().toLocaleString('es-ES'),
    online: navigator.onLine,
  };
  // Detectar tipo de dispositivo
  const ua = navigator.userAgent.toLowerCase();
  if (/iphone|ipod/.test(ua)) info.tipo = 'iPhone';
  else if (/ipad/.test(ua)) info.tipo = 'iPad';
  else if (/android.*mobile/.test(ua)) info.tipo = 'Android Móvil';
  else if (/android/.test(ua)) info.tipo = 'Android Tablet';
  else if (/macintosh/.test(ua)) info.tipo = 'Mac';
  else if (/windows/.test(ua)) info.tipo = 'Windows';
  else if (/linux/.test(ua)) info.tipo = 'Linux';
  else info.tipo = 'Desconocido';
  // Detectar navegador
  if (/edg\//.test(ua)) info.browser = 'Edge';
  else if (/chrome/.test(ua) && !/edg/.test(ua)) info.browser = 'Chrome';
  else if (/safari/.test(ua) && !/chrome/.test(ua)) info.browser = 'Safari';
  else if (/firefox/.test(ua)) info.browser = 'Firefox';
  else info.browser = 'Otro';
  // Intentar obtener IP pública
  try {
    const resp = await fetch('https://api.ipify.org?format=json');
    const data = await resp.json();
    info.ip = data.ip || '—';
  } catch(e) { info.ip = '—'; }
  // Intentar obtener geolocalización
  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000, enableHighAccuracy: false });
    });
    info.lat = pos.coords.latitude;
    info.lng = pos.coords.longitude;
    info.precision_m = Math.round(pos.coords.accuracy);
    info.ubicacion = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
  } catch(e) { info.ubicacion = 'No disponible'; }
  return info;
}

// Validar DNI/NIF español (8 dígitos + letra correcta) o NIE (X/Y/Z + 7 dígitos + letra)
function validarDniNif(valor) {
  if (!valor) return false;
  const v = valor.toUpperCase().replace(/[\s.-]/g, '');
  const letras = 'TRWAGMYFPDXBNJZSQVHLCKE';
  // DNI: 8 dígitos + letra
  const dniMatch = v.match(/^(\d{8})([A-Z])$/);
  if (dniMatch) return letras[parseInt(dniMatch[1]) % 23] === dniMatch[2];
  // NIE: X/Y/Z + 7 dígitos + letra
  const nieMatch = v.match(/^([XYZ])(\d{7})([A-Z])$/);
  if (nieMatch) {
    const nieNum = (nieMatch[1]==='X'?'0':nieMatch[1]==='Y'?'1':'2') + nieMatch[2];
    return letras[parseInt(nieNum) % 23] === nieMatch[3];
  }
  // CIF empresas: letra + 8 dígitos (no validamos dígito control, solo formato)
  if (/^[ABCDEFGHJNPQRSUVW]\d{8}$/.test(v)) return true;
  return false;
}

function validarNombreCompleto(nombre) {
  if (!nombre) return false;
  const partes = nombre.trim().split(/\s+/).filter(p => p.length >= 2);
  return partes.length >= 2; // Al menos nombre + apellido
}

async function enviarFirma() {
  if (isCanvasEmpty()) { alert('Por favor, dibuja tu firma en el recuadro'); return; }
  const nombre = document.getElementById('firmaNombre').value.trim();
  if (!nombre) { alert('Por favor, introduce tu nombre completo'); return; }
  if (!validarNombreCompleto(nombre)) { alert('Por favor, introduce nombre y apellidos (mínimo 2 palabras)'); return; }
  const dni = document.getElementById('firmaDni').value.trim();
  if (!dni) { alert('Por favor, introduce tu DNI o NIF'); return; }
  if (!validarDniNif(dni)) { alert('El DNI/NIF/NIE introducido no es válido.\n\nFormatos aceptados:\n• DNI: 12345678A\n• NIE: X1234567A\n• CIF: B12345678'); return; }
  const emailCliente = document.getElementById('firmaEmail').value.trim();
  if (emailCliente && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailCliente)) { alert('El correo electrónico no tiene un formato válido'); return; }

  // Deshabilitar botón mientras procesa
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Procesando firma...';

  try {
    // Generar PNG con fondo transparente
    const [dispositivo, blob] = await Promise.all([
      recogerDatosDispositivo(),
      new Promise(r => document.getElementById('firmaCanvas').toBlob(r, 'image/png'))
    ]);

    // Convertir firma PNG a base64
    const firmaBase64 = await new Promise(r => {
      const reader = new FileReader();
      reader.onloadend = () => r(reader.result.split(',')[1]);
      reader.readAsDataURL(blob);
    });

    const path = `firmas/pres_${presData.id}_cliente_${Date.now()}.png`;

    // Subir imagen de firma
    let firmaUrl = null;
    const { error: upErr } = await sb.storage.from('documentos').upload(path, blob);
    if (!upErr) {
      const { data } = sb.storage.from('documentos').getPublicUrl(path);
      firmaUrl = data?.publicUrl || null;
    }

    // Añadir datos extra al dispositivo
    dispositivo.dni = dni;
    dispositivo.email = emailCliente || null;

    // Actualizar presupuesto con todos los datos
    const updateData = {
      estado: 'aceptado',
      firma_fecha: new Date().toISOString(),
      firma_nombre: nombre,
      firma_ip: dispositivo.ip || '—',
      firma_dispositivo: dispositivo,
      firma_email: emailCliente || null,
    };
    if (firmaUrl) updateData.firma_url = firmaUrl;

    const { error } = await sb.from('presupuestos').update(updateData).eq('id', presData.id).eq('firma_token', token);
    if (error) {
      const { error: e2 } = await sb.from('presupuestos').update({ estado: 'aceptado', firma_fecha: new Date().toISOString(), firma_nombre: nombre }).eq('id', presData.id).eq('firma_token', token);
      if (e2) {
        await sb.from('presupuestos').update({ estado: 'aceptado' }).eq('id', presData.id).eq('firma_token', token);
      }
    }

    // ── Generar PDF firmado digitalmente ──
    btn.textContent = 'Generando documento firmado...';
    let pdfFirmadoUrl = null;
    let copiaEnviada = false;
    try {
      const resp = await fetch(`${SUPA_URL}/functions/v1/firmar-pdf`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPA_KEY}`,
        },
        body: JSON.stringify({
          presupuesto_id: presData.id,
          empresa_id: presData.empresa_id,
          firma_imagen_base64: firmaBase64,
          firma_nombre: nombre,
          firma_dni: dni,
          firma_email: emailCliente || null,
          firma_fecha: new Date().toISOString(),
          firma_ip: dispositivo.ip || '—',
          firma_dispositivo: dispositivo,
          enviar_copia_email: !!emailCliente,
        })
      });
      const resultado = await resp.json();
      if (resultado?.success) {
        pdfFirmadoUrl = resultado.pdf_url || null;
        copiaEnviada = !!(resultado.email_enviado && emailCliente);
      } else {
        console.warn('No se pudo generar PDF firmado:', resultado?.error);
      }
    } catch(e) {
      console.warn('Error llamando a firmar-pdf:', e.message);
    }

    // ── Post-firma: crear tarea + registro en obra ──
    await postFirmaAcciones(nombre, dni, dispositivo);

    const fechaStr = new Date().toLocaleString('es-ES');
    document.getElementById('app').innerHTML = `
      <div class="success">
        <div style="font-size:40px;margin-bottom:8px">✅</div>
        <h2 style="font-size:20px;color:#22c55e;margin-bottom:4px">Presupuesto firmado correctamente</h2>
        <p style="color:#64748b;font-size:14px">Firmado por <b>${nombre}</b></p>
        ${pdfFirmadoUrl ? `<div style="margin-top:12px"><a href="${pdfFirmadoUrl}" target="_blank" class="btn btn-blue" style="text-decoration:none;display:inline-block;padding:12px 28px;font-size:15px">📄 Descargar PDF firmado</a></div>` : ''}
        ${copiaEnviada ? `<p style="color:#22c55e;margin-top:10px;font-size:12px">📧 Copia enviada a <b>${emailCliente}</b></p>` : (emailCliente && !copiaEnviada ? `<p style="color:#f59e0b;margin-top:10px;font-size:12px">⚠️ No se pudo enviar la copia a ${emailCliente}</p>` : '')}
        <details style="margin-top:16px;max-width:400px;display:inline-block;text-align:left;width:100%">
          <summary style="cursor:pointer;font-weight:700;font-size:13px;color:#475569;padding:10px 0">Datos de la firma</summary>
          <div class="card" style="margin-top:8px">
            <div style="font-size:12px;color:#64748b;line-height:1.8">
              <div><b>Fecha:</b> ${fechaStr}</div>
              <div><b>DNI/NIF:</b> ${dni}</div>
              <div><b>Dispositivo:</b> ${dispositivo.tipo} — ${dispositivo.browser}</div>
              <div><b>Pantalla:</b> ${dispositivo.pantalla}</div>
              <div><b>IP:</b> ${dispositivo.ip}</div>
              <div><b>Ubicación:</b> ${dispositivo.ubicacion||'No disponible'}</div>
              <div><b>Zona horaria:</b> ${dispositivo.zona_horaria}</div>
            </div>
          </div>
        </details>
        <p style="color:#94a3b8;margin-top:16px;font-size:12px">Puedes cerrar esta página. La empresa recibirá tu aprobación.</p>
      </div>`;
  } catch(e) {
    console.error('Error en enviarFirma:', e);
    alert('Ha ocurrido un error al procesar la firma. Por favor, inténtalo de nuevo.');
    btn.disabled = false;
    btn.textContent = '✅ Firmar y aprobar';
  }
}

// ── Post-firma: generar tarea para el emisor + registro en la obra ──
async function postFirmaAcciones(nombre, dni, dispositivo) {
  if (!presData) return;
  try {
    // Usar trabajo_id directamente del presupuesto (no consultamos trabajos — anon key no tiene acceso a esa tabla)
    const obraId = presData.trabajo_id || null;
    const fechaCorta = new Date().toLocaleDateString('es-ES');

    // 1. Crear tarea para el usuario que envió el presupuesto
    if (presData.firma_enviado_por) {
      await sb.from('tareas_obra').insert({
        empresa_id: presData.empresa_id,
        trabajo_id: obraId,
        texto: `📝 Presupuesto ${presData.numero} firmado por ${nombre} (${dni}) el ${fechaCorta}`,
        estado: 'pendiente',
        prioridad: 'alta',
        responsable_id: presData.firma_enviado_por,
        responsable_nombre: presData.firma_enviado_por_nombre || 'Usuario',
        fecha_limite: null,
        creado_por: null,
        creado_por_nombre: 'Sistema — Firma remota',
      });
    }

    // 2. Registrar en audit_log de la obra (si hay obra vinculada)
    if (obraId) {
      await sb.from('audit_log').insert({
        empresa_id: presData.empresa_id,
        entidad: 'trabajo',
        entidad_id: String(obraId),
        accion: 'Presupuesto firmado',
        detalle: `✍️ ${presData.numero} firmado por ${nombre} (${dni}) — IP: ${dispositivo.ip||'—'} · ${dispositivo.tipo||''} · ${dispositivo.ubicacion||'Sin ubicación'}`,
        usuario_id: null,
        usuario_nombre: nombre + ' (cliente)',
      });
    }

    // 3. Registrar en audit_log del presupuesto
    await sb.from('audit_log').insert({
      empresa_id: presData.empresa_id,
      entidad: 'presupuesto',
      entidad_id: String(presData.id),
      accion: 'Firma remota recibida',
      detalle: `✍️ Firmado por ${nombre} (${dni}) — IP: ${dispositivo.ip||'—'} · Dispositivo: ${dispositivo.tipo||''} ${dispositivo.browser||''} · Ubicación: ${dispositivo.ubicacion||'No disponible'}`,
      usuario_id: null,
      usuario_nombre: nombre + ' (cliente)',
    });

  } catch(e) { /* silent — la firma ya se guardó, esto es secundario */ }
}

function _sepaAutocompBanco() {
  const inp = document.getElementById('sepa_iban_input');
  if (!inp) return;
  const raw = inp.value.replace(/\s+/g,'').toUpperCase();
  // Formatear con espacios cada 4
  const formatted = raw.replace(/(.{4})/g,'$1 ').trim();
  if (formatted !== inp.value) {
    const pos = inp.selectionStart;
    inp.value = formatted;
    try { inp.setSelectionRange(pos+1, pos+1); } catch(e){}
  }
  if (!raw.startsWith('ES') || raw.length < 8) return;
  const codigo = raw.substring(4,8);
  const entry = _BANCOS_ES[codigo];
  if (!entry) return;
  const inpBanco = document.getElementById('sepa_banco_input');
  const inpBic = document.getElementById('sepa_bic_input');
  if (inpBanco && (!inpBanco.value.trim() || inpBanco.dataset.auto==='1')) {
    inpBanco.value = entry.n;
    inpBanco.dataset.auto = '1';
  }
  if (inpBic && (!inpBic.value.trim() || inpBic.dataset.auto==='1')) {
    inpBic.value = entry.bic;
    inpBic.dataset.auto = '1';
  }
}

function validarIBAN(ibanRaw) {
  if (!ibanRaw) return false;
  const iban = ibanRaw.replace(/\s+/g,'').toUpperCase();
  if (!/^[A-Z]{2}\d{2}[A-Z0-9]{10,30}$/.test(iban)) return false;
  // Algoritmo módulo 97
  const rearranged = iban.slice(4) + iban.slice(0,4);
  const numeric = rearranged.replace(/[A-Z]/g, c => (c.charCodeAt(0)-55).toString());
  // BigInt división módulo
  let rem = 0;
  for (let i = 0; i < numeric.length; i++) rem = (rem*10 + parseInt(numeric[i],10)) % 97;
  return rem === 1;
}

async function enviarFirmaSepa() {
  if (isCanvasEmpty()) { alert('Por favor, dibuja tu firma'); return; }
  const nombre = document.getElementById('firmaNombre').value.trim();
  if (!nombre) { alert('Introduce tu nombre completo'); return; }
  const dni = document.getElementById('firmaDni').value.trim();
  if (!dni) { alert('Introduce tu DNI/NIF'); return; }
  if (!validarDniNif(dni)) { alert('DNI/NIF no válido'); return; }

  // Si no había cuenta, pedir IBAN y validar
  let cuentaNueva = null;
  const ibanInput = document.getElementById('sepa_iban_input');
  if (ibanInput) {
    const ibanLimpio = ibanInput.value.replace(/\s+/g,'').toUpperCase();
    if (!validarIBAN(ibanLimpio)) {
      document.getElementById('sepa_iban_msg').textContent = '⚠️ El IBAN introducido no es válido';
      ibanInput.focus();
      return;
    }
    const titular = document.getElementById('sepa_titular_input').value.trim();
    const banco = document.getElementById('sepa_banco_input').value.trim();
    const bic = (document.getElementById('sepa_bic_input')?.value||'').trim().toUpperCase();
    if (!titular) { alert('Indica el titular de la cuenta'); return; }
    cuentaNueva = { iban: ibanLimpio, titular, banco_entidad: banco || null, bic: bic || null };
  }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Procesando...';

  try {
    const blob = await new Promise(r => document.getElementById('firmaCanvas').toBlob(r, 'image/png'));
    const cli = sepaData.cliente;
    const path = `firmas/mandato_sepa_${cli.id}_${Date.now()}.png`;
    let firmaUrl = null;
    const { error: upErr } = await sb.storage.from('documentos').upload(path, blob);
    if (!upErr) {
      const { data } = sb.storage.from('documentos').getPublicUrl(path);
      firmaUrl = data?.publicUrl || null;
    } else {
      const { error: upErr2 } = await sb.storage.from('fotos-partes').upload(path, blob);
      if (!upErr2) {
        const { data } = sb.storage.from('fotos-partes').getPublicUrl(path);
        firmaUrl = data?.publicUrl || null;
      }
    }

    const hoy = new Date().toISOString().split('T')[0];
    const updateData = {
      mandato_sepa_estado: 'firmado',
      mandato_sepa_fecha: hoy,
    };
    if (firmaUrl) updateData.mandato_sepa_firma_url = firmaUrl;

    // Actualizar cliente
    const { error: e1 } = await sb.from('clientes').update(updateData).eq('id', cli.id).eq('mandato_sepa_token', token);
    if (e1) throw e1;

    // Si el cliente facilitó una cuenta nueva, insertarla y marcarla como predeterminada + firmada
    if (cuentaNueva) {
      try {
        const insertRow = {
          empresa_id: cli.empresa_id,
          tipo_entidad: 'cliente',
          entidad_id: cli.id,
          iban: cuentaNueva.iban,
          titular: cuentaNueva.titular,
          banco_entidad: cuentaNueva.banco_entidad,
          bic: cuentaNueva.bic,
          predeterminada: true,
          mandato_sepa_estado: 'firmado',
          mandato_sepa_fecha: hoy,
          mandato_sepa_ref: cli.mandato_sepa_ref || null,
        };
        if (firmaUrl) insertRow.mandato_sepa_firma_url = firmaUrl;
        const { error: eIns } = await sb.from('cuentas_bancarias_entidad').insert(insertRow);
        if (eIns) console.warn('No se pudo crear cuenta:', eIns.message);
      } catch(e) { console.warn('insert cuenta nueva:', e); }
    } else {
      // Actualizar cuenta bancaria predeterminada existente
      try {
        await sb.from('cuentas_bancarias_entidad').update(updateData)
          .eq('tipo_entidad','cliente').eq('entidad_id', cli.id).eq('predeterminada', true);
      } catch(e) { console.warn('cuenta bancaria update:', e); }
    }

    document.getElementById('app').innerHTML = `
      <div class="success">
        <div style="font-size:40px;margin-bottom:8px">✅</div>
        <h2 style="font-size:20px;color:#22c55e;margin-bottom:4px">Mandato SEPA firmado correctamente</h2>
        <p style="color:#64748b;font-size:14px">Firmado por <b>${nombre}</b> el ${new Date().toLocaleString('es-ES')}</p>
        <p style="color:#94a3b8;margin-top:16px;font-size:12px">Puedes cerrar esta página.</p>
      </div>`;
  } catch(e) {
    console.error('Error firmando mandato SEPA:', e);
    alert('No se pudo procesar la firma. Intenta de nuevo.');
    btn.disabled = false;
    btn.textContent = '✅ Firmar mandato';
  }
}
