<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firma de presupuesto</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:24px;margin-bottom:16px}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:20px;color:#1e40af;margin-bottom:4px}
.header p{font-size:13px;color:#64748b}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.info-item{background:#f8fafc;border-radius:8px;padding:12px}
.info-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:3px}
.info-value{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse;margin:12px 0}
th{background:#f1f5f9;padding:8px 10px;font-size:11px;text-align:left;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
td{padding:8px 10px;border-top:1px solid #e2e8f0;font-size:13px}
.total-row{background:#f0f9ff;font-weight:800;font-size:16px}
.cap-row{background:#eff6ff;font-weight:700;color:#1e40af;font-size:13px}
.firma-area{text-align:center;padding:20px}
.firma-area h2{font-size:16px;margin-bottom:12px}
canvas{border:2px dashed #cbd5e1;border-radius:10px;background:#fff;cursor:crosshair;touch-action:none;max-width:100%}
.btn{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-green{background:#22c55e;color:#fff}.btn-green:hover{background:#16a34a}
.btn-gray{background:#e2e8f0;color:#475569}.btn-gray:hover{background:#cbd5e1}
.btn-blue{background:#3b82f6;color:#fff}.btn-blue:hover{background:#2563eb}
.error{text-align:center;padding:60px 20px;color:#ef4444}
.success{text-align:center;padding:60px 20px}
.success h2{color:#22c55e;font-size:24px;margin-bottom:8px}
.loading{text-align:center;padding:60px 20px;color:#64748b}
@media(max-width:600px){.info-grid{grid-template-columns:1fr}.container{padding:12px}}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="v-loading">
    <div style="font-size:32px;margin-bottom:12px">⏳</div>
    <p>Cargando presupuesto...</p>
  </div>
</div>

<script>
const SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdza2txcWhicG55Y3Z1aW9xZXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU1OTksImV4cCI6MjA5MDQ1MTU5OX0.4ArVhR9_qh6frtBrWZRRIssr3Zgavv41SdfOgyg27KE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const params = new URLSearchParams(window.location.search);
const token = params.get('token');
let presData = null;
let empresaData = null;

async function init() {
  if (!token) { showError('Enlace no válido'); return; }

  // Buscar presupuesto por token
  const { data: pres, error } = await sb.from('presupuestos').select('id,numero,titulo,fecha,valido_hasta,estado,total,base_imponible,total_iva,iva_porcentaje,descuento_porcentaje,descuento_total,forma_pago_id,lineas,empresa_id,cliente_id,firma_token,firma_fecha,firma_nombre,notas').eq('firma_token', token).single();
  if (error || !pres) { showError('Presupuesto no encontrado o enlace caducado'); return; }

  if (pres.estado === 'aceptado' && pres.firma_fecha) {
    showAlreadySigned(pres);
    return;
  }

  presData = pres;

  // Cargar empresa
  const { data: emp } = await sb.from('empresas').select('id,nombre,cif,direccion,ciudad,cp,provincia,telefono,email,logo_url').eq('id', pres.empresa_id).single();
  empresaData = emp;

  // Cargar cliente
  const { data: cli } = await sb.from('clientes').select('id,nombre,cif,direccion,ciudad,cp,provincia,telefono,email').eq('id', pres.cliente_id).single();

  renderPresupuesto(pres, emp, cli);
}

function showError(msg) {
  document.getElementById('app').innerHTML = `<div class="error"><div style="font-size:48px;margin-bottom:12px">❌</div><h2>${msg}</h2><p style="margin-top:8px;color:#94a3b8">Si crees que es un error, contacta con la empresa que te envió este presupuesto.</p></div>`;
}

function showAlreadySigned(pres) {
  const fecha = new Date(pres.firma_fecha).toLocaleDateString('es-ES');
  document.getElementById('app').innerHTML = `<div class="success"><div style="font-size:48px;margin-bottom:12px">✅</div><h2>Presupuesto ya firmado</h2><p style="color:#64748b">Este presupuesto fue aprobado el ${fecha}${pres.firma_nombre ? ' por '+pres.firma_nombre : ''}.</p></div>`;
}

function fmtE(n) { return (n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' \u20ac'; }

function renderPresupuesto(pres, emp, cli) {
  const lineas = pres.lineas || [];
  let lineasHtml = '';
  lineas.forEach(l => {
    if (l.tipo === 'capitulo' || l.tipo === 'subcapitulo') {
      lineasHtml += `<tr class="cap-row"><td colspan="4">${l.tipo==='subcapitulo'?'&nbsp;&nbsp;':''}${l.titulo||''}</td></tr>`;
      return;
    }
    const sub = (l.cant||0)*(l.precio||0)*(1-((l.dto||0)/100));
    lineasHtml += `<tr><td>${l.desc||''}</td><td style="text-align:right">${l.cant||0}</td><td style="text-align:right">${fmtE(l.precio||0)}</td><td style="text-align:right;font-weight:700">${fmtE(sub)}</td></tr>`;
  });

  document.getElementById('app').innerHTML = `
    <div class="card header">
      <h1>${emp?.nombre||'Empresa'}</h1>
      <p>${emp?.razon_social||''} · CIF: ${emp?.cif||''}</p>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div><div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;font-weight:700">Presupuesto</div><div style="font-size:20px;font-weight:800;color:#1e40af">${pres.numero||''}</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:#94a3b8">Fecha</div><div style="font-weight:700">${pres.fecha ? new Date(pres.fecha).toLocaleDateString('es-ES') : ''}</div></div>
      </div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Cliente</div><div class="info-value">${cli?.nombre||pres.cliente_nombre||''}</div><div style="font-size:12px;color:#64748b">${cli?.nif||''}</div></div>
        <div class="info-item"><div class="info-label">Referencia</div><div class="info-value">${pres.titulo||'—'}</div></div>
      </div>
      <table><thead><tr><th>Descripción</th><th style="text-align:right">Cant.</th><th style="text-align:right">Precio</th><th style="text-align:right">Total</th></tr></thead><tbody>${lineasHtml}</tbody></table>
      <table><tbody>
        <tr><td style="text-align:right;color:#64748b">Base imponible</td><td style="text-align:right;font-weight:700;width:120px">${fmtE(pres.base_imponible||0)}</td></tr>
        <tr><td style="text-align:right;color:#64748b">IVA</td><td style="text-align:right;font-weight:700;width:120px">${fmtE(pres.total_iva||0)}</td></tr>
        <tr class="total-row"><td style="text-align:right">TOTAL</td><td style="text-align:right;width:120px">${fmtE(pres.total||0)}</td></tr>
      </tbody></table>
      ${pres.observaciones ? `<div style="margin-top:12px;padding:12px;background:#f8fafc;border-radius:8px;font-size:12px;color:#64748b">${pres.observaciones}</div>` : ''}
    </div>
    <div class="card firma-area">
      <h2>Firma del cliente</h2>
      <p style="font-size:13px;color:#64748b;margin-bottom:12px">Dibuja tu firma en el recuadro</p>
      <canvas id="firmaCanvas" width="500" height="180"></canvas>
      <div style="margin-top:8px">
        <input type="text" id="firmaNombre" placeholder="Nombre completo del firmante" style="padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;width:100%;max-width:400px;margin-bottom:12px;text-align:center">
      </div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:4px">
        <button class="btn btn-gray" onclick="limpiarFirma()">Limpiar</button>
        <button class="btn btn-green" onclick="enviarFirma()">✅ Firmar y aprobar</button>
      </div>
    </div>`;

  initCanvas();
}

// ── Canvas de firma ──
let drawing = false;
let ctx = null;
function initCanvas() {
  const canvas = document.getElementById('firmaCanvas');
  ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - rect.left) * (canvas.width/rect.width), y: (t.clientY - rect.top) * (canvas.height/rect.height) };
  };

  const start = (e) => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
  const move = (e) => { if (!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
  const end = () => { drawing = false; };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);
}

function limpiarFirma() {
  const canvas = document.getElementById('firmaCanvas');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function isCanvasEmpty() {
  const canvas = document.getElementById('firmaCanvas');
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
  for (let i = 3; i < data.length; i += 4) { if (data[i] > 0) return false; }
  return true;
}

// ── Recoger datos del dispositivo ──
async function recogerDatosDispositivo() {
  const info = {
    navegador: navigator.userAgent,
    plataforma: navigator.platform || navigator.userAgentData?.platform || '—',
    idioma: navigator.language,
    pantalla: `${screen.width}x${screen.height}`,
    ventana: `${window.innerWidth}x${window.innerHeight}`,
    tactil: 'ontouchstart' in window || navigator.maxTouchPoints > 0,
    zona_horaria: Intl.DateTimeFormat().resolvedOptions().timeZone,
    fecha_local: new Date().toLocaleString('es-ES'),
    online: navigator.onLine,
  };
  // Detectar tipo de dispositivo
  const ua = navigator.userAgent.toLowerCase();
  if (/iphone|ipod/.test(ua)) info.tipo = 'iPhone';
  else if (/ipad/.test(ua)) info.tipo = 'iPad';
  else if (/android.*mobile/.test(ua)) info.tipo = 'Android Móvil';
  else if (/android/.test(ua)) info.tipo = 'Android Tablet';
  else if (/macintosh/.test(ua)) info.tipo = 'Mac';
  else if (/windows/.test(ua)) info.tipo = 'Windows';
  else if (/linux/.test(ua)) info.tipo = 'Linux';
  else info.tipo = 'Desconocido';
  // Detectar navegador
  if (/edg\//.test(ua)) info.browser = 'Edge';
  else if (/chrome/.test(ua) && !/edg/.test(ua)) info.browser = 'Chrome';
  else if (/safari/.test(ua) && !/chrome/.test(ua)) info.browser = 'Safari';
  else if (/firefox/.test(ua)) info.browser = 'Firefox';
  else info.browser = 'Otro';
  // Intentar obtener IP pública
  try {
    const resp = await fetch('https://api.ipify.org?format=json');
    const data = await resp.json();
    info.ip = data.ip || '—';
  } catch(e) { info.ip = '—'; }
  return info;
}

async function enviarFirma() {
  if (isCanvasEmpty()) { alert('Por favor, dibuja tu firma en el recuadro'); return; }
  const nombre = document.getElementById('firmaNombre').value.trim();
  if (!nombre) { alert('Por favor, introduce tu nombre completo'); return; }

  // Deshabilitar botón mientras procesa
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Procesando...';

  // Recoger datos del dispositivo en paralelo con la subida
  const [dispositivo, blob] = await Promise.all([
    recogerDatosDispositivo(),
    new Promise(r => document.getElementById('firmaCanvas').toBlob(r, 'image/png'))
  ]);

  const path = `firmas/pres_${presData.id}_cliente_${Date.now()}.png`;

  // Subir firma
  let firmaUrl = null;
  const { error: upErr } = await sb.storage.from('documentos').upload(path, blob);
  if (!upErr) {
    const { data } = sb.storage.from('documentos').getPublicUrl(path);
    firmaUrl = data?.publicUrl || null;
  }

  // Actualizar presupuesto con todos los datos
  const updateData = {
    estado: 'aceptado',
    firma_fecha: new Date().toISOString(),
    firma_nombre: nombre,
    firma_ip: dispositivo.ip || '—',
    firma_dispositivo: dispositivo,
  };
  if (firmaUrl) updateData.firma_url = firmaUrl;

  const { error } = await sb.from('presupuestos').update(updateData).eq('id', presData.id).eq('firma_token', token);
  if (error) {
    // Fallback: intentar sin columnas nuevas
    const { error: e2 } = await sb.from('presupuestos').update({ estado: 'aceptado', firma_fecha: new Date().toISOString(), firma_nombre: nombre }).eq('id', presData.id).eq('firma_token', token);
    if (e2) {
      await sb.from('presupuestos').update({ estado: 'aceptado' }).eq('id', presData.id).eq('firma_token', token);
    }
  }

  const fechaStr = new Date().toLocaleString('es-ES');
  document.getElementById('app').innerHTML = `
    <div class="success">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <h2>Presupuesto firmado correctamente</h2>
      <p style="color:#64748b;margin-top:8px">Firmado por <b>${nombre}</b></p>
      <div class="card" style="text-align:left;margin-top:20px;max-width:400px;display:inline-block">
        <div style="font-weight:700;font-size:13px;margin-bottom:8px">Datos de la firma</div>
        <div style="font-size:12px;color:#64748b;line-height:1.8">
          <div><b>Fecha:</b> ${fechaStr}</div>
          <div><b>Dispositivo:</b> ${dispositivo.tipo} — ${dispositivo.browser}</div>
          <div><b>Pantalla:</b> ${dispositivo.pantalla}</div>
          <div><b>IP:</b> ${dispositivo.ip}</div>
          <div><b>Zona horaria:</b> ${dispositivo.zona_horaria}</div>
        </div>
      </div>
      <p style="color:#94a3b8;margin-top:16px;font-size:13px">Puedes cerrar esta página. La empresa recibirá tu aprobación.</p>
    </div>`;
}

init();
</script>
</body>
</html>
