<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Factura</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.10);padding:24px;margin-bottom:16px}
.card-header{text-align:center;padding:28px 24px 22px}
.empresa-nombre{font-size:22px;font-weight:800;color:#1e40af;margin-bottom:4px;letter-spacing:-.3px}
.empresa-sub{font-size:13px;color:#64748b}
.divider{border:none;border-top:1px solid #e2e8f0;margin:16px 0}
.doc-meta{display:flex;justify-content:space-between;align-items:flex-end}
.doc-tipo{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:2px}
.doc-numero{font-size:22px;font-weight:800;color:#1e40af}
.doc-fecha-label{font-size:11px;color:#94a3b8;text-align:right}
.doc-fecha{font-weight:700;font-size:15px;text-align:right}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.info-item{background:#f8fafc;border-radius:8px;padding:12px}
.info-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:3px}
.info-value{font-size:14px;font-weight:600;color:#1e293b;line-height:1.4}
.section-title{font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
thead tr{background:#f1f5f9}
th{padding:9px 10px;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em;text-align:left;border-bottom:2px solid #e2e8f0}
th.r{text-align:right}
td{padding:9px 10px;font-size:13px;color:#334155;border-bottom:1px solid #f1f5f9}
td.r{text-align:right}
tbody tr:last-child td{border-bottom:none}
.totales{display:flex;justify-content:flex-end;margin-top:4px}
.totales-box{width:260px}
.tot-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#64748b}
.tot-row b{color:#1e293b;font-weight:600}
.tot-total{display:flex;justify-content:space-between;padding:10px 14px;background:#1e40af;color:#fff;border-radius:8px;font-size:16px;font-weight:800;margin-top:6px}
.obs-box{background:#f8fafc;border-radius:8px;padding:12px;font-size:13px;color:#475569;line-height:1.6;margin-top:4px}
.btn-pdf{display:inline-flex;align-items:center;gap:7px;background:#1e40af;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(30,64,175,.25);transition:background .15s}
.btn-pdf:hover{background:#1d3fa3}
.pdf-bar{display:flex;justify-content:flex-end;padding:0 0 12px}
.footer{text-align:center;padding:4px 0 20px;color:#94a3b8;font-size:11px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:#64748b}
.spinner{width:38px;height:38px;border:4px solid #e2e8f0;border-top-color:#1e40af;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:60px 20px}
@media(max-width:560px){
  .container{padding:12px}
  .info-grid{grid-template-columns:1fr}
  .doc-meta{flex-direction:column;align-items:flex-start;gap:8px}
}
@media print{
  body{background:#fff}
  .pdf-bar{display:none!important}
  .card{box-shadow:none;border:1px solid #e2e8f0;page-break-inside:avoid}
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading"><div class="spinner"></div><p>Cargando factura...</p></div>
</div>

<script>
const SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdza2txcWhicG55Y3Z1aW9xZXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU1OTksImV4cCI6MjA5MDQ1MTU5OX0.4ArVhR9_qh6frtBrWZRRIssr3Zgavv41SdfOgyg27KE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const params  = new URLSearchParams(window.location.search);
const factId  = params.get('id');

async function cargar() {
  if (!factId) { showError('Enlace no válido','No se proporcionó identificador de factura.'); return; }
  try {
    const { data: f, error } = await sb.from('facturas').select('*').eq('id', factId).single();
    if (error || !f) { showError('Factura no encontrada','La factura no existe o no está disponible.'); return; }

    let empresa = null;
    if (f.empresa_id) {
      const { data: emp } = await sb.from('empresas').select('nombre,razon_social,cif,telefono,email,direccion,cp,municipio,provincia').eq('id', f.empresa_id).single();
      empresa = emp;
    }

    renderFactura(f, empresa);
  } catch(e) {
    console.error(e);
    showError('Error','No se pudo cargar la factura. Inténtelo de nuevo.');
  }
}

function showError(titulo, msg) {
  document.getElementById('app').innerHTML = `
    <div class="card error">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>
      <h2 style="font-size:18px;color:#dc2626;margin-bottom:6px">${titulo}</h2>
      <p style="font-size:14px;color:#64748b">${msg}</p>
    </div>`;
}

function fmtFecha(f) {
  if (!f) return '—';
  return new Date(f + 'T00:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
}

function fmtE(n) {
  return (n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
}

function renderFactura(f, emp) {
  const empNombre  = emp?.nombre || 'Factura';
  const empSub     = [emp?.razon_social, emp?.cif ? 'CIF: '+emp.cif : ''].filter(Boolean).join(' · ');
  const empDir     = [emp?.direccion, [emp?.cp, emp?.municipio].filter(Boolean).join(' '), emp?.provincia].filter(Boolean).join(', ');
  const lineas     = f.lineas || [];

  let base = 0, ivaT = 0;
  let rowsHtml = lineas.map(l => {
    if (l._separator) return `<tr><td colspan="5" style="background:#f8fafc;font-weight:700;font-size:11px;color:#475569;padding:7px 10px">${l.desc||''}</td></tr>`;
    const dto  = l.dto || l.dto1 || 0;
    const sub  = (l.cant||0)*(l.precio||0)*(1-dto/100);
    const iv   = sub*((l.iva||0)/100);
    base += sub; ivaT += iv;
    return `<tr>
      <td>${l.desc||''}</td>
      <td class="r">${l.cant||0}</td>
      <td class="r">${fmtE(l.precio||0)}</td>
      <td class="r">${dto ? dto+'%' : '—'}</td>
      <td class="r" style="font-weight:700">${fmtE(sub+iv)}</td>
    </tr>`;
  }).join('');

  let html = '';

  // Botón PDF
  html += `<div class="pdf-bar"><button class="btn-pdf" onclick="window.print()">Guardar como PDF</button></div>`;

  // Cabecera
  html += `<div class="card card-header">
    <div class="empresa-nombre">${empNombre}</div>
    ${empSub ? `<div class="empresa-sub">${empSub}</div>` : ''}
    ${empDir ? `<div class="empresa-sub" style="margin-top:2px">${empDir}</div>` : ''}
    <hr class="divider">
    <div class="doc-meta">
      <div>
        <div class="doc-tipo">Factura</div>
        <div class="doc-numero">${f.numero||('Factura nº '+factId)}</div>
      </div>
      <div>
        <div class="doc-fecha-label">Fecha</div>
        <div class="doc-fecha">${fmtFecha(f.fecha)}</div>
        ${f.fecha_vencimiento ? `<div class="doc-fecha-label" style="margin-top:4px">Vencimiento</div><div class="doc-fecha" style="color:#dc2626">${fmtFecha(f.fecha_vencimiento)}</div>` : ''}
      </div>
    </div>
  </div>`;

  // Cliente
  html += `<div class="card">
    <div class="section-title">Cliente</div>
    <div class="info-grid">
      <div class="info-item"><div class="info-label">Nombre</div><div class="info-value">${f.cliente_nombre||'—'}</div></div>
      ${f.cliente_nif ? `<div class="info-item"><div class="info-label">NIF</div><div class="info-value">${f.cliente_nif}</div></div>` : ''}
    </div>
  </div>`;

  // Líneas
  if (lineas.length) {
    html += `<div class="card">
      <div class="section-title">Líneas de factura</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Descripción</th>
            <th class="r" style="width:60px">Cant.</th>
            <th class="r" style="width:90px">Precio</th>
            <th class="r" style="width:60px">Dto.</th>
            <th class="r" style="width:90px">Total</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
      <div class="totales" style="margin-top:12px">
        <div class="totales-box">
          <div class="tot-row"><span>Base imponible</span><b>${fmtE(f.base_imponible||base)}</b></div>
          <div class="tot-row"><span>IVA</span><b>${fmtE(f.total_iva||ivaT)}</b></div>
          <div class="tot-total"><span>TOTAL</span><span>${fmtE(f.total||0)}</span></div>
        </div>
      </div>
    </div>`;
  }

  // Observaciones
  if (f.observaciones) {
    html += `<div class="card">
      <div class="section-title">Observaciones</div>
      <div class="obs-box">${f.observaciones}</div>
    </div>`;
  }

  html += `<div class="footer">Documento generado por Instalo ERP</div>`;

  document.getElementById('app').innerHTML = html;
  document.title = `${f.numero||'Factura'} · ${empNombre}`;
}

cargar();
</script>
</body>
</html>
