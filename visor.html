<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documento — instaloERP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e8ecf0; color: #222; min-height: 100vh;
    }
    /* ── Loading ── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #ddd; border-top-color: #1a1a2e;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #666; font-size: 14px; }
    /* ── Error ── */
    .error-box { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .error-box .box { background: #fff; border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,.08); max-width: 400px; }
    .error-box .icon { font-size: 48px; margin-bottom: 16px; }
    .error-box h1 { font-size: 18px; color: #333; margin-bottom: 8px; }
    .error-box p { font-size: 14px; color: #666; }

    /* ── Documento ── */
    .page {
      max-width: 800px; margin: 30px auto; background: #fff;
      box-shadow: 0 2px 20px rgba(0,0,0,.1); border-radius: 4px;
      padding: 50px 50px 40px; position: relative;
    }
    /* Cabecera empresa */
    .emp-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 10px; border-bottom: 3px solid #1a1a2e; padding-bottom: 16px; }
    .emp-logo { max-height: 60px; max-width: 160px; object-fit: contain; }
    .emp-info { flex: 1; text-align: right; font-size: 12px; color: #555; line-height: 1.6; }
    .emp-info .emp-name { font-size: 16px; font-weight: 700; color: #1a1a2e; }
    .emp-info .emp-nif { font-weight: 600; }

    /* Titulo documento */
    .doc-title {
      text-align: center; margin: 24px 0 20px;
      font-size: 22px; font-weight: 700; color: #1a1a2e;
      text-transform: uppercase; letter-spacing: 2px;
    }

    /* Grid cliente + datos factura */
    .meta-grid { display: flex; gap: 24px; margin-bottom: 24px; }
    .meta-box { flex: 1; border: 1px solid #ddd; border-radius: 6px; padding: 14px 16px; }
    .meta-box h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: #888; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 6px;
    }
    .meta-box p { font-size: 13px; line-height: 1.6; color: #333; }
    .meta-box .meta-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
    .meta-box .meta-label { color: #666; }
    .meta-box .meta-val { font-weight: 600; color: #222; }

    /* Tabla lineas */
    .lines-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
    .lines-table thead { background: #1a1a2e; color: #fff; }
    .lines-table th { padding: 10px 12px; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; text-align: left; }
    .lines-table th.r { text-align: right; }
    .lines-table th.c { text-align: center; }
    .lines-table td { padding: 10px 12px; border-bottom: 1px solid #eee; }
    .lines-table td.r { text-align: right; }
    .lines-table td.c { text-align: center; }
    .lines-table tbody tr:last-child td { border-bottom: 2px solid #1a1a2e; }

    /* Resumen economico */
    .totals-section { display: flex; justify-content: flex-end; margin-bottom: 24px; }
    .totals-box { width: 280px; }
    .totals-box .t-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; color: #555; }
    .totals-box .t-row.t-final {
      font-size: 16px; font-weight: 700; color: #fff; background: #1a1a2e;
      padding: 10px 14px; border-radius: 4px; margin-top: 6px;
    }
    .totals-box .t-sep { border-top: 1px solid #ddd; margin: 4px 0; }

    /* Condiciones */
    .conditions { border: 1px solid #ddd; border-radius: 6px; padding: 14px 16px; margin-bottom: 20px; }
    .conditions h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: #888; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 6px;
    }
    .conditions .cond-row { display: flex; font-size: 12px; padding: 4px 0; }
    .conditions .cond-label { width: 140px; color: #666; font-weight: 500; }
    .conditions .cond-val { color: #333; }

    /* Observaciones */
    .obs-box { background: #fffde7; border: 1px solid #fff9c4; border-radius: 6px; padding: 14px 16px; margin-bottom: 20px; font-size: 13px; color: #555; }
    .obs-box strong { color: #333; }

    /* Footer */
    .doc-footer { text-align: center; font-size: 10px; color: #aaa; border-top: 1px solid #eee; padding-top: 16px; margin-top: 20px; line-height: 1.6; }
    .doc-footer a { color: #1565c0; text-decoration: none; }

    /* Responsive */
    @media (max-width: 640px) {
      .page { margin: 10px; padding: 24px 20px 20px; }
      .meta-grid { flex-direction: column; gap: 12px; }
      .emp-header { flex-direction: column; text-align: center; }
      .emp-info { text-align: center; }
      .lines-table { font-size: 12px; }
      .lines-table th, .lines-table td { padding: 8px 6px; }
      .totals-box { width: 100%; }
    }
    @media print {
      body { background: #fff; }
      .page { box-shadow: none; margin: 0; padding: 20px; }
    }

    #visor { display: none; }
  </style>
</head>
<body>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando documento...</p>
  </div>

  <div id="error" class="error-box" style="display:none">
    <div class="box">
      <div class="icon">📄</div>
      <h1 id="err-title">Error</h1>
      <p id="err-msg"></p>
    </div>
  </div>

  <div id="visor">
    <div class="page" id="doc-page"></div>
  </div>

<script>
var SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
var API = SUPA_URL + '/functions/v1/doc-viewer';

var TIPO_LABEL = {
  factura: 'Factura', presupuesto: 'Presupuesto', albaran: 'Albarán',
  parte_trabajo: 'Parte de trabajo', factura_proveedor: 'Factura proveedor',
  pedido_compra: 'Pedido de compra', presupuesto_compra: 'Presupuesto compra'
};

function eur(v) { return v != null ? Number(v).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €' : ''; }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }) : '—'; }
function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function showError(title, msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent = msg;
}

function render(data) {
  var emp = data.empresa || {};
  var sh  = data.share || {};
  var doc = data.documento || {};
  var tipo = TIPO_LABEL[sh.tipo_documento] || sh.tipo_documento || 'Documento';
  var numero = doc.numero || sh.documento_numero || '';

  document.title = tipo + ' ' + numero + ' — ' + (emp.nombre || 'instaloERP');

  // ── Cabecera empresa ──
  var empHtml = '<div class="emp-header">';
  if (emp.logo_url) {
    empHtml += '<img class="emp-logo" src="' + esc(emp.logo_url) + '" alt="' + esc(emp.nombre) + '">';
  }
  empHtml += '<div class="emp-info">';
  empHtml += '<div class="emp-name">' + esc(emp.nombre || 'Jordi Instalaciones S.C.') + '</div>';
  if (emp.nif) empHtml += '<div class="emp-nif">CIF: ' + esc(emp.nif) + '</div>';
  if (emp.direccion) empHtml += '<div>' + esc(emp.direccion) + '</div>';
  if (emp.telefono) empHtml += '<div>Tel: ' + esc(emp.telefono) + '</div>';
  if (emp.email) empHtml += '<div>' + esc(emp.email) + '</div>';
  empHtml += '</div></div>';

  // ── Titulo ──
  var titleHtml = '<div class="doc-title">' + esc(tipo) + '</div>';

  // ── Grid: Cliente + Datos documento ──
  var metaHtml = '<div class="meta-grid">';

  // Cliente / Proveedor
  var nombreParte = doc.cliente_nombre || doc.proveedor_nombre || sh.destinatario_nombre || '';
  var labelParte = doc.proveedor_nombre ? 'Proveedor' : 'Cliente';
  metaHtml += '<div class="meta-box"><h3>' + labelParte + '</h3>';
  metaHtml += '<p><strong>' + esc(nombreParte) + '</strong>';
  if (doc.cliente_nif) metaHtml += '<br>NIF: ' + esc(doc.cliente_nif);
  if (doc.cliente_direccion) metaHtml += '<br>' + esc(doc.cliente_direccion);
  metaHtml += '</p></div>';

  // Datos factura
  metaHtml += '<div class="meta-box"><h3>Datos del documento</h3>';
  metaHtml += '<div class="meta-row"><span class="meta-label">Número</span><span class="meta-val">' + esc(numero) + '</span></div>';
  metaHtml += '<div class="meta-row"><span class="meta-label">Fecha</span><span class="meta-val">' + fmtDate(doc.fecha) + '</span></div>';
  if (doc.fecha_vencimiento) {
    metaHtml += '<div class="meta-row"><span class="meta-label">Vencimiento</span><span class="meta-val">' + fmtDate(doc.fecha_vencimiento) + '</span></div>';
  }
  if (doc.estado) {
    metaHtml += '<div class="meta-row"><span class="meta-label">Estado</span><span class="meta-val" style="text-transform:capitalize">' + esc(doc.estado) + '</span></div>';
  }
  metaHtml += '</div></div>';

  // ── Tabla de líneas ──
  var linesHtml = '';
  var lineas = doc.lineas;
  if (lineas && Array.isArray(lineas) && lineas.length) {
    linesHtml += '<table class="lines-table"><thead><tr>';
    linesHtml += '<th>Descripción</th><th class="c">Cant.</th><th class="r">Precio</th>';
    linesHtml += '<th class="c">Dto.</th><th class="c">IVA</th><th class="r">Total</th>';
    linesHtml += '</tr></thead><tbody>';

    for (var i = 0; i < lineas.length; i++) {
      var l = lineas[i];
      var cant = l.cant || l.cantidad || 1;
      var precio = l.precio || 0;
      var dto = l.dto || l.descuento || 0;
      var iva = l.iva || 0;
      var subtotal = cant * precio * (1 - dto / 100);
      var totalLinea = subtotal * (1 + iva / 100);

      linesHtml += '<tr>';
      linesHtml += '<td>' + esc(l.desc || l.descripcion || l.concepto || '') + '</td>';
      linesHtml += '<td class="c">' + cant + '</td>';
      linesHtml += '<td class="r">' + eur(precio) + '</td>';
      linesHtml += '<td class="c">' + (dto > 0 ? dto + '%' : '—') + '</td>';
      linesHtml += '<td class="c">' + iva + ' %</td>';
      linesHtml += '<td class="r">' + eur(totalLinea) + '</td>';
      linesHtml += '</tr>';
    }
    linesHtml += '</tbody></table>';
  }

  // ── Resumen económico ──
  var totalsHtml = '';
  if (doc.base_imponible != null || doc.total != null) {
    totalsHtml += '<div class="totals-section"><div class="totals-box">';
    if (doc.base_imponible != null) {
      totalsHtml += '<div class="t-row"><span>Subtotal (sin IVA)</span><span>' + eur(doc.base_imponible) + '</span></div>';
    }
    if (doc.total_iva != null && doc.total_iva > 0) {
      totalsHtml += '<div class="t-row"><span>IVA</span><span>' + eur(doc.total_iva) + '</span></div>';
    }
    if (doc.descuento_global && doc.descuento_global > 0) {
      totalsHtml += '<div class="t-row"><span>Descuento</span><span>-' + eur(doc.descuento_global) + '</span></div>';
    }
    if (doc.retencion && doc.retencion > 0) {
      totalsHtml += '<div class="t-row"><span>Retención</span><span>-' + eur(doc.retencion) + '</span></div>';
    }
    totalsHtml += '<div class="t-sep"></div>';
    if (doc.total != null) {
      totalsHtml += '<div class="t-row t-final"><span>TOTAL CON IVA</span><span>' + eur(doc.total) + '</span></div>';
    }
    totalsHtml += '</div></div>';
  }

  // ── Condiciones ──
  var condHtml = '';
  var hasCond = doc.forma_pago_id || doc.fecha_vencimiento || (lineas && lineas.length && lineas[0].iva != null);
  if (hasCond) {
    condHtml += '<div class="conditions"><h3>Condiciones</h3>';
    if (doc.forma_pago_id) {
      condHtml += '<div class="cond-row"><span class="cond-label">Forma de pago</span><span class="cond-val">Transferencia bancaria</span></div>';
    }
    if (doc.fecha_vencimiento) {
      condHtml += '<div class="cond-row"><span class="cond-label">Vencimiento</span><span class="cond-val">' + fmtDate(doc.fecha_vencimiento) + '</span></div>';
    } else {
      condHtml += '<div class="cond-row"><span class="cond-label">Vencimiento</span><span class="cond-val">Al contado</span></div>';
    }
    if (lineas && lineas.length && lineas[0].iva != null) {
      condHtml += '<div class="cond-row"><span class="cond-label">IVA</span><span class="cond-val">IVA al ' + lineas[0].iva + ' % incluido en el total final</span></div>';
    }
    condHtml += '</div>';
  }

  // ── Observaciones ──
  var obsHtml = '';
  if (doc.observaciones) {
    obsHtml += '<div class="obs-box"><strong>Observaciones:</strong><br>' + esc(doc.observaciones) + '</div>';
  }
  if (doc.notas) {
    obsHtml += '<div class="obs-box"><strong>Notas:</strong><br>' + esc(doc.notas) + '</div>';
  }

  // ── Footer ──
  var footHtml = '<div class="doc-footer">';
  footHtml += '<div>' + esc(emp.nombre || '') + (emp.nif ? ' &middot; CIF: ' + esc(emp.nif) : '');
  if (emp.direccion) footHtml += ' &middot; ' + esc(emp.direccion);
  if (emp.telefono) footHtml += ' &middot; ' + esc(emp.telefono);
  if (emp.email) footHtml += ' &middot; <a href="mailto:' + esc(emp.email) + '">' + esc(emp.email) + '</a>';
  footHtml += '</div>';
  footHtml += '<div style="margin-top:8px;opacity:.5">Documento generado por instaloERP</div>';
  footHtml += '</div>';

  // ── Montar todo ──
  document.getElementById('doc-page').innerHTML =
    empHtml + titleHtml + metaHtml + linesHtml + totalsHtml + condHtml + obsHtml + footHtml;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('visor').style.display = 'block';
}

// ── Init ──
(async function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if (!token) { showError('Enlace no válido', 'No se ha proporcionado un token de documento.'); return; }
  try {
    var resp = await fetch(API + '?token=' + encodeURIComponent(token) + '&format=json');
    var data = await resp.json();
    if (!resp.ok || data.error) {
      showError('Documento no encontrado', data.error || 'Este enlace no es válido o ha expirado.');
      return;
    }
    render(data);
  } catch (e) {
    showError('Error de conexión', 'No se pudo cargar el documento. Inténtalo de nuevo.');
  }
})();
</script>
</body>
</html>
