<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parte de Trabajo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --azul:#2563EB;--verde:#16A34A;--rojo:#DC2626;
  --gris-50:#F8FAFC;--gris-100:#F1F5F9;--gris-200:#E2E8F0;
  --gris-400:#94A3B8;--gris-500:#64748B;--gris-800:#1E293B;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;--radius:10px
}
body{font-family:var(--font);background:var(--gris-50);color:var(--gris-800);min-height:100vh}

/* ── Cabecera ── */
.header{background:var(--azul);color:#fff;padding:18px 20px;text-align:center}
.header h1{font-size:19px;font-weight:700;letter-spacing:.2px}
.header p{font-size:13px;opacity:.8;margin-top:4px}

/* ── Botón PDF ── */
.pdf-bar{display:flex;justify-content:flex-end;padding:12px 16px 0;max-width:640px;margin:0 auto}
.btn-pdf{display:inline-flex;align-items:center;gap:6px;background:var(--azul);color:#fff;border:none;
  border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
.btn-pdf:hover{background:#1d4ed8}

/* ── Contenido ── */
.container{max-width:640px;margin:0 auto;padding:12px 16px 32px}
.card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.card-title{font-size:11px;font-weight:800;color:var(--azul);margin-bottom:12px;text-transform:uppercase;letter-spacing:.8px}
.field{margin-bottom:10px}
.field:last-child{margin-bottom:0}
.field-label{font-size:10px;font-weight:700;color:var(--gris-500);text-transform:uppercase;margin-bottom:3px;letter-spacing:.4px}
.field-value{font-size:14px;color:var(--gris-800);line-height:1.5}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.badge-completado{background:#DCFCE7;color:#15803D}
.badge-revisado{background:#DBEAFE;color:var(--azul)}
.badge-facturado{background:#F3E8FF;color:#7C3AED}

/* ── Pendientes ── */
.card-pendiente{border-left:3px solid #F59E0B}
.card-pendiente .card-title{color:#B45309}

/* ── Firmas ── */
.firma-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.firma-block{text-align:center}
.firma-label{font-size:10px;font-weight:700;color:var(--gris-500);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.firma-img{width:100%;max-width:220px;border:1px solid var(--gris-200);border-radius:8px;background:#fff}
.firma-nombre{font-size:12px;color:var(--gris-500);margin-top:4px}
.firma-dni{font-size:11px;color:var(--gris-400)}

/* ── Loading / Error ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--gris-500)}
.loading .spinner{width:38px;height:38px;border:4px solid var(--gris-200);border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px 20px;color:var(--rojo)}

/* ── Footer ── */
.footer{text-align:center;padding:16px;color:var(--gris-400);font-size:11px}

/* ── Print / PDF ── */
@media print{
  body{background:#fff}
  .pdf-bar{display:none}
  .card{box-shadow:none;border:1px solid #E2E8F0;page-break-inside:avoid}
  .header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div class="header">
  <h1 id="empresaNombre">Parte de Trabajo</h1>
  <p id="parteNumero"></p>
</div>

<div class="pdf-bar" id="pdfBar" style="display:none">
  <button class="btn-pdf" onclick="window.print()">⬇ Guardar como PDF</button>
</div>

<div class="container" id="content">
  <div class="loading" id="loadingScreen">
    <div class="spinner"></div>
    <p>Cargando parte de trabajo...</p>
  </div>
</div>

<script>
const SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdza2txcWhicG55Y3Z1aW9xZXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU1OTksImV4cCI6MjA5MDQ1MTU5OX0.4ArVhR9_qh6frtBrWZRRIssr3Zgavv41SdfOgyg27KE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const params = new URLSearchParams(window.location.search);
const parteId = params.get('id');

async function cargarParte() {
  if (!parteId) {
    showError('⚠️ Enlace no válido', 'No se ha proporcionado un identificador de parte.');
    return;
  }
  try {
    const { data: parte, error } = await sb.from('partes_trabajo').select('*').eq('id', parteId).single();
    if (error || !parte) { showError('⚠️ Parte no encontrado', 'El parte solicitado no existe o no está disponible.'); return; }
    if (!['completado','revisado','facturado'].includes(parte.estado)) { showError('⏳ Parte en proceso', 'Este parte de trabajo aún no ha sido completado.'); return; }

    // Empresa
    if (parte.empresa_id) {
      const { data: emp } = await sb.from('empresas').select('nombre').eq('id', parte.empresa_id).single();
      if (emp) document.getElementById('empresaNombre').textContent = emp.nombre || 'Parte de Trabajo';
    }

    // Trabajo (para dirección)
    let trabajo = null;
    if (parte.trabajo_id) {
      const { data: trab } = await sb.from('trabajos').select('titulo,direccion_obra_texto').eq('id', parte.trabajo_id).single();
      if (trab) trabajo = trab;
    }

    document.getElementById('parteNumero').textContent = `Parte nº ${parte.numero || parteId}`;
    document.getElementById('pdfBar').style.display = 'flex';

    renderParte(parte, trabajo);
  } catch(e) {
    console.error('Error:', e);
    showError('❌ Error', 'No se pudo cargar el parte. Inténtelo de nuevo.');
  }
}

function showError(titulo, msg) {
  document.getElementById('content').innerHTML = `<div class="error"><h2>${titulo}</h2><p>${msg}</p></div>`;
}

function formatFecha(f) {
  if (!f) return '-';
  return new Date(f + 'T00:00:00').toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function estadoBadge(e) {
  const cls = { completado:'badge-completado', revisado:'badge-revisado', facturado:'badge-facturado' };
  const lbl = { completado:'Completado', revisado:'Revisado', facturado:'Facturado' };
  return `<span class="badge ${cls[e]||''}">${lbl[e]||e}</span>`;
}

function renderPendientes(val) {
  if (!val) return '';
  // Si es array JSON, renderizar cada ítem
  let items = null;
  try { items = typeof val === 'string' ? JSON.parse(val) : val; } catch(e) { items = null; }
  if (Array.isArray(items)) {
    return items.map(i => {
      const tipo = i.tipo || i.categoria || '';
      const desc = i.descripcion || i.texto || '';
      return `<div class="field-value" style="margin-bottom:6px">🔧 ${tipo}${desc ? ': ' + desc : ''}</div>`;
    }).join('');
  }
  // Texto plano
  return `<div class="field-value" style="white-space:pre-wrap">${val}</div>`;
}

function renderParte(p, trab) {
  const dir = p.direccion || (trab ? trab.direccion_obra_texto : '') || '';
  const titulo = p.trabajo_titulo || (trab ? trab.titulo : '') || '';
  let html = '';

  // ── Información general ──
  html += `<div class="card">
    <div class="card-title">📋 Información</div>
    <div class="field"><div class="field-label">Fecha</div><div class="field-value">${formatFecha(p.fecha)}</div></div>
    <div class="field"><div class="field-label">Estado</div><div class="field-value">${estadoBadge(p.estado)}</div></div>
    ${titulo ? `<div class="field"><div class="field-label">Trabajo</div><div class="field-value">${titulo}</div></div>` : ''}
    ${dir    ? `<div class="field"><div class="field-label">Dirección</div><div class="field-value">${dir}</div></div>` : ''}
  </div>`;

  // ── Trabajo realizado ──
  if (p.descripcion) {
    html += `<div class="card">
      <div class="card-title">🔧 Trabajo realizado</div>
      <div class="field-value" style="white-space:pre-wrap;line-height:1.6">${p.descripcion}</div>
    </div>`;
  }

  // ── Trabajos pendientes ──
  const pendientesHtml = renderPendientes(p.trabajos_pendientes);
  if (pendientesHtml) {
    html += `<div class="card card-pendiente">
      <div class="card-title">⚠️ Trabajos pendientes</div>
      ${pendientesHtml}
    </div>`;
  }

  // ── Firmas ──
  const hayFirmaCliente = p.firma_url;
  const hayFirmaOperario = p.firma_operario_url;

  if (hayFirmaCliente || hayFirmaOperario) {
    html += `<div class="card">
      <div class="card-title">✍️ Conformidad</div>
      <div class="firma-wrap">`;

    if (hayFirmaCliente) {
      html += `<div class="firma-block">
        <div class="firma-label">Persona responsable</div>
        <img src="${p.firma_url}" class="firma-img" alt="Firma cliente">
        ${p.cliente_nombre_firma ? `<div class="firma-nombre">${p.cliente_nombre_firma}</div>` : ''}
        ${p.cliente_dni         ? `<div class="firma-dni">DNI: ${p.cliente_dni}</div>` : ''}
      </div>`;
    } else {
      html += `<div></div>`;
    }

    if (hayFirmaOperario) {
      html += `<div class="firma-block">
        <div class="firma-label">Operario</div>
        <img src="${p.firma_operario_url}" class="firma-img" alt="Firma operario">
        ${p.operario_nombre_firma ? `<div class="firma-nombre">${p.operario_nombre_firma}</div>` : ''}
      </div>`;
    }

    html += `</div></div>`;
  }

  html += `<div class="footer">Documento generado por Instalo ERP</div>`;
  document.getElementById('content').innerHTML = html;
}

cargarParte();
</script>
</body>
</html>
