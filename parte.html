<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Parte de Trabajo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
.container{max-width:700px;margin:0 auto;padding:20px}

/* Cards */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.10);padding:24px;margin-bottom:16px}

/* Header card */
.card-header{text-align:center;padding:28px 24px 22px}
.empresa-nombre{font-size:22px;font-weight:800;color:#1e40af;margin-bottom:4px;letter-spacing:-.3px}
.empresa-sub{font-size:13px;color:#64748b}
.divider{border:none;border-top:1px solid #e2e8f0;margin:16px 0}

/* Nº parte + fecha */
.doc-meta{display:flex;justify-content:space-between;align-items:flex-end}
.doc-tipo{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:2px}
.doc-numero{font-size:22px;font-weight:800;color:#1e40af}
.doc-fecha-label{font-size:11px;color:#94a3b8;text-align:right}
.doc-fecha{font-weight:700;font-size:15px;text-align:right}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.info-grid.full{grid-template-columns:1fr}
.info-item{background:#f8fafc;border-radius:8px;padding:12px}
.info-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:3px}
.info-value{font-size:14px;font-weight:600;color:#1e293b;line-height:1.4}

/* Estado badge */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.02em}
.badge-completado{background:#dcfce7;color:#15803d}
.badge-revisado{background:#dbeafe;color:#1e40af}
.badge-facturado{background:#f3e8ff;color:#6d28d9}

/* Section title */
.section-title{font-size:11px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}

/* Descripción */
.desc-text{font-size:14px;color:#334155;line-height:1.7;white-space:pre-wrap}

/* Pendientes */
.card-pendiente{border-left:3px solid #f59e0b}
.pendiente-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #fef3c7;font-size:13px;color:#334155}
.pendiente-item:last-child{border-bottom:none}
.pendiente-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0;margin-top:5px}

/* Firmas */
.firma-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}
.firma-block{text-align:center}
.firma-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.firma-img-wrap{border:1px solid #e2e8f0;border-radius:10px;background:#fafafa;padding:6px;display:inline-block;width:100%}
.firma-img{width:100%;max-height:120px;object-fit:contain;display:block}
.firma-nombre{font-size:13px;font-weight:600;color:#1e293b;margin-top:8px}
.firma-dni{font-size:11px;color:#94a3b8;margin-top:1px}
.firma-line{border:none;border-bottom:2px solid #e2e8f0;margin:10px 0 4px;display:block}

/* Botón PDF */
.pdf-bar{display:flex;justify-content:flex-end;padding:0 0 12px}
.btn-pdf{display:inline-flex;align-items:center;gap:7px;background:#1e40af;color:#fff;border:none;
  border-radius:8px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;
  box-shadow:0 2px 6px rgba(30,64,175,.25);transition:background .15s}
.btn-pdf:hover{background:#1d3fa3}

/* Footer */
.footer{text-align:center;padding:4px 0 20px;color:#94a3b8;font-size:11px}

/* Loading / Error */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:#64748b}
.spinner{width:38px;height:38px;border:4px solid #e2e8f0;border-top-color:#1e40af;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:60px 20px}

/* Responsive */
@media(max-width:560px){
  .container{padding:12px}
  .info-grid{grid-template-columns:1fr}
  .firma-grid{grid-template-columns:1fr}
  .doc-meta{flex-direction:column;align-items:flex-start;gap:8px}
  .doc-fecha-label,.doc-fecha{text-align:left}
}

/* Firma remota */
.firma-pad-wrap{border:2px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fafafa;cursor:crosshair;touch-action:none}
canvas#firmaCanvas{display:block;width:100%;height:180px}
.firma-remota-card{background:linear-gradient(135deg,#fffbeb 0%,#fef9c3 100%);border:2px solid #F59E0B;border-radius:14px;padding:20px;margin-top:8px}

/* Print */
@media print{
  body{background:#fff}
  .pdf-bar{display:none!important}
  .firma-remota-card{display:none!important}
  .card{box-shadow:none;border:1px solid #e2e8f0;page-break-inside:avoid}
  .card-header{border:1px solid #e2e8f0}
}
</style>
</head>
<body>

<main class="container" id="app">
  <div class="loading" id="loadingScreen" role="status">
    <div class="spinner" aria-hidden="true"></div>
    <p>Cargando parte de trabajo...</p>
  </div>
</main>

<script>
// ─── Constantes y estados ──────────────────────────────
const SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdza2txcWhicG55Y3Z1aW9xZXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU1OTksImV4cCI6MjA5MDQ1MTU5OX0.4ArVhR9_qh6frtBrWZRRIssr3Zgavv41SdfOgyg27KE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const ESTADOS = {
  completado:             { label: 'Completado', badge: 'badge-completado', publico: true },
  revisado:               { label: 'Revisado',   badge: 'badge-revisado',   publico: true },
  facturado:              { label: 'Facturado',   badge: 'badge-facturado',  publico: true },
  pendiente_firma_cliente:{ label: 'Pte. firma',  badge: '',                 publico: true },
};
const ESTADOS_PUBLICOS = Object.keys(ESTADOS).filter(k => ESTADOS[k].publico);

const params      = new URLSearchParams(window.location.search);
const parteId     = params.get('id');
const firmaToken  = params.get('token');
let   parteData   = null;

// ─── Utilidades ────────────────────────────────────────
/** Escapa HTML para prevenir XSS */
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatFecha(f) {
  if (!f) return '—';
  const date = new Date(f.includes('T') ? f : f + 'T00:00:00');
  if (isNaN(date)) return esc(f);
  return date.toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' });
}

function estadoBadge(e) {
  const est = ESTADOS[e];
  if (!est) return `<span class="badge">${esc(e)}</span>`;
  return `<span class="badge ${est.badge}">${esc(est.label)}</span>`;
}

function showError(titulo, msg) {
  document.getElementById('app').innerHTML = `
    <div class="card error">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>
      <h2 style="font-size:18px;color:#dc2626;margin-bottom:6px">${esc(titulo)}</h2>
      <p style="font-size:14px;color:#64748b">${esc(msg)}</p>
    </div>`;
}

// ─── Carga principal ───────────────────────────────────
async function cargarParte() {
  if (!parteId && !firmaToken) { showError('Enlace no válido', 'No se ha proporcionado un identificador de parte.'); return; }
  try {
    let query;
    if (firmaToken) {
      query = sb.from('partes_trabajo').select('*').eq('firma_token', firmaToken);
    } else {
      query = sb.from('partes_trabajo').select('*').eq('id', parteId);
    }
    const { data: parte, error } = await query.single();
    if (error || !parte) { showError('Parte no encontrado', 'El parte solicitado no existe o no está disponible.'); return; }

    if (!ESTADOS_PUBLICOS.includes(parte.estado)) {
      showError('Parte en proceso', 'Este parte de trabajo aún no ha sido completado.'); return;
    }

    parteData = parte;

    // Consultas en paralelo
    const [empresaRes, trabajoRes] = await Promise.all([
      parte.empresa_id
        ? sb.from('empresas').select('nombre,razon_social,cif,telefono,email').eq('id', parte.empresa_id).single()
        : Promise.resolve({ data: null }),
      parte.trabajo_id
        ? sb.from('trabajos').select('titulo,direccion_obra_texto').eq('id', parte.trabajo_id).single()
        : Promise.resolve({ data: null }),
    ]);

    renderParte(parte, empresaRes.data, trabajoRes.data);
  } catch(e) {
    console.error('[parte.html] Error cargando parte:', e);
    showError('Error de carga', 'No se pudo cargar el parte. Inténtelo de nuevo más tarde.');
  }
}

// ─── Renderizado ───────────────────────────────────────
function renderPendientes(val) {
  if (!val) return null;
  let items = null;
  try { items = typeof val === 'string' ? JSON.parse(val) : val; } catch(e) { items = null; }
  if (Array.isArray(items) && items.length > 0) {
    return items.map(i => {
      const tipo = i.tipo || i.categoria || '';
      const desc = i.descripcion || i.texto || '';
      return `<div class="pendiente-item"><span class="pendiente-dot"></span><span>${esc([tipo, desc].filter(Boolean).join(': '))}</span></div>`;
    }).join('');
  }
  if (typeof val === 'string' && val.trim()) {
    return `<div class="desc-text">${esc(val.trim())}</div>`;
  }
  return null;
}

function renderCabecera(p, emp) {
  const empNombre = emp?.nombre || 'Parte de Trabajo';
  const empSub = [emp?.razon_social, emp?.cif ? 'CIF: ' + emp.cif : ''].filter(Boolean).join(' · ');
  return `<div class="card card-header">
    <div class="empresa-nombre">${esc(empNombre)}</div>
    ${empSub ? `<div class="empresa-sub">${esc(empSub)}</div>` : ''}
    <hr class="divider">
    <div class="doc-meta">
      <div>
        <div class="doc-tipo">Parte de trabajo</div>
        <div class="doc-numero">${esc(p.numero) || ('Parte nº ' + esc(parteId))}</div>
      </div>
      <div>
        <div class="doc-fecha-label">Fecha</div>
        <div class="doc-fecha">${formatFecha(p.fecha)}</div>
      </div>
    </div>
  </div>`;
}

function renderInfoGrid(p, trab) {
  const titulo = p.trabajo_titulo || (trab?.titulo) || '';
  const dir    = p.direccion || (trab?.direccion_obra_texto) || '';
  const infoItems = [];
  if (titulo) infoItems.push({ label: 'Trabajo / Obra', value: esc(titulo) });
  if (dir)    infoItems.push({ label: 'Dirección',      value: esc(dir) });
  infoItems.push({ label: 'Estado', value: estadoBadge(p.estado) });
  if (p.operario_nombre_firma) infoItems.push({ label: 'Operario', value: esc(p.operario_nombre_firma) });

  if (!infoItems.length) return '';
  const gridClass = infoItems.length === 1 ? 'info-grid full' : 'info-grid';
  return `<div class="card">
    <div class="section-title">Información del parte</div>
    <div class="${gridClass}">
      ${infoItems.map(it => `<div class="info-item"><div class="info-label">${it.label}</div><div class="info-value">${it.value}</div></div>`).join('')}
    </div>
  </div>`;
}

function renderFirmas(p) {
  const hayFirmaCliente  = !!p.firma_url;
  const hayFirmaOperario = !!p.firma_operario_url;
  if (!hayFirmaCliente && !hayFirmaOperario) return '';

  let html = `<div class="card">
    <div class="section-title">Conformidad</div>
    <div class="firma-grid">`;

  if (hayFirmaCliente) {
    html += `<div class="firma-block">
      <div class="firma-label">Persona responsable</div>
      <div class="firma-img-wrap"><img src="${esc(p.firma_url)}" class="firma-img" alt="Firma del responsable"></div>
      <span class="firma-line"></span>
      ${p.cliente_nombre_firma ? `<div class="firma-nombre">${esc(p.cliente_nombre_firma)}</div>` : ''}
      ${p.cliente_dni           ? `<div class="firma-dni">DNI: ${esc(p.cliente_dni)}</div>` : ''}
    </div>`;
  } else {
    html += `<div></div>`;
  }

  if (hayFirmaOperario) {
    html += `<div class="firma-block">
      <div class="firma-label">Operario</div>
      <div class="firma-img-wrap"><img src="${esc(p.firma_operario_url)}" class="firma-img" alt="Firma del operario"></div>
      <span class="firma-line"></span>
      ${p.operario_nombre_firma ? `<div class="firma-nombre">${esc(p.operario_nombre_firma)}</div>` : ''}
    </div>`;
  }

  html += `</div></div>`;
  return html;
}

function renderFormFirmaRemota(p) {
  if (!firmaToken || p.estado !== 'pendiente_firma_cliente' || p.firma_url) return '';
  return `
  <div class="card firma-remota-card">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:36px;margin-bottom:6px">✍️</div>
      <h3 style="margin:0 0 4px;color:#92400e;font-size:17px">Firmar parte de trabajo</h3>
      <p style="margin:0;font-size:13px;color:#78350f">Firme en el recuadro de abajo para confirmar la conformidad con el trabajo realizado</p>
    </div>

    <div style="margin-bottom:12px">
      <label for="frNombre" style="font-size:11px;font-weight:700;color:#78350f;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Nombre y apellidos *</label>
      <input id="frNombre" type="text" autocomplete="name" placeholder="Nombre + primer apellido + segundo apellido"
        style="width:100%;padding:10px 12px;border:1.5px solid #F59E0B;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;background:#fff">
    </div>
    <div style="margin-bottom:12px">
      <label for="frDni" style="font-size:11px;font-weight:700;color:#78350f;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">DNI / NIE *</label>
      <input id="frDni" type="text" placeholder="12345678A"
        style="width:100%;padding:10px 12px;border:1.5px solid #F59E0B;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;background:#fff">
    </div>

    <label style="font-size:11px;font-weight:700;color:#78350f;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Firma *</label>
    <div class="firma-pad-wrap" style="margin-bottom:8px">
      <canvas id="firmaCanvas" width="700" height="180" role="img" aria-label="Área de firma"></canvas>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button type="button" onclick="_firmaLimpiar()" style="flex:1;padding:10px;border:1.5px solid #F59E0B;border-radius:8px;background:#fff;color:#92400e;font-size:13px;font-weight:600;cursor:pointer">🗑️ Borrar firma</button>
    </div>

    <button type="button" id="btnFirmaEnviar" style="width:100%;padding:14px;border:none;border-radius:12px;background:#F59E0B;color:#fff;font-size:16px;font-weight:800;cursor:pointer">
      ✅ Confirmar y firmar
    </button>
  </div>`;
}

function renderParte(p, emp, trab) {
  const empNombre = emp?.nombre || 'Parte de Trabajo';

  let html = '';
  html += `<div class="pdf-bar"><button type="button" class="btn-pdf" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button></div>`;
  html += renderCabecera(p, emp);
  html += renderInfoGrid(p, trab);

  // Trabajo realizado
  if (p.descripcion) {
    html += `<div class="card">
      <div class="section-title">Trabajo realizado</div>
      <div class="desc-text">${esc(p.descripcion)}</div>
    </div>`;
  }

  // Trabajos pendientes
  const pendHtml = renderPendientes(p.trabajos_pendientes);
  if (pendHtml) {
    html += `<div class="card card-pendiente">
      <div class="section-title" style="color:#b45309">Trabajos pendientes</div>
      ${pendHtml}
    </div>`;
  }

  html += renderFirmas(p);
  html += renderFormFirmaRemota(p);
  html += `<div class="footer">Documento generado por Instalo ERP</div>`;

  document.getElementById('app').innerHTML = html;
  document.title = `${p.numero || 'Parte'} · ${empNombre}`;

  // Inicializar canvas y botón de firma
  if (firmaToken && p.estado === 'pendiente_firma_cliente' && !p.firma_url) {
    _initFirmaCanvas();
    const btnFirma = document.getElementById('btnFirmaEnviar');
    if (btnFirma) btnFirma.addEventListener('click', () => _firmaEnviar());
  }
}

// ─── Firma remota — lógica del canvas ──────────────────
let _firmaDrawing = false;
let _firmaTieneTrazo = false;

function _initFirmaCanvas() {
  const canvas = document.getElementById('firmaCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // Ajustar resolución para pantallas retina
  const dpr  = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = (rect.width || 700) * dpr;
  canvas.height = 180 * dpr;
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 2.5;
  ctx.lineCap   = 'round';
  ctx.lineJoin  = 'round';

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }
  function start(e) { e.preventDefault(); _firmaDrawing = true; const {x,y} = getPos(e); ctx.beginPath(); ctx.moveTo(x,y); }
  function move(e)  { e.preventDefault(); if (!_firmaDrawing) return; const {x,y} = getPos(e); ctx.lineTo(x,y); ctx.stroke(); _firmaTieneTrazo = true; }
  function stop(e)  { e.preventDefault(); _firmaDrawing = false; }

  canvas.addEventListener('mousedown',  start);
  canvas.addEventListener('mousemove',  move);
  canvas.addEventListener('mouseup',    stop);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove',  move,  {passive:false});
  canvas.addEventListener('touchend',   stop,  {passive:false});
}

function _firmaLimpiar() {
  const canvas = document.getElementById('firmaCanvas');
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  _firmaTieneTrazo = false;
}

async function _firmaEnviar() {
  const nombre = document.getElementById('frNombre')?.value.trim();
  const dni    = document.getElementById('frDni')?.value.trim() || null;

  // Validar nombre completo (mínimo 3 palabras: nombre + 2 apellidos)
  const nombreWords = (nombre || '').split(/\s+/).filter(w => w.length > 0);
  if (nombreWords.length < 3) {
    alert('Por favor, introduce tu nombre y dos apellidos.\nEjemplo: Juan García López');
    document.getElementById('frNombre')?.focus();
    return;
  }

  // Validar DNI/NIE obligatorio y formato
  if (!dni) {
    alert('Por favor, introduce tu DNI o NIE.');
    document.getElementById('frDni')?.focus();
    return;
  }
  const dniClean = dni.toUpperCase().replace(/[\s\-\.]/g, '');
  const dniValid = /^[0-9]{8}[A-Z]$/.test(dniClean) || /^[XYZ][0-9]{7}[A-Z]$/.test(dniClean);
  if (!dniValid) {
    alert('El formato del DNI/NIE no es válido.\nEjemplos: 12345678A o X1234567B');
    document.getElementById('frDni')?.focus();
    return;
  }

  if (!_firmaTieneTrazo) { alert('Por favor, dibuja tu firma en el recuadro.'); return; }

  const btn = document.getElementById('btnFirmaEnviar');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando firma...'; }

  try {
    const canvas = document.getElementById('firmaCanvas');

    // Convertir canvas a blob directamente (más eficiente que fetch de base64)
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));

    // Subir firma a storage
    let firmaUrl = canvas.toDataURL('image/png'); // fallback: base64 inline
    try {
      const filename = `${parteData.empresa_id}/${parteData.id}_firma_remota_${Date.now()}.png`;
      const { error: upErr } = await sb.storage.from('fotos-partes').upload(filename, blob, { contentType: 'image/png' });
      if (!upErr) {
        const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
        firmaUrl = data.publicUrl;
      }
    } catch(e) { /* usar base64 */ }

    // Actualizar parte por token
    const { error } = await sb.from('partes_trabajo').update({
      firma_url:            firmaUrl,
      cliente_nombre_firma: nombre,
      cliente_dni:          dni,
      estado:               'completado',
      completado_at:        new Date().toISOString()
    }).eq('firma_token', firmaToken);

    if (error) throw error;

    // Mostrar confirmación con enlace al parte firmado
    const parteUrl = window.location.href; // misma URL — ahora muestra el parte completo con firma
    document.getElementById('app').innerHTML = `
      <div class="container" style="text-align:center;padding-top:max(60px, env(safe-area-inset-top, 60px));padding-bottom:max(20px, env(safe-area-inset-bottom, 20px))">
        <div style="font-size:64px;margin-bottom:16px">✅</div>
        <h2 style="color:#15803d;margin:0 0 8px;font-size:22px">¡Firma registrada!</h2>
        <p style="color:#64748b;font-size:14px;line-height:1.6">Gracias, ${esc(nombre)}.<br>Su conformidad con el parte de trabajo ha quedado registrada correctamente.</p>
        <div style="margin-top:24px;padding:16px;background:#f0fdf4;border-radius:12px;border:1px solid #bbf7d0;display:inline-block">
          <p style="margin:0;font-size:12px;color:#15803d;font-weight:600">📄 ${esc(parteData.numero) || 'Parte'} · Firmado el ${new Date().toLocaleDateString('es-ES')}</p>
        </div>
        <div style="margin-top:28px">
          <a href="${esc(parteUrl)}" onclick="event.preventDefault();location.reload()" style="display:inline-flex;align-items:center;gap:8px;background:#1e40af;color:#fff;text-decoration:none;padding:14px 24px;border-radius:12px;font-size:15px;font-weight:700;box-shadow:0 2px 8px rgba(30,64,175,.25)">
            📄 Ver parte de trabajo firmado
          </a>
          <p style="margin:12px 0 0;font-size:12px;color:#94a3b8">Puede imprimir o guardar como PDF desde el parte</p>
        </div>
      </div>`;

  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '✅ Confirmar y firmar'; }
    alert('Error al guardar la firma: ' + e.message + '\n\nPor favor, inténtelo de nuevo.');
  }
}

cargarParte().catch(e => {
  console.error('[parte.html] Error inesperado:', e);
  showError('Error inesperado', 'Recarga la página o contacta con soporte.');
});
</script>
</body>
</html>
