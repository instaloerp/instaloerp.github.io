// ── CALCULAR KM POR CARRETERA ──
function _loadGoogleMaps() {
  return new Promise((resolve, reject) => {
    if (_gmapsLoaded && window.google && window.google.maps) return resolve();
    if (!GMAPS_API_KEY) return reject(new Error('No API key'));
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${GMAPS_API_KEY}&libraries=geometry`;
    s.onload = () => { _gmapsLoaded = true; resolve(); };
    s.onerror = () => reject(new Error('Error cargando Google Maps'));
    document.head.appendChild(s);
  });
}

async function calcularKmCarretera(destLat, destLng) {
  // 1) Intentar con Google Maps Directions
  if (GMAPS_API_KEY) {
    try {
      await _loadGoogleMaps();
      const svc = new google.maps.DirectionsService();
      const result = await new Promise((resolve, reject) => {
        svc.route({
          origin: new google.maps.LatLng(OFICINA_LAT, OFICINA_LNG),
          destination: new google.maps.LatLng(destLat, destLng),
          travelMode: google.maps.TravelMode.DRIVING,
        }, (res, status) => {
          if (status === 'OK') resolve(res);
          else reject(new Error('Directions: ' + status));
        });
      });
      const distMetros = result.routes[0].legs[0].distance.value;
      return Math.round((distMetros / 1000) * 2); // km ida y vuelta
    } catch(e) { console.warn('[calcKm] Google Maps falló:', e.message); }
  }

  // 2) Fallback: OSRM (gratuito, sin API key)
  try {
    const resp = await fetch(`https://router.project-osrm.org/route/v1/driving/${OFICINA_LNG},${OFICINA_LAT};${destLng},${destLat}?overview=false`);
    const data = await resp.json();
    if (data.routes && data.routes[0]) {
      return Math.round((data.routes[0].distance / 1000) * 2); // km ida y vuelta
    }
  } catch(e) { console.warn('[calcKm] OSRM falló:', e.message); }

  // 3) Último recurso: haversine x1.35 factor carretera
  const R = 6371;
  const dLat = (destLat - OFICINA_LAT) * Math.PI / 180;
  const dLon = (destLng - OFICINA_LNG) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(OFICINA_LAT*Math.PI/180)*Math.cos(destLat*Math.PI/180)*Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c * 1.35 * 2);
}

// ── VALIDAR DNI/NIF/NIE/CIF ──
function validarDNI(valor) {
  if (!valor) return { valid: false, msg: 'El DNI es obligatorio' };
  valor = valor.toUpperCase().replace(/[\s\-\.]/g, '');

  // NIF: 8 dígitos + letra
  const nifRegex = /^(\d{8})([A-Z])$/;
  if (nifRegex.test(valor)) {
    const [, num, letra] = valor.match(nifRegex);
    const letras = 'TRWAGMYFPDXBNJZSQVHLCKE';
    if (letra === letras[parseInt(num) % 23]) return { valid: true, valor };
    return { valid: false, msg: 'DNI no válido' };
  }

  // NIE: X/Y/Z + 7 dígitos + letra
  const nieRegex = /^([XYZ])(\d{7})([A-Z])$/;
  if (nieRegex.test(valor)) {
    const [, prefix, num, letra] = valor.match(nieRegex);
    const prefixNum = { X: '0', Y: '1', Z: '2' }[prefix];
    const letras = 'TRWAGMYFPDXBNJZSQVHLCKE';
    if (letra === letras[parseInt(prefixNum + num) % 23]) return { valid: true, valor };
    return { valid: false, msg: 'NIE no válido' };
  }

  // CIF: Letra + 7 dígitos + dígito/letra
  const cifRegex = /^[ABCDEFGHJKLMNPQRSUVW]\d{7}[\dA-J]$/;
  if (cifRegex.test(valor)) return { valid: true, valor };

  return { valid: false, msg: 'DNI no válido' };
}

// ── FINALIZAR WIZARD ──
async function wizFinish() {
  try {
    wizSaveCurrentStep();

    // Validar descripción obligatoria
    if (!_wiz.desc.trim()) {
      toast('⚠️ Describe el trabajo realizado', 'error'); return;
    }

    // Comprobar si el parte tiene firma_opcional
    const _parteWiz = misPartes.find(x => x.id === _wiz.parteId);
    const _firmaOpcional = _parteWiz?.firma_opcional || false;

    if (!_firmaOpcional) {
      // Validar nombre obligatorio (3+ palabras: nombre + primer apellido + segundo apellido)
      const nombreWords = (_wiz.clienteNombre || '').trim().split(/\s+/).filter(w => w.length > 0);
      if (nombreWords.length < 3) {
        toast('⚠️ Introduce nombre y los dos apellidos del cliente', 'error'); return;
      }

      // Validar DNI obligatorio
      if (!_wiz.clienteDni) {
        toast('⚠️ Introduce el DNI del cliente', 'error'); return;
      }
      const dniCheck = validarDNI(_wiz.clienteDni);
      if (!dniCheck.valid) {
        toast('⚠️ DNI no válido: ' + dniCheck.msg, 'error'); return;
      }

      // Validar firma cliente validada
      if (!_wiz.firmaData_validated) {
        toast('⚠️ El cliente debe firmar y validar su firma', 'error'); return;
      }
      // Validar firma operario validada
      if (!_wiz.firmaOperario_validated) {
        toast('⚠️ El operario debe firmar y validar su firma', 'error'); return;
      }
    }

    showLoading('Enviando informe...');

    const id = _wiz.parteId;
    const eid = EMPRESA?.id || 'default';
    const _isOffline = !navigator.onLine;

    // 0. GPS + km en paralelo (no bloquean la subida de archivos)
    const gpsPromise = new Promise(resolve => {
      if (!navigator.geolocation) return resolve(null);
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
        (err) => { console.warn('GPS final:', err.message); resolve(null); },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: _isOffline ? 300000 : 60000 }
      );
    });

    // Recalcular minutos trabajados
    const parteActual = misPartes.find(x => x.id === id);
    if (parteActual && _wiz.manoObra && parteActual.inicio_at) {
      const moTrabajo = _wiz.manoObra.find(mo => !mo.es_desplazamiento);
      if (moTrabajo) {
        const diffMs = new Date() - new Date(parteActual.inicio_at);
        moTrabajo.minutos = Math.max(1, Math.round(diffMs / (1000 * 60)));
        moTrabajo.total = (moTrabajo.minutos / 60) * (moTrabajo.precio_hora || cfgTarifaHora());
      }
    }

    // km por carretera (en paralelo con GPS)
    const kmPromise = (async () => {
      if (!parteActual || !_wiz.manoObra) return;
      const ubi = parteActual.ubicacion_inicio || parteActual.ubicacion;
      if (ubi && ubi.lat && ubi.lng) {
        try {
          const kmReal = await calcularKmCarretera(ubi.lat, ubi.lng);
          const despMO = _wiz.manoObra.find(mo => mo.es_desplazamiento);
          if (despMO) { despMO.km = kmReal; despMO.total = kmReal * (despMO.precio_hora || cfgTarifaKm()); }
        } catch(e) { /* silent */ }
      }
    })();

    // Esperar GPS (necesario para el parte) — km puede tardar más pero no bloquea
    const [ubicacionFin] = await Promise.all([gpsPromise, kmPromise]);
    if (!ubicacionFin && !_isOffline) {
      // Continuar sin GPS en vez de bloquear
      console.warn('Sin ubicación GPS final');
    }

    // 1+2. Subir TODAS las fotos y firmas EN PARALELO para máxima velocidad
    const _uploadFile = async (dataOrUrl, prefix, ext) => {
      if (!dataOrUrl || !dataOrUrl.startsWith('data:')) return dataOrUrl || null;
      try {
        const blob = await (await fetch(dataOrUrl)).blob();
        const filename = `${eid}/${Date.now()}_${prefix}_${Math.random().toString(36).substr(2,6)}.${ext}`;
        const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
        if (!error) {
          const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
          return data.publicUrl;
        }
        console.warn('Upload error:', error.message);
      } catch(e) { console.error('Upload error:', e); }
      return null;
    };

    // Preparar todas las subidas en paralelo
    const uploadTasks = [];
    const fotosNuevas = _wiz.fotosNuevas || [];
    const albaranesCompra = _wiz.albaranes_compra || [];

    // Fotos del parte
    for (const foto of fotosNuevas) {
      uploadTasks.push(_uploadFile(foto.data, 'foto', 'jpg').then(url => ({ type:'foto', url })));
    }
    // Fotos de albaranes/documentos (soporta .foto simple y .fotos[] multipágina)
    for (let i = 0; i < albaranesCompra.length; i++) {
      const alb = albaranesCompra[i];
      if (alb.fotos && Array.isArray(alb.fotos)) {
        // Multipágina: subir cada foto
        for (let j = 0; j < alb.fotos.length; j++) {
          if (alb.fotos[j] && alb.fotos[j].startsWith('data:')) {
            uploadTasks.push(_uploadFile(alb.fotos[j], 'alb', 'jpg').then(url => ({ type:'albaran_multi', idx:i, pageIdx:j, url })));
          }
        }
      } else if (alb.foto && alb.foto.startsWith('data:')) {
        // Página única (manual)
        uploadTasks.push(_uploadFile(alb.foto, 'alb', 'jpg').then(url => ({ type:'albaran', idx:i, url })));
      }
    }
    // Firma cliente
    uploadTasks.push(_uploadFile(_wiz.firmaData, 'firma_cliente', 'png').then(url => ({ type:'firma_cli', url })));
    // Firma operario
    uploadTasks.push(_uploadFile(_wiz.firmaOperario, 'firma_op', 'png').then(url => ({ type:'firma_op', url })));

    // Ejecutar todas las subidas en paralelo
    const uploadResults = await Promise.all(uploadTasks);

    // Procesar resultados
    let fotosUrls = [..._wiz.fotos]; // URLs existentes
    let firmaUrl = (_wiz.firmaData && !_wiz.firmaData.startsWith('data:')) ? _wiz.firmaData : null;
    let firmaOpUrl = (_wiz.firmaOperario && !_wiz.firmaOperario.startsWith('data:')) ? _wiz.firmaOperario : null;

    for (const res of uploadResults) {
      if (!res.url) continue;
      if (res.type === 'foto') fotosUrls.push(res.url);
      else if (res.type === 'albaran') albaranesCompra[res.idx].foto = res.url;
      else if (res.type === 'albaran_multi') { if (albaranesCompra[res.idx]?.fotos) albaranesCompra[res.idx].fotos[res.pageIdx] = res.url; }
      else if (res.type === 'firma_cli') firmaUrl = res.url;
      else if (res.type === 'firma_op') firmaOpUrl = res.url;
    }

    // 3. Guardar todo en el parte — estado completado (bloqueado)
    // Generar firma_token para el enlace público seguro
    const _firmaToken = crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2));
    const updateObj = {
      estado: 'completado',
      completado_at: new Date().toISOString(),
      firma_token: _firmaToken,
      descripcion: _wiz.desc || null,
      trabajos_pendientes: _wiz.pendientes || null,
      gremios_pendientes: (_wiz.gremios_pendientes && Object.keys(_wiz.gremios_pendientes).length > 0) ? _wiz.gremios_pendientes : null,
      observaciones: _wiz.observaciones || null,
      fotos: fotosUrls.length > 0 ? fotosUrls : null,
      materiales: _wiz.materiales.length > 0 ? _wiz.materiales : null,
      albaranes_compra: albaranesCompra.length > 0 ? albaranesCompra : null,
      mano_obra: (_wiz.manoObra && _wiz.manoObra.length > 0) ? _wiz.manoObra : null,
      firma_url: firmaUrl && !firmaUrl.startsWith('data:') ? firmaUrl : null,
      firma_operario_url: firmaOpUrl && !firmaOpUrl.startsWith('data:') ? firmaOpUrl : null,
      operario_nombre_firma: CP?.nombre || null,
      cliente_nombre_firma: _wiz.clienteNombre || null,
      cliente_email: _wiz.clienteEmail || null,
      cliente_dni: _wiz.clienteDni || null,
      // cliente_sin_email removed — column does not exist in DB
      // ubicacion_firma_cliente/operario — columnas no existen aún en DB
    };
    if (ubicacionFin) updateObj.ubicacion_fin = ubicacionFin;

    console.log('[wizFinish] Saving:', JSON.stringify(Object.keys(updateObj)));

    // Si estamos offline → guardar localmente y encolar
    if (!navigator.onLine) {
      const p = misPartes.find(x => x.id === id);
      if (p) Object.assign(p, updateObj);
      await cacheDataOffline();
      // Guardar el updateObj completo en la cola de sync (incluye firmas base64)
      await syncQueueAdd({ table:'partes_trabajo', action:'update_with_files', data: updateObj, match:{ id }, fotosNuevas: _wiz.fotosNuevas || [], timestamp: Date.now() });
      _wizClearAutoSave(id);
      document.removeEventListener('click', _closeMaterialSearch);
      hideLoading();
      toast('✅ Parte guardado localmente. Se enviará automáticamente al recuperar conexión.', 'success');
      closeModal();
      navigateTo(currentTab);
      return;
    }

    const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
    if (error) {
      // Si falla (posible pérdida de red durante envío) → guardar offline
      console.error('[wizFinish] Error Supabase:', error);
      const p = misPartes.find(x => x.id === id);
      if (p) Object.assign(p, updateObj);
      await cacheDataOffline();
      await syncQueueAdd({ table:'partes_trabajo', action:'update_with_files', data: updateObj, match:{ id }, fotosNuevas: _wiz.fotosNuevas || [], timestamp: Date.now() });
      _wizClearAutoSave(id);
      document.removeEventListener('click', _closeMaterialSearch);
      hideLoading();
      toast('✅ Parte guardado localmente (error de red). Se sincronizará al volver la conexión.', 'warning');
      closeModal();
      navigateTo(currentTab);
      return;
    }

    // Actualizar local
    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);

    // 3b. Registrar consumos de material en BD en paralelo
    const _parteNum = p?.numero || '';
    if (_wiz.materiales.length > 0 && navigator.onLine) {
      const consumoPromises = _wiz.materiales
        .filter(mat => mat.cantidad > 0)
        .map(mat => registrarConsumoMaterial(id, _parteNum, mat, mat._tipo || 'consumo', mat._motivo || null).catch(e => console.warn('[Consumo]', mat.nombre, e)));
      await Promise.all(consumoPromises);
      // Recargar stock furgoneta después de los consumos
      if (miFurgoneta) loadStockFurgoneta(miFurgoneta.id).catch(e => console.warn(e));
    }

    _wizClearAutoSave(id);
    document.removeEventListener('click', _closeMaterialSearch);

    // 4. Mostrar modal de éxito con opciones de envío (email, WhatsApp, SMS)
    const parteNum = p?.numero || id;

    // Si firma_opcional → cerrar directamente sin pedir envío al cliente
    if (_firmaOpcional) {
      hideLoading();
      toast(`✅ Parte ${parteNum} completado correctamente (sin firma requerida)`, 'success');
      closeModal();
      navigateTo(currentTab);

      // Generar PDF en background
      const _trabajoLocal = p?.trabajo_id ? trabajos.find(t => t.id === p.trabajo_id) : null;
      const _tituloTrabajo = p?.trabajo_titulo || _trabajoLocal?.titulo || '';
      const _dirTrabajo    = p?.direccion     || _trabajoLocal?.direccion_obra_texto || '';
      generarPdfParte(id, { ...updateObj, numero: p?.numero }, EMPRESA?.nombre || 'Instalo', _tituloTrabajo, _dirTrabajo)
        .then(url => { if (url) toast('📄 PDF generado', 'success'); })
        .catch(e => console.warn('[PDF bg]', e));
      return;
    }

    let cliTel = p?.cliente_telefono || '';
    let cliEmail = _wiz.clienteEmail || p?.cliente_email || '';
    if (p?.trabajo_id) {
      const _t = trabajos.find(tr => tr.id === p.trabajo_id);
      if (_t) {
        const _c = _t.cliente_id ? clientes.find(c => c.id === _t.cliente_id) : null;
        if (_c) {
          if (!cliTel) cliTel = _c.telefono || '';
          if (!cliEmail) cliEmail = _c.email || '';
        }
      }
    }
    // Mostrar modal de envío INMEDIATAMENTE — PDF se genera en background
    hideLoading();
    mostrarModalEnvio(id, parteNum, cliTel, cliEmail, null, _firmaToken);

    // 4b. Generar PDF en background (no bloquea la UI)
    const _trabajoLocal = p?.trabajo_id ? trabajos.find(t => t.id === p.trabajo_id) : null;
    const _tituloTrabajo = p?.trabajo_titulo || _trabajoLocal?.titulo || '';
    const _dirTrabajo    = p?.direccion     || _trabajoLocal?.direccion_obra_texto || '';
    generarPdfParte(id, { ...updateObj, numero: p?.numero }, EMPRESA?.nombre || 'Instalo', _tituloTrabajo, _dirTrabajo)
      .then(url => { if (url) toast('📄 PDF generado', 'success'); })
      .catch(e => console.warn('[PDF bg]', e));
  } catch(err) {
    console.error('[wizFinish] Error:', err);
    // Último recurso: guardar offline si hay cualquier error
    try {
      const p = misPartes.find(x => x.id === _wiz.parteId);
      if (p) {
        p.estado = 'completado';
        p.completado_at = new Date().toISOString();
        await cacheDataOffline();
        await syncQueueAdd({ table:'partes_trabajo', action:'update', data:{ estado:'completado', completado_at: p.completado_at }, match:{ id: _wiz.parteId }, timestamp: Date.now() });
      }
    } catch(e2) { console.error('Error guardando offline:', e2); }
    hideLoading();
    toast('⚠️ Error: ' + (err.message || 'Sin conexión') + '. Datos guardados localmente.', 'warning');
    closeModal();
    navigateTo(currentTab);
  }
}

// Convierte una URL pública de imagen a dataURL (base64) para jsPDF
async function _imageUrlToDataUrl(url) {
  try {
    const resp = await fetch(url);
    const blob = await resp.blob();
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch(e) { console.warn('[PDF] No se pudo cargar imagen:', url, e); return null; }
}

// Genera el PDF del parte, lo sube a Storage y devuelve la URL pública
async function generarPdfParte(parteId, parteData, empresaNombre, trabajoTitulo, trabajoDireccion) {
  try {
    const jsPDFLib = window.jspdf?.jsPDF || window.jsPDF;
    if (!jsPDFLib) { console.warn('[PDF] jsPDF no disponible'); return null; }

    const doc      = new jsPDFLib({ format:'a4', unit:'mm' });
    const pageW    = 210;
    const margin   = 15;
    const contentW = pageW - margin * 2;
    let y = 0;

    // ── Cabecera azul ──────────────────────────────────────
    doc.setFillColor(37, 99, 235);
    doc.rect(0, 0, pageW, 24, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(14); doc.setFont('helvetica', 'bold');
    doc.text(empresaNombre || 'Parte de Trabajo', pageW / 2, 11, { align:'center' });
    doc.setFontSize(9);  doc.setFont('helvetica', 'normal');
    doc.text(`Parte nº ${parteData.numero || parteId}`, pageW / 2, 18, { align:'center' });
    y = 32;

    // ── Información ────────────────────────────────────────
    const _seccion = (titulo, color) => {
      doc.setTextColor(...color);
      doc.setFontSize(8); doc.setFont('helvetica', 'bold');
      doc.text(titulo, margin, y); y += 2;
      doc.setDrawColor(...color); doc.setLineWidth(0.3);
      doc.line(margin, y, pageW - margin, y); y += 5;
    };

    _seccion('INFORMACIÓN', [37, 99, 235]);
    const fecha = parteData.fecha
      ? new Date(parteData.fecha + 'T00:00:00').toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' })
      : '-';
    const infoRows = [
      ['Fecha:',     fecha],
      ...(trabajoTitulo    ? [['Trabajo:',    trabajoTitulo]]    : []),
      ...(trabajoDireccion ? [['Dirección:',  trabajoDireccion]] : []),
    ];
    doc.setTextColor(50, 50, 50); doc.setFontSize(9);
    for (const [lbl, val] of infoRows) {
      doc.setFont('helvetica', 'bold');   doc.text(lbl, margin, y);
      doc.setFont('helvetica', 'normal');
      const lines = doc.splitTextToSize(val, contentW - 28);
      doc.text(lines, margin + 28, y);
      y += lines.length * 5 + 1;
    }
    y += 5;

    // ── Trabajo realizado ───────────────────────────────────
    if (parteData.descripcion) {
      _seccion('TRABAJO REALIZADO', [37, 99, 235]);
      doc.setTextColor(50, 50, 50); doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
      const lines = doc.splitTextToSize(parteData.descripcion, contentW);
      doc.text(lines, margin, y);
      y += lines.length * 5 + 7;
    }

    // ── Trabajos pendientes ─────────────────────────────────
    if (parteData.trabajos_pendientes) {
      _seccion('TRABAJOS PENDIENTES', [180, 83, 9]);
      let pendText = '';
      try {
        const parsed = typeof parteData.trabajos_pendientes === 'string'
          ? JSON.parse(parteData.trabajos_pendientes)
          : parteData.trabajos_pendientes;
        if (Array.isArray(parsed)) {
          pendText = parsed.map(i => `- ${i.tipo||''}${i.descripcion ? ': '+i.descripcion : ''}`).join('\n');
        } else { pendText = String(parteData.trabajos_pendientes); }
      } catch(e) { pendText = String(parteData.trabajos_pendientes); }
      doc.setTextColor(50, 50, 50); doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
      const lines = doc.splitTextToSize(pendText, contentW);
      doc.text(lines, margin, y);
      y += lines.length * 5 + 7;
    }

    // ── Firmas ──────────────────────────────────────────────
    if (parteData.firma_url || parteData.firma_operario_url) {
      _seccion('CONFORMIDAD', [37, 99, 235]);
      const firmaW = 75; const firmaH = 30;

      const [firmaCliDU, firmaOpDU] = await Promise.all([
        parteData.firma_url          ? _imageUrlToDataUrl(parteData.firma_url)          : Promise.resolve(null),
        parteData.firma_operario_url ? _imageUrlToDataUrl(parteData.firma_operario_url) : Promise.resolve(null),
      ]);

      doc.setFontSize(7); doc.setFont('helvetica', 'bold'); doc.setTextColor(100, 100, 100);
      if (firmaCliDU) {
        doc.text('PERSONA RESPONSABLE', margin, y - 2);
        doc.addImage(firmaCliDU, 'PNG', margin, y, firmaW, firmaH);
        doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(50, 50, 50);
        if (parteData.cliente_nombre_firma) doc.text(parteData.cliente_nombre_firma, margin, y + firmaH + 5);
        if (parteData.cliente_dni) { doc.setFontSize(7); doc.setTextColor(100,100,100); doc.text('DNI: ' + parteData.cliente_dni, margin, y + firmaH + 10); }
      }
      if (firmaOpDU) {
        const xOp = margin + firmaW + 18;
        doc.setFontSize(7); doc.setFont('helvetica', 'bold'); doc.setTextColor(100, 100, 100);
        doc.text('OPERARIO', xOp, y - 2);
        doc.addImage(firmaOpDU, 'PNG', xOp, y, firmaW, firmaH);
        doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(50, 50, 50);
        if (parteData.operario_nombre_firma) doc.text(parteData.operario_nombre_firma, xOp, y + firmaH + 5);
      }
      y += firmaH + 16;
    }

    // ── Footer ──────────────────────────────────────────────
    doc.setFontSize(7); doc.setFont('helvetica', 'italic'); doc.setTextColor(160, 160, 160);
    doc.text('Documento generado por Instalo ERP', pageW / 2, 287, { align:'center' });

    // ── Subir PDF a Storage ─────────────────────────────────
    const pdfBlob = doc.output('blob');
    const eid = EMPRESA?.id || 'default';
    const filename = `${eid}/partes-pdf/parte_${parteData.numero || parteId}.pdf`;
    const { error: upErr } = await sb.storage.from('documentos').upload(filename, pdfBlob, { contentType:'application/pdf', upsert:true });
    if (upErr) { console.error('[PDF] Error subiendo:', upErr); return null; }

    const { data: urlData } = sb.storage.from('documentos').getPublicUrl(filename);
    const pdfUrl = urlData?.publicUrl || null;

    // Guardar pdf_url en el parte
    if (pdfUrl) {
      await sb.from('partes_trabajo').update({ pdf_url: pdfUrl }).eq('id', parteId);
    }
    return pdfUrl;
  } catch(e) {
    console.error('[PDF] Error generando PDF del parte:', e);
    return null;
  }
}

// ── ENVIAR EMAIL (via Supabase Edge Function) ──
async function enviarEmailParte(parteId, email, asuntoCustom = null, cuerpoCustom = null) {
  const p = misPartes.find(x => x.id === parteId);
  const parteNum = p?.numero || parteId;
  const empresa = EMPRESA?.nombre || 'Instalo';
  const baseUrl = window.location.origin;
  const token = p?.firma_token || null;
  const enlace = token ? `${baseUrl}/parte.html?token=${token}` : `${baseUrl}/parte.html?id=${parteId}`;

  const asunto = asuntoCustom || `Parte de trabajo ${parteNum} - ${empresa}`;
  const cuerpo = cuerpoCustom || `Estimado/a cliente,\n\nDesde ${empresa} le informamos que se ha completado el parte de trabajo nº ${parteNum}.\n\nPuede consultar los detalles en el siguiente enlace:\n${enlace}\n\nUn cordial saludo,\n${empresa}${EMPRESA?.telefono ? '\nTel: ' + EMPRESA.telefono : ''}`;

  try {
    const { data, error } = await sb.functions.invoke('enviar-correo', {
      body: {
        empresa_id: EMPRESA?.id,
        para: email,
        asunto: asunto,
        cuerpo_texto: cuerpo,
        vinculado_tipo: 'parte',
        vinculado_id: parteId,
        vinculado_ref: parteNum
      }
    });
    if (error) throw error;
    return { ok: true };
  } catch(e) {
    console.error('Error enviando email:', e);
    return { ok: false, error: e.message || 'Error desconocido' };
  }
}

function _limpiarTelEnvio() {
  let tel = (document.getElementById('envioTelInput')?.value || '').replace(/[\s\-\.\(\)]/g, '');
  if (/^[679]\d{8}$/.test(tel)) tel = '34' + tel;
  if (tel.startsWith('0034')) tel = tel.substring(2);
  return tel;
}

function _getMensajeEnvio(parteNum, empresa, enlace) {
  return `Estimado/a cliente, desde ${empresa} le informamos que se ha completado el parte de trabajo nº ${parteNum}. Puede consultar los detalles en el siguiente enlace:\n\n${enlace}\n\nGracias por confiar en nosotros.`;
}

function envioWhatsApp(parteId, parteNum, empresa, enlace) {
  const tel = _limpiarTelEnvio();
  if (!tel || tel.length < 9) {
    toast('⚠️ Introduce un teléfono válido', 'error');
    document.getElementById('envioTelInput')?.focus();
    return;
  }
  const telWA = tel.startsWith('+') ? tel.substring(1) : tel;
  const msg = encodeURIComponent(_getMensajeEnvio(parteNum, empresa, enlace));
  // Cerrar modal ANTES de abrir WhatsApp — en iOS window.open bloquea el hilo
  _envioRealizado = true;
  closeModal();
  navigateTo(currentTab);
  setTimeout(() => { window.location.href = `https://wa.me/${telWA}?text=${msg}`; }, 150);
}

function envioSMS(parteId, parteNum, empresa, enlace) {
  const tel = _limpiarTelEnvio();
  if (!tel || tel.length < 9) {
    toast('⚠️ Introduce un teléfono válido', 'error');
    document.getElementById('envioTelInput')?.focus();
    return;
  }
  const msg = encodeURIComponent(_getMensajeEnvio(parteNum, empresa, enlace));
  // Cerrar modal ANTES de abrir SMS
  _envioRealizado = true;
  closeModal();
  navigateTo(currentTab);
  setTimeout(() => { window.location.href = `sms:${tel}?body=${msg}`; }, 150);
}

function _marcarEnvioRealizado() {
  _envioRealizado = true;
  // En iOS al abrir WhatsApp/SMS el timer se pausa — usar visibilitychange para cerrar al volver
  const _cerrarAlVolver = () => {
    if (document.visibilityState === 'visible' && _envioRealizado) {
      document.removeEventListener('visibilitychange', _cerrarAlVolver);
      // Pequeña espera para que iOS termine la transición
      setTimeout(() => {
        closeModal();
        navigateTo(currentTab);
      }, 300);
    }
  };
  document.addEventListener('visibilitychange', _cerrarAlVolver);
  // Fallback: si no salió de la app (ej: email mailto), cerrar directamente
  setTimeout(() => {
    document.removeEventListener('visibilitychange', _cerrarAlVolver);
    if (_envioRealizado) {
      closeModal();
      navigateTo(currentTab);
    }
  }, 1500);
}

function copiarEnlaceParte() {

  if (input) {

// ── FIRMA REMOTA — El cliente firma desde su móvil sin estar presente ──
// Firma remota desde el wizard (paso firma, cliente ausente)
// Guarda TODOS los datos del wizard + genera firma_token + envía enlace seguro
async function wizFirmaRemotaEnviar(canal) {
  const parteId = _wiz.parteId;
  const p = misPartes.find(x => x.id === parteId);
  if (!p) return;
  const parteNum = p.numero || parteId;
  const empresa = EMPRESA?.nombre || 'Instalo';

  // Validar datos según canal
  if (canal === 'whatsapp' || canal === 'sms') {
    const telRaw = (document.getElementById('frTelInput')?.value || '').replace(/[\s\-\.\(\)]/g, '');
    if (!telRaw || telRaw.replace(/\D/g,'').length < 9) {
      toast('⚠️ Introduce el teléfono del cliente', 'error');
      document.getElementById('frTelInput')?.focus();
      return;
    }
  }
  if (canal === 'email') {
    const email = (document.getElementById('frEmailInput')?.value || '').trim();
    if (!email || !email.includes('@')) {
      toast('⚠️ Introduce el email del cliente', 'error');
      document.getElementById('frEmailInput')?.focus();
      return;
    }
  }

  // Validar que al menos la descripción esté rellenada
  wizSaveCurrentStep();
  if (!_wiz.desc.trim()) {
    toast('⚠️ Describe el trabajo realizado antes de enviar', 'error'); return;
  }
  // Validar firma operario
  if (!_wiz.firmaOperario_validated) {
    toast('⚠️ El operario debe firmar antes de enviar la firma remota', 'error'); return;
  }

  showLoading('Guardando parte y preparando firma remota...');

  try {
    const id = parteId;
    const eid = EMPRESA?.id || 'default';

    // 1. Generar firma_token UUID seguro
    const firmaToken = crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2));

    // 2. Subir fotos y firma operario (como hace wizFinish)
    const _uploadFile = async (dataOrUrl, prefix, ext) => {
      if (!dataOrUrl || !dataOrUrl.startsWith('data:')) return dataOrUrl || null;
      try {
        const blob = await (await fetch(dataOrUrl)).blob();
        const filename = `${eid}/${Date.now()}_${prefix}_${Math.random().toString(36).substr(2,6)}.${ext}`;
        const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
        if (!error) {
          const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
          return data.publicUrl;
        }
      } catch(e) { console.error('Upload error:', e); }
      return null;
    };

    const uploadTasks = [];
    const fotosNuevas = _wiz.fotosNuevas || [];
    const albaranesCompra = _wiz.albaranes_compra || [];

    for (const foto of fotosNuevas) {
      uploadTasks.push(_uploadFile(foto.data, 'foto', 'jpg').then(url => ({ type:'foto', url })));
    }
    for (let i = 0; i < albaranesCompra.length; i++) {
      const alb = albaranesCompra[i];
      if (alb.fotos && Array.isArray(alb.fotos)) {
        for (let j = 0; j < alb.fotos.length; j++) {
          if (alb.fotos[j] && alb.fotos[j].startsWith('data:')) {
            uploadTasks.push(_uploadFile(alb.fotos[j], 'alb', 'jpg').then(url => ({ type:'albaran_multi', idx:i, pageIdx:j, url })));
          }
        }
      } else if (alb.foto && alb.foto.startsWith('data:')) {
        uploadTasks.push(_uploadFile(alb.foto, 'alb', 'jpg').then(url => ({ type:'albaran', idx:i, url })));
      }
    }
    // Firma operario
    uploadTasks.push(_uploadFile(_wiz.firmaOperario, 'firma_op', 'png').then(url => ({ type:'firma_op', url })));

    const uploadResults = await Promise.all(uploadTasks);

    let fotosUrls = [..._wiz.fotos];
    let firmaOpUrl = (_wiz.firmaOperario && !_wiz.firmaOperario.startsWith('data:')) ? _wiz.firmaOperario : null;

    for (const res of uploadResults) {
      if (!res.url) continue;
      if (res.type === 'foto') fotosUrls.push(res.url);
      else if (res.type === 'albaran') albaranesCompra[res.idx].foto = res.url;
      else if (res.type === 'albaran_multi') { if (albaranesCompra[res.idx]?.fotos) albaranesCompra[res.idx].fotos[res.pageIdx] = res.url; }
      else if (res.type === 'firma_op') firmaOpUrl = res.url;
    }

    // 3. Guardar TODO en el parte con estado pendiente_firma_cliente + token
    const updateObj = {
      estado: 'pendiente_firma_cliente',
      firma_token: firmaToken,
      descripcion: _wiz.desc || null,
      trabajos_pendientes: _wiz.pendientes || null,
      gremios_pendientes: (_wiz.gremios_pendientes && Object.keys(_wiz.gremios_pendientes).length > 0) ? _wiz.gremios_pendientes : null,
      observaciones: _wiz.observaciones || null,
      fotos: fotosUrls.length > 0 ? fotosUrls : null,
      materiales: _wiz.materiales.length > 0 ? _wiz.materiales : null,
      albaranes_compra: albaranesCompra.length > 0 ? albaranesCompra : null,
      mano_obra: (_wiz.manoObra && _wiz.manoObra.length > 0) ? _wiz.manoObra : null,
      firma_operario_url: firmaOpUrl && !firmaOpUrl.startsWith('data:') ? firmaOpUrl : null,
      operario_nombre_firma: CP?.nombre || null,
    };

    const { error: updateError } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
    if (updateError) throw updateError;

    // Actualizar en memoria
    if (p) Object.assign(p, updateObj);

    // Registrar consumos de material
    if (_wiz.materiales.length > 0 && navigator.onLine) {
      const consumoPromises = _wiz.materiales
        .filter(mat => mat.cantidad > 0)
        .map(mat => registrarConsumoMaterial(id, parteNum, mat, mat._tipo || 'consumo', mat._motivo || null).catch(e => console.warn('[Consumo]', mat.nombre, e)));
      await Promise.all(consumoPromises);
      if (miFurgoneta) loadStockFurgoneta(miFurgoneta.id).catch(e => console.warn(e));
    }

    _wizClearAutoSave(id);

    // 4. Generar enlace seguro con token (NO con id)
    const baseUrl = window.location.origin;
    const enlace = `${baseUrl}/parte.html?token=${firmaToken}`;
    const mensaje = `Hola, le enviamos desde ${empresa} el parte de trabajo nº ${parteNum} para su revisión y firma digital.\n\nPuede consultar los detalles y firmar aquí:\n${enlace}\n\nGracias por confiar en nosotros.`;

    hideLoading();

    // 5. Preparar URL de envío ANTES de cerrar la UI
    let urlEnvio = null;
    if (canal === 'whatsapp') {
      let tel = (document.getElementById('frTelInput')?.value || '').replace(/[\s\-\.\(\)]/g, '');
      if (/^[679]\d{8}$/.test(tel)) tel = '34' + tel;
      urlEnvio = `https://wa.me/${tel}?text=${encodeURIComponent(mensaje)}`;
    } else if (canal === 'sms') {
      let tel = (document.getElementById('frTelInput')?.value || '').replace(/[\s\-\.\(\)]/g, '');
      urlEnvio = `sms:${tel}?body=${encodeURIComponent(mensaje)}`;
    } else if (canal === 'email') {
      // Email se envía por Edge Function, no por mailto
      const email = (document.getElementById('frEmailInput')?.value || '').trim();
      urlEnvio = null; // No abrir app externa
      // Enviar por servidor
      const asunto = `Firma parte ${parteNum} - ${empresa}`;
      enviarEmailParte(id, email, asunto, mensaje).then(result => {
        if (result.ok) toast('📧 Email enviado a ' + email, 'success');
        else toast('⚠️ Error al enviar email', 'error');
      });
    }

    // 6. Crear tarea pendiente para seguimiento
    const canalLabel = canal === 'whatsapp' ? 'WhatsApp' : canal === 'sms' ? 'SMS' : 'Email';
    if (EMPRESA?.id) {
      try {
        await sb.from('tareas_pendientes').insert({
          empresa_id: EMPRESA.id,
          entidad_tipo: 'parte',
          entidad_id: parteId,
          entidad_nombre: parteNum,
          titulo: `Pendiente firma remota del cliente: ${parteNum} (${canalLabel})`,
          campos_faltantes: ['firma_cliente_remota'],
          origen: 'auto',
          rol_asignado: 'admin',
          estado: 'pendiente',
          usuario_creador_id: CU?.id || null
        });
      } catch(_e) {}
    }

    // 7. Cerrar wizard PRIMERO — luego abrir app externa
    //    En iOS, window.open bloquea el hilo y el closeModal nunca se ejecutaría después
    _envioRealizado = true;
    toast(`✅ Parte guardado · Firma remota enviada por ${canalLabel}`, 'success');
    closeModal();
    navigateTo(currentTab);

    // 8. Abrir canal de envío DESPUÉS de cerrar la UI
    if (urlEnvio) {
      setTimeout(() => { window.location.href = urlEnvio; }, 150);
    }

  } catch(e) {
    hideLoading();
    toast('Error: ' + (e.message || 'desconocido'), 'error');
  }
}

// ── REENVIAR FIRMA REMOTA ──
function reenviarFirmaRemota(parteId) {
  const p = misPartes.find(x => x.id === parteId);
  if (!p || !p.firma_token) { toast('⚠️ Este parte no tiene enlace de firma', 'error'); return; }

  const empresa = EMPRESA?.nombre || 'Instalo';
  const parteNum = p.numero || parteId;
  const baseUrl = window.location.origin;
  const enlace = `${baseUrl}/parte.html?token=${p.firma_token}`;
  const mensaje = `Hola, le recordamos desde ${empresa} que tiene pendiente la firma del parte de trabajo nº ${parteNum}.\n\nPuede firmar aquí:\n${enlace}\n\nGracias.`;

  // Buscar teléfono del cliente
  let tel = p.cliente_telefono || '';
  if (!tel) {
    // Buscar en cliente asociado
    let cli = null;
    if (p.cliente_id) cli = clientes.find(c => c.id === p.cliente_id);
    if (!cli && p.trabajo_id) {
      const trab = trabajos.find(t => t.id === p.trabajo_id);
      if (trab?.cliente_id) cli = clientes.find(c => c.id === trab.cliente_id);
    }
    if (cli) tel = cli.telefono || '';
  }
  tel = (tel || '').replace(/[\s\-\.\(\)]/g, '');
  if (/^[679]\d{8}$/.test(tel)) tel = '34' + tel;

  // Cerrar modal primero, luego abrir WhatsApp
  closeModal();
  navigateTo(currentTab);
  toast('📱 Reenviando enlace de firma...', 'success');

  const urlWA = `https://wa.me/${tel}?text=${encodeURIComponent(mensaje)}`;
  setTimeout(() => { window.location.href = urlWA; }, 150);
}

// Guardar wizard en modo edición (sin cambiar estado)
async function wizFinishEdit() {
  try {
    wizSaveCurrentStep();
    toast('Guardando...', '');
    const id = _wiz.parteId;
    const eid = EMPRESA?.id || 'default';

    // 1. Subir fotos nuevas a Supabase Storage
    let fotosUrls = _wiz.fotos ? [..._wiz.fotos] : [];
    for (const foto of (_wiz.fotosNuevas || [])) {
      try {
        const blob = await (await fetch(foto.data)).blob();
        const filename = `${eid}/${Date.now()}_${Math.random().toString(36).substr(2,9)}.jpg`;
        const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
        if (!error) {
          const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
          fotosUrls.push(data.publicUrl);
        } else {
          console.warn('Storage upload foto error:', error.message);
        }
      } catch(e) { console.error('Error subiendo foto:', e); }
    }

    // 1b. Subir fotos de documentos (soporta .foto simple y .fotos[] multipágina)
    const albaranesCompra = _wiz.albaranes_compra || [];
    for (const alb of albaranesCompra) {
      if (alb.fotos && Array.isArray(alb.fotos)) {
        for (let j = 0; j < alb.fotos.length; j++) {
          if (alb.fotos[j] && alb.fotos[j].startsWith('data:')) {
            try {
              const blob = await (await fetch(alb.fotos[j])).blob();
              const filename = `${eid}/${Date.now()}_alb_p${j}_${Math.random().toString(36).substr(2,6)}.jpg`;
              const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
              if (!error) {
                const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
                alb.fotos[j] = data.publicUrl;
              }
            } catch(e) { console.error('Error subiendo foto doc:', e); }
          }
        }
      } else if (alb.foto && alb.foto.startsWith('data:')) {
        try {
          const blob = await (await fetch(alb.foto)).blob();
          const filename = `${eid}/${Date.now()}_alb_${Math.random().toString(36).substr(2,6)}.jpg`;
          const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
          if (!error) {
            const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
            alb.foto = data.publicUrl;
          }
        } catch(e) { console.error('Error subiendo foto doc:', e); }
      }
    }

    // 2. Subir firma si hay nueva (data: URL → storage)
    let firmaUrl = null;
    if (_wiz.firmaData && !_wiz.firmaData.startsWith('data:')) {
      // Ya es una URL de storage, mantenerla
      firmaUrl = _wiz.firmaData;
    } else if (_wiz.firmaData && _wiz.firmaData.startsWith('data:')) {
      try {
        const blob = await (await fetch(_wiz.firmaData)).blob();
        const filename = `${eid}/${Date.now()}_firma.png`;
        const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
        if (!error) {
          const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
          firmaUrl = data.publicUrl;
        } else {
          console.warn('Storage upload firma error:', error.message);
        }
      } catch(e) { console.error('Error subiendo firma:', e); }
    }

    // 3. Guardar sin cambiar estado
    const updateObj = {
      descripcion: _wiz.desc || null,
      trabajos_pendientes: _wiz.pendientes || null,
      gremios_pendientes: (_wiz.gremios_pendientes && Object.keys(_wiz.gremios_pendientes).length > 0) ? _wiz.gremios_pendientes : null,
      observaciones: _wiz.observaciones || null,
    };
    // Solo incluir fotos/materiales/mano_obra si hay datos
    if (fotosUrls.length > 0) updateObj.fotos = fotosUrls;
    if (_wiz.materiales && _wiz.materiales.length > 0) updateObj.materiales = _wiz.materiales;
    if (albaranesCompra.length > 0) updateObj.albaranes_compra = albaranesCompra;
    else updateObj.albaranes_compra = null;
    if (_wiz.manoObra && _wiz.manoObra.length > 0) updateObj.mano_obra = _wiz.manoObra;
    // Solo incluir firma si es URL válida (no data:)
    if (firmaUrl && !firmaUrl.startsWith('data:')) updateObj.firma_url = firmaUrl;
    if (_wiz.clienteNombre) updateObj.cliente_nombre_firma = _wiz.clienteNombre;
    if (_wiz.clienteEmail) updateObj.cliente_email = _wiz.clienteEmail;

    console.log('[wizFinishEdit] Saving:', JSON.stringify(Object.keys(updateObj)));
    const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
    if (error) {
      toast('Error al guardar: ' + (error.message || 'Sin conexión'), 'error');
      return;
    }

    // Actualizar local
    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);

    toast('Información guardada', 'success');
    closeModal();
    document.removeEventListener('click', _closeMaterialSearch);
    navigateTo(currentTab);
  } catch(err) {
    console.error('[wizFinishEdit] Error:', err);
    toast('Error: ' + (err.message || 'desconocido'), 'error');
  }
}

// ── INICIAR PARTE CON GPS ──
async function iniciarParteConGPS(id) {
  // Verificar que no hay otro parte en curso del mismo operario
  const enCurso = misPartes.find(p => p.estado === 'en_curso' && p.id !== id);
  if (enCurso) {
    toast(`⚠️ Ya tienes un parte en curso (${enCurso.numero || 'sin número'}). Debes completarlo antes de iniciar otro.`, 'error');
    return;
  }

  // Mostrar confirmación con aviso de GPS
  const confirmed = confirm('📍 Se registrará tu ubicación GPS.\n\n¿Iniciar el trabajo?');
  if (!confirmed) return;

  toast('📍 Obteniendo ubicación...', '');

  const isOffline = !navigator.onLine;

  // Intentar obtener GPS
  let ubicacion = null;
  try {
    ubicacion = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('GPS no disponible')); return; }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
        (err) => reject(err),
        { enableHighAccuracy: true, timeout: 15000, maximumAge: isOffline ? 300000 : 0 }
      );
    });
  } catch(e) {
    console.warn('GPS error:', e.message);
    // ONLINE: GPS obligatorio → bloquear
    if (!isOffline) {
      toast('⚠️ Debes permitir el acceso a la ubicación para iniciar el parte. Activa el GPS e inténtalo de nuevo.', 'error');
      return;
    }
    // OFFLINE: GPS opcional → continuar sin él
    toast('⚠️ Sin GPS. Se guardará sin ubicación.', 'warning');
  }

  const updateObj = {
    estado: 'en_curso',
    inicio_at: new Date().toISOString(),
  };
  if (ubicacion) updateObj.ubicacion_inicio = ubicacion;

  // Si estamos offline → guardar localmente y encolar
  if (isOffline) {
    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);
    await cacheDataOffline();
    await syncQueueAdd({ table:'partes_trabajo', action:'update', data: updateObj, match:{ id }, timestamp: Date.now() });
    toast('🔧 Trabajo iniciado (se sincronizará al recuperar conexión)', 'success');
    closeModal();
    navigateTo(currentTab);
    // [DESACTIVADO] _sugerirFichajeEntradaSiProcede();
    return;
  }

  try {
    const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
    if (error) { toast('Error: ' + (error.message || 'Sin conexión'), 'error'); return; }

    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);

    toast('🔧 Trabajo iniciado · GPS guardado', 'success');
    closeModal();
    navigateTo(currentTab);
    // [DESACTIVADO] Sugerir fichaje entrada si es el primer parte y no hay entrada
    // _sugerirFichajeEntradaSiProcede();
  } catch(e) {
    console.error('Error iniciar parte:', e);
    // Falló la red durante el intento → guardar offline
    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);
    await cacheDataOffline();
    await syncQueueAdd({ table:'partes_trabajo', action:'update', data: updateObj, match:{ id }, timestamp: Date.now() });
    toast('🔧 Trabajo iniciado offline (se sincronizará)', 'success');
    closeModal();
    navigateTo(currentTab);
  }
}

// ── ABRIR WIZARD INFORMAR ──
async function openInformarWizard(id) {
  const p = misPartes.find(x => x.id === id);
  if (!p) return;

  // ── Detectar si el parte tiene formulario asociado para insertar el step ──
  let _tieneFormulario = false;
  try {
    const { count } = await sb.from('partes_formulario')
      .select('id', { count: 'exact', head: true })
      .eq('parte_id', id);
    _tieneFormulario = (count || 0) > 0;
  } catch(e) { console.warn('[wizard] check formulario:', e); }
  _wizSetSteps(_tieneFormulario);

  // Auto-calcular minutos trabajados desde inicio_at
  let autoManoObra = p.mano_obra ? [...p.mano_obra] : [];
  if (autoManoObra.length === 0 && p.inicio_at) {
    const inicio = new Date(p.inicio_at);
    const ahora = new Date();
    const diffMs = ahora - inicio;
    const diffMinutos = Math.max(1, Math.round(diffMs / (1000 * 60)));
    autoManoObra.push({
      descripcion: 'Trabajo realizado',
      minutos: diffMinutos,
      precio_hora: cfgTarifaHora(),
      total: (diffMinutos / 60) * cfgTarifaHora(),
    });
  }

  // Auto-añadir línea de desplazamiento con cálculo de km por carretera
  if (autoManoObra.length <= 1 && !autoManoObra.find(mo => mo.descripcion && mo.descripcion.toLowerCase().includes('desplazamiento'))) {
    autoManoObra.push({
      descripcion: 'Desplazamiento',
      minutos: 0,
      precio_hora: cfgTarifaKm(),
      total: 0,
      km: 0,
      es_desplazamiento: true,
    });
    // Calcular km reales por carretera (Google Maps → OSRM → haversine)
    const ubi = p.ubicacion_inicio || p.ubicacion;
    if (ubi && ubi.lat && ubi.lng) {
      calcularKmCarretera(ubi.lat, ubi.lng).then(km => {
        const despMO = _wiz.manoObra.find(mo => mo.es_desplazamiento);
        if (despMO) {
          despMO.km = km;
          despMO.total = km * (despMO.precio_hora || cfgTarifaKm());
          renderWizStep();
        }
      }).catch(() => {});
    }
  }

  // Pre-fill email del cliente desde trabajo/obra si no existe en el parte
  let _prefillEmail = p.cliente_email || '';
  // El nombre NO se pre-rellena: es la persona responsable en la visita, no el cliente
  if (!_prefillEmail && p.trabajo_id) {
    const _trab = trabajos.find(tr => tr.id === p.trabajo_id);
    if (_trab) {
      const _cli = _trab.cliente_id ? clientes.find(c => c.id === _trab.cliente_id) : null;
      if (_cli) {
        if (!_prefillEmail) _prefillEmail = _cli.email || '';
      }
    }
  }

  // Intentar recuperar progreso auto-guardado
  const _saved = _wizLoadAutoSave(id);
  if (_saved && _saved.mode === 'informar') {
    _wiz = Object.assign(_saved, {
      parteId: id,
      firmaData: null,
      firmaOperario: CP?.firma_guardada || null,
      firmaData_validated: false,
      firmaOperario_validated: !!CP?.firma_guardada,
      fotosNuevas: [],
    });
    // Mantener manoObra calculada si no tenía guardada
    if (!_wiz.manoObra || !_wiz.manoObra.length) _wiz.manoObra = autoManoObra;
    // El nombre de firma NO se recupera del auto-save (es persona en visita, no cliente)
    // Solo mantenerlo si el usuario lo escribió manualmente (tiene 3+ palabras)
    if (_wiz.clienteNombre) {
      const _palabras = _wiz.clienteNombre.trim().split(/\s+/).filter(w => w.length > 0);
      // Si coincide con el nombre del cliente, limpiar (fue auto-relleno viejo)
      const _cliNom = p.cliente_nombre_firma || '';
      let _nomObra = '';
      if (p.trabajo_id) {
        const _tr = trabajos.find(tr => tr.id === p.trabajo_id);
        if (_tr) {
          const _cl = _tr.cliente_id ? clientes.find(c => c.id === _tr.cliente_id) : null;
          _nomObra = (_cl?.nombre || _tr.cliente_nombre || '');
        }
      }
      if (_wiz.clienteNombre === _cliNom || _wiz.clienteNombre === _nomObra) {
        _wiz.clienteNombre = '';
      }
    }
    toast('Se ha recuperado tu progreso anterior', 'success');
  } else {
    _wiz = {
      parteId: id,
      step: 0,
      mode: 'informar',
      desc: p.descripcion || '',
      pendientes_checked: !!p.trabajos_pendientes,
      pendientes: p.trabajos_pendientes || '',
      gremios_pendientes: p.gremios_pendientes || {},
      observaciones: p.observaciones || '',
      fotos: p.fotos ? [...p.fotos] : [],
      fotosNuevas: [],
      materiales: p.materiales ? [...p.materiales] : [],
      albaranes_compra: p.albaranes_compra ? [...p.albaranes_compra] : [],
      manoObra: autoManoObra,
      firmaData: null,
      firmaOperario: CP?.firma_guardada || null,
      firmaData_validated: false,
      firmaOperario_validated: !!CP?.firma_guardada,
      clienteEmailMode: 'si',
      clienteEmail: _prefillEmail,
      clienteNombre: '',
      clienteDni: p.cliente_dni || '',
    };
  }
  renderWizStep();
}

async function cambiarEstado(id, nuevoEstado) {
  // Si se intenta completar → abrir wizard obligatorio
  if (nuevoEstado === 'completado') {
    closeModal();
    setTimeout(() => openInformarWizard(id), 300);
    return;
  }

  // Verificar que no hay otro parte en curso del mismo operario
  if (nuevoEstado === 'en_curso') {
    const parte = misPartes.find(x => x.id === id);
    const operarioId = parte?.usuario_id || CU?.id;
    const otroEnCurso = misPartes.find(p => p.estado === 'en_curso' && p.id !== id && p.usuario_id === operarioId);
    if (otroEnCurso) {
      toast(`⚠️ Ya hay un parte en curso (${otroEnCurso.numero || ''}). Debe completarse antes de iniciar otro.`, 'error');
      return;
    }
  }

  const updateObj = { estado: nuevoEstado };
  if (nuevoEstado === 'revisado') {
    updateObj.revisado_por = CU?.id || null;
    updateObj.revisado_por_nombre = CP?.nombre || '';
    updateObj.revisado_at = new Date().toISOString();
  }

  const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
  if (error) { toast('Error: ' + (error.message || 'Sin conexión'), 'error'); return; }

  const p = misPartes.find(x => x.id === id);
  if (p) Object.assign(p, updateObj);

  const estInfo = PT_ESTADOS[nuevoEstado] || {};
  toast(`${estInfo.ico||''} ${estInfo.label||nuevoEstado} ✓`, 'success');
  closeModal();
  navigateTo(currentTab);
}

async function toggleTarea(id, completar) {
  const nuevoEstado = completar === true || completar === 'true' ? 'completada' : 'pendiente';
  const { error } = await sb.from('tareas_obra').update({ estado: nuevoEstado }).eq('id', id);
  if (error) { toast('Error', 'error'); return; }

  const t = misTareas.find(x => x.id === id);
  if (t) t.estado = nuevoEstado;
  toast(completar ? '✅ Completada' : '↩️ Reabierta', 'success');
  navigateTo(currentTab);
}

// ── Ajuste de altura del modal cuando aparece/desaparece el teclado (iOS) ──
// En iOS el teclado no reduce el DVH: usamos visualViewport para saberlo.
let _kbOpen = false;
(function _initSheetKeyboardResize() {
  if (!window.visualViewport) return;
  const fullH = window.visualViewport.height;

  window.visualViewport.addEventListener('resize', () => {
    // Detectar si el teclado está abierto (viewport se reduce >100px)
    const diff = fullH - window.visualViewport.height;
    const wasOpen = _kbOpen;
    _kbOpen = diff > 100;
    const sheet = document.getElementById('modalSheet');
    if (sheet) {
      if (_kbOpen && !wasOpen) sheet.classList.add('keyboard-open');
      else if (!_kbOpen && wasOpen) sheet.classList.remove('keyboard-open');
    }
    _ajustarAlturaSheet();
    if (_kbOpen) _scrollInputVisible();
  });

  window.visualViewport.addEventListener('scroll', () => {
    _ajustarAlturaSheet();
  });
})();

function _ajustarAlturaSheet() {
  const overlay = document.getElementById('modalOverlay');
  const sheet   = document.getElementById('modalSheet');
  const bar     = document.getElementById('modalBlueBar');
  if (!sheet || !overlay) return;

  const vv = window.visualViewport;
  if (!vv) return;

  // Reposicionar el overlay para que coincida con el visual viewport (iOS keyboard fix)
  const offsetTop = vv.offsetTop || 0;
  overlay.style.position = 'fixed';
  overlay.style.top    = offsetTop + 'px';
  overlay.style.height = vv.height + 'px';
  overlay.style.left   = '0';
  overlay.style.right  = '0';

  // El sheet ocupa todo el espacio menos la blue bar
  const barH = bar ? bar.offsetHeight : 0;
  sheet.style.maxHeight = Math.floor(vv.height - barH) + 'px';
}

// Hacer scroll para que el input activo quede visible sobre el teclado
function _scrollInputVisible() {
  const focused = document.activeElement;
  if (!focused || !['INPUT','TEXTAREA','SELECT'].includes(focused.tagName)) return;
  setTimeout(() => {
    focused.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 100);
}

function toast(msg, type) {
  const el = document.getElementById('appToast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2500);
}

function showLoading(msg) {
  const el = document.getElementById('loadingOverlay');
  const txt = document.getElementById('loadingText');

  if (el) el.classList.add('active');

}

// ═══════════════════════════════════════════════
// PWA: Service Worker & Install — con detección de nuevas versiones
// ═══════════════════════════════════════════════
async function registerSWWithUpdates() {
  try {
    const reg = await navigator.serviceWorker.register('sw.js');
    console.log('[SW] Registrado');

    // Detectar SW nuevo descargando
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      if (!newSW) return;
      newSW.addEventListener('statechange', () => {
        // Cuando el nuevo SW está instalado y ya hay un SW activo controlando → mostrar banner
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          mostrarBannerActualizacion(reg);
        }
      });
    });

    // Si al cargar la página ya hay un SW esperando → banner
    if (reg.waiting && navigator.serviceWorker.controller) {
      mostrarBannerActualizacion(reg);
    }

    // Comprobar si hay nueva versión SOLO al volver a la app desde background
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) reg.update().catch(() => {});
    });

    // Cuando el nuevo SW toma el control → recargar la página automáticamente
    let _swReloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (_swReloading) return;
      _swReloading = true;
      window.location.reload();
    });
  } catch (e) { console.warn('[SW] Error:', e); }
}

function mostrarBannerActualizacion(reg) {
  if (document.getElementById('swUpdateModal')) return;
  const div = document.createElement('div');
  div.id = 'swUpdateModal';
  div.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px;font-family:var(--font),sans-serif';
  div.innerHTML = `
    <div style="background:#fff;border-radius:14px;max-width:340px;width:100%;padding:22px 20px 18px;box-shadow:0 12px 30px rgba(0,0,0,.3);text-align:center">

async function renderTempoHistorial(el) {
  el.innerHTML = `<div style="padding:16px;text-align:center;color:#9CA3AF">Cargando jornadas...</div>`;

  const desde = new Date();
  desde.setDate(desde.getDate() - 30);

  const { data } = await sb.from('fichajes')
    .select('*')

        const totalPausas = fics.reduce((s, f) => s + (parseFloat(f.horas_pausa) || 0), 0);

function _tempoActualizarInfoAusencia() {
  const tipo = document.getElementById('tempo_aus_tipo')?.value;
  const inicio = document.getElementById('tempo_aus_inicio')?.value;
  const fin = document.getElementById('tempo_aus_fin')?.value;
  const infoEl = document.getElementById('tempo_aus_info');
  if (!infoEl) return;

  if (inicio && fin) {
    const d1 = new Date(inicio), d2 = new Date(fin);
    let dias = 0;
    const current = new Date(d1);
    while (current <= d2) {
      const dow = current.getDay();
      if (dow !== 0 && dow !== 6) dias++; // skip weekends
      current.setDate(current.getDate() + 1);
    }

    const tipoObj = _tempoTiposAusencia.find(t => t.nombre === tipo);
    const consumeVac = tipoObj?.consume_vacaciones || tipo === 'Vacaciones';

    if (consumeVac) {
      const disponibles = (CP?.tempo_dias_vacaciones || 22) - (CP?.tempo_dias_vacaciones_usados || 0);
      infoEl.style.display = 'block';
      infoEl.innerHTML = `\uD83D\uDCC5 ${dias} dia(s) laborable(s)<br>\uD83C\uDFD6\uFE0F Consume vacaciones: ${disponibles} disponibles${dias > disponibles ? '<br><span style="color:#DC2626;font-weight:700">\u26A0\uFE0F No tienes suficientes dias</span>' : ''}`;
    } else {
      infoEl.style.display = 'block';
      infoEl.innerHTML = `\uD83D\uDCC5 ${dias} dia(s) laborable(s)`;
    }
  } else {
    infoEl.style.display = 'none';
  }
}

async function tempoEnviarAusencia() {
  const tipo = document.getElementById('tempo_aus_tipo')?.value;
  const inicio = document.getElementById('tempo_aus_inicio')?.value;
  const fin = document.getElementById('tempo_aus_fin')?.value;
  const motivo = document.getElementById('tempo_aus_motivo')?.value?.trim();

  if (!tipo || !inicio || !fin) { toast('Rellena tipo, fecha inicio y fecha fin', 'error'); return; }
  if (fin < inicio) { toast('La fecha fin no puede ser anterior al inicio', 'error'); return; }

  // Calculate working days
  const d1 = new Date(inicio), d2 = new Date(fin);
  let dias = 0;
  const current = new Date(d1);
  while (current <= d2) {
    const dow = current.getDay();
    if (dow !== 0 && dow !== 6) dias++;
    current.setDate(current.getDate() + 1);
  }

  const { error } = await sb.from('ausencias').insert({
    empresa_id: EMPRESA.id,
    usuario_id: CU.id,
    usuario_nombre: CP?.nombre || '',
    tipo,
    fecha_inicio: inicio,
    fecha_fin: fin,
    dias_totales: dias,
    motivo: motivo || null,
    estado: 'pendiente'
  });

  if (error) { toast('Error: ' + error.message, 'error'); return; }

  toast('\uD83D\uDCE4 Solicitud enviada \u00B7 Pendiente de aprobacion', 'success');
  navigateTo('tempo-ausencias');
}

// ═══════════════════════════════════════════════════════════════
// FORMULARIO DEL PARTE (modo operario en app.html)
// Equivalente a parte_formulario.js del ERP escritorio.
// ═══════════════════════════════════════════════════════════════
let _pfApp = {
  parteId: null, estado: null, partesFormularioId: null,
  plantillaId: null, plantillaVersion: null,
  campos: [], respuestas: {}, plantillasDisponibles: [],
  debTimer: null, readonly: false
};

function _pfAppEsc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function _pfAppKey(c) { return c.codigo || ('id_' + c.id); }

async function pfApp_init(parteId, estadoParte, contexto) {
  contexto = contexto || 'detail';
  _pfApp = {
    parteId: parteId || null, estado: estadoParte || null,
    partesFormularioId: null, plantillaId: null, plantillaVersion: null,
    campos: [], respuestas: {}, plantillasDisponibles: [], debTimer: null,
    contexto: contexto,
    // En el wizard siempre es editable; en detail depende del estado
    readonly: contexto === 'wizard' ? false : ['completado','revisado','facturado','pendiente_firma_cliente'].includes(estadoParte)
  };
  if (typeof EMPRESA === 'undefined' || !EMPRESA?.id) { pfApp_render(); return; }
  try {
    const { data } = await sb.from('form_plantillas')
      .select('id, nombre, categoria, version')
      .eq('empresa_id', EMPRESA.id).eq('activa', true).order('nombre');
    _pfApp.plantillasDisponibles = data || [];
  } catch (e) { console.warn('[pfApp_init] plantillas:', e); }
  if (parteId) {
    try {
      const { data: pf } = await sb.from('partes_formulario')
        .select('*').eq('parte_id', parteId).maybeSingle();
      if (pf) {
        _pfApp.partesFormularioId = pf.id;
        _pfApp.plantillaId = pf.plantilla_id;
        _pfApp.plantillaVersion = pf.plantilla_version;
        _pfApp.respuestas = pf.respuestas || {};
        const { data: campos } = await sb.from('form_plantilla_campos')
          .select('*').eq('plantilla_id', pf.plantilla_id).order('orden');
        _pfApp.campos = campos || [];
      }
    } catch (e) { console.warn('[pfApp_init] formulario:', e); }
  }
  pfApp_render();
}

function pfApp_render() {
  // El wrap depende del contexto: 'wizard' usa #pfApp_wrap_wiz; 'detail' usa #pfApp_wrap
  const wrapId = _pfApp.contexto === 'wizard' ? 'pfApp_wrap_wiz' : 'pfApp_wrap';
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  if (_pfApp.contexto === 'wizard') {
    // En el wizard siempre se renderiza (editable). Si no hay plantilla aún, mostrar selector.
    if (!_pfApp.plantillaId) { wrap.innerHTML = pfApp_renderSelector(); return; }
    wrap.innerHTML = pfApp_renderCampos();
    return;
  }
  // Contexto 'detail': solo si readonly y hay plantilla
  if (!_pfApp.readonly) { wrap.innerHTML = ''; return; }
  if (!_pfApp.plantillaId) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = pfApp_renderCampos();
}

// Validación de obligatorios visibles vacíos. Devuelve {ok, faltantes:[etiquetas]}
function pfApp_validar() {
  if (!_pfApp.plantillaId) return { ok: true, faltantes: [] };
  const valores = _pfApp.respuestas;
  const faltantes = [];
  for (const c of _pfApp.campos) {
    if (!c.obligatorio || c.tipo === 'seccion') continue;
    if (!pfApp_evalMostrarSi(c, valores)) continue;
    const key = _pfAppKey(c);
    const v = valores[key];
    const vacio = (v == null || v === '' || (Array.isArray(v) && v.length === 0));
    if (vacio) faltantes.push(c.etiqueta);
  }
  return { ok: faltantes.length === 0, faltantes };
}

function pfApp_renderSelector() {
  if (!_pfApp.plantillasDisponibles.length) {
    return '<div style="border:1px dashed var(--gris-200);border-radius:8px;padding:10px;background:var(--gris-100);font-size:11.5px;color:var(--gris-500);text-align:center">📋 No hay plantillas activas. Créalas en el ERP escritorio.</div>';
  }
  return '<div style="border:1px dashed var(--gris-200);border-radius:8px;padding:10px;background:var(--gris-100)">'
    + '<label style="font-size:12px;font-weight:700;color:var(--gris-600);display:block;margin-bottom:6px">📋 Formulario asociado</label>'
    + '<div style="display:flex;gap:6px">'
    + '<select id="pfApp_plantilla_sel" style="flex:1;padding:9px 10px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:13px;background:#fff">'
    + '<option value="">— Sin formulario —</option>'
    + _pfApp.plantillasDisponibles.map(p => '<option value="' + p.id + '" data-version="' + p.version + '">' + _pfAppEsc(p.nombre) + (p.categoria ? ' · ' + _pfAppEsc(p.categoria) : '') + ' · v' + p.version + '</option>').join('')
    + '</select>'
    + '<button class="btn btn-primary btn-sm" onclick="pfApp_asignar()" style="white-space:nowrap">+ Asignar</button>'
    + '</div></div>';
}

function pfApp_renderCampos() {
  const valores = _pfApp.respuestas;
  const visibles = _pfApp.campos.filter(c => pfApp_evalMostrarSi(c, valores));
  const plantNombre = _pfApp.plantillasDisponibles.find(p => p.id === _pfApp.plantillaId)?.nombre || 'Formulario';
  const lockHint = _pfApp.readonly ? '<span style="font-size:10px;font-weight:600;color:var(--gris-400);margin-left:6px;background:var(--gris-100);padding:2px 6px;border-radius:4px">🔒 Solo lectura</span>' : '';
  const btnQuit = !_pfApp.readonly ? '<button onclick="pfApp_quitar()" style="background:none;border:none;color:var(--gris-400);font-size:14px;cursor:pointer;padding:2px 4px" title="Quitar formulario">🗑️</button>' : '';
  const camposHTML = visibles.length
    ? visibles.map(c => pfApp_renderCampo(c, valores)).join('')
    : '<p style="text-align:center;color:var(--gris-400);font-size:12px;padding:14px">Selecciona el TIPO DE MANTENIMIENTO para ver las operaciones.</p>';
  return '<div style="border:1.5px solid var(--gris-200);border-radius:10px;background:#fff;overflow:hidden">'
    + '<div style="padding:10px 14px;background:var(--violeta-light);display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--gris-100)">'
    + '<span style="font-size:14px">📋</span>'
    + '<strong style="font-size:13px;flex:1">' + _pfAppEsc(plantNombre) + ' · v' + _pfApp.plantillaVersion + '</strong>'
    + lockHint + btnQuit
    + '</div>'
    + '<div style="padding:12px 14px">' + camposHTML + '</div>'
    + '</div>';
}

function pfApp_renderCampo(c, valores) {
  const key = _pfAppKey(c);
  const val = valores[key] != null ? valores[key] : '';
  const oblig = c.obligatorio ? '<span style="color:var(--rojo);font-weight:700">*</span> ' : '';
  const ro = _pfApp.readonly ? 'disabled' : '';
  if (c.tipo === 'seccion') {
    return '<h4 style="font-size:11.5px;font-weight:800;background:var(--gris-100);color:var(--gris-700);padding:7px 10px;margin:14px -8px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em">' + _pfAppEsc(c.etiqueta) + '</h4>';
  }
  let input = '';
  const inpStyle = 'width:100%;padding:9px 11px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:13.5px;background:#fff;box-sizing:border-box';
  switch (c.tipo) {
    case 'texto':
      input = '<input type="text" value="' + _pfAppEsc(val) + '" oninput="pfApp_onInput(\'' + key + '\', this.value)" ' + ro + ' style="' + inpStyle + '">'; break;
    case 'texto_largo':
      input = '<textarea rows="3" oninput="pfApp_onInput(\'' + key + '\', this.value)" ' + ro + ' autocorrect="on" spellcheck="true" style="' + inpStyle + ';resize:vertical">' + _pfAppEsc(val) + '</textarea>'; break;
    case 'numero':
      input = '<input type="number" value="' + _pfAppEsc(val) + '" oninput="pfApp_onInput(\'' + key + '\', this.value)" ' + ro + ' style="' + inpStyle + '">'; break;
    case 'fecha':
      input = '<input type="date" value="' + _pfAppEsc(val) + '" onchange="pfApp_onInput(\'' + key + '\', this.value)" ' + ro + ' style="' + inpStyle + '">'; break;
    case 'hora':
      input = '<input type="time" value="' + _pfAppEsc(val) + '" onchange="pfApp_onInput(\'' + key + '\', this.value)" ' + ro + ' style="' + inpStyle + '">'; break;
    case 'radio': {
      const ops = (c.config && c.config.opciones) || [];
      input = '<div style="display:flex;flex-wrap:wrap;gap:6px">' + ops.map(op => {
        const sel = (val === op);
        const cur = _pfApp.readonly ? 'cursor:default;' : 'cursor:pointer;';
        return '<label style="display:inline-flex;align-items:center;gap:5px;padding:8px 11px;border:1.5px solid ' + (sel?'var(--azul)':'var(--gris-200)') + ';border-radius:8px;' + cur + 'font-size:12.5px;font-weight:' + (sel?'700':'500') + ';color:' + (sel?'var(--azul)':'var(--gris-700)') + ';background:' + (sel?'var(--azul-light)':'#fff') + ';min-height:38px">'
          + '<input type="radio" name="pfApp_' + key + '" value="' + _pfAppEsc(op) + '" ' + (sel?'checked':'') + ' ' + ro + ' onchange="pfApp_onInput(\'' + key + '\', this.value)" style="margin:0;accent-color:var(--azul)">'
          + _pfAppEsc(op) + '</label>';
      }).join('') + '</div>';
      break;
    }
    case 'dropdown': {
      const ops = (c.config && c.config.opciones) || [];
      input = '<select onchange="pfApp_onInput(\'' + key + '\', this.value)" ' + ro + ' style="' + inpStyle + '"><option value="">—</option>' + ops.map(op => '<option value="' + _pfAppEsc(op) + '" ' + (val===op?'selected':'') + '>' + _pfAppEsc(op) + '</option>').join('') + '</select>';
      break;
    }
    case 'checkbox': {
      const ops = (c.config && c.config.opciones) || [];
      const valArr = Array.isArray(val) ? val : (val ? [val] : []);
      input = '<div style="display:flex;flex-wrap:wrap;gap:6px">' + ops.map(op => {
        const sel = valArr.includes(op);
        const cur = _pfApp.readonly ? 'cursor:default;' : 'cursor:pointer;';
        const opEsc = _pfAppEsc(op).replace(/'/g,'&#39;');
        return '<label style="display:inline-flex;align-items:center;gap:5px;padding:8px 11px;border:1.5px solid ' + (sel?'var(--azul)':'var(--gris-200)') + ';border-radius:8px;' + cur + 'font-size:12.5px;background:' + (sel?'var(--azul-light)':'#fff') + ';min-height:38px">'
          + '<input type="checkbox" value="' + _pfAppEsc(op) + '" ' + (sel?'checked':'') + ' ' + ro + ' onchange="pfApp_onCheckbox(\'' + key + '\', \'' + opEsc + '\', this.checked)" style="margin:0;accent-color:var(--azul)">'
          + _pfAppEsc(op) + '</label>';
      }).join('') + '</div>';
      break;
    }
    case 'foto': {
      const fotos = Array.isArray(val) ? val : [];
      const max = (c.config && c.config.max) || 10;
      const puedeAdir = !_pfApp.readonly && fotos.length < max;
      const fotosHTML = fotos.length ? '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">' + fotos.map((u, i) => {
        const x = !_pfApp.readonly ? '<button onclick="pfApp_quitarFoto(\'' + key + '\', ' + i + ')" style="position:absolute;top:-6px;right:-6px;background:var(--rojo);color:#fff;border:none;width:22px;height:22px;border-radius:50%;font-size:12px;cursor:pointer;line-height:1;padding:0">×</button>' : '';
        return '<div style="position:relative;display:inline-block"><img src="' + _pfAppEsc(u) + '" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--gris-200)">' + x + '</div>';
      }).join('') + '</div>' : '';
      const adir = puedeAdir ? '<input type="file" multiple accept="image/*" capture="environment" onchange="pfApp_onFotos(\'' + key + '\', this.files, ' + max + ')" style="font-size:12px"><div style="font-size:10.5px;color:var(--gris-400);margin-top:3px">' + fotos.length + '/' + max + ' fotos</div>' : (_pfApp.readonly ? '' : '<div style="font-size:11px;color:var(--gris-400)">Máximo ' + max + ' fotos alcanzado</div>');
      input = '<div>' + fotosHTML + adir + '</div>';
      break;
    }
    case 'firma':
      input = '<div style="font-size:11px;color:var(--gris-400);padding:8px;border:1px dashed var(--gris-200);border-radius:6px">✍️ Firma — se rellenará al finalizar el parte o por firma remota</div>'; break;
    default:
      input = '<input type="text" value="' + _pfAppEsc(val) + '" oninput="pfApp_onInput(\'' + key + '\', this.value)" ' + ro + ' style="' + inpStyle + '">';
  }
  return '<div style="margin-bottom:11px">'
    + '<label style="display:block;font-size:11.5px;font-weight:600;color:var(--gris-600);text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px">' + oblig + _pfAppEsc(c.etiqueta) + '</label>'
    + input
    + '</div>';
}

function pfApp_evalMostrarSi(c, valores) {
  if (!c.mostrar_si) return true;
  const cod = c.mostrar_si.codigo;
  const valoresIn = c.mostrar_si.valor_in || [];
  if (!cod) return true;
  return valoresIn.includes(valores[cod]);
}

function pfApp_onInput(key, valor) {
  if (_pfApp.readonly) return;
  _pfApp.respuestas[key] = valor;
  const m = _pfApp.campos.find(c => c.codigo === key);
  if (m) pfApp_render();
  pfApp_scheduleSave();
}

function pfApp_onCheckbox(key, op, marcado) {
  if (_pfApp.readonly) return;
  let arr = _pfApp.respuestas[key];
  if (!Array.isArray(arr)) arr = [];
  if (marcado) { if (!arr.includes(op)) arr.push(op); }
  else { arr = arr.filter(x => x !== op); }
  _pfApp.respuestas[key] = arr;
  pfApp_scheduleSave();
}

async function pfApp_onFotos(key, files, max) {
  if (_pfApp.readonly || !files || !files.length) return;
  const arr = Array.isArray(_pfApp.respuestas[key]) ? _pfApp.respuestas[key].slice() : [];
  for (const file of files) {
    if (arr.length >= max) break;
    try {
      const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const filename = EMPRESA.id + '/form_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9) + '.' + ext;
      const { error } = await sb.storage.from('fotos-partes').upload(filename, file);
      if (!error) {
        const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
        arr.push(data.publicUrl);
      }
    } catch (e) { console.error('[pfApp_onFotos]', e); }
  }
  _pfApp.respuestas[key] = arr;
  pfApp_render();
  pfApp_scheduleSave();
}

function pfApp_quitarFoto(key, idx) {
  if (_pfApp.readonly) return;
  const arr = _pfApp.respuestas[key];
  if (!Array.isArray(arr)) return;
  arr.splice(idx, 1);
  _pfApp.respuestas[key] = arr;
  pfApp_render();
  pfApp_scheduleSave();
}

function pfApp_scheduleSave() {
  clearTimeout(_pfApp.debTimer);
  _pfApp.debTimer = setTimeout(() => pfApp_save().catch(()=>{}), 1500);
}

async function pfApp_save() {
  if (!_pfApp.partesFormularioId || _pfApp.readonly) return;
  try {
    await sb.from('partes_formulario').update({ respuestas: _pfApp.respuestas }).eq('id', _pfApp.partesFormularioId);
  } catch (e) { console.warn('[pfApp_save]', e); }
}

async function pfApp_asignar() {
  const sel = document.getElementById('pfApp_plantilla_sel');
  const plantillaId = parseInt(sel?.value, 10) || null;
  if (!plantillaId) { toast('Selecciona una plantilla', 'error'); return; }
  const plant = _pfApp.plantillasDisponibles.find(p => p.id === plantillaId);
  if (!plant || !_pfApp.parteId) return;
  try {
    const { data, error } = await sb.from('partes_formulario').insert({
      empresa_id: EMPRESA.id, parte_id: _pfApp.parteId,
      plantilla_id: plantillaId, plantilla_version: plant.version, respuestas: {}
    }).select().single();
    if (error) throw error;
    _pfApp.partesFormularioId = data.id;
    _pfApp.plantillaId = plantillaId;
    _pfApp.plantillaVersion = plant.version;
    const { data: campos } = await sb.from('form_plantilla_campos')
      .select('*').eq('plantilla_id', plantillaId).order('orden');
    _pfApp.campos = campos || [];
    _pfApp.respuestas = {};
    pfApp_render();
    toast('Formulario asignado', 'success');
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}

async function pfApp_quitar() {
  if (_pfApp.readonly) return;
  if (!confirm('Quitar el formulario y todas sus respuestas?')) return;
  try {
    if (_pfApp.partesFormularioId) {
      await sb.from('partes_formulario').delete().eq('id', _pfApp.partesFormularioId);
    }
  } catch (e) { console.warn('[pfApp_quitar]', e); }
  _pfApp.partesFormularioId = null;
  _pfApp.plantillaId = null;
  _pfApp.plantillaVersion = null;
  _pfApp.respuestas = {};
  _pfApp.campos = [];
  pfApp_render();
  toast('Formulario quitado', 'success');
}

</script>
</body>
</html>
