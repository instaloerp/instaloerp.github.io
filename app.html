      ${p.completado_at ? ` · ${new Date(p.completado_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}` : ''}
    </div>` : ''}

    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--gris-200)">
    ${p.estado === 'programado' ? `<button class="btn btn-primary" style="background:var(--acento)" onclick="iniciarParteConGPS(${p.id})">🔧 Iniciar trabajo</button>` : ''}
    ${p.estado === 'en_curso' ? `<button class="btn btn-primary" style="background:var(--verde)" onclick="openInformarWizard(${p.id})">📋 Informar parte</button>` : ''}
    ${['completado','revisado','facturado'].includes(p.estado) ? `<div style="text-align:center;padding:12px;color:var(--gris-400);font-size:13px;font-style:italic">🔒 Parte informado — no editable</div>` : ''}
    ${esJefe && p.estado !== 'facturado' ? `
      <select onchange="if(this.value){cambiarEstado(${p.id},this.value)}" style="padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font)">
        <option value="">Cambiar estado manualmente...</option>
        ${Object.keys(PT_ESTADOS).filter(e=>e!==p.estado).map(e=>`<option value="${e}">${PT_ESTADOS[e].ico} ${PT_ESTADOS[e].label}</option>`).join('')}
      </select>
    ` : ''}
    </div>
  `;

  document.getElementById('modalContent').innerHTML = html;
  openModal();
}

// ═══════════════════════════════════════════════════════════════
// WIZARD: COMPLETAR PARTE (paso a paso)
// Pasos: 1) Descripción  2) Fotos  3) Materiales  4) Firma
// ═══════════════════════════════════════════════════════════════

const WIZ_STEPS = [
  { id:'desc',  ico:'📝', label:'Descripción' },
  { id:'fotos', ico:'📷', label:'Fotos' },
  { id:'mat',   ico:'🔧', label:'Materiales' },
  { id:'firma', ico:'✍️', label:'Firma' },
];

function openCompletarWizard(id) {
  // Legacy — redirigir a openInformarWizard
  openInformarWizard(id);
}

function renderWizStep() {
  const p = misPartes.find(x => x.id === _wiz.parteId);
  if (!p) return;
  const step = _wiz.step;
  const isLast = step === WIZ_STEPS.length - 1;

  // Stepper — trackear paso máximo alcanzado
  if (!_wiz.maxStep || _wiz.maxStep < step) _wiz.maxStep = step;
  const stepper = WIZ_STEPS.map((s, i) => {
    const isDone = i < step || (i <= _wiz.maxStep && i !== step);
    const cls = i === step ? 'active' : (isDone ? 'done' : '');
    const clickable = isDone ? `onclick="wizGoToStep(${i})"` : '';
    return `<div class="wiz-step ${cls}" ${clickable}>${isDone ? '✓' : s.ico}<br>${s.label}</div>`;
  }).join('');

  let content = '';

  // ── STEP 1: Descripción ──
  if (step === 0) {
    content = `
      <div class="field">
        <label>🔧 Trabajo realizado *</label>
        <textarea id="wz_desc" rows="4" placeholder="Describe el trabajo que has realizado..." style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${_wiz.desc}</textarea>
      </div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:10px;margin-bottom:8px;font-weight:600;font-size:14px;cursor:pointer">
          <input id="wz_pend_check" type="checkbox" style="width:20px;height:20px;flex-shrink:0" ${_wiz.pendientes_checked ? 'checked' : ''} onchange="wizSaveCurrentStep();_wiz.pendientes_checked=this.checked;document.getElementById('wz_pend_gremios').style.display=this.checked?'block':'none';">
          <span>Quedan trabajos pendientes</span>
        </label>
        <div id="wz_pend_gremios" style="display:${_wiz.pendientes_checked?'block':'none'};margin-top:8px">
          <div style="font-size:12px;color:var(--gris-500);margin-bottom:8px">Selecciona los gremios necesarios y describe el trabajo pendiente:</div>
          ${GREMIOS.map(g => {
            const checked = _wiz.gremios_pendientes && _wiz.gremios_pendientes[g.id];
            const desc = (checked && checked.descripcion) || '';
            return `<div style="margin-bottom:8px;border:1.5px solid ${checked?'var(--azul)':'var(--gris-200)'};border-radius:10px;overflow:hidden;transition:border-color .2s" id="wz_gremio_wrap_${g.id}">
              <label style="display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;background:${checked?'#EFF6FF':'#fff'}" onclick="event.stopPropagation()">
                <input type="checkbox" class="wz_gremio_chk" data-gremio="${g.id}" style="width:18px;height:18px;flex-shrink:0" ${checked?'checked':''} onchange="wizToggleGremio('${g.id}',this.checked)">
                <span style="font-size:18px">${g.ico}</span>
                <span style="font-weight:600;font-size:13px">${g.label}</span>
              </label>
              <div id="wz_gremio_desc_${g.id}" style="display:${checked?'block':'none'};padding:0 12px 10px">
                <textarea rows="2" placeholder="¿Qué queda pendiente de ${g.label.toLowerCase()}?" data-gremio="${g.id}" class="wz_gremio_txt" style="width:100%;padding:8px 10px;border:1px solid var(--gris-200);border-radius:8px;font-size:13px;font-family:var(--font);resize:vertical">${desc}</textarea>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="field">
        <label>📝 Notas internas</label>
        <textarea id="wz_obs" rows="2" placeholder="Notas adicionales..." style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${_wiz.observaciones}</textarea>
        <div style="font-size:11px;color:var(--gris-500);font-style:italic;margin-top:4px">Solo visible para la empresa, el cliente no las ve.</div>
      </div>
    `;
  }

  // ── STEP 2: Fotos ──
  if (step === 1) {
    const allFotos = [..._wiz.fotos, ..._wiz.fotosNuevas];
    content = `
      <div style="margin-bottom:12px">
        <p style="font-size:13px;color:var(--gris-500)">Añade fotos del trabajo realizado. En dispositivos móviles, podrás usar la cámara o la galería.</p>
      </div>
      <div class="foto-grid">
        ${allFotos.map((f, i) => `
          <div class="foto-thumb">
            <img src="${typeof f === 'object' ? f.data : f}" alt="Foto ${i+1}">
            <button class="del" onclick="wizRemoveFoto(${i})">✕</button>
          </div>
        `).join('')}
        <div class="foto-add" onclick="wizAbrirSelectorFoto()" style="background:var(--azul-light);border-color:var(--azul)">
          <span style="font-size:28px;color:var(--azul)">+</span>
          <span style="color:var(--azul);font-weight:700">Añadir foto</span>
        </div>
      </div>
      <p style="font-size:11px;color:var(--gris-400);text-align:center">${allFotos.length} foto${allFotos.length!==1?'s':''}</p>
    `;
  }

  // ── STEP 3: Materiales + Mano de obra ──
  if (step === 2) {
    const manoObra = _wiz.manoObra || [];
    const totalMat = _wiz.materiales.reduce((s,m) => s + (parseFloat(m.total)||0), 0);
    const totalMO = manoObra.reduce((s,mo) => s + (parseFloat(mo.total)||0), 0);
    content = `
      <div style="margin-bottom:12px">
        <p style="font-size:13px;color:var(--gris-500)">Añade materiales del catálogo y registra la mano de obra.</p>
      </div>

      <div style="font-weight:800;font-size:13px;margin-bottom:8px;color:var(--azul)">🔧 Materiales</div>
      <div class="mat-search" style="margin-bottom:12px">
        <input id="wz_mat_buscar" type="text" placeholder="🔍 Buscar artículo o escribir nombre..."
          style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font)"
          oninput="wizSearchMat(this.value)" onfocus="wizSearchMat(this.value)">
        <div id="wz_mat_results" class="mat-search-results"></div>
      </div>
      <div id="wz_mat_list">
        ${_wiz.materiales.length ? _wiz.materiales.map((m, i) => renderWizMatRow(m, i)).join('') : '<div style="text-align:center;padding:12px;color:var(--gris-400);font-size:12px">Sin materiales</div>'}
      </div>
      ${esJefe ? `<div style="margin-top:8px;padding:8px 12px;background:var(--gris-50);border-radius:8px;display:flex;justify-content:space-between">
        <span style="font-weight:700;font-size:12px">Total materiales:</span>
        <span style="font-weight:800;font-size:13px">${totalMat.toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
      </div>` : ''}

      <div style="margin-top:16px;padding-top:12px;border-top:2px solid var(--gris-200)">
        <div style="font-weight:800;font-size:13px;margin-bottom:8px;color:#92400E">🛒 Compras externas</div>
        <p style="font-size:11px;color:var(--gris-500);margin-bottom:8px">Si has comprado material, añade cada albarán con su número y foto.</p>
        <div id="wz_albaranes_list">
          ${(_wiz.albaranes_compra||[]).length ? _wiz.albaranes_compra.map((alb, i) => renderWizAlbaranRow(alb, i)).join('') : '<div style="text-align:center;padding:8px;color:var(--gris-400);font-size:12px">Sin compras externas</div>'}
        </div>
        <button class="btn btn-secondary btn-sm" onclick="wizAddAlbaran()" style="margin-top:8px;width:100%">➕ Añadir albarán de compra</button>
      </div>

      ${esJefe ? `<div style="margin-top:20px;padding-top:16px;border-top:2px solid var(--gris-200)">
        <div style="font-weight:800;font-size:13px;margin-bottom:8px;color:var(--violeta)">👷 Mano de obra</div>
        <div id="wz_mo_list">
          ${manoObra.length ? manoObra.map((mo, i) => renderWizMORow(mo, i)).join('') : '<div style="text-align:center;padding:12px;color:var(--gris-400);font-size:12px">Sin mano de obra registrada</div>'}
        </div>
        <button class="btn btn-secondary btn-sm" onclick="wizAddManoObra()" style="margin-top:8px;width:100%">➕ Añadir mano de obra</button>
        <div style="margin-top:8px;padding:8px 12px;background:var(--violeta-light);border-radius:8px;display:flex;justify-content:space-between">
          <span style="font-weight:700;font-size:12px">Total mano obra:</span>
          <span style="font-weight:800;font-size:13px">${totalMO.toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
        </div>
      </div>

      <div style="margin-top:16px;padding:12px;background:var(--azul-light);border-radius:8px;display:flex;justify-content:space-between">
        <span style="font-weight:800;font-size:14px">TOTAL:</span>
        <span style="font-weight:800;font-size:15px;color:var(--azul)">${(totalMat + totalMO).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
      </div>` : ''}
    `;
  }

  // ── STEP 4: Firma ──
  if (step === 3) {
    const operarioNombre = CP?.nombre || 'Operario';
    content = `
      <div style="margin-bottom:12px">
        <p style="font-size:13px;color:var(--gris-500)">Firmas para cerrar el parte.</p>
      </div>

      <!-- Firma persona responsable en la visita (expandible, cerrado por defecto) -->
      <div style="margin-top:12px;border:2px solid ${_wiz.firmaData_validated ? 'var(--verde)' : 'var(--azul)'};border-radius:12px;overflow:hidden" id="firmaClienteContainer">
        <div onclick="toggleFirmaPanel('cliente')" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:${_wiz.firmaData_validated ? 'var(--verde-light)' : 'var(--azul-light)'};cursor:pointer">
          <span style="font-size:13px;font-weight:700;color:${_wiz.firmaData_validated ? 'var(--verde)' : 'var(--azul)'}">✍️ Persona responsable en la visita <span style="color:var(--rojo)">*</span></span>
          <span id="firmaClienteToggle" style="font-size:18px;transition:transform .3s">${_wiz.firmaData_validated ? '✅' : '▼'}</span>
        </div>
        <div id="firmaClientePanel" style="display:none;padding:12px">
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <div style="flex:1">
              <label style="font-size:11px;font-weight:700;color:var(--gris-500)">NOMBRE COMPLETO <span style="color:var(--rojo)">*</span></label>
              <input id="wz_cli_nombre" type="text" placeholder="Nombre y dos apellidos" value="${_wiz.clienteNombre}"
                autocomplete="off" spellcheck="false"
                style="width:100%;padding:10px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:14px;font-family:var(--font)">
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <div style="flex:1">
              <label style="font-size:11px;font-weight:700;color:var(--gris-500)">DNI / NIF <span style="color:var(--rojo)">*</span></label>
              <input id="wz_cli_dni" type="text" placeholder="12345678A" value="${_wiz.clienteDni||''}"
                autocomplete="off" spellcheck="false" inputmode="text"
                style="width:100%;padding:10px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:14px;font-family:var(--font);text-transform:uppercase"
                maxlength="10" oninput="this.value=this.value.toUpperCase()">
            </div>
          </div>
          <div id="firmaClientePreview" style="border:2px dashed var(--gris-200);border-radius:12px;padding:20px;text-align:center;background:var(--gris-50);min-height:80px;display:flex;align-items:center;justify-content:center">
            ${_wiz.firmaData_validated ? '<img src="'+_wiz.firmaData+'" style="max-width:100%;max-height:120px;border-radius:8px"><div style="color:var(--verde);font-weight:700;font-size:12px;margin-top:6px">✅ Firma validada</div>' : (_wiz.firmaData ? '<img src="'+_wiz.firmaData+'" style="max-width:100%;max-height:120px;border-radius:8px">' : '<span style="color:var(--gris-400)">Sin firma todavía</span>')}
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button onclick="wizIniciarFirmaCliente()" style="flex:1;background:var(--azul);color:white;border:none;cursor:pointer;padding:12px;border-radius:8px;font-weight:700;font-size:15px">✍️ ${_wiz.firmaData_validated ? 'Repetir firma' : 'Firmar'}</button>
          </div>
        </div>
      </div>

      <!-- Firma Operario (expandible, cerrado por defecto) -->
      <div style="margin-top:12px;border:2px solid ${_wiz.firmaOperario_validated ? 'var(--verde)' : 'var(--violeta)'};border-radius:12px;overflow:hidden" id="firmaOperarioContainer">
        <div onclick="toggleFirmaPanel('operario')" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:${_wiz.firmaOperario_validated ? 'var(--verde-light)' : 'var(--violeta-light)'};cursor:pointer">
          <span style="font-size:13px;font-weight:700;color:${_wiz.firmaOperario_validated ? 'var(--verde)' : 'var(--violeta)'}">👷 Firma del operario <span style="color:var(--rojo)">*</span> — ${operarioNombre}</span>
          <span id="firmaOperarioToggle" style="font-size:18px;transition:transform .3s">${_wiz.firmaOperario_validated ? '✅' : '▼'}</span>
        </div>
        <div id="firmaOperarioPanel" style="display:none;padding:12px">
          <div id="firmaOperarioPreview" style="border:2px dashed var(--gris-200);border-radius:12px;padding:20px;text-align:center;background:var(--gris-50);min-height:80px;display:flex;align-items:center;justify-content:center">
            ${_wiz.firmaOperario_validated ? '<img src="'+_wiz.firmaOperario+'" style="max-width:100%;max-height:120px;border-radius:8px"><div style="color:var(--verde);font-weight:700;font-size:12px;margin-top:6px">✅ Firma validada</div>' : (_wiz.firmaOperario ? '<img src="'+_wiz.firmaOperario+'" style="max-width:100%;max-height:120px;border-radius:8px">' : '<span style="color:var(--gris-400)">Sin firma todavía</span>')}
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <button onclick="abrirFirmaFullscreen('operario')" style="flex:1;background:var(--violeta);color:white;border:none;cursor:pointer;padding:12px;border-radius:8px;font-weight:700;font-size:15px">✍️ ${_wiz.firmaOperario_validated ? 'Repetir firma' : 'Firmar'}</button>
          </div>
        </div>
      </div>
    `;
  }

  // Render todo
  const isEditMode = _wiz.mode === 'edit';
  const isInformar = _wiz.mode === 'informar';
  let titleText, finishBtn;
  if (isEditMode) {
    titleText = `✏️ Info del parte ${p.numero}`;
    finishBtn = `<button class="btn btn-primary" onclick="wizFinishEdit()">💾 Guardar todo</button>`;
  } else {
    titleText = `📋 Informar parte ${p.numero}`;
    finishBtn = `<button class="btn btn-primary" style="background:var(--verde)" onclick="wizFinish()">✅ Completar y enviar</button>`;
  }

  // Obtener info del trabajo/cliente para el header del wizard
  let _wzCli = '', _wzTel = '', _wzDir = '', _wzInstr = '';
  if (p.trabajo_id) {
    const _wzTrab = trabajos.find(tr => tr.id === p.trabajo_id);
    if (_wzTrab) {
      const _wzCliObj = _wzTrab.cliente_id ? clientes.find(c => c.id === _wzTrab.cliente_id) : null;
      _wzCli = _wzCliObj?.nombre || _wzTrab.cliente_nombre || '';
      _wzTel = _wzCliObj?.telefono || '';
      _wzDir = p.direccion || _wzTrab.direccion_obra_texto || '';
      _wzInstr = p.instrucciones || _wzTrab.instrucciones || '';
    }
  }
  if (!_wzDir) _wzDir = p.direccion || '';
  if (!_wzInstr) _wzInstr = p.instrucciones || '';

  document.getElementById('modalContent').innerHTML = `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:16px;font-weight:800;margin-bottom:2px">${titleText}</div>
          <div style="font-size:12px;color:var(--gris-400)">${p.trabajo_titulo||''}</div>
        </div>
        <span style="font-family:monospace;font-weight:800;font-size:13px;color:var(--azul)">${p.numero||''}</span>
      </div>
      ${_wzCli ? `<div style="font-size:13px;margin-top:6px">👤 <b>${_wzCli}</b>${_wzTel ? ` · <a href="tel:${_wzTel}" style="color:var(--azul);text-decoration:none">📞 ${_wzTel}</a>` : ''}</div>` : ''}
      ${_wzDir ? `<div style="font-size:12px;margin-top:4px;color:var(--gris-500)">📍 ${_wzDir}</div>` : ''}
      ${_wzInstr ? `<div style="margin-top:6px;padding:8px;background:#EFF6FF;border-left:3px solid var(--azul);border-radius:4px;font-size:12px;line-height:1.4"><b>📋 Instrucciones:</b> ${_wzInstr}</div>` : ''}
    </div>
    <div class="wiz-steps">${stepper}</div>
    ${content}
    <div class="wiz-nav">
      ${step > 0 ? `<button class="btn btn-secondary" onclick="wizPrev()">← Anterior</button>` : `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>`}
      ${isLast
        ? finishBtn
        : `<button class="btn btn-primary" onclick="wizNext()">Siguiente →</button>`}
      ${isEditMode && !isLast ? `<button class="btn btn-primary" onclick="wizFinishEdit()" style="background:var(--gris-600)">💾 Guardar</button>` : ''}
    </div>
  `;
  openModal();

  // Canvas firma se inicializa al abrir cada panel (toggleFirmaPanel)

  // Cerrar búsqueda materiales al hacer click fuera + fix iOS focus
  if (step === 2) {
    setTimeout(() => {
      document.addEventListener('click', _closeMaterialSearch);
      // Fix iOS: scroll al input de búsqueda para que el cursor entre bien
      const matInput = document.getElementById('wz_mat_buscar');
      if (matInput) matInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 150);
  }
}

function _closeMaterialSearch(e) {
  if (!e.target.closest('.mat-search')) {
    const r = document.getElementById('wz_mat_results');
    if (r) r.classList.remove('show');
  }
}

function wizToggleGremio(gremioId, checked) {
  const wrap = document.getElementById('wz_gremio_wrap_' + gremioId);
  const descDiv = document.getElementById('wz_gremio_desc_' + gremioId);
  if (wrap) {
    wrap.style.borderColor = checked ? 'var(--azul)' : 'var(--gris-200)';
    wrap.querySelector('label').style.background = checked ? '#EFF6FF' : '#fff';
  }
  if (descDiv) descDiv.style.display = checked ? 'block' : 'none';
  // Focus en textarea si se activa
  if (checked && descDiv) {
    const ta = descDiv.querySelector('textarea');
    if (ta) setTimeout(() => ta.focus(), 100);
  }
  wizSaveCurrentStep();
}

function _buildPendientesText() {
  if (!_wiz.gremios_pendientes) return '';
  const lines = [];
  GREMIOS.forEach(g => {
    const data = _wiz.gremios_pendientes[g.id];
    if (data) {
      lines.push(`${g.ico} ${g.label}: ${data.descripcion || '(sin descripción)'}`);
    }
  });
  return lines.join('\n');
}

function wizSaveCurrentStep() {
  if (_wiz.step === 0) {
    _wiz.desc = document.getElementById('wz_desc')?.value || '';
    _wiz.pendientes_checked = document.getElementById('wz_pend_check')?.checked || false;
    _wiz.observaciones = document.getElementById('wz_obs')?.value || '';
    // Guardar gremios seleccionados con sus descripciones
    if (!_wiz.gremios_pendientes) _wiz.gremios_pendientes = {};
    document.querySelectorAll('.wz_gremio_chk').forEach(chk => {
      const gid = chk.dataset.gremio;
      if (chk.checked) {
        const txt = document.querySelector(`.wz_gremio_txt[data-gremio="${gid}"]`)?.value || '';
        _wiz.gremios_pendientes[gid] = { descripcion: txt };
      } else {
        delete _wiz.gremios_pendientes[gid];
      }
    });
    // Generar texto plano de pendientes para compatibilidad
    _wiz.pendientes = _buildPendientesText();
  }
  if (_wiz.step === 3) {
    _wiz.clienteNombre = document.getElementById('wz_cli_nombre')?.value || '';
    _wiz.clienteDni = document.getElementById('wz_cli_dni')?.value?.toUpperCase()?.trim() || '';
    // Email se gestiona en el modal de envío post-completado, no aquí
    // Firmas se capturan en cerrarFirmaFullscreen()
  }
}

function _wizAutoSave() {
  try {
    // Guardar estado del wizard en localStorage (sin firmas base64 para no saturar)
    const save = Object.assign({}, _wiz);
    delete save.firmaData;
    delete save.firmaOperario;
    delete save.fotosNuevas; // Las fotos nuevas son blobs, no se pueden serializar
    localStorage.setItem('instalo_wiz_' + _wiz.parteId, JSON.stringify(save));
  } catch(e) { console.warn('Auto-save wizard error:', e); }
}

function _wizClearAutoSave(parteId) {
  try { localStorage.removeItem('instalo_wiz_' + parteId); } catch(e) {}
}

function _wizLoadAutoSave(parteId) {
  try {
    const saved = localStorage.getItem('instalo_wiz_' + parteId);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

function wizNext() {
  wizSaveCurrentStep();
  // Validar paso actual (obligatorio en modo informar, no en edición)
  if (_wiz.step === 0) {
    if (!_wiz.desc.trim()) {
      toast('⚠️ Debes describir el trabajo realizado', 'error'); return;
    }
  }
  document.removeEventListener('click', _closeMaterialSearch);
  _wiz.step++;
  _wizAutoSave();
  renderWizStep();
}

function wizPrev() {
  wizSaveCurrentStep();
  document.removeEventListener('click', _closeMaterialSearch);
  _wiz.step--;
  _wizAutoSave();
  renderWizStep();
}

// Navegar a un paso ya visitado (verde)
function wizGoToStep(targetStep) {
  if (targetStep === _wiz.step) return; // Ya estás ahí
  if (targetStep > _wiz.maxStep) return; // No se puede ir a pasos no visitados
  wizSaveCurrentStep();
  document.removeEventListener('click', _closeMaterialSearch);
  _wiz.step = targetStep;
  _wizAutoSave();
  renderWizStep();
}

// ── FOTOS ──
// Crea un input file NUEVO cada vez para que el móvil siempre muestre el selector
// (cámara / galería / archivos) sin recordar la última elección
function wizAbrirSelectorFoto() {
  const old = document.getElementById('wz_foto_gal');
  if (old) old.remove();
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.id = 'wz_foto_gal';
  inp.accept = 'image/*';
  inp.multiple = true;
  inp.style.display = 'none';
  inp.onchange = function() { wizAddFotos(this.files); };
  document.body.appendChild(inp);
  inp.click();
}

function wizAddFotos(files) {
  Array.from(files).forEach(f => {
    const reader = new FileReader();
    reader.onload = (e) => {
      _wiz.fotosNuevas.push({ data: e.target.result, name: f.name });
      renderWizStep();
    };
    reader.readAsDataURL(f);
  });
}

function wizRemoveFoto(idx) {
  const existentes = _wiz.fotos.length;
  if (idx < existentes) {
    _wiz.fotos.splice(idx, 1);
  } else {
    _wiz.fotosNuevas.splice(idx - existentes, 1);
  }
  renderWizStep();
}

// ── MATERIALES ──
function wizSearchMat(q) {
  const results = document.getElementById('wz_mat_results');
  if (!results) return;
  q = q.trim().toLowerCase();
  if (q.length < 1) { results.classList.remove('show'); return; }

  // Buscar en catálogo
  const matches = articulos.filter(a =>
    (a.nombre||'').toLowerCase().includes(q) || (a.codigo||'').toLowerCase().includes(q)
  ).slice(0, 8);

  let html = matches.map(a => `
    <div class="mat-search-item" onclick="wizAddMatFromCatalog(${a.id})">
      <div style="font-weight:700;font-size:13px">${a.nombre||''}</div>
      <div style="font-size:11px;color:var(--gris-400)">${a.codigo||''} · ${(a.precio_venta||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})} · ${a.unidad||'ud'}</div>
    </div>
  `).join('');

  // Siempre mostrar opción de añadir manualmente (se bloqueará cuando STOCK_ENABLED = true)
  html += `<div class="mat-search-item" style="background:var(--azul-light);font-weight:700;color:var(--azul)" onclick="wizAddMatManual()">
    ➕ Añadir "${q}" manualmente
  </div>`;

  results.innerHTML = html;
  results.classList.add('show');
}

function wizAddMatFromCatalog(artId) {
  const a = articulos.find(x => x.id === artId);
  if (!a) return;
  _wiz.materiales.push({
    articulo_id: a.id,
    nombre: a.nombre,
    codigo: a.codigo,
    cantidad: 1,
    precio: a.precio_venta || 0,
    unidad: a.unidad || 'ud',
    total: a.precio_venta || 0,
  });
  document.getElementById('wz_mat_buscar').value = '';
  document.getElementById('wz_mat_results').classList.remove('show');
  renderWizStep();
}

function wizAddMatManual() {
  // TODO: cuando STOCK_ENABLED = true, bloquear esto y obligar a usar catálogo
  const input = document.getElementById('wz_mat_buscar');
  const nombre = input?.value?.trim() || 'Material';
  _wiz.materiales.push({

function wizAddManoObra() {
  if (!_wiz.manoObra) _wiz.manoObra = [];
  _wiz.manoObra.push({
    descripcion: 'Trabajo realizado',
    minutos: 60,
    precio_hora: esJefe ? 35 : 0,
    total: esJefe ? 35 : 0,
  });
  renderWizStep();
}

function wizUpdateMO(idx, field, val) {
  const mo = (_wiz.manoObra || [])[idx];
  if (!mo) return;
  if (field === 'descripcion') {
    mo.descripcion = val;
  } else if (field === 'km') {
    mo.km = parseFloat(val) || 0;
    mo.total = mo.km * (mo.precio_hora || 0.26);
  } else if (field === 'minutos') {
    mo.minutos = parseFloat(val) || 0;
    const horas = mo.minutos / 60;
    mo.total = horas * (mo.precio_hora || 0);
  } else if (field === 'precio_hora') {
    mo.precio_hora = parseFloat(val) || 0;
    if (mo.es_desplazamiento) {
      mo.total = (mo.km || 0) * mo.precio_hora;
    } else {
      const horas = (mo.minutos || 0) / 60;
      mo.total = horas * mo.precio_hora;
    }
  }
  renderWizStep();
}

function wizRemoveMO(idx) {
  if (_wiz.manoObra) _wiz.manoObra.splice(idx, 1);
  renderWizStep();
}

// ── FIRMA DIGITAL (FULLSCREEN) ──
let _fsCtx = null;
let _fsDrawing = false;
let _fsHasTouched = false;
let _fsTipo = null; // 'cliente' o 'operario'

function toggleFirmaPanel(tipo) {
  const panel = document.getElementById(tipo === 'cliente' ? 'firmaClientePanel' : 'firmaOperarioPanel');
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? 'block' : 'none';
}

// Abrir overlay fullscreen para firmar
function abrirFirmaFullscreen(tipo) {
  _fsTipo = tipo;
  _fsDrawing = false;
  _fsHasTouched = false;

  const overlay = document.createElement('div');
  overlay.className = 'firma-fullscreen';
  overlay.id = 'firmaFullscreenOverlay';

  const titulo = tipo === 'cliente' ? 'Firma de la persona responsable' : 'Firma del operario';
  const color = tipo === 'cliente' ? 'var(--azul)' : 'var(--violeta)';

  overlay.innerHTML = `
    <div class="firma-fs-header" style="background:${color}">
      <h3>${titulo}</h3>
      <button onclick="cerrarFirmaFullscreen(false)" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 14px;border-radius:6px;font-weight:700;font-size:14px">✕ Cancelar</button>
    </div>
    <div class="firma-fs-canvas-wrap">
      <canvas id="firmaFSCanvas"></canvas>
      <div class="firma-fs-placeholder" id="firmaFSPlaceholder">Firme aquí con el dedo</div>
    </div>
    <div class="firma-fs-actions">
      <button onclick="limpiarFirmaFS()" style="flex:1;padding:14px;border-radius:8px;border:2px solid var(--gris-300);background:#fff;font-weight:700;font-size:15px;cursor:pointer">🗑️ Borrar</button>
      <button onclick="cerrarFirmaFullscreen(true)" style="flex:2;padding:14px;border-radius:8px;border:none;background:var(--verde);color:#fff;font-weight:700;font-size:15px;cursor:pointer">✅ Validar firma</button>
    </div>
  `;

  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';

  // Inicializar canvas al tamaño real del contenedor
  setTimeout(() => {
    const canvas = document.getElementById('firmaFSCanvas');
    const wrap = canvas.parentElement;
    canvas.width = wrap.offsetWidth * 2;  // Retina
    canvas.height = wrap.offsetHeight * 2;
    canvas.style.width = wrap.offsetWidth + 'px';
    canvas.style.height = wrap.offsetHeight + 'px';
    _fsCtx = canvas.getContext('2d');
    _fsCtx.scale(2, 2); // Retina scaling
    _fsCtx.strokeStyle = '#1E293B';
    _fsCtx.lineWidth = 2.5;
    _fsCtx.lineCap = 'round';
    _fsCtx.lineJoin = 'round';

    // Si ya tiene firma previa, dibujarla
    const prevData = tipo === 'cliente' ? _wiz.firmaData : _wiz.firmaOperario;
    if (prevData) {
      const img = new Image();
      img.onload = () => {
        _fsCtx.drawImage(img, 0, 0, wrap.offsetWidth, wrap.offsetHeight);
        _fsHasTouched = true;
        document.getElementById('firmaFSPlaceholder').style.display = 'none';
      };
      img.src = prevData;
    }

    canvas.addEventListener('touchstart', _fsStart, { passive: false });
    canvas.addEventListener('touchmove', _fsMove, { passive: false });
    canvas.addEventListener('touchend', _fsEnd);
    canvas.addEventListener('mousedown', _fsStart);
    canvas.addEventListener('mousemove', _fsMove);
    canvas.addEventListener('mouseup', _fsEnd);
    canvas.addEventListener('mouseleave', _fsEnd);
  }, 50);
}

function _fsPos(e) {
  const canvas = document.getElementById('firmaFSCanvas');
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top
  };
}

function _fsStart(e) {
  e.preventDefault();
  _fsDrawing = true;
  _fsHasTouched = true;
  const ph = document.getElementById('firmaFSPlaceholder');
  if (ph) ph.style.display = 'none';
  const pos = _fsPos(e);
  _fsCtx.beginPath();
  _fsCtx.moveTo(pos.x, pos.y);
}

function _fsMove(e) {
  if (!_fsDrawing) return;
  e.preventDefault();
  const pos = _fsPos(e);
  _fsCtx.lineTo(pos.x, pos.y);
  _fsCtx.stroke();
}

function _fsEnd() { _fsDrawing = false; }

function limpiarFirmaFS() {
  const canvas = document.getElementById('firmaFSCanvas');
  const wrap = canvas.parentElement;
  _fsCtx.clearRect(0, 0, wrap.offsetWidth, wrap.offsetHeight);
  _fsHasTouched = false;
  document.getElementById('firmaFSPlaceholder').style.display = 'flex';
}

// Validar nombre + DNI antes de abrir firma del cliente
function wizIniciarFirmaCliente() {
  const nombre = (document.getElementById('wz_cli_nombre')?.value || '').trim();
  const palabras = nombre.split(/\s+/).filter(w => w.length > 0);
  if (palabras.length < 3) {
    toast('⚠️ El nombre debe tener al menos 3 palabras (nombre + 2 apellidos)', 'error');
    document.getElementById('wz_cli_nombre')?.focus();
    return;
  }
  _wiz.clienteNombre = nombre;

  const dni = (document.getElementById('wz_cli_dni')?.value || '').toUpperCase().trim();
  if (!_validarDNI(dni)) {
    toast('⚠️ Documento no válido. Acepta: DNI, NIE, CIF', 'error');
    document.getElementById('wz_cli_dni')?.focus();
    return;
  }
  _wiz.clienteDni = dni;

  // Todo OK → abrir firma fullscreen
  abrirFirmaFullscreen('cliente');
}

function cerrarFirmaFullscreen(guardar) {
  if (guardar) {
    if (!_fsHasTouched) {
      toast('Debes firmar primero', 'error');
      return;
    }
    const canvas = document.getElementById('firmaFSCanvas');
    const dataUrl = canvas.toDataURL('image/png');
    if (_fsTipo === 'cliente') {
      _wiz.firmaData = dataUrl;
      _wiz.firmaData_validated = true;
      toast('✅ Firma validada', 'success');
    } else {
      _wiz.firmaOperario = dataUrl;
      _wiz.firmaOperario_validated = true;
      toast('✅ Firma del operario validada', 'success');
    }
  }

  const overlay = document.getElementById('firmaFullscreenOverlay');
  if (overlay) overlay.remove();
  document.body.style.overflow = '';

function _validarDNI(dni) {
  if (!dni) return false;
  dni = dni.toUpperCase().trim().replace(/[\s\-\.]/g, '');
  const letras = 'TRWAGMYFPDXBNJZSQVHLCKE';

  // ── DNI: 8 dígitos + letra (con verificación de letra) ──
  let match = dni.match(/^(\d{8})([A-Z])$/);
  if (match) {
    return letras[parseInt(match[1]) % 23] === match[2];
  }

  // ── NIE: X/Y/Z + 7 dígitos + letra (con verificación de letra) ──
  match = dni.match(/^([XYZ])(\d{7})([A-Z])$/);
  if (match) {
    const prefix = { X: '0', Y: '1', Z: '2' }[match[1]];
    return letras[parseInt(prefix + match[2]) % 23] === match[3];
  }

  // ── NIF especial: K/L/M + 7 dígitos + letra ──
  // K = menores 14 años, L = españoles en extranjero, M = extranjeros sin NIE
  match = dni.match(/^([KLM])(\d{7})([A-Z])$/);
  if (match) {
    return letras[parseInt(match[2]) % 23] === match[3];
  }

  // ── CIF: letra + 7 dígitos + dígito/letra de control (verificación completa) ──
  // A=SA, B=SL, C=Colectiva, D=Comanditaria, E=Comunidad de bienes,
  // F=Cooperativa, G=Asociación, H=Comunidad propietarios, J=Sociedad civil,
  // N=Entidad extranjera, P=Corporación local, Q=Organismo público,
  // R=Congregación religiosa, S=Admón Estado, U=UTE, V=Otros, W=Establec. permanente
  match = dni.match(/^([ABCDEFGHJNPQRSUVW])(\d{7})([0-9A-J])$/);
  if (match) {
    const tipo = match[1];
    const nums = match[2];
    const control = match[3];

    // Algoritmo de control CIF
    let sumPar = 0, sumImpar = 0;
    for (let i = 0; i < 7; i++) {
      const d = parseInt(nums[i]);
      if (i % 2 === 0) {
        // Posiciones impares (1ª,3ª,5ª,7ª): multiplicar por 2, sumar dígitos
        const doble = d * 2;
        sumImpar += Math.floor(doble / 10) + (doble % 10);
      } else {
        // Posiciones pares (2ª,4ª,6ª): sumar directamente
        sumPar += d;
      }
    }
    const total = sumPar + sumImpar;
    const digitoControl = (10 - (total % 10)) % 10;
    const letraControl = 'JABCDEFGHI'[digitoControl];

    // Según tipo de entidad: control es dígito, letra, o ambos
    const soloDigito = 'ABEH';    // Siempre dígito de control
    const soloLetra = 'KPQS';     // Siempre letra de control
    // El resto (C,D,F,G,J,N,R,U,V,W): aceptan dígito o letra

    if (soloDigito.includes(tipo)) {
      return control === String(digitoControl);
    } else if (soloLetra.includes(tipo)) {
      return control === letraControl;
    } else {
      return control === String(digitoControl) || control === letraControl;
    }
  }

  return false;
}

// ── CALCULAR KM POR CARRETERA ──
function _loadGoogleMaps() {
  return new Promise((resolve, reject) => {
    if (_gmapsLoaded && window.google && window.google.maps) return resolve();
    if (!GMAPS_API_KEY) return reject(new Error('No API key'));
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${GMAPS_API_KEY}&libraries=geometry`;
    s.onload = () => { _gmapsLoaded = true; resolve(); };
    s.onerror = () => reject(new Error('Error cargando Google Maps'));
    document.head.appendChild(s);
  });
}

async function calcularKmCarretera(destLat, destLng) {
  // 1) Intentar con Google Maps Directions
  if (GMAPS_API_KEY) {
    try {
      await _loadGoogleMaps();
      const svc = new google.maps.DirectionsService();
      const result = await new Promise((resolve, reject) => {
        svc.route({
          origin: new google.maps.LatLng(OFICINA_LAT, OFICINA_LNG),
          destination: new google.maps.LatLng(destLat, destLng),
          travelMode: google.maps.TravelMode.DRIVING,
        }, (res, status) => {
          if (status === 'OK') resolve(res);
          else reject(new Error('Directions: ' + status));
        });
      });
      const distMetros = result.routes[0].legs[0].distance.value;
      return Math.round((distMetros / 1000) * 2); // km ida y vuelta
    } catch(e) { console.warn('[calcKm] Google Maps falló:', e.message); }
  }

  // 2) Fallback: OSRM (gratuito, sin API key)
  try {
    const resp = await fetch(`https://router.project-osrm.org/route/v1/driving/${OFICINA_LNG},${OFICINA_LAT};${destLng},${destLat}?overview=false`);
    const data = await resp.json();
    if (data.routes && data.routes[0]) {
      return Math.round((data.routes[0].distance / 1000) * 2); // km ida y vuelta
    }
  } catch(e) { console.warn('[calcKm] OSRM falló:', e.message); }

  // 3) Último recurso: haversine x1.35 factor carretera
  const R = 6371;
  const dLat = (destLat - OFICINA_LAT) * Math.PI / 180;
  const dLon = (destLng - OFICINA_LNG) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(OFICINA_LAT*Math.PI/180)*Math.cos(destLat*Math.PI/180)*Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c * 1.35 * 2);
}

// ── VALIDAR DNI/NIF/NIE/CIF ──
function validarDNI(valor) {
  if (!valor) return { valid: false, msg: 'El DNI es obligatorio' };
  valor = valor.toUpperCase().replace(/[\s\-\.]/g, '');

  // NIF: 8 dígitos + letra
  const nifRegex = /^(\d{8})([A-Z])$/;
  if (nifRegex.test(valor)) {
    const [, num, letra] = valor.match(nifRegex);
    const letras = 'TRWAGMYFPDXBNJZSQVHLCKE';
    if (letra === letras[parseInt(num) % 23]) return { valid: true, valor };
    return { valid: false, msg: 'DNI no válido' };
  }

  // NIE: X/Y/Z + 7 dígitos + letra
  const nieRegex = /^([XYZ])(\d{7})([A-Z])$/;
  if (nieRegex.test(valor)) {
    const [, prefix, num, letra] = valor.match(nieRegex);
    const prefixNum = { X: '0', Y: '1', Z: '2' }[prefix];
    const letras = 'TRWAGMYFPDXBNJZSQVHLCKE';
    if (letra === letras[parseInt(prefixNum + num) % 23]) return { valid: true, valor };
    return { valid: false, msg: 'NIE no válido' };
  }

  // CIF: Letra + 7 dígitos + dígito/letra
  const cifRegex = /^[ABCDEFGHJKLMNPQRSUVW]\d{7}[\dA-J]$/;
  if (cifRegex.test(valor)) return { valid: true, valor };

  return { valid: false, msg: 'DNI no válido' };
}

// ── FINALIZAR WIZARD ──
async function wizFinish() {
  try {
    wizSaveCurrentStep();

    // Validar descripción obligatoria
    if (!_wiz.desc.trim()) {
      toast('⚠️ Describe el trabajo realizado', 'error'); return;
    }

    // Validar nombre obligatorio (2+ palabras)
    const nombreWords = (_wiz.clienteNombre || '').trim().split(/\s+/).filter(w => w.length > 0);
    if (nombreWords.length < 2) {
      toast('⚠️ Introduce el nombre completo del cliente (mínimo 2 palabras)', 'error'); return;
    }

    // Validar DNI obligatorio
    if (!_wiz.clienteDni) {
      toast('⚠️ Introduce el DNI del cliente', 'error'); return;
    }
    const dniCheck = validarDNI(_wiz.clienteDni);
    if (!dniCheck.valid) {
      toast('⚠️ DNI no válido: ' + dniCheck.msg, 'error'); return;
    }

    // Validar firma cliente validada
    if (!_wiz.firmaData_validated) {
      toast('⚠️ El cliente debe firmar y validar su firma', 'error'); return;
    }
    // Validar firma operario validada
    if (!_wiz.firmaOperario_validated) {
      toast('⚠️ El operario debe firmar y validar su firma', 'error'); return;
    }

    toast('📍 Obteniendo ubicación final...', '');

    const id = _wiz.parteId;
    const eid = EMPRESA?.id || 'default';
    const _isOffline = !navigator.onLine;

    // 0. Capturar ubicación final (GPS)
    // ONLINE: obligatorio | OFFLINE: opcional (usa caché de hasta 5 min)
    let ubicacionFin = null;
    try {
      if (navigator.geolocation) {
        ubicacionFin = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(
            (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
            (err) => reject(err),
            { enableHighAccuracy: true, timeout: 15000, maximumAge: _isOffline ? 300000 : 0 }
          );
        });
      }
    } catch(e) {
      console.warn('GPS final error:', e.message);
      if (!_isOffline) {
        toast('⚠️ Debes permitir el acceso a la ubicación para completar el parte. Activa el GPS e inténtalo de nuevo.', 'error');
        return;
      }
      toast('⚠️ Sin GPS. Se guardará sin ubicación final.', 'warning');
    }

    toast('Enviando informe...', '');

    // 0b. Recalcular minutos trabajados (inicio_at → ahora) y km por carretera
    const parteActual = misPartes.find(x => x.id === id);
    if (parteActual && _wiz.manoObra) {
      // Recalcular minutos
      if (parteActual.inicio_at) {
        const moTrabajo = _wiz.manoObra.find(mo => !mo.es_desplazamiento);
        if (moTrabajo) {
          const diffMs = new Date() - new Date(parteActual.inicio_at);
          moTrabajo.minutos = Math.max(1, Math.round(diffMs / (1000 * 60)));
          moTrabajo.total = (moTrabajo.minutos / 60) * (moTrabajo.precio_hora || 35);
        }
      }
      // Recalcular km por carretera
      const ubi = parteActual.ubicacion_inicio || parteActual.ubicacion;
      if (ubi && ubi.lat && ubi.lng) {
        try {
          const kmReal = await calcularKmCarretera(ubi.lat, ubi.lng);
          const despMO = _wiz.manoObra.find(mo => mo.es_desplazamiento);
          if (despMO) {
            despMO.km = kmReal;
            despMO.total = kmReal * (despMO.precio_hora || 0.26);
          }
        } catch(e) { console.warn('[wizFinish] Error calculando km:', e); }
      }
    }

    // 1. Subir fotos nuevas a Supabase Storage
    let fotosUrls = [..._wiz.fotos]; // URLs existentes
    for (const foto of (_wiz.fotosNuevas || [])) {
      try {
        const blob = await (await fetch(foto.data)).blob();
        const filename = `${eid}/${Date.now()}_${Math.random().toString(36).substr(2,9)}.jpg`;
        const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
        if (!error) {
          const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
          fotosUrls.push(data.publicUrl);
        } else { console.warn('Upload foto error:', error.message); }
      } catch(e) { console.error('Error subiendo foto:', e); }
    }

    // 1b. Subir fotos de albaranes de compra
    const albaranesCompra = _wiz.albaranes_compra || [];
    for (const alb of albaranesCompra) {
      if (alb.foto && alb.foto.startsWith('data:')) {
        try {
          const blob = await (await fetch(alb.foto)).blob();
          const filename = `${eid}/${Date.now()}_alb_${Math.random().toString(36).substr(2,6)}.jpg`;
          const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
          if (!error) {
            const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
            alb.foto = data.publicUrl;
          } else { console.warn('Upload foto albarán error:', error.message); }
        } catch(e) { console.error('Error subiendo foto albarán:', e); }
      }
    }

    // 2. Subir firma cliente
    let firmaUrl = null;
    if (_wiz.firmaData && _wiz.firmaData.startsWith('data:')) {
      try {
        const blob = await (await fetch(_wiz.firmaData)).blob();
        const filename = `${eid}/${Date.now()}_firma_cliente.png`;
        const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
        if (!error) {
          const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
          firmaUrl = data.publicUrl;
        } else { console.warn('Upload firma cliente error:', error.message); }
      } catch(e) { console.error('Error subiendo firma cliente:', e); }
    } else if (_wiz.firmaData) {
      firmaUrl = _wiz.firmaData;
    }

    // 2b. Subir firma operario
    let firmaOpUrl = null;
    if (_wiz.firmaOperario && _wiz.firmaOperario.startsWith('data:')) {
      try {
        const blob = await (await fetch(_wiz.firmaOperario)).blob();
        const filename = `${eid}/${Date.now()}_firma_operario.png`;
        const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
        if (!error) {
          const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
          firmaOpUrl = data.publicUrl;
        } else { console.warn('Upload firma operario error:', error.message); }
      } catch(e) { console.error('Error subiendo firma operario:', e); }
    } else if (_wiz.firmaOperario) {
      firmaOpUrl = _wiz.firmaOperario;
    }

    // 3. Guardar todo en el parte — estado completado (bloqueado)
    const updateObj = {
      estado: 'completado',
      completado_at: new Date().toISOString(),
      descripcion: _wiz.desc || null,
      trabajos_pendientes: _wiz.pendientes || null,
      gremios_pendientes: (_wiz.gremios_pendientes && Object.keys(_wiz.gremios_pendientes).length > 0) ? _wiz.gremios_pendientes : null,
      observaciones: _wiz.observaciones || null,
      fotos: fotosUrls.length > 0 ? fotosUrls : null,
      materiales: _wiz.materiales.length > 0 ? _wiz.materiales : null,
      albaranes_compra: albaranesCompra.length > 0 ? albaranesCompra : null,
      mano_obra: (_wiz.manoObra && _wiz.manoObra.length > 0) ? _wiz.manoObra : null,
      firma_url: firmaUrl && !firmaUrl.startsWith('data:') ? firmaUrl : null,
      firma_operario_url: firmaOpUrl && !firmaOpUrl.startsWith('data:') ? firmaOpUrl : null,
      operario_nombre_firma: CP?.nombre || null,
      cliente_nombre_firma: _wiz.clienteNombre || null,
      cliente_email: _wiz.clienteEmail || null,
      cliente_dni: _wiz.clienteDni || null,
      // cliente_sin_email removed — column does not exist in DB
      // ubicacion_firma_cliente/operario — columnas no existen aún en DB
    };
    if (ubicacionFin) updateObj.ubicacion_fin = ubicacionFin;

    console.log('[wizFinish] Saving:', JSON.stringify(Object.keys(updateObj)));

    // Si estamos offline → guardar localmente y encolar
    if (!navigator.onLine) {
      const p = misPartes.find(x => x.id === id);
      if (p) Object.assign(p, updateObj);
      await cacheDataOffline();
      // Guardar el updateObj completo en la cola de sync (incluye firmas base64)
      await syncQueueAdd({ table:'partes_trabajo', action:'update_with_files', data: updateObj, match:{ id }, fotosNuevas: _wiz.fotosNuevas || [], timestamp: Date.now() });
      _wizClearAutoSave(id);
      document.removeEventListener('click', _closeMaterialSearch);
      toast('✅ Parte guardado localmente. Se enviará automáticamente al recuperar conexión.', 'success');
      closeModal();
      navigateTo(currentTab);
      return;
    }

    const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
    if (error) {
      // Si falla (posible pérdida de red durante envío) → guardar offline
      console.error('[wizFinish] Error Supabase:', error);
      const p = misPartes.find(x => x.id === id);
      if (p) Object.assign(p, updateObj);
      await cacheDataOffline();
      await syncQueueAdd({ table:'partes_trabajo', action:'update_with_files', data: updateObj, match:{ id }, fotosNuevas: _wiz.fotosNuevas || [], timestamp: Date.now() });
      _wizClearAutoSave(id);
      document.removeEventListener('click', _closeMaterialSearch);
      toast('✅ Parte guardado localmente (error de red). Se sincronizará al volver la conexión.', 'warning');
      closeModal();
      navigateTo(currentTab);
      return;
    }

    // Actualizar local
    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);

    _wizClearAutoSave(id);
    document.removeEventListener('click', _closeMaterialSearch);

    // 4. Mostrar modal de éxito con opciones de envío (email, WhatsApp, SMS)
    const parteNum = p?.numero || id;
    let cliTel = p?.cliente_telefono || '';
    let cliEmail = _wiz.clienteEmail || p?.cliente_email || '';
    if (p?.trabajo_id) {
      const _t = trabajos.find(tr => tr.id === p.trabajo_id);
      if (_t) {
        const _c = _t.cliente_id ? clientes.find(c => c.id === _t.cliente_id) : null;
        if (_c) {
          if (!cliTel) cliTel = _c.telefono || '';
          if (!cliEmail) cliEmail = _c.email || '';
        }
      }
    }
    mostrarModalEnvio(id, parteNum, cliTel, cliEmail);
  } catch(err) {
    console.error('[wizFinish] Error:', err);
    // Último recurso: guardar offline si hay cualquier error
    try {
      const p = misPartes.find(x => x.id === _wiz.parteId);
      if (p) {
        p.estado = 'completado';
        p.completado_at = new Date().toISOString();
        await cacheDataOffline();
        await syncQueueAdd({ table:'partes_trabajo', action:'update', data:{ estado:'completado', completado_at: p.completado_at }, match:{ id: _wiz.parteId }, timestamp: Date.now() });
      }
    } catch(e2) { console.error('Error guardando offline:', e2); }
    toast('⚠️ Error: ' + (err.message || 'Sin conexión') + '. Datos guardados localmente.', 'warning');
    closeModal();
    navigateTo(currentTab);
  }
}

function _limpiarTelEnvio() {
  let tel = (document.getElementById('envioTelInput')?.value || '').replace(/[\s\-\.\(\)]/g, '');
  if (/^[679]\d{8}$/.test(tel)) tel = '34' + tel;
  if (tel.startsWith('0034')) tel = tel.substring(2);
  return tel;
}

function _getMensajeEnvio(parteNum, empresa, enlace) {
  return `Estimado/a cliente, desde ${empresa} le informamos que se ha completado el parte de trabajo nº ${parteNum}. Puede consultar los detalles en el siguiente enlace:\n\n${enlace}\n\nGracias por confiar en nosotros.`;
}

function envioWhatsApp(parteId, parteNum, empresa, enlace) {
  const tel = _limpiarTelEnvio();
  if (!tel || tel.length < 9) {
    toast('⚠️ Introduce un teléfono válido', 'error');
    document.getElementById('envioTelInput')?.focus();
    return;
  }
  const telWA = tel.startsWith('+') ? tel.substring(1) : tel;
  const msg = encodeURIComponent(_getMensajeEnvio(parteNum, empresa, enlace));
  window.open(`https://wa.me/${telWA}?text=${msg}`, '_blank');
  _marcarEnvioRealizado();
}

function envioSMS(parteId, parteNum, empresa, enlace) {
  const tel = _limpiarTelEnvio();
  if (!tel || tel.length < 9) {
    toast('⚠️ Introduce un teléfono válido', 'error');
    document.getElementById('envioTelInput')?.focus();
    return;
  }
  const msg = encodeURIComponent(_getMensajeEnvio(parteNum, empresa, enlace));
  window.location.href = `sms:${tel}?body=${msg}`;
  _marcarEnvioRealizado();
}

function _marcarEnvioRealizado() {
  _envioRealizado = true;
  const btn = document.getElementById('btnCerrarEnvio');
  if (btn) {
    btn.disabled = false;
    btn.textContent = 'Cerrar';
    btn.style.background = 'var(--gris-600)';
    btn.style.color = '#fff';
  }
}

function copiarEnlaceParte() {
  const input = document.getElementById('enlaceParteInput');
  if (input) {
    navigator.clipboard.writeText(input.value).then(() => {
      toast('📋 Enlace copiado al portapapeles', 'success');
    }).catch(() => {
      input.select();
      document.execCommand('copy');
      toast('📋 Enlace copiado', 'success');
    });
  }
}

function enviarEmailDesdModal(parteId) {
  const email = document.getElementById('envioEmailInput')?.value?.trim();
  if (!email || !email.includes('@') || !email.includes('.')) {
    toast('⚠️ Introduce un email válido', 'error');
    document.getElementById('envioEmailInput')?.focus();

  // Guardar email en el parte
  sb.from('partes_trabajo').update({ cliente_email: email }).eq('id', parteId).then(() => {
    const p = misPartes.find(x => x.id === parteId);
    if (p) p.cliente_email = email;

function cerrarModalEnvio() {
  if (!_envioRealizado) {

    return;
  }
  closeModal();

// Guardar wizard en modo edición (sin cambiar estado)
async function wizFinishEdit() {
  try {
    wizSaveCurrentStep();
    toast('Guardando...', '');
    const id = _wiz.parteId;
    const eid = EMPRESA?.id || 'default';

    // 1. Subir fotos nuevas a Supabase Storage
    let fotosUrls = _wiz.fotos ? [..._wiz.fotos] : [];
    for (const foto of (_wiz.fotosNuevas || [])) {
      try {
        const blob = await (await fetch(foto.data)).blob();
        const filename = `${eid}/${Date.now()}_${Math.random().toString(36).substr(2,9)}.jpg`;
        const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
        if (!error) {
          const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
          fotosUrls.push(data.publicUrl);
        } else {
          console.warn('Storage upload foto error:', error.message);
        }
      } catch(e) { console.error('Error subiendo foto:', e); }
    }

    // 1b. Subir fotos de albaranes de compra
    const albaranesCompra = _wiz.albaranes_compra || [];
    for (const alb of albaranesCompra) {
      if (alb.foto && alb.foto.startsWith('data:')) {
        try {
          const blob = await (await fetch(alb.foto)).blob();
          const filename = `${eid}/${Date.now()}_alb_${Math.random().toString(36).substr(2,6)}.jpg`;
          const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
          if (!error) {
            const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
            alb.foto = data.publicUrl;
          } else { console.warn('Upload foto albarán error:', error.message); }
        } catch(e) { console.error('Error subiendo foto albarán:', e); }
      }
    }

    // 2. Subir firma si hay nueva (data: URL → storage)
    let firmaUrl = null;
    if (_wiz.firmaData && !_wiz.firmaData.startsWith('data:')) {
      // Ya es una URL de storage, mantenerla
      firmaUrl = _wiz.firmaData;
    } else if (_wiz.firmaData && _wiz.firmaData.startsWith('data:')) {
      try {
        const blob = await (await fetch(_wiz.firmaData)).blob();
        const filename = `${eid}/${Date.now()}_firma.png`;
        const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
        if (!error) {
          const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
          firmaUrl = data.publicUrl;
        } else {
          console.warn('Storage upload firma error:', error.message);
        }
      } catch(e) { console.error('Error subiendo firma:', e); }
    }

    // 3. Guardar sin cambiar estado
    const updateObj = {
      descripcion: _wiz.desc || null,
      trabajos_pendientes: _wiz.pendientes || null,
      gremios_pendientes: (_wiz.gremios_pendientes && Object.keys(_wiz.gremios_pendientes).length > 0) ? _wiz.gremios_pendientes : null,
      observaciones: _wiz.observaciones || null,
    };
    // Solo incluir fotos/materiales/mano_obra si hay datos
    if (fotosUrls.length > 0) updateObj.fotos = fotosUrls;
    if (_wiz.materiales && _wiz.materiales.length > 0) updateObj.materiales = _wiz.materiales;
    if (albaranesCompra.length > 0) updateObj.albaranes_compra = albaranesCompra;
    else updateObj.albaranes_compra = null;
    if (_wiz.manoObra && _wiz.manoObra.length > 0) updateObj.mano_obra = _wiz.manoObra;
    // Solo incluir firma si es URL válida (no data:)
    if (firmaUrl && !firmaUrl.startsWith('data:')) updateObj.firma_url = firmaUrl;
    if (_wiz.clienteNombre) updateObj.cliente_nombre_firma = _wiz.clienteNombre;
    if (_wiz.clienteEmail) updateObj.cliente_email = _wiz.clienteEmail;

    console.log('[wizFinishEdit] Saving:', JSON.stringify(Object.keys(updateObj)));
    const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
    if (error) {
      toast('Error al guardar: ' + (error.message || 'Sin conexión'), 'error');
      return;
    }

    // Actualizar local
    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);

    toast('Información guardada', 'success');
    closeModal();
    document.removeEventListener('click', _closeMaterialSearch);
    navigateTo(currentTab);
  } catch(err) {
    console.error('[wizFinishEdit] Error:', err);
    toast('Error: ' + (err.message || 'desconocido'), 'error');
  }
}

// ── INICIAR PARTE CON GPS ──
async function iniciarParteConGPS(id) {
  // Verificar que no hay otro parte en curso del mismo operario
  const enCurso = misPartes.find(p => p.estado === 'en_curso' && p.id !== id);
  if (enCurso) {
    toast(`⚠️ Ya tienes un parte en curso (${enCurso.numero || 'sin número'}). Debes completarlo antes de iniciar otro.`, 'error');
    return;
  }

  // Mostrar confirmación con aviso de GPS
  const confirmed = confirm('📍 Se registrará tu ubicación GPS.\n\n¿Iniciar el trabajo?');
  if (!confirmed) return;

  toast('📍 Obteniendo ubicación...', '');

  const isOffline = !navigator.onLine;

  // Intentar obtener GPS
  let ubicacion = null;
  try {
    ubicacion = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('GPS no disponible')); return; }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }),
        (err) => reject(err),
        { enableHighAccuracy: true, timeout: 15000, maximumAge: isOffline ? 300000 : 0 }
      );
    });
  } catch(e) {
    console.warn('GPS error:', e.message);
    // ONLINE: GPS obligatorio → bloquear
    if (!isOffline) {
      toast('⚠️ Debes permitir el acceso a la ubicación para iniciar el parte. Activa el GPS e inténtalo de nuevo.', 'error');
      return;
    }
    // OFFLINE: GPS opcional → continuar sin él
    toast('⚠️ Sin GPS. Se guardará sin ubicación.', 'warning');
  }

  const updateObj = {
    estado: 'en_curso',
    inicio_at: new Date().toISOString(),
  };
  if (ubicacion) updateObj.ubicacion_inicio = ubicacion;

  // Si estamos offline → guardar localmente y encolar
  if (isOffline) {
    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);
    await cacheDataOffline();
    await syncQueueAdd({ table:'partes_trabajo', action:'update', data: updateObj, match:{ id }, timestamp: Date.now() });
    toast('🔧 Trabajo iniciado (se sincronizará al recuperar conexión)', 'success');
    closeModal();
    navigateTo(currentTab);
    return;
  }

  try {
    const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
    if (error) { toast('Error: ' + (error.message || 'Sin conexión'), 'error'); return; }

    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);

    toast('🔧 Trabajo iniciado · GPS guardado', 'success');
    closeModal();
    navigateTo(currentTab);
  } catch(e) {
    console.error('Error iniciar parte:', e);
    // Falló la red durante el intento → guardar offline
    const p = misPartes.find(x => x.id === id);
    if (p) Object.assign(p, updateObj);
    await cacheDataOffline();
    await syncQueueAdd({ table:'partes_trabajo', action:'update', data: updateObj, match:{ id }, timestamp: Date.now() });
    toast('🔧 Trabajo iniciado offline (se sincronizará)', 'success');
    closeModal();
    navigateTo(currentTab);
  }
}

// ── ABRIR WIZARD INFORMAR ──
function openInformarWizard(id) {
  const p = misPartes.find(x => x.id === id);
  if (!p) return;

  // Auto-calcular minutos trabajados desde inicio_at
  let autoManoObra = p.mano_obra ? [...p.mano_obra] : [];
  if (autoManoObra.length === 0 && p.inicio_at) {
    const inicio = new Date(p.inicio_at);
    const ahora = new Date();
    const diffMs = ahora - inicio;
    const diffMinutos = Math.max(1, Math.round(diffMs / (1000 * 60)));
    autoManoObra.push({
      descripcion: 'Trabajo realizado',
      minutos: diffMinutos,
      precio_hora: 35,
      total: (diffMinutos / 60) * 35,
    });
  }

  // Auto-añadir línea de desplazamiento con cálculo de km por carretera
  if (autoManoObra.length <= 1 && !autoManoObra.find(mo => mo.descripcion && mo.descripcion.toLowerCase().includes('desplazamiento'))) {
    autoManoObra.push({
      descripcion: 'Desplazamiento',
      minutos: 0,
      precio_hora: 0.26,
      total: 0,
      km: 0,
      es_desplazamiento: true,
    });
    // Calcular km reales por carretera (Google Maps → OSRM → haversine)
    const ubi = p.ubicacion_inicio || p.ubicacion;
    if (ubi && ubi.lat && ubi.lng) {
      calcularKmCarretera(ubi.lat, ubi.lng).then(km => {
        const despMO = _wiz.manoObra.find(mo => mo.es_desplazamiento);
        if (despMO) {
          despMO.km = km;
          despMO.total = km * (despMO.precio_hora || 0.26);
          renderWizStep();
        }
      }).catch(() => {});
    }
  }

  // Pre-fill email del cliente desde trabajo/obra si no existe en el parte
  let _prefillEmail = p.cliente_email || '';
  // El nombre NO se pre-rellena: es la persona responsable en la visita, no el cliente
  if (!_prefillEmail && p.trabajo_id) {
    const _trab = trabajos.find(tr => tr.id === p.trabajo_id);
    if (_trab) {
      const _cli = _trab.cliente_id ? clientes.find(c => c.id === _trab.cliente_id) : null;
      if (_cli) {
        if (!_prefillEmail) _prefillEmail = _cli.email || '';
      }
    }
  }

  // Intentar recuperar progreso auto-guardado
  const _saved = _wizLoadAutoSave(id);
  if (_saved && _saved.mode === 'informar') {
    _wiz = Object.assign(_saved, {
      parteId: id,
      firmaData: null,
      firmaOperario: null,
      firmaData_validated: false,
      firmaOperario_validated: false,
      fotosNuevas: [],
    });
    // Mantener manoObra calculada si no tenía guardada
    if (!_wiz.manoObra || !_wiz.manoObra.length) _wiz.manoObra = autoManoObra;
    // El nombre de firma NO se recupera del auto-save (es persona en visita, no cliente)
    // Solo mantenerlo si el usuario lo escribió manualmente (tiene 3+ palabras)
    if (_wiz.clienteNombre) {
      const _palabras = _wiz.clienteNombre.trim().split(/\s+/).filter(w => w.length > 0);
      // Si coincide con el nombre del cliente, limpiar (fue auto-relleno viejo)
      const _cliNom = p.cliente_nombre_firma || '';
      let _nomObra = '';
      if (p.trabajo_id) {
        const _tr = trabajos.find(tr => tr.id === p.trabajo_id);
        if (_tr) {
          const _cl = _tr.cliente_id ? clientes.find(c => c.id === _tr.cliente_id) : null;
          _nomObra = (_cl?.nombre || _tr.cliente_nombre || '');
        }
      }
      if (_wiz.clienteNombre === _cliNom || _wiz.clienteNombre === _nomObra) {
        _wiz.clienteNombre = '';
      }
    }
    toast('Se ha recuperado tu progreso anterior', 'success');
  } else {
    _wiz = {
      parteId: id,
      step: 0,
      mode: 'informar',
      desc: p.descripcion || '',
      pendientes_checked: !!p.trabajos_pendientes,
      pendientes: p.trabajos_pendientes || '',
      gremios_pendientes: p.gremios_pendientes || {},
      observaciones: p.observaciones || '',
      fotos: p.fotos ? [...p.fotos] : [],
      fotosNuevas: [],
      materiales: p.materiales ? [...p.materiales] : [],
      albaranes_compra: p.albaranes_compra ? [...p.albaranes_compra] : [],
      manoObra: autoManoObra,
      firmaData: null,
      firmaOperario: null,
      firmaData_validated: false,
      firmaOperario_validated: false,
      clienteEmailMode: 'si',
      clienteEmail: _prefillEmail,
      clienteNombre: '',
      clienteDni: p.cliente_dni || '',
    };
  }
  renderWizStep();
}

async function cambiarEstado(id, nuevoEstado) {
  // Si se intenta completar → abrir wizard obligatorio
  if (nuevoEstado === 'completado') {
    closeModal();
    setTimeout(() => openInformarWizard(id), 300);
    return;
  }

  // Verificar que no hay otro parte en curso del mismo operario
  if (nuevoEstado === 'en_curso') {
    const parte = misPartes.find(x => x.id === id);
    const operarioId = parte?.usuario_id || CU?.id;
    const otroEnCurso = misPartes.find(p => p.estado === 'en_curso' && p.id !== id && p.usuario_id === operarioId);
    if (otroEnCurso) {
      toast(`⚠️ Ya hay un parte en curso (${otroEnCurso.numero || ''}). Debe completarse antes de iniciar otro.`, 'error');
      return;
    }
  }

  const updateObj = { estado: nuevoEstado };
  if (nuevoEstado === 'revisado') {
    updateObj.revisado_por = CU?.id || null;
    updateObj.revisado_por_nombre = CP?.nombre || '';
    updateObj.revisado_at = new Date().toISOString();
  }

  const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
  if (error) { toast('Error: ' + (error.message || 'Sin conexión'), 'error'); return; }

  const p = misPartes.find(x => x.id === id);
  if (p) Object.assign(p, updateObj);

  const estInfo = PT_ESTADOS[nuevoEstado] || {};
  toast(`${estInfo.ico||''} ${estInfo.label||nuevoEstado} ✓`, 'success');
  closeModal();
  navigateTo(currentTab);
}

async function toggleTarea(id, completar) {
  const nuevoEstado = completar === true || completar === 'true' ? 'completada' : 'pendiente';
  const { error } = await sb.from('tareas_obra').update({ estado: nuevoEstado }).eq('id', id);
  if (error) { toast('Error', 'error'); return; }

  const t = misTareas.find(x => x.id === id);
  if (t) t.estado = nuevoEstado;
  toast(completar ? '✅ Completada' : '↩️ Reabierta', 'success');
  navigateTo(currentTab);
}

// ═══════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function toast(msg, type) {
  const el = document.getElementById('appToast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2500);
}

// ═══════════════════════════════════════════════
// PWA: Service Worker & Install
// ═══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW:', e));
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => {
      if (r.outcome === 'accepted') toast('App instalada ✓', 'success');
      deferredPrompt = null;
    });
  }
}
</script>
