<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B4FD8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Instalo App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --azul:#1B4FD8;--azul-dark:#1339A8;--azul-light:#EEF3FF;
  --verde:#16A34A;--verde-light:#DCFCE7;
  --rojo:#DC2626;--rojo-light:#FEE2E2;
  --amarillo:#D97706;--amarillo-light:#FEF3C7;
  --violeta:#7C3AED;--violeta-light:#EDE9FE;
  --acento:#F97316;
  --gris-50:#F8FAFC;--gris-100:#F1F5F9;--gris-200:#E2E8F0;
  --gris-300:#CBD5E1;--gris-400:#94A3B8;--gris-500:#64748B;
  --gris-600:#475569;--gris-700:#334155;--gris-800:#1E293B;--gris-900:#0F172A;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:var(--font);background:var(--gris-50);color:var(--gris-900);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:var(--azul);text-decoration:none}

/* ── SCREENS ── */
.screen{display:none;min-height:100dvh}
.screen.active{display:flex;flex-direction:column}

/* ── LOGIN ── */
#s-login{align-items:center;justify-content:center;background:linear-gradient(135deg,var(--azul-dark),var(--azul));padding:24px}
.login-card{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-card h1{text-align:center;font-size:22px;font-weight:800;color:var(--azul);margin-bottom:4px}
.login-card p{text-align:center;font-size:13px;color:var(--gris-400);margin-bottom:24px}
.login-card .logo{text-align:center;margin-bottom:16px;font-size:40px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--gris-600);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:15px;outline:none;transition:border .2s;font-family:var(--font)}
.field input:focus{border-color:var(--azul)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:10px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;width:100%}
.btn-primary{background:var(--azul);color:#fff}
.btn-primary:active{background:var(--azul-dark);transform:scale(.98)}
.btn-secondary{background:var(--gris-100);color:var(--gris-700)}
.btn-danger{background:var(--rojo);color:#fff}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px;width:auto}
.err{display:none;background:var(--rojo-light);color:var(--rojo);padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:12px;text-align:center}

/* ── APP SHELL ── */
#s-app{background:var(--gris-50)}
.app-header{position:sticky;top:0;z-index:100;background:#fff;padding:calc(var(--safe-top) + 8px) 16px 8px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px}
.app-header .avatar{width:42px;height:42px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0}
.app-header .info{flex:1;min-width:0}
.app-header .info h2{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-header .info span{font-size:11px;color:var(--gris-400);font-weight:600}
.app-header .hdr-btn{width:36px;height:36px;border-radius:50%;background:var(--gris-100);border:none;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.app-header .hdr-btn-modo{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:none;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;letter-spacing:.3px}
.hdr-live{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:#ECFDF5;border:1px solid #A7F3D0;font-size:10px;font-weight:700;color:#059669;cursor:pointer;flex-shrink:0;letter-spacing:.3px}
.hdr-live .live-dot{width:7px;height:7px;border-radius:50%;background:#10B981}

.app-body{flex:1;padding:12px 16px;padding-bottom:calc(80px + var(--safe-bottom))}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gris-200);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.bottom-nav .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;gap:2px;cursor:pointer;border:none;background:none;color:var(--gris-400);font-family:var(--font);transition:color .2s}
.bottom-nav .nav-item.active{color:var(--azul)}
.bottom-nav .nav-item .ico{font-size:22px;line-height:1}
.bottom-nav .nav-item .lbl{font-size:10px;font-weight:700}
.bottom-nav .nav-item .badge{position:absolute;top:-2px;right:-6px;background:var(--rojo);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--gris-100)}
.card-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-title{font-size:13px;font-weight:800;color:var(--gris-500);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;padding-left:4px}

/* ── PARTE CARD ── */
.parte-card{border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--gris-100);cursor:pointer;transition:box-shadow .2s}
.parte-card:active{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.parte-row{display:flex;align-items:center;gap:8px}
.parte-num{font-family:monospace;font-weight:700;font-size:13px;color:var(--azul)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700}
.parte-meta{font-size:11.5px;color:var(--gris-400);margin-top:4px}
.parte-desc{font-size:12.5px;color:var(--gris-600);margin-top:6px;line-height:1.4}
.parte-actions{display:flex;gap:8px;margin-top:10px}
.parte-actions .btn{flex:1}

/* ── TAREA ITEM ── */
.tarea-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--gris-100)}
.tarea-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--gris-300);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;font-size:12px}
.tarea-check.done{background:var(--verde);border-color:var(--verde);color:#fff}
.tarea-texto{flex:1;font-size:13px}
.tarea-texto.done{text-decoration:line-through;color:var(--gris-400)}

/* ── AGENDA ── */
.agenda-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--gris-100)}
.agenda-time{font-size:12px;font-weight:800;color:var(--azul);width:50px;flex-shrink:0;text-align:right}
.agenda-content{flex:1;min-width:0}
.agenda-title{font-size:13.5px;font-weight:700}
.agenda-sub{font-size:11.5px;color:var(--gris-400);margin-top:2px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85dvh;overflow-y:auto;padding:20px 16px calc(20px + var(--safe-bottom));animation:slideUp .3s ease;display:flex;flex-direction:column}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--gris-300);border-radius:4px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px}
.wiz-nav{position:sticky;bottom:-20px;background:#fff;padding:12px 0;border-top:1px solid var(--gris-200);z-index:5;margin-top:auto}
.firma-container{max-height:160px;position:relative}
.firma-container canvas{max-height:140px}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:var(--radius);padding:10px 6px;text-align:center;border:1px solid var(--gris-100)}
.stat-num{font-size:20px;font-weight:800}
.stat-label{font-size:10px;font-weight:600;color:var(--gris-400);margin-top:1px}
.search-filter{background:var(--gris-100);border:none;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--gris-500);cursor:pointer;font-family:var(--font)}
.search-filter.active{background:var(--azul);color:#fff}

/* ── PROGRESS ── */
.progress-bar{height:8px;background:var(--gris-100);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--gris-400)}
.empty-state .ico{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ── TOAST ── */
.toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%);background:var(--gris-800);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}
.toast.success{background:var(--verde)}
.toast.error{background:var(--rojo)}
.toast.warning{background:var(--amarillo)}

/* ── JEFE: OPERARIO CARDS ── */
.operario-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--gris-100);display:flex;align-items:center;gap:12px;cursor:pointer}
.operario-card:active{background:var(--gris-50)}
.operario-av{width:42px;height:42px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.operario-info{flex:1;min-width:0}
.operario-name{font-size:14px;font-weight:700}
.operario-status{font-size:11.5px;margin-top:2px}

/* ── JEFE: TABS ── */
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap;border:none;background:var(--gris-100);color:var(--gris-500);cursor:pointer;transition:all .2s;font-family:var(--font)}
.tab.active{background:var(--azul);color:#fff}

/* ── PULL TO REFRESH ── */
.ptr-indicator{text-align:center;padding:8px;font-size:12px;color:var(--gris-400);display:none}

/* ── INSTALL BANNER ── */
.install-banner{background:linear-gradient(135deg,var(--azul),var(--violeta));color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;display:none}
.install-banner h3{font-size:14px;font-weight:800;margin-bottom:4px}
.install-banner p{font-size:12px;opacity:.8;margin-bottom:10px}
.install-banner .btn{background:rgba(255,255,255,.2);color:#fff;width:auto;padding:8px 16px}

/* ── WIZARD STEPPER ── */
.wiz-steps{display:flex;gap:4px;margin-bottom:20px}
.wiz-step{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:700;background:var(--gris-100);color:var(--gris-400);transition:all .3s}
.wiz-step.active{background:var(--azul);color:#fff}
.wiz-step.done{background:var(--verde-light);color:var(--verde);cursor:pointer}
.wiz-nav{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--gris-200)}
.wiz-nav .btn{flex:1}

/* ── PHOTO GRID ── */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.foto-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--gris-100)}
.foto-thumb img{width:100%;height:100%;object-fit:cover}
.foto-thumb .del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.foto-add{aspect-ratio:1;border:2px dashed var(--gris-300);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--gris-400);font-size:12px;font-weight:700;gap:4px;transition:all .2s}
.foto-add:active{background:var(--gris-100);border-color:var(--azul)}

/* ── MATERIAL ROW ── */
.mat-row{display:flex;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--gris-100)}
.mat-row .mat-name{flex:1;min-width:0;font-size:13px;font-weight:600}
.mat-row .mat-qty{font-size:13px;font-weight:700;color:var(--azul)}
.mat-row .mat-del{background:none;border:none;font-size:16px;cursor:pointer;padding:4px}
.mat-search{position:relative}
.mat-search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--gris-200);border-radius:8px;max-height:200px;overflow-y:auto;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.1);display:none}
.mat-search-results.show{display:block}
.mat-search-item{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--gris-100);cursor:pointer}
.mat-search-item:active{background:var(--azul-light)}

/* ── SIGNATURE CANVAS ── */
.firma-container{border:2px solid var(--gris-200);border-radius:12px;overflow:hidden;background:#fff;touch-action:none;position:relative}
.firma-container canvas{width:100%;height:200px;display:block}
.firma-clear{position:absolute;top:8px;right:8px;background:var(--gris-100);border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer}
.firma-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--gris-300);font-size:14px;font-weight:600;pointer-events:none}
/* ── FULLSCREEN SIGNATURE OVERLAY ── */
.firma-fullscreen{position:fixed;inset:0;z-index:9999;background:#fff;display:flex;flex-direction:column}
.firma-fullscreen .firma-fs-header{display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top,20px) + 8px) 16px 12px;background:var(--azul);color:#fff}
.firma-fullscreen .firma-fs-header h3{margin:0;font-size:16px;font-weight:700}
.firma-fullscreen .firma-fs-canvas-wrap{flex:1;position:relative;touch-action:none;background:#fff}
.firma-fullscreen .firma-fs-canvas-wrap canvas{width:100%;height:100%;display:block}
.firma-fullscreen .firma-fs-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--gris-300);font-size:18px;font-weight:600;pointer-events:none}
.firma-fullscreen .firma-fs-actions{display:flex;gap:8px;padding:12px 16px calc(env(safe-area-inset-bottom,8px) + 8px);background:var(--gris-50)}
/* Ocultar flechas spinner en inputs numéricos */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body>

<!-- ═══════════ TOAST ═══════════ -->
<div id="appToast" class="toast"></div>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="s-login" class="screen active">
  <div class="login-card">
    <div class="logo">🔧</div>
    <h1>Instalo App</h1>
    <p>Accede a tu cuenta de trabajo</p>
    <div id="loginErr" class="err"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" id="btnLogin">Entrar</button>
  </div>
</div>

<!-- ═══════════ APP SCREEN ═══════════ -->
<div id="s-app" class="screen">
  <!-- Header -->
  <div class="app-header">
    <div class="avatar" id="hdrAvatar">J</div>
    <div class="info">
      <h2 id="hdrNombre">—</h2>
      <span id="hdrLastSync" style="font-size:10px;color:var(--gris-400);font-weight:600"></span>
      <span style="font-size:9px;color:var(--gris-300);font-weight:600" id="appBuildVersion">v1.0 stable</span>
    </div>
    <button id="btnModo" class="hdr-btn-modo" onclick="toggleModo()" title="Cambiar modo"></button>
    <div style="position:relative;display:inline-flex">
      <div id="hdrLive" class="hdr-live" onclick="doRefresh()" title="Toca para actualizar"><span class="live-dot"></span> OK</div>
      <span id="syncBadge" style="display:none;position:absolute;top:-5px;right:-5px;background:#F59E0B;color:#fff;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;text-align:center;line-height:16px">0</span>
    </div>
    <button class="hdr-btn" onclick="doLogout()" title="Cerrar sesión" style="background:var(--rojo);color:#fff;font-size:15px;font-weight:700;width:36px;height:36px">✕</button>
  </div>

  <!-- Body (content rendered by JS) -->
  <div class="app-body" id="appBody"></div>

  <!-- Bottom Navigation (rendered by JS based on role) -->
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<!-- ═══════════ MODALS ═══════════ -->
<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this){if(document.getElementById('btnCerrarEnvio')&&!_envioRealizado){toast('⚠️ Debes enviar el parte al cliente','error');return;}closeModal()}">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// INSTALO MOBILE WEB APP
// ═══════════════════════════════════════════════════════════════

const SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdza2txcWhicG55Y3Z1aW9xZXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU1OTksImV4cCI6MjA5MDQ1MTU5OX0.4ArVhR9_qh6frtBrWZRRIssr3Zgavv41SdfOgyg27KE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ─── Config Desplazamiento ───
const OFICINA_LAT = 43.686648;
const OFICINA_LNG = -7.420667;
const GMAPS_API_KEY = ''; // ← Pon aquí tu API Key de Google Maps
let _gmapsLoaded = false;

// ─── State ───
let CU = null, CP = null, EMPRESA = null;
let esJefe = false;
let currentTab = 'inicio';
let misPartes = [];
let misTareas = [];
let todosUsuarios = [];
let trabajos = [];
let clientes = [];
let articulos = [];

// Wizard state
let _wiz = { parteId:null, step:0, fotos:[], materiales:[], albaranes_compra:[], firmaData:null };

// ═══════════════════════════════════════════════
// OFFLINE — IndexedDB + Sync Queue
// ═══════════════════════════════════════════════
let _db = null;
let _isOnline = navigator.onLine;
const IDB_NAME = 'instalo_offline';
const IDB_VERSION = 1;

function openOfflineDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      // Stores para cachear datos
      if (!db.objectStoreNames.contains('partes'))   db.createObjectStore('partes', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('trabajos'))  db.createObjectStore('trabajos', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('clientes'))  db.createObjectStore('clientes', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('articulos')) db.createObjectStore('articulos', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('perfiles'))  db.createObjectStore('perfiles', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('tareas'))    db.createObjectStore('tareas', { keyPath: 'id' });
      // Cola de operaciones pendientes
      if (!db.objectStoreNames.contains('syncQueue')) db.createObjectStore('syncQueue', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => { console.error('[IDB] Error:', e); reject(e); };
  });
}

// Guardar array de registros en un store
function idbSaveAll(storeName, records) {
  return new Promise((resolve, reject) => {
    if (!_db) { resolve(); return; }
    const tx = _db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    store.clear(); // Reemplazar todo con datos frescos
    (records || []).forEach(r => store.put(r));
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

// Leer todos los registros de un store
function idbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    if (!_db) { resolve([]); return; }
    const tx = _db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = (e) => reject(e);
  });
}

// ── Cola de sincronización ──
function syncQueueAdd(operation) {
  // operation: { table, action: 'insert'|'update'|'upsert', data, match, timestamp }
  return new Promise((resolve, reject) => {
    if (!_db) { resolve(); return; }
    const tx = _db.transaction('syncQueue', 'readwrite');
    const store = tx.objectStore('syncQueue');
    operation.timestamp = Date.now();
    store.add(operation);
    tx.oncomplete = () => {
      console.log('[Sync] Operación encolada:', operation.action, operation.table);
      _updateSyncBadge();
      resolve();
    };
    tx.onerror = (e) => reject(e);
  });
}

function syncQueueGetAll() {
  return idbGetAll('syncQueue');
}

function syncQueueClear() {
  return new Promise((resolve, reject) => {
    if (!_db) { resolve(); return; }
    const tx = _db.transaction('syncQueue', 'readwrite');
    tx.objectStore('syncQueue').clear();
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

function syncQueueDelete(id) {
  return new Promise((resolve, reject) => {
    if (!_db) { resolve(); return; }
    const tx = _db.transaction('syncQueue', 'readwrite');
    tx.objectStore('syncQueue').delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

// Procesar cola de sync — subir operaciones pendientes
async function processSyncQueue() {
  if (!navigator.onLine) return;
  const ops = await syncQueueGetAll();
  if (ops.length === 0) return;

  console.log(`[Sync] Procesando ${ops.length} operaciones pendientes...`);
  toast(`Sincronizando ${ops.length} cambio${ops.length > 1 ? 's' : ''}...`, 'info');
  let ok = 0, fail = 0;

  for (const op of ops) {
    try {
      let result;
      if (op.action === 'update_with_files') {
        // Subir fotos/firmas base64 antes de actualizar
        const data = { ...op.data };
        const eid = EMPRESA?.id || 'default';

        // Subir firma cliente si es base64
        if (data.firma_url && data.firma_url.startsWith('data:')) {
          try {
            const blob = await (await fetch(data.firma_url)).blob();
            const fn = `${eid}/${Date.now()}_firma_cli_sync.png`;
            const { error: ue } = await sb.storage.from('fotos-partes').upload(fn, blob);
            if (!ue) { data.firma_url = sb.storage.from('fotos-partes').getPublicUrl(fn).data.publicUrl; }
            else { data.firma_url = null; }
          } catch(e) { data.firma_url = null; console.warn('Sync: firma cli upload error', e); }
        }
        // Subir firma operario si es base64
        if (data.firma_operario_url && data.firma_operario_url.startsWith('data:')) {
          try {
            const blob = await (await fetch(data.firma_operario_url)).blob();
            const fn = `${eid}/${Date.now()}_firma_op_sync.png`;
            const { error: ue } = await sb.storage.from('fotos-partes').upload(fn, blob);
            if (!ue) { data.firma_operario_url = sb.storage.from('fotos-partes').getPublicUrl(fn).data.publicUrl; }
            else { data.firma_operario_url = null; }
          } catch(e) { data.firma_operario_url = null; console.warn('Sync: firma op upload error', e); }
        }
        // Subir fotos nuevas si había
        if (op.fotosNuevas && op.fotosNuevas.length) {
          const fotosUrls = data.fotos || [];
          for (const foto of op.fotosNuevas) {
            try {
              const blob = await (await fetch(foto.data)).blob();
              const fn = `${eid}/${Date.now()}_${Math.random().toString(36).substr(2,9)}.jpg`;
              const { error: ue } = await sb.storage.from('fotos-partes').upload(fn, blob);
              if (!ue) fotosUrls.push(sb.storage.from('fotos-partes').getPublicUrl(fn).data.publicUrl);
            } catch(e) { console.warn('Sync: foto upload error', e); }
          }
          data.fotos = fotosUrls.length > 0 ? fotosUrls : null;
        }

        result = await sb.from(op.table).update(data).match(op.match);
      } else if (op.action === 'update') {
        result = await sb.from(op.table).update(op.data).match(op.match);
      } else if (op.action === 'insert') {
        result = await sb.from(op.table).insert(op.data);
      } else if (op.action === 'upsert') {
        result = await sb.from(op.table).upsert(op.data);
      }
      if (result?.error) throw result.error;
      await syncQueueDelete(op.id);
      ok++;
    } catch (e) {
      console.error('[Sync] Error en op:', op, e);
      fail++;
    }
  }

  _updateSyncBadge();
  if (ok > 0) toast(`✅ ${ok} cambio${ok > 1 ? 's' : ''} sincronizado${ok > 1 ? 's' : ''}`, 'success');
  if (fail > 0) toast(`⚠️ ${fail} cambio${fail > 1 ? 's' : ''} no se pudieron subir`, 'error');

  // Refrescar datos tras sincronizar
  if (ok > 0) {
    await loadAllData();
    navigateTo(currentTab);
  }
}

function _updateSyncBadge() {
  syncQueueGetAll().then(ops => {
    const badge = document.getElementById('syncBadge');
    if (badge) {
      if (ops.length > 0) {
        badge.textContent = ops.length;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }
  });
}

// ── Helper: update con fallback offline ──
async function offlineUpdate(table, data, match) {
  if (navigator.onLine) {
    const result = await sb.from(table).update(data).match(match);
    if (result.error) throw result.error;
    return result;
  } else {
    // Sin red → encolar para sincronizar después
    await syncQueueAdd({ table, action: 'update', data, match });
    toast('Guardado offline — se subirá con conexión', 'info');
    return { data: null, error: null };
  }
}

    ]);
    localStorage.setItem('instalo_last_cache', Date.now().toString());
    console.log('[Offline] Datos cacheados en IndexedDB');
  } catch(e) {
    console.error('[Offline] Error cacheando:', e);
  }
}

// Cargar datos desde cache offline
async function loadFromOfflineCache() {
  try {
    const [p, t, c, a, u, ta] = await Promise.all([
      idbGetAll('partes'),
      idbGetAll('trabajos'),
      idbGetAll('clientes'),
      idbGetAll('articulos'),
      idbGetAll('perfiles'),
      idbGetAll('tareas'),
    ]);
    misPartes = p; trabajos = t; clientes = c; articulos = a; todosUsuarios = u; misTareas = ta;
    const lastCache = localStorage.getItem('instalo_last_cache');
    const ago = lastCache ? Math.round((Date.now() - parseInt(lastCache)) / 60000) : '?';
    console.log(`[Offline] Datos cargados desde cache (hace ${ago} min)`);
    return p.length > 0; // true si hay datos
  } catch(e) {
    console.error('[Offline] Error leyendo cache:', e);
    return false;
  }
}

async function doLogin() {

  const pass  = document.getElementById('lPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'Completa todos los campos'; errEl.style.display = 'block'; return; }

  document.getElementById('btnLogin').textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) { errEl.textContent = 'Email o contraseña incorrectos'; errEl.style.display = 'block'; return; }

  CU = data.user;

  if (!CP?.empresa_id) { errEl.textContent = 'Sin empresa asignada'; errEl.style.display = 'block'; return; }
  await loadEmpresa(CP.empresa_id);

// DATA LOADING
// ═══════════════════════════════════════════════
async function loadAllData() {
  if (!EMPRESA) return;
  const eid = EMPRESA.id;

  // Si no hay red → cargar desde cache offline
  if (!navigator.onLine) {
    console.log('[LoadData] Sin red, usando cache offline');
    const hasCached = await loadFromOfflineCache();
    if (hasCached) {
      // Filtrar partes para operario
      if (!esJefe) {
        misPartes = misPartes.filter(p => p.usuario_id === CU.id);
      }
      _updateConnIndicator();
      return;
    }
    toast('Sin conexión y sin datos en cache', 'error');
    return;
  }

  try {
    const promises = [
      sb.from('partes_trabajo').select('*').eq('empresa_id', eid).neq('estado','eliminado').order('fecha',{ascending:false}).limit(100),
      sb.from('perfiles').select('*').eq('empresa_id', eid).eq('activo', true),
      sb.from('trabajos').select('*').eq('empresa_id', eid).neq('estado','eliminado').order('created_at',{ascending:false}),
      sb.from('clientes').select('*').eq('empresa_id', eid).order('nombre'),
      sb.from('articulos').select('id,codigo,nombre,precio_venta').eq('empresa_id', eid).eq('activo', true).order('nombre'),
    ];

    // Jefe: cargar tareas de todas las obras; Operario: solo sus tareas
    if (esJefe) {
      promises.push(sb.from('tareas_obra').select('*').eq('empresa_id', eid).neq('estado','rechazada').order('created_at',{ascending:false}).limit(200));
    } else {
      promises.push(sb.from('tareas_obra').select('*').eq('empresa_id', eid).eq('responsable_id', CU.id).neq('estado','rechazada').order('created_at',{ascending:false}).limit(100));
    }

    const [partesR, usersR, trabR, cliR, artR, tareasR] = await Promise.all(promises);

    const allPartes = partesR.data || [];
    todosUsuarios = usersR.data || [];
    trabajos = trabR.data || [];
    clientes = cliR.data || [];
    articulos = artR.data || [];
    const allTareas = tareasR.data || [];

    if (esJefe) {
      misPartes = allPartes;
      misTareas = allTareas;
    } else {
      misPartes = allPartes.filter(p => p.usuario_id === CU.id);
      misTareas = allTareas;
    }

    // ✅ Guardar en cache offline para uso sin conexión
    await cacheDataOffline();
    _updateConnIndicator();

  } catch(e) {
    console.error('Error loading data:', e);
    // Si falla la red, intentar cache offline
    const hasCached = await loadFromOfflineCache();
    if (hasCached) {
      if (!esJefe) misPartes = misPartes.filter(p => p.usuario_id === CU.id);
      toast('Usando datos en cache (sin conexión)', 'info');
      _updateConnIndicator();
    } else {
      toast('Error cargando datos', 'error');
    }
  }
}

// AUTO-REFRESH: polling cada 5 min + al abrir app
// ═══════════════════════════════════════════════
let _pollInterval = null;
const POLL_MS = 5 * 60 * 1000; // 5 minutos
let _lastRefresh = Date.now();

function initAutoRefresh() {
  // Polling silencioso cada 5 minutos
  if (_pollInterval) clearInterval(_pollInterval);
  _pollInterval = setInterval(() => _silentRefresh(), POLL_MS);
  _updateSyncIndicator();
}

async function _silentRefresh() {
  // No refrescar si el wizard está abierto (podría perder datos)
  if (_wiz?.parteId && document.querySelector('.wiz-overlay')) {
    console.log('[AutoRefresh] Wizard abierto, skip');
    return;
  }
  console.log('[AutoRefresh] Polling...');
  try {
    await loadAllData();
    navigateTo(currentTab);
    _lastRefresh = Date.now();
    _updateSyncIndicator();
  } catch(e) {
    console.error('[AutoRefresh] Error:', e);
  }
}

function _updateSyncIndicator() {
  _updateConnIndicator();
}

// Al volver a primer plano → refresh inmediato
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && EMPRESA) {
    const elapsed = Date.now() - _lastRefresh;
    // Refrescar si han pasado más de 2 min desde el último
    if (elapsed > 2 * 60 * 1000) {
      _silentRefresh();
    }
  }
});

// Actualizar indicador cada minuto
setInterval(() => _updateSyncIndicator(), 60000);

function forceCacheClear() {
  if (!confirm('Se va a borrar toda la caché (incluidos datos offline) y recargar la aplicación.\n\n¿Continuar?')) return;
  // Borrar caches del Service Worker
  if ('caches' in window) {
    caches.keys().then(names => names.forEach(n => caches.delete(n)));
  }
  // Borrar IndexedDB offline
  try { indexedDB.deleteDatabase(IDB_NAME); } catch(e) {}
  localStorage.removeItem('instalo_last_cache');
  // Desregistrar Service Workers
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  }
  // Recargar sin caché
  window.location.reload(true);
}

function renderOperarioInicio(el) {
  // Usar fecha local (no UTC) para evitar desfase horario
  const _ahora = new Date();
  const hoy = _ahora.getFullYear() + '-' + String(_ahora.getMonth()+1).padStart(2,'0') + '-' + String(_ahora.getDate()).padStart(2,'0');
  const partesPend = misPartes.filter(p => ['programado','en_curso'].includes(p.estado));
  const tareasActivas = misTareas.filter(t => t.estado !== 'completada');

  // Group partes by day
  const diasMap = new Map();
  misPartes.forEach(p => {
    if (p.fecha && p.estado !== 'eliminado') {
      if (!diasMap.has(p.fecha)) {
        diasMap.set(p.fecha, []);
      }
      diasMap.get(p.fecha).push(p);
    }
  });

  // Sort each day's partes by hora_inicio
  diasMap.forEach((partes) => {
    partes.sort((a, b) => {
      const aTime = a.hora_inicio || '23:59';
      const bTime = b.hora_inicio || '23:59';
      return aTime.localeCompare(bTime);
    });
  });

  // Separar caducados (fecha pasada + no completados) de hoy/futuro
  const caducados = [];
  const sortedDias = [];
  Array.from(diasMap.entries())
    .sort((a, b) => a[0].localeCompare(b[0]))
    .filter(([, partes]) => partes.length > 0)
    .forEach(([fecha, partes]) => {
      if (fecha < hoy) {
        const noCompletados = partes.filter(p => ['programado','en_curso','borrador'].includes(p.estado));
        if (noCompletados.length) caducados.push({ fecha, partes: noCompletados });
      } else {
        // Hoy: mostrar todos (incluidos completados del día). Futuro: solo no-completados.
        const visibles = partes.filter(p => {
          if (p.estado === 'eliminado') return false;
          if (fecha > hoy && ['completado','revisado','facturado'].includes(p.estado)) return false;
          return true;
        });
        if (visibles.length) sortedDias.push([fecha, visibles]);
      }

  const numCaducados = caducados.reduce((s,d) => s+d.partes.length, 0);

  el.innerHTML = `

        <div class="stat-num" style="color:var(--rojo)">${numCaducados}</div>
        <div class="stat-label">Caducados</div>
      </div>
      <div class="stat-card">

      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--azul)">${enCurso.length}</div>
        <div class="stat-label">En curso</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--azul)">0</div>
        <div class="stat-label">Mensajes</div>

        <div id="day-caducados" style="display:none;padding:8px">
          ${caducados.sort((a,b) => b.fecha.localeCompare(a.fecha)).map(d => {
            const date = new Date(d.fecha + 'T00:00:00');
            const label = date.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});
            const labelCap = label.charAt(0).toUpperCase() + label.slice(1);
            return `

    <div class="section-title">📅 Trabajos por día</div>

      const dayLabel = isToday ? '🔵 HOY' : date.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});
      const dayLabelFormatted = dayLabel.charAt(0).toUpperCase() + dayLabel.slice(1);

function scrollToSection(id) {
  const el = document.getElementById('day-' + id);
  if (el) {
    // Abrir la sección si está cerrada
    if (el.style.display === 'none') {
      el.style.display = 'block';
      const toggle = document.querySelector(`.day-toggle[data-date="${id}"]`);
      if (toggle) toggle.textContent = '▼';
    }
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

let _searchFilter = 'todos';

function toggleBuscadorPartes() {
  const buscador = document.getElementById('buscadorPartes');
  if (!buscador) return;
  const visible = buscador.style.display !== 'none';
  buscador.style.display = visible ? 'none' : 'block';
  if (!visible) {
    _searchFilter = 'todos';
    const input = document.getElementById('searchPartesInput');
    if (input) { input.value = ''; input.focus(); }
    const desde = document.getElementById('searchFechaDesde');
    const hasta = document.getElementById('searchFechaHasta');
    if (desde) desde.value = '';
    if (hasta) hasta.value = '';
    document.querySelectorAll('.search-filter').forEach(b => b.classList.toggle('active', b.dataset.filter === 'todos'));
    document.getElementById('searchPartesResults').innerHTML = '<div style="text-align:center;padding:16px;color:var(--gris-400);font-size:13px">Usa los filtros o escribe para buscar</div>';
  }
}

function setSearchFilter(f) {
  _searchFilter = f;
  document.querySelectorAll('.search-filter').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  filtrarPartesHistorico();
}

function filtrarPartesHistorico() {
  const results = document.getElementById('searchPartesResults');
  if (!results) return;
  const q = (document.getElementById('searchPartesInput')?.value || '').trim().toLowerCase();
  const desde = document.getElementById('searchFechaDesde')?.value || '';
  const hasta = document.getElementById('searchFechaHasta')?.value || '';

  const hayFiltro = q.length >= 2 || desde || hasta || _searchFilter !== 'todos';
  if (!hayFiltro) {
    results.innerHTML = '<div style="text-align:center;padding:16px;color:var(--gris-400);font-size:13px">Usa los filtros o escribe para buscar</div>';
    return;
  }

  const found = misPartes.filter(p => {
    if (p.estado === 'eliminado') return false;
    // Filtro por estado
    if (_searchFilter === 'completado' && !['completado','revisado','facturado'].includes(p.estado)) return false;
    if (_searchFilter === 'programado' && p.estado !== 'programado') return false;
    if (_searchFilter === 'en_curso' && p.estado !== 'en_curso') return false;
    // Filtro por fecha
    if (desde && p.fecha < desde) return false;
    if (hasta && p.fecha > hasta) return false;
    // Filtro por texto
    if (q.length >= 2) {
      const fields = [p.numero, p.trabajo_titulo, p.direccion, p.descripcion, p.cliente_nombre_firma, p.usuario_nombre, p.instrucciones].filter(Boolean).join(' ').toLowerCase();
      if (!fields.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => (b.fecha||'').localeCompare(a.fecha||'')).slice(0, 30);

  if (!found.length) {
    results.innerHTML = '<div style="text-align:center;padding:16px;color:var(--gris-400);font-size:13px">Sin resultados</div>';
    return;
  }
  results.innerHTML = `<div style="font-size:11px;color:var(--gris-400);margin-bottom:8px;text-align:right">${found.length} resultado${found.length!==1?'s':''}</div>` + found.map(p => renderParteCard(p)).join('');
}

function renderOperarioPartes(el) {
  const _ahora = new Date();
  const hoy = _ahora.getFullYear() + '-' + String(_ahora.getMonth()+1).padStart(2,'0') + '-' + String(_ahora.getDate()).padStart(2,'0');

  // Separar por estado
  const activos = misPartes.filter(p => ['programado','en_curso','borrador'].includes(p.estado) && (p.fecha >= hoy || !p.fecha));
  const caducados = misPartes.filter(p => ['programado','en_curso','borrador'].includes(p.estado) && p.fecha && p.fecha < hoy);
  const completados = misPartes.filter(p => ['completado','revisado','facturado'].includes(p.estado));

  // Ordenar por fecha (desc) y luego por número (desc)
  const sortFechaNum = (a, b) => {
    const fa = a.fecha || '9999-99-99', fb = b.fecha || '9999-99-99';
    if (fa !== fb) return fb.localeCompare(fa);
    const na = a.numero || 0, nb = b.numero || 0;
    return nb - na;
  };
  activos.sort(sortFechaNum);
  caducados.sort(sortFechaNum);
  completados.sort(sortFechaNum);

  el.innerHTML = `
    <div class="section-title">📝 Partes activos (${activos.length})</div>
    ${activos.length ? activos.map(p => renderParteCard(p, true)).join('') : '<div class="empty-state"><div class="ico">✨</div><p>Sin partes activos</p></div>'}

    ${caducados.length ? `
      <div class="section-title" style="margin-top:24px;color:var(--rojo)">⏰ Caducados (${caducados.length})</div>
      <div style="background:var(--rojo-light);border-radius:10px;padding:8px;margin-bottom:4px;font-size:11px;color:var(--rojo);font-weight:600">Partes con fecha pasada sin completar</div>
      ${caducados.map(p => renderParteCard(p, true)).join('')}
    ` : ''}

    ${completados.length ? `
      <div class="section-title" style="margin-top:24px">✅ Completados (${completados.length})</div>
      ${completados.slice(0,20).map(p => renderParteCard(p)).join('')}
    ` : ''}
  `;
}

  const hechas = misTareas.filter(t => t.estado === 'completada');
  const total = misTareas.length;

    { key:'urgente', label:'Urgentes', ico:'🔺', color:'var(--rojo)', bg:'var(--rojo-light)' },
    { key:'alta',    label:'Alta prioridad', ico:'▲', color:'var(--amarillo)', bg:'var(--amarillo-light)' },
    { key:'normal',  label:'Normal', ico:'◆', color:'var(--azul)', bg:'var(--azul-light)' },
    { key:'baja',    label:'Baja prioridad', ico:'▽', color:'var(--gris-500)', bg:'var(--gris-100)' },
  ];

  let gruposHtml = '';

    gruposHtml += `
      <div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:6px 10px;background:${cfg.bg};border-radius:8px">
          <span style="font-size:14px">${cfg.ico}</span>
          <span style="font-size:12px;font-weight:800;color:${cfg.color};text-transform:uppercase;letter-spacing:.3px">${cfg.label} (${items.length})</span>

        <div class="card" style="margin-bottom:0">${items.map(t => renderTareaItem(t)).join('')}</div>
      </div>`;
  });

  el.innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700">${hechas.length} de ${total} completadas</span>
        <span style="font-size:14px;font-weight:800;color:${porcent===100?'var(--verde)':'var(--azul)'}">${porcent}%</span>

      <div class="progress-bar"><div class="progress-fill" style="width:${porcent}%;background:${porcent===100?'var(--verde)':'var(--azul)'}"></div></div>
    </div>

    ${gruposHtml || (pendientes.length ? `<div class="section-title">📋 Pendientes</div><div class="card">${pendientes.map(t => renderTareaItem(t)).join('')}</div>` : '')}

    ${hechas.length ? `
      <div class="section-title" style="opacity:.6">✅ Completadas</div>
      <div class="card" style="opacity:.7">${hechas.slice(0,10).map(t => renderTareaItem(t)).join('')}</div>
    ` : ''}

    ${!total ? '<div class="empty-state"><div class="ico">✅</div><p>Sin tareas asignadas</p></div>' : ''}
  `;
}

let _agendaView = 'dia'; // dia | semana | mes
let _agendaDate = new Date();

function renderOperarioAgenda(el) {
  const _ahora = new Date();
  const hoy = _ahora.getFullYear() + '-' + String(_ahora.getMonth()+1).padStart(2,'0') + '-' + String(_ahora.getDate()).padStart(2,'0');

  // Tabs de vista
  const tabs = [
    { key:'dia', label:'Día', ico:'📋' },
    { key:'semana', label:'Semana', ico:'📅' },
    { key:'mes', label:'Mes', ico:'🗓️' },
  ];

  let contenido = '';
  if (_agendaView === 'dia') contenido = _agendaVistaDia(hoy);
  else if (_agendaView === 'semana') contenido = _agendaVistaSemana(hoy);
  else contenido = _agendaVistaMes(hoy);

  el.innerHTML = `
    <div style="display:flex;gap:4px;margin-bottom:12px">
      ${tabs.map(t => `<button onclick="_agendaView='${t.key}';navigateTo('agenda')" style="flex:1;padding:8px 4px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);background:${_agendaView===t.key?'var(--azul)':'var(--gris-100)'};color:${_agendaView===t.key?'#fff':'var(--gris-500)'}">${t.ico} ${t.label}</button>`).join('')}
    </div>
    ${contenido}
  `;
}

function _agendaVistaDia(hoy) {
  const dateKey = _agendaDate.getFullYear() + '-' + String(_agendaDate.getMonth()+1).padStart(2,'0') + '-' + String(_agendaDate.getDate()).padStart(2,'0');
  const isHoy = dateKey === hoy;
  const partesDia = misPartes.filter(p => p.fecha === dateKey && p.estado !== 'eliminado');
  partesDia.sort((a,b) => (a.hora_inicio||'23:59').localeCompare(b.hora_inicio||'23:59'));

  // Navegación día anterior/siguiente
  const navHtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button onclick="_agendaNav(-1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">◀</button>
    <div style="text-align:center">
      <div style="font-size:15px;font-weight:800;color:${isHoy?'var(--azul)':'var(--gris-800)'}">${isHoy?'HOY — ':''}${_agendaDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>
    <button onclick="_agendaNav(1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">▶</button>
  </div>`;

  if (!partesDia.length) {
    return navHtml + '<div class="card" style="text-align:center;padding:32px 16px;color:var(--gris-400)"><div style="font-size:36px;margin-bottom:8px">📭</div><div style="font-size:13px">Sin trabajos programados</div></div>';
  }

  // Franjas horarias: de 7:00 a 20:00
  let franjas = '';
  for (let h = 7; h <= 20; h++) {
    const hStr = String(h).padStart(2,'0');
    const partesHora = partesDia.filter(p => {
      const hi = p.hora_inicio ? p.hora_inicio.substring(0,2) : null;
      return hi === hStr;
    });

    franjas += `<div style="display:flex;min-height:${partesHora.length?'auto':'28px'};border-bottom:1px solid var(--gris-100)">
      <div style="width:48px;padding:4px 4px 4px 0;text-align:right;font-size:11px;font-weight:700;color:var(--gris-400);flex-shrink:0">${hStr}:00</div>
      <div style="flex:1;padding:2px 0 2px 8px;border-left:2px solid var(--gris-200)">
        ${partesHora.map(p => {
          const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
          const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '—';
          const hf = p.hora_fin ? p.hora_fin.substring(0,5) : '—';
          return `<div onclick="openParteDetail(${p.id})" style="background:${est.bg};border-left:3px solid ${est.color};border-radius:6px;padding:8px 10px;margin:2px 0;cursor:pointer">
            <div style="font-size:12.5px;font-weight:700;color:var(--gris-800)">${p.trabajo_titulo || 'Sin obra'}</div>
            <div style="font-size:11px;color:var(--gris-500);margin-top:2px">${hi}-${hf} · ${est.ico} ${est.label}</div>
            ${p.direccion ? `<div style="font-size:10.5px;color:var(--gris-400);margin-top:1px">📍 ${p.direccion}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Partes sin hora asignada
  const sinHora = partesDia.filter(p => !p.hora_inicio);
  let sinHoraHtml = '';
  if (sinHora.length) {
    sinHoraHtml = `<div style="margin-top:12px">
      <div style="font-size:11px;font-weight:700;color:var(--gris-400);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px">Sin hora asignada</div>
      ${sinHora.map(p => {
        const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
        return `<div onclick="openParteDetail(${p.id})" style="background:${est.bg};border-left:3px solid ${est.color};border-radius:6px;padding:8px 10px;margin:4px 0;cursor:pointer">
          <div style="font-size:12.5px;font-weight:700;color:var(--gris-800)">${p.trabajo_titulo || 'Sin obra'}</div>
          <div style="font-size:11px;color:var(--gris-500);margin-top:2px">${est.ico} ${est.label}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  return navHtml + `<div class="card" style="padding:8px 12px">${franjas}</div>` + sinHoraHtml;
}

function _agendaVistaSemana(hoy) {
  // Calcular lunes de la semana actual de _agendaDate
  const d = new Date(_agendaDate);
  const dayOfWeek = d.getDay() || 7; // domingo=7
  d.setDate(d.getDate() - dayOfWeek + 1); // lunes

  const navHtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button onclick="_agendaNavWeek(-1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">◀</button>
    <div style="font-size:14px;font-weight:800;color:var(--gris-800)">Semana ${_getWeekNum(d)}</div>
    <button onclick="_agendaNavWeek(1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">▶</button>
  </div>`;

  let diasHtml = '';
  for (let i = 0; i < 7; i++) {
    const dia = new Date(d);
    dia.setDate(d.getDate() + i);
    const key = dia.getFullYear() + '-' + String(dia.getMonth()+1).padStart(2,'0') + '-' + String(dia.getDate()).padStart(2,'0');
    const isHoy = key === hoy;
    const partesDia = misPartes.filter(p => p.fecha === key && p.estado !== 'eliminado');
    partesDia.sort((a,b) => (a.hora_inicio||'23:59').localeCompare(b.hora_inicio||'23:59'));
    const dayName = dia.toLocaleDateString('es-ES',{weekday:'short',day:'numeric'});

    diasHtml += `<div style="margin-bottom:8px">
      <div onclick="_agendaDate=new Date('${key}T12:00:00');_agendaView='dia';navigateTo('agenda')" style="font-size:12px;font-weight:800;padding:6px 10px;border-radius:8px;cursor:pointer;background:${isHoy?'var(--azul)':'var(--gris-100)'};color:${isHoy?'#fff':'var(--gris-600)'};display:inline-block;margin-bottom:4px;text-transform:capitalize">${dayName}</div>
      ${partesDia.length ? partesDia.map(p => {
        const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
        const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '—';
        return `<div onclick="openParteDetail(${p.id})" style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-left:3px solid ${est.color};background:${est.bg};border-radius:0 6px 6px 0;margin:3px 0;cursor:pointer">
          <span style="font-size:11px;font-weight:700;color:var(--gris-500);width:36px">${hi}</span>
          <span style="font-size:12px;font-weight:600;color:var(--gris-800);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.trabajo_titulo || 'Sin obra'}</span>
          <span style="font-size:10px">${est.ico}</span>
        </div>`;
      }).join('') : `<div style="padding:4px 10px;font-size:11px;color:var(--gris-300)">—</div>`}
    </div>`;
  }

  return navHtml + `<div class="card" style="padding:10px 12px">${diasHtml}</div>`;
}

function _agendaVistaMes(hoy) {
  const year = _agendaDate.getFullYear();
  const month = _agendaDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay() || 7; // lun=1

  const navHtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button onclick="_agendaNavMonth(-1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">◀</button>
    <div style="font-size:14px;font-weight:800;color:var(--gris-800);text-transform:capitalize">${firstDay.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</div>
    <button onclick="_agendaNavMonth(1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">▶</button>
  </div>`;

  // Header días
  const dayNames = ['L','M','X','J','V','S','D'];
  let grid = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;
  grid += dayNames.map(d => `<div style="font-size:10px;font-weight:700;color:var(--gris-400);padding:4px">${d}</div>`).join('');

  // Espacios vacíos antes del día 1
  for (let i = 1; i < startDow; i++) {
    grid += `<div></div>`;
  }

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const key = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isHoy = key === hoy;
    const partesDia = misPartes.filter(p => p.fecha === key && p.estado !== 'eliminado');
    const numPartes = partesDia.length;
    const dotColor = numPartes > 0 ? (partesDia.some(p => p.estado === 'en_curso') ? 'var(--acento)' : 'var(--azul)') : 'transparent';

    grid += `<div onclick="_agendaDate=new Date('${key}T12:00:00');_agendaView='dia';navigateTo('agenda')" style="padding:6px 2px;border-radius:8px;cursor:pointer;background:${isHoy?'var(--azul)':'transparent'};color:${isHoy?'#fff':'var(--gris-700)'}">
      <div style="font-size:13px;font-weight:${isHoy?'800':'600'}">${d}</div>
      <div style="width:6px;height:6px;border-radius:50%;background:${dotColor};margin:2px auto 0"></div>
    </div>`;
  }
  grid += '</div>';

  return navHtml + `<div class="card" style="padding:10px 12px">${grid}</div>`;
}

function _agendaNav(offset) {
  _agendaDate.setDate(_agendaDate.getDate() + offset);
  navigateTo('agenda');
}
function _agendaNavWeek(offset) {
  _agendaDate.setDate(_agendaDate.getDate() + (offset * 7));
  navigateTo('agenda');
}
function _agendaNavMonth(offset) {
  _agendaDate.setMonth(_agendaDate.getMonth() + offset);
  navigateTo('agenda');
}
function _getWeekNum(d) {
  const onejan = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7);
}

async function showDocTab(tipo) {
  document.querySelectorAll('#docsTabs .tab').forEach(t => t.classList.remove('active'));
  event?.target?.classList.add('active');
  const container = document.getElementById('docsContent');
  if (!container) return;

  try {
    let query;
    if (tipo === 'presupuestos') {
      query = sb.from('presupuestos').select('*').eq('empresa_id', EMPRESA.id).neq('estado','eliminado').order('created_at',{ascending:false}).limit(30);
    } else if (tipo === 'albaranes') {
      query = sb.from('albaranes').select('*').eq('empresa_id', EMPRESA.id).neq('estado','eliminado').order('created_at',{ascending:false}).limit(30);
    } else {
      query = sb.from('facturas').select('*').eq('empresa_id', EMPRESA.id).neq('estado','eliminado').order('created_at',{ascending:false}).limit(30);
    }
    const { data } = await query;
    const docs = data || [];

    if (!docs.length) {
      container.innerHTML = `<div class="empty-state"><div class="ico">${tipo==='presupuestos'?'📋':tipo==='albaranes'?'📄':'🧾'}</div><p>Sin ${tipo}</p></div>`;
      return;
    }

    container.innerHTML = docs.map(d => {
      const fecha = d.fecha ? new Date(d.fecha).toLocaleDateString('es-ES') : '—';
      const total = d.total != null ? d.total.toLocaleString('es-ES',{style:'currency',currency:'EUR'}) : '—';
      const estCol = d.estado==='aceptado'||d.estado==='cobrada'?'var(--verde)':d.estado==='pendiente'||d.estado==='vencida'?'var(--acento)':'var(--gris-400)';
      return `<div class="card" style="padding:12px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;font-size:13px;font-family:monospace;color:var(--azul)">${d.numero||'—'}</div>
            <div style="font-size:12px;color:var(--gris-500)">${d.cliente_nombre||'—'} · ${fecha}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:800;font-size:14px">${total}</div>
            <div style="font-size:11px;color:${estCol};font-weight:700">${(d.estado||'—').toUpperCase()}</div>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--rojo)">Error cargando</div>';
  }
}

function renderParteCard(p, showActions = false) {
  const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
  const fecha = p.fecha ? new Date(p.fecha).toLocaleDateString('es-ES',{day:'numeric',month:'short'}) : '—';
  const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '';
  const hf = p.hora_fin ? p.hora_fin.substring(0,5) : '';
  const horas = (parseFloat(p.horas)||0).toFixed(1);
  const operario = p.usuario_nombre || '—';

  // Acciones según estado (para operario)
  let actionHtml = '';
  if (showActions && !esJefe) {
    if (p.estado === 'programado') {
      actionHtml = `<div class="parte-actions">
        <button class="btn btn-sm" style="background:var(--acento);color:#fff" onclick="event.stopPropagation();iniciarParteConGPS(${p.id})">🔧 Iniciar</button>
      </div>`;
    } else if (p.estado === 'en_curso') {
      actionHtml = `<div class="parte-actions">
        <button class="btn btn-sm" style="background:var(--verde);color:#fff" onclick="event.stopPropagation();openInformarWizard(${p.id})">📋 Informar</button>
      </div>`;
    }
  } else if (showActions && esJefe) {
    // Jefe usa los mismos flujos completos que operario para iniciar/informar
    if (p.estado === 'programado') {
      actionHtml = `<div class="parte-actions">
        <button class="btn btn-sm" style="background:var(--acento);color:#fff" onclick="event.stopPropagation();iniciarParteConGPS(${p.id})">🔧 Iniciar</button>
      </div>`;
    } else if (p.estado === 'en_curso') {
      actionHtml = `<div class="parte-actions">
        <button class="btn btn-sm" style="background:var(--verde);color:#fff" onclick="event.stopPropagation();openInformarWizard(${p.id})">📋 Informar</button>
      </div>`;
    } else {
      const nextActions = {
        borrador:   {label:'📅 Programar', estado:'programado', bg:'#3B82F6'},
        completado: {label:'👁️ Revisar',   estado:'revisado',   bg:'#10B981'},
        revisado:   {label:'🧾 Facturar',  estado:'facturado',  bg:'#8B5CF6'},
      };
      const next = nextActions[p.estado];
      if (next) {
        actionHtml = `<div class="parte-actions">
          <button class="btn btn-sm" style="background:${next.bg};color:#fff" onclick="event.stopPropagation();cambiarEstado(${p.id},'${next.estado}')">${next.label}</button>
        </div>`;
      }
    }
  }

  // Color de fondo según estado y hora
  // Verde suave  → completado, revisado, facturado
  // Azul suave   → en curso
  // Blanco       → programado/borrador dentro de su horario
  // Amarillo     → programado pero ya pasó hora de INICIO
  // Rojo         → programado pero ya pasó hora de FIN (caducado)
  let cardBg = '#fff';
  let cardBorder = 'var(--gris-100)';
  if (['completado','revisado','facturado'].includes(p.estado)) {
    cardBg = '#F0FDF4'; cardBorder = '#BBF7D0'; // verde suave
  } else if (p.estado === 'en_curso') {
    cardBg = '#EFF6FF'; cardBorder = '#BFDBFE'; // azul suave
  } else if (p.estado === 'programado' || p.estado === 'borrador') {
    const ahora = new Date();
    const _a = ahora;
    const hoyStr = _a.getFullYear() + '-' + String(_a.getMonth()+1).padStart(2,'0') + '-' + String(_a.getDate()).padStart(2,'0');

    if (p.fecha && p.fecha < hoyStr) {
      // Día anterior sin completar → ROJO (caducado)
      cardBg = '#FEF2F2'; cardBorder = '#FECACA';
    } else if (p.fecha === hoyStr) {
      // Hoy: comprobar horas
      let pasoFin = false, pasoInicio = false;
      if (p.hora_fin) {
        const [hh, mm] = p.hora_fin.split(':').map(Number);
        const finDate = new Date(); finDate.setHours(hh, mm, 0, 0);
        if (ahora > finDate) pasoFin = true;
      }
      if (p.hora_inicio) {
        const [hh, mm] = p.hora_inicio.split(':').map(Number);
        const iniDate = new Date(); iniDate.setHours(hh, mm, 0, 0);
        if (ahora > iniDate) pasoInicio = true;
      }
      if (pasoFin) {
        // Ya pasó la hora de fin → ROJO (caducado)
        cardBg = '#FEF2F2'; cardBorder = '#FECACA';
      } else if (pasoInicio) {
        // Ya pasó la hora de inicio pero no la de fin → AMARILLO (retraso)
        cardBg = '#FFFBEB'; cardBorder = '#FDE68A';
      }
      // Si no pasó ninguna → blanco (dentro de hora)
    }
    // Fecha futura → blanco
  }

  // Borde izquierdo de color para refuerzo visual
  const _borderLeftColor = (['completado','revisado','facturado'].includes(p.estado)) ? '#22C55E'
    : p.estado === 'en_curso' ? '#3B82F6'
    : cardBg === '#FEF2F2' ? '#EF4444'
    : cardBg === '#FFFBEB' ? '#F59E0B'
    : 'transparent';

  return `<div class="parte-card" onclick="openParteDetail(${p.id})" style="background:${cardBg};border-color:${cardBorder};border-left:4px solid ${_borderLeftColor}">
    <div class="parte-row">
      <span class="parte-num">${p.numero||'—'}</span>
      <span class="badge" style="background:${est.bg};color:${est.color}">${est.ico} ${est.label}</span>
      ${p.direccion ? `<a href="https://maps.google.com/?q=${encodeURIComponent(p.direccion)}" target="_blank" onclick="event.stopPropagation()" style="margin-left:auto;background:#3B82F6;color:#fff;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;text-decoration:none">📍 GPS</a>` : ''}
    </div>
    ${hi ? `<div style="font-size:15px;font-weight:800;color:var(--azul);margin:8px 0">${hi}${hf?'-'+hf:''}</div>` : ''}
    ${p.direccion ? `<div style="font-size:12.5px;color:var(--gris-600);margin-bottom:6px">📍 ${p.direccion}</div>` : ''}
    ${p.trabajo_titulo ? `<div style="font-size:12px;color:var(--gris-500);margin-bottom:2px">🏗️ ${p.trabajo_titulo}</div>` : ''}
    <div class="parte-meta">${fecha} · ${horas}h</div>
    ${p.descripcion ? `<div class="parte-desc">${p.descripcion.substring(0,100)}${p.descripcion.length>100?'...':''}</div>` : ''}
    ${actionHtml}
  </div>`;
}


function renderTareaItem(t) {
  const done = t.estado === 'completada';
  const obraTitulo = trabajos.find(tr => tr.id === t.trabajo_id)?.titulo || '';
  const prio = {urgente:'🔺',alta:'▲',normal:'◆',baja:'▽'};
  return `<div class="tarea-item">
    <div class="tarea-check ${done?'done':''}" onclick="toggleTarea(${t.id}, ${done?'false':'true'})">
      ${done ? '✓' : ''}
    </div>
    <div style="flex:1;min-width:0">
      <div class="tarea-texto ${done?'done':''}">${prio[t.prioridad]||'◆'} ${t.texto||'—'}</div>
      ${obraTitulo ? `<div style="font-size:10.5px;color:var(--gris-400);margin-top:1px">🏗️ ${obraTitulo}</div>` : ''}
    </div>
  </div>`;
}
