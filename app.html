<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B4FD8">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Instalo App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --azul:#1B4FD8;--azul-dark:#1339A8;--azul-light:#EEF3FF;
  --verde:#16A34A;--verde-light:#DCFCE7;
  --rojo:#DC2626;--rojo-light:#FEE2E2;
  --amarillo:#D97706;--amarillo-light:#FEF3C7;
  --violeta:#7C3AED;--violeta-light:#EDE9FE;
  --acento:#F97316;
  --gris-50:#F8FAFC;--gris-100:#F1F5F9;--gris-200:#E2E8F0;
  --gris-300:#CBD5E1;--gris-400:#94A3B8;--gris-500:#64748B;
  --gris-600:#475569;--gris-700:#334155;--gris-800:#1E293B;--gris-900:#0F172A;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:var(--font);background:var(--gris-50);color:var(--gris-900);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:var(--azul);text-decoration:none}

/* ── SCREENS ── */
.screen{display:none;min-height:100dvh}
.screen.active{display:flex;flex-direction:column}

/* ── LOGIN ── */
#s-login{align-items:center;justify-content:center;background:linear-gradient(135deg,var(--azul-dark),var(--azul));padding:24px}
.login-card{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-card h1{text-align:center;font-size:22px;font-weight:800;color:var(--azul);margin-bottom:4px}
.login-card p{text-align:center;font-size:13px;color:var(--gris-400);margin-bottom:24px}
.login-card .logo{text-align:center;margin-bottom:16px;font-size:40px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--gris-600);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:15px;outline:none;transition:border .2s;font-family:var(--font)}
.field input:focus{border-color:var(--azul)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:10px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;width:100%}
.btn-primary{background:var(--azul);color:#fff}
.btn-primary:active{background:var(--azul-dark);transform:scale(.98)}
.btn-secondary{background:var(--gris-100);color:var(--gris-700)}
.btn-danger{background:var(--rojo);color:#fff}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px;width:auto}
.err{display:none;background:var(--rojo-light);color:var(--rojo);padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:12px;text-align:center}

/* ── APP SHELL ── */
#s-app{background:var(--gris-50)}
.app-header{position:sticky;top:0;z-index:100;background:#fff;padding:calc(var(--safe-top) + 8px) 16px 8px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px}
.app-header .avatar{width:36px;height:36px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.app-header .info{flex:1;min-width:0}
.app-header .info h2{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-header .info span{font-size:11px;color:var(--gris-400);font-weight:600}
.app-header .hdr-btn{width:36px;height:36px;border-radius:50%;background:var(--gris-100);border:none;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

.app-body{flex:1;padding:12px 16px;padding-bottom:calc(80px + var(--safe-bottom))}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gris-200);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.bottom-nav .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;gap:2px;cursor:pointer;border:none;background:none;color:var(--gris-400);font-family:var(--font);transition:color .2s}
.bottom-nav .nav-item.active{color:var(--azul)}
.bottom-nav .nav-item .ico{font-size:22px;line-height:1}
.bottom-nav .nav-item .lbl{font-size:10px;font-weight:700}
.bottom-nav .nav-item .badge{position:absolute;top:-2px;right:-6px;background:var(--rojo);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--gris-100)}
.card-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-title{font-size:13px;font-weight:800;color:var(--gris-500);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;padding-left:4px}

/* ── PARTE CARD ── */
.parte-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--gris-100);cursor:pointer;transition:box-shadow .2s}
.parte-card:active{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.parte-row{display:flex;align-items:center;gap:8px}
.parte-num{font-family:monospace;font-weight:700;font-size:13px;color:var(--azul)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700}
.parte-meta{font-size:11.5px;color:var(--gris-400);margin-top:4px}
.parte-desc{font-size:12.5px;color:var(--gris-600);margin-top:6px;line-height:1.4}
.parte-actions{display:flex;gap:8px;margin-top:10px}
.parte-actions .btn{flex:1}

/* ── TAREA ITEM ── */
.tarea-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--gris-100)}
.tarea-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--gris-300);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;font-size:12px}
.tarea-check.done{background:var(--verde);border-color:var(--verde);color:#fff}
.tarea-texto{flex:1;font-size:13px}
.tarea-texto.done{text-decoration:line-through;color:var(--gris-400)}

/* ── AGENDA ── */
.agenda-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--gris-100)}
.agenda-time{font-size:12px;font-weight:800;color:var(--azul);width:50px;flex-shrink:0;text-align:right}
.agenda-content{flex:1;min-width:0}
.agenda-title{font-size:13.5px;font-weight:700}
.agenda-sub{font-size:11.5px;color:var(--gris-400);margin-top:2px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85dvh;overflow-y:auto;padding:20px 16px calc(20px + var(--safe-bottom));animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--gris-300);border-radius:4px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:var(--radius);padding:14px;text-align:center;border:1px solid var(--gris-100)}
.stat-num{font-size:24px;font-weight:800}
.stat-label{font-size:11px;font-weight:600;color:var(--gris-400);margin-top:2px}

/* ── PROGRESS ── */
.progress-bar{height:8px;background:var(--gris-100);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--gris-400)}
.empty-state .ico{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ── TOAST ── */
.toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%);background:var(--gris-800);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}
.toast.success{background:var(--verde)}
.toast.error{background:var(--rojo)}
.toast.warning{background:var(--amarillo)}

/* ── JEFE: OPERARIO CARDS ── */
.operario-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--gris-100);display:flex;align-items:center;gap:12px;cursor:pointer}
.operario-card:active{background:var(--gris-50)}
.operario-av{width:42px;height:42px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.operario-info{flex:1;min-width:0}
.operario-name{font-size:14px;font-weight:700}
.operario-status{font-size:11.5px;margin-top:2px}

/* ── JEFE: TABS ── */
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap;border:none;background:var(--gris-100);color:var(--gris-500);cursor:pointer;transition:all .2s;font-family:var(--font)}
.tab.active{background:var(--azul);color:#fff}

/* ── PULL TO REFRESH ── */
.ptr-indicator{text-align:center;padding:8px;font-size:12px;color:var(--gris-400);display:none}

/* ── INSTALL BANNER ── */
.install-banner{background:linear-gradient(135deg,var(--azul),var(--violeta));color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;display:none}
.install-banner h3{font-size:14px;font-weight:800;margin-bottom:4px}
.install-banner p{font-size:12px;opacity:.8;margin-bottom:10px}
.install-banner .btn{background:rgba(255,255,255,.2);color:#fff;width:auto;padding:8px 16px}

/* ── WIZARD STEPPER ── */
.wiz-steps{display:flex;gap:4px;margin-bottom:20px}
.wiz-step{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:700;background:var(--gris-100);color:var(--gris-400);transition:all .3s}
.wiz-step.active{background:var(--azul);color:#fff}
.wiz-step.done{background:var(--verde-light);color:var(--verde)}
.wiz-nav{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--gris-200)}
.wiz-nav .btn{flex:1}

/* ── PHOTO GRID ── */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.foto-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--gris-100)}
.foto-thumb img{width:100%;height:100%;object-fit:cover}
.foto-thumb .del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.foto-add{aspect-ratio:1;border:2px dashed var(--gris-300);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--gris-400);font-size:12px;font-weight:700;gap:4px;transition:all .2s}
.foto-add:active{background:var(--gris-100);border-color:var(--azul)}

/* ── MATERIAL ROW ── */
.mat-row{display:flex;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--gris-100)}
.mat-row .mat-name{flex:1;min-width:0;font-size:13px;font-weight:600}
.mat-row .mat-qty{font-size:13px;font-weight:700;color:var(--azul)}
.mat-row .mat-del{background:none;border:none;font-size:16px;cursor:pointer;padding:4px}
.mat-search{position:relative}
.mat-search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--gris-200);border-radius:8px;max-height:200px;overflow-y:auto;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.1);display:none}
.mat-search-results.show{display:block}
.mat-search-item{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--gris-100);cursor:pointer}
.mat-search-item:active{background:var(--azul-light)}

/* ── SIGNATURE CANVAS ── */
.firma-container{border:2px solid var(--gris-200);border-radius:12px;overflow:hidden;background:#fff;touch-action:none;position:relative}
.firma-container canvas{width:100%;height:200px;display:block}
.firma-clear{position:absolute;top:8px;right:8px;background:var(--gris-100);border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer}
.firma-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--gris-300);font-size:14px;font-weight:600;pointer-events:none}
</style>
</head>
<body>

<!-- ═══════════ TOAST ═══════════ -->
<div id="appToast" class="toast"></div>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="s-login" class="screen active">
  <div class="login-card">
    <div class="logo">🔧</div>
    <h1>Instalo App</h1>
    <p>Accede a tu cuenta de trabajo</p>
    <div id="loginErr" class="err"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" id="btnLogin">Entrar</button>
  </div>
</div>

<!-- ═══════════ APP SCREEN ═══════════ -->
<div id="s-app" class="screen">
  <!-- Header -->
  <div class="app-header">
    <div class="avatar" id="hdrAvatar">J</div>
    <div class="info">
      <h2 id="hdrNombre">—</h2>
      <span id="hdrRol">—</span>
    </div>
    <button class="hdr-btn" onclick="doRefresh()" title="Actualizar">🔄</button>
    <button class="hdr-btn" onclick="doLogout()" title="Cerrar sesión">🚪</button>
  </div>

  <!-- Body (content rendered by JS) -->
  <div class="app-body" id="appBody"></div>

  <!-- Bottom Navigation (rendered by JS based on role) -->
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<!-- ═══════════ MODALS ═══════════ -->
<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// INSTALO MOBILE WEB APP
// ═══════════════════════════════════════════════════════════════

const SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdza2txcWhicG55Y3Z1aW9xZXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU1OTksImV4cCI6MjA5MDQ1MTU5OX0.4ArVhR9_qh6frtBrWZRRIssr3Zgavv41SdfOgyg27KE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ─── State ───
let CU = null, CP = null, EMPRESA = null;
let esJefe = false;
let currentTab = 'inicio';
let misPartes = [];
let misTareas = [];
let todosUsuarios = [];
let trabajos = [];
let clientes = [];
let articulos = [];

// Wizard state
let _wiz = { parteId:null, step:0, fotos:[], materiales:[], firmaData:null };

// ─── Estados de partes ───
const PT_ESTADOS = {
  borrador:   { label:'Borrador',   color:'#9CA3AF', bg:'#F3F4F6', ico:'✏️' },
  programado: { label:'Programado', color:'#3B82F6', bg:'#EFF6FF', ico:'📅' },
  en_curso:   { label:'En curso',   color:'#D97706', bg:'#FFFBEB', ico:'🔧' },
  completado: { label:'Completado', color:'#059669', bg:'#ECFDF5', ico:'✅' },
  revisado:   { label:'Revisado',   color:'#10B981', bg:'#D1FAE5', ico:'👁️' },
  facturado:  { label:'Facturado',  color:'#8B5CF6', bg:'#F5F3FF', ico:'🧾' },
};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  // Enter key on login
  document.getElementById('lPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('lEmail').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('lPass').focus(); });

  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    CU = session.user;
    await loadProfile();
    if (CP?.empresa_id) {
      await loadEmpresa(CP.empresa_id);
      showApp();
    } else {
      showScreen('s-login');
    }
  }
});

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'Completa todos los campos'; errEl.style.display = 'block'; return; }

  document.getElementById('btnLogin').textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  document.getElementById('btnLogin').textContent = 'Entrar';

  if (error) { errEl.textContent = 'Email o contraseña incorrectos'; errEl.style.display = 'block'; return; }

  CU = data.user;
  await loadProfile();
  if (!CP?.empresa_id) { errEl.textContent = 'Sin empresa asignada'; errEl.style.display = 'block'; return; }
  await loadEmpresa(CP.empresa_id);
  showApp();
}

async function doLogout() {
  await sb.auth.signOut();
  CU = null; CP = null; EMPRESA = null;
  showScreen('s-login');
}

async function loadProfile() {
  const { data } = await sb.from('perfiles').select('*').eq('id', CU.id).single();
  CP = data;
}

async function loadEmpresa(id) {
  const { data } = await sb.from('empresas').select('*').eq('id', id).single();
  EMPRESA = data;
}

// ═══════════════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════════════
async function showApp() {
  esJefe = CP?.es_superadmin === true;
  showScreen('s-app');

  // Header
  document.getElementById('hdrAvatar').textContent = (CP?.nombre || '?')[0].toUpperCase();
  document.getElementById('hdrNombre').textContent = CP?.nombre || CU.email;
  document.getElementById('hdrRol').textContent = esJefe ? '👑 Jefe · ' + (EMPRESA?.nombre||'') : '👷 Operario · ' + (EMPRESA?.nombre||'');

  // Bottom nav
  renderBottomNav();

  // Load data
  await loadAllData();
  navigateTo('inicio');
}

function renderBottomNav() {
  const nav = document.getElementById('bottomNav');
  if (esJefe) {
    nav.innerHTML = `
      <button class="nav-item active" data-tab="inicio" onclick="navigateTo('inicio')"><span class="ico">🏠</span><span class="lbl">Inicio</span></button>
      <button class="nav-item" data-tab="partes" onclick="navigateTo('partes')"><span class="ico">📝</span><span class="lbl">Partes</span></button>
      <button class="nav-item" data-tab="equipo" onclick="navigateTo('equipo')"><span class="ico">👥</span><span class="lbl">Equipo</span></button>
      <button class="nav-item" data-tab="docs" onclick="navigateTo('docs')"><span class="ico">📄</span><span class="lbl">Docs</span></button>
      <button class="nav-item" data-tab="mas" onclick="navigateTo('mas')"><span class="ico">⚙️</span><span class="lbl">Más</span></button>
    `;
  } else {
    nav.innerHTML = `
      <button class="nav-item active" data-tab="inicio" onclick="navigateTo('inicio')"><span class="ico">🏠</span><span class="lbl">Inicio</span></button>
      <button class="nav-item" data-tab="partes" onclick="navigateTo('partes')"><span class="ico">📝</span><span class="lbl">Mis partes</span></button>
      <button class="nav-item" data-tab="tareas" onclick="navigateTo('tareas')"><span class="ico">✅</span><span class="lbl">Tareas</span></button>
      <button class="nav-item" data-tab="agenda" onclick="navigateTo('agenda')"><span class="ico">📅</span><span class="lbl">Agenda</span></button>
    `;
  }
}

function navigateTo(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const body = document.getElementById('appBody');

  if (esJefe) {
    switch(tab) {
      case 'inicio': renderJefeInicio(body); break;
      case 'partes': renderJefePartes(body); break;
      case 'equipo': renderJefeEquipo(body); break;
      case 'docs': renderJefeDocs(body); break;
      case 'mas': renderJefeMas(body); break;
    }
  } else {
    switch(tab) {
      case 'inicio': renderOperarioInicio(body); break;
      case 'partes': renderOperarioPartes(body); break;
      case 'tareas': renderOperarioTareas(body); break;
      case 'agenda': renderOperarioAgenda(body); break;
    }
  }
}

// ═══════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════
async function loadAllData() {
  if (!EMPRESA) return;
  const eid = EMPRESA.id;

  try {
    const promises = [
      sb.from('partes_trabajo').select('*').eq('empresa_id', eid).neq('estado','eliminado').order('fecha',{ascending:false}).limit(100),
      sb.from('perfiles').select('*').eq('empresa_id', eid).eq('activo', true),
      sb.from('trabajos').select('*').eq('empresa_id', eid).neq('estado','eliminado').order('created_at',{ascending:false}),
      sb.from('clientes').select('*').eq('empresa_id', eid).order('nombre'),
      sb.from('articulos').select('id,codigo,nombre,precio_venta,unidad').eq('empresa_id', eid).eq('activo', true).order('nombre'),
    ];

    // Jefe: cargar tareas de todas las obras; Operario: solo sus tareas
    if (esJefe) {
      promises.push(sb.from('tareas_obra').select('*').eq('empresa_id', eid).neq('estado','rechazada').order('created_at',{ascending:false}).limit(200));
    } else {
      promises.push(sb.from('tareas_obra').select('*').eq('empresa_id', eid).eq('responsable_id', CU.id).neq('estado','rechazada').order('created_at',{ascending:false}).limit(100));
    }

    const [partesR, usersR, trabR, cliR, artR, tareasR] = await Promise.all(promises);

    const allPartes = partesR.data || [];
    todosUsuarios = usersR.data || [];
    trabajos = trabR.data || [];
    clientes = cliR.data || [];
    articulos = artR.data || [];
    const allTareas = tareasR.data || [];

    if (esJefe) {
      misPartes = allPartes;
      misTareas = allTareas;
    } else {
      misPartes = allPartes.filter(p => p.usuario_id === CU.id);
      misTareas = allTareas;
    }
  } catch(e) {
    console.error('Error loading data:', e);
    toast('Error cargando datos', 'error');
  }
}

async function doRefresh() {
  toast('Actualizando...', '');
  await loadAllData();
  navigateTo(currentTab);
  toast('Actualizado ✓', 'success');
}

        <div class="stat-label">Pendientes</div>
      </div>

    ` : ''}

    ${partesHoy.length ? `

function renderOperarioPartes(el) {
  const activos = misPartes.filter(p => ['programado','en_curso','borrador'].includes(p.estado));
  const completados = misPartes.filter(p => ['completado','revisado','facturado'].includes(p.estado));

  el.innerHTML = `
    <div class="section-title">📝 Partes activos (${activos.length})</div>
    ${activos.length ? activos.map(p => renderParteCard(p, true)).join('') : '<div class="empty-state"><div class="ico">✨</div><p>Sin partes activos</p></div>'}

      ${completados.slice(0,10).map(p => renderParteCard(p)).join('')}

  `;
}

function renderOperarioTareas(el) {
  const pendientes = misTareas.filter(t => t.estado !== 'completada');
  const hechas = misTareas.filter(t => t.estado === 'completada');
  const total = misTareas.length;
  const porcent = total ? Math.round((hechas.length / total) * 100) : 0;

  el.innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700">${hechas.length} de ${total} completadas</span>
        <span style="font-size:14px;font-weight:800;color:${porcent===100?'var(--verde)':'var(--azul)'}">${porcent}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${porcent}%;background:${porcent===100?'var(--verde)':'var(--azul)'}"></div></div>
    </div>

    ${pendientes.length ? `
      <div class="section-title">📋 Pendientes</div>
      <div class="card">${pendientes.map(t => renderTareaItem(t)).join('')}</div>
    ` : ''}

      <div class="section-title" style="opacity:.6">✅ Completadas</div>
      <div class="card" style="opacity:.7">${hechas.slice(0,10).map(t => renderTareaItem(t)).join('')}</div>
    ` : ''}

    ${!total ? '<div class="empty-state"><div class="ico">✅</div><p>Sin tareas asignadas</p></div>' : ''}
  `;
}

function renderOperarioAgenda(el) {
  const hoy = new Date().toISOString().split('T')[0];
  // Próximos 7 días
  const dias = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const key = d.toISOString().split('T')[0];
    const partesDia = misPartes.filter(p => p.fecha === key && p.estado !== 'eliminado');
    if (partesDia.length || i === 0) {
      dias.push({ fecha: d, key, partes: partesDia });
    }
  }

  el.innerHTML = `
    <div class="section-title">📅 Mi agenda — próximos 7 días</div>
    ${dias.map(d => `
      <div class="card">
        <div style="font-size:13px;font-weight:800;color:${d.key===hoy?'var(--azul)':'var(--gris-700)'};margin-bottom:8px">
          ${d.key === hoy ? '🔵 HOY' : ''} ${d.fecha.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short'})}
        </div>
        ${d.partes.length ? d.partes.map(p => {
          const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '—';
          const hf = p.hora_fin ? p.hora_fin.substring(0,5) : '—';
          const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
          return `<div class="agenda-item" onclick="openParteDetail(${p.id})">
            <div class="agenda-time">${hi}</div>
            <div class="agenda-content">
              <div class="agenda-title">${p.trabajo_titulo || 'Sin obra'}</div>
              <div class="agenda-sub">${hi}-${hf} · ${est.ico} ${est.label}</div>
              ${p.direccion ? `<div class="agenda-sub">📍 ${p.direccion}</div>` : ''}
            </div>
          </div>`;
        }).join('') : '<div style="padding:8px 0;font-size:12.5px;color:var(--gris-400)">Sin trabajos programados</div>'}
      </div>
    `).join('')}
  `;
}

async function showDocTab(tipo) {
  document.querySelectorAll('#docsTabs .tab').forEach(t => t.classList.remove('active'));
  event?.target?.classList.add('active');
  const container = document.getElementById('docsContent');
  if (!container) return;

  try {
    let query;
    if (tipo === 'presupuestos') {
      query = sb.from('presupuestos').select('*').eq('empresa_id', EMPRESA.id).neq('estado','eliminado').order('created_at',{ascending:false}).limit(30);
    } else if (tipo === 'albaranes') {
      query = sb.from('albaranes').select('*').eq('empresa_id', EMPRESA.id).neq('estado','eliminado').order('created_at',{ascending:false}).limit(30);
    } else {
      query = sb.from('facturas').select('*').eq('empresa_id', EMPRESA.id).neq('estado','eliminado').order('created_at',{ascending:false}).limit(30);
    }
    const { data } = await query;
    const docs = data || [];

    if (!docs.length) {
      container.innerHTML = `<div class="empty-state"><div class="ico">${tipo==='presupuestos'?'📋':tipo==='albaranes'?'📄':'🧾'}</div><p>Sin ${tipo}</p></div>`;
      return;
    }

    container.innerHTML = docs.map(d => {
      const fecha = d.fecha ? new Date(d.fecha).toLocaleDateString('es-ES') : '—';
      const total = d.total != null ? d.total.toLocaleString('es-ES',{style:'currency',currency:'EUR'}) : '—';
      const estCol = d.estado==='aceptado'||d.estado==='cobrada'?'var(--verde)':d.estado==='pendiente'||d.estado==='vencida'?'var(--acento)':'var(--gris-400)';
      return `<div class="card" style="padding:12px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;font-size:13px;font-family:monospace;color:var(--azul)">${d.numero||'—'}</div>
            <div style="font-size:12px;color:var(--gris-500)">${d.cliente_nombre||'—'} · ${fecha}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:800;font-size:14px">${total}</div>
            <div style="font-size:11px;color:${estCol};font-weight:700">${(d.estado||'—').toUpperCase()}</div>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--rojo)">Error cargando</div>';
  }
}

      Instalo ERP · App móvil v1.0
    </div>
  `;
}

// SHARED COMPONENTS
// ═══════════════════════════════════════════════

function renderParteCard(p, showActions = false) {
  const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
  const fecha = p.fecha ? new Date(p.fecha).toLocaleDateString('es-ES',{day:'numeric',month:'short'}) : '—';
  const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '';
  const hf = p.hora_fin ? p.hora_fin.substring(0,5) : '';
  const horas = (parseFloat(p.horas)||0).toFixed(1);
  const operario = p.usuario_nombre || '—';

  const nextActions = {
    borrador:   {label:'📅 Programar', estado:'programado', bg:'#3B82F6'},
    programado: {label:'🔧 Iniciar',   estado:'en_curso',   bg:'var(--acento)'},
    en_curso:   {label:'✅ Completar', estado:'completado', bg:'var(--verde)'},
    completado: {label:'👁️ Revisar',   estado:'revisado',   bg:'#10B981'},
    revisado:   {label:'🧾 Facturar',  estado:'facturado',  bg:'#8B5CF6'},
  };
  const next = nextActions[p.estado];

  return `<div class="parte-card" onclick="openParteDetail(${p.id})">
    <div class="parte-row">
      <span class="parte-num">${p.numero||'—'}</span>
      <span class="badge" style="background:${est.bg};color:${est.color}">${est.ico} ${est.label}</span>
      ${p.direccion ? `<a href="https://maps.google.com/?q=${encodeURIComponent(p.direccion)}" target="_blank" onclick="event.stopPropagation()" style="margin-left:auto;background:#3B82F6;color:#fff;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;text-decoration:none">📍 GPS</a>` : ''}
    </div>
    <div class="parte-meta">${fecha} · ${hi}${hf?'-'+hf:''} · ${horas}h · ${operario}</div>
    ${p.trabajo_titulo ? `<div style="font-size:12px;color:var(--gris-600);margin-top:2px">🏗️ ${p.trabajo_titulo}</div>` : ''}
    ${p.descripcion ? `<div class="parte-desc">${p.descripcion.substring(0,120)}${p.descripcion.length>120?'...':''}</div>` : ''}
    ${showActions && next ? `
      <div class="parte-actions">
        <button class="btn btn-sm" style="background:${next.bg};color:#fff" onclick="event.stopPropagation();cambiarEstado(${p.id},'${next.estado}')">${next.label}</button>
        <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openParteDetail(${p.id})">👁️ Ver</button>
      </div>
    ` : ''}
  </div>`;
}

function renderTareaItem(t) {
  const done = t.estado === 'completada';
  const obraTitulo = trabajos.find(tr => tr.id === t.trabajo_id)?.titulo || '';
  const prio = {urgente:'🔺',alta:'▲',normal:'◆',baja:'▽'};
  return `<div class="tarea-item">
    <div class="tarea-check ${done?'done':''}" onclick="toggleTarea(${t.id}, ${done?'false':'true'})">
      ${done ? '✓' : ''}
    </div>
    <div style="flex:1;min-width:0">
      <div class="tarea-texto ${done?'done':''}">${prio[t.prioridad]||'◆'} ${t.texto||'—'}</div>
      ${obraTitulo ? `<div style="font-size:10.5px;color:var(--gris-400);margin-top:1px">🏗️ ${obraTitulo}</div>` : ''}
    </div>
  </div>`;
}

      <div><div style="font-size:10px;font-weight:700;color:var(--gris-500);text-transform:uppercase">Horario</div><div style="font-size:14px;font-weight:700">${hi} - ${hf}</div></div>

// ═══════════════════════════════════════════════════════════════
// WIZARD: COMPLETAR PARTE (paso a paso)
// Pasos: 1) Descripción  2) Fotos  3) Materiales  4) Firma
// ═══════════════════════════════════════════════════════════════

const WIZ_STEPS = [
  { id:'desc',  ico:'📝', label:'Descripción' },
  { id:'fotos', ico:'📷', label:'Fotos' },
  { id:'mat',   ico:'🔧', label:'Materiales' },
  { id:'firma', ico:'✍️', label:'Firma' },
];

function openCompletarWizard(id) {
  const p = misPartes.find(x => x.id === id);
  if (!p) return;
  _wiz = {
    parteId: id,
    step: 0,
    desc: p.descripcion || '',
    pendientes: p.trabajos_pendientes || '',
    observaciones: p.observaciones || '',
    fotos: p.fotos ? [...p.fotos] : [],
    fotosNuevas: [], // base64 de fotos nuevas
    materiales: p.materiales ? [...p.materiales] : [],
    firmaData: null,
    clienteEmail: p.cliente_email || '',
    clienteNombre: p.cliente_nombre_firma || '',
  };
  renderWizStep();
}

function renderWizStep() {
  const p = misPartes.find(x => x.id === _wiz.parteId);
  if (!p) return;
  const step = _wiz.step;
  const isLast = step === WIZ_STEPS.length - 1;

  // Stepper
  const stepper = WIZ_STEPS.map((s, i) => {
    const cls = i === step ? 'active' : (i < step ? 'done' : '');
    return `<div class="wiz-step ${cls}">${i < step ? '✓' : s.ico}<br>${s.label}</div>`;
  }).join('');

  let content = '';

  // ── STEP 1: Descripción ──
  if (step === 0) {
    content = `
      <div class="field">
        <label>🔧 Trabajo realizado *</label>
        <textarea id="wz_desc" rows="4" placeholder="Describe el trabajo que has realizado..." style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${_wiz.desc}</textarea>
      </div>
      <div class="field">
        <label>⚠️ Trabajos pendientes</label>
        <textarea id="wz_pend" rows="2" placeholder="¿Queda algo por hacer?" style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${_wiz.pendientes}</textarea>
      </div>
      <div class="field">
        <label>📝 Observaciones</label>
        <textarea id="wz_obs" rows="2" placeholder="Notas adicionales..." style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${_wiz.observaciones}</textarea>
      </div>
    `;
  }

  // ── STEP 2: Fotos ──
  if (step === 1) {
    const allFotos = [..._wiz.fotos, ..._wiz.fotosNuevas];
    content = `
      <div style="margin-bottom:12px">
        <p style="font-size:13px;color:var(--gris-500)">Añade fotos del trabajo realizado. Puedes usar la cámara o seleccionar de la galería.</p>
      </div>
      <div class="foto-grid">
        ${allFotos.map((f, i) => `
          <div class="foto-thumb">
            <img src="${typeof f === 'object' ? f.data : f}" alt="Foto ${i+1}">
            <button class="del" onclick="wizRemoveFoto(${i})">✕</button>
          </div>
        `).join('')}
        <div class="foto-add" onclick="document.getElementById('wz_foto_input').click()">
          <span style="font-size:28px">📷</span>
          Añadir foto
        </div>
      </div>
      <input type="file" id="wz_foto_input" accept="image/*" capture="environment" multiple style="display:none" onchange="wizAddFotos(this.files)">
      <p style="font-size:11px;color:var(--gris-400);text-align:center">${allFotos.length} foto${allFotos.length!==1?'s':''}</p>
    `;
  }

  // ── STEP 3: Materiales ──
  if (step === 2) {
    content = `
      <div style="margin-bottom:12px">
        <p style="font-size:13px;color:var(--gris-500)">Añade los materiales utilizados. Busca en el catálogo o escribe manualmente.</p>
      </div>
      <div class="mat-search" style="margin-bottom:12px">
        <input id="wz_mat_buscar" type="text" placeholder="🔍 Buscar artículo o escribir nombre..."
          style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font)"
          oninput="wizSearchMat(this.value)" onfocus="wizSearchMat(this.value)">
        <div id="wz_mat_results" class="mat-search-results"></div>
      </div>
      <div id="wz_mat_list">
        ${_wiz.materiales.length ? _wiz.materiales.map((m, i) => renderWizMatRow(m, i)).join('') : '<div style="text-align:center;padding:16px;color:var(--gris-400);font-size:13px">Sin materiales añadidos</div>'}
      </div>
      <div style="margin-top:12px;padding:12px;background:var(--gris-50);border-radius:8px;display:flex;justify-content:space-between">
        <span style="font-weight:700;font-size:13px">Total materiales:</span>
        <span style="font-weight:800;font-size:14px">${_wiz.materiales.reduce((s,m) => s + (parseFloat(m.total)||0), 0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
      </div>
    `;
  }

  // ── STEP 4: Firma ──
  if (step === 3) {
    content = `
      <div style="margin-bottom:12px">
        <p style="font-size:13px;color:var(--gris-500)">El cliente debe firmar para confirmar el trabajo realizado.</p>
      </div>
      <div class="field">
        <label>Nombre del cliente / receptor</label>
        <input id="wz_cli_nombre" type="text" placeholder="Nombre completo" value="${_wiz.clienteNombre}"
          style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font)">
      </div>
      <div class="field">
        <label>📧 Email (para enviar copia del parte)</label>
        <input id="wz_cli_email" type="email" placeholder="email@ejemplo.com" value="${_wiz.clienteEmail}"
          style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font)">
      </div>
      <label style="display:block;font-size:12px;font-weight:700;color:var(--gris-600);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">✍️ Firma del cliente *</label>
      <div class="firma-container" id="firmaContainer">
        <canvas id="firmaCanvas" width="600" height="400"></canvas>
        <div class="firma-placeholder" id="firmaPlaceholder">Firme aquí con el dedo</div>
        <button class="firma-clear" onclick="wizClearFirma()">🗑️ Borrar</button>
      </div>
      ${_wiz.firmaData ? '<div style="margin-top:8px;font-size:12px;color:var(--verde);font-weight:700;text-align:center">✓ Firma capturada</div>' : ''}
    `;
  }

  // Render todo
  document.getElementById('modalContent').innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-size:16px;font-weight:800;margin-bottom:4px">✅ Completar parte ${p.numero}</div>
      <div style="font-size:12px;color:var(--gris-400)">${p.trabajo_titulo||''}</div>
    </div>
    <div class="wiz-steps">${stepper}</div>
    ${content}
    <div class="wiz-nav">
      ${step > 0 ? `<button class="btn btn-secondary" onclick="wizPrev()">← Anterior</button>` : `<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>`}
      ${isLast
        ? `<button class="btn btn-primary" style="background:var(--verde)" onclick="wizFinish()">✅ Completar y firmar</button>`
        : `<button class="btn btn-primary" onclick="wizNext()">Siguiente →</button>`}
    </div>
  `;
  openModal();

  // Init firma canvas si estamos en paso 4
  if (step === 3) {
    setTimeout(() => initFirmaCanvas(), 100);
  }

  // Cerrar búsqueda materiales al hacer click fuera
  if (step === 2) {
    setTimeout(() => {
      document.addEventListener('click', _closeMaterialSearch);
    }, 100);
  }
}

function _closeMaterialSearch(e) {
  if (!e.target.closest('.mat-search')) {
    const r = document.getElementById('wz_mat_results');
    if (r) r.classList.remove('show');
  }
}

function wizSaveCurrentStep() {
  if (_wiz.step === 0) {
    _wiz.desc = document.getElementById('wz_desc')?.value || '';
    _wiz.pendientes = document.getElementById('wz_pend')?.value || '';
    _wiz.observaciones = document.getElementById('wz_obs')?.value || '';
  }
  if (_wiz.step === 3) {
    _wiz.clienteNombre = document.getElementById('wz_cli_nombre')?.value || '';
    _wiz.clienteEmail = document.getElementById('wz_cli_email')?.value || '';
    // Capturar firma si hay algo dibujado
    const canvas = document.getElementById('firmaCanvas');
    if (canvas && _firmaHasTouched) {
      _wiz.firmaData = canvas.toDataURL('image/png');
    }
  }
}

function wizNext() {
  wizSaveCurrentStep();
  // Validar paso actual
  if (_wiz.step === 0 && !_wiz.desc.trim()) {
    toast('Describe el trabajo realizado', 'error'); return;
  }
  document.removeEventListener('click', _closeMaterialSearch);
  _wiz.step++;
  renderWizStep();
}

function wizPrev() {
  wizSaveCurrentStep();
  document.removeEventListener('click', _closeMaterialSearch);
  _wiz.step--;
  renderWizStep();
}

// ── FOTOS ──
function wizAddFotos(files) {
  Array.from(files).forEach(f => {
    const reader = new FileReader();
    reader.onload = (e) => {
      _wiz.fotosNuevas.push({ data: e.target.result, name: f.name });
      renderWizStep();
    };
    reader.readAsDataURL(f);
  });
}

function wizRemoveFoto(idx) {
  const existentes = _wiz.fotos.length;
  if (idx < existentes) {
    _wiz.fotos.splice(idx, 1);
  } else {
    _wiz.fotosNuevas.splice(idx - existentes, 1);
  }
  renderWizStep();
}

// ── MATERIALES ──
function wizSearchMat(q) {
  const results = document.getElementById('wz_mat_results');
  if (!results) return;
  q = q.trim().toLowerCase();
  if (q.length < 1) { results.classList.remove('show'); return; }

  // Buscar en catálogo
  const matches = articulos.filter(a =>
    (a.nombre||'').toLowerCase().includes(q) || (a.codigo||'').toLowerCase().includes(q)
  ).slice(0, 8);

  let html = matches.map(a => `
    <div class="mat-search-item" onclick="wizAddMatFromCatalog(${a.id})">
      <div style="font-weight:700;font-size:13px">${a.nombre||''}</div>
      <div style="font-size:11px;color:var(--gris-400)">${a.codigo||''} · ${(a.precio_venta||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})} · ${a.unidad||'ud'}</div>
    </div>
  `).join('');

  // Opción de añadir manualmente
  html += `<div class="mat-search-item" style="background:var(--azul-light);font-weight:700;color:var(--azul)" onclick="wizAddMatManual()">
    ➕ Añadir "${q}" manualmente
  </div>`;

  results.innerHTML = html;
  results.classList.add('show');
}

function wizAddMatFromCatalog(artId) {
  const a = articulos.find(x => x.id === artId);
  if (!a) return;
  _wiz.materiales.push({
    articulo_id: a.id,
    nombre: a.nombre,
    codigo: a.codigo,
    cantidad: 1,
    precio: a.precio_venta || 0,
    unidad: a.unidad || 'ud',
    total: a.precio_venta || 0,
  });
  document.getElementById('wz_mat_buscar').value = '';
  document.getElementById('wz_mat_results').classList.remove('show');
  renderWizStep();
}

function wizAddMatManual() {
  const input = document.getElementById('wz_mat_buscar');
  const nombre = input?.value?.trim() || 'Material';
  _wiz.materiales.push({
    articulo_id: null,
    nombre: nombre,
    codigo: '',
    cantidad: 1,
    precio: 0,
    unidad: 'ud',
    total: 0,
  });
  input.value = '';
  document.getElementById('wz_mat_results').classList.remove('show');
  renderWizStep();
}

function renderWizMatRow(m, idx) {
  return `<div class="mat-row">
    <div class="mat-name">${m.nombre}${m.codigo ? ` <span style="color:var(--gris-400);font-size:10px">(${m.codigo})</span>` : ''}</div>
    <input type="number" value="${m.cantidad}" min="0.01" step="0.01"
      style="width:60px;padding:6px;border:1px solid var(--gris-200);border-radius:6px;text-align:center;font-size:13px;font-family:var(--font)"
      onchange="wizUpdateMatQty(${idx},this.value)">
    <span style="font-size:11px;color:var(--gris-400)">${m.unidad||'ud'}</span>
    <input type="number" value="${m.precio}" min="0" step="0.01"
      style="width:70px;padding:6px;border:1px solid var(--gris-200);border-radius:6px;text-align:right;font-size:13px;font-family:var(--font)"
      onchange="wizUpdateMatPrice(${idx},this.value)">
    <span style="font-size:11px;color:var(--gris-400)">€</span>
    <span class="mat-qty">${(parseFloat(m.total)||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
    <button class="mat-del" onclick="wizRemoveMat(${idx})">🗑️</button>
  </div>`;
}

function wizUpdateMatQty(idx, val) {
  const m = _wiz.materiales[idx];
  if (!m) return;
  m.cantidad = parseFloat(val) || 0;
  m.total = m.cantidad * (m.precio || 0);
  renderWizStep();
}

function wizUpdateMatPrice(idx, val) {
  const m = _wiz.materiales[idx];
  if (!m) return;
  m.precio = parseFloat(val) || 0;
  m.total = (m.cantidad || 0) * m.precio;
  renderWizStep();
}

function wizRemoveMat(idx) {
  _wiz.materiales.splice(idx, 1);
  renderWizStep();
}

// ── FIRMA DIGITAL ──
let _firmaCtx = null;
let _firmaDrawing = false;
let _firmaHasTouched = false;

function initFirmaCanvas() {
  const canvas = document.getElementById('firmaCanvas');
  if (!canvas) return;
  const container = canvas.parentElement;
  // Ajustar tamaño real al contenedor
  canvas.width = container.offsetWidth;
  canvas.height = 200;
  _firmaCtx = canvas.getContext('2d');
  _firmaCtx.strokeStyle = '#1E293B';
  _firmaCtx.lineWidth = 2.5;
  _firmaCtx.lineCap = 'round';
  _firmaCtx.lineJoin = 'round';
  _firmaDrawing = false;
  _firmaHasTouched = false;

  // Si ya hay firma guardada, restaurar
  if (_wiz.firmaData) {
    const img = new Image();
    img.onload = () => { _firmaCtx.drawImage(img, 0, 0, canvas.width, canvas.height); _firmaHasTouched = true; };
    img.src = _wiz.firmaData;
    document.getElementById('firmaPlaceholder').style.display = 'none';
  }

  // Touch events
  canvas.addEventListener('touchstart', firmaStart, { passive: false });
  canvas.addEventListener('touchmove', firmaMove, { passive: false });
  canvas.addEventListener('touchend', firmaEnd);
  // Mouse fallback
  canvas.addEventListener('mousedown', firmaStart);
  canvas.addEventListener('mousemove', firmaMove);
  canvas.addEventListener('mouseup', firmaEnd);
  canvas.addEventListener('mouseleave', firmaEnd);
}

function _firmaPos(e) {
  const canvas = document.getElementById('firmaCanvas');
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function firmaStart(e) {
  e.preventDefault();
  _firmaDrawing = true;
  _firmaHasTouched = true;
  document.getElementById('firmaPlaceholder').style.display = 'none';
  const pos = _firmaPos(e);
  _firmaCtx.beginPath();
  _firmaCtx.moveTo(pos.x, pos.y);
}

function firmaMove(e) {
  if (!_firmaDrawing) return;
  e.preventDefault();
  const pos = _firmaPos(e);
  _firmaCtx.lineTo(pos.x, pos.y);
  _firmaCtx.stroke();
}

function firmaEnd(e) {
  _firmaDrawing = false;
}

function wizClearFirma() {
  const canvas = document.getElementById('firmaCanvas');
  if (canvas && _firmaCtx) {
    _firmaCtx.clearRect(0, 0, canvas.width, canvas.height);
    _firmaHasTouched = false;
    _wiz.firmaData = null;
    document.getElementById('firmaPlaceholder').style.display = 'flex';
  }
}

// ── FINALIZAR WIZARD ──
async function wizFinish() {
  wizSaveCurrentStep();

  // Validar firma
  if (!_wiz.firmaData && !_firmaHasTouched) {
    toast('El cliente debe firmar', 'error'); return;
  }
  // Capturar firma final
  const canvas = document.getElementById('firmaCanvas');
  if (canvas && _firmaHasTouched) {
    _wiz.firmaData = canvas.toDataURL('image/png');
  }
  if (!_wiz.firmaData) {
    toast('El cliente debe firmar', 'error'); return;
  }

  toast('Guardando...', '');

  const id = _wiz.parteId;

  // 1. Subir fotos nuevas a Supabase Storage
  let fotosUrls = [..._wiz.fotos]; // URLs existentes
  for (const foto of _wiz.fotosNuevas) {
    try {
      const blob = await (await fetch(foto.data)).blob();
      const filename = `${EMPRESA.id}/${Date.now()}_${Math.random().toString(36).substr(2,9)}.jpg`;
      const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
      if (!error) {
        const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
        fotosUrls.push(data.publicUrl);
      }
    } catch(e) { console.error('Error subiendo foto:', e); }
  }

  // 2. Subir firma
  let firmaUrl = null;
  try {
    const blob = await (await fetch(_wiz.firmaData)).blob();
    const filename = `${EMPRESA.id}/${Date.now()}_firma.png`;
    const { error } = await sb.storage.from('fotos-partes').upload(filename, blob);
    if (!error) {
      const { data } = sb.storage.from('fotos-partes').getPublicUrl(filename);
      firmaUrl = data.publicUrl;
    }
  } catch(e) { console.error('Error subiendo firma:', e); }

  // 3. Guardar todo en el parte
  const updateObj = {
    estado: 'completado',
    completado_at: new Date().toISOString(),
    descripcion: _wiz.desc || null,
    trabajos_pendientes: _wiz.pendientes || null,
    observaciones: _wiz.observaciones || null,
    fotos: fotosUrls.length > 0 ? fotosUrls : null,
    materiales: _wiz.materiales.length > 0 ? _wiz.materiales : null,
    firma_url: firmaUrl,
    cliente_nombre_firma: _wiz.clienteNombre || null,
    cliente_email: _wiz.clienteEmail || null,
  };

  const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
  if (error) {
    toast('Error: ' + error.message, 'error');
    return;
  }

  // Actualizar local
  const p = misPartes.find(x => x.id === id);
  if (p) Object.assign(p, updateObj);

  toast('✅ Parte completado y firmado', 'success');
  closeModal();
  document.removeEventListener('click', _closeMaterialSearch);
  navigateTo(currentTab);

  // 4. Enviar email al cliente (si hay email)
  if (_wiz.clienteEmail) {
    enviarEmailParte(id, _wiz.clienteEmail);
  }
}

// ── ENVIAR EMAIL (via Supabase Edge Function) ──
async function enviarEmailParte(parteId, email) {
  try {
    const { data, error } = await sb.functions.invoke('enviar-parte-email', {
      body: { parteId, email, empresaId: EMPRESA.id }
    });
    if (error) { console.error('Error enviando email:', error); }
    else { toast('📧 Copia enviada a ' + email, 'success'); }
  } catch(e) {
    console.warn('Edge Function no disponible aún:', e.message);
    toast('📧 Email pendiente (Edge Function no configurada)', 'warning');
  }
}

// ── ADD WORK INFO (acceso rápido sin wizard completo) ──
function openAddWorkInfo(id) {
  const p = misPartes.find(x => x.id === id);
  if (!p) return;

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-title">✏️ Info del trabajo — ${p.numero}</div>
    <div class="field">
      <label>Trabajo realizado</label>
      <textarea id="wi_desc" rows="4" style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${p.descripcion||''}</textarea>
    </div>
    <div class="field">
      <label>Trabajos pendientes</label>
      <textarea id="wi_pend" rows="3" style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${p.trabajos_pendientes||''}</textarea>
    </div>
    <div class="field">
      <label>Observaciones</label>
      <textarea id="wi_obs" rows="2" style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${p.observaciones||''}</textarea>
    </div>
    <button class="btn btn-primary" onclick="saveWorkInfo(${id})" style="margin-top:8px">💾 Guardar</button>
  `;
}

async function saveWorkInfo(id) {
  const desc = document.getElementById('wi_desc')?.value || '';
  const pend = document.getElementById('wi_pend')?.value || '';
  const obs = document.getElementById('wi_obs')?.value || '';

  const { error } = await sb.from('partes_trabajo').update({
    descripcion: desc || null,
    trabajos_pendientes: pend || null,
    observaciones: obs || null,
  }).eq('id', id);

  if (error) { toast('Error: ' + error.message, 'error'); return; }

  const p = misPartes.find(x => x.id === id);
  if (p) { p.descripcion = desc; p.trabajos_pendientes = pend; p.observaciones = obs; }

  toast('Guardado ✓', 'success');
  closeModal();
  navigateTo(currentTab);
}

      <div class="operario-av" style="width:50px;height:50px;font-size:20px">${(op.nombre||'?')[0].toUpperCase()}</div>
      <div>
        <div style="font-size:18px;font-weight:800">${op.nombre||''} ${op.apellidos||''}</div>
        <div style="font-size:12px;color:var(--gris-400)">${op.email||''} · ${op.telefono||''}</div>
      </div>
    </div>

    <div class="section-title">📝 Últimos partes</div>
    ${partesOp.length ? partesOp.map(p => {
      const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
      const fecha = p.fecha ? new Date(p.fecha).toLocaleDateString('es-ES',{day:'numeric',month:'short'}) : '—';
      return `<div style="padding:8px 0;border-bottom:1px solid var(--gris-100);cursor:pointer" onclick="closeModal();setTimeout(()=>openParteDetail(${p.id}),300)">

          <span style="font-family:monospace;font-weight:700;font-size:12px;color:var(--azul)">${p.numero||'—'}</span>
          <span class="badge" style="background:${est.bg};color:${est.color};font-size:9px">${est.ico} ${est.label}</span>
        </div>
        <div style="font-size:11px;color:var(--gris-400)">${fecha} · ${p.trabajo_titulo||'—'} · ${(parseFloat(p.horas)||0).toFixed(1)}h</div>
      </div>`;
    }).join('') : '<div style="padding:12px 0;color:var(--gris-400);font-size:13px">Sin partes</div>'}

    ${tareasOp.length ? `
      <div class="section-title" style="margin-top:16px">✅ Tareas asignadas</div>
      ${tareasOp.slice(0,10).map(t => renderTareaItem(t)).join('')}
    ` : ''}
  `;

}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════

async function cambiarEstado(id, nuevoEstado) {
  // Si se intenta completar → abrir wizard obligatorio
  if (nuevoEstado === 'completado') {
    closeModal();
    setTimeout(() => openCompletarWizard(id), 300);
    return;
  }

  const updateObj = { estado: nuevoEstado };
  if (nuevoEstado === 'revisado') {
    updateObj.revisado_por = CU?.id || null;
    updateObj.revisado_por_nombre = CP?.nombre || '';
    updateObj.revisado_at = new Date().toISOString();
  }

  const { error } = await sb.from('partes_trabajo').update(updateObj).eq('id', id);
  if (error) { toast('Error: ' + error.message, 'error'); return; }

  const p = misPartes.find(x => x.id === id);
  if (p) Object.assign(p, updateObj);

  const estInfo = PT_ESTADOS[nuevoEstado] || {};
  toast(`${estInfo.ico||''} ${estInfo.label||nuevoEstado} ✓`, 'success');
  closeModal();
  navigateTo(currentTab);
}

async function toggleTarea(id, completar) {
  const nuevoEstado = completar === true || completar === 'true' ? 'completada' : 'pendiente';
  const { error } = await sb.from('tareas_obra').update({ estado: nuevoEstado }).eq('id', id);
  if (error) { toast('Error', 'error'); return; }

  const t = misTareas.find(x => x.id === id);
  if (t) t.estado = nuevoEstado;
  toast(completar ? '✅ Completada' : '↩️ Reabierta', 'success');
  navigateTo(currentTab);
}

// ═══════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function toast(msg, type) {
  const el = document.getElementById('appToast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2500);
}

// ═══════════════════════════════════════════════
// PWA: Service Worker & Install
// ═══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW:', e));
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(r => {
      if (r.outcome === 'accepted') toast('App instalada ✓', 'success');
      deferredPrompt = null;
    });
  }
}
