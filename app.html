function renderJefeAgenda(el) {
  const hoyStr = _fmtDateStr(new Date());
  const selStr = _fmtDateStr(_agendaDate);

  el.innerHTML = `
    <div class="cal-header">
      <button onclick="_agendaNav(-1)">‹</button>
      <h3 id="agendaTitle">${_agendaDate.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</h3>
      <button onclick="_agendaNav(1)">›</button>
    </div>
    <div class="cal-views">
      <button class="${_agendaView==='dia'?'active':''}" onclick="_agendaView='dia';renderJefeAgenda(document.getElementById('appBody'))">Día</button>
      <button class="${_agendaView==='semana'?'active':''}" onclick="_agendaView='semana';renderJefeAgenda(document.getElementById('appBody'))">Semana</button>
      <button class="${_agendaView==='mes'?'active':''}" onclick="_agendaView='mes';renderJefeAgenda(document.getElementById('appBody'))">Mes</button>
    </div>
    <div id="agendaContent"></div>
  `;

  const container = document.getElementById('agendaContent');
  if (_agendaView === 'mes') _renderAgendaMes(container, hoyStr, selStr);
  else if (_agendaView === 'semana') _renderAgendaSemana(container, hoyStr, selStr);
  else _renderAgendaDia(container, hoyStr, selStr);
}

function _agendaNav(dir) {
  if (_agendaView === 'mes') {
    _agendaDate.setMonth(_agendaDate.getMonth() + dir);
  } else if (_agendaView === 'semana') {
    _agendaDate.setDate(_agendaDate.getDate() + dir * 7);
  } else {
    _agendaDate.setDate(_agendaDate.getDate() + dir);
  }
  renderJefeAgenda(document.getElementById('appBody'));
}

function _misPartesDelDia(dateStr) {
  return misPartes.filter(p => p.usuario_id === CP?.id && p.fecha === dateStr)
    .sort((a,b) => (a.hora_inicio||'').localeCompare(b.hora_inicio||''));
}

function _todosPartesDelDia(dateStr) {
  return misPartes.filter(p => p.fecha === dateStr)
    .sort((a,b) => (a.hora_inicio||'').localeCompare(b.hora_inicio||''));
}

function _renderAgendaMes(container, hoyStr, selStr) {
  const year = _agendaDate.getFullYear();
  const month = _agendaDate.getMonth();
  const firstDay = new Date(year, month, 1);
  let startDay = firstDay.getDay(); // 0=dom
  if (startDay === 0) startDay = 7;
  startDay--; // 0=lun

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  // Build days array: prev month days, current, next
  const days = [];
  for (let i = startDay - 1; i >= 0; i--) {
    const d = new Date(year, month - 1, daysInPrev - i);
    days.push({ date: d, str: _fmtDateStr(d), other: true });
  }
  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(year, month, i);
    days.push({ date: d, str: _fmtDateStr(d), other: false });
  }
  const remaining = 7 - (days.length % 7);
  if (remaining < 7) {
    for (let i = 1; i <= remaining; i++) {
      const d = new Date(year, month + 1, i);
      days.push({ date: d, str: _fmtDateStr(d), other: true });
    }
  }

  // Count partes per day for dots
  const partesCountMap = {};
  misPartes.forEach(p => {
    if (p.usuario_id === CP?.id && p.fecha) {
      partesCountMap[p.fecha] = (partesCountMap[p.fecha] || 0) + 1;
    }
  });

  let gridHTML = '<div class="cal-grid">';
  ['L','M','X','J','V','S','D'].forEach(d => { gridHTML += `<div class="cal-dow">${d}</div>`; });
  days.forEach(day => {
    const isToday = day.str === hoyStr;
    const isSel = day.str === selStr;
    const cnt = partesCountMap[day.str] || 0;
    const dots = cnt > 0 ? `<div class="cal-dots">${Array(Math.min(cnt,4)).fill('<span class="cal-dot" style="background:var(--azul)"></span>').join('')}</div>` : '';
    const cls = `cal-day${day.other?' other':''}${isToday?' today':''}${isSel?' selected':''}`;
    gridHTML += `<div class="${cls}" onclick="_agendaDate=new Date(${day.date.getFullYear()},${day.date.getMonth()},${day.date.getDate()});renderJefeAgenda(document.getElementById('appBody'))">
      ${day.date.getDate()}${dots}
    </div>`;
  });
  gridHTML += '</div>';

  // Partes del día seleccionado
  const partesDia = _misPartesDelDia(selStr);
  const selLabel = _agendaDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});

  container.innerHTML = gridHTML + `
    <div class="section-title" style="text-transform:capitalize">${selLabel}</div>
    ${partesDia.length ? partesDia.map(p => renderParteCard(p, true)).join('') :
      '<div style="text-align:center;padding:20px;color:var(--gris-400);font-size:13px">Sin partes este día</div>'}
  `;
}

function _renderAgendaSemana(container, hoyStr, selStr) {
  // Calcular lunes de la semana
  const d = new Date(_agendaDate);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const lunes = new Date(d.setDate(diff));

  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const wd = new Date(lunes);
    wd.setDate(lunes.getDate() + i);
    weekDays.push({ date: wd, str: _fmtDateStr(wd) });
  }

  const weekLabel = weekDays[0].date.toLocaleDateString('es-ES',{day:'numeric',month:'short'}) + ' — ' +
    weekDays[6].date.toLocaleDateString('es-ES',{day:'numeric',month:'short'});

  // Header de la semana
  let html = `<div style="text-align:center;font-size:12px;color:var(--gris-400);margin-bottom:12px;font-weight:600">${weekLabel}</div>`;

  // Day columns
  html += '<div style="display:flex;gap:2px;margin-bottom:16px">';
  const dowNames = ['L','M','X','J','V','S','D'];
  weekDays.forEach((wd, i) => {
    const isToday = wd.str === hoyStr;
    const isSel = wd.str === selStr;
    const partesCount = misPartes.filter(p => p.usuario_id === CP?.id && p.fecha === wd.str).length;
    html += `<div style="flex:1;text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;
      ${isSel?'background:var(--azul);color:#fff;':isToday?'background:var(--azul-light);color:var(--azul);':'color:var(--gris-600);'}"
      onclick="_agendaDate=new Date(${wd.date.getFullYear()},${wd.date.getMonth()},${wd.date.getDate()});renderJefeAgenda(document.getElementById('appBody'))">
      <div style="font-size:10px;font-weight:700">${dowNames[i]}</div>
      <div style="font-size:15px;font-weight:800">${wd.date.getDate()}</div>
      ${partesCount ? `<div style="font-size:9px;font-weight:700;margin-top:2px">${partesCount}</div>` : ''}
    </div>`;
  });
  html += '</div>';

  // Timeline del día seleccionado
  const partesDia = _misPartesDelDia(selStr);
  const selLabel = _agendaDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});

  html += `<div class="section-title" style="text-transform:capitalize">${selLabel}</div>`;
  if (partesDia.length) {
    html += '<div class="day-timeline">' + partesDia.map(p => {
      const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '—';
      const hf = p.hora_fin ? p.hora_fin.substring(0,5) : '';
      const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
      return `<div class="day-event" onclick="openParteDetail(${p.id})">
        <div class="day-event-time">${hi}</div>
        <div class="day-event-body">
          <div class="day-event-title">${p.trabajo_titulo||p.descripcion?.substring(0,50)||'Sin obra'}</div>
          <div class="day-event-sub">${hi}${hf?'-'+hf:''} ${p.direccion?'· 📍 '+p.direccion.substring(0,35):''}</div>
          <span class="day-event-badge" style="background:${est.bg};color:${est.color}">${est.ico} ${est.label}</span>
        </div>
      </div>`;
    }).join('') + '</div>';
  } else {
    html += '<div style="text-align:center;padding:20px;color:var(--gris-400);font-size:13px">Sin partes este día</div>';
  }

  container.innerHTML = html;
}

function _renderAgendaDia(container, hoyStr, selStr) {
  const selLabel = _agendaDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const partesDia = _misPartesDelDia(selStr);

  // Generar timeline por horas (7h a 20h)
  let html = `<div style="font-size:14px;font-weight:800;text-transform:capitalize;margin-bottom:12px">${selLabel}</div>`;

  if (partesDia.length) {
    html += '<div class="day-timeline">' + partesDia.map(p => {
      const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '—';
      const hf = p.hora_fin ? p.hora_fin.substring(0,5) : '';
      const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
      const horas = (parseFloat(p.horas)||0).toFixed(1);
      return `<div class="day-event" onclick="openParteDetail(${p.id})">
        <div class="day-event-time">${hi}${hf?'<br><span style="font-size:10px;color:var(--gris-400)">${hf}</span>':''}</div>
        <div class="day-event-body">
          <div class="day-event-title">${p.trabajo_titulo||'Sin obra'}</div>
          <div class="day-event-sub">
            ${p.cliente_nombre?'👤 '+p.cliente_nombre+' · ':''}${horas}h
            ${p.direccion?'<br>📍 '+p.direccion:''}
          </div>
          <span class="day-event-badge" style="background:${est.bg};color:${est.color}">${est.ico} ${est.label}</span>
          ${p.descripcion?'<div style="font-size:12px;color:var(--gris-500);margin-top:6px;line-height:1.4">'+p.descripcion.substring(0,120)+(p.descripcion.length>120?'...':'')+'</div>':''}
        </div>
      </div>`;
    }).join('') + '</div>';
  } else {
    html += '<div class="empty-state"><div class="ico">📅</div><p>Sin partes este día</p></div>';
  }

  // Quick access: todos los partes del equipo este día
  const todosHoy = _todosPartesDelDia(selStr).filter(p => p.usuario_id !== CP?.id);
  if (todosHoy.length) {
    html += '<div class="section-title">👥 Equipo este día</div>';
    html += todosHoy.map(p => {
      const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '—';
      const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
      return `<div class="day-event" onclick="openParteDetail(${p.id})" style="border-left:3px solid var(--azul-light)">
        <div class="day-event-time">${hi}</div>
        <div class="day-event-body">

        </div>
      </div>`;
    }).join('');
  }

  container.innerHTML = html;
}

let _ppWeekStart  = null;
let _ppSelDate    = null;
let _ppModo       = 'obra';   // 'obra' | 'libre'
let _ppObraId     = null;     // id de la obra seleccionada

function _ppGetLunes(d) {
  const r = new Date(d); const day = r.getDay() || 7;
  r.setDate(r.getDate() - day + 1); r.setHours(0,0,0,0); return r;
}

// Calcula hora fin inteligente: 2h por defecto, recorta si hay parte antes
function _ppSmartFin(fecha, horaIni, uid) {
  const hiH = parseInt(horaIni.split(':')[0]);
  const pts  = (Array.isArray(misPartes) ? misPartes : [])
    .filter(p => p.fecha === fecha && (p.usuario_id == uid || !uid) && p.hora_inicio);
  const siguiente = pts
    .map(p => parseInt(p.hora_inicio.split(':')[0]))
    .filter(h => h > hiH)
    .sort((a,b) => a-b)[0];
  const endH = siguiente !== undefined ? Math.min(hiH + 2, siguiente) : hiH + 2;
  return String(Math.min(endH, 23)).padStart(2,'0') + ':00';
}

// Paso 1: abre el planificador semanal para elegir hueco
function _openParteForm() {
  if (!_ppSelDate) { _ppSelDate = new Date(); _ppSelDate.setHours(0,0,0,0); }

        style="flex:1;padding:9px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:var(--azul);color:#fff;font-family:var(--font)">🏗️ Con obra</button>
      <button id="ppBtnLibre" onclick="_ppSetModo('libre')"
        style="flex:1;padding:9px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:var(--gris-100);color:var(--gris-500);font-family:var(--font)">📋 Parte libre</button>

          autocomplete="off" oninput="_ppBuscarObra(this.value)" onfocus="_ppBuscarObra(this.value)"
          style="width:100%;padding:10px 12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:13px;font-family:var(--font);outline:none;box-sizing:border-box">
        <input type="hidden" id="ppObraId">
        <div id="ppObraResults" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--gris-200);border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.12)"></div>
      </div>

  `;
  openModal('Nuevo Parte');

  // Restaurar estado del toggle
  _ppSetModo(_ppModo, true);

  // Blur cierra dropdown obra
  document.getElementById('ppObraBusca')?.addEventListener('blur', () => {
    setTimeout(() => { const r = document.getElementById('ppObraResults'); if(r) r.style.display='none'; }, 200);
  });

  _ppRender();
}

function _ppSetModo(modo, silent) {
  _ppModo = modo;
  const btnObra  = document.getElementById('ppBtnObra');
  const btnLibre = document.getElementById('ppBtnLibre');
  const sec      = document.getElementById('ppObraSection');
  if (!btnObra) return;
  if (modo === 'obra') {
    btnObra.style.background  = 'var(--azul)'; btnObra.style.color  = '#fff';
    btnLibre.style.background = 'var(--gris-100)'; btnLibre.style.color = 'var(--gris-500)';
    if (sec) sec.style.display = '';
  } else {
    btnLibre.style.background = '#7C3AED'; btnLibre.style.color = '#fff';
    btnObra.style.background  = 'var(--gris-100)'; btnObra.style.color = 'var(--gris-500)';
    if (sec) sec.style.display = 'none';
    _ppObraId = null;
  }
  if (!silent) _ppRender();
}

// Búsqueda de obra por: número, título, cliente (nombre/nif/tel/email), dirección
function _ppBuscarObra(q) {
  const res = document.getElementById('ppObraResults');
  if (!res) return;
  const term = (q||'').toLowerCase().trim();
  const activos = trabajos.filter(t => t.estado !== 'eliminado' && t.estado !== 'completado');
  const found = term.length < 1
    ? activos.slice(0, 10)
    : activos.filter(t => {
        const cli = t.cliente_id ? clientes.find(c => c.id === t.cliente_id) : null;
        const haystack = [
          t.numero, t.referencia, t.titulo,
          t.cliente_nombre, t.direccion_obra_texto, t.direccion_obra, t.direccion,
          cli?.nombre, cli?.nif, cli?.telefono, cli?.email,
          cli?.direccion_fiscal, cli?.municipio_fiscal, cli?.municipio
        ].filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(term);
      }).slice(0, 12);

  if (!found.length) {
    res.innerHTML = '<div style="padding:12px;font-size:13px;color:var(--gris-400);text-align:center">Sin resultados</div>';
  } else {
    res.innerHTML = found.map(t => {
      const cli = t.cliente_id ? clientes.find(c => c.id === t.cliente_id) : null;
      const cliNombre = cli?.nombre || t.cliente_nombre || '';
      const dir = t.direccion_obra_texto || t.direccion_obra || cli?.direccion_fiscal || '';
      return `<div onmousedown="_ppSelObra(${t.id},'${(t.titulo||'').replace(/'/g,"\\'")}','${(cliNombre).replace(/'/g,"\\'")}','${(dir).replace(/'/g,"\\'")}')"
        style="padding:10px 12px;border-bottom:1px solid var(--gris-100);cursor:pointer">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;font-family:monospace;color:var(--azul);font-weight:700">${t.numero||'—'}</span>
          <span style="font-size:13px;font-weight:700;flex:1">${t.titulo||'Sin título'}</span>
        </div>
        ${cliNombre ? `<div style="font-size:11px;color:var(--gris-500);margin-top:2px">👤 ${cliNombre}</div>` : ''}
        ${dir        ? `<div style="font-size:11px;color:var(--gris-400);margin-top:1px">📍 ${dir.substring(0,60)}</div>` : ''}
      </div>`;
    }).join('');
  }
  res.style.display = '';
}

function _ppSelObra(id, titulo, cliente, dir) {
  _ppObraId = id;
  const input = document.getElementById('ppObraBusca');
  if (input) {
    input.value = titulo + (cliente ? '  ·  ' + cliente : '');
    input.style.borderColor = 'var(--azul)';
  }
  document.getElementById('ppObraId').value = id;
  const res = document.getElementById('ppObraResults');
  if (res) res.style.display = 'none';
  _ppRender();
}

// Renderiza semana + timeline del día seleccionado
function _ppRender() {
  const container = document.getElementById('ppContent');
  if (!container) return;

  const hoyStr = _fmtDateStr(new Date());
  const selStr = _fmtDateStr(_ppSelDate);
  const uid    = document.getElementById('pp_usuario')?.value || CP?.id;
  const partes = Array.isArray(misPartes) ? misPartes : [];

  const dias = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(_ppWeekStart); d.setDate(_ppWeekStart.getDate() + i);
    dias.push({ date: d, str: _fmtDateStr(d) });
  }
  const weekLabel = dias[0].date.toLocaleDateString('es-ES',{day:'numeric',month:'short'}) +
    ' \u2013 ' + dias[6].date.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  const dowNames = ['L','M','X','J','V','S','D'];

  const diasHtml = dowNames.map((n, i) => {
    const d = dias[i];
    const count = partes.filter(p => p.fecha === d.str && (p.usuario_id == uid || !uid)).length;
    const isSel = d.str === selStr, isHoy = d.str === hoyStr, isWe = i >= 5;
    let bg = 'transparent', color = isWe ? 'var(--gris-400)' : 'var(--gris-700)';
    if (isSel) { bg='var(--azul)'; color='#fff'; } else if (isHoy) { bg='var(--azul-light)'; color='var(--azul)'; }
    return `<div onclick="_ppSelDate=new Date('${d.str}T00:00:00');_ppRender()"
      style="flex:1;text-align:center;padding:5px 2px;border-radius:8px;cursor:pointer;background:${bg};color:${color};user-select:none">
      <div style="font-size:10px;font-weight:700">${n}</div>
      <div style="font-size:15px;font-weight:800;line-height:1.2">${d.date.getDate()}</div>
      ${count ? `<div style="font-size:9px;font-weight:700;background:${isSel?'rgba(255,255,255,.35)':'var(--azul)'};color:#fff;border-radius:10px;padding:1px 5px;margin-top:2px;display:inline-block">${count}</div>` : '<div style="height:14px"></div>'}
    </div>`;
  }).join('');

  const partesDia = partes
    .filter(p => p.fecha === selStr && (p.usuario_id == uid || !uid))
    .sort((a,b) => (a.hora_inicio||'00:00').localeCompare(b.hora_inicio||'00:00'));

  const pHiH = p => p.hora_inicio ? parseInt(p.hora_inicio.split(':')[0]) : null;
  const pHfH = p => p.hora_fin    ? parseInt(p.hora_fin.split(':')[0])    : (pHiH(p) !== null ? pHiH(p)+8 : null);
  const parteAt = h => partesDia.find(p => pHiH(p) !== null && pHiH(p) <= h && pHfH(p) > h);

  let timeHtml = '';
  const rendered = new Set();
  for (let h = 7; h <= 20; h++) {
    const hStr = String(h).padStart(2,'0') + ':00';
    const p    = parteAt(h);
    if (p) {
      if (!rendered.has(p.id)) {
        rendered.add(p.id);
        const startH = pHiH(p), endH = pHfH(p), durH = Math.max(1, endH - startH);
        const hiStr  = p.hora_inicio ? p.hora_inicio.substring(0,5) : hStr;
        const hfStr  = p.hora_fin    ? p.hora_fin.substring(0,5)    : '';
        const est    = PT_ESTADOS?.[p.estado] || { bg:'#DBEAFE', color:'#1E40AF' };
        const titulo = p.trabajo_titulo || p.descripcion?.substring(0,40) || 'Sin obra';
        const op     = (p.usuario_nombre && p.usuario_id != uid)
          ? `<div style="font-size:10px;color:var(--gris-500);margin-top:2px">\u{1F477} ${p.usuario_nombre}</div>` : '';
        timeHtml += `<div style="display:flex;gap:8px;align-items:stretch;margin-bottom:3px">
          <div style="font-size:11px;font-weight:700;color:var(--gris-400);min-width:40px;padding-top:10px;text-align:right;flex-shrink:0">${hiStr}</div>
          <div style="flex:1;background:${est.bg};border-left:3px solid var(--azul);border-radius:8px;padding:8px 10px;min-height:${durH*42}px">
            <div style="font-size:12px;font-weight:700;color:var(--gris-800)">${titulo}</div>
            <div style="font-size:11px;color:var(--gris-500);margin-top:2px">${hiStr}${hfStr?' \u2013 '+hfStr:''}</div>${op}
          </div>
        </div>`;
      }
    } else {
      const hFin = _ppSmartFin(selStr, hStr, uid);
      timeHtml += `<div onclick="_openParteFormFilled('${selStr}','${hStr}','${hFin}')"
        style="display:flex;gap:8px;align-items:center;margin-bottom:3px;cursor:pointer"
        onmouseenter="this.querySelector('.ppslot').style.background='#EFF6FF';this.querySelector('.ppslot').style.borderColor='var(--azul)'"
        onmouseleave="this.querySelector('.ppslot').style.background='transparent';this.querySelector('.ppslot').style.borderColor='var(--gris-200)'">
        <div style="font-size:11px;font-weight:700;color:var(--gris-300);min-width:40px;text-align:right;flex-shrink:0">${hStr}</div>
        <div class="ppslot" style="flex:1;border:1.5px dashed var(--gris-200);border-radius:8px;padding:9px 12px;min-height:42px;display:flex;align-items:center;gap:8px;transition:all .15s">
          <span style="color:var(--azul);font-size:20px;font-weight:300;line-height:1;flex-shrink:0">+</span>
          <span style="font-size:12px;color:var(--gris-500)">${hStr} \u2013 ${hFin}</span>
        </div>
      </div>`;
    }
  }

  const diaLabel = _ppSelDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  container.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button onclick="event.preventDefault();_ppWeekStart=new Date(_ppWeekStart.getTime()-7*864e5);_ppRender()"
        style="width:32px;height:32px;border:none;background:var(--gris-100);border-radius:8px;cursor:pointer;font-size:18px;font-weight:700;line-height:1">\u2039</button>
      <span style="font-size:12px;font-weight:700;color:var(--gris-600)">${weekLabel}</span>
      <button onclick="event.preventDefault();_ppWeekStart=new Date(_ppWeekStart.getTime()+7*864e5);_ppRender()"
        style="width:32px;height:32px;border:none;background:var(--gris-100);border-radius:8px;cursor:pointer;font-size:18px;font-weight:700;line-height:1">\u203a</button>
    </div>
    <div style="display:flex;gap:2px;margin-bottom:14px">${diasHtml}</div>
    <div style="font-size:12px;font-weight:700;text-transform:capitalize;color:var(--gris-700);margin-bottom:8px">${diaLabel}</div>
    <div style="max-height:48vh;overflow-y:auto;padding-right:4px">${timeHtml}</div>`;
}

      <label style="display:flex;align-items:center;gap:10px;margin-top:12px;padding:10px 12px;background:var(--gris-50);border-radius:10px;cursor:pointer">

        <span style="font-size:13px;color:var(--gris-600)">Guardar como borrador (pendiente de confirmar)</span>

    setTimeout(() => { const r = document.getElementById('qfClienteResults'); if(r) r.style.display='none'; }, 200);

function _qfModoToggle(modo) {
  const secObra  = document.getElementById('qfSecObra');
  const secLibre = document.getElementById('qfSecLibre');
  const btnObra  = document.getElementById('qfToggleObra');
  const btnLibre = document.getElementById('qfToggleLibre');
  if (modo === 'obra') {
    secObra.style.display  = '';
    secLibre.style.display = 'none';
    btnObra.style.background  = 'var(--azul)';   btnObra.style.color  = '#fff';
    btnLibre.style.background = 'var(--gris-100)'; btnLibre.style.color = 'var(--gris-500)';
  } else {
    secObra.style.display  = 'none';
    secLibre.style.display = '';
    btnLibre.style.background = '#7C3AED';         btnLibre.style.color = '#fff';
    btnObra.style.background  = 'var(--gris-100)'; btnObra.style.color  = 'var(--gris-500)';
    setTimeout(() => document.getElementById('qf_libre_desc')?.focus(), 80);
  }
}

function _qfBuscarCliente(q) {
  const res = document.getElementById('qfClienteResults');
  if (!res) return;
  const term = (q || '').toLowerCase().trim();
  const filtered = term.length < 1
    ? clientes.slice(0, 12)
    : clientes.filter(c => (c.nombre||'').toLowerCase().includes(term) || (c.nif||'').toLowerCase().includes(term)).slice(0, 12);
  if (!filtered.length) {
    res.innerHTML = '<div style="padding:12px;font-size:13px;color:var(--gris-400);text-align:center">Sin resultados</div>';
  } else {
    res.innerHTML = filtered.map(c =>
      `<div style="padding:10px 12px;font-size:13px;border-bottom:1px solid var(--gris-100);cursor:pointer"
        onmousedown="_qfSelCliente(${c.id},'${(c.nombre||'').replace(/'/g,"\\'")}')">
        ${c.nombre||'—'} <span style="color:var(--gris-400);font-size:11px">${c.nif||''} ${c.telefono||''}</span>
      </div>`
    ).join('');
  }
  res.style.display = '';
}

function _qfSelCliente(id, nombre) {
  document.getElementById('qf_cliente_id').value     = id;
  document.getElementById('qf_cliente_nombre').value = nombre;
  const input = document.getElementById('qf_cliente_busca');
  if (input) { input.value = nombre; input.style.borderColor = 'var(--azul)'; }
  const res = document.getElementById('qfClienteResults');
  if (res) res.style.display = 'none';

  // Auto-rellenar dirección del cliente en el campo informativo
  const cli = (typeof clientes !== 'undefined' ? clientes : []).find(c => c.id == id);
  if (cli) {
    const _d  = cli.direccion  || cli.direccion_fiscal  || '';
    const _cp = cli.cp         || cli.cp_fiscal          || '';
    const _mu = cli.municipio  || cli.municipio_fiscal   || '';
    const _pr = cli.provincia  || cli.provincia_fiscal   || '';
    const dir = [_d, _cp, _mu, _pr].filter(Boolean).join(', ');
    const display = document.getElementById('qf_direccion_display');
    const hidden  = document.getElementById('qf_direccion');
    const btnDir  = document.getElementById('qf_btn_dir');
    if (display) display.innerHTML = dir ? dir : '<span style=\'color:var(--gris-400)\'>El cliente no tiene dirección guardada</span>';
    if (hidden)  hidden.value = dir;
    if (btnDir)  btnDir.style.display = dir ? 'none' : '';
  }
}

async function _qfGuardarClienteRapido() {
  const nombre = document.getElementById('qfCN_nombre')?.value.trim();
  const dir    = document.getElementById('qfCN_dir')?.value.trim()  || null;
  const cp     = document.getElementById('qfCN_cp')?.value.trim()   || null;
  const mun    = document.getElementById('qfCN_mun')?.value.trim()  || null;
  const prov   = document.getElementById('qfCN_prov')?.value.trim() || null;
  const nif    = document.getElementById('qfCN_nif')?.value.trim()  || null;
  const email  = document.getElementById('qfCN_email')?.value.trim()|| null;

  const { telefono, telefonos } = (typeof _phonesGet === 'function') ? _phonesGet('qfCN') : { telefono: null, telefonos: [] };

  const errores = [];
  if (!nombre)   errores.push('nombre');
  if (!telefono) errores.push('teléfono');
  if (!dir)      errores.push('dirección');
  if (!cp)       errores.push('CP');
  if (!mun)      errores.push('municipio');
  if (!prov)     errores.push('provincia');
  if (errores.length) { toast('Faltan: ' + errores.join(', '), 'error'); return; }

  const { data, error } = await sb.from('clientes').insert({
    empresa_id: EMPRESA.id,
    nombre, telefono,
    telefonos: telefonos.length ? telefonos : [],
    direccion_fiscal: dir, cp_fiscal: cp, municipio_fiscal: mun, provincia_fiscal: prov,
    nif, email
  }).select('id,nombre').single();

  if (error) { toast('Error: ' + error.message, 'error'); return; }

  if (typeof clientes !== 'undefined' && Array.isArray(clientes)) {
    clientes.push({ id: data.id, nombre: data.nombre, telefono, nif, email,
      direccion_fiscal: dir, cp_fiscal: cp, municipio_fiscal: mun, provincia_fiscal: prov });
  }

  // Generar tarea si la ficha queda incompleta (p.ej. falta NIF)
  if (!nif && EMPRESA?.id) {
    sb.from('tareas_pendientes').insert({
      empresa_id: EMPRESA.id,
      entidad_tipo: 'cliente', entidad_id: data.id, entidad_nombre: data.nombre,
      titulo: 'Completar ficha de cliente: ' + data.nombre,
      campos_faltantes: ['NIF/CIF'],
      origen: 'auto', rol_asignado: 'admin', estado: 'pendiente',
      usuario_creador_id: CP?.id || null
    }).then(({ error: te }) => { if (te) console.warn('[Tarea cliente]', te.message); });
  }

  _qfSelCliente(data.id, data.nombre);
  document.getElementById('qfMiniClienteModal')?.remove();
  toast('Cliente creado ✓', 'success');
}

async function _qfGuardarDireccionCliente(clienteId) {
  const calle = document.getElementById('qfDirCalle')?.value.trim() || '';
  const cp    = document.getElementById('qfDirCp')?.value.trim()    || '';
  const mun   = document.getElementById('qfDirMun')?.value.trim()   || '';
  const prov  = document.getElementById('qfDirProv')?.value.trim()  || '';
  if (!calle) { toast('Indica la dirección (calle)', 'error'); return; }
  try {
    const { error } = await sb.from('clientes').update({
      direccion: calle, cp, municipio: mun, provincia: prov
    }).eq('id', clienteId);
    if (error) throw error;
    // Actualizar array local
    const idx = (typeof clientes !== 'undefined' ? clientes : []).findIndex(c => c.id === clienteId);
    if (idx >= 0) {
      clientes[idx].direccion = calle; clientes[idx].cp = cp;
      clientes[idx].municipio = mun;   clientes[idx].provincia = prov;
    }
    const dir = [calle, cp, mun, prov].filter(Boolean).join(', ');
    const display = document.getElementById('qf_direccion_display');
    const hidden  = document.getElementById('qf_direccion');
    const btnDir  = document.getElementById('qf_btn_dir');
    if (display) display.innerHTML = dir;
    if (hidden)  hidden.value = dir;
    if (btnDir)  btnDir.style.display = 'none';
    document.getElementById('qfMiniDirModal')?.remove();
    toast('Dirección guardada en el cliente ✓', 'success');
  } catch(e) { toast('Error: '+(e.message||e), 'error'); }
}


// Tarea #11 — Modal "¿Requiere firma del cliente?" para la PWA.
// Se monta dinámicamente con estilo en consonancia con los modales nativos.
function _pwaPreguntarFirma() {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.55);z-index:99999;display:flex;align-items:flex-end;justify-content:center;padding:0';
    overlay.innerHTML =
      '<div style="background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;padding:18px 18px 22px;box-shadow:0 -10px 40px rgba(0,0,0,0.18)">' +
        '<div style="width:42px;height:4px;background:var(--gris-200);border-radius:3px;margin:0 auto 14px"></div>' +
        '<h3 style="margin:0 0 6px;font-size:17px;font-weight:700;color:var(--gris-700)">✍️ Firma del cliente</h3>' +
        '<p style="margin:0 0 14px;font-size:13px;color:var(--gris-500);line-height:1.45">¿Este parte requerirá firma del cliente al completarse?</p>' +
        '<button data-d="si" style="width:100%;padding:14px;border-radius:12px;border:none;background:var(--azul);color:#fff;font-weight:700;font-size:14.5px;cursor:pointer;margin-bottom:8px">' +
          '✍️ Sí, requiere firma' +
        '</button>' +
        '<button data-d="no" style="width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--gris-200);background:#fff;color:var(--gris-700);font-weight:700;font-size:14.5px;cursor:pointer;margin-bottom:8px">' +
          '📋 No, sin firma' +
        '</button>' +
        '<button data-d="cancel" style="width:100%;padding:11px;border-radius:10px;border:none;background:transparent;color:var(--gris-500);font-weight:500;font-size:13.5px;cursor:pointer">Cancelar</button>' +
      '</div>';
    overlay.querySelectorAll('button[data-d]').forEach(btn => {
      btn.onclick = () => {
        const d = btn.dataset.d;
        overlay.remove();
        resolve(d);
      };
    });
    overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); resolve('cancel'); } });
    document.body.appendChild(overlay);
  });
}

async function _saveParteForm() {
  if (!EMPRESA) { toast('Sin empresa activa','error'); return; }
  try {
    // Detectar modo (obra / parte libre) — soporta toggle clásico y nuevo picker
    const esLibre = document.getElementById('qf_es_libre')?.value === '1'
      || document.getElementById('qfSecLibre')?.style.display === ''
      || _ppModo === 'libre';

    let trabajo_id    = null;
    let trabajo_titulo = '';
    let cliente_id    = null;
    let cliente_nombre = null;
    let es_parte_libre = false;

    // Descripción del trabajo (obligatorio en ambos modos)
    const descripcion = document.getElementById('qf_descripcion')?.value?.trim() || '';
    if (!descripcion) { toast('Indica la descripción del trabajo', 'error'); return; }

    if (esLibre) {
      trabajo_titulo  = descripcion;
      es_parte_libre  = true;
      cliente_id      = parseInt(document.getElementById('qf_cliente_id')?.value) || null;
      cliente_nombre  = document.getElementById('qf_cliente_nombre')?.value || null;
    } else {
      const trabajoId = document.getElementById('qf_trabajo')?.value;
      if (!trabajoId) { toast('Selecciona una obra', 'error'); return; }
      const obra = trabajos.find(t => t.id == trabajoId);
      trabajo_id    = parseInt(trabajoId);
      trabajo_titulo = obra?.titulo || '';
    }


    // ── Validar solapamiento de horario ──────────────────────────────────────
    const _qfUid   = document.getElementById('qf_usuario')?.value || CP?.id;
    const _qfFecha = document.getElementById('qf_fecha')?.value;
    const _qfHIni  = document.getElementById('qf_hora_ini')?.value;
    const _qfHFin  = document.getElementById('qf_hora_fin')?.value;
    if (_qfUid && _qfFecha && _qfHIni && _qfHFin) {
      const toMins = t => { const [h,m] = (t||'00:00').substring(0,5).split(':').map(Number); return h*60+(m||0); };
      const ni = toMins(_qfHIni), nf = toMins(_qfHFin);
      if (ni < nf) {
        const { data: _solapeData } = await sb.from('partes_trabajo')
          .select('id,numero,hora_inicio,hora_fin,trabajo_titulo')
          .eq('empresa_id', EMPRESA.id)
          .eq('usuario_id', String(_qfUid))
          .eq('fecha', _qfFecha)
          .neq('estado', 'cancelado')
          .not('hora_inicio', 'is', null)
          .not('hora_fin', 'is', null);
        const _solape = (_solapeData || []).find(p => {
          const pi = toMins(p.hora_inicio), pf = toMins(p.hora_fin);
          return ni < pf && nf > pi;
        });
        if (_solape) {
          const hI = (_solape.hora_inicio||'').substring(0,5);
          const hF = (_solape.hora_fin||'').substring(0,5);
          const tit = _solape.trabajo_titulo ? ` · ${_solape.trabajo_titulo}` : '';
          toast(`⚠️ Conflicto de horario: ya hay un parte de ${hI} a ${hF}${tit}`, 'error');
          return;
        }
      }
    }
    // ─────────────────────────────────────────────────────────────────────────

    // Estado: programado por defecto (tiene fecha); borrador si el check está marcado
    const esBorrador = document.getElementById('qf_borrador')?.checked || false;

    // Tarea #11: modal preguntando firma del cliente.
    let firmaOpcional = false;
    if (typeof _pwaPreguntarFirma === 'function') {
      const _decision = await _pwaPreguntarFirma();
      if (_decision === 'cancel') return;
      firmaOpcional = (_decision === 'no');
    }
    const record = {
      empresa_id:     EMPRESA.id,
      estado:         esBorrador ? 'borrador' : 'programado',
      programado_por: esBorrador ? null : (CP?.id || null),
      programado_por_nombre: esBorrador ? null : (CP?.nombre || ''),
      usuario_id:     document.getElementById('qf_usuario')?.value || CP?.id,
      trabajo_id,
      trabajo_titulo,
      es_parte_libre,
      cliente_id,
      cliente_nombre,
      fecha:          document.getElementById('qf_fecha')?.value || _fmtDateStr(new Date()),
      hora_inicio:    document.getElementById('qf_hora_ini')?.value || '08:00',
      hora_fin:       document.getElementById('qf_hora_fin')?.value || '14:00',
      instrucciones:  descripcion + (document.getElementById('qf_desc')?.value?.trim() ? '\n' + document.getElementById('qf_desc').value.trim() : ''),
      firma_opcional: firmaOpcional,
      horas: 0
    };

    // Dirección: ya viene pre-cargada desde el campo oculto qf_direccion
    const dirManual = document.getElementById('qf_direccion')?.value?.trim() || '';
    record.direccion = dirManual;
    if (!record.direccion && esLibre && cliente_id) {
      const cliRec = (typeof clientes !== 'undefined' ? clientes : []).find(c => c.id === cliente_id);
      if (cliRec) {
        const _d  = cliRec.direccion  || cliRec.direccion_fiscal  || '';
        const _cp = cliRec.cp         || cliRec.cp_fiscal          || '';
        const _mu = cliRec.municipio  || cliRec.municipio_fiscal   || '';
        const _pr = cliRec.provincia  || cliRec.provincia_fiscal   || '';
        record.direccion = [_d, _cp, _mu, _pr].filter(Boolean).join(', ');
        if (!record.cliente_telefono && cliRec.telefono) record.cliente_telefono = cliRec.telefono;
      }
    }
    if (!record.direccion) record.direccion = '';

    // Generar número de parte (PRT-YYYY-NNNN)
    const { data: _ultPartes } = await sb.from('partes_trabajo')
      .select('numero')
      .eq('empresa_id', EMPRESA.id)
      .not('numero', 'is', null)
      .order('created_at', { ascending: false })
      .limit(20);
    let _maxPrt = 0;
    if (_ultPartes?.length) {
      _ultPartes.forEach(p => {
        const m = (p.numero || '').match(/(\d+)$/);
        if (m) { const n = parseInt(m[1], 10); if (n > _maxPrt) _maxPrt = n; }
      });
    }
    record.numero = `PRT-${new Date().getFullYear()}-${String(_maxPrt + 1).padStart(4, '0')}`;

    const { error } = await sb.from('partes_trabajo').insert(record);
    if (error) throw error;
    toast(`Parte ${record.numero} creado`, 'success');
    closeModal();
    await doRefresh();
  } catch(e) { toast('Error: '+(e.message||e),'error'); }
}

// ── Cliente search ──
function _docBuscarCliente(q) {
  const res = document.getElementById('docClienteResults');
  if (!res) return;
  const term = (q||'').toLowerCase().trim();
  const filtered = term.length < 1 ? clientes.slice(0,15) : clientes.filter(c =>
    (c.nombre||'').toLowerCase().includes(term) || (c.nif||'').toLowerCase().includes(term) || (c.email||'').toLowerCase().includes(term)
  ).slice(0,15);

  if (!filtered.length) {
    res.innerHTML = '<div style="padding:12px;font-size:13px;color:var(--gris-400);text-align:center">Sin resultados</div>';
  } else {
    res.innerHTML = filtered.map(c =>
      `<div style="padding:10px 12px;font-size:13px;border-bottom:1px solid var(--gris-100);cursor:pointer"
        onmousedown="_docSelCliente(${c.id})">${c.nombre||'—'} <span style="color:var(--gris-400);font-size:11px">${c.nif||''} ${c.email||''}</span></div>`
    ).join('');
  }
  res.style.display = '';
}

function _docSelCliente(id) {
  const c = clientes.find(x => x.id === id);
  if (!c) return;
  _doc.cliente = c;
  // Colapsar búsqueda, mostrar seleccionado
  document.getElementById('docClienteSection').style.display = 'none';
  const sel = document.getElementById('docClienteSeleccionado');
  sel.style.display = '';
  document.getElementById('docClienteNombre').textContent = c.nombre || '—';
  document.getElementById('docClienteInfo').textContent = [c.nif, c.email, c.telefono].filter(Boolean).join(' · ') || '—';
  // Mostrar resto del formulario
  document.getElementById('docDatosExtra').style.display = '';
  document.getElementById('docLineasSection').style.display = '';
  document.getElementById('docClienteResults').style.display = 'none';
}

function _docCambiarCliente() {
  _doc.cliente = null;
  document.getElementById('docClienteSection').style.display = '';
  document.getElementById('docClienteSeleccionado').style.display = 'none';
  document.getElementById('docClienteBuscar').value = '';
  document.getElementById('docClienteBuscar').focus();
}

function _docNuevoCliente() {
  document.getElementById('docClienteSection').innerHTML = `
    <div style="font-size:11px;font-weight:700;color:var(--gris-500);text-transform:uppercase;margin-bottom:6px">Nuevo cliente</div>
    <div class="quick-form">
      <div class="field"><label>Nombre / Razón social *</label><input type="text" id="ncNombre" placeholder="Nombre del cliente"></div>
      <div class="field"><label>NIF / CIF</label><input type="text" id="ncNif" placeholder="NIF o CIF"></div>
      <div class="field"><label>Email</label><input type="email" id="ncEmail" placeholder="email@ejemplo.com"></div>
      <div class="field"><label>Teléfono</label><input type="tel" id="ncTel" placeholder="Teléfono"></div>
      <div class="field"><label>Dirección</label><input type="text" id="ncDir" placeholder="Dirección"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="_docGuardarNuevoCliente()">Guardar</button>
        <button class="btn btn-secondary btn-sm" onclick="_openDocEditor(_doc.tipo)">Cancelar</button>
      </div>
    </div>
  `;
}

async function _docGuardarNuevoCliente() {
  const nombre = document.getElementById('ncNombre')?.value?.trim();
  if (!nombre) { toast('El nombre es obligatorio','error'); return; }
  try {
    const nuevoCliente = {
      empresa_id: EMPRESA.id,
      nombre,
      nif: document.getElementById('ncNif')?.value?.trim() || '',
      email: document.getElementById('ncEmail')?.value?.trim() || '',
      telefono: document.getElementById('ncTel')?.value?.trim() || '',
      direccion: document.getElementById('ncDir')?.value?.trim() || '',
    };
    const { data, error } = await sb.from('clientes').insert(nuevoCliente).select().single();
    if (error) throw error;
    // Añadir a la lista local
    clientes.push(data);
    toast('Cliente creado','success');
    _docSelCliente(data.id);
  } catch(e) { toast('Error: '+(e.message||e),'error'); }
}

// ── Líneas ──
function _docAddLinea() {
  _doc.lineas.push({ tipo:'linea', desc:'', cant:1, precio:0, dto:0, iva:21, articulo_id:null, codigo:'' });
  _docRenderLineas();
  // Focus en el campo descripción de la nueva línea
  setTimeout(() => {
    const inputs = document.querySelectorAll('.doc-linea-desc');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function _docRenderLineas() {
  const container = document.getElementById('docLineasList');
  if (!container) return;

  if (!_doc.lineas.length) {
    container.innerHTML = '<div style="text-align:center;padding:16px;color:var(--gris-400);font-size:13px">Sin líneas. Pulsa "+ Añadir" para empezar.</div>';
    _docRecalcTotales();
    return;
  }

  container.innerHTML = _doc.lineas.map((ln, i) => `
    <div style="background:#fff;border:1px solid var(--gris-100);border-radius:10px;padding:10px;margin-bottom:8px;position:relative" id="docLinea${i}">
      <button onclick="_docDelLinea(${i})" style="position:absolute;top:6px;right:6px;background:none;border:none;color:var(--rojo);font-size:16px;cursor:pointer;padding:2px 6px">✕</button>
      <div style="position:relative;margin-bottom:6px">
        <input type="text" class="doc-linea-desc" placeholder="Buscar artículo o escribir descripción..."
          value="${(ln.desc||'').replace(/"/g,'&quot;')}"
          oninput="_docBuscarArticulo(${i},this.value)"
          onblur="_docUpdateLinea(${i},'desc',this.value,false)"
          onkeydown="_docDescEnter(event,${i})"
          autocomplete="off"
          style="width:calc(100% - 30px);padding:8px 10px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:13px;font-family:var(--font)">
        <div id="docArtResults${i}" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--gris-200);border-radius:0 0 8px 8px;max-height:180px;overflow-y:auto;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.1)"></div>
      </div>
      ${ln.codigo ? `<div style="font-size:10px;color:var(--azul);font-weight:600;margin-bottom:4px">📦 ${ln.codigo}</div>` : ''}
      <div style="display:flex;gap:6px;align-items:center">
        <div style="flex:1"><label style="font-size:10px;color:var(--gris-400)">Cant.</label><input type="number" value="${ln.cant}" step="any" min="0"
          oninput="_docUpdateLinea(${i},'cant',this.value,false)"
          onkeydown="_docNumEnter(event,${i},0)"
          inputmode="decimal"
          style="width:100%;padding:6px 8px;border:1px solid var(--gris-200);border-radius:6px;font-size:13px;text-align:center;font-family:var(--font)"></div>
        <div style="flex:1.5"><label style="font-size:10px;color:var(--gris-400)">Precio</label><input type="number" value="${ln.precio}" step="any" min="0"
          oninput="_docUpdateLinea(${i},'precio',this.value,false)"
          onkeydown="_docNumEnter(event,${i},1)"
          inputmode="decimal"
          style="width:100%;padding:6px 8px;border:1px solid var(--gris-200);border-radius:6px;font-size:13px;text-align:right;font-family:var(--font)"></div>
        <div style="flex:0.8"><label style="font-size:10px;color:var(--gris-400)">Dto%</label><input type="number" value="${ln.dto}" step="any" min="0" max="100"
          oninput="_docUpdateLinea(${i},'dto',this.value,false)"
          onkeydown="_docNumEnter(event,${i},2)"
          inputmode="decimal"
          style="width:100%;padding:6px 8px;border:1px solid var(--gris-200);border-radius:6px;font-size:13px;text-align:center;font-family:var(--font)"></div>
        <div style="flex:0.8"><label style="font-size:10px;color:var(--gris-400)">IVA%</label><input type="number" value="${ln.iva}" step="any" min="0"
          oninput="_docUpdateLinea(${i},'iva',this.value,false)"
          onkeydown="_docNumEnter(event,${i},3)"
          inputmode="decimal"
          style="width:100%;padding:6px 8px;border:1px solid var(--gris-200);border-radius:6px;font-size:13px;text-align:center;font-family:var(--font)"></div>
        <div style="min-width:55px;text-align:right">
          <label style="font-size:10px;color:var(--gris-400)">Importe</label>
          <div id="docLineaImp${i}" style="font-size:13px;font-weight:700">${_docLineImporte(ln)}</div>
        </div>
      </div>
    </div>
  `).join('');

  _docRecalcTotales();
}

function _docLineImporte(ln) {
  const base = (ln.cant||0) * (ln.precio||0) * (1 - (ln.dto||0)/100);
  return base.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
}

// Actualiza datos SIN re-renderizar (el teclado no se cierra)
function _docUpdateLinea(idx, field, val, rerender = false) {
  if (!_doc.lineas[idx]) return;
  if (field === 'desc') _doc.lineas[idx].desc = val;
  else if (field === 'cant') _doc.lineas[idx].cant = parseFloat(val) || 0;
  else if (field === 'precio') _doc.lineas[idx].precio = parseFloat(val) || 0;
  else if (field === 'dto') _doc.lineas[idx].dto = parseFloat(val) || 0;
  else if (field === 'iva') _doc.lineas[idx].iva = parseFloat(val) || 0;
  // Actualiza solo el importe de esa línea sin destruir el DOM
  const impEl = document.getElementById('docLineaImp' + idx);
  if (impEl) impEl.textContent = _docLineImporte(_doc.lineas[idx]);
  _docRecalcTotales();
  if (rerender) _docRenderLineas();
}

// Enter en descripción → foco a Cant.
function _docDescEnter(e, idx) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const linea = document.getElementById('docLinea' + idx);
  if (!linea) return;
  const first = linea.querySelectorAll('input[type="number"]')[0];
  if (first) { first.focus(); first.select(); }
}

// Enter en campos numéricos: navega al siguiente, y al último crea nueva línea
function _docNumEnter(e, idx, fieldPos) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const linea = document.getElementById('docLinea' + idx);
  if (!linea) return;
  const nums = linea.querySelectorAll('input[type="number"]');
  if (fieldPos < nums.length - 1) {
    nums[fieldPos + 1].focus();
    nums[fieldPos + 1].select();
  } else {
    // Último campo → nueva línea
    _docAddLinea();
  }
}

function _docDelLinea(idx) {
  _doc.lineas.splice(idx, 1);
  _docRenderLineas();
}

// ── Búsqueda artículos inline ──
let _docArtSearchTimeout = null;

function _docBuscarArticulo(idx, q) {
  clearTimeout(_docArtSearchTimeout);
  const res = document.getElementById('docArtResults' + idx);
  if (!res) return;
  const term = (q||'').toLowerCase().trim();
  if (term.length < 2) { res.style.display = 'none'; return; }

  _docArtSearchTimeout = setTimeout(() => {
    const found = articulos.filter(a =>
      (a.nombre||'').toLowerCase().includes(term) || (a.codigo||'').toLowerCase().includes(term)
    ).slice(0,10);

    if (!found.length) { res.style.display = 'none'; return; }

    res.innerHTML = found.map(a =>
      `<div style="padding:8px 12px;font-size:12px;border-bottom:1px solid var(--gris-100);cursor:pointer;display:flex;justify-content:space-between;align-items:center"
        onmousedown="_docSelArticulo(${idx},${a.id})">
        <div><span style="color:var(--azul);font-weight:700">${a.codigo||''}</span> ${a.nombre||'—'}</div>
        <span style="font-weight:700;color:var(--gris-600)">${(a.precio_venta||0).toFixed(2)}€</span>
      </div>`
    ).join('');
    res.style.display = '';
  }, 150);
}

function _docSelArticulo(idx, artId) {
  const art = articulos.find(a => a.id === artId);
  if (!art || !_doc.lineas[idx]) return;
  _doc.lineas[idx].desc = art.nombre || '';
  _doc.lineas[idx].precio = art.precio_venta || 0;
  _doc.lineas[idx].articulo_id = art.id;
  _doc.lineas[idx].codigo = art.codigo || '';
  // IVA del artículo si tiene tipo_iva configurado (por ahora 21% default)
  _doc.lineas[idx].iva = 21;
  toast('📦 ' + (art.codigo||'') + ' — ' + (art.nombre||''), 'info');
  _docRenderLineas();
  // Focus cantidad de esa línea
  setTimeout(() => {
    const linea = document.getElementById('docLinea'+idx);
    if (linea) {
      const cantInput = linea.querySelectorAll('input[type="number"]')[0];
      if (cantInput) { cantInput.focus(); cantInput.select(); }
    }
  }, 50);
}

// ── Totales ──
function _docRecalcTotales() {
  let base = 0, iva = 0;
  _doc.lineas.forEach(ln => {
    const lineBase = (ln.cant||0) * (ln.precio||0) * (1 - (ln.dto||0)/100);
    base += lineBase;
    iva += lineBase * ((ln.iva||0)/100);
  });
  const total = base + iva;
  const fmt = (v) => v.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
  const elBase = document.getElementById('docBase');
  const elIva = document.getElementById('docIva');
  const elTotal = document.getElementById('docTotal');
  if (elBase) elBase.textContent = fmt(base);
  if (elIva) elIva.textContent = fmt(iva);
  if (elTotal) elTotal.textContent = fmt(total);
}

// ── Preview ──
function _docPreview() {
  if (!_doc.cliente) { toast('Selecciona un cliente','error'); return; }
  if (!_doc.lineas.length) { toast('Añade al menos una línea','error'); return; }

  const tipoLabel = { presupuesto:'PRESUPUESTO', albaran:'ALBARÁN', factura:'FACTURA' }[_doc.tipo] || _doc.tipo.toUpperCase();

  _doc.lineas.forEach(ln => {
    const lb = (ln.cant||0) * (ln.precio||0) * (1 - (ln.dto||0)/100);

  const total = base + iva;
  const fmt = (v) => v.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';

        <div style="font-size:18px;font-weight:800;color:var(--azul)">${tipoLabel}</div>

      <div style="margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gris-100)">

        <div style="font-size:11px;color:var(--gris-400)">${[_doc.cliente.nif, _doc.cliente.direccion, _doc.cliente.email].filter(Boolean).join(' · ')}</div>
      </div>
      <table style="width:100%;font-size:11px;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid var(--gris-200)">

            const imp = (ln.cant||0) * (ln.precio||0) * (1-(ln.dto||0)/100);
            return `<tr style="border-bottom:1px solid var(--gris-100)">
              <td style="padding:4px 2px">${ln.desc||'—'}${ln.dto?` <span style="color:var(--rojo)">(-${ln.dto}%)</span>`:''}</td>
              <td style="text-align:right;padding:4px 2px">${ln.cant}</td>
              <td style="text-align:right;padding:4px 2px">${(ln.precio||0).toFixed(2)}</td>
              <td style="text-align:right;padding:4px 2px;font-weight:600">${imp.toFixed(2)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>

// ── Genera el siguiente número de documento real consultando Supabase ──
async function _appGenerarNumeroDoc(tipo) {
  const PREFIJOS  = { presupuesto:'PRE-', albaran:'ALB-', factura:'FAC-' };
  const TABLAS    = { presupuesto:'presupuestos', albaran:'albaranes', factura:'facturas' };
  const tabla     = TABLAS[tipo];
  const prefijoDef = PREFIJOS[tipo] || 'DOC-';

  // Leer serie configurada para este tipo
  let prefijo = prefijoDef, digitos = 4;
  try {
    const TIPO_ALIAS = { factura:['factura','fact','facturas'], presupuesto:['presupuesto','pres','presup'], albaran:['albaran','alb'] };
    const { data: sers } = await sb.from('series_numeracion')
      .select('*').eq('empresa_id', EMPRESA.id);
    if (sers?.length) {
      const aliases = TIPO_ALIAS[tipo] || [tipo];
      const s = sers.find(x => aliases.includes(x.tipo));
      if (s) { prefijo = s.prefijo || prefijo; digitos = s.digitos || digitos; }
    }
  } catch(e) {}

  // Buscar el número más alto existente (excluyendo BORR-)
  let maxNum = 0;
  try {
    const { data: ultimos } = await sb.from(tabla)
      .select('numero').eq('empresa_id', EMPRESA.id)
      .not('numero','is',null).not('numero','like','BORR-%')
      .order('created_at', { ascending: false }).limit(20);
    (ultimos || []).forEach(d => {
      const m = (d.numero || '').match(/(\d+)$/);
      if (m) { const n = parseInt(m[1]); if (n > maxNum) maxNum = n; }
    });
  } catch(e) {}

  const siguiente = maxNum + 1;
  return prefijo + String(siguiente).padStart(digitos, '0');
}

// ── Generar documento en Supabase ──
async function _docGenerar() {
  if (!_doc.cliente) { toast('Selecciona un cliente','error'); return; }
  if (!_doc.lineas.length) { toast('Añade al menos una línea','error'); return; }
  if (!EMPRESA) { toast('Sin empresa activa','error'); return; }

  const tabla = { presupuesto:'presupuestos', albaran:'albaranes', factura:'facturas' }[_doc.tipo];
  if (!tabla) return;

  // Calcular totales
  let baseTotal = 0, ivaTotal = 0;
  _doc.lineas.forEach(ln => {
    const lb = (ln.cant||0) * (ln.precio||0) * (1-(ln.dto||0)/100);
    baseTotal += lb; ivaTotal += lb * ((ln.iva||0)/100);
  });
  const total = baseTotal + ivaTotal;

  // Generar número real según la serie configurada
  const numero = await _appGenerarNumeroDoc(_doc.tipo);

  const datos = {
    empresa_id: EMPRESA.id,
    numero,
    cliente_id: _doc.cliente.id,
    cliente_nombre: _doc.cliente.nombre || '',
    fecha: _doc.fecha,
    base_imponible: Math.round(baseTotal * 100) / 100,
    total_iva: Math.round(ivaTotal * 100) / 100,
    total: Math.round(total * 100) / 100,
    observaciones: _doc.observaciones || '',
    estado: 'pendiente',
    lineas: _doc.lineas.map(ln => ({
      tipo: 'linea',
      desc: ln.desc || '',
      cant: ln.cant || 0,
      precio: ln.precio || 0,
      dto: ln.dto || 0,
      iva: ln.iva || 0
    }))
  };

  try {
    const btn = document.querySelector('#modalContent .btn-primary');
    if (btn) { btn.textContent = 'Generando...'; btn.disabled = true; }

    // Para presupuestos: generar firma_token
    if (_doc.tipo === 'presupuesto') {
      const token = crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36)+Math.random().toString(36).substring(2));
      datos.firma_token = token;
      _doc._firmaToken = token;
    }

    const { data, error } = await sb.from(tabla).insert(datos).select('id,numero').single();
    if (error) throw error;

    _doc.savedId = data?.id;
    _doc._numero = data?.numero || numero;
    const tipoLabel = { presupuesto:'Presupuesto', albaran:'Albarán', factura:'Factura' }[_doc.tipo];

    // Generar enlace según tipo
    const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '');
    if (_doc.tipo === 'presupuesto' && _doc._firmaToken) {
      _doc._enlace = `${baseUrl}/firma.html?token=${_doc._firmaToken}`;
    } else if (_doc.tipo === 'factura') {
      _doc._enlace = `${baseUrl}/factura.html?id=${data.id}`;
    } else if (_doc.tipo === 'albaran') {
      _doc._enlace = `${baseUrl}/albaran.html?id=${data.id}`;
    } else {
      _doc._enlace = null;
    }

    toast(tipoLabel + ' generado correctamente', 'success');

    // Mostrar pantalla de envío multi-canal (igual que partes)
    _docMostrarEnvio(data?.id || _doc.savedId, _doc._numero, tipoLabel);
  } catch(e) {
    console.error('Doc generate error:', e);
    toast('Error al generar: ' + (e.message||e), 'error');
    const btn = document.querySelector('#modalContent .btn-primary');
    if (btn) { btn.textContent = 'Generar'; btn.disabled = false; }
  }
}

let _fabOcrData = null; // { pages:[{foto,base64data,mime}], allLineas:[], numDocumento:'' }

function _openOCRUpload() {

    toast('❌ EMPRESA no cargada — recarga la app', 'error');

  }
  if (!EMPRESA.anthropic_api_key) {

    return;
  }

  }

  _fabOcrData = null;

async function _onFabOCRFileSelected(input) {
  const file = input.files?.[0];
  if (!file) return;
  input.value = '';

  showLoading('📷 Procesando documento con IA...');

  try {
    // Convertir a base64
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    const mimeMatch = base64.match(/^data:([^;]+);/);
    const mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';
    const b64Data = base64.split(',')[1];

    // Decodificar API key
    let apiKey;
    try { apiKey = decodeURIComponent(escape(atob(EMPRESA.anthropic_api_key))); }
    catch(_) { apiKey = EMPRESA.anthropic_api_key; }

    // Llamar Edge Function OCR
    const resp = await fetch('https://gskkqqhbpnycvuioqetj.supabase.co/functions/v1/ocr-documento', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-anthropic-key': apiKey },
      body: JSON.stringify({
        imagen_base64: b64Data, media_type: mimeType, tipo: 'albaran',
        empresa_id: EMPRESA.id, empresa_nombre: EMPRESA.nombre || '', empresa_cif: EMPRESA.cif || ''
      })
    });

    const result = await resp.json();
    if (!result.success) throw new Error(result.error || 'Error procesando documento');

    const data = result.data || {};
    const lineas = data.lineas || [];
    if (!lineas.length) {
      toast('⚠️ No se han detectado materiales en el documento', 'warning');
      return;
    }

    // Detectar número de documento y comprobar duplicados
    const numDoc = (data.numero_documento || data.numero || '').trim();
    if (numDoc) {
      const dup = await _fabOcrCheckDuplicado(numDoc);
      if (dup) { toast(dup, 'error'); return; }
    }

    // Preparar líneas con match de catálogo
    const lineasProcesadas = lineas.map((linea, i) => {
      const nombre = linea.descripcion || linea.nombre || '';
      const codigo = linea.codigo || '';
      const cantidad = parseFloat(linea.cantidad) || 1;
      const precio = parseFloat(linea.precio_unitario) || 0;

      let artMatch = _ocrFindArticulo(nombre, codigo);

      return {
        idx: i, page: 0,
        nombre: artMatch?.nombre || nombre || 'Material OCR',
        codigo: artMatch?.codigo || codigo,
        cantidad, precio: artMatch?.precio_venta || precio,
        unidad: linea.unidad || artMatch?.unidad || 'ud',
        artMatch, selected: true
      };
    });

    // Inicializar estructura multipágina
    _fabOcrData = {
      numDocumento: numDoc,
      tipoDocumento: data.tipo_documento || 'albaran',
      proveedor: data.proveedor?.nombre || (typeof data.proveedor === 'string' ? data.proveedor : '') || '',
      pages: [{ foto: base64, b64Data, mimeType }],
      allLineas: lineasProcesadas,
      ocrResult: data
    };

    // Reutilizar el overlay de preview (mismo que wizard)
    _ocrPreviewData = {
      numDocumento: numDoc,
      pages: [{ foto: base64 }],
      allLineas: lineasProcesadas,
      _fabMode: true // Flag: estamos en modo flotante, no wizard
    };
    _ocrRenderPreview();

  } catch(e) {
    console.error('[FAB OCR]', e);
    toast('Error procesando: ' + (e.message || 'desconocido'), 'error');
  } finally {
    hideLoading();
  }
}

// Comprobar duplicado en tablas de compra + OCR pendientes + partes
async function _fabOcrCheckDuplicado(numDoc) {
  try {
    const eid = EMPRESA.id;
    const [resRecep, resFactProv, resPedidos, resPresCom, resOcr, resPartes] = await Promise.all([
      sb.from('recepciones').select('id,numero').eq('empresa_id', eid).eq('numero', numDoc).limit(1),
      sb.from('facturas_proveedor').select('id,numero').eq('empresa_id', eid).eq('numero', numDoc).limit(1),
      sb.from('pedidos_compra').select('id,numero').eq('empresa_id', eid).eq('numero', numDoc).limit(1),
      sb.from('presupuestos_compra').select('id,numero').eq('empresa_id', eid).eq('numero', numDoc).limit(1),
      sb.from('documentos_ocr').select('id,estado,datos_extraidos').eq('empresa_id', eid).in('estado', ['completado','procesando','pendiente']),
      sb.from('partes_trabajo').select('id,numero,albaranes_compra').eq('empresa_id', eid).not('albaranes_compra', 'is', null)
    ]);
    if (resRecep.data?.length) return `⚠️ Ya existe una recepción nº ${numDoc}`;
    if (resFactProv.data?.length) return `⚠️ Ya existe una factura de proveedor nº ${numDoc}`;
    if (resPedidos.data?.length) return `⚠️ Ya existe un pedido de compra nº ${numDoc}`;
    if (resPresCom.data?.length) return `⚠️ Ya existe un presupuesto de compra nº ${numDoc}`;
    if (resOcr.data) {
      for (const doc of resOcr.data) {
        const ext = doc.datos_extraidos;
        if (ext && (ext.numero_documento === numDoc || ext.numero === numDoc))
          return `⚠️ Documento nº ${numDoc} ya escaneado (pendiente de validar)`;
      }
    }
    if (resPartes.data) {
      for (const pt of resPartes.data) {
        const albs = Array.isArray(pt.albaranes_compra) ? pt.albaranes_compra : [];
        if (albs.find(a => a.numero && a.numero === numDoc))
          return `⚠️ Documento nº ${numDoc} ya en parte ${pt.numero || pt.id}`;
      }
    }
  } catch(e) { console.warn('Error comprobando duplicados:', e); }
  return null; // Sin duplicado
}

    if (!result.success) throw new Error(result.error || 'Error procesando documento');

    const data = result.data || {};
    const lineas = data.lineas || [];
    if (!lineas.length) { toast('⚠️ No se detectaron materiales en esta página', 'warning'); return; }

    const pageIdx = _fabOcrData.pages.length;
    _fabOcrData.pages.push({ foto: base64, b64Data, mimeType });

    const baseIdx = _fabOcrData.allLineas.length;
    lineas.forEach((linea, i) => {
      const nombre = linea.descripcion || linea.nombre || '';
      const codigo = linea.codigo || '';
      const cantidad = parseFloat(linea.cantidad) || 1;
      const precio = parseFloat(linea.precio_unitario) || 0;

      let artMatch = _ocrFindArticulo(nombre, codigo);

      _fabOcrData.allLineas.push({
        idx: baseIdx + i, page: pageIdx,
        nombre: artMatch?.nombre || nombre || 'Material OCR',
        codigo: artMatch?.codigo || codigo,
        cantidad, precio: artMatch?.precio_venta || precio,
        unidad: linea.unidad || artMatch?.unidad || 'ud',
        artMatch, selected: true
      });
    });

    // Sincronizar con el overlay de preview
    _ocrPreviewData.pages.push({ foto: base64 });
    _ocrPreviewData.allLineas = _fabOcrData.allLineas;
    toast(`✅ Página ${pageIdx + 1}: ${lineas.length} material(es) detectado(s)`, 'success');
    _ocrRenderPreview();

  } catch(e) {
    console.error('[FAB OCR AddPage]', e);
    toast('Error procesando página: ' + (e.message || 'desconocido'), 'error');
  } finally {
    hideLoading();
  }
}

function renderParteCard(p, showActions = false) {
  const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
  const fecha = p.fecha ? new Date(p.fecha).toLocaleDateString('es-ES',{day:'numeric',month:'short'}) : '—';
  const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '';
  const hf = p.hora_fin ? p.hora_fin.substring(0,5) : '';
  const horas = (parseFloat(p.horas)||0).toFixed(1);
  const operario = p.usuario_nombre || '—';

  // Acciones según estado (para operario)
  let actionHtml = '';
  if (showActions && !esJefe) {
    if (p.estado === 'programado' || p.estado === 'borrador') {
      actionHtml = `<div class="parte-actions">
        <button class="btn btn-sm" style="background:var(--acento);color:#fff" onclick="event.stopPropagation();iniciarParteConGPS(${p.id})">🔧 Iniciar</button>
      </div>`;
    } else if (p.estado === 'en_curso') {
      actionHtml = `<div class="parte-actions">
        <button class="btn btn-sm" style="background:var(--verde);color:#fff" onclick="event.stopPropagation();openInformarWizard(${p.id})">📋 Informar</button>
      </div>`;
    }
  } else if (showActions && esJefe) {
    // Jefe usa los mismos flujos completos que operario para iniciar/informar
    if (p.estado === 'programado' || p.estado === 'borrador') {
      actionHtml = `<div class="parte-actions">
        <button class="btn btn-sm" style="background:var(--acento);color:#fff" onclick="event.stopPropagation();iniciarParteConGPS(${p.id})">🔧 Iniciar</button>
      </div>`;
    } else if (p.estado === 'en_curso') {
      actionHtml = `<div class="parte-actions">
        <button class="btn btn-sm" style="background:var(--verde);color:#fff" onclick="event.stopPropagation();openInformarWizard(${p.id})">📋 Informar</button>
      </div>`;
    } else {
      const nextActions = {
        borrador:                {label:'📅 Programar', estado:'programado', bg:'#3B82F6'},
        pendiente_firma_cliente: {label:'👁️ Revisar',   estado:'revisado',   bg:'#10B981'},
        completado:              {label:'👁️ Revisar',   estado:'revisado',   bg:'#10B981'},
        revisado:                {label:'🧾 Facturar',  estado:'facturado',  bg:'#8B5CF6'},
      };
      const next = nextActions[p.estado];
      if (next) {
        actionHtml = `<div class="parte-actions">
          <button class="btn btn-sm" style="background:${next.bg};color:#fff" onclick="event.stopPropagation();cambiarEstado(${p.id},'${next.estado}')">${next.label}</button>
        </div>`;
      }
    }
  }

  // Color de fondo según estado y hora
  // Verde suave  → completado, revisado, facturado
  // Azul suave   → en curso
  // Blanco       → programado/borrador dentro de su horario
  // Amarillo     → programado pero ya pasó hora de INICIO
  // Rojo         → programado pero ya pasó hora de FIN (caducado)
  let cardBg = '#fff';
  let cardBorder = 'var(--gris-100)';
  if (p.estado === 'pendiente_firma_cliente') {
    cardBg = '#F5F3FF'; cardBorder = '#DDD6FE'; // violeta suave
  } else if (['completado','revisado','facturado'].includes(p.estado)) {
    cardBg = '#F0FDF4'; cardBorder = '#BBF7D0'; // verde suave
  } else if (p.estado === 'en_curso') {
    cardBg = '#EFF6FF'; cardBorder = '#BFDBFE'; // azul suave
  } else if (p.estado === 'programado' || p.estado === 'borrador') {
    const ahora = new Date();
    const _a = ahora;
    const hoyStr = _a.getFullYear() + '-' + String(_a.getMonth()+1).padStart(2,'0') + '-' + String(_a.getDate()).padStart(2,'0');

    if (p.fecha && p.fecha < hoyStr) {
      // Día anterior sin completar → ROJO (caducado)
      cardBg = '#FEF2F2'; cardBorder = '#FECACA';
    } else if (p.fecha === hoyStr) {
      // Hoy: comprobar horas
      let pasoFin = false, pasoInicio = false;
      if (p.hora_fin) {
        const [hh, mm] = p.hora_fin.split(':').map(Number);
        const finDate = new Date(); finDate.setHours(hh, mm, 0, 0);
        if (ahora > finDate) pasoFin = true;
      }
      if (p.hora_inicio) {
        const [hh, mm] = p.hora_inicio.split(':').map(Number);
        const iniDate = new Date(); iniDate.setHours(hh, mm, 0, 0);
        if (ahora > iniDate) pasoInicio = true;
      }
      if (pasoFin) {
        // Ya pasó la hora de fin → ROJO (caducado)
        cardBg = '#FEF2F2'; cardBorder = '#FECACA';
      } else if (pasoInicio) {
        // Ya pasó la hora de inicio pero no la de fin → AMARILLO (retraso)
        cardBg = '#FFFBEB'; cardBorder = '#FDE68A';
      }
      // Si no pasó ninguna → blanco (dentro de hora)
    }
    // Fecha futura → blanco
  }

  // Borde izquierdo de color para refuerzo visual
  const _borderLeftColor = p.estado === 'pendiente_firma_cliente' ? '#7C3AED'
    : (['completado','revisado','facturado'].includes(p.estado)) ? '#22C55E'
    : p.estado === 'en_curso' ? '#3B82F6'
    : cardBg === '#FEF2F2' ? '#EF4444'
    : cardBg === '#FFFBEB' ? '#F59E0B'
    : 'transparent';

  return `<div class="parte-card" onclick="openParteDetail(${p.id})" style="background:${cardBg};border-color:${cardBorder};border-left:4px solid ${_borderLeftColor}">
    <div class="parte-row">
      <span class="parte-num">${p.numero||'—'}</span>
      <span class="badge" style="background:${est.bg};color:${est.color}">${est.ico} ${est.label}</span>
      ${p.direccion ? `<a href="https://maps.google.com/?q=${encodeURIComponent(p.direccion)}" target="_blank" onclick="event.stopPropagation()" style="margin-left:auto;background:#3B82F6;color:#fff;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;text-decoration:none">📍 GPS</a>` : ''}
    </div>
    ${hi ? `<div style="font-size:15px;font-weight:800;color:var(--azul);margin:8px 0">${hi}${hf?'-'+hf:''}</div>` : ''}
    ${p.direccion ? `<div style="font-size:12.5px;color:var(--gris-600);margin-bottom:6px">📍 ${p.direccion}</div>` : ''}
    ${p.trabajo_titulo ? `<div style="font-size:12px;color:var(--gris-500);margin-bottom:2px">🏗️ ${p.trabajo_titulo}</div>` : ''}
    <div class="parte-meta">${fecha} · ${horas}h</div>
    ${p.descripcion ? `<div class="parte-desc">${p.descripcion.substring(0,100)}${p.descripcion.length>100?'...':''}</div>` : ''}
    ${actionHtml}
  </div>`;
}


function renderTareaItem(t) {
  const done = t.estado === 'completada';
  const obraTitulo = trabajos.find(tr => tr.id === t.trabajo_id)?.titulo || '';
  const prio = {urgente:'🔺',alta:'▲',normal:'◆',baja:'▽'};
  return `<div class="tarea-item">

      ${done ? '✓' : ''}
    </div>

      ${obraTitulo ? `<div style="font-size:10.5px;color:var(--gris-400);margin-top:1px">🏗️ ${obraTitulo}</div>` : ''}
    </div>
  </div>`;
}

        <span>${p.materiales.reduce((s,m) => s+(parseFloat(m.total)||0), 0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
