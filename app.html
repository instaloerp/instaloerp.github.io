        const fecha = header.dataset.date;
        const section = document.getElementById('day-' + fecha);
        const toggle = header.querySelector('.day-toggle');
        if (!section) return;
        const visible = section.style.display !== 'none';
        section.style.display = visible ? 'none' : 'block';
        if (toggle) toggle.textContent = visible ? '▶' : '▼';
      });
    });
  }, 50);
}


function scrollToSection(id) {
  const el = document.getElementById('day-' + id);
  if (el) {
    // Abrir la sección si está cerrada
    if (el.style.display === 'none') {
      el.style.display = 'block';
      const toggle = document.querySelector(`.day-toggle[data-date="${id}"]`);
      if (toggle) toggle.textContent = '▼';
    }
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

let _searchFilter = 'todos';

function toggleBuscadorPartes() {
  const buscador = document.getElementById('buscadorPartes');
  if (!buscador) return;
  const visible = buscador.style.display !== 'none';
  buscador.style.display = visible ? 'none' : 'block';
  // Ocultar/mostrar el listado principal
  const mainList = document.getElementById('mainDayList');
  if (mainList) mainList.style.display = visible ? 'block' : 'none';
  if (!visible) {
    // Al abrir: reset filtros y poner rango último mes por defecto
    _searchFilter = 'todos';
    const input = document.getElementById('searchPartesInput');
    if (input) { input.value = ''; input.focus(); }
    const hoy = new Date();
    const hoyStr = hoy.toISOString().split('T')[0];
    const haceUnMes = new Date(hoy); haceUnMes.setDate(haceUnMes.getDate() - 30);
    const haceUnMesStr = haceUnMes.toISOString().split('T')[0];
    const desde = document.getElementById('searchFechaDesde');
    const hasta = document.getElementById('searchFechaHasta');
    if (desde) desde.value = haceUnMesStr;
    if (hasta) hasta.value = hoyStr;
    document.querySelectorAll('.search-filter').forEach(b => b.classList.toggle('active', b.dataset.filter === 'todos'));
    document.getElementById('searchPartesResults').innerHTML = '<div style="text-align:center;padding:16px;color:var(--gris-400);font-size:13px">Usa los filtros o escribe para buscar</div>';
  }
}

function setSearchFilter(f) {
  _searchFilter = f;
  document.querySelectorAll('.search-filter').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  filtrarPartesHistorico();
}

function filtrarPartesHistorico() {
  const results = document.getElementById('searchPartesResults');
  if (!results) return;
  const q = (document.getElementById('searchPartesInput')?.value || '').trim().toLowerCase();
  const desde = document.getElementById('searchFechaDesde')?.value || '';
  const hasta = document.getElementById('searchFechaHasta')?.value || '';

  const hayFiltro = q.length >= 2 || desde || hasta || _searchFilter !== 'todos';
  if (!hayFiltro) {
    results.innerHTML = '<div style="text-align:center;padding:16px;color:var(--gris-400);font-size:13px">Escribe algo o selecciona un filtro para buscar</div>';
    return;
  }
  // Con filtro de estado activo sin rango de fechas → mostrar aviso y forzar último mes
  if (_searchFilter !== 'todos' && !desde && !hasta) {
    const hoy = new Date();
    const haceUnMes = new Date(hoy); haceUnMes.setDate(haceUnMes.getDate() - 30);
    const desdeEl = document.getElementById('searchFechaDesde');
    const hastaEl = document.getElementById('searchFechaHasta');
    if (desdeEl && !desdeEl.value) desdeEl.value = haceUnMes.toISOString().split('T')[0];
    if (hastaEl && !hastaEl.value) hastaEl.value = hoy.toISOString().split('T')[0];
  }

  const found = misPartes.filter(p => {
    if (p.estado === 'eliminado') return false;
    // Filtro por estado
    if (_searchFilter === 'completado' && !['completado','revisado','facturado'].includes(p.estado)) return false;
    if (_searchFilter === 'programado' && p.estado !== 'programado') return false;
    if (_searchFilter === 'en_curso' && p.estado !== 'en_curso') return false;
    // Filtro por fecha
    if (desde && p.fecha < desde) return false;
    if (hasta && p.fecha > hasta) return false;
    // Filtro por texto
    if (q.length >= 2) {
      const fields = [p.numero, p.trabajo_titulo, p.direccion, p.descripcion, p.cliente_nombre_firma, p.usuario_nombre, p.instrucciones].filter(Boolean).join(' ').toLowerCase();
      if (!fields.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => (b.fecha||'').localeCompare(a.fecha||'')).slice(0, 30);

  if (!found.length) {
    results.innerHTML = '<div style="text-align:center;padding:16px;color:var(--gris-400);font-size:13px">Sin resultados</div>';
    return;
  }
  results.innerHTML = `<div style="font-size:11px;color:var(--gris-400);margin-bottom:8px;text-align:right">${found.length} resultado${found.length!==1?'s':''}</div>` + found.map(p => renderParteCard(p)).join('');
}

function renderOperarioPartes(el) {
  const _ahora = new Date();
  const hoy = _ahora.getFullYear() + '-' + String(_ahora.getMonth()+1).padStart(2,'0') + '-' + String(_ahora.getDate()).padStart(2,'0');

  // Separar por estado
  const activos = misPartes.filter(p => ['programado','en_curso','borrador'].includes(p.estado) && (p.fecha >= hoy || !p.fecha));
  const caducados = misPartes.filter(p => ['programado','en_curso','borrador'].includes(p.estado) && p.fecha && p.fecha < hoy);
  const completados = misPartes.filter(p => ['completado','revisado','facturado'].includes(p.estado));

  // Ordenar por fecha (desc) y luego por número (desc)
  const sortFechaNum = (a, b) => {
    const fa = a.fecha || '9999-99-99', fb = b.fecha || '9999-99-99';
    if (fa !== fb) return fb.localeCompare(fa);
    const na = a.numero || 0, nb = b.numero || 0;
    return nb - na;
  };
  activos.sort(sortFechaNum);
  caducados.sort(sortFechaNum);
  completados.sort(sortFechaNum);

  el.innerHTML = `
    <div class="section-title">📝 Partes activos (${activos.length})</div>
    ${activos.length ? activos.map(p => renderParteCard(p, true)).join('') : '<div class="empty-state"><div class="ico">✨</div><p>Sin partes activos</p></div>'}

    ${caducados.length ? `
      <div class="section-title" style="margin-top:24px;color:var(--rojo)">⏰ Caducados (${caducados.length})</div>
      <div style="background:var(--rojo-light);border-radius:10px;padding:8px;margin-bottom:4px;font-size:11px;color:var(--rojo);font-weight:600">Partes con fecha pasada sin completar</div>
      ${caducados.map(p => renderParteCard(p, true)).join('')}
    ` : ''}

    ${completados.length ? `
      <div class="section-title" style="margin-top:24px">✅ Completados (${completados.length})</div>
      ${completados.slice(0,20).map(p => renderParteCard(p)).join('')}
    ` : ''}
  `;
}

function renderOperarioTareas(el) {
  const pendientes = misTareas.filter(t => t.estado !== 'completada');
  const hechas = misTareas.filter(t => t.estado === 'completada');
  const total = misTareas.length;
  const porcent = total ? Math.round((hechas.length / total) * 100) : 0;

  // Agrupar pendientes por prioridad
  const prioConfig = [
    { key:'urgente', label:'Urgentes', ico:'🔺', color:'var(--rojo)', bg:'var(--rojo-light)' },
    { key:'alta',    label:'Alta prioridad', ico:'▲', color:'var(--amarillo)', bg:'var(--amarillo-light)' },
    { key:'normal',  label:'Normal', ico:'◆', color:'var(--azul)', bg:'var(--azul-light)' },
    { key:'baja',    label:'Baja prioridad', ico:'▽', color:'var(--gris-500)', bg:'var(--gris-100)' },
  ];

  let gruposHtml = '';
  prioConfig.forEach(cfg => {
    const items = pendientes.filter(t => (t.prioridad || 'normal') === cfg.key);
    if (!items.length) return;
    gruposHtml += `
      <div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:6px 10px;background:${cfg.bg};border-radius:8px">
          <span style="font-size:14px">${cfg.ico}</span>
          <span style="font-size:12px;font-weight:800;color:${cfg.color};text-transform:uppercase;letter-spacing:.3px">${cfg.label} (${items.length})</span>
        </div>
        <div class="card" style="margin-bottom:0">${items.map(t => renderTareaItem(t)).join('')}</div>
      </div>`;
  });

  el.innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700">${hechas.length} de ${total} completadas</span>
        <span style="font-size:14px;font-weight:800;color:${porcent===100?'var(--verde)':'var(--azul)'}">${porcent}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${porcent}%;background:${porcent===100?'var(--verde)':'var(--azul)'}"></div></div>
    </div>

    ${gruposHtml || (pendientes.length ? `<div class="section-title">📋 Pendientes</div><div class="card">${pendientes.map(t => renderTareaItem(t)).join('')}</div>` : '')}

    ${hechas.length ? `
      <div class="section-title" style="opacity:.6">✅ Completadas</div>
      <div class="card" style="opacity:.7">${hechas.slice(0,10).map(t => renderTareaItem(t)).join('')}</div>
    ` : ''}

    ${!total ? '<div class="empty-state"><div class="ico">✅</div><p>Sin tareas asignadas</p></div>' : ''}
  `;
}

let _agendaView = 'dia'; // dia | semana | mes
let _agendaDate = new Date();

// Mini agenda dentro del formulario de nuevo parte
let _qfMiniWeekStart = null; // lunes de la semana visible en el mini-planner

function renderOperarioAgenda(el) {
  const _ahora = new Date();
  const hoy = _ahora.getFullYear() + '-' + String(_ahora.getMonth()+1).padStart(2,'0') + '-' + String(_ahora.getDate()).padStart(2,'0');

  // Tabs de vista
  const tabs = [
    { key:'dia', label:'Día', ico:'📋' },
    { key:'semana', label:'Semana', ico:'📅' },
    { key:'mes', label:'Mes', ico:'🗓️' },
  ];

  let contenido = '';
  if (_agendaView === 'dia') contenido = _agendaVistaDia(hoy);
  else if (_agendaView === 'semana') contenido = _agendaVistaSemana(hoy);
  else contenido = _agendaVistaMes(hoy);

  el.innerHTML = `
    <div style="display:flex;gap:4px;margin-bottom:12px">
      ${tabs.map(t => `<button onclick="_agendaView='${t.key}';navigateTo('agenda')" style="flex:1;padding:8px 4px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);background:${_agendaView===t.key?'var(--azul)':'var(--gris-100)'};color:${_agendaView===t.key?'#fff':'var(--gris-500)'}">${t.ico} ${t.label}</button>`).join('')}
    </div>
    ${contenido}
  `;
}

function _agendaVistaDia(hoy) {
  const dateKey = _agendaDate.getFullYear() + '-' + String(_agendaDate.getMonth()+1).padStart(2,'0') + '-' + String(_agendaDate.getDate()).padStart(2,'0');
  const isHoy = dateKey === hoy;
  const partesDia = misPartes.filter(p => p.fecha === dateKey && p.estado !== 'eliminado');
  partesDia.sort((a,b) => (a.hora_inicio||'23:59').localeCompare(b.hora_inicio||'23:59'));

  // Navegación día anterior/siguiente
  const navHtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button onclick="_agendaNav(-1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">◀</button>
    <div style="text-align:center">
      <div style="font-size:15px;font-weight:800;color:${isHoy?'var(--azul)':'var(--gris-800)'}">${isHoy?'HOY — ':''}${_agendaDate.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>
    <button onclick="_agendaNav(1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">▶</button>
  </div>`;

  if (!partesDia.length) {
    return navHtml + '<div class="card" style="text-align:center;padding:32px 16px;color:var(--gris-400)"><div style="font-size:36px;margin-bottom:8px">📭</div><div style="font-size:13px">Sin trabajos programados</div></div>';
  }

  // Franjas horarias: de 7:00 a 20:00
  let franjas = '';
  for (let h = 7; h <= 20; h++) {
    const hStr = String(h).padStart(2,'0');
    const partesHora = partesDia.filter(p => {
      const hi = p.hora_inicio ? p.hora_inicio.substring(0,2) : null;
      return hi === hStr;
    });

    franjas += `<div style="display:flex;min-height:${partesHora.length?'auto':'28px'};border-bottom:1px solid var(--gris-100)">
      <div style="width:48px;padding:4px 4px 4px 0;text-align:right;font-size:11px;font-weight:700;color:var(--gris-400);flex-shrink:0">${hStr}:00</div>
      <div style="flex:1;padding:2px 0 2px 8px;border-left:2px solid var(--gris-200)">
        ${partesHora.map(p => {
          const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
          const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '—';
          const hf = p.hora_fin ? p.hora_fin.substring(0,5) : '—';
          return `<div onclick="openParteDetail(${p.id})" style="background:${est.bg};border-left:3px solid ${est.color};border-radius:6px;padding:8px 10px;margin:2px 0;cursor:pointer">
            <div style="font-size:12.5px;font-weight:700;color:var(--gris-800)">${p.trabajo_titulo || 'Sin obra'}</div>
            <div style="font-size:11px;color:var(--gris-500);margin-top:2px">${hi}-${hf} · ${est.ico} ${est.label}</div>
            ${p.direccion ? `<div style="font-size:10.5px;color:var(--gris-400);margin-top:1px">📍 ${p.direccion}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Partes sin hora asignada
  const sinHora = partesDia.filter(p => !p.hora_inicio);
  let sinHoraHtml = '';
  if (sinHora.length) {
    sinHoraHtml = `<div style="margin-top:12px">
      <div style="font-size:11px;font-weight:700;color:var(--gris-400);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px">Sin hora asignada</div>
      ${sinHora.map(p => {
        const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
        return `<div onclick="openParteDetail(${p.id})" style="background:${est.bg};border-left:3px solid ${est.color};border-radius:6px;padding:8px 10px;margin:4px 0;cursor:pointer">
          <div style="font-size:12.5px;font-weight:700;color:var(--gris-800)">${p.trabajo_titulo || 'Sin obra'}</div>
          <div style="font-size:11px;color:var(--gris-500);margin-top:2px">${est.ico} ${est.label}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  return navHtml + `<div class="card" style="padding:8px 12px">${franjas}</div>` + sinHoraHtml;
}

function _agendaVistaSemana(hoy) {
  // Calcular lunes de la semana actual de _agendaDate
  const d = new Date(_agendaDate);
  const dayOfWeek = d.getDay() || 7; // domingo=7
  d.setDate(d.getDate() - dayOfWeek + 1); // lunes

  const navHtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button onclick="_agendaNavWeek(-1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">◀</button>
    <div style="font-size:14px;font-weight:800;color:var(--gris-800)">Semana ${_getWeekNum(d)}</div>
    <button onclick="_agendaNavWeek(1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">▶</button>
  </div>`;

  let diasHtml = '';
  for (let i = 0; i < 7; i++) {
    const dia = new Date(d);
    dia.setDate(d.getDate() + i);
    const key = dia.getFullYear() + '-' + String(dia.getMonth()+1).padStart(2,'0') + '-' + String(dia.getDate()).padStart(2,'0');
    const isHoy = key === hoy;
    const partesDia = misPartes.filter(p => p.fecha === key && p.estado !== 'eliminado');
    partesDia.sort((a,b) => (a.hora_inicio||'23:59').localeCompare(b.hora_inicio||'23:59'));
    const dayName = dia.toLocaleDateString('es-ES',{weekday:'short',day:'numeric'});

    diasHtml += `<div style="margin-bottom:8px">
      <div onclick="_agendaDate=new Date('${key}T12:00:00');_agendaView='dia';navigateTo('agenda')" style="font-size:12px;font-weight:800;padding:6px 10px;border-radius:8px;cursor:pointer;background:${isHoy?'var(--azul)':'var(--gris-100)'};color:${isHoy?'#fff':'var(--gris-600)'};display:inline-block;margin-bottom:4px;text-transform:capitalize">${dayName}</div>
      ${partesDia.length ? partesDia.map(p => {
        const est = PT_ESTADOS[p.estado] || PT_ESTADOS.borrador;
        const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '—';
        return `<div onclick="openParteDetail(${p.id})" style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-left:3px solid ${est.color};background:${est.bg};border-radius:0 6px 6px 0;margin:3px 0;cursor:pointer">
          <span style="font-size:11px;font-weight:700;color:var(--gris-500);width:36px">${hi}</span>
          <span style="font-size:12px;font-weight:600;color:var(--gris-800);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.trabajo_titulo || 'Sin obra'}</span>
          <span style="font-size:10px">${est.ico}</span>
        </div>`;
      }).join('') : `<div style="padding:4px 10px;font-size:11px;color:var(--gris-300)">—</div>`}
    </div>`;
  }

  return navHtml + `<div class="card" style="padding:10px 12px">${diasHtml}</div>`;
}

// Colores de estado para los dots del calendario mensual
const _AGENDA_ESTADO_COLOR = {
  borrador:   '#9CA3AF',  // gris
  programado: '#3B82F6',  // azul
  en_curso:   '#D97706',  // naranja
  completado: '#22C55E',  // verde
  revisado:   '#10B981',  // verde oscuro
  facturado:  '#8B5CF6',  // morado
};

let _agendaMesSelectedDay = null; // día seleccionado en la vista mes (key YYYY-MM-DD)

function _agendaVistaMes(hoy) {
  const year = _agendaDate.getFullYear();
  const month = _agendaDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay() || 7; // lun=1

  const navHtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button onclick="_agendaNavMonth(-1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">◀</button>
    <div style="font-size:14px;font-weight:800;color:var(--gris-800);text-transform:capitalize">${firstDay.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</div>
    <button onclick="_agendaNavMonth(1)" style="border:none;background:var(--gris-100);border-radius:8px;padding:8px 12px;font-size:16px;cursor:pointer">▶</button>
  </div>`;

  // Header días
  const dayNames = ['L','M','X','J','V','S','D'];
  let grid = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;
  grid += dayNames.map(d => `<div style="font-size:10px;font-weight:700;color:var(--gris-400);padding:4px">${d}</div>`).join('');

  // Espacios vacíos antes del día 1
  for (let i = 1; i < startDow; i++) { grid += `<div></div>`; }

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const key = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isHoy = key === hoy;
    const isSelected = key === _agendaMesSelectedDay;
    const partesDia = misPartes.filter(p => p.fecha === key && p.estado !== 'eliminado');

    // Dots de color por estado (máximo 3)
    const dotsHtml = partesDia.length === 0 ? '<div style="height:6px;margin-top:2px"></div>'
      : '<div style="display:flex;justify-content:center;gap:2px;margin-top:2px">'
        + partesDia.slice(0, 3).map(p => {
            const col = _AGENDA_ESTADO_COLOR[p.estado] || '#9CA3AF';
            return `<div style="width:6px;height:6px;border-radius:50%;background:${isHoy?'rgba(255,255,255,.8)':col}"></div>`;
          }).join('')
        + (partesDia.length > 3 ? `<div style="font-size:7px;color:${isHoy?'rgba(255,255,255,.7)':'var(--gris-400)'};line-height:6px">+${partesDia.length-3}</div>` : '')
        + '</div>';

    // Al click: alternar selección del día (mostrar partes debajo)
    grid += `<div onclick="_agendaMesToggleDay('${key}')" style="padding:6px 2px;border-radius:8px;cursor:pointer;
      background:${isSelected?'var(--azul-light)':isHoy?'var(--azul)':'transparent'};
      color:${isHoy?'#fff':'var(--gris-700)'};
      outline:${isSelected&&!isHoy?'2px solid var(--azul)':'none'};
      outline-offset:-2px">
      <div style="font-size:13px;font-weight:${isHoy||isSelected?'800':'600'}">${d}</div>
      ${dotsHtml}
    </div>`;
  }
  grid += '</div>';

  // Panel detalle del día seleccionado
  let detailHtml = '';
  if (_agendaMesSelectedDay) {
    const pDay = misPartes.filter(p => p.fecha === _agendaMesSelectedDay && p.estado !== 'eliminado');
    const dt = new Date(_agendaMesSelectedDay + 'T12:00:00');
    const fechaLabel = dt.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
    detailHtml = `<div style="margin-top:10px;border-top:2px solid var(--azul);padding-top:10px">
      <div style="font-size:12px;font-weight:800;color:var(--azul);text-transform:capitalize;margin-bottom:8px">📋 ${fechaLabel}</div>
      ${pDay.length === 0
        ? '<div style="font-size:13px;color:var(--gris-400);text-align:center;padding:16px 0">Sin partes este día</div>'
        : pDay.map(p => {
            const col = _AGENDA_ESTADO_COLOR[p.estado] || '#9CA3AF';
            const hi = p.hora_inicio ? p.hora_inicio.substring(0,5) : '—';
            const hf = p.hora_fin ? p.hora_fin.substring(0,5) : '—';
            return `<div onclick="abrirParte(${p.id})" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gris-100);cursor:pointer">
              <div style="width:4px;height:36px;border-radius:2px;background:${col};flex-shrink:0"></div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.trabajo_titulo || p.numero || '—'}</div>
                <div style="font-size:11px;color:var(--gris-400)">${hi}–${hf} · <span style="color:${col};font-weight:600">${p.estado}</span></div>
              </div>
              <span style="font-size:16px;color:var(--gris-300)">›</span>
            </div>`;
          }).join('')}
    </div>`;
  }

  return navHtml + `<div class="card" style="padding:10px 12px">${grid}${detailHtml}</div>`;
}

function _agendaMesToggleDay(key) {
  _agendaMesSelectedDay = (_agendaMesSelectedDay === key) ? null : key;
  // Re-renderizar solo la vista mes (sin cambiar de tab)
  const body = document.querySelector('[data-view-body]') || document.getElementById('pageBody');
  navigateTo('agenda');
}

function _agendaNav(offset) {
  _agendaDate.setDate(_agendaDate.getDate() + offset);
  navigateTo('agenda');
}
function _agendaNavWeek(offset) {
  _agendaDate.setDate(_agendaDate.getDate() + (offset * 7));
  navigateTo('agenda');
}
function _agendaNavMonth(offset) {
  _agendaDate.setMonth(_agendaDate.getMonth() + offset);
  navigateTo('agenda');
}
function _getWeekNum(d) {
  const onejan = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7);
}

function _chatMobileRenderList(convs) {
  const container = document.getElementById('chatMobileConvs');
  if (!container) return;
  if (!convs || !convs.length) {
    container.innerHTML = `<div style="padding:30px;text-align:center;color:var(--gris-400);font-size:13px">
      <div style="font-size:36px;margin-bottom:8px">💬</div>

    </div>`;
    return;
  }
  let html = '';
  for (const conv of convs) {
    const unread = _chatUnread[conv.id] || 0;
    const titulo = conv.titulo || conv._nombreOtro || 'Sin título';
    const ico = conv.tipo === 'obra' ? '🏗️' : '👤';
    const preview = conv.ultimo_mensaje_texto || 'Sin mensajes';
    const fecha = chatFormatFechaCorta(conv.ultimo_mensaje_at);
    const iniciales = chatIniciales(titulo);
    const bgColor = conv.tipo === 'obra' ? 'var(--verde)' : 'var(--azul)';
    html += `<div onclick="_chatMobileAbrir(${conv.id})" style="display:flex;align-items:center;gap:10px;padding:14px 12px;cursor:pointer;border-bottom:1px solid var(--gris-100)${unread ? ';background:var(--azul-light)' : ''}">
      <div style="width:44px;height:44px;border-radius:50%;background:${bgColor};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0">${iniciales}</div>
      <div style="flex:1;min-width:0">

          <span style="font-weight:${unread ? '700' : '500'};font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ico} ${_chatEscapeHtml(titulo)}</span>
          <span style="font-size:11px;color:var(--gris-400);flex-shrink:0;margin-left:6px">${fecha}</span>
        </div>
        <div style="font-size:12.5px;color:var(--gris-400);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px">${_chatEscapeHtml(preview)}</div>
      </div>
      ${unread ? `<div style="background:#ef4444;color:#fff;font-size:10px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px">${unread}</div>` : ''}
    </div>`;
  }
  container.innerHTML = html;
}

async function _chatMobileAbrir(convId) {
  _chatMobileConvAbierta = convId;
  const convPanel = document.getElementById('chatMobileConv');
  if (convPanel) { convPanel.style.display = 'flex'; }

  const conv = _chatConversaciones.find(c => c.id === convId);
  const titulo = conv?.titulo || conv?._nombreOtro || 'Chat';
  const ico = conv?.tipo === 'obra' ? '🏗️' : '👤';
  const iniciales = chatIniciales(titulo);
  const bgColor = conv?.tipo === 'obra' ? 'var(--verde)' : 'var(--azul)';

  // Header
  const header = document.getElementById('chatMobileConvHeader');
  if (header) {
    header.innerHTML = `
      <button onclick="_chatMobileCerrar()" style="background:none;border:none;cursor:pointer;font-size:22px;padding:4px">←</button>
      <div style="width:36px;height:36px;border-radius:50%;background:${bgColor};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">${iniciales}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ico} ${_chatEscapeHtml(titulo)}</div>
        <div style="font-size:11px;color:var(--gris-400)">${conv?.tipo === 'obra' ? 'Chat de obra' : 'Directo'}</div>
      </div>`;
  }

  // Cargar mensajes
  const msgs = await chatCargarMensajes(convId);
  const area = document.getElementById('chatMobileConvMsgs');
  if (area) {
    if (!msgs || !msgs.length) {
      area.innerHTML = '<div style="padding:30px;text-align:center;color:var(--gris-400);font-size:13px"><div style="font-size:36px;margin-bottom:8px">✨</div>¡Envía el primer mensaje!</div>';
    } else {
      let html = '';
      let lastDate = '';
      for (const msg of msgs) {
        if (msg.eliminado) continue;
        const msgDate = new Date(msg.created_at).toLocaleDateString('es-ES', {day:'numeric',month:'long',year:'numeric'});
        if (msgDate !== lastDate) { html += `<div class="chat-date-sep" style="text-align:center;padding:8px 0;margin:4px 0"><span style="background:var(--gris-100);color:var(--gris-500);font-size:11px;padding:3px 10px;border-radius:10px">${msgDate}</span></div>`; lastDate = msgDate; }
        html += chatRenderMensaje(msg, msg.autor_id === CU.id);
      }
      area.innerHTML = html;
    }
    setTimeout(() => { area.scrollTop = area.scrollHeight; }, 80);
  }

  // Input bar

async function _chatMobileIniciarDirecto(userId) {
  document.getElementById('chatMobileNuevoModal')?.remove();

  const existente = _chatConversaciones.find(c => c.tipo === 'directo' && c._otroUserId === userId);
  if (existente) { _chatMobileAbrir(existente.id); return; }

  toast('Creando conversación...', 'info');
  const convId = await chatCrearDirecto(userId);
  if (convId) {
    await chatCargarConversaciones();
    _chatMobileRenderList(_chatConversaciones);
    _chatMobileAbrir(convId);
  } else {
    toast('Error al crear conversación', 'error');
  }
}

  const filtered = _chatConversaciones.filter(c => {
    const t = (c.titulo || c._nombreOtro || '').toLowerCase();
    return t.includes(q) || (c.ultimo_mensaje_texto || '').toLowerCase().includes(q);
  });
  _chatMobileRenderList(filtered);
}

let _gpsMobMap = null;
let _gpsMobMarkers = [];
let _gpsMobVehiculos = [];
let _gpsMobAutoTimer = null;
let _gpsMobFilterOp = '';

function _gpsMobRumbo(deg) {
  if (deg == null) return '—';
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  return dirs[Math.round(deg / 45) % 8];
}

function _gpsMobTimeAgo(secs) {
  if (!secs || secs < 0) return '—';
  if (secs < 60) return 'Ahora';
  if (secs < 3600) return Math.floor(secs / 60) + ' min';
  if (secs < 86400) return Math.floor(secs / 3600) + 'h';
  return Math.floor(secs / 86400) + 'd';
}

async function _gpsMobFetchVehicles() {
  // Intentar via Edge Function proxy
  const proxyUrl = (typeof SUPABASE_URL !== 'undefined' ? SUPABASE_URL : (sb?.supabaseUrl || '')) + '/functions/v1/movertis';
  try {
    const resp = await fetch(proxyUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (typeof SUPABASE_ANON !== 'undefined' ? SUPABASE_ANON : sb?.supabaseKey || '')
      },
      body: JSON.stringify({ action: 'vehicles', params: {} })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch (e) {
    // Fallback directo (temporal, se eliminará cuando el proxy esté desplegado)
    console.warn('GPS proxy no disponible, usando fallback directo:', e.message);
    const resp = await fetch('https://devapi.hellomovertis.com/vehicle/showvehicles', {
      method: 'POST',
      headers: {
        'Authorization': '4667eb0dd9987b7c1b896a0496f084d80463FD8EF5C2AD3BEEA95773C1C59C709539D93A',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ id: [], flags: { basicData: true, lastMessagePosition: true } })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  }
}

function _gpsMobInitMap() {
  const container = document.getElementById('gpsMapMobile');
  if (!container || typeof L === 'undefined') {
    if (container) container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gris-400)">Cargando mapa...</div>';
    return;
  }
  if (_gpsMobMap) { _gpsMobMap.remove(); _gpsMobMap = null; }
  _gpsMobMap = L.map(container, { zoomControl: false, attributionControl: false }).setView([43.35, -7.5], 9);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(_gpsMobMap);
  L.control.zoom({ position: 'topright' }).addTo(_gpsMobMap);
  setTimeout(() => _gpsMobMap?.invalidateSize(), 300);
}

function _gpsMobUpdateMarkers() {
  if (!_gpsMobMap) return;
  _gpsMobMarkers.forEach(m => _gpsMobMap.removeLayer(m));
  _gpsMobMarkers = [];
  const bounds = [];
  const now = Math.floor(Date.now() / 1000);

  // Filtrar por operario si aplica
  let vehs = _gpsMobVehiculos;
  if (_gpsMobFilterOp) {
    vehs = vehs.filter(v => {
      // Asociar vehículo a operario por nombre (simplificado)
      const vName = (v.name || '').toLowerCase();
      return vName.includes(_gpsMobFilterOp.toLowerCase());
    });
  }

  vehs.forEach(v => {
    if (!v.lastPosition) return;
    const { lat, lon, speed, course } = v.lastPosition;
    if (!lat || !lon) return;
    const age = now - (v.lastPosition.date || 0);
    const isActive = age < 7200;
    const isMoving = speed > 3;

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${isMoving ? 'var(--verde)' : isActive ? 'var(--azul)' : 'var(--gris-400)'};
        color:#fff;font-size:10px;font-weight:800;
        padding:3px 7px;border-radius:12px;
        white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3);
        border:2px solid #fff;
        display:flex;align-items:center;gap:3px;
        ${isMoving ? 'animation:gpsPulse 2s infinite' : ''}
      ">${isMoving ? '🚐' : '🅿️'} ${v.name}${isMoving ? ' · ' + Math.round(speed) + 'km/h' : ''}</div>`,
      iconSize: null, iconAnchor: [50, 15]
    });

    const marker = L.marker([lat, lon], { icon }).addTo(_gpsMobMap);
    marker.bindPopup(`<div style="min-width:160px;font-size:12px;line-height:1.6">
      <div style="font-weight:800;font-size:13px;margin-bottom:2px">${isMoving ? '🚐' : '🅿️'} ${v.name}</div>
      <div><b>Vel:</b> ${Math.round(speed || 0)} km/h · <b>Rumbo:</b> ${_gpsMobRumbo(course)}</div>
      <div><b>Señal:</b> ${_gpsMobTimeAgo(age)}</div>
      <div style="margin-top:4px"><a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" style="color:var(--azul)">📍 Google Maps</a></div>
    </div>`);
    _gpsMobMarkers.push(marker);
    bounds.push([lat, lon]);
  });

  if (bounds.length > 1) _gpsMobMap.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
  else if (bounds.length === 1) _gpsMobMap.setView(bounds[0], 14);
}

function _gpsMobRenderList() {
  const el = document.getElementById('gpsMobList');
  if (!el) return;
  const now = Math.floor(Date.now() / 1000);

  let vehs = _gpsMobVehiculos;
  if (_gpsMobFilterOp) {
    vehs = vehs.filter(v => (v.name || '').toLowerCase().includes(_gpsMobFilterOp.toLowerCase()));
  }

  if (!vehs.length) {
    el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gris-400);font-size:13px">Sin vehículos</div>';
    return;
  }

  el.innerHTML = vehs.map(v => {
    const p = v.lastPosition || {};
    const age = now - (p.date || 0);
    const isActive = age < 7200;
    const isMoving = (p.speed || 0) > 3;
    const dotColor = isMoving ? 'var(--verde)' : isActive ? 'var(--azul)' : 'var(--gris-300)';
    const dotClass = isMoving ? 'gps-veh-dot moving' : 'gps-veh-dot';

    return `<div class="gps-veh-card" onclick="_gpsMobCentrar(${p.lat},${p.lon})">
      <div class="${dotClass}" style="background:${dotColor}"></div>
      <div class="gps-veh-info">
        <div class="gps-veh-name">${v.name}</div>
        <div class="gps-veh-meta">${isMoving ? '🟢 Moviendo' : isActive ? '🔵 Parado' : '⚫ Sin señal'} · ${_gpsMobTimeAgo(age)}</div>
      </div>
      <div class="gps-veh-speed" style="color:${isMoving ? 'var(--verde)' : 'var(--gris-400)'}">${Math.round(p.speed || 0)}<span style="font-size:10px;font-weight:400"> km/h</span></div>
    </div>`;
  }).join('');

  // Update counter
  const countEl = document.getElementById('gpsMobCount');
  const moviendo = vehs.filter(v => v.lastPosition && v.lastPosition.speed > 3).length;
  if (countEl) countEl.textContent = `${vehs.length} vehículos · ${moviendo} en movimiento`;
}

function _gpsMobCentrar(lat, lon) {
  if (_gpsMobMap && lat && lon) {
    _gpsMobMap.setView([lat, lon], 16);
    // Abrir popup del marker más cercano
    _gpsMobMarkers.forEach(m => {
      const ll = m.getLatLng();
      if (Math.abs(ll.lat - lat) < 0.0001 && Math.abs(ll.lng - lon) < 0.0001) m.openPopup();
    });
  }
}

async function _gpsMobRefresh() {
  const btn = document.getElementById('gpsMobRefreshBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  try {
    const data = await _gpsMobFetchVehicles();
    if (Array.isArray(data)) {
      _gpsMobVehiculos = data.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      _gpsMobUpdateMarkers();
      _gpsMobRenderList();
      const ts = document.getElementById('gpsMobTimestamp');
      if (ts) ts.textContent = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    }
  } catch (e) {
    console.error('GPS mobile error:', e);
    toast('Error GPS: ' + e.message, 'error');
  }
  if (btn) { btn.disabled = false; btn.textContent = '🔄'; }
}

function _gpsMobStartAuto() {
  _gpsMobStopAuto();
  _gpsMobAutoTimer = setInterval(() => {
    if (currentTab === 'gps') _gpsMobRefresh();
    else _gpsMobStopAuto();
  }, 30000);
}

function _gpsMobStopAuto() {
  if (_gpsMobAutoTimer) { clearInterval(_gpsMobAutoTimer); _gpsMobAutoTimer = null; }
}

function _gpsMobFilterChange(val) {
  _gpsMobFilterOp = val;
  _gpsMobUpdateMarkers();
  _gpsMobRenderList();
}

async function renderJefeGPS(el) {
  // Construir opciones de filtro a partir de vehículos conocidos
  let filterOpts = '<option value="">Todos los vehículos</option>';
  if (_gpsMobVehiculos.length) {
    _gpsMobVehiculos.forEach(v => {
      filterOpts += `<option value="${v.name}">${v.name}</option>`;
    });
  }

  el.innerHTML = `
    ${subHeader('📡 GPS Flota en vivo', 'inicio')}
    <div class="gps-mob-toolbar">
      <select id="gpsMobFilter" onchange="_gpsMobFilterChange(this.value)">${filterOpts}</select>
      <button id="gpsMobRefreshBtn" onclick="_gpsMobRefresh()">🔄</button>
    </div>
    <div id="gpsMapMobile"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin:10px 0 6px">
      <span id="gpsMobCount" style="font-size:12px;font-weight:700;color:var(--gris-600)">Cargando...</span>
      <span style="font-size:11px;color:var(--gris-400)">🔄 auto 30s · <span id="gpsMobTimestamp">—</span></span>
    </div>
    <div id="gpsMobList"></div>
  `;

  _gpsMobInitMap();
  await _gpsMobRefresh();
  _gpsMobStartAuto();

  // Actualizar filtro con nombres de vehículos reales
  if (_gpsMobVehiculos.length) {
    const sel = document.getElementById('gpsMobFilter');
    if (sel && sel.options.length <= 1) {
      _gpsMobVehiculos.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = v.name;
        sel.appendChild(opt);
      });
    }
  }
}

async function _medListar() {
  if (!EMPRESA?.id) return [];
  const { data, error } = await sb.from('mediciones')
    .select('*')
    .eq('empresa_id', EMPRESA.id)
    .neq('estado', 'archivado')
    .order('created_at', { ascending: false })
    .limit(100);
  if (error) { console.error('[mediciones]', error); return []; }
  return data || [];
}

async function _medCrear(cliente_id, tipo) {
  const obj = {
    empresa_id: EMPRESA.id,
    usuario_id: CU?.id || null,
    cliente_id: cliente_id || null,
    tipo,
    fecha: new Date().toISOString().split('T')[0],
    estado: 'borrador',
    items: [],
    fotos: [],
  };
  const { data, error } = await sb.from('mediciones').insert(obj).select().single();
  if (error) { toast('Error: ' + error.message, 'error'); return null; }
  return data;
}

async function _medGuardar(id, patch) {
  const { error } = await sb.from('mediciones').update(patch).eq('id', id);
  if (error) toast('Error guardando: ' + error.message, 'error');
}

async function _medEliminar(id) {
  await sb.from('mediciones').update({ estado: 'archivado' }).eq('id', id);
}

let _medClienteSel = null;
function _medFiltrarClientes(q) {
  const cont = document.getElementById('medCliResultados');
  if (!cont) return;
  const lista = (Array.isArray(clientes) ? clientes : []);
  const query = (q || '').toLowerCase().trim();
  const filtrados = query
    ? lista.filter(c => (c.nombre||'').toLowerCase().includes(query) || (c.nif||'').toLowerCase().includes(query)).slice(0, 8)
    : lista.slice(0, 8);
  if (!filtrados.length) {
    cont.innerHTML = '<div style="padding:8px;color:var(--gris-400);font-size:12px;text-align:center">Sin resultados</div>';
    return;
  }
  cont.innerHTML = filtrados.map(c => `

    </div>

let _medCliTipo = 'Particular';
function _medCliSetTipo(tipo) {
  _medCliTipo = tipo;
  ['par','emp','pro'].forEach(k => {
    const el = document.getElementById('medCli_tipo_' + k);
    if (!el) return;
    const activo = (k === 'par' && tipo === 'Particular') || (k === 'emp' && tipo === 'Empresa') || (k === 'pro' && tipo === 'Profesional');
    el.style.background = activo ? '#3B82F6' : '#fff';
    el.style.color = activo ? '#fff' : 'var(--gris-700)';
    el.style.borderColor = activo ? '#3B82F6' : 'var(--gris-200)';
  });
  const lbl = document.getElementById('medCli_nif_label');
  if (lbl) lbl.textContent = tipo === 'Empresa' ? 'CIF' : tipo === 'Particular' ? 'DNI / NIF' : 'NIF';
}

// CP → provincia auto (si tenemos tabla CP en BD; si no, simplemente nada)
async function _medCliCpChange(cp) {
  cp = (cp || '').trim();
  if (cp.length !== 5) return;
  try {
    const { data } = await sb.from('codigos_postales').select('municipio,provincia').eq('cp', cp).limit(1);
    if (data && data[0]) {
      const muni = document.getElementById('medCli_muni');
      const prov = document.getElementById('medCli_prov');
      if (muni && !muni.value) muni.value = data[0].municipio || '';
      if (prov && !prov.value) prov.value = data[0].provincia || '';
    }
  } catch(_) {}
}

async function _medGuardarClienteNuevo() {
  const v = id => (document.getElementById(id)?.value || '').trim();
  const nombre = v('medCli_nombre');
  const nif    = v('medCli_nif').toUpperCase();
  const tel    = v('medCli_tel');
  const dir    = v('medCli_dir');
  const cp     = v('medCli_cp');
  const muni   = v('medCli_muni');
  const prov   = v('medCli_prov');
  const email  = v('medCli_email');

  const errores = [];
  if (!nombre) errores.push('nombre');
  if (!nif)    errores.push(_medCliTipo === 'Empresa' ? 'CIF' : 'DNI/NIF');
  if (!tel)    errores.push('teléfono');
  if (!dir)    errores.push('dirección');
  if (!cp)     errores.push('CP');
  if (!muni)   errores.push('municipio');
  if (!prov)   errores.push('provincia');
  if (errores.length) {
    toast('Faltan: ' + errores.join(', '), 'error');
    return;
  }

  const obj = {
    empresa_id: EMPRESA.id,
    nombre,
    tipo: _medCliTipo,
    nif,
    telefono: tel,
    email: email || null,
    direccion_fiscal: dir,
    cp_fiscal: cp,
    municipio_fiscal: muni,
    provincia_fiscal: prov,
  };

  const { data, error } = await sb.from('clientes').insert(obj).select().single();
  if (error) { toast('Error al guardar: ' + error.message, 'error'); return; }

  // Refrescar lista en memoria
  if (Array.isArray(clientes)) clientes.push(data);
  else clientes = [data];

  // Cerrar modal y auto-seleccionar
  document.getElementById('_medModalNuevoCli')?.remove();
  toast('✅ Cliente creado: ' + data.nombre, 'success');
  // Si venimos del flujo "Cambiar cliente" sobre una medición existente,
  // asignamos el cliente recién creado a esa medición. Si no, seguimos con
  // el flujo normal de Nueva visita.
  if (window._medAsignarTrasCrear && _medActual) {
    window._medAsignarTrasCrear = false;
    await _medAsignarCliente(data.id);
    return;
  }
  _medSeleccionarCliente(data.id);
}

async function _medElegirTipo(tipo) {
  const m = await _medCrear(_medClienteSel, tipo);
  if (!m) return;
  _medActual = m;
  navigateTo('medicion-detalle');
}

                <div onclick="_medEditItem(${it._idx})" style="padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px">

                  <div style="flex:1;font-size:12.5px;line-height:1.4">${pl.descripcionItem(it)}${it.version&&it.version>1?` <span style="font-size:10px;color:#6B7280;background:#F3F4F6;padding:1px 6px;border-radius:8px;margin-left:4px">v${it.version}</span>`:''}${it.validado?` <span style="font-size:10px;color:#fff;background:#10B981;padding:1px 6px;border-radius:8px;margin-left:4px">🔒 validado</span>`:''}</div>
                  <span style="color:var(--gris-400);font-size:16px">›</span>
                </div>
                ${archivados ? `<div onclick="_medVerHistorial('${it.version_grupo}')" style="padding:6px 12px;border-top:1px dashed var(--gris-200);font-size:11px;color:#6B7280;cursor:pointer;background:#FAFBFC">📜 ${archivados} versión${archivados>1?'es':''} anterior${archivados>1?'es':''} ›</div>` : ''}
              </div>`;
          }).join('');
        })()}
      </div>
    </div>
    <div style="padding:8px 16px">
      <div style="font-weight:700;font-size:14px;margin-bottom:6px">Notas generales</div>
      <textarea id="medNotasGen" oninput="_medGuardarNotas()" placeholder="Notas globales de esta visita…" style="width:100%;min-height:60px;padding:10px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:13px;font-family:var(--font);box-sizing:border-box;resize:vertical">${m.notas || ''}</textarea>
    </div>
    <div style="padding:16px 16px 100px;display:flex;flex-direction:column;gap:8px">
      ${items.length ? `
        <button onclick="_medAbrirMenuExportar()" style="padding:13px;background:#0F766E;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer">📤 Compartir / Exportar</button>
        <button onclick="_medGenerarPresupuesto()" style="padding:11px;background:#7C3AED;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer">📑 Generar presupuesto en el ERP</button>
      ` : ''}
      <button onclick="_medMarcarEstado('${items.length ? 'medido' : 'borrador'}')" style="padding:11px;background:#fff;border:1.5px solid var(--gris-300);border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;color:var(--gris-700)">💾 Guardar y volver</button>
    </div>
  `;
}

let _medNotasTimer = null;
function _medGuardarNotas() {
  if (!_medActual) return;
  const v = document.getElementById('medNotasGen')?.value || '';
  _medActual.notas = v;
  if (_medNotasTimer) clearTimeout(_medNotasTimer);
  _medNotasTimer = setTimeout(() => _medGuardar(_medActual.id, { notas: v }), 600);
}

async function _medMarcarEstado(estado) {
  if (!_medActual) return;
  await _medGuardar(_medActual.id, { estado });
  toast('Medición guardada ✓', 'success');
  navigateTo('mediciones');
}

async function _medConfirmEliminar() {
  if (!_medActual) return;
  if (!confirm('¿Eliminar esta medición? No se puede deshacer.')) return;
  await _medEliminar(_medActual.id);
  toast('Medición eliminada', 'info');
  _medActual = null;
  navigateTo('mediciones');
}

// Cambiar / asignar cliente a una medición existente. Modal de selección
// con la misma lista de clientes. Permite también dejarla "sin cliente".
function _medCambiarCliente() {
  if (!_medActual) return;
  const cliRows = (Array.isArray(clientes) ? clientes : []).slice().sort((a, b) =>
    (a.nombre || '').localeCompare(b.nombre || ''));
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:flex-end;justify-content:center';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column">'+
      '<div style="padding:14px 16px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between">'+
        '<h3 style="margin:0;font-size:16px;font-weight:700">Asignar cliente</h3>'+
        '<button id="medCliClose" style="background:none;border:none;font-size:18px;cursor:pointer;color:#6B7280">✕</button>'+
      '</div>'+
      '<div style="padding:10px 16px;border-bottom:1px solid #F3F4F6">'+
        '<input id="medCliBuscaModal" placeholder="🔍 Buscar cliente…" style="width:100%;padding:10px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:14px;box-sizing:border-box;outline:none">'+
      '</div>'+
      '<div id="medCliListaModal" style="flex:1;overflow-y:auto;padding:6px 8px"></div>'+
      '<div style="padding:10px 16px;border-top:1px solid #F3F4F6;display:flex;flex-direction:column;gap:6px">'+
        '<button id="medCliCrearNuevo" style="width:100%;padding:11px;background:#3B82F6;border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:700;cursor:pointer">+ Crear cliente nuevo</button>'+
        '<button id="medCliSinCliente" style="width:100%;padding:11px;background:transparent;border:1.5px dashed #D1D5DB;border-radius:9px;color:#6B7280;font-size:13px;font-weight:600;cursor:pointer">📋 Sin cliente</button>'+
      '</div>'+
    '</div>';
  document.body.appendChild(overlay);
  const cont = overlay.querySelector('#medCliListaModal');
  const renderLista = (filtro) => {
    const f = (filtro || '').toLowerCase().trim();
    const lista = !f ? cliRows : cliRows.filter(c =>
      (c.nombre || '').toLowerCase().includes(f) ||
      (c.cif_nif || '').toLowerCase().includes(f));
    if (!lista.length) {
      cont.innerHTML = '<div style="text-align:center;padding:20px;color:#9CA3AF;font-size:13px">Sin resultados</div>';
      return;
    }
    cont.innerHTML = lista.map(c =>
      `<div data-cli-id="${c.id}" style="padding:11px 12px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;gap:2px">
        <div style="font-weight:700;font-size:13.5px;color:#1F2937">${c.nombre || '—'}</div>
        ${c.cif_nif ? `<div style="font-size:11px;color:#9CA3AF">${c.cif_nif}</div>` : ''}
      </div>`).join('');
    cont.querySelectorAll('[data-cli-id]').forEach(row => {
      row.addEventListener('mouseenter', () => row.style.background = '#F3F4F6');
      row.addEventListener('mouseleave', () => row.style.background = '');
      row.onclick = async () => {
        const id = parseInt(row.dataset.cliId);
        await _medAsignarCliente(id);
        overlay.remove();
      };
    });
  };
  renderLista('');
  overlay.querySelector('#medCliBuscaModal').oninput = (e) => renderLista(e.target.value);
  overlay.querySelector('#medCliClose').onclick = () => overlay.remove();
  overlay.querySelector('#medCliSinCliente').onclick = async () => {
    await _medAsignarCliente(null);
    overlay.remove();
  };
  overlay.querySelector('#medCliCrearNuevo').onclick = () => {
    overlay.remove();
    // Marca que tras crear el cliente debe asignarse a la medición actual
    window._medAsignarTrasCrear = true;
    _medAbrirModalNuevoCliente();
  };
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function _medAsignarCliente(cliente_id) {
  if (!_medActual) return;
  await _medGuardar(_medActual.id, { cliente_id: cliente_id || null });
  _medActual.cliente_id = cliente_id || null;
  toast(cliente_id ? 'Cliente asignado ✓' : 'Cliente quitado', 'success');
  // Re-renderizar el detalle (usa el contenedor estándar de la app)
  const body = document.getElementById('appBody');
  if (body && typeof renderMedicionDetalle === 'function') renderMedicionDetalle(body);
}

// ── Modal de item (añadir/editar) ──────────────────────────────────
function _medAddItem() {
  _medItemEditIdx = null;
  // Formularios custom (más ricos que el genérico)
  if (_medActual?.tipo === 'ventanas')     return _medAbrirModalVentana({});
  if (_medActual?.tipo === 'bano')         return _medAbrirModalBano({});
  if (_medActual?.tipo === 'climatizacion') return _medAbrirModalClima({});
  _medAbrirModalItem({});
}
function _medEditItem(i) {
  _medItemEditIdx = i;
  const it = (_medActual.items || [])[i] || {};
  if (_medActual?.tipo === 'bano' && it.validado && !it.archivado) {
    return _medPreguntarModificarBano(i, it);
  }
  if (_medActual?.tipo === 'ventanas')     return _medAbrirModalVentana(it);
  if (_medActual?.tipo === 'bano')         return _medAbrirModalBano(it);
  if (_medActual?.tipo === 'climatizacion') return _medAbrirModalClima(it);
  _medAbrirModalItem(it);
}

// Modal de elección al pulsar un baño validado
function _medPreguntarModificarBano(idx, it) {
  const ov = document.createElement('div');
  ov.id = '_medChoiceModal';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:10000;display:flex;align-items:center;justify-content:center;padding:18px';
  ov.innerHTML = `
    <div style="background:#fff;border-radius:14px;max-width:340px;width:100%;padding:20px">
      <div style="text-align:center;font-size:32px;margin-bottom:6px">🔒</div>
      <div style="font-weight:700;font-size:15px;color:#065F46;text-align:center;margin-bottom:6px">Baño validado v${it.version||1}</div>
      <div style="font-size:12.5px;color:#374151;text-align:center;margin-bottom:14px;line-height:1.5">Esta medición está bloqueada. ¿Qué quieres hacer?</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        <button onclick="document.getElementById('_medChoiceModal').remove();_medCrearCopiaBano(${idx})" class="tap" style="padding:11px;background:#3B82F6;color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13.5px">📋 Modificar (crear v${(it.version||1)+1})</button>
        <button onclick="document.getElementById('_medChoiceModal').remove();_medAbrirModalBano(_medActual.items[${idx}])" class="tap" style="padding:11px;background:#fff;border:1.5px solid var(--gris-300);color:var(--gris-700);border-radius:9px;font-weight:700;font-size:13px">👁 Solo ver detalle</button>
        <button onclick="document.getElementById('_medChoiceModal').remove()" class="tap" style="padding:9px;background:none;border:none;color:var(--gris-500);font-size:12px">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
}

// ════════════════════════════════════════════════════════════════
// MODAL CUSTOM DE VENTANAS — formulario rico con hojas múltiples
// ════════════════════════════════════════════════════════════════
function _medAbrirModalVentana(it) {
  if (!_medActual) return;
  const ubic = it.ubicacion || '';
  // Compatibilidad con items antiguos que tenían ancho/alto en cm
  const anchoMm = it.ancho_mm || (it.ancho ? Math.round(parseFloat(it.ancho)*10) : '');
  const altoMm  = it.alto_mm  || (it.alto  ? Math.round(parseFloat(it.alto)*10)  : '');
  const numHojas = it.num_hojas || 1;
  const sim = it.hojas_simetricas !== false;  // default true
  const hojas = it.hojas || [];
  const cajon = it.cajon || {};
  const cantidad = it.cantidad || 1;
  const material = it.material || '';
  const colorMarco = it.color_marco || 'blanco';
  const cristal = it.cristal || '';
  const observ = it.observaciones || '';
  const tipologia = it.tipologia || 'ventana';
  const balconera = it.balconera || {};

  // Estado interno del modal — se persiste en window mientras está abierto
  window._medVentanaState = {
    tipologia: tipologia,
    num_hojas: numHojas,
    hojas_simetricas: sim,
    hojas: hojas.length ? hojas : Array.from({length: numHojas}, () => ({tipo:'practicable', lado_bisagras:'izquierda'})),
    cajon_tipo: cajon.tipo || 'ninguno',
  };

  const titulo = ({
    'ventana':'Nueva ventana','balconera':'Nueva balconera',
    'puerta-entrada':'Nueva puerta','corredera':'Nueva corredera','elevable':'Nueva elevable'
  })[tipologia] || 'Nuevo elemento';

  const ov = document.createElement('div');
  ov.id = '_medModalItem';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
  ov.innerHTML = `
    <div style="background:#fff;width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:92vh;display:flex;flex-direction:column">
      <div style="padding:14px 16px;border-bottom:1px solid var(--gris-100);display:flex;align-items:center;justify-content:space-between">
        <div style="font-weight:700;font-size:15px" id="mvTituloModal">🪟 ${_medItemEditIdx==null ? titulo : 'Editar elemento ' + (_medItemEditIdx+1)}</div>
        <button onclick="document.getElementById('_medModalItem').remove()" class="tap" style="background:none;border:none;font-size:22px;color:var(--gris-400);cursor:pointer;padding:0">✕</button>
      </div>
      <div style="padding:14px 16px;overflow-y:auto;flex:1" id="medVentanaBody">
        ${_medRenderVentanaForm({ubic, anchoMm, altoMm, numHojas, sim, cajon, cantidad, material, colorMarco, cristal, observ, tipologia, balconera, it})}
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--gris-100);display:flex;gap:8px">
        ${_medItemEditIdx!=null ? '<button onclick="_medBorrarItem()" class="tap" style="padding:11px;background:#fff;border:1.5px solid #ef4444;color:#ef4444;border-radius:9px;font-weight:700;font-size:13px">Eliminar</button>' : ''}
        <button onclick="_medGuardarItemVentana()" class="tap" style="flex:1;padding:11px;background:#3B82F6;color:#fff;border:none;border-radius:9px;font-weight:700;font-size:14px">${_medItemEditIdx==null ? 'Añadir' : 'Guardar'}</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
}

function _medRenderVentanaForm(d) {
  const st = window._medVentanaState;
  const labelGrupo = (txt) => `<div style="font-size:10px;color:#9CA3AF;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin:14px 0 6px">${txt}</div>`;

  let html = '';

  // ── Tipología (ventana, balconera, puerta entrada, corredera, elevable)
  html += labelGrupo('Tipología');
  const tipologias = [
    {k:'ventana', l:'Ventana', ico:'🪟'},
    {k:'balconera', l:'Balconera', ico:'🚪🪟'},
    {k:'puerta-entrada', l:'Puerta entrada', ico:'🚪'},
    {k:'corredera', l:'Corredera', ico:'↔️'},
    {k:'elevable', l:'Elevable (HS)', ico:'⬆↔'},
  ];
  html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px">`;
  for (const t of tipologias) {
    const a = st.tipologia === t.k;
    html += `<button type="button" class="tap" onclick="_medVentanaSetTipologia('${t.k}')" style="padding:9px 6px;border:${a?'2px':'1.5px'} solid ${a?'#3B82F6':'var(--gris-200)'};background:${a?'#EFF6FF':'#fff'};color:${a?'#1E40AF':'var(--gris-700)'};border-radius:8px;font-weight:${a?'700':'500'};font-size:11px;line-height:1.25">${t.ico}<br>${t.l}</button>`;
  }
  html += `</div>`;

  // Ubicación + medidas
  html += labelGrupo('Ubicación y hueco');
  html += `<input id="mvUbic" placeholder="Estancia (Salón, dormitorio…)" value="${_medEsc(d.ubic||'')}" style="width:100%;padding:10px;border:1.5px solid var(--gris-200);border-radius:9px;font-size:13px;margin-bottom:8px;box-sizing:border-box">`;
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div><div style="font-size:9.5px;color:var(--gris-500);margin-bottom:3px">Ancho hueco (mm)</div><input id="mvAncho" type="number" inputmode="numeric" value="${d.anchoMm||''}" style="width:100%;padding:11px;border:1.5px solid var(--gris-200);border-radius:9px;font-size:18px;font-weight:700;text-align:center;box-sizing:border-box"></div>
    <div><div style="font-size:9.5px;color:var(--gris-500);margin-bottom:3px">Alto hueco (mm)</div><input id="mvAlto" type="number" inputmode="numeric" value="${d.altoMm||''}" style="width:100%;padding:11px;border:1.5px solid var(--gris-200);border-radius:9px;font-size:18px;font-weight:700;text-align:center;box-sizing:border-box"></div>
  </div>`;

  // Número de hojas + simétricas
  html += labelGrupo('Hojas');
  html += `<div id="mvNumBotones" style="display:flex;gap:6px;margin-bottom:8px">${_medRenderNumBotones()}</div>`;
  html += `<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gris-600);margin-bottom:10px;cursor:pointer">
    <input type="checkbox" id="mvSim" ${st.hojas_simetricas?'checked':''} onchange="_medVentanaToggleSim(this.checked)" style="width:15px;height:15px">
    <span>Hojas iguales (simétricas)</span>
  </label>`;
  html += `<div id="mvHojasCont">${_medRenderHojas(d.anchoMm, d.altoMm)}</div>`;

  // ── Bloque específico balconera / puerta entrada
  if (st.tipologia === 'balconera' || st.tipologia === 'puerta-entrada') {
    const bal = d.balconera || {};
    html += labelGrupo(st.tipologia === 'puerta-entrada' ? 'Detalles puerta entrada' : 'Detalles balconera');
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><div style="font-size:9.5px;color:var(--gris-500);margin-bottom:3px">Umbral</div>
        <select id="mvBalUmbral" style="width:100%;padding:9px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:12.5px;background:#fff;box-sizing:border-box">${['Estándar','Enrasado','Enrasado RPT','Sin umbral','Otro'].map(o => `<option ${bal.umbral===o?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div><div style="font-size:9.5px;color:var(--gris-500);margin-bottom:3px">Tirador exterior</div>
        <select id="mvBalTirador" style="width:100%;padding:9px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:12.5px;background:#fff;box-sizing:border-box">${['Manilla','Pomo','Barra inox','Embutido','Antipánico','No aplica'].map(o => `<option ${bal.tirador===o?'selected':''}>${o}</option>`).join('')}</select>
      </div>
    </div>`;
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><div style="font-size:9.5px;color:var(--gris-500);margin-bottom:3px">Zócalo opaco (mm)</div>
        <input id="mvBalZocalo" type="number" inputmode="numeric" value="${bal.zocalo_mm||''}" placeholder="0=no" style="width:100%;padding:9px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:14px;text-align:center;box-sizing:border-box">
      </div>
      <div><div style="font-size:9.5px;color:var(--gris-500);margin-bottom:3px">Cerradura</div>
        <select id="mvBalCerradura" style="width:100%;padding:9px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:12.5px;background:#fff;box-sizing:border-box">${['Cilindro estándar','Multipunto','Antibumping','Embutida','Sin cerradura'].map(o => `<option ${bal.cerradura===o?'selected':''}>${o}</option>`).join('')}</select>
      </div>
    </div>`;
    if (st.tipologia === 'puerta-entrada') {
      html += `<div style="margin-bottom:8px">
        <div style="font-size:9.5px;color:var(--gris-500);margin-bottom:3px">Panel</div>
        <select id="mvBalPanel" style="width:100%;padding:9px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:12.5px;background:#fff;box-sizing:border-box">${['Vidrio','Opaco','Mixto vidrio/opaco','Decorativo'].map(o => `<option ${bal.panel===o?'selected':''}>${o}</option>`).join('')}</select>
      </div>`;
    }
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <label class="tap" style="display:flex;align-items:center;gap:6px;padding:8px 10px;border:1px solid var(--gris-200);border-radius:8px;font-size:11.5px;cursor:pointer">
        <input type="checkbox" id="mvBalFijoLat" ${bal.fijo_lateral?'checked':''}> Fijo lateral
      </label>
      <label class="tap" style="display:flex;align-items:center;gap:6px;padding:8px 10px;border:1px solid var(--gris-200);border-radius:8px;font-size:11.5px;cursor:pointer">
        <input type="checkbox" id="mvBalMontante" ${bal.montante_sup?'checked':''}> Montante sup.
      </label>
    </div>`;
  }

  // Cajón persiana
  html += labelGrupo('Cajón de persiana');
  html += `<select id="mvCajonTipo" onchange="_medVentanaCajonChange(this.value)" style="width:100%;padding:10px;border:1.5px solid var(--gris-200);border-radius:9px;font-size:13px;margin-bottom:8px;background:#fff;box-sizing:border-box">
    ${['ninguno','compacto','monoblock','cajon_obra'].map(t => `<option value="${t}" ${st.cajon_tipo===t?'selected':''}>${({ninguno:'Sin cajón',compacto:'Compacto',monoblock:'Monoblock',cajon_obra:'Cajón obra'})[t]}</option>`).join('')}
  </select>`;
  html += `<div id="mvCajonExtras" style="${st.cajon_tipo==='ninguno'?'display:none':''}">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><div style="font-size:9.5px;color:var(--gris-500);margin-bottom:3px">Alto cajón (mm)</div><input id="mvCajonAlto" type="number" inputmode="numeric" value="${d.cajon.alto_mm||''}" placeholder="200" style="width:100%;padding:9px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:14px;text-align:center;box-sizing:border-box"></div>

function _medRenderHojas(anchoTotal, altoTotal) {
  const st = window._medVentanaState;
  const N = st.num_hojas;
  // Si simétricas y N>1, todas tienen el mismo ancho
  const anchoEqual = anchoTotal ? Math.floor(parseFloat(anchoTotal) / N) : 0;
  let html = '';
  if (st.hojas_simetricas && N > 1) {
    html += `<div style="background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;padding:8px 10px;font-size:11px;color:#166534;margin-bottom:8px">
      ✓ ${N} hojas iguales · cada una ${anchoEqual||'?'} mm · mismo tipo, lado de bisagras independiente
    </div>`;
    // Hoja 1: bloque completo (ancho compartido + tipo + lado)
    html += _medRenderHojaBlock(0, anchoEqual, true, 'full');
    // Hojas 2..N: solo selector de lado de bisagras (porque el tipo y ancho son compartidos)
    for (let i = 1; i < N; i++) {
      html += _medRenderHojaBlock(i, anchoEqual, false, 'lado-only');
    }
  } else {
    if (N > 1) html += `<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:8px 10px;font-size:11px;color:#92400E;margin-bottom:8px">
      ℹ️ Cada hoja con dimensiones individuales. Suma esperada: ${anchoTotal||'?'} mm.
    </div>`;
    for (let i = 0; i < N; i++) {
      html += _medRenderHojaBlock(i, st.hojas[i]?.ancho || (anchoTotal ? anchoEqual : ''), false, 'full');
    }
  }
  return html;
}

// Devuelve la configuración del selector secundario según el tipo de hoja:
// {label, opciones, msgVacio} u objeto con flag {ninguno:true} cuando no aplica.
function _medSelectorSegunTipo(tipo) {
  const t = (tipo || '').toLowerCase();
  if (t === 'fija' || t.includes('fij')) {
    return { ninguno: true, msgVacio: '— Hoja fija (sin apertura) —' };
  }
  if (t.includes('corredera') || t === 'elevable' || t.includes('elevable')) {
    return {
      label: 'Sentido deslizamiento',
      opciones: [
        {k:'izquierda', ico:'⬅', l:'Izq'},
        {k:'derecha',   ico:'➡', l:'Der'},
      ],
    };
  }
  if (t.includes('plegable')) {
    return {
      label: 'Lado del pliegue',
      opciones: [
        {k:'izquierda', ico:'⬅', l:'Izq'},
        {k:'derecha',   ico:'➡', l:'Der'},
      ],
    };
  }
  if (t.includes('proyectante')) {
    return {
      label: 'Eje proyección',
      opciones: [
        {k:'arriba', ico:'⬆', l:'Arr'},
        {k:'abajo',  ico:'⬇', l:'Aba'},
      ],
    };
  }
  if (t.includes('abatible')) {
    return {
      label: 'Eje abatimiento',
      opciones: [
        {k:'abajo',  ico:'⬇', l:'Aba (proyectante)'},
        {k:'arriba', ico:'⬆', l:'Arr (basculante)'},
      ],
    };
  }
  // practicable, oscilo-batiente, oscilo-paralela
  return {
    label: 'Lado bisagras',
    opciones: [
      {k:'izquierda', ico:'⬅', l:'Izq'},
      {k:'derecha',   ico:'➡', l:'Der'},
    ],
  };
}

function _medRenderSelectorSecundario(i, h) {
  const cfg = _medSelectorSegunTipo(h.tipo);
  if (cfg.ninguno) {
    return `<div style="font-size:11px;color:#9CA3AF;font-style:italic">${cfg.msgVacio}</div>`;
  }
  const v = h.lado_bisagras || cfg.opciones[0].k;
  return `<div><div style="font-size:9px;color:var(--gris-500);margin-bottom:2px">${cfg.label}</div>
    <div style="display:flex;gap:5px">${cfg.opciones.map(o => {
      const a = v === o.k;
      return `<button type="button" class="tap" onclick="_medVentanaHojaInput(${i},'lado_bisagras','${o.k}')" style="flex:1;padding:6px;border:${a?'2px':'1.5px'} solid ${a?'#3B82F6':'var(--gris-200)'};background:#fff;color:${a?'#1E40AF':'var(--gris-700)'};border-radius:7px;font-size:11px;font-weight:${a?'700':'400'}">${o.ico} ${o.l}</button>`;
    }).join('')}</div></div>`;
}

function _medRenderHojaBlock(i, anchoSugerido, soloPrimero, modo) {
  const st = window._medVentanaState;
  // Si modo='lado-only', heredamos tipo de la hoja 0
  const h0 = st.hojas[0] || {tipo:'practicable', lado_bisagras:'izquierda'};
  const h = st.hojas[i] || {tipo: h0.tipo, lado_bisagras: 'izquierda'};
  // Sincronizar el tipo de hojas extras con el de la primera cuando son simétricas
  if (modo === 'lado-only') h.tipo = h0.tipo;
  const tipos = ['practicable','oscilo-batiente','oscilo-paralela','corredera','elevable','plegable','abatible','proyectante','fija'];
  const cfgSec = _medSelectorSegunTipo(modo === 'lado-only' ? h0.tipo : h.tipo);
  const labelLado = (cfgSec.label || 'Apertura').toLowerCase();
  const labelHoja = modo === 'lado-only'
    ? `Hoja ${i+1}${cfgSec.ninguno ? '' : ' — ' + labelLado}`
    : `Hoja ${i+1}${soloPrimero && st.num_hojas > 1 ? ' (mismo tipo)' : ''}`;
  const subtitle = soloPrimero ? `Tipo aplicado a TODAS las ${st.num_hojas} hojas — ${labelLado} se ajusta por hoja abajo` : '';

  // Modo lado-only: bloque mini con solo el selector contextual
  if (modo === 'lado-only') {
    if (cfgSec.ninguno) {
      return `<div style="border:1px dashed var(--gris-200);border-radius:9px;padding:8px 11px;margin-bottom:6px;background:#FAFBFC;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:11px;font-weight:600;color:var(--gris-500)">Hoja ${i+1}</div>
        <div style="font-size:10.5px;color:#9CA3AF;font-style:italic">${cfgSec.msgVacio}</div>
      </div>`;
    }
    return `<div style="border:1.5px solid var(--gris-200);border-radius:9px;padding:9px 11px;margin-bottom:6px;background:#FAFBFC">
      <div style="font-size:10.5px;font-weight:700;color:var(--gris-700);margin-bottom:6px">${labelHoja}</div>
      ${_medRenderSelectorSecundario(i, h)}
    </div>`;
  }

  // Modo full: bloque completo
  return `<div style="border:1.5px solid ${i===0?'#3B82F6':'var(--gris-200)'};border-radius:10px;padding:11px;margin-bottom:8px;background:${i===0?'#EFF6FF':'#FAFBFC'}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:11.5px;font-weight:700;color:${i===0?'#1E40AF':'var(--gris-700)'}">${labelHoja}</div>
    </div>
    ${subtitle?`<div style="font-size:10.5px;color:#6B7280;margin-bottom:6px">${subtitle}</div>`:''}
    ${st.hojas_simetricas ? '' : `<div style="margin-bottom:7px"><div style="font-size:9px;color:var(--gris-500);margin-bottom:2px">Ancho (mm)</div><input data-hoja="${i}" data-campo="ancho" oninput="_medVentanaHojaInput(${i},'ancho',this.value)" type="number" value="${h.ancho||anchoSugerido||''}" style="width:100%;padding:8px;border:1.5px solid var(--gris-200);border-radius:7px;font-size:14px;font-weight:700;text-align:center;box-sizing:border-box"></div>`}
    <div style="margin-bottom:7px"><div style="font-size:9px;color:var(--gris-500);margin-bottom:2px">Tipo apertura</div><select data-hoja="${i}" data-campo="tipo" onchange="_medVentanaHojaInput(${i},'tipo',this.value)" style="width:100%;padding:8px;border:1.5px solid var(--gris-200);border-radius:7px;font-size:11.5px;background:#fff;box-sizing:border-box">${tipos.map(t => `<option value="${t}" ${h.tipo===t?'selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}</select></div>
    ${_medRenderSelectorSecundario(i, h)}
  </div>`;
}

function _medVentanaSetTipologia(tip) {
  const st = window._medVentanaState;
  st.tipologia = tip;
  // Sugerencias por tipología (no fuerza, solo defaults si todas las hojas están en default)
  if (tip === 'corredera' || tip === 'elevable') {
    // Cambiar tipo de todas las hojas a corredera/elevable si están en default
    for (const h of st.hojas) {
      if (h.tipo === 'practicable') h.tipo = (tip === 'elevable' ? 'elevable' : 'corredera');
    }
  }
  // Re-render completo del form para refrescar sección balconera y título
  const body = document.getElementById('medVentanaBody');
  if (body) {
    const it = (_medItemEditIdx != null && _medActual?.items?.[_medItemEditIdx]) || {};
    body.innerHTML = _medRenderVentanaForm({
      ubic: document.getElementById('mvUbic')?.value || '',
      anchoMm: document.getElementById('mvAncho')?.value || '',
      altoMm: document.getElementById('mvAlto')?.value || '',
      cantidad: document.getElementById('mvCantidad')?.value || 1,
      material: document.getElementById('mvMaterial')?.value || '',
      colorMarco: document.getElementById('mvColorMarco')?.value || '',
      cristal: document.getElementById('mvCristal')?.value || '',
      observ: document.getElementById('mvObserv')?.value || '',
      cajon: it.cajon || {},
      tipologia: tip,
      balconera: it.balconera || {},
      it,
    });
  }
  const titulo = ({
    'ventana':'Nueva ventana','balconera':'Nueva balconera',
    'puerta-entrada':'Nueva puerta','corredera':'Nueva corredera','elevable':'Nueva elevable'
  })[tip] || 'Nuevo elemento';
  const ttl = document.getElementById('mvTituloModal');
  if (ttl && _medItemEditIdx == null) ttl.textContent = '🪟 ' + titulo;
}

function _medVentanaSetHojas(n) {
  const st = window._medVentanaState;
  st.num_hojas = n;
  // Asegurar que el array hojas tiene N entradas con defaults inteligentes
  // (1ª izquierda, última derecha, intermedias alternando)
  while (st.hojas.length < n) {
    const i = st.hojas.length;
    const tipoBase = st.hojas[0]?.tipo || 'practicable';
    let lado;
    if (i === 0)             lado = 'izquierda';
    else if (i === n - 1)    lado = 'derecha';
    else if (n === 3 && i === 1) lado = 'derecha';  // central tira a la derecha
    else                     lado = (i % 2 === 0) ? 'izquierda' : 'derecha';
    st.hojas.push({tipo: tipoBase, lado_bisagras: lado});
  }
  st.hojas = st.hojas.slice(0, n);
  _medRefrescarVentanaForm();
}
function _medVentanaToggleSim(checked) {
  window._medVentanaState.hojas_simetricas = checked;
  _medRefrescarVentanaForm();
}
function _medVentanaCajonChange(tipo) {
  window._medVentanaState.cajon_tipo = tipo;
  const ext = document.getElementById('mvCajonExtras');
  if (ext) ext.style.display = tipo === 'ninguno' ? 'none' : '';
}
function _medVentanaHojaInput(i, campo, valor) {
  const st = window._medVentanaState;
  if (!st.hojas[i]) st.hojas[i] = {};
  st.hojas[i][campo] = valor;
  // Si cambia tipo o lado, re-render para refrescar UI (botones lado activos)
  if (campo === 'tipo' || campo === 'lado_bisagras') _medRefrescarVentanaForm();
}
function _medRenderNumBotones() {
  const st = window._medVentanaState;
  let html = '';
  for (let i = 1; i <= 4; i++) {
    const a = i === st.num_hojas;
    html += `<button type="button" class="tap" onclick="_medVentanaSetHojas(${i})" style="flex:1;padding:9px;border:${a?'2px':'1.5px'} solid ${a?'#3B82F6':'var(--gris-200)'};background:${a?'#EFF6FF':'#fff'};color:${a?'#1E40AF':'var(--gris-700)'};border-radius:8px;font-weight:${a?'700':'400'};font-size:12.5px">${i}</button>`;
  }
  return html;
}

function _medRefrescarVentanaForm() {
  // Re-renderiza la fila de botones 1/2/3/4 + el contenedor de hojas
  const btns = document.getElementById('mvNumBotones');
  if (btns) btns.innerHTML = _medRenderNumBotones();
  const cont = document.getElementById('mvHojasCont');
  if (cont) {
    const ancho = document.getElementById('mvAncho')?.value || '';
    const alto = document.getElementById('mvAlto')?.value || '';
    cont.innerHTML = _medRenderHojas(ancho, alto);
  }
  // Refrescar checkbox simétricas
  const sim = document.getElementById('mvSim');
  if (sim) sim.checked = window._medVentanaState.hojas_simetricas;
}

async function _medGuardarItemVentana() {
  if (!_medActual) return;
  const v = id => (document.getElementById(id)?.value || '').trim();
  const st = window._medVentanaState;
  const ancho = parseInt(v('mvAncho')) || null;
  const alto  = parseInt(v('mvAlto')) || null;
  if (!ancho || !alto) { toast('Faltan medidas del hueco', 'error'); return; }

  const isBal = st.tipologia === 'balconera' || st.tipologia === 'puerta-entrada';
  const obj = {
    ubicacion: v('mvUbic'),
    tipologia: st.tipologia || 'ventana',
    ancho_mm: ancho,
    alto_mm: alto,
    // Compat: dejamos también ancho/alto en cm para items legados
    ancho: (ancho/10).toFixed(1),
    alto: (alto/10).toFixed(1),
    cantidad: parseInt(v('mvCantidad')) || 1,
    num_hojas: st.num_hojas,
    hojas_simetricas: st.hojas_simetricas,
    hojas: st.hojas_simetricas
      ? Array.from({length: st.num_hojas}, (_, i) => ({
          // Hereda tipo, etc. de la hoja 0, pero respeta lado individual de cada hoja
          ...st.hojas[0],
          lado_bisagras: st.hojas[i]?.lado_bisagras || st.hojas[0]?.lado_bisagras || 'izquierda',
          ancho: Math.floor(ancho/st.num_hojas),
        }))
      : st.hojas.slice(0, st.num_hojas).map(h => ({...h, ancho: parseInt(h.ancho)||0})),
    cajon: st.cajon_tipo === 'ninguno' ? null : {
      tipo: st.cajon_tipo,
      // Default por tipo si el usuario no rellena el alto (necesario para el dibujo SVG)
      alto_mm: parseInt(v('mvCajonAlto')) || 200,
      accionamiento: v('mvCajonAcc'),
      material: v('mvCajonMat'),
      color: v('mvCajonColor'),
    },
    balconera: isBal ? {
      umbral: v('mvBalUmbral'),
      tirador: v('mvBalTirador'),
      zocalo_mm: parseInt(v('mvBalZocalo')) || 0,
      cerradura: v('mvBalCerradura'),
      panel: v('mvBalPanel'),
      fijo_lateral: document.getElementById('mvBalFijoLat')?.checked || false,
      montante_sup: document.getElementById('mvBalMontante')?.checked || false,
    } : null,
    material: v('mvMaterial'),
    color_marco: v('mvColorMarco'),
    cristal: v('mvCristal'),
    mosquitera:  document.getElementById('mvExt_mosquitera')?.checked || false,
    vierteaguas: document.getElementById('mvExt_vierteaguas')?.checked || false,
    tapajuntas:  document.getElementById('mvExt_tapajuntas')?.checked || false,
    premarco:    document.getElementById('mvExt_premarco')?.checked || false,
    observaciones: v('mvObserv'),
    // Tipo de apertura "principal" — el de la primera hoja, para compat con desc legacy
    tipo_apertura: st.hojas[0]?.tipo || '',
  };

  const items = [...(_medActual.items || [])];
  if (_medItemEditIdx == null) items.push(obj);
  else items[_medItemEditIdx] = obj;
  _medActual.items = items;
  await _medGuardar(_medActual.id, { items, estado: 'medido' });
  document.getElementById('_medModalItem')?.remove();
  renderMedicionDetalle(document.getElementById('appBody'));
}

function _medAbrirModalBano(it) {

    sanit_activo:    it.sanit_activo === true  || !!(it.inodoro || it.lavabo || it.bide),
    gri_activo:      it.gri_activo   === true  || !!(it.griferia && (it.griferia.ducha || it.griferia.lavabo || it.griferia.acabado)),
    acc_activo:      it.acc_activo   === true  || !!(it.accesorios && it.accesorios.length) || !!it.acc_observ,
    esquineros_activo: !!(par.esquineros_n),
    inst_elec_activo:  !!(inst.elec_n || (inst.iluminacion && inst.iluminacion.length)),
    inst_font_activo:  !!(inst.font_n || (inst.font_puntos && inst.font_puntos.length)),
    inst_des_activo:   !!(inst.des_n  || (inst.des_puntos  && inst.des_puntos.length)),
    // SPC: cargar paños del item (si los hay) o crear array vacío
    paredes_spc: (par.paredes_spc && par.paredes_spc.length) ? par.paredes_spc.map(p => ({...p})) : [{},{},{},{}],
    spc_estrategia: par.spc_estrategia || (par.spc_calc && par.spc_calc.estrategia) || 'aprovechar',
    aviso_carpintero_visto: !!par.tipo, // si ya tenía revestimiento, no muestres aviso al editar
  };

  const validado = it.validado === true;
  const tituloModal = _medItemEditIdx==null
    ? '🛁 Nuevo baño'
    : (validado ? `🔒 Baño ${_medItemEditIdx+1} (validado v${it.version||1})` : `🛁 Editar baño ${_medItemEditIdx+1}`);

  // Footer según estado
  let footerHtml;
  if (validado) {
    footerHtml = `
      <button onclick="document.getElementById('_medModalItem').remove()" class="tap" style="padding:11px 12px;background:#fff;border:1.5px solid var(--gris-300);color:var(--gris-700);border-radius:9px;font-weight:700;font-size:12.5px">Cerrar</button>
      <button onclick="_medArchivarItem(${_medItemEditIdx})" class="tap" style="padding:11px 12px;background:#fff;border:1.5px solid #F59E0B;color:#92400E;border-radius:9px;font-weight:700;font-size:12.5px">📥 Archivar</button>
      <button onclick="_medCrearCopiaBano(${_medItemEditIdx})" class="tap" style="flex:1;padding:11px;background:#3B82F6;color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13px">📋 Crear copia editable</button>`;
