<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
<link rel="icon" href="assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
<title>Instalo App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="js/mensajeria/chat.js"></script>
<script src="js/obras/radiadores_catalogo.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --azul:#1B4FD8;--azul-dark:#1339A8;--azul-light:#EEF3FF;
  --verde:#16A34A;--verde-light:#DCFCE7;
  --rojo:#DC2626;--rojo-light:#FEE2E2;
  --amarillo:#D97706;--amarillo-light:#FEF3C7;
  --violeta:#7C3AED;--violeta-light:#EDE9FE;
  --naranja:#F97316;--naranja-light:#FFF7ED;--acento:#F97316;
  --gris-50:#F8FAFC;--gris-100:#F1F5F9;--gris-200:#E2E8F0;
  --gris-300:#CBD5E1;--gris-400:#94A3B8;--gris-500:#64748B;
  --gris-600:#475569;--gris-700:#334155;--gris-800:#1E293B;--gris-900:#0F172A;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:var(--font);background:var(--gris-50);color:var(--gris-900);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:var(--azul);text-decoration:none}

/* ── SCREENS ── */
.screen{display:none;min-height:100dvh}
.screen.active{display:flex;flex-direction:column}

/* ── LOGIN ── */
#s-login{align-items:center;justify-content:center;background:#080E1E;padding:24px;position:relative}
.login-bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 65%,rgba(34,197,94,.12) 0%,transparent 45%),radial-gradient(ellipse at 80% 25%,rgba(245,158,11,.10) 0%,transparent 45%),radial-gradient(ellipse at 75% 75%,rgba(59,130,246,.14) 0%,transparent 45%),radial-gradient(ellipse at 30% 20%,rgba(139,92,246,.10) 0%,transparent 40%);pointer-events:none;z-index:0}
.login-card{position:relative;z-index:1;background:#fff;border-radius:16px;padding:36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.login-card .login-logo{text-align:center;margin-bottom:24px}
.login-card .login-logo p{font-size:12px;color:var(--gris-400);margin-top:6px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--gris-600);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:15px;outline:none;transition:border .2s;font-family:var(--font)}
.field input:focus{border-color:var(--azul)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:10px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;width:100%}
.btn-primary{background:var(--azul);color:#fff}
.btn-primary:active{background:var(--azul-dark);transform:scale(.98)}
.btn-secondary{background:var(--gris-100);color:var(--gris-700)}
.btn-danger{background:var(--rojo);color:#fff}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px;width:auto}

/* ─── Feedback táctil GLOBAL ─────────────────────────────────────────
   Todos los <button> de la PWA reciben sensación de "click físico":
   - touch-action:manipulation → elimina el delay de 300ms en iOS.
   - -webkit-tap-highlight-color:transparent → quita el halo gris feo de iOS.
   - :active → leve achique + oscurecido para feedback visual.
   Si un botón concreto ya tiene su propio :active más específico (ej. .btn-primary), ese gana por especificidad/orden. */
button:not(:disabled){touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:transform .08s ease, filter .12s ease}
button:not(:disabled):active{transform:scale(.96);filter:brightness(.92)}

/* Para divs/links que actúan como botones (onclick) — añade .tap */
.tap{transition:transform .08s ease, background-color .12s ease, box-shadow .12s ease;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;cursor:pointer}
.tap:active{transform:scale(.96);filter:brightness(.92)}
/* Variante para tarjetas (selectores de tipo, cards de medición, etc.) */
.tap-card{transition:transform .08s ease, box-shadow .12s ease, border-color .12s ease, background-color .12s ease;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;cursor:pointer}
.tap-card:active{transform:scale(.97);background:#EFF6FF !important;border-color:#3B82F6 !important;box-shadow:inset 0 0 0 1px #3B82F6}
/* Chips (multi-select) */
.tap-chip{transition:transform .06s ease, background-color .1s ease;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;cursor:pointer}
.tap-chip:active{transform:scale(.94)}
.err{display:none;background:var(--rojo-light);color:var(--rojo);padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:12px;text-align:center}

/* ── APP SHELL ── */
#s-app{background:var(--gris-50)}
.safe-top-bar{display:none}
.app-header{position:sticky;top:0;z-index:100;background:#fff;padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--gris-200)}
.app-header .avatar{width:42px;height:42px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0}
.app-header .info{flex:1;min-width:0}
.app-header .info h2{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--gris-900)}
.app-header .info span{font-size:11px;color:var(--gris-400);font-weight:600}
.app-header .hdr-btn{width:36px;height:36px;border-radius:50%;background:var(--gris-100);border:none;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.modo-user-area{display:flex;align-items:center;gap:10px;cursor:pointer;flex:1;min-width:0;-webkit-tap-highlight-color:transparent}
.modo-label{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.modo-dropdown{display:none;position:absolute;top:100%;left:8px;right:8px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.18);z-index:200;overflow:hidden;margin-top:6px}
.modo-dropdown.open{display:block;animation:modoSlide .15s ease-out}
@keyframes modoSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.modo-dropdown-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .1s;font-size:14px;font-weight:600;color:#1E293B}
.modo-dropdown-item:active{background:#F1F5F9}
.modo-dropdown-item+.modo-dropdown-item{border-top:1px solid #F1F5F9}
.modo-dropdown-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.modo-check{display:none;margin-left:auto;color:#22C55E;font-weight:800;font-size:16px}
.modo-check.active{display:block}
.hdr-live{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;background:var(--gris-100);border:1px solid var(--gris-200);font-size:10px;font-weight:700;color:var(--gris-600);cursor:pointer;flex-shrink:0;letter-spacing:.3px}
.hdr-live .live-dot{width:7px;height:7px;border-radius:50%;background:#10B981}

.app-body{flex:1;padding:12px 16px;padding-bottom:calc(140px + var(--safe-bottom))}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gris-200);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.bottom-nav .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;gap:2px;cursor:pointer;border:none;background:none;color:var(--gris-400);font-family:var(--font);transition:color .2s}
.bottom-nav .nav-item.active{color:var(--azul)}
.bottom-nav .nav-item .ico{font-size:22px;line-height:1}
.bottom-nav .nav-item .lbl{font-size:10px;font-weight:700}
.bottom-nav .nav-item .badge{position:absolute;top:-2px;right:-6px;background:var(--rojo);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--gris-100)}
.card-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-title{font-size:13px;font-weight:800;color:var(--gris-500);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;padding-left:4px}

/* ── PARTE CARD ── */
.parte-card{border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--gris-100);cursor:pointer;transition:box-shadow .2s}
.parte-card:active{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.parte-row{display:flex;align-items:center;gap:8px}
.parte-num{font-family:monospace;font-weight:700;font-size:13px;color:var(--azul)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700}
.parte-meta{font-size:11.5px;color:var(--gris-400);margin-top:4px}
.parte-desc{font-size:12.5px;color:var(--gris-600);margin-top:6px;line-height:1.4}
.parte-actions{display:flex;gap:8px;margin-top:10px}
.parte-actions .btn{flex:1}

/* ── TAREA ITEM ── */
.tarea-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--gris-100)}
.tarea-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--gris-300);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;font-size:12px}
.tarea-check.done{background:var(--verde);border-color:var(--verde);color:#fff}
.tarea-texto{flex:1;font-size:13px}
.tarea-texto.done{text-decoration:line-through;color:var(--gris-400)}

/* ── AGENDA ── */
.agenda-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--gris-100)}
.agenda-time{font-size:12px;font-weight:800;color:var(--azul);width:50px;flex-shrink:0;text-align:right}
.agenda-content{flex:1;min-width:0}
.agenda-title{font-size:13.5px;font-weight:700}
.agenda-sub{font-size:11.5px;color:var(--gris-400);margin-top:2px}

/* ── MODAL (FULLSCREEN) ── */
.modal-overlay{display:none;position:fixed;inset:0;background:#fff;z-index:200;flex-direction:column}
.modal-overlay.active{display:flex}
.modal-sheet{background:#fff;border-radius:0;width:100%;max-width:100%;flex:1;overflow-y:auto;padding:0 16px calc(20px + var(--safe-bottom));animation:slideUp .25s ease;display:flex;flex-direction:column}
.modal-blue-bar{background:#3b82f6;padding:var(--safe-top) 16px 0;display:flex;align-items:center;justify-content:flex-end;flex-shrink:0;min-height:calc(var(--safe-top) + 44px)}
.modal-blue-bar h3{display:none}
.modal-blue-bar .modal-x{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);border:none;color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-bottom:4px}
.modal-blue-bar .modal-x:active{background:rgba(255,255,255,.4)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulsoEnCurso{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
.en-curso-dot{display:inline-block;width:9px;height:9px;background:#D97706;border-radius:50%;animation:pulsoEnCurso 1.4s ease-in-out infinite;flex-shrink:0}
.en-curso-banner{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:2px solid #F59E0B;border-radius:14px;padding:12px 14px;margin-bottom:14px}
.modal-handle{display:none}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px}
.wiz-nav{position:sticky;bottom:0;background:#fff;padding:12px 0;border-top:1px solid var(--gris-200);z-index:5;margin-top:auto;transition:opacity .15s}
.keyboard-open .wiz-nav{display:none}
.firma-container{max-height:160px;position:relative}
.firma-container canvas{max-height:140px}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:var(--radius);padding:10px 6px;text-align:center;border:1px solid var(--gris-100)}
.stat-num{font-size:20px;font-weight:800}
.stat-label{font-size:10px;font-weight:600;color:var(--gris-400);margin-top:1px}
.search-filter{background:var(--gris-100);border:none;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--gris-500);cursor:pointer;font-family:var(--font)}
.search-filter.active{background:var(--azul);color:#fff}

/* ── PROGRESS ── */
.progress-bar{height:8px;background:var(--gris-100);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .5s}

/* ── SUB-SCREEN HEADER (fullscreen views with X back) ── */
.sub-header{background:#3b82f6;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;margin:-12px -16px 16px}
.sub-header h3{flex:1;font-size:16px;font-weight:800;color:#fff}
.sub-header .sub-x{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sub-header .sub-x:active{background:rgba(255,255,255,.35)}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--gris-400)}
.empty-state .ico{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ── LOADING OVERLAY ── */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50000;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.active{display:flex}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#fff;font-size:15px;font-weight:700;text-align:center;max-width:80%}

/* ── OCR PREVIEW PANEL ── */
.ocr-preview-overlay{display:none;position:fixed;inset:0;background:#fff;z-index:250;flex-direction:column}
.ocr-preview-overlay.active{display:flex}
.ocr-preview-bar{background:#3b82f6;padding:var(--safe-top) 16px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:calc(var(--safe-top) + 44px)}
.ocr-preview-bar h3{color:#fff;font-size:15px;font-weight:700;margin:0}
.ocr-preview-bar .modal-x{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ocr-preview-body{flex:1;overflow-y:auto;padding:12px 16px calc(120px + var(--safe-bottom))}
.ocr-page-badge{background:#DBEAFE;color:#1E40AF;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;display:inline-block;margin-bottom:8px}
.ocr-line-item{background:#F9FAFB;border:1.5px solid var(--gris-200);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:center;transition:border-color .2s,background .2s}
.ocr-line-item.selected{border-color:#3b82f6;background:#EFF6FF}
.ocr-line-item.selected{border-color:#3b82f6;background:#EFF6FF}
.ocr-line-detail{flex:1;min-width:0}
.ocr-line-name{font-size:13px;font-weight:600;color:var(--gris-800);line-height:1.3}
.ocr-line-qty{display:flex;align-items:center;gap:6px;margin-top:4px}
.ocr-line-qty input{width:56px;padding:4px 6px;border:1.5px solid var(--gris-200);border-radius:6px;font-size:13px;text-align:center}
.ocr-line-qty span{font-size:12px;color:var(--gris-500)}
.ocr-preview-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gris-200);padding:10px 16px calc(10px + var(--safe-bottom));z-index:251;display:flex;flex-direction:column;gap:8px}
.ocr-footer-row{display:flex;gap:10px}
.ocr-footer-row button{flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer}
.ocr-btn-cancel{background:var(--gris-100);color:var(--gris-600)}
.ocr-btn-confirm{background:#3b82f6;color:#fff}
.ocr-btn-confirm:disabled{opacity:.5}
.ocr-btn-addpage{background:#F0FDF4;color:#15803D;border:1.5px solid #BBF7D0 !important}

/* ── TOAST ── */
.toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%);background:var(--gris-800);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}
.toast.success{background:var(--verde)}
.toast.error{background:var(--rojo)}
.toast.warning{background:var(--amarillo)}

/* ── JEFE: OPERARIO CARDS ── */
.operario-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--gris-100);display:flex;align-items:center;gap:12px;cursor:pointer}
.operario-card:active{background:var(--gris-50)}
.operario-av{width:42px;height:42px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.operario-info{flex:1;min-width:0}
.operario-name{font-size:14px;font-weight:700}
.operario-status{font-size:11.5px;margin-top:2px}

/* ── JEFE: TABS ── */
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap;border:none;background:var(--gris-100);color:var(--gris-500);cursor:pointer;transition:all .2s;font-family:var(--font)}
.tab.active{background:var(--azul);color:#fff}

/* ── PULL TO REFRESH ── */
.ptr-indicator{text-align:center;padding:8px;font-size:12px;color:var(--gris-400);display:none}

/* ── INSTALL BANNER ── */
.install-banner{background:linear-gradient(135deg,var(--azul),var(--violeta));color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;display:none}
.install-banner h3{font-size:14px;font-weight:800;margin-bottom:4px}
.install-banner p{font-size:12px;opacity:.8;margin-bottom:10px}
.install-banner .btn{background:rgba(255,255,255,.2);color:#fff;width:auto;padding:8px 16px}

/* ── WIZARD STEPPER ── */
.wiz-steps{display:flex;gap:4px;margin-bottom:20px}
.wiz-step{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:700;background:var(--gris-100);color:var(--gris-400);transition:all .3s}
.wiz-step.active{background:var(--azul);color:#fff}
.wiz-step.done{background:var(--verde-light);color:var(--verde);cursor:pointer}
.wiz-nav{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--gris-200)}
.wiz-nav .btn{flex:1}

/* ── PHOTO GRID ── */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.foto-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--gris-100)}
.foto-thumb img{width:100%;height:100%;object-fit:cover}
.foto-thumb .del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.foto-add{aspect-ratio:1;border:2px dashed var(--gris-300);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--gris-400);font-size:12px;font-weight:700;gap:4px;transition:all .2s}
.foto-add:active{background:var(--gris-100);border-color:var(--azul)}

/* ── MATERIAL ROW ── */
.mat-row{display:flex;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--gris-100)}
.mat-row .mat-name{flex:1;min-width:0;font-size:13px;font-weight:600}
.mat-row .mat-qty{font-size:13px;font-weight:700;color:var(--azul)}
.mat-row .mat-del{background:none;border:none;font-size:16px;cursor:pointer;padding:4px}
.mat-search{position:relative}
.mat-search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--gris-200);border-radius:8px;max-height:200px;overflow-y:auto;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.1);display:none}
.mat-search-results.show{display:block}
.mat-search-item{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--gris-100);cursor:pointer}
.mat-search-item:active{background:var(--azul-light)}

/* ── SIGNATURE CANVAS ── */
.firma-container{border:2px solid var(--gris-200);border-radius:12px;overflow:hidden;background:#fff;touch-action:none;position:relative}
.firma-container canvas{width:100%;height:200px;display:block}
.firma-clear{position:absolute;top:8px;right:8px;background:var(--gris-100);border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer}
.firma-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--gris-300);font-size:14px;font-weight:600;pointer-events:none}
/* ── FULLSCREEN SIGNATURE OVERLAY ── */
.firma-fullscreen{position:fixed;inset:0;z-index:9999;background:#fff;display:flex;flex-direction:column}
.firma-fullscreen .firma-fs-header{display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top,20px) + 8px) 16px 12px;background:var(--azul);color:#fff}
.firma-fullscreen .firma-fs-header h3{margin:0;font-size:16px;font-weight:700}
.firma-fullscreen .firma-fs-canvas-wrap{flex:1;position:relative;touch-action:none;background:#fff}
.firma-fullscreen .firma-fs-canvas-wrap canvas{width:100%;height:100%;display:block}
.firma-fullscreen .firma-fs-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--gris-300);font-size:18px;font-weight:600;pointer-events:none}
.firma-fullscreen .firma-fs-actions{display:flex;gap:8px;padding:12px 16px calc(env(safe-area-inset-bottom,8px) + 8px);background:var(--gris-50)}
/* Ocultar flechas spinner en inputs numéricos */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

/* ═══════ FAB (Floating Action Button) ═══════ */
.fab-container{position:fixed;bottom:calc(64px + var(--safe-bottom));right:16px;z-index:90;display:flex;flex-direction:column-reverse;align-items:flex-end;gap:10px;pointer-events:none}
/* El fab-main siempre debe recibir clicks; los hijos del menú solo cuando está abierto. */
.fab-container > *{pointer-events:auto}
.fab-container .fab-menu:not(.open){pointer-events:none}
.fab-container .fab-menu:not(.open) *{pointer-events:none}
.fab-main{width:56px;height:56px;border-radius:50%;background:var(--azul);color:#fff;border:none;font-size:26px;box-shadow:0 4px 16px rgba(27,79,216,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s,background .3s;z-index:2}
.fab-main.open{transform:rotate(45deg);background:var(--gris-700)}
.fab-menu{display:flex;flex-direction:column-reverse;gap:8px;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .25s,transform .25s}
.fab-menu.open{opacity:1;transform:translateY(0);pointer-events:auto}
.fab-action{display:flex;align-items:center;gap:8px;flex-direction:row-reverse}
.fab-action button{width:44px;height:44px;border-radius:50%;border:none;color:#fff;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.fab-action button:active{transform:scale(.9)}
.fab-action span{background:#fff;color:var(--gris-800);padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.1);white-space:nowrap}
.fab-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:89}
.fab-overlay.open{display:block}

/* ═══════ CALENDARIO MES ═══════ */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-header h3{font-size:16px;font-weight:800}
.cal-header button{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;color:var(--gris-600)}
.cal-views{display:flex;gap:4px;margin-bottom:12px}
.cal-views button{flex:1;padding:6px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--gris-100);color:var(--gris-500);transition:all .2s}
.cal-views button.active{background:var(--azul);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--gris-400);padding:4px 0;text-transform:uppercase}
.cal-day{text-align:center;padding:8px 2px;border-radius:8px;font-size:13px;cursor:pointer;transition:background .15s;position:relative;min-height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cal-day:active{background:var(--gris-100)}
.cal-day.other{color:var(--gris-300)}
.cal-day.today{background:var(--azul-light);font-weight:800;color:var(--azul)}
.cal-day.selected{background:var(--azul);color:#fff;font-weight:800}
.cal-day.selected.today{background:var(--azul)}
.cal-day .cal-dots{display:flex;gap:2px;margin-top:2px;justify-content:center}

/* ═══════ VISTA SEMANA ═══════ */
.week-grid{display:grid;grid-template-columns:50px 1fr;gap:0}
.week-hour{font-size:10px;color:var(--gris-400);text-align:right;padding:0 8px 0 0;height:48px;display:flex;align-items:flex-start;justify-content:flex-end}
.week-slot{border-top:1px solid var(--gris-100);height:48px;position:relative}

/* ═══════ CREACIÓN RÁPIDA (mini-formularios) ═══════ */

// ═══════════════════════════════════════════════════════════════
// INSTALO MOBILE WEB APP
// ═══════════════════════════════════════════════════════════════

const SUPA_URL = 'https://gskkqqhbpnycvuioqetj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdza2txcWhicG55Y3Z1aW9xZXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzU1OTksImV4cCI6MjA5MDQ1MTU5OX0.4ArVhR9_qh6frtBrWZRRIssr3Zgavv41SdfOgyg27KE';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ─── Session timeout (30 min inactividad → re-login) ───
const SESSION_TIMEOUT_MS = 30 * 60 * 1000; // 30 minutos
function _touchSession() { try { localStorage.setItem('instalo_last_active', Date.now().toString()); } catch(e){} }
function _isSessionExpired() {
  const last = parseInt(localStorage.getItem('instalo_last_active') || '0');
  return !last || (Date.now() - last > SESSION_TIMEOUT_MS);
}
// Actualizar timestamp con cada interacción
document.addEventListener('visibilitychange', () => { if (!document.hidden) return; _touchSession(); });
document.addEventListener('touchstart', _touchSession, { passive: true });
document.addEventListener('click', _touchSession, { passive: true });

// ─── Config Desplazamiento ───
const OFICINA_LAT = 43.686648;
const OFICINA_LNG = -7.420667;
const GMAPS_API_KEY = ''; // ← Pon aquí tu API Key de Google Maps
let _gmapsLoaded = false;

// ─── State ───
let CU = null, CP = null, EMPRESA = null;
let esJefe = false;
let esModoAlmacen = false;
let currentTab = 'inicio';
let misPartes = [];
let misTareas = [];
let todosUsuarios = [];
let trabajos = [];
let clientes = [];
let articulos = [];

// Furgoneta del operario
let miFurgoneta = null;       // objeto almacen con tipo='furgoneta' asignado al operario
let miFurgonetaStock = [];    // stock de la furgoneta [{articulo_id, cantidad, stock_provisional, stock_reservado, articulo:{nombre,codigo}}]
let misReposiciones = [];     // traspasos preparados pendientes de recepción para mi furgoneta

// Fichaje
let misFichajesHoy = [];
let _fichajeEntradaHoy = null; // fichaje de entrada abierto (sin salida)

// Wizard state
let _wiz = { parteId:null, step:0, fotos:[], materiales:[], albaranes_compra:[], firmaData:null };

// ═══════════════════════════════════════════════
// OFFLINE — IndexedDB + Sync Queue
// ═══════════════════════════════════════════════
let _db = null;
let _isOnline = navigator.onLine;
const IDB_NAME = 'instalo_offline';
const IDB_VERSION = 1;

function openOfflineDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      // Stores para cachear datos
      if (!db.objectStoreNames.contains('partes'))   db.createObjectStore('partes', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('trabajos'))  db.createObjectStore('trabajos', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('clientes'))  db.createObjectStore('clientes', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('articulos')) db.createObjectStore('articulos', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('perfiles'))  db.createObjectStore('perfiles', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('tareas'))    db.createObjectStore('tareas', { keyPath: 'id' });
      // Cola de operaciones pendientes
      if (!db.objectStoreNames.contains('syncQueue')) db.createObjectStore('syncQueue', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => { console.error('[IDB] Error:', e); reject(e); };
  });
}

// Guardar array de registros en un store
function idbSaveAll(storeName, records) {
  return new Promise((resolve, reject) => {
    if (!_db) { resolve(); return; }
    const tx = _db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    store.clear(); // Reemplazar todo con datos frescos
    (records || []).forEach(r => store.put(r));
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

// Leer todos los registros de un store
function idbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    if (!_db) { resolve([]); return; }
    const tx = _db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = (e) => reject(e);
  });
}

// ── Cola de sincronización ──
function syncQueueAdd(operation) {
  // operation: { table, action: 'insert'|'update'|'upsert', data, match, timestamp }
  return new Promise((resolve, reject) => {
    if (!_db) { resolve(); return; }
    const tx = _db.transaction('syncQueue', 'readwrite');
    const store = tx.objectStore('syncQueue');
    operation.timestamp = Date.now();
    store.add(operation);
    tx.oncomplete = () => {
      console.log('[Sync] Operación encolada:', operation.action, operation.table);
      _updateSyncBadge();
      resolve();
    };
    tx.onerror = (e) => reject(e);
  });
}

function syncQueueGetAll() {
  return idbGetAll('syncQueue');
}

function syncQueueClear() {
  return new Promise((resolve, reject) => {
    if (!_db) { resolve(); return; }
    const tx = _db.transaction('syncQueue', 'readwrite');
    tx.objectStore('syncQueue').clear();
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

function syncQueueDelete(id) {
  return new Promise((resolve, reject) => {
    if (!_db) { resolve(); return; }
    const tx = _db.transaction('syncQueue', 'readwrite');
    tx.objectStore('syncQueue').delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e);
  });
}

// Procesar cola de sync — subir operaciones pendientes
async function processSyncQueue() {
  if (!navigator.onLine) return;
  const ops = await syncQueueGetAll();
  if (ops.length === 0) return;

  console.log(`[Sync] Procesando ${ops.length} operaciones pendientes...`);
  toast(`Sincronizando ${ops.length} cambio${ops.length > 1 ? 's' : ''}...`, 'info');
  let ok = 0, fail = 0;

  for (const op of ops) {
    try {
      let result;
      if (op.action === 'update_with_files') {
        // Subir fotos/firmas base64 antes de actualizar
        const data = { ...op.data };
        const eid = EMPRESA?.id || 'default';

        // Subir firma cliente si es base64
        if (data.firma_url && data.firma_url.startsWith('data:')) {
          try {
            const blob = await (await fetch(data.firma_url)).blob();
            const fn = `${eid}/${Date.now()}_firma_cli_sync.png`;
            const { error: ue } = await sb.storage.from('fotos-partes').upload(fn, blob);
            if (!ue) { data.firma_url = sb.storage.from('fotos-partes').getPublicUrl(fn).data.publicUrl; }
            else { data.firma_url = null; }
          } catch(e) { data.firma_url = null; console.warn('Sync: firma cli upload error', e); }
        }
        // Subir firma operario si es base64
        if (data.firma_operario_url && data.firma_operario_url.startsWith('data:')) {
          try {
            const blob = await (await fetch(data.firma_operario_url)).blob();
            const fn = `${eid}/${Date.now()}_firma_op_sync.png`;
            const { error: ue } = await sb.storage.from('fotos-partes').upload(fn, blob);
            if (!ue) { data.firma_operario_url = sb.storage.from('fotos-partes').getPublicUrl(fn).data.publicUrl; }
            else { data.firma_operario_url = null; }
          } catch(e) { data.firma_operario_url = null; console.warn('Sync: firma op upload error', e); }
        }
        // Subir fotos nuevas si había
        if (op.fotosNuevas && op.fotosNuevas.length) {
          const fotosUrls = data.fotos || [];
          for (const foto of op.fotosNuevas) {
            try {
              const blob = await (await fetch(foto.data)).blob();
              const fn = `${eid}/${Date.now()}_${Math.random().toString(36).substr(2,9)}.jpg`;
              const { error: ue } = await sb.storage.from('fotos-partes').upload(fn, blob);
              if (!ue) fotosUrls.push(sb.storage.from('fotos-partes').getPublicUrl(fn).data.publicUrl);
            } catch(e) { console.warn('Sync: foto upload error', e); }
          }
          data.fotos = fotosUrls.length > 0 ? fotosUrls : null;
        }

        result = await sb.from(op.table).update(data).match(op.match);
      } else if (op.action === 'update') {
        result = await sb.from(op.table).update(op.data).match(op.match);
      } else if (op.action === 'insert') {
        result = await sb.from(op.table).insert(op.data);
      } else if (op.action === 'upsert') {
        result = await sb.from(op.table).upsert(op.data);
      } else if (op.action === 'mostrador_finalizar') {
        // Replay Mostrador operation
        result = await _syncReplayMostrador(op.data);
      } else if (op.action === 'devs_ok') {
        result = await _syncReplayDevsOk(op.data);
      } else if (op.action === 'recepcion_confirmar') {
        result = await _syncReplayRecepcion(op.data);
      }
      if (result?.error) throw result.error;
      await syncQueueDelete(op.id);
      ok++;
    } catch (e) {
      console.error('[Sync] Error en op:', op, e);
      fail++;
    }
  }

  _updateSyncBadge();
  if (ok > 0) toast(`✅ ${ok} cambio${ok > 1 ? 's' : ''} sincronizado${ok > 1 ? 's' : ''}`, 'success');
  if (fail > 0) toast(`⚠️ ${fail} cambio${fail > 1 ? 's' : ''} no se pudieron subir`, 'error');

  // Refrescar datos tras sincronizar
  if (ok > 0) {
    await loadAllData();
    navigateTo(currentTab);
  }
}

function _updateSyncBadge() {
  syncQueueGetAll().then(ops => {
    const badge = document.getElementById('syncBadge');
    if (badge) {
      if (ops.length > 0) {
        badge.textContent = ops.length;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }
  });
}

async function _syncReplayMostrador(d) {
  // Restore _mostrador state temporarily for the close functions
  const backup = JSON.parse(JSON.stringify(_mostrador));
  _mostrador.items = d.items;
  _mostrador.almacenOrigenId = d.almacenOrigenId;
  _mostrador.destinoId = d.destinoId;
  _mostrador.destinoLabel = d.destinoLabel;
  _mostrador.destinoTipo = d.tipo;
  _mostrador.obraFurgonetaId = d.obraFurgonetaId;
  _mostrador.obraFurgonetaNombre = d.obraFurgonetaNombre;
  _mostrador.obraOperarioNombre = d.obraOperarioNombre;
  // Temporarily set EMPRESA and CU if needed
  try {
    let res;
    if (d.tipo === 'furgoneta' || d.tipo === 'almacen') res = await _mostradorCerrarTraspaso();
    else if (d.tipo === 'cliente') res = await _mostradorCerrarAlbaran(d.firmaDataUrl);
    else if (d.tipo === 'obra') res = await _mostradorCerrarObraTraspaso();
    console.log('[Sync] Mostrador replayed:', res);
    return { error: null };
  } finally {
    // Restore original state
    Object.assign(_mostrador, backup);
  }
}

async function _syncReplayDevsOk(d) {
  const almDestino = _mostradorAlmacenes.find(a => a.id === d.almacenDestinoId);
  // 1) Restar de furgoneta
  const { data: stockFurgo } = await sb.from('stock').select('*')
    .eq('empresa_id', d.empresa_id).eq('articulo_id', d.art.id).eq('almacen_id', d.furgonetaId).maybeSingle();
  if (stockFurgo) {
    await sb.from('stock').update({
      cantidad: Math.max(0, (stockFurgo.cantidad||0) - d.cant),
      updated_at: new Date().toISOString()
    }).eq('id', stockFurgo.id);
  }
  await sb.from('movimientos_stock').insert({
    empresa_id: d.empresa_id, articulo_id: d.art.id, almacen_id: d.furgonetaId,
    tipo: 'devolucion_furgoneta_salida', delta: -Math.abs(d.cant), cantidad: Math.abs(d.cant),
    notas: `Devolución de ${d.operarioNombre||'operario'} → ${almDestino?.nombre||''} [SYNC OFFLINE]`,
    fecha: d.fecha, usuario_id: d.usuario?.id||null, usuario_nombre: d.usuario?.nombre||'Almacén'
  });
  // 2) Sumar al almacén destino
  const { data: stockAlm } = await sb.from('stock').select('*')
    .eq('empresa_id', d.empresa_id).eq('articulo_id', d.art.id).eq('almacen_id', d.almacenDestinoId).maybeSingle();
  if (stockAlm) {
    await sb.from('stock').update({ cantidad: (stockAlm.cantidad||0) + d.cant, updated_at: new Date().toISOString() }).eq('id', stockAlm.id);
  } else {
    await sb.from('stock').insert({ empresa_id: d.empresa_id, articulo_id: d.art.id, almacen_id: d.almacenDestinoId, cantidad: d.cant });
  }
  await sb.from('movimientos_stock').insert({
    empresa_id: d.empresa_id, articulo_id: d.art.id, almacen_id: d.almacenDestinoId,
    tipo: 'devolucion_furgoneta_entrada', delta: Math.abs(d.cant), cantidad: Math.abs(d.cant),
    notas: `Devolución de ${d.operarioNombre||'operario'} (${d.furgonetaNombre}) [SYNC OFFLINE]`,
    fecha: d.fecha, usuario_id: d.usuario?.id||null, usuario_nombre: d.usuario?.nombre||'Almacén'
  });
  return { error: null };
}

async function _syncReplayRecepcion(d) {
  const yaDescontado = (d.traspEstado === 'preparado');
  for (const linea of d.lineasReales) {
    if (!yaDescontado && linea.cantidad_esperada > 0) {
      const { data: stOrig } = await sb.from('stock').select('*')
        .eq('empresa_id', d.empresa_id).eq('articulo_id', linea.articulo_id)
        .eq('almacen_id', d.almacen_origen_id).maybeSingle();
      if (stOrig) {
        await sb.from('stock').update({ cantidad: Math.max(0,(stOrig.cantidad||0)-linea.cantidad_esperada) }).eq('id', stOrig.id);
        await sb.from('movimientos_stock').insert({
          empresa_id: d.empresa_id, articulo_id: linea.articulo_id,
          almacen_id: d.almacen_origen_id, tipo: 'traspaso_salida',
          delta: -linea.cantidad_esperada, notas: `Salida → ${d.almacen_destino_nombre} (${d.traspNumero}) [SYNC OFFLINE]`,
          fecha: d.fecha, usuario_id: d.usuario?.id||null, usuario_nombre: d.usuario?.nombre||'Operario'
        });
      }
    }
    if (linea.cantidad_recibida > 0) {
      const { data: stDest } = await sb.from('stock').select('*')
        .eq('empresa_id', d.empresa_id).eq('articulo_id', linea.articulo_id)
        .eq('almacen_id', d.almacen_destino_id).maybeSingle();
      if (stDest) {
        await sb.from('stock').update({ cantidad: (stDest.cantidad||0)+linea.cantidad_recibida }).eq('id', stDest.id);
      } else {
        await sb.from('stock').insert({
          empresa_id: d.empresa_id, articulo_id: linea.articulo_id,
          almacen_id: d.almacen_destino_id, cantidad: linea.cantidad_recibida, stock_minimo: 0
        });
      }
      await sb.from('movimientos_stock').insert({
        empresa_id: d.empresa_id, articulo_id: linea.articulo_id,
        almacen_id: d.almacen_destino_id, tipo: 'traspaso_entrada',
        delta: linea.cantidad_recibida, notas: `Entrada ← ${d.almacen_origen_nombre} (${d.traspNumero}) [SYNC OFFLINE]`,
        fecha: d.fecha, usuario_id: d.usuario?.id||null, usuario_nombre: d.usuario?.nombre||'Operario'
      });
    }
    if (linea.diferencia !== 0) {
      const tipoDif = linea.diferencia > 0 ? 'FALTA' : 'SOBRA';
      await sb.from('incidencias_stock').insert({
        empresa_id: d.empresa_id, articulo_id: linea.articulo_id,
        articulo_nombre: `[RECEPCIÓN ${tipoDif}] ${linea.nombre||''}`,
        cantidad: Math.abs(linea.diferencia),
        almacen_id: d.almacen_destino_id, almacen_nombre: d.almacen_destino_nombre,
        usuario_id: d.usuario?.id||null, usuario_nombre: d.usuario?.nombre||'Operario',
        estado: 'pendiente',
        resolucion: `Traspaso ${d.traspNumero} desde ${d.almacen_origen_nombre}.\nEsperado: ${linea.cantidad_esperada} · Recibido: ${linea.cantidad_recibida}\nDiferencia: ${tipoDif} ${Math.abs(linea.diferencia)} uds${d.nota ? '\nNota operario: ' + d.nota : ''} [SYNC OFFLINE]`
      });
    }
  }
  const obsExtra = d.lineasConDif > 0
    ? `\n[RECEPCIÓN PARCIAL · ${d.fecha}] ${d.lineasConDif} línea(s) con incidencia${d.nota ? ' · Nota: ' + d.nota : ''} [SYNC OFFLINE]`
    : '';
  await sb.from('traspasos').update({
    estado: 'completado',
    observaciones: (d.observaciones || '') + obsExtra
  }).eq('id', d.traspId);
  return { error: null };
}

// ── Helper: update con fallback offline ──
async function offlineUpdate(table, data, match) {
  if (navigator.onLine) {
    const result = await sb.from(table).update(data).match(match);
    if (result.error) throw result.error;
    return result;
  } else {
    // Sin red → encolar para sincronizar después
    await syncQueueAdd({ table, action: 'update', data, match });
    toast('Guardado offline — se subirá con conexión', 'info');
    return { data: null, error: null };
  }
}

async function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'Completa todos los campos'; errEl.style.display = 'block'; return; }

  document.getElementById('btnLogin').textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  document.getElementById('btnLogin').textContent = 'Entrar';

  if (error) { errEl.textContent = 'Email o contraseña incorrectos'; errEl.style.display = 'block'; return; }

  CU = data.user;
  await loadProfile();
  if (!CP?.empresa_id) { errEl.textContent = 'Sin empresa asignada'; errEl.style.display = 'block'; return; }
  await loadEmpresa(CP.empresa_id);
  _touchSession(); // Marcar actividad al hacer login
  showApp();
}

async function doLogout() {
  // Comprobar si hay cambios offline pendientes
  const pendingOps = await syncQueueGetAll();
  if (pendingOps.length > 0) {
    if (!confirm(`Tienes ${pendingOps.length} cambio(s) sin sincronizar.\n\nSi cierras sesión se perderán.\n\n¿Continuar?`)) return;
  }
  await sb.auth.signOut();
  CU = null; CP = null; EMPRESA = null;
  // No borrar SW/cache para permitir acceso offline
  window.location.reload(true);
}

async function loadMiFurgoneta() {
  if (!EMPRESA || !CU) return;
  try {
    // 1. Buscar furgoneta asignada al operario actual
    const { data: furgs } = await sb.from('almacenes')
      .select('*')
      .eq('empresa_id', EMPRESA.id)
      .eq('tipo', 'furgoneta')
      .eq('operario_id', CU.id)
      .eq('activo', true)
      .limit(1);

    if (furgs && furgs.length > 0) {
      miFurgoneta = furgs[0];
    } else {
      // Fallback: si no hay asignación directa, buscar por nombre del operario
      const { data: furgs2 } = await sb.from('almacenes')
        .select('*')
        .eq('empresa_id', EMPRESA.id)
        .eq('tipo', 'furgoneta')
        .eq('activo', true);
      // Intentar match por nombre
      if (furgs2) {
        const nombre = (CP?.nombre || '').toLowerCase();
        miFurgoneta = furgs2.find(f => (f.operario_nombre||'').toLowerCase().includes(nombre)) || null;
      }
    }

    if (miFurgoneta) {
      await loadStockFurgoneta(miFurgoneta.id);
      await loadMisReposiciones();
      console.log(`[Furgoneta] ${miFurgoneta.nombre} — ${miFurgonetaStock.length} artículos, ${misReposiciones.length} reposiciones`);
    } else {
      console.log('[Furgoneta] No hay furgoneta asignada al operario');
      miFurgonetaStock = [];
      misReposiciones = [];
    }
  } catch(e) {
    console.error('[Furgoneta] Error:', e);
  }
}

async function loadStockFurgoneta(almacenId) {
  if (!EMPRESA) return;
  const { data } = await sb.from('stock')
    .select('*, articulos(id,codigo,nombre,foto_url,familia_id,unidad_venta_id)')
    .eq('empresa_id', EMPRESA.id)
    .eq('almacen_id', almacenId);
  miFurgonetaStock = (data || []).map(s => ({
    ...s,
    stock_disponible: (s.cantidad || 0) + (s.stock_provisional || 0) - (s.stock_reservado || 0)
  }));
}

function getStockFurgoneta(articuloId) {
  const s = miFurgonetaStock.find(x => x.articulo_id === articuloId);
  if (!s) return { cantidad: 0, provisional: 0, reservado: 0, disponible: 0 };
  return {
    cantidad: s.cantidad || 0,
    provisional: s.stock_provisional || 0,
    reservado: s.stock_reservado || 0,
    disponible: s.stock_disponible || 0
  };
}

// Cargar reposiciones pendientes para mi furgoneta
async function loadMisReposiciones() {
  if (!EMPRESA || !miFurgoneta) { misReposiciones = []; return; }
  const { data } = await sb.from('traspasos').select('*')
    .eq('empresa_id', EMPRESA.id)
    .eq('almacen_destino_id', miFurgoneta.id)
    .in('estado', ['preparado'])
    .order('created_at', { ascending: false });
  misReposiciones = data || [];
}

      <div style="font-size:12px;color:#888;margin-bottom:12px">

        <div data-linea="${i}" data-esperada="${l.cantidad}" style="padding:12px 0;border-bottom:1px solid #f0f0f0;${i===0?'border-top:1px solid #f0f0f0':''}">

function _repoQty(idx, delta) {
  const inp = document.querySelector(`input[data-recibida="${idx}"]`);
  if (!inp) return;
  const v = (parseFloat(inp.value) || 0) + delta;
  inp.value = Math.max(0, +v.toFixed(2));
  _repoActualizarEstado();
}
function _repoQtyZero(idx) {
  const inp = document.querySelector(`input[data-recibida="${idx}"]`);
  if (!inp) return;
  inp.value = 0;
  _repoActualizarEstado();
}
function _repoActualizarEstado() {
  const lineas = document.querySelectorAll('#repoLineas [data-linea]');
  let totalRecibido = 0, totalEsperado = 0, lineasConDif = 0;
  lineas.forEach(div => {
    const idx = div.dataset.linea;
    const esp = parseFloat(div.dataset.esperada) || 0;
    const inp = div.querySelector(`input[data-recibida="${idx}"]`);
    const rec = parseFloat(inp?.value) || 0;
    totalEsperado += esp;
    totalRecibido += rec;
    const aviso = div.querySelector(`[data-aviso="${idx}"]`);
    if (rec < esp) {
      if (aviso) { aviso.style.display = 'block'; aviso.textContent = `⚠️ Faltan ${(esp-rec).toFixed(2).replace(/\.00$/,'')} uds — se generará incidencia`; }
      lineasConDif++;
    } else if (rec > esp) {
      if (aviso) { aviso.style.display = 'block'; aviso.textContent = `⚠️ Sobran ${(rec-esp).toFixed(2).replace(/\.00$/,'')} uds — se generará incidencia`; }
      lineasConDif++;
    } else {
      if (aviso) aviso.style.display = 'none';
    }
  });
  const tot = document.getElementById('repoTotalRecibido');
  if (tot) {
    tot.textContent = totalRecibido + ' uds';
    tot.style.color = (totalRecibido !== totalEsperado) ? 'var(--rojo)' : '';
  }
  const banner = document.getElementById('repoBannerInc');
  const btn = document.getElementById('repoBtnConfirmar');
  const nota = document.getElementById('repoNota');
  const lbl  = document.getElementById('repoNotaLabel');
  if (lineasConDif > 0) {
    if (banner) {
      banner.style.display = 'block';
      banner.textContent = `Hay ${lineasConDif} línea${lineasConDif>1?'s':''} con diferencias. Al confirmar, se generará una incidencia para que el almacenero la revise.`;
    }
    if (btn) {
      btn.style.background = '#F59E0B';
      btn.innerHTML = '⚠️ Confirmar con incidencia';
    }
    if (nota) nota.hidden = false;
    if (lbl)  lbl.hidden  = false;
  } else {
    if (banner) banner.style.display = 'none';
    if (btn) {
      btn.style.background = '#16A34A';
      btn.innerHTML = '✅ Confirmar recepción completa';
    }
    if (nota) nota.hidden = true;
    if (lbl)  lbl.hidden  = true;
  }
}

async function confirmarReposicion(traspId) {
  const trasp = misReposiciones.find(t => t.id === traspId);
  if (!trasp) { toast('Reposición no encontrada','error'); return; }

  const lineas = (trasp.lineas || []);
  // Leer cantidad recibida editada por el operario (si la pantalla está abierta)
  const lineasReales = lineas.map((l, i) => {
    const inp = document.querySelector(`input[data-recibida="${i}"]`);
    const recibida = inp ? (parseFloat(inp.value) || 0) : (l.cantidad || 0);
    return {
      ...l,
      cantidad_esperada: l.cantidad || 0,
      cantidad_recibida: recibida,
      diferencia: (l.cantidad || 0) - recibida
    };
  });
  const lineasConDif = lineasReales.filter(l => l.diferencia !== 0);
  const nota = (document.getElementById('repoNota')?.value || '').trim();

  // Confirmación con resumen claro
  let mensaje;
  if (lineasConDif.length === 0) {
    const listaHtml = lineasReales.map(l => `• ${l.nombre}: ${l.cantidad_recibida} uds`).join('\n');
    mensaje = `✅ Recepción COMPLETA de ${lineasReales.length} artículos:\n\n${listaHtml}\n\n¿Confirmar?`;
  } else {
    const listaDif = lineasConDif.map(l => {
      const tipo = l.diferencia > 0 ? `falta ${l.diferencia}` : `sobra ${-l.diferencia}`;
      return `• ${l.nombre}: esperado ${l.cantidad_esperada}, recibido ${l.cantidad_recibida} (${tipo})`;
    }).join('\n');
    mensaje = `⚠️ Recepción PARCIAL — se generará incidencia.\n\nLíneas con diferencia (${lineasConDif.length}):\n${listaDif}\n\n¿Confirmar igualmente?`;
  }
  if (!confirm(mensaje)) return;

  try {
    toast('⏳ Procesando recepción...','info');

    if (navigator.onLine) {
      const yaDescontado = (trasp.estado === 'preparado');

      for (const linea of lineasReales) {
        if (!yaDescontado && linea.cantidad_esperada > 0) {
          const { data: stOrig } = await sb.from('stock').select('*')
            .eq('empresa_id', EMPRESA.id).eq('articulo_id', linea.articulo_id)
            .eq('almacen_id', trasp.almacen_origen_id).maybeSingle();
          if (stOrig) {
            await sb.from('stock').update({ cantidad: Math.max(0,(stOrig.cantidad||0)-linea.cantidad_esperada) }).eq('id', stOrig.id);
            await sb.from('movimientos_stock').insert({
              empresa_id: EMPRESA.id, articulo_id: linea.articulo_id,
              almacen_id: trasp.almacen_origen_id, tipo: 'traspaso_salida',
              delta: -linea.cantidad_esperada, notas: `Salida → ${trasp.almacen_destino_nombre} (${trasp.numero})`,
              fecha: new Date().toISOString().slice(0,10),
              usuario_id: CU?.id||null, usuario_nombre: CP?.nombre||'Operario'
            });
          }
        }

        if (linea.cantidad_recibida > 0) {
          const { data: stDest } = await sb.from('stock').select('*')
            .eq('empresa_id', EMPRESA.id).eq('articulo_id', linea.articulo_id)
            .eq('almacen_id', trasp.almacen_destino_id).maybeSingle();
          if (stDest) {
            await sb.from('stock').update({ cantidad: (stDest.cantidad||0)+linea.cantidad_recibida }).eq('id', stDest.id);
          } else {
            await sb.from('stock').insert({
              empresa_id: EMPRESA.id, articulo_id: linea.articulo_id,
              almacen_id: trasp.almacen_destino_id, cantidad: linea.cantidad_recibida,
              stock_minimo: 0
            });
          }
          await sb.from('movimientos_stock').insert({
            empresa_id: EMPRESA.id, articulo_id: linea.articulo_id,
            almacen_id: trasp.almacen_destino_id, tipo: 'traspaso_entrada',
            delta: linea.cantidad_recibida, notas: `Entrada ← ${trasp.almacen_origen_nombre} (${trasp.numero})`,
            fecha: new Date().toISOString().slice(0,10),
            usuario_id: CU?.id||null, usuario_nombre: CP?.nombre||'Operario'
          });
        }

        if (linea.diferencia !== 0) {
          const tipoDif = linea.diferencia > 0 ? 'FALTA' : 'SOBRA';
          const cantDif = Math.abs(linea.diferencia);
          await sb.from('incidencias_stock').insert({
            empresa_id: EMPRESA.id,
            articulo_id: linea.articulo_id,
            articulo_nombre: `[RECEPCIÓN ${tipoDif}] ${linea.nombre||''}`,
            cantidad: cantDif,
            almacen_id: trasp.almacen_destino_id,
            almacen_nombre: trasp.almacen_destino_nombre,
            usuario_id: CU?.id || null,
            usuario_nombre: CP?.nombre || 'Operario',
            estado: 'pendiente',
            resolucion: `Traspaso ${trasp.numero} desde ${trasp.almacen_origen_nombre}.\nEsperado: ${linea.cantidad_esperada} · Recibido: ${linea.cantidad_recibida}\nDiferencia: ${tipoDif} ${cantDif} uds${nota ? '\nNota operario: ' + nota : ''}`
          });
        }
      }

      const obsActual = trasp.observaciones || '';
      const obsExtra  = lineasConDif.length > 0
        ? `\n[RECEPCIÓN PARCIAL · ${new Date().toISOString().slice(0,10)}] ${lineasConDif.length} línea(s) con incidencia${nota ? ' · Nota: ' + nota : ''}`
        : '';
      await sb.from('traspasos').update({
        estado: 'completado',
        observaciones: obsActual + obsExtra
      }).eq('id', traspId);

    } else {
      // Offline: encolar toda la operación
      await syncQueueAdd({ table: '_recepcion', action: 'recepcion_confirmar', data: {
        traspId,
        traspNumero: trasp.numero,
        traspEstado: trasp.estado,
        almacen_origen_id: trasp.almacen_origen_id,
        almacen_origen_nombre: trasp.almacen_origen_nombre,
        almacen_destino_id: trasp.almacen_destino_id,
        almacen_destino_nombre: trasp.almacen_destino_nombre,
        lineasReales: lineasReales,
        lineasConDif: lineasConDif.length,
        nota: nota,
        observaciones: trasp.observaciones || '',
        empresa_id: EMPRESA.id,
        usuario: { id: CU?.id, nombre: CP?.nombre || 'Operario' },
        fecha: new Date().toISOString().slice(0,10)
      }, timestamp: Date.now() });
      toast('📋 Recepción guardada offline — se procesará al recuperar conexión', 'info');
    }

    if (lineasConDif.length === 0) {
      toast('✅ Reposición confirmada — stock actualizado en tu furgoneta', 'success');
    } else {
      toast(`⚠️ Recepción parcial: ${lineasConDif.length} incidencia(s) generada(s)`, 'success');
    }
    await loadMisReposiciones();
    if (miFurgoneta) await loadStockFurgoneta(miFurgoneta.id);
    navigateTo('inicio');
  } catch(e) {
    console.error('Error confirmando reposición:', e);
    let msg = e?.message || e?.error_description || e?.hint || e?.details || '';
    if (!msg) { try { msg = JSON.stringify(e); } catch { msg = String(e); } }
    if (!navigator.onLine) msg = '⚠️ Sin conexión — los datos no se enviaron.\n\nDetalle: ' + msg;
    toast('Error: '+msg, 'error');
  }
}

// Registrar consumo de material en la BD (consumos_parte + movimiento de stock)
async function registrarConsumoMaterial(parteId, parteNumero, material, tipo = 'consumo', motivoMerma = null) {
  if (!EMPRESA || !CU) return;
  const almacenId = miFurgoneta?.id || null;
  const esFacturable = (tipo === 'consumo');

  // 1. Insertar consumo_parte
  const consumo = {
    empresa_id: EMPRESA.id,
    parte_id: parteId,
    parte_numero: parteNumero,
    articulo_id: material.articulo_id,
    articulo_codigo: material.codigo || null,
    articulo_nombre: material.nombre,
    cantidad: material.cantidad,
    unidad: material.unidad || 'ud',
    precio_unitario: material.precio || 0,
    total: material.total || 0,
    almacen_id: almacenId,
    tipo_stock: 'real',
    tipo: tipo,
    motivo_merma: motivoMerma,
    facturable: esFacturable,
    usuario_id: CU.id,
    usuario_nombre: CP?.nombre || CU.email
  };
  await sb.from('consumos_parte').insert(consumo);

  // 2. Descontar stock REAL de furgoneta (puede ir a negativo si aún no se validó)
  if (almacenId && material.articulo_id) {
    const { data: stFresh } = await sb.from('stock').select('*')
      .eq('almacen_id', almacenId).eq('articulo_id', material.articulo_id)
      .eq('empresa_id', EMPRESA.id).limit(1);

    if (stFresh?.[0]) {
      const nuevaCant = (stFresh[0].cantidad || 0) - material.cantidad;
      await sb.from('stock').update({ cantidad: nuevaCant })
        .eq('id', stFresh[0].id);
    } else {
      await sb.from('stock').insert({
        empresa_id: EMPRESA.id, almacen_id: almacenId,
        articulo_id: material.articulo_id,
        cantidad: -material.cantidad, stock_provisional: 0, stock_reservado: 0
      });
    }

    // Registrar movimiento de salida
    await sb.from('movimientos_stock').insert({
      empresa_id: EMPRESA.id,
      articulo_id: material.articulo_id,
      almacen_id: almacenId,
      tipo: tipo === 'consumo' ? 'consumo' : 'merma',
      cantidad: -material.cantidad,
      delta: -material.cantidad,
      notas: tipo === 'consumo'
        ? `Consumo en parte ${parteNumero}`
        : `${tipo.charAt(0).toUpperCase()+tipo.slice(1)}: ${motivoMerma || ''} (parte ${parteNumero})`,
      fecha: new Date().toISOString().slice(0,10),
      tipo_stock: 'real',
      usuario_id: CU.id,
      usuario_nombre: CP?.nombre || CU.email
    });
  }
}

// APP INIT

// ── Permisos de acceso a apps ──────────────────
// Dos capas: 1) módulos de la empresa (plan contratado)  2) permisos del usuario
// Superadmin siempre tiene acceso (dentro de los módulos contratados).
// Backward compat: sin claves app_* → lógica antigua.
function _canApp(modo) {
  // ── Capa 1: módulos de la empresa (plan) ──
  // App Operario / Admin necesitan módulo "obras" (partes de trabajo)
  // App Almacén necesita módulo "almacen"
  const mods = EMPRESA?.modulos || {};
  if (modo === 'operario' && mods.obras === false) return false;
  if (modo === 'jefe'     && mods.obras === false) return false;
  if (modo === 'almacen'  && mods.almacen === false) return false;

  // ── Capa 2: permisos del usuario ──
  if (CP?.es_superadmin) return true;
  const acc = CP?.permisos?.acceso;
  // Sin permisos nuevos → lógica antigua
  const tieneNuevosPermisos = acc && ('app_operario' in acc || 'app_admin' in acc || 'app_almacen' in acc);
  if (!tieneNuevosPermisos) {
    if (modo === 'operario') return true;
    if (modo === 'jefe') return false;
    if (modo === 'almacen') return CP?.acceso_almacen === true;
    return false;
  }
  // Permisos nuevos → respetar toggles
  if (modo === 'operario') return acc.app_operario === true;
  if (modo === 'jefe')     return acc.app_admin === true;
  if (modo === 'almacen')  return acc.app_almacen === true;
  return false;
}

function _modosDisponibles() {
  return ['operario','jefe','almacen'].filter(m => _canApp(m));
}

function setModo(modo) {
  if (!_canApp(modo)) { toast('No tienes acceso a este modo','error'); return; }
  localStorage.setItem('instalo_modo', modo);
  closeModoDropdown();
  showApp();
}

function toggleModoDropdown() {
  const dd = document.getElementById('modoDropdown');
  if (dd.classList.contains('open')) { closeModoDropdown(); return; }
  // Solo abrir si tiene más de un modo disponible
  if (_modosDisponibles().length <= 1) return;
  dd.classList.add('open');
  // Cerrar al tocar fuera
  setTimeout(() => document.addEventListener('click', _closeModoOutside, { once: true }), 10);
}
function closeModoDropdown() { document.getElementById('modoDropdown')?.classList.remove('open'); }
function _closeModoOutside(e) {
  if (!document.getElementById('modoUserArea')?.contains(e.target)) closeModoDropdown();
  else setTimeout(() => document.addEventListener('click', _closeModoOutside, { once: true }), 10);
}

function _updateModoUI(modoActual) {
  const label = document.getElementById('hdrModoLabel');
  const userArea = document.getElementById('modoUserArea');

  // Etiqueta del modo activo en la barra
  const modos = {
    operario: { text: 'Operario', bg: '#F59E0B', color: '#fff' },
    jefe:     { text: 'Admin', bg: '#3B82F6', color: '#fff' },
    almacen:  { text: 'Almacén', bg: '#10B981', color: '#fff' }
  };
  const m = modos[modoActual] || modos.operario;
  label.textContent = m.text;
  label.style.background = m.bg;
  label.style.color = m.color;

  const disponibles = _modosDisponibles();

  // Mostrar etiqueta y cursor solo si puede cambiar de modo
  if (disponibles.length > 1) {
    label.style.display = '';
    userArea.style.cursor = 'pointer';
  } else {
    label.style.display = 'none';
    userArea.style.cursor = 'default';
  }

  // Dropdown: mostrar/ocultar opciones según permisos + check en el activo
  const dd = document.getElementById('modoDropdown');
  dd.querySelectorAll('.modo-dropdown-item').forEach(item => {
    const modo = item.dataset.modo;
    item.style.display = _canApp(modo) ? '' : 'none';
  });
  // Checks
  ['operario','jefe','almacen'].forEach(k => {
    const chk = document.getElementById('modoCheck_' + k);
    if (chk) chk.classList.toggle('active', k === modoActual);
  });
}

async function showApp() {
  // ── Determinar modo ────────────────────────────
  const _params = new URLSearchParams(window.location.search);
  const modoURL = _params.get('modo');
  const modoLocal = localStorage.getItem('instalo_modo');
  if (!modoLocal && modoURL) localStorage.setItem('instalo_modo', modoURL);

  let modoFinal = localStorage.getItem('instalo_modo') || 'operario';

  // Verificar que el usuario tiene permiso para este modo
  if (!_canApp(modoFinal)) {
    // Forzar al primer modo disponible
    const disponibles = _modosDisponibles();
    if (disponibles.length === 0) {
      toast('No tienes acceso a ningún modo de la app. Contacta con tu administrador.', 'error');
      await sb.auth.signOut();
      CU = null; CP = null; EMPRESA = null;
      showScreen('s-login');

    modoFinal = disponibles[0];

// DATA LOADING

async function loadAllData() {
  if (!EMPRESA) return;
  const eid = EMPRESA.id;

  // Si no hay red → cargar desde cache offline
  if (!navigator.onLine) {
    console.log('[LoadData] Sin red, usando cache offline');
    const hasCached = await loadFromOfflineCache();
    if (hasCached) {
      // Filtrar partes para operario
      if (!esJefe) {
        misPartes = misPartes.filter(p => p.usuario_id === CU.id);
      }
      _updateConnIndicator();
      return;
    }
    toast('Sin conexión y sin datos en cache', 'error');
    return;
  }

  try {
    const promises = [
      sb.from('partes_trabajo').select('*').eq('empresa_id', eid).neq('estado','eliminado').order('fecha',{ascending:false}).limit(100),
      sb.from('perfiles').select('*').eq('empresa_id', eid).eq('activo', true),
      sb.from('trabajos').select('*').eq('empresa_id', eid).neq('estado','eliminado').order('created_at',{ascending:false}),
      sb.from('clientes').select('*').eq('empresa_id', eid).order('nombre'),
      sb.from('articulos').select('*').eq('empresa_id', eid).eq('activo', true).order('nombre'),
    ];

    // Jefe: cargar tareas de todas las obras; Operario: solo sus tareas
    if (esJefe) {
      promises.push(sb.from('tareas_obra').select('*').eq('empresa_id', eid).neq('estado','rechazada').order('created_at',{ascending:false}).limit(200));
    } else {
      promises.push(sb.from('tareas_obra').select('*').eq('empresa_id', eid).eq('responsable_id', CU.id).neq('estado','rechazada').order('created_at',{ascending:false}).limit(100));
    }

    const [partesR, usersR, trabR, cliR, artR, tareasR] = await Promise.all(promises);

    const allPartes = partesR.data || [];
    todosUsuarios = usersR.data || [];
    trabajos = trabR.data || [];
    clientes = cliR.data || [];
    articulos = artR.data || [];
    const allTareas = tareasR.data || [];

    if (esJefe) {
      misPartes = allPartes;
      misTareas = allTareas;
    } else {
      misPartes = allPartes.filter(p => p.usuario_id === CU.id);
      misTareas = allTareas;
    }

    // ✅ Guardar en cache offline para uso sin conexión
    await cacheDataOffline();
    _updateConnIndicator();

    // Cargar furgoneta + reposiciones y fichajes en paralelo, re-render al terminar
    Promise.all([
      loadMiFurgoneta().catch(e => console.warn('[Furgoneta]', e)),
      loadMisFichajesHoy().catch(e => console.warn('[Fichajes]', e))
    ]).then(() => {
      // Re-render inicio si estamos en esa pestaña (para mostrar reposiciones y fichaje)
      if (currentTab === 'inicio') navigateTo('inicio');
      // Iniciar realtime para traspasos ahora que miFurgoneta está cargada
      _initRealtimeTraspasos();
      // Iniciar realtime para notificación de partes nuevos
      _initRealtimePartes();
    });

  } catch(e) {
    console.error('Error loading data:', e);
    // Si falla la red, intentar cache offline
    const hasCached = await loadFromOfflineCache();
    if (hasCached) {
      if (!esJefe) misPartes = misPartes.filter(p => p.usuario_id === CU.id);
      toast('Usando datos en cache (sin conexión)', 'info');
      _updateConnIndicator();
    } else {
      toast('Error cargando datos', 'error');
    }
  }
}

let _pollInterval = null;
const POLL_MS = 5 * 60 * 1000; // 5 minutos
let _lastRefresh = Date.now();

function initAutoRefresh() {
  // Polling silencioso cada 5 minutos
  if (_pollInterval) clearInterval(_pollInterval);
  _pollInterval = setInterval(() => _silentRefresh(), POLL_MS);
  _updateSyncIndicator();
}

let _rtTraspasosInit = false;
function _initRealtimeTraspasos() {
  if (_rtTraspasosInit || !EMPRESA?.id) return;
  _rtTraspasosInit = true;

  sb.channel('app-traspasos')
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'traspasos', filter: `empresa_id=eq.${EMPRESA.id}` },
      async () => {
        console.log('[Realtime] Cambio en traspasos detectado');
        await loadMisReposiciones();
        if (currentTab === 'inicio') navigateTo('inicio');
      }
    )
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'stock', filter: `empresa_id=eq.${EMPRESA.id}` },
      async () => {
        console.log('[Realtime] Cambio en stock detectado');
        if (miFurgoneta) await loadStockFurgoneta(miFurgoneta.id);
      }
    )
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('[Realtime] ✅ Escuchando traspasos + stock');
    });
}

// REALTIME — Notificación sonora para partes nuevos
// ═══════════════════════════════════════════════
let _rtPartesInit = false;
let _misPartesIds = new Set(); // IDs de partes ya conocidos

function _initRealtimePartes() {
  if (_rtPartesInit || !EMPRESA?.id || !CU?.id) return;
  _rtPartesInit = true;

  // Cargar IDs actuales para no notificar los que ya existen
  sb.from('partes').select('id').eq('empresa_id', EMPRESA.id).eq('usuario_id', CU.id)
    .then(({ data }) => { if (data) data.forEach(p => _misPartesIds.add(p.id)); });

  sb.channel('app-partes-notify')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'partes', filter: `empresa_id=eq.${EMPRESA.id}` },
      (payload) => {
        const nuevo = payload.new;
        if (!nuevo || nuevo.usuario_id !== CU.id) return; // No es para mí
        if (_misPartesIds.has(nuevo.id)) return; // Ya lo conocía
        _misPartesIds.add(nuevo.id);
        console.log('[Realtime] 🔔 Nuevo parte asignado:', nuevo.id);
        _notificarNuevoParte(nuevo);
      }
    )
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'partes', filter: `empresa_id=eq.${EMPRESA.id}` },
      (payload) => {
        const nuevo = payload.new;
        if (!nuevo || nuevo.usuario_id !== CU.id) return;
        // Si ya lo tenía en mi lista, no notificar (ya era mío)
        if (_misPartesIds.has(nuevo.id)) return;
        // Es un parte que antes no era mío y ahora sí → reasignación
        _misPartesIds.add(nuevo.id);
        console.log('[Realtime] 🔔 Parte reasignado a mí:', nuevo.id);
        _notificarNuevoParte(nuevo);
      }
    )
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') console.log('[Realtime] ✅ Escuchando partes asignados');
    });
}

function _notificarNuevoParte(parte) {
  // 1. Sonido — tono doble con Web Audio API
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const playTone = (freq, start, dur) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + start + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    };
    playTone(880, 0, 0.15);    // La5
    playTone(1100, 0.18, 0.15); // Do#6
    playTone(1320, 0.36, 0.25); // Mi6
  } catch(e) { console.warn('[Sound]', e); }

  // 2. Vibración
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);

  // 3. Notificación del sistema
  const titulo = parte.numero ? `📋 Nuevo parte: ${parte.numero}` : '📋 Nuevo parte de trabajo';
  const cuerpo = parte.descripcion || parte.trabajo_nombre || 'Se te ha asignado un nuevo parte';
  if (Notification.permission === 'granted') {
    try {
      new Notification(titulo, { body: cuerpo, icon: '/assets/icon.svg', tag: 'parte-' + parte.id });
    } catch(_) {}
  }

  // 4. Toast in-app
  toast('📋 ¡Nuevo parte asignado!', 'success');

  // 5. Refrescar lista si estamos en inicio
  if (currentTab === 'inicio') navigateTo('inicio');
}

async function _silentRefresh() {
  // No refrescar si el wizard está abierto (podría perder datos)
  if (_wiz?.parteId && document.querySelector('.wiz-overlay')) {

    return;
  }
  console.log('[AutoRefresh] Polling...');
  try {

    navigateTo(currentTab);
    _lastRefresh = Date.now();
    _updateSyncIndicator();
  } catch(e) {
    console.error('[AutoRefresh] Error:', e);
  }
}

}

document.addEventListener('visibilitychange', () => {

});

function forceCacheClear() {
  if (!confirm('Se va a borrar toda la caché (incluidos datos offline) y recargar la aplicación.\n\n¿Continuar?')) return;
  // Borrar caches del Service Worker
  if ('caches' in window) {
    caches.keys().then(names => names.forEach(n => caches.delete(n)));
  }
  // Borrar IndexedDB offline
  try { indexedDB.deleteDatabase(IDB_NAME); } catch(e) {}
  localStorage.removeItem('instalo_last_cache');
  // Desregistrar Service Workers
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  }
  // Recargar sin caché
  window.location.reload(true);
}

function _programarRecordatorioSalida() {
  if (_fichajeReminderTimer) { clearTimeout(_fichajeReminderTimer); _fichajeReminderTimer = null; }
  if (!_fichajeEntradaHoy) return;

  const ahora = new Date();
  const limite = new Date(ahora);

  let ms = limite - ahora;

  _fichajeReminderTimer = setTimeout(() => {

async function _fichajePromptEntrada() {
  const btn = document.getElementById('btnFichajePromptEntrada');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span style="opacity:.6">Registrando…</span>'; }

  const ahora = new Date();
  const hoy = ahora.toISOString().split('T')[0];
  const hora = `${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}:${String(ahora.getSeconds()).padStart(2,'0')}`;

  let lat = null, lng = null;
  if (navigator.geolocation) {
    try {
      const pos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 })
      );
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;
    } catch(_) { /* GPS denegado o sin señal — fichaje válido igualmente */ }
  }

  const { data, error } = await sb.from('fichajes').insert({
    empresa_id: EMPRESA.id,
    usuario_id: CU.id,
    usuario_nombre: CP?.nombre || '',
    fecha: hoy,
    hora_entrada: hora,
    tipo: 'entrada',
    latitud: lat,
    longitud: lng
  }).select().single();

  if (error) {
    toast('Error al registrar: ' + error.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '🟢 Registrar entrada'; }
    return;
  }

  _fichajeEntradaHoy = data;
  misFichajesHoy.push(data);
  // [DESACTIVADO] _iniciarRecordatorioFichaje(); // programar aviso 16:30

  // Animar salida del overlay
  const overlay = document.getElementById('fichajePromptOverlay');
  if (overlay) {
    overlay.style.transition = 'opacity .35s';
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 380);
  }

  toast('✅ Entrada registrada · ' + hora.slice(0, 5), 'success');

  // Refrescar pantalla inicio para actualizar el card de fichaje
  const body = document.getElementById('appBody');
  if (body && typeof navigateTo === 'function') navigateTo('inicio');
}

function _calcTiempoFichaje(horaEntrada) {
  if (!horaEntrada) return '';
  const [h, m] = horaEntrada.split(':').map(Number);
  const ahora = new Date();
  const entrada = new Date(); entrada.setHours(h, m, 0, 0);
  const mins = Math.floor((ahora - entrada) / 60000);
  if (mins < 0) return '—';
  const hh = Math.floor(mins / 60), mm = mins % 60;
  return hh > 0 ? `${hh}h ${mm}m` : `${mm}m`;
}

async function appFichajeSalida() {
  if (!_fichajeEntradaHoy) { toast('No hay entrada registrada hoy', 'error'); return; }
  const btn = event?.target?.closest('button');
  if (btn) { btn.disabled = true; btn.textContent = 'Registrando…'; }

  const ahora = new Date();
  const hora = `${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}:${String(ahora.getSeconds()).padStart(2,'0')}`;

  let lat = null, lng = null;
  if (navigator.geolocation) {
    try {
      const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 }));
      lat = pos.coords.latitude; lng = pos.coords.longitude;
    } catch(_) {}
  }

  // Calcular horas
  const [hh, mm] = _fichajeEntradaHoy.hora_entrada.split(':').map(Number);
  const [hs, ms] = hora.split(':').map(Number);
  let mins = (hs * 60 + ms) - (hh * 60 + mm);
  if (mins < 0) mins += 24 * 60;

  // Cerrar pausa abierta si existe
  let pausas = Array.isArray(_fichajeEntradaHoy.pausas) ? [..._fichajeEntradaHoy.pausas] : [];
  const lastOpenPause = pausas.findLast(p => !p.fin);
  if (lastOpenPause) lastOpenPause.fin = hora.slice(0,5);

  let totalPausaMin = 0;
  pausas.forEach(p => {
    if (p.inicio && p.fin) {
      const [hi2, mi2] = p.inicio.split(':').map(Number);
      const [hf2, mf2] = p.fin.split(':').map(Number);
      totalPausaMin += (hf2 * 60 + mf2) - (hi2 * 60 + mi2);
    }
  });
  const horasTotal = +((mins - totalPausaMin) / 60).toFixed(2);

  const { error } = await sb.from('fichajes').update({
    hora_salida: hora, horas_total: horasTotal, latitud: lat, longitud: lng,
    pausas: pausas, horas_pausa: +(totalPausaMin / 60).toFixed(2), estado: 'finalizado'
  }).eq('id', _fichajeEntradaHoy.id);

  if (error) { toast('Error al fichar: ' + error.message, 'error'); if (btn) btn.disabled = false; return; }

  // Actualizar local
  const idx = misFichajesHoy.findIndex(f => f.id === _fichajeEntradaHoy.id);
  if (idx !== -1) { misFichajesHoy[idx].hora_salida = hora; misFichajesHoy[idx].horas_total = horasTotal; }
  _fichajeEntradaHoy = null;

  const hDisplay = Math.floor(horasTotal), mDisplay = Math.round((horasTotal - hDisplay) * 60);
  toast(`⬛ Salida registrada · ${hora.slice(0,5)} · ${hDisplay}h ${mDisplay}m`, 'success');
  const body = document.getElementById('appBody');
  if (body) navigateTo('inicio');
}

async function appFichajeReanudar() {
  if (!_fichajeEntradaHoy) return;
  const btn = event?.target?.closest('button');
  if (btn) { btn.disabled = true; btn.textContent = 'Reanudando…'; }

  const ahora = new Date();
  const hora = `${String(ahora.getHours()).padStart(2,'0')}:${String(ahora.getMinutes()).padStart(2,'0')}`;

  const pausas = Array.isArray(_fichajeEntradaHoy.pausas) ? [..._fichajeEntradaHoy.pausas] : [];
  // Close the last open pause
  const lastPause = pausas.findLast(p => !p.fin);
  if (lastPause) lastPause.fin = hora;

  // Calculate total pause minutes
  let totalPausaMin = 0;
  pausas.forEach(p => {
    if (p.inicio && p.fin) {
      const [hi, mi] = p.inicio.split(':').map(Number);
      const [hf, mf] = p.fin.split(':').map(Number);
      totalPausaMin += (hf * 60 + mf) - (hi * 60 + mi);
    }
  });

  const { error } = await sb.from('fichajes').update({
    pausas: pausas,
    estado: 'activo',
    horas_pausa: +(totalPausaMin / 60).toFixed(2)
  }).eq('id', _fichajeEntradaHoy.id);

  if (error) { toast('Error: ' + error.message, 'error'); if (btn) btn.disabled = false; return; }

  _fichajeEntradaHoy.pausas = pausas;
  _fichajeEntradaHoy.estado = 'activo';
  _fichajeEntradaHoy.horas_pausa = +(totalPausaMin / 60).toFixed(2);
  toast('▶️ Jornada reanudada · ' + hora, 'success');
  navigateTo('inicio');
}
