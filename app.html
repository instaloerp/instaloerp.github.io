// Resumen en texto plano (para WhatsApp, email, copiar)
function _medGenerarTextoPlano(m) {
  const pl = MED_PLANTILLAS[m.tipo] || MED_PLANTILLAS.otra;
  const cli = (Array.isArray(clientes) ? clientes : []).find(c => c.id === m.cliente_id);
  const fecha = m.fecha ? new Date(m.fecha + 'T00:00:00').toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' }) : '';
  let txt = `📐 MEDICIÓN — ${pl.label}\n`;
  txt += `Fecha: ${fecha}\n`;
  if (cli) {
    txt += `Cliente: ${cli.nombre}\n`;
    if (cli.dir) txt += `Dirección: ${cli.dir}${cli.muni ? ', ' + cli.muni : ''}${cli.cp ? ' ' + cli.cp : ''}\n`;
    if (cli.tel || cli.movil) txt += `Tel: ${cli.tel || cli.movil}\n`;
  }
  txt += '\nITEMS:\n';
  (m.items || []).forEach((it, i) => {
    txt += `${i+1}. ${pl.descripcionItem(it)}\n`;
    if (it.observaciones) txt += `   · ${it.observaciones}\n`;
  });
  if (m.notas) txt += `\nNotas:\n${m.notas}\n`;
  return txt;
}

// Genera el PDF y devuelve el doc jsPDF + nombre de fichero
function _medGenerarPdf(m) {
  const jsPDFLib = window.jspdf?.jsPDF || window.jsPDF;
  if (!jsPDFLib) { toast('jsPDF no disponible', 'error'); return null; }

  const pl = MED_PLANTILLAS[m.tipo] || MED_PLANTILLAS.otra;
  const cli = (Array.isArray(clientes) ? clientes : []).find(c => c.id === m.cliente_id);
  const items = m.items || [];
  const fechaTxt = m.fecha
    ? new Date(m.fecha + 'T00:00:00').toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' })
    : '';

  const doc = new jsPDFLib({ format:'a4', unit:'mm' });
  const pageW = 210;
  const margin = 15;
  let y = 0;

  // Cabecera teal
  const colorRgb = pl.color === '#0891B2' ? [8,145,178] : pl.color === '#7C3AED' ? [124,58,237] : pl.color === '#D97706' ? [217,119,6] : pl.color === '#059669' ? [5,150,105] : [100,116,139];
  doc.setFillColor(...colorRgb);
  doc.rect(0, 0, pageW, 26, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text(`${pl.label.toUpperCase()} - HOJA DE MEDICION`, pageW/2, 12, { align:'center' });
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text((EMPRESA?.nombre || 'instaloERP') + ' · ' + fechaTxt, pageW/2, 19, { align:'center' });
  y = 36;

  // Cliente
  doc.setTextColor(0,0,0);
  doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text('CLIENTE', margin, y); y += 1.5;
  doc.setDrawColor(...colorRgb); doc.setLineWidth(0.4);
  doc.line(margin, y, pageW - margin, y); y += 6;
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(cli?.nombre || 'Sin cliente', margin, y); y += 5;
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  if (cli?.dir) { doc.text(`${cli.dir}${cli.muni ? ', ' + cli.muni : ''}${cli.cp ? ' ' + cli.cp : ''}`, margin, y); y += 4; }
  if (cli?.tel || cli?.movil) { doc.text(`Tel: ${cli.tel || cli.movil}`, margin, y); y += 4; }
  if (cli?.nif) { doc.text(`NIF: ${cli.nif}`, margin, y); y += 4; }
  y += 4;

  // Items con autoTable si está disponible
  doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text(`ITEMS MEDIDOS (${items.length})`, margin, y); y += 1.5;
  doc.setDrawColor(...colorRgb); doc.line(margin, y, pageW - margin, y); y += 4;

  if (window.jspdf?.jsPDF?.API?.autoTable || doc.autoTable) {
    const rows = items.map((it, i) => [
      i + 1,
      pl.descripcionItem(it),
      it.observaciones || '',
    ]);
    doc.autoTable({
      startY: y,
      head: [['#', 'Descripción', 'Observaciones']],
      body: rows,
      theme: 'striped',
      headStyles: { fillColor: colorRgb, textColor: [255,255,255], fontSize: 9, fontStyle: 'bold' },
      bodyStyles: { fontSize: 9, cellPadding: 2.5 },
      columnStyles: { 0: { cellWidth: 10, halign:'center' }, 1: { cellWidth: 110 }, 2: { cellWidth: 'auto' } },
      margin: { left: margin, right: margin },
    });
    y = doc.lastAutoTable.finalY + 8;
  } else {
    // Fallback sin autoTable: línea por línea
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    items.forEach((it, i) => {
      const linea = `${i+1}. ${pl.descripcionItem(it)}`;
      const wrap = doc.splitTextToSize(linea, pageW - margin*2);
      wrap.forEach(l => { doc.text(l, margin, y); y += 4.5; });
      if (it.observaciones) {
        const obs = doc.splitTextToSize('   · ' + it.observaciones, pageW - margin*2);
        doc.setTextColor(120,120,120);
        obs.forEach(l => { doc.text(l, margin, y); y += 4; });
        doc.setTextColor(0,0,0);
      }
      y += 1;
      if (y > 270) { doc.addPage(); y = 20; }
    });
    y += 4;
  }

  // Notas
  if (m.notas) {
    if (y > 250) { doc.addPage(); y = 20; }
    doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text('NOTAS', margin, y); y += 1.5;
    doc.setDrawColor(...colorRgb); doc.line(margin, y, pageW - margin, y); y += 5;
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    const notas = doc.splitTextToSize(m.notas, pageW - margin*2);
    notas.forEach(l => { doc.text(l, margin, y); y += 4.5; });
  }

  // Pie
  doc.setFontSize(8); doc.setTextColor(140,140,140);
  doc.text(`Generado por ${EMPRESA?.nombre || 'instaloERP'} · ${new Date().toLocaleString('es-ES')}`, pageW/2, 290, { align:'center' });

  const filename = `medicion-${pl.label.toLowerCase()}-${(cli?.nombre || 'sin-cliente').replace(/[^\w]/g,'_')}-${m.id}.pdf`;
  return { doc, filename };
}

function _medCerrarMenuExportar() {

}

function _medDescargarPDF() {
  if (!_medActual) return;
  const r = _medGenerarPdf(_medActual);
  if (!r) return;
  r.doc.save(r.filename);
  _medCerrarMenuExportar();
  toast('📄 PDF descargado ✓', 'success');
}

async function _medCompartirNativo() {
  if (!_medActual || !navigator.share) { toast('Compartir no disponible en este dispositivo', 'error'); return; }
  const m = _medActual;
  const r = _medGenerarPdf(m);
  if (!r) return;
  const blob = r.doc.output('blob');
  const file = new File([blob], r.filename, { type: 'application/pdf' });
  const texto = _medGenerarTextoPlano(m);
  try {
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: r.filename, text: texto });
    } else {
      await navigator.share({ title: r.filename, text: texto });
    }
    _medCerrarMenuExportar();
  } catch (e) {
    if (e.name !== 'AbortError') toast('No se pudo compartir: ' + e.message, 'error');
  }
}

async function _medCopiarTexto() {
  if (!_medActual) return;
  const txt = _medGenerarTextoPlano(_medActual);
  try {
    await navigator.clipboard.writeText(txt);
    toast('📋 Resumen copiado al portapapeles', 'success');
    _medCerrarMenuExportar();
  } catch (e) {
    toast('No se pudo copiar: ' + e.message, 'error');
  }
}

function _medEnviarEmail() {
  if (!_medActual) return;
  const m = _medActual;
  const cli = (Array.isArray(clientes) ? clientes : []).find(c => c.id === m.cliente_id);
  const pl = MED_PLANTILLAS[m.tipo] || MED_PLANTILLAS.otra;
  const subject = encodeURIComponent(`Medición ${pl.label} - ${cli?.nombre || ''}`.trim());
  const body = encodeURIComponent(_medGenerarTextoPlano(m));
  const to = cli?.email ? encodeURIComponent(cli.email) : '';
  window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
  _medCerrarMenuExportar();
}

async function _almCargar() {
  const kpisEl = document.getElementById('almKpis');
  const listaEl = document.getElementById('almLista');
  if (kpisEl) kpisEl.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--gris-400)">Cargando...</div>`;

  try {
    const { data, error } = await sb.from('stock')
      .select('*, articulos(id,codigo,nombre,precio_venta,precio_coste,stock_minimo,familia_id)')
      .eq('empresa_id', EMPRESA.id)
      .order('updated_at', { ascending: false });
    if (error) throw error;
    _almStock = data || [];
  } catch(e) {
    // Si la tabla stock no existe o falla, usar artículos directamente
    _almStock = (articulos || []).map(a => ({
      articulo_id: a.id,
      cantidad: 0,
      stock_minimo: a.stock_minimo || 0,
      articulos: a
    }));
  }
  _almRender();
}

function _almRender() {
  const kpisEl = document.getElementById('almKpis');
  const listaEl = document.getElementById('almLista');
  if (!listaEl) return;

  const q = (document.getElementById('almBuscar')?.value || '').toLowerCase().trim();
  const lista = _almStock.filter(s => {
    const art = s.articulos || articulos.find(a => a.id === s.articulo_id) || {};
    if (!q) return true;
    return (art.nombre||'').toLowerCase().includes(q) || (art.codigo||'').toLowerCase().includes(q);
  });

  // KPIs
  const total   = _almStock.length;
  const agotado = _almStock.filter(s => (s.cantidad||0) <= 0).length;
  const bajo    = _almStock.filter(s => (s.cantidad||0) > 0 && (s.cantidad||0) < (s.stock_minimo||1)).length;

  if (kpisEl) kpisEl.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:12px;text-align:center;border:1.5px solid var(--gris-100)">
      <div style="font-size:22px;font-weight:800;color:var(--azul)">${total}</div>
      <div style="font-size:10px;color:var(--gris-400);margin-top:2px">Referencias</div>
    </div>
    <div style="background:#fff;border-radius:12px;padding:12px;text-align:center;border:1.5px solid ${bajo>0?'#FEF3C7':'var(--gris-100)'}">
      <div style="font-size:22px;font-weight:800;color:${bajo>0?'#D97706':'var(--verde)'}">${bajo}</div>
      <div style="font-size:10px;color:var(--gris-400);margin-top:2px">Bajo mínimo</div>
    </div>
    <div style="background:#fff;border-radius:12px;padding:12px;text-align:center;border:1.5px solid ${agotado>0?'#FEE2E2':'var(--gris-100)'}">
      <div style="font-size:22px;font-weight:800;color:${agotado>0?'var(--rojo)':'var(--verde)'}">${agotado}</div>
      <div style="font-size:10px;color:var(--gris-400);margin-top:2px">Agotados</div>
    </div>
  `;

  if (!lista.length) {
    listaEl.innerHTML = `<div style="text-align:center;padding:32px;color:var(--gris-400)">Sin resultados</div>`;
    return;
  }

  listaEl.innerHTML = lista.map(s => {
    const art = s.articulos || articulos.find(a => a.id === s.articulo_id) || {};
    const qty = s.cantidad || 0;
    const min = s.stock_minimo || art.stock_minimo || 0;
    const estado = qty <= 0 ? {ico:'🔴',col:'#DC2626',lbl:'Agotado'} :
                   (min > 0 && qty < min) ? {ico:'🟡',col:'#D97706',lbl:'Bajo mínimo'} :
                   {ico:'🟢',col:'var(--verde)',lbl:'OK'};
    return `
      <div onclick="_almDetalle(${s.id||'null'},${art.id||'null'})"
        style="background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;border:1.5px solid var(--gris-100);display:flex;align-items:center;gap:12px;cursor:pointer;active:background:var(--gris-50)">
        <div style="width:42px;height:42px;background:var(--gris-50);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📦</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${art.nombre||'Sin nombre'}</div>
          <div style="font-size:11px;color:var(--gris-400);margin-top:1px">${art.codigo||''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:20px;font-weight:800;color:${estado.col}">${qty}</div>
          <div style="font-size:10px;color:var(--gris-400)">${min>0?'mín. '+min:''}</div>

function _almSelTipo(tipo) {
  document.getElementById('almMovTipo').value = tipo;
  const cols = { entrada: 'var(--verde)', salida: 'var(--rojo)', ajuste: 'var(--azul)' };
  ['entrada','salida','ajuste'].forEach(t => {
    const btn = document.getElementById('almTipo' + t.charAt(0).toUpperCase() + t.slice(1));
    if (!btn) return;
    const activo = t === tipo;
    btn.style.background = activo ? cols[t] : '#fff';
    btn.style.color = activo ? '#fff' : 'var(--gris-500)';
    btn.style.borderColor = activo ? cols[t] : 'var(--gris-200)';
  });
}

async function _almGuardarMov() {
  const tipo    = document.getElementById('almMovTipo')?.value;
  const artId   = parseInt(document.getElementById('almMovArt')?.value) || null;
  const qty     = parseFloat(document.getElementById('almMovQty')?.value) || 0;
  const nota    = document.getElementById('almMovNota')?.value.trim() || null;

  if (!artId) { toast('Selecciona un artículo', 'error'); return; }
  if (!qty || qty <= 0) { toast('Indica una cantidad válida', 'error'); return; }

  try {
    // Registrar movimiento en movimientos_stock
    const delta = tipo === 'salida' ? -qty : (tipo === 'ajuste' ? qty : qty);
    const { error: errMov } = await sb.from('movimientos_stock').insert({
      empresa_id: EMPRESA.id,
      articulo_id: artId,
      tipo,
      cantidad: qty,
      delta,
      notas: nota,
      usuario_id: CP?.id || null,
      usuario_nombre: CP?.nombre || '',
      fecha: new Date().toISOString().slice(0,10)
    });
    if (errMov) throw errMov;

    // Actualizar stock (upsert)
    const stockRec = _almStock.find(s => s.articulo_id === artId);
    const qtyActual = stockRec?.cantidad || 0;
    const qtyNueva  = tipo === 'ajuste' ? qty : Math.max(0, qtyActual + delta);
    const { error: errSt } = await sb.from('stock').upsert({
      empresa_id: EMPRESA.id,
      articulo_id: artId,
      cantidad: qtyNueva,
      updated_at: new Date().toISOString()
    }, { onConflict: 'empresa_id,articulo_id' });
    if (errSt) console.warn('[Almacén] upsert stock:', errSt.message);

    document.getElementById('almMovModal')?.remove();
    toast(`${tipo === 'entrada' ? '⬆️ Entrada' : tipo === 'salida' ? '⬇️ Salida' : '✏️ Ajuste'} registrado ✓`, 'success');
    // Recargar vista
    const body = document.getElementById('appBody');
    if (body) await renderAppAlmacen(body);
  } catch(e) { toast('Error: ' + (e.message||e), 'error'); }
}

  obraOperarioNombre: '',

          .eq('activo', true)

  const cont = document.getElementById('mostradorDestino');
  if (!cont) return;
  const tipos = [
    { k:'cliente',   ico:'👤', lbl:'Cliente',   col:'var(--azul)'   },
    { k:'obra',      ico:'🏗️', lbl:'Obra',      col:'var(--acento)' },
    { k:'furgoneta', ico:'🚐', lbl:'Furgoneta', col:'var(--verde)'  },
    { k:'almacen',   ico:'📦', lbl:'Almacén',   col:'var(--violeta)'},
  ];

  // Si YA hay destino elegido → vista colapsada compacta (no mostrar 4 botones para evitar tocar sin querer)
  if (_mostrador.destinoLabel) {
    const t = tipos.find(x => x.k === _mostrador.destinoTipo) || tipos[0];
    // Línea extra para destino Obra: responsable (furgoneta + operario)
    let extraResp = '';
    if (_mostrador.destinoTipo === 'obra') {
      if (_mostrador.obraFurgonetaId) {
        const respTxt = `🚐 ${_mostrador.obraFurgonetaNombre || ''}${_mostrador.obraOperarioNombre ? ' · ' + _mostrador.obraOperarioNombre : ''}`;
        extraResp = `
          <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--gris-200);display:flex;align-items:center;justify-content:space-between;gap:8px">
            <div style="min-width:0;flex:1">
              <div style="font-size:10px;color:var(--gris-400);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Responsable</div>
              <div style="font-size:13px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${respTxt}</div>
            </div>
            <button onclick="_mostradorPickFurgoObra('')" style="padding:6px 10px;border:1px solid var(--gris-200);background:#fff;color:var(--azul);border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">Cambiar</button>
          </div>`;
      } else {
        extraResp = `
          <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--gris-200);display:flex;align-items:center;justify-content:space-between;gap:8px">
            <div style="font-size:12px;color:var(--rojo);font-weight:700">⚠️ Falta asignar responsable</div>
            <button onclick="_mostradorPickFurgoObra('')" style="padding:6px 10px;border:1px solid var(--rojo);background:var(--rojo);color:#fff;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">Asignar</button>
          </div>`;
      }
    }
    cont.innerHTML = `
      <div style="background:#fff;border:1.5px solid var(--gris-100);border-radius:12px;padding:12px;margin-top:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1">
            <div style="width:36px;height:36px;background:${t.col};color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${t.ico}</div>
            <div style="min-width:0">
              <div style="font-size:10px;color:var(--gris-400);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Destino · ${t.lbl}</div>
              <div style="font-size:14px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${_mostrador.destinoLabel}</div>
            </div>
          </div>
          <button onclick="_mostradorCambiarDestino()" style="padding:8px 12px;border:1.5px solid var(--gris-200);background:#fff;color:var(--azul);border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">Cambiar</button>
        </div>
        ${extraResp}
      </div>
    `;
    return;
  }

  // Si NO hay destino → mostrar los 4 botones
  cont.innerHTML = `
    <div style="background:#fff;border:1.5px solid var(--gris-100);border-radius:12px;padding:12px;margin-top:10px">
      <div style="font-size:11px;color:var(--gris-400);font-weight:700;margin-bottom:8px">DESTINO</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
        ${tipos.map(t => `
          <button onclick="_mostradorPickDestino('${t.k}')" style="
            padding:10px 4px;border:2px solid var(--gris-200);
            background:#fff;color:var(--gris-700);
            border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px">
            <span style="font-size:18px">${t.ico}</span>
            <span>${t.lbl}</span>
          </button>
        `).join('')}
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--gris-400);text-align:center">Selecciona el tipo de destino</div>
    </div>
  `;
}

function _mostradorCambiarDestino() {
  // Vuelve al estado "sin destino" para mostrar los 4 botones de nuevo
  _mostrador.destinoTipo = null;
  _mostrador.destinoId   = null;
  _mostrador.destinoLabel= '';
  _mostrador.obraFurgonetaId = null;
  _mostrador.obraFurgonetaNombre = '';
  _mostrador.obraOperarioNombre = '';
  _mostradorRefreshHeader();
}

async function _mostradorPickDestino(tipo) {
  _mostrador.destinoTipo = tipo;
  if (tipo === 'cliente')   return _mostradorPickCliente();
  if (tipo === 'obra')      return _mostradorPickObra();
  if (tipo === 'furgoneta') return _mostradorPickFurgoneta();
  if (tipo === 'almacen')   return _mostradorPickAlmacen();
}

function _mostradorPickCliente() {
  const lista = (clientes || []).slice().sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  _mostradorModalSelector('Selecciona cliente', [
    { id:'_contado', nombre:'⚡ Contado (sin cliente)', search:'contado', pinned: true },
    ...lista.map(c => ({
      id: c.id,
      nombre: c.nombre || c.razon_social || `Cliente ${c.id}`,
      sub: [c.nif, c.telefono, c.localidad || c.direccion].filter(Boolean).join(' · '),
      search: [c.nombre, c.razon_social, c.nif, c.telefono, c.movil, c.email,
               c.direccion, c.localidad, c.provincia, c.codigo_postal].filter(Boolean).join(' ').toLowerCase()
    }))
  ], (sel) => {
    _mostrador.destinoId    = sel.id === '_contado' ? null : sel.id;
    _mostrador.destinoLabel = sel.nombre;
    _mostradorRefreshHeader();
  }, { hideUntilSearch: true });
}

function _mostradorPickObra() {
  const lista = (trabajos || []).filter(t => (t.estado||'') !== 'finalizado' && (t.estado||'') !== 'cancelado')
    .sort((a,b)=>(a.titulo||a.descripcion||'').localeCompare(b.titulo||b.descripcion||''));
  if (!lista.length) { alert('No hay obras/trabajos activos'); return; }
  _mostradorModalSelector('Selecciona obra', lista.map(t => {
    const cli = (clientes||[]).find(c => c.id === t.cliente_id);
    return {
      id: t.id,
      nombre: t.titulo || t.descripcion || `Trabajo ${t.id}`,
      sub: [cli?.nombre, t.direccion || t.localidad].filter(Boolean).join(' · '),
      search: [t.titulo, t.descripcion, t.numero, t.direccion, t.localidad, t.provincia,
               cli?.nombre, cli?.telefono, cli?.nif].filter(Boolean).join(' ').toLowerCase()
    };
  }), (sel) => {
    // Guardamos la obra y pedimos la furgoneta responsable
    _mostrador.destinoId    = sel.id;
    _mostrador.destinoLabel = `🏗️ ${sel.nombre}${sel.sub?' · '+sel.sub:''}`;
    _mostradorPickFurgoObra(sel.nombre);
  }, { hideUntilSearch: true });
}

// Selector de furgoneta responsable cuando el destino es Obra
function _mostradorPickFurgoObra(obraTitulo) {
  const lista = _mostradorAlmacenes.filter(a => a.tipo === 'furgoneta' && a.id !== _mostrador.almacenOrigenId);
  if (!lista.length) {
    alert('No hay furgonetas disponibles distintas del almacén origen.\nNo se puede asignar responsable. Cancelando destino Obra.');
    _mostrador.destinoTipo = null;
    _mostrador.destinoId = null;
    _mostrador.destinoLabel = '';
    _mostradorRefreshHeader();
    return;
  }
  _mostradorModalSelector('¿Quién se la lleva?', lista.map(a => ({
    id:a.id, nombre:`🚐 ${a.nombre}`, sub: a.operario_nombre || ''
  })), (sel) => {
    _mostrador.obraFurgonetaId     = sel.id;
    _mostrador.obraFurgonetaNombre = (sel.nombre||'').replace(/^🚐\s*/,'');
    _mostrador.obraOperarioNombre  = sel.sub || '';
    _mostradorRefreshHeader();
  });
}

function _mostradorPickFurgoneta() {
  const lista = _mostradorAlmacenes.filter(a => a.tipo === 'furgoneta' && a.id !== _mostrador.almacenOrigenId);
  if (!lista.length) { alert('No hay furgonetas disponibles distintas del origen'); return; }
  _mostradorModalSelector('Selecciona furgoneta destino', lista.map(a => ({
    id:a.id, nombre:`🚐 ${a.nombre}`, sub:a.operario_nombre||''
  })), (sel) => {
    _mostrador.destinoId    = sel.id;
    _mostrador.destinoLabel = `${sel.nombre}${sel.sub?' · '+sel.sub:''}`;
    _mostradorRefreshHeader();
  });
}

function _mostradorPickAlmacen() {
  const lista = _mostradorAlmacenes.filter(a => a.tipo !== 'furgoneta' && a.id !== _mostrador.almacenOrigenId);
  if (!lista.length) { alert('No hay almacenes destino disponibles'); return; }
  _mostradorModalSelector('Selecciona almacén destino', lista.map(a => ({
    id:a.id, nombre:`📦 ${a.nombre}`
  })), (sel) => {
    _mostrador.destinoId    = sel.id;
    _mostrador.destinoLabel = sel.nombre;
    _mostradorRefreshHeader();
  });
}

function _mostradorModalSelector(titulo, opciones, onPick, opts) {
  const hideUntilSearch = opts?.hideUntilSearch || false;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:10000;display:flex;align-items:flex-end';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column">
      <div style="padding:16px;border-bottom:1px solid var(--gris-100);display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:16px;font-weight:800">${titulo}</div>
        <button onclick="this.closest('[data-modal]').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--gris-400)">✕</button>
      </div>
      <div style="padding:10px 12px">
        <input type="text" id="msFiltro" placeholder="Buscar..." style="width:100%;padding:10px 12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);outline:none" autocomplete="off">
      </div>
      <div id="msLista" style="overflow-y:auto;flex:1;padding:0 12px 16px"></div>
    </div>
  `;
  modal.dataset.modal = '1';
  document.body.appendChild(modal);

  const renderL = () => {
    const q = (document.getElementById('msFiltro').value || '').toLowerCase().trim();
    // Si hideUntilSearch y no hay texto → solo mostrar opciones fijadas (pinned)
    if (hideUntilSearch && !q) {
      const pinned = opciones.filter(o => o.pinned);
      if (!pinned.length) {
        document.getElementById('msLista').innerHTML = `<div style="text-align:center;padding:30px;color:var(--gris-400);font-size:13px">Escribe para buscar...</div>`;
        return;
      }
      // Renderizar solo las pinned + mensaje
      document.getElementById('msLista').innerHTML = pinned.map((o, idx) => `
        <div data-pick-pin="${idx}" style="padding:12px 10px;border-bottom:1px solid var(--gris-100);cursor:pointer">
          <div style="font-size:14px;font-weight:700">${o.nombre}</div>
          ${o.sub ? `<div style="font-size:12px;color:var(--gris-400)">${o.sub}</div>` : ''}
        </div>
      `).join('') + `<div style="text-align:center;padding:20px;color:var(--gris-400);font-size:13px">Escribe para buscar...</div>`;
      document.querySelectorAll('#msLista [data-pick-pin]').forEach(div => {
        div.addEventListener('click', () => {
          const sel = pinned[parseInt(div.dataset.pickPin)];
          modal.remove();
          onPick(sel);
        });
      });
      return;
    }
    const filtradas = !q ? opciones : opciones.filter(o =>
      (o.search||'').includes(q) || (o.nombre||'').toLowerCase().includes(q) || (o.sub||'').toLowerCase().includes(q));
    document.getElementById('msLista').innerHTML = filtradas.map((o, idx) => `
      <div data-pick="${idx}" style="padding:12px 10px;border-bottom:1px solid var(--gris-100);cursor:pointer">
        <div style="font-size:14px;font-weight:700">${o.nombre}</div>
        ${o.sub ? `<div style="font-size:12px;color:var(--gris-400)">${o.sub}</div>` : ''}
      </div>
    `).join('') || `<div style="text-align:center;padding:30px;color:var(--gris-400)">Sin resultados</div>`;
    document.querySelectorAll('#msLista [data-pick]').forEach(div => {
      div.addEventListener('click', () => {
        const sel = filtradas[parseInt(div.dataset.pick)];
        modal.remove();
        onPick(sel);
      });
    });
  };
  document.getElementById('msFiltro').addEventListener('input', renderL);
  renderL();
  // Si hideUntilSearch, auto-focus en el input para que empiece a escribir
  if (hideUntilSearch) setTimeout(() => document.getElementById('msFiltro')?.focus(), 100);
}

function _mostradorRenderResultados() {
  const cont = document.getElementById('mostradorResultados');
  if (!cont) return;
  const q = (_mostradorBusqueda || '').toLowerCase().trim();
  if (!q) { cont.innerHTML = ''; return; }

  const lista = (articulos || []).filter(a => {
    if (a.activo === false) return false;  // es_activo es campo legacy, no filtrar por él
    return (a.nombre||'').toLowerCase().includes(q)
        || (a.codigo||'').toLowerCase().includes(q)
        || (a.codigo_barras||'').toLowerCase().includes(q)
        || (a.referencia_fabricante||'').toLowerCase().includes(q);
  }).slice(0, 12);

  cont.innerHTML = `
    <div style="background:#fff;border:1.5px solid var(--gris-100);border-radius:12px;overflow:hidden">
      ${!lista.length ? `<div style="padding:20px;text-align:center;color:var(--gris-400);font-size:13px">Sin resultados</div>` :
        lista.map(a => `
          <div onclick="_mostradorAddItem(${a.id})" style="padding:10px 12px;border-bottom:1px solid var(--gris-100);display:flex;align-items:center;gap:10px;cursor:pointer">
            <div style="width:36px;height:36px;background:var(--gris-50);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background-image:url('${a.foto_url||''}');background-size:cover;background-position:center">
              ${a.foto_url?'':'📦'}
            </div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:700;line-height:1.3">${a.nombre||'—'}</div>
              <div style="font-size:11px;color:var(--gris-400)">${a.codigo||''}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:14px;font-weight:800">${(+a.precio_venta||0).toFixed(2)}€</div>
            </div>
          </div>
        `).join('')
      }
    </div>
  `;
}

function _mostradorAddItem(articuloId) {
  const art = (articulos||[]).find(a => a.id === articuloId);
  if (!art) return;
  const ex = _mostrador.items.find(i => i.articulo_id === articuloId);
  if (ex) {
    ex.cantidad += 1;
  } else {
    _mostrador.items.push({
      articulo_id: art.id,
      codigo: art.codigo || '',
      nombre: art.nombre || '',
      cantidad: 1,
      precio_unit: +art.precio_venta || 0,
      foto_url: art.foto_url || ''
    });
  }
  // Limpiar buscador y reenfocar para escaneo continuo
  _mostradorBusqueda = '';
  const inp = document.getElementById('mostradorBuscar');
  if (inp) { inp.value = ''; inp.focus(); }
  _mostradorRenderResultados();
  _mostradorRenderCarrito();
}

function _mostradorChangeQty(articuloId, delta) {
  const it = _mostrador.items.find(i => i.articulo_id === articuloId);
  if (!it) return;
  it.cantidad = Math.max(0, (+it.cantidad || 0) + delta);
  if (it.cantidad === 0) {
    _mostrador.items = _mostrador.items.filter(i => i.articulo_id !== articuloId);
  }
  _mostradorRenderCarrito();
}

function _mostradorSetQty(articuloId, valor) {
  const it = _mostrador.items.find(i => i.articulo_id === articuloId);
  if (!it) return;
  const v = parseFloat(String(valor).replace(',', '.')) || 0;
  it.cantidad = Math.max(0, v);
  if (it.cantidad === 0) {
    _mostrador.items = _mostrador.items.filter(i => i.articulo_id !== articuloId);
    _mostradorRenderCarrito();
  } else {
    _mostradorActualizarTotales();
  }
}

function _mostradorRemoveItem(articuloId) {
  _mostrador.items = _mostrador.items.filter(i => i.articulo_id !== articuloId);
  _mostradorRenderCarrito();
}

function _mostradorRenderCarrito() {
  const cont = document.getElementById('mostradorCarrito');
  if (!cont) return;
  if (!_mostrador.items.length) {
    cont.innerHTML = `
      <div style="text-align:center;padding:40px 20px;color:var(--gris-400)">
        <div style="font-size:36px;margin-bottom:6px">🛒</div>
        <div style="font-size:13px">Carrito vacío — busca o escanea artículos</div>
      </div>`;
    document.getElementById('mostradorFooter').style.display = 'none';
    return;
  }
  cont.innerHTML = `
    <div style="font-size:11px;color:var(--gris-400);font-weight:700;margin-bottom:6px">EN EL CARRITO (${_mostrador.items.length})</div>
    <div style="background:#fff;border:1.5px solid var(--gris-100);border-radius:12px;overflow:hidden">
      ${_mostrador.items.map(it => `
        <div style="padding:10px 12px;border-bottom:1px solid var(--gris-100);display:flex;align-items:center;gap:8px">
          <div style="width:36px;height:36px;background:var(--gris-50);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background-image:url('${it.foto_url||''}');background-size:cover;background-position:center">
            ${it.foto_url?'':'📦'}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.nombre}</div>
            <div style="font-size:11px;color:var(--gris-400)">${it.codigo} · ${it.precio_unit.toFixed(2)}€/u</div>
          </div>
          <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
            <button onclick="_mostradorChangeQty(${it.articulo_id},-1)" style="width:28px;height:28px;border:1.5px solid var(--gris-200);background:#fff;border-radius:8px;font-size:16px;font-weight:800;cursor:pointer">−</button>
            <input type="number" min="0" step="1" value="${it.cantidad}"
              onchange="_mostradorSetQty(${it.articulo_id},this.value)"
              style="width:48px;text-align:center;padding:4px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:14px;font-weight:700;font-family:var(--font)">
            <button onclick="_mostradorChangeQty(${it.articulo_id},1)" style="width:28px;height:28px;border:1.5px solid var(--gris-200);background:#fff;border-radius:8px;font-size:16px;font-weight:800;cursor:pointer">+</button>
            <button onclick="_mostradorRemoveItem(${it.articulo_id})" style="margin-left:4px;width:28px;height:28px;border:none;background:var(--gris-50);color:var(--rojo);border-radius:8px;font-size:14px;cursor:pointer">🗑</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('mostradorFooter').style.display = '';
  _mostradorActualizarTotales();
}

function _mostradorActualizarTotales() {
  const totalUnidades = _mostrador.items.reduce((s,i) => s + (+i.cantidad||0), 0);
  const totalEur      = _mostrador.items.reduce((s,i) => s + (+i.cantidad||0) * (+i.precio_unit||0), 0);
  const cEl = document.getElementById('mostradorCount');
  const tEl = document.getElementById('mostradorTotal');
  if (cEl) cEl.textContent = `${_mostrador.items.length} refs · ${totalUnidades} uds`;
  if (tEl) tEl.textContent = `${totalEur.toFixed(2)} €`;
}

// ── Escáner cámara (html5-qrcode) ──
let _mostradorScanner = null;       // instancia Html5Qrcode activa
let _mostradorScanLast = { code:'', ts:0 };  // anti-repetición
let _mostradorScanCamId = null;     // id de cámara seleccionada
let _mostradorScanCams = [];        // lista de cámaras disponibles
let _mostradorAudioCtx = null;      // AudioContext compartido para beeps

function _mostradorBeep(tipo) {
  try {
    if (!_mostradorAudioCtx) {
      _mostradorAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const ctx = _mostradorAudioCtx;
    if (ctx.state === 'suspended') ctx.resume();

    const t0 = ctx.currentTime;
    const play = (freq, start, dur, vol) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t0 + start);
      gain.gain.setValueAtTime(vol, t0 + start);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + start + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t0 + start);
      osc.stop(t0 + start + dur);
    };

    if (tipo === 'ok') {
      // "Pit" agudo y corto, estilo lector de supermercado (lectura de código)
      play(2400, 0, 0.10, 0.25);
    } else if (tipo === 'done') {
      // 🎉 TA-CHÁN! — fanfarria de fiesta, corta y brillante (~0.6s)
      const note = (freq, start, dur, vol, type) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, t0 + start);
        gain.gain.setValueAtTime(vol, t0 + start);
        gain.gain.setValueAtTime(vol * 0.9, t0 + start + dur * 0.5);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + start + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(t0 + start);
        osc.stop(t0 + start + dur);
      };
      // "TA" — acorde rápido (C+E+G, golpe)
      note(523.25, 0, 0.10, 0.20, 'triangle');  // C5
      note(659.25, 0, 0.10, 0.18, 'triangle');  // E5
      note(783.99, 0, 0.10, 0.16, 'triangle');  // G5
      // pausa 60ms
      // "CHÁN!" — acorde brillante más alto y largo (C6+E5+G5+C5)
      note(1046.5,  0.16, 0.40, 0.28, 'sine');     // C6 ← brillante
      note(783.99,  0.16, 0.40, 0.16, 'sine');     // G5
      note(659.25,  0.16, 0.40, 0.14, 'sine');     // E5
      note(523.25,  0.16, 0.40, 0.10, 'triangle'); // C5 base
      // Destello agudo final (campana)
      note(2093.0,  0.16, 0.25, 0.08, 'sine');     // C7 suave
    } else {
      // Doble beep grave de error (escaneo no encontrado)
      play(280, 0,    0.12, 0.30);
      play(220, 0.15, 0.18, 0.30);
    }
  } catch(e) { /* no audio en este nav */ }
}

async function _mostradorAbrirEscaner() {
  if (typeof Html5Qrcode === 'undefined') {
    alert('No se ha podido cargar la librería de escaneo. Comprueba la conexión y reintenta.');
    return;
  }
  // Inicializar audio con la interacción del usuario (requerido por iOS Safari)
  try {
    if (!_mostradorAudioCtx) _mostradorAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_mostradorAudioCtx.state === 'suspended') await _mostradorAudioCtx.resume();
  } catch(e) {}

  // Crear modal full-screen con el visor
  const modal = document.createElement('div');
  modal.id = 'mostradorScanModal';
  modal.style.cssText = 'position:fixed;inset:0;background:#000;z-index:10001;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)';
  modal.innerHTML = `
    <div style="background:#000;color:#fff;padding:14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div>
        <div style="font-size:15px;font-weight:800">📷 Escáner</div>
        <div style="font-size:11px;color:#9ca3af">Apunta a un QR o código de barras</div>
      </div>
      <button onclick="_mostradorCerrarEscaner()" style="background:#fff;border:none;color:#000;padding:10px 16px;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer">Cerrar ✕</button>
    </div>
    <div id="mostradorScanReader" style="flex:1;min-height:300px;background:#000;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden"></div>
    <div id="mostradorScanInfo" style="background:#111;color:#fff;padding:12px 14px;font-size:13px;text-align:center;min-height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center">Iniciando cámara…</div>
    <div id="mostradorScanFoot" style="background:#000;color:#fff;padding:10px 14px;display:flex;gap:8px;align-items:center;justify-content:space-between;flex-shrink:0">
      <select id="mostradorScanCamSel" style="flex:1;padding:8px;border-radius:8px;border:none;font-size:13px;font-family:var(--font)">
        <option value="">Cargando cámaras…</option>
      </select>
      <button onclick="_mostradorScanFlip()" style="background:#374151;border:none;color:#fff;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">⟳ Girar</button>
    </div>
  `;
  document.body.appendChild(modal);

  try {
    _mostradorScanCams = await Html5Qrcode.getCameras();
  } catch (e) {
    document.getElementById('mostradorScanInfo').textContent = '⚠️ Sin acceso a cámara: ' + (e.message || e);
    return;
  }
  if (!_mostradorScanCams || !_mostradorScanCams.length) {
    document.getElementById('mostradorScanInfo').textContent = '⚠️ No se ha detectado ninguna cámara.';
    return;
  }
  // Elegir cámara trasera por defecto
  const trasera = _mostradorScanCams.find(c => /back|rear|trasera|environment/i.test(c.label)) || _mostradorScanCams[_mostradorScanCams.length - 1];
  _mostradorScanCamId = trasera.id;
  const sel = document.getElementById('mostradorScanCamSel');
  sel.innerHTML = _mostradorScanCams.map(c =>
    `<option value="${c.id}" ${c.id===_mostradorScanCamId?'selected':''}>${c.label || ('Cámara ' + c.id.slice(0,6))}</option>`
  ).join('');
  sel.onchange = () => { _mostradorScanCamId = sel.value; _mostradorScanRestart(); };

  await _mostradorScanStart();
}

async function _mostradorScanStart() {
  const reader = document.getElementById('mostradorScanReader');
  if (!reader) return;
  reader.innerHTML = '<div id="mostradorScanArea" style="width:100%;height:100%"></div>';

  _mostradorScanner = new Html5Qrcode('mostradorScanArea', { verbose: false });
  const config = {
    fps: 15,
    qrbox: (vw, vh) => {
      // Si el contenedor todavía no tiene tamaño (vw/vh=0), devuelve fallback seguro
      if (!vw || !vh || vw < 100 || vh < 100) return { width: 260, height: 160 };
      const min = Math.min(vw, vh);
      return {
        width:  Math.max(200, Math.round(min * 0.85)),
        height: Math.max(120, Math.round(min * 0.45))
      };
    },
    aspectRatio: 1.0,
    formatsToSupport: [0, 1, 2, 3, 7]  // QR_CODE=0, EAN_13=1, EAN_8=2, CODE_128=3, CODE_39=7
  };
  try {
    await _mostradorScanner.start(
      _mostradorScanCamId,
      config,
      (decodedText) => _mostradorOnScan(decodedText),
      () => {} // ignore frame errors
    );
    const info = document.getElementById('mostradorScanInfo');
    if (info) info.textContent = 'Listo. Apunta al código…';
  } catch (e) {
    const info = document.getElementById('mostradorScanInfo');
    if (info) info.textContent = '⚠️ No se pudo iniciar la cámara: ' + (e.message || e);
  }
}

async function _mostradorScanRestart() {
  if (_mostradorScanner) {
    try { await _mostradorScanner.stop(); } catch(_){}
    try { _mostradorScanner.clear(); } catch(_){}
    _mostradorScanner = null;
  }
  await _mostradorScanStart();
}

function _mostradorScanFlip() {
  if (!_mostradorScanCams.length) return;
  const idx = _mostradorScanCams.findIndex(c => c.id === _mostradorScanCamId);
  const next = _mostradorScanCams[(idx + 1) % _mostradorScanCams.length];
  _mostradorScanCamId = next.id;
  const sel = document.getElementById('mostradorScanCamSel');
  if (sel) sel.value = next.id;
  _mostradorScanRestart();
}

async function _mostradorCerrarEscaner() {
  if (_mostradorScanner) {
    try { await _mostradorScanner.stop(); } catch(_){}
    try { _mostradorScanner.clear(); } catch(_){}
    _mostradorScanner = null;
  }
  const m = document.getElementById('mostradorScanModal');
  if (m) m.remove();
}

async function _mostradorOnScan(decodedText) {
  if (!decodedText) return;
  const code = String(decodedText).trim();
  if (!code) return;
  // Anti-repetición: ignora el mismo código en menos de 1.2s
  const now = Date.now();
  if (code === _mostradorScanLast.code && (now - _mostradorScanLast.ts) < 1200) return;
  _mostradorScanLast = { code, ts: now };

  const art = _mostradorBuscarArticuloPorCodigo(code);
  if (!art) {
    _mostradorBeep('err');
    if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
    await _mostradorCerrarEscaner();
    _scanCodigoNoEncontrado(code, 'mostrador');
    return;
  }
  // ✅ Encontrado → beep + cerrar escáner + abrir ficha cantidad
  _mostradorBeep('ok');
  if (navigator.vibrate) navigator.vibrate(40);
  await _mostradorCerrarEscaner();
  _mostradorFichaArticulo(art);
}

function _mostradorFichaCambiar(delta) {
  const inp = document.getElementById('fichaCantidad');
  if (!inp) return;
  const v = Math.max(0, (parseFloat(inp.value)||0) + delta);
  inp.value = v;
  _mostradorFichaActualizarPrev();
}

function _mostradorFichaActualizarPrev() {
  const inp = document.getElementById('fichaCantidad');
  const prev = document.getElementById('fichaPrev');
  if (inp && prev) prev.textContent = inp.value || '0';
}

function _mostradorFichaCerrar(reabrirEscaner) {
  const m = document.getElementById('mostradorFichaModal');
  if (m) m.remove();
  if (reabrirEscaner) setTimeout(() => _mostradorAbrirEscaner(), 150);
}

function _mostradorFichaConfirmar(seguirEscaneando) {
  const m = document.getElementById('mostradorFichaModal');
  if (!m) return;
  const artId = parseInt(m.dataset.articuloId);
  const art = (articulos||[]).find(a => a.id === artId);
  const inp = document.getElementById('fichaCantidad');
  const cantTotal = Math.max(0, parseFloat(inp?.value||'0') || 0);

  if (!art) { m.remove(); return; }

  // Reemplaza/actualiza la línea con la cantidad TOTAL elegida
  const ex = _mostrador.items.find(i => i.articulo_id === artId);
  if (cantTotal === 0) {
    if (ex) _mostrador.items = _mostrador.items.filter(i => i.articulo_id !== artId);
  } else if (ex) {
    ex.cantidad = cantTotal;
  } else {
    _mostrador.items.push({
      articulo_id: art.id,
      codigo: art.codigo || '',
      nombre: art.nombre || '',
      cantidad: cantTotal,
      precio_unit: +art.precio_venta || 0,
      foto_url: art.foto_url || ''
    });
  }
  _mostradorRenderCarrito();
  _mostradorFichaCerrar(seguirEscaneando);
}

async function _scanGuardarProvisional(code, context) {
  const nombre = (document.getElementById('scanProvNombre')?.value || '').trim();
  if (!nombre) { toast('Escribe un nombre para el artículo', 'error'); return; }
  const precio = parseFloat(document.getElementById('scanProvPrecio')?.value) || 0;

  try {
    const nuevo = {
      empresa_id: EMPRESA.id,
      nombre: nombre,
      codigo: 'PROV-' + Date.now().toString(36).toUpperCase(),
      codigo_barras: code,
      precio_venta: precio,
      precio_coste: 0,
      activo: true,
      observaciones: `[PROVISIONAL] Creado desde app móvil el ${new Date().toISOString().slice(0,10)}. Código escaneado: ${code}. Pendiente completar ficha.`
    };

    if (navigator.onLine) {
      const { data, error } = await sb.from('articulos').insert(nuevo).select().single();
      if (error) throw error;
      // Añadir al array local
      articulos.push(data);
      toast(`✅ Artículo "${nombre}" creado`, 'success');
      document.querySelectorAll('[data-modal="scan-provisional"]').forEach(m => m.remove());
      // Abrir ficha del artículo recién creado en el contexto correcto
      if (context === 'mostrador') {
        _mostradorFichaArticulo(data);
      } else if (context === 'devs') {
        _devsAbrirFicha({ id: data.id, codigo: data.codigo || '', nombre: data.nombre || '' });
      }
    } else {
      // Offline: encolar creación + añadir temporalmente al array local
      const tempId = 'temp_' + Date.now();
      nuevo.id = tempId;
      await syncQueueAdd({ table: 'articulos', action: 'insert', data: { ...nuevo, id: undefined }, _tempId: tempId, timestamp: Date.now() });
      articulos.push(nuevo);
      toast(`✅ Artículo "${nombre}" creado offline — se subirá con conexión`, 'success');
      document.querySelectorAll('[data-modal="scan-provisional"]').forEach(m => m.remove());
      if (context === 'mostrador') {
        _mostradorFichaArticulo(nuevo);
      } else if (context === 'devs') {
        _devsAbrirFicha({ id: tempId, codigo: nuevo.codigo || '', nombre: nuevo.nombre || '' });
      }
    }
  } catch(e) {
    console.error('[Scan] Error creando provisional:', e);
    toast('❌ Error: ' + (e.message || e), 'error');
  }
}

    <div style="background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)">
      <div style="padding:14px 18px 0;flex-shrink:0">
        <div style="font-size:18px;font-weight:800;margin-bottom:4px">🔗 Asignar código a artículo</div>
        <div style="font-size:12px;color:var(--gris-400);margin-bottom:10px">Código: <b style="font-family:monospace">${code}</b></div>
        <input id="scanAsignarBuscar" type="text" placeholder="Buscar artículo por nombre, código..."
          style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px"
          oninput="_scanAsignarFiltrar()" autocomplete="off">
      </div>
      <div id="scanAsignarLista" style="flex:1;overflow-y:auto;padding:0 18px 18px"></div>
    </div>
  `;
  modal.querySelector('div').addEventListener('click', e => e.stopPropagation());
  modal.addEventListener('click', () => document.querySelectorAll('[data-modal="scan-asignar"]').forEach(m => m.remove()));
  document.body.appendChild(modal);
  // Guardar code y context para usar en selección
  modal._scanCode = code;
  modal._scanContext = context;
  setTimeout(() => {
    document.getElementById('scanAsignarBuscar')?.focus();
    _scanAsignarFiltrar();
  }, 200);
}

function _scanAsignarFiltrar() {
  const q = (document.getElementById('scanAsignarBuscar')?.value || '').toLowerCase().trim();
  const lista = document.getElementById('scanAsignarLista');
  if (!lista) return;

  const filtered = (articulos || []).filter(a => {
    if (!q) return true;
    return (a.nombre || '').toLowerCase().includes(q)
        || (a.codigo || '').toLowerCase().includes(q)
        || (a.codigo_barras || '').toLowerCase().includes(q)
        || (a.referencia_fabricante || '').toLowerCase().includes(q);
  }).slice(0, 50);

  if (!filtered.length) {
    lista.innerHTML = '<div style="text-align:center;color:var(--gris-400);padding:30px;font-size:13px">Sin resultados</div>';
    return;
  }
  lista.innerHTML = filtered.map(a => `
    <div onclick="_scanAsignarSeleccionar(${a.id})"
      style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--gris-100);cursor:pointer">
      <div style="width:36px;height:36px;background:var(--gris-50);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background-image:url('${a.foto_url||''}');background-size:cover;background-position:center">
        ${a.foto_url?'':'📦'}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.nombre||'—'}</div>
        <div style="font-size:11px;color:var(--gris-400)">${a.codigo||''}${a.codigo_barras?' · '+a.codigo_barras:''}${a.referencia_fabricante?' · '+a.referencia_fabricante:''}</div>
      </div>
      <div style="font-size:13px;font-weight:700;color:var(--azul);flex-shrink:0">${(+a.precio_venta||0).toFixed(2)}€</div>
    </div>
  `).join('');
}

async function _scanAsignarSeleccionar(artId) {
  const modal = document.querySelector('[data-modal="scan-asignar"]');
  const code = modal?._scanCode;
  const context = modal?._scanContext;
  if (!code) return;

  const art = articulos.find(a => a.id === artId);
  if (!art) return;

  if (!confirm(`¿Asignar código "${code}" al artículo "${art.nombre}"?\n\nSe guardará como código de barras del artículo.`)) return;

  try {
    if (navigator.onLine) {
      const { error } = await sb.from('articulos').update({ codigo_barras: code }).eq('id', artId);
      if (error) throw error;
    } else {
      await syncQueueAdd({ table: 'articulos', action: 'update', data: { codigo_barras: code }, match: { id: artId }, timestamp: Date.now() });
    }
    // Actualizar array local
    art.codigo_barras = code;
    toast(`✅ Código asignado a "${art.nombre}"`, 'success');
    document.querySelectorAll('[data-modal="scan-asignar"]').forEach(m => m.remove());

    // Abrir ficha del artículo
    if (context === 'mostrador') {
      _mostradorFichaArticulo(art);
    } else if (context === 'devs') {
      _devsAbrirFicha({ id: art.id, codigo: art.codigo || '', nombre: art.nombre || '' });
    }
  } catch(e) {
    console.error('[Scan] Error asignando código:', e);
    toast('❌ Error: ' + (e.message || e), 'error');
  }
}

function _mostradorBuscarArticuloPorCodigo(code) {
  if (!articulos || !articulos.length) return null;
  const norm = s => (s||'').toString().toLowerCase().trim().replace(/\s+/g,'');
  const stripZeros = s => norm(s).replace(/^0+/, '');
  const c  = norm(code);
  const cZ = stripZeros(code);

  // 1) Match exacto (codigo_barras / codigo / ref_fabricante)
  let a = articulos.find(x => norm(x.codigo_barras) === c) ||
          articulos.find(x => norm(x.codigo) === c) ||
          articulos.find(x => norm(x.referencia_fabricante) === c);
  if (a) return a;

  // 2) Match exacto ignorando ceros a la izquierda (EAN-13 vs EAN-8 → mismo número)
  if (cZ && cZ !== c) {
    a = articulos.find(x => stripZeros(x.codigo_barras) === cZ) ||
        articulos.find(x => stripZeros(x.codigo) === cZ) ||
        articulos.find(x => stripZeros(x.referencia_fabricante) === cZ);
    if (a) return a;
  }

  // 3) Match parcial (incluye) en codigo_barras o codigo — solo si código tiene >=6 chars
  if (c.length >= 6) {
    a = articulos.find(x => norm(x.codigo_barras) && norm(x.codigo_barras).includes(c)) ||
        articulos.find(x => norm(x.codigo) && norm(x.codigo).includes(c));
    if (a) return a;
  }

  return null;
}

// ── Helpers de cierre ─────────────────────────────────────
async function _mostradorSiguienteNumero(prefijo, conYear) {
  const year = new Date().getFullYear();
  const like = conYear ? `${prefijo}-${year}-%` : `${prefijo}-%`;
  const tabla = prefijo === 'TR' ? 'traspasos' : prefijo === 'ALB' ? 'albaranes' : 'partes_trabajo';
  try {
    const { data } = await sb.from(tabla)
      .select('numero')
      .eq('empresa_id', EMPRESA.id)
      .like('numero', like)
      .order('numero', { ascending: false })
      .limit(1);
    let next = 1;
    if (data && data.length) {
      const m = (data[0].numero || '').match(/(\d+)\s*$/);
      if (m) next = parseInt(m[1], 10) + 1;
    }
    if (conYear) return `${prefijo}-${year}-${String(next).padStart(prefijo==='PRT'?4:6,'0')}`;
    return `${prefijo}-${String(next).padStart(4,'0')}`;
  } catch(e) {
    // Fallback timestamp si no se puede consultar
    return `${prefijo}-${conYear?year+'-':''}${String(Date.now()).slice(-6)}`;
  }
}

async function _mostradorDescontarOrigen(refDoc) {
  // Para cada item, restar del stock origen + insertar movimiento
  for (const it of _mostrador.items) {
    const { data: stockOrigen } = await sb.from('stock').select('*')
      .eq('empresa_id', EMPRESA.id)
      .eq('articulo_id', it.articulo_id)
      .eq('almacen_id', _mostrador.almacenOrigenId)
      .maybeSingle();

    if (stockOrigen) {
      await sb.from('stock').update({
        cantidad: Math.max(0, (stockOrigen.cantidad||0) - it.cantidad),
        updated_at: new Date().toISOString()
      }).eq('id', stockOrigen.id);
    }
    // Movimiento (siempre, aunque no haya registro previo de stock)
    await sb.from('movimientos_stock').insert({
      empresa_id: EMPRESA.id,
      articulo_id: it.articulo_id,
      almacen_id: _mostrador.almacenOrigenId,
      tipo: refDoc.tipo,                      // 'traspaso_salida' | 'salida'
      delta: -Math.abs(it.cantidad),
      cantidad: Math.abs(it.cantidad),
      notas: refDoc.notas,
      fecha: new Date().toISOString().slice(0,10),
      usuario_id: CU?.id || null,
      usuario_nombre: CU?.nombre || 'Mostrador'
    });
  }
}

function _mostradorLineasParaTraspaso() {
  return _mostrador.items.map(it => ({
    articulo_id: it.articulo_id,
    codigo: it.codigo,
    nombre: it.nombre,
    cantidad: +it.cantidad
  }));
}

function _mostradorLineasParaAlbaran() {
  return _mostrador.items.map(it => ({
    articulo_id: it.articulo_id,
    codigo: it.codigo,
    desc: it.nombre,
    cant: +it.cantidad,
    precio: +it.precio_unit,
    dto: 0, dto2: 0, dto3: 0,
    iva: 21
  }));
}

function _mostradorLineasParaParte() {
  return _mostrador.items.map(it => ({
    articulo_id: it.articulo_id,
    codigo: it.codigo,
    nombre: it.nombre,
    cantidad: +it.cantidad,
    precio: +it.precio_unit,
    total: +it.cantidad * +it.precio_unit
  }));
}

// ── Cierre: Furgoneta operario / Almacén ──────────────────
async function _mostradorCerrarTraspaso() {
  const numero = await _mostradorSiguienteNumero('TR', true);
  const almOrigen = _mostradorAlmacenes.find(a => a.id === _mostrador.almacenOrigenId);
  const almDestino = _mostradorAlmacenes.find(a => a.id === _mostrador.destinoId);
  if (!almDestino) throw new Error('Almacén destino no encontrado');

  // 1) Insertar traspaso ya en estado "preparado" (lo confirma el destino)
  const { data: trasp, error } = await sb.from('traspasos').insert({
    empresa_id: EMPRESA.id,
    numero,
    almacen_origen_id:  _mostrador.almacenOrigenId,
    almacen_destino_id: _mostrador.destinoId,
    almacen_origen_nombre:  almOrigen?.nombre  || '',
    almacen_destino_nombre: almDestino?.nombre || '',
    fecha: new Date().toISOString().slice(0,10),
    estado: 'preparado',
    lineas: _mostradorLineasParaTraspaso(),
    observaciones: `Generado desde Mostrador por ${CU?.nombre||''}`,
    usuario_id: CU?.id || null,
    usuario_nombre: CU?.nombre || ''
  }).select().single();
  if (error) throw error;

  // 2) Descontar stock origen + movimientos
  await _mostradorDescontarOrigen({
    tipo: 'traspaso_salida',
    notas: `Mostrador → ${almDestino.nombre} (${numero})`
  });

  return { numero, doc: 'Traspaso', id: trasp?.id };
}

// ── Cierre: Cliente ───────────────────────────────────────
async function _mostradorCerrarAlbaran(firmaDataUrl) {
  const numero = await _mostradorSiguienteNumero('ALB', false);
  const almOrigen = _mostradorAlmacenes.find(a => a.id === _mostrador.almacenOrigenId);
  const cli = (clientes||[]).find(c => c.id === _mostrador.destinoId) || null;
  const lineas = _mostradorLineasParaAlbaran();
  const total = lineas.reduce((s,l) => s + l.cant * l.precio * (1 + (l.iva||0)/100), 0);

  // Firma → subir a Storage
  let firma_url = null;
  if (firmaDataUrl) {
    try {
      const blob = await (await fetch(firmaDataUrl)).blob();
      const path = `${EMPRESA.id}/firmas-mostrador/${numero}-${Date.now()}.png`;
      const { error: errUp } = await sb.storage.from('fotos-partes').upload(path, blob, { contentType:'image/png', upsert:false });
      if (!errUp) {
        const { data: pub } = sb.storage.from('fotos-partes').getPublicUrl(path);
        firma_url = pub?.publicUrl || null;
      }
    } catch(e) { console.warn('[Mostrador] No se pudo subir firma:', e); }
  }

  const obsLineas = [
    `Mostrador · almacén ${almOrigen?.nombre||''} · ${CU?.nombre||''}`,
    firma_url ? `Firma: ${firma_url}` : ''
  ].filter(Boolean).join('\n');

  const { data: alb, error } = await sb.from('albaranes').insert({
    empresa_id: EMPRESA.id,
    numero,
    cliente_id: cli?.id || null,
    cliente_nombre: cli?.nombre || cli?.razon_social || _mostrador.destinoLabel || 'Contado',
    fecha: new Date().toISOString().slice(0,10),
    estado: 'entregado',
    total: +total.toFixed(2),
    lineas,
    observaciones: obsLineas
  }).select().single();
  if (error) throw error;

  // Descontar stock origen
  await _mostradorDescontarOrigen({
    tipo: 'salida',
    notas: `Albarán venta ${numero} (${cli?.nombre || 'Contado'})`
  });

  return { numero, doc: 'Albarán', id: alb?.id };
}

// ── Cierre: Obra ──────────────────────────────────────────
// Material para una obra → traspaso almacén origen → furgoneta del operario
// responsable. La obra queda en observaciones para trazabilidad. El albarán
// al cliente lo generará el flujo de partes cuando se monte el material.
async function _mostradorCerrarObraTraspaso() {
  const numero = await _mostradorSiguienteNumero('TR', true);
  const almOrigen  = _mostradorAlmacenes.find(a => a.id === _mostrador.almacenOrigenId);
  const almDestino = _mostradorAlmacenes.find(a => a.id === _mostrador.obraFurgonetaId);
  if (!almDestino) throw new Error('Furgoneta destino no encontrada');
  const tr = (trabajos||[]).find(t => t.id === _mostrador.destinoId);
  if (!tr) throw new Error('Obra no encontrada');
  const cli = (clientes||[]).find(c => c.id === tr.cliente_id);
  const obraTitulo = tr.titulo || tr.descripcion || `Trabajo ${tr.id}`;

  const obs = [
    `Material para obra: ${obraTitulo}`,
    cli?.nombre ? `Cliente: ${cli.nombre}` : '',
    `obra_id=${tr.id}`,
    `Generado desde Mostrador por ${CU?.nombre||''} · responsable ${_mostrador.obraOperarioNombre || _mostrador.obraFurgonetaNombre || ''}`
  ].filter(Boolean).join('\n');

  const { data: trasp, error } = await sb.from('traspasos').insert({
    empresa_id: EMPRESA.id,
    numero,
    almacen_origen_id:  _mostrador.almacenOrigenId,
    almacen_destino_id: _mostrador.obraFurgonetaId,
    almacen_origen_nombre:  almOrigen?.nombre  || '',
    almacen_destino_nombre: almDestino?.nombre || '',
    fecha: new Date().toISOString().slice(0,10),
    estado: 'preparado',
    lineas: _mostradorLineasParaTraspaso(),
    observaciones: obs,
    usuario_id: CU?.id || null,
    usuario_nombre: CU?.nombre || ''
  }).select().single();
  if (error) throw error;

  // Descontar stock origen + movimientos
  await _mostradorDescontarOrigen({
    tipo: 'traspaso_salida',
    notas: `Mostrador → ${almDestino.nombre} (${numero}) · Obra: ${obraTitulo}`
  });

  return { numero, doc: 'Traspaso a furgoneta (obra)', id: trasp?.id };
}

// ── Firma táctil (modal) ──────────────────────────────────
let _mostradorSigCanvas = null, _mostradorSigCtx = null, _mostradorSigDraw = false, _mostradorSigVacio = true;
function _mostradorPedirFirma() {
  return new Promise(resolve => {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10002;display:flex;align-items:center;justify-content:center;padding:14px';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:14px;width:100%;max-width:520px">
        <div style="font-size:16px;font-weight:800;margin-bottom:8px">✍️ Firma del cliente</div>
        <div style="font-size:12px;color:var(--gris-400);margin-bottom:10px">Firma con el dedo dentro del recuadro. Si el cliente no firma, pulsa "Sin firma".</div>
        <canvas id="sigCanvas" width="500" height="180" style="width:100%;height:180px;border:2px dashed var(--gris-300);border-radius:10px;background:#fff;touch-action:none"></canvas>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button id="sigClear" style="flex:1;padding:10px;border:1.5px solid var(--gris-200);background:#fff;border-radius:10px;font-weight:700;cursor:pointer">Limpiar</button>
          <button id="sigSkip"  style="flex:1;padding:10px;border:1.5px solid var(--gris-200);background:#fff;border-radius:10px;font-weight:700;cursor:pointer">Sin firma</button>
          <button id="sigOK"    style="flex:2;padding:10px;border:none;background:var(--verde);color:#fff;border-radius:10px;font-weight:800;cursor:pointer">Firmar y emitir</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    _mostradorSigCanvas = modal.querySelector('#sigCanvas');
    _mostradorSigCtx = _mostradorSigCanvas.getContext('2d');
    _mostradorSigCtx.fillStyle = '#fff';
    _mostradorSigCtx.fillRect(0,0,_mostradorSigCanvas.width,_mostradorSigCanvas.height);
    _mostradorSigCtx.lineWidth = 2.5;
    _mostradorSigCtx.lineCap = 'round';
    _mostradorSigCtx.strokeStyle = '#111';
    _mostradorSigVacio = true;

    const pos = (e) => {
      const r = _mostradorSigCanvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: (t.clientX - r.left) * (_mostradorSigCanvas.width/r.width), y: (t.clientY - r.top) * (_mostradorSigCanvas.height/r.height) };
    };
    const start = (e) => { e.preventDefault(); _mostradorSigDraw = true; const p=pos(e); _mostradorSigCtx.beginPath(); _mostradorSigCtx.moveTo(p.x,p.y); };
    const move  = (e) => { if(!_mostradorSigDraw) return; e.preventDefault(); const p=pos(e); _mostradorSigCtx.lineTo(p.x,p.y); _mostradorSigCtx.stroke(); _mostradorSigVacio=false; };
    const end   = ()  => { _mostradorSigDraw = false; };
    _mostradorSigCanvas.addEventListener('mousedown', start);
    _mostradorSigCanvas.addEventListener('mousemove', move);
    _mostradorSigCanvas.addEventListener('mouseup',   end);
    _mostradorSigCanvas.addEventListener('touchstart', start, {passive:false});
    _mostradorSigCanvas.addEventListener('touchmove',  move,  {passive:false});
    _mostradorSigCanvas.addEventListener('touchend',   end);

    modal.querySelector('#sigClear').onclick = () => {
      _mostradorSigCtx.fillStyle = '#fff';
      _mostradorSigCtx.fillRect(0,0,_mostradorSigCanvas.width,_mostradorSigCanvas.height);
      _mostradorSigVacio = true;
    };
    modal.querySelector('#sigSkip').onclick = () => { modal.remove(); resolve({ skipped:true, dataUrl:null }); };
    modal.querySelector('#sigOK').onclick   = () => {
      const dataUrl = _mostradorSigVacio ? null : _mostradorSigCanvas.toDataURL('image/png');
      modal.remove();
      resolve({ skipped:false, dataUrl });
    };
  });
}

// ── Dispatcher principal ─────────────────────────────────
async function _mostradorFinalizar() {
  if (!_mostrador.items.length) return;
  if (!_mostrador.destinoTipo) { alert('Selecciona un destino primero'); return; }
  if (!_mostrador.almacenOrigenId) { alert('Selecciona el almacén origen'); return; }

  const tipo = _mostrador.destinoTipo;
  const necesitaDestinoId = (tipo !== 'cliente'); // cliente puede ser Contado (null)
  if (necesitaDestinoId && !_mostrador.destinoId) {
    alert('Selecciona el destino concreto (' + tipo + ')');
    return;
  }
  if (tipo === 'furgoneta' || tipo === 'almacen') {
    if (_mostrador.destinoId === _mostrador.almacenOrigenId) { alert('Origen y destino no pueden ser el mismo'); return; }
  }
  if (tipo === 'obra') {
    if (!_mostrador.obraFurgonetaId) { alert('Falta asignar la furgoneta/operario que se lleva el material'); return; }
    if (_mostrador.obraFurgonetaId === _mostrador.almacenOrigenId) { alert('La furgoneta no puede ser el mismo almacén origen'); return; }
  }

  // Confirmación
  const totalEur = _mostrador.items.reduce((s,i) => s + (+i.cantidad||0) * (+i.precio_unit||0), 0);
  const totalUds = _mostrador.items.reduce((s,i) => s + (+i.cantidad||0), 0);
  const lblDoc = tipo==='cliente' ? 'Albarán de venta' : tipo==='obra' ? 'Traspaso a furgoneta (Obra)' : 'Traspaso';
  if (!confirm(`Vas a generar ${lblDoc}\n\nDestino: ${_mostrador.destinoLabel || '(sin etiqueta)'}\nLíneas: ${_mostrador.items.length}  ·  ${totalUds} uds  ·  ${totalEur.toFixed(2)} €\n\n¿Confirmar?`)) return;

  // Firma para cliente (opcional)
  let firmaDataUrl = null;
  if (tipo === 'cliente') {
    const r = await _mostradorPedirFirma();
    firmaDataUrl = r.dataUrl;
  }

  // Bloquear UI
  const footerBtn = document.querySelector('#mostradorFooter button');
  if (footerBtn) { footerBtn.disabled = true; footerBtn.textContent = 'Procesando...'; }

  try {
    let res;
    if (navigator.onLine) {
      // Online: ejecutar directamente
      if (tipo === 'furgoneta' || tipo === 'almacen') res = await _mostradorCerrarTraspaso();
      else if (tipo === 'cliente')                    res = await _mostradorCerrarAlbaran(firmaDataUrl);
      else if (tipo === 'obra')                       res = await _mostradorCerrarObraTraspaso();

      alert(`✅ ${res.doc} ${res.numero} generado correctamente.\nStock descontado del almacén origen.`);
    } else {
      // Offline: encolar como borrador
      const payload = {
        tipo: tipo,
        items: JSON.parse(JSON.stringify(_mostrador.items)),
        almacenOrigenId: _mostrador.almacenOrigenId,
        destinoId: _mostrador.destinoId,
        destinoLabel: _mostrador.destinoLabel,
        obraFurgonetaId: _mostrador.obraFurgonetaId || null,
        obraFurgonetaNombre: _mostrador.obraFurgonetaNombre || null,
        obraOperarioNombre: _mostrador.obraOperarioNombre || null,
        firmaDataUrl: firmaDataUrl,
        usuario: { id: CU?.id, nombre: CU?.nombre },
        empresa_id: EMPRESA.id,
        fecha: new Date().toISOString().slice(0,10)
      };
      await syncQueueAdd({ table: '_mostrador', action: 'mostrador_finalizar', data: payload, timestamp: Date.now() });
      alert(`📋 Borrador guardado offline.\n${_mostrador.items.length} líneas · ${totalUds} uds.\nSe procesará automáticamente al recuperar conexión.`);
      res = { doc: 'Borrador', numero: 'OFFLINE-' + Date.now().toString(36).toUpperCase() };
    }
    // Sonido post-alert (iOS suspende AudioContext tras modales nativos)
    setTimeout(() => {
      if (_mostradorAudioCtx && _mostradorAudioCtx.state === 'suspended') {
        _mostradorAudioCtx.resume().then(() => _mostradorBeep('done'));
      } else {
        _mostradorBeep && _mostradorBeep('done');
      }
    }, 150);
    // Reset estado
    _mostrador.items = [];
    _mostrador.destinoTipo = null;
    _mostrador.destinoId = null;
    _mostrador.destinoLabel = '';
    renderAlmacenMostrador(document.getElementById('appBody'));
  } catch(e) {
    console.error('[Mostrador] Error finalizar:', e);
    let msg;
    if (e && typeof e === 'object') {
      msg = e.message || e.details || e.hint || '';
      if (!msg) {
        try { msg = JSON.stringify(e); } catch { msg = String(e); }
      }
    } else {
      msg = String(e);
    }
    if (!navigator.onLine) {
      msg = '⚠️ Estás SIN CONEXIÓN — los datos no se pueden enviar a Supabase.\n\nDetalle: ' + (msg || 'sin detalle');
    }
    alert('❌ Error al generar el documento:\n\n' + msg);
    if (footerBtn) { footerBtn.disabled = false; footerBtn.textContent = 'Finalizar →'; }
  }
}

// Cierra la sesión actual con sonido de felicidad. Se usa cuando el almacenero
// termina de procesar una devolución y quiere despejar para la siguiente.
function _devsFinalizarSesion() {
  if (_devs.items.length === 0) return;
  const total = _devs.resumen.ok + _devs.resumen.inc;
  if (!confirm(`¿Finalizar sesión?\n\n${_devs.resumen.ok} OK · ${_devs.resumen.inc} incidencia(s) · ${_devs.resumen.uds} uds\n\nSe limpiará la pantalla para la siguiente devolución.`)) return;
  // Limpieza inmediata
  _devs.furgonetaId = null;
  _devs.furgonetaNombre = '';
  _devs.operarioId = null;
  _devs.operarioNombre = '';
  _devs.resumen = { ok:0, inc:0, uds:0 };
  _devs.items = [];
  renderAlmacenDevoluciones(document.getElementById('appBody'));
  toast(`✅ Sesión cerrada · ${total} artículo(s) procesado(s)`, 'success');
  // Sonido con delay — iOS suspende AudioContext tras confirm() nativo;
  // esperar un frame para que el contexto se reactive con la vuelta al DOM.
  setTimeout(() => {
    if (_mostradorAudioCtx && _mostradorAudioCtx.state === 'suspended') {
      _mostradorAudioCtx.resume().then(() => _mostradorBeep('done'));
    } else {
      _mostradorBeep && _mostradorBeep('done');
    }
    if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 100]);
  }, 150);
}

function _devsReset() {
  if ((_devs.resumen.ok + _devs.resumen.inc) > 0 && !confirm('¿Reiniciar la sesión de devoluciones?')) return;
  _devs.furgonetaId = null;
  _devs.furgonetaNombre = '';
  _devs.operarioId = null;
  _devs.operarioNombre = '';
  _devs.resumen = { ok:0, inc:0, uds:0 };

function _devsCambiarOperario() {
  if ((_devs.resumen.ok + _devs.resumen.inc) > 0 && !confirm('Vas a cambiar de operario. El resumen actual se reiniciará.\n¿Continuar?')) return;
  _devs.furgonetaId = null;
  _devs.furgonetaNombre = '';

function _devsPickOperario(info) {

// Escáner (reusa html5-qrcode igual que mostrador)
let _devsScanBusy = false; // anti-rebote para evitar doble lectura

async function _devsAbrirEscaner() {
  // Asegurar que la cámara anterior esté muerta antes de abrir otra
  await _devsCerrarEscaner();
  // Pequeña pausa para que iOS libere el stream de cámara
  await new Promise(r => setTimeout(r, 150));

  _devsScanBusy = false;
  const modal = document.createElement('div');
  modal.dataset.modal = 'devs-scan';
  modal.style.cssText = 'position:fixed;inset:0;background:#000;z-index:10003;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)';
  modal.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px;color:#fff">
      <div style="font-weight:800">📷 Escanear devolución</div>
      <button onclick="_devsCerrarEscaner()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:8px 12px;font-size:14px;cursor:pointer">Cancelar</button>
    </div>
    <div id="devsScanVisor" style="flex:1;min-height:320px;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px">Iniciando cámara...</div>
    <div style="padding:12px;background:#000;color:#fff;text-align:center;font-size:12px;opacity:.8">Apunta al código de barras o QR del artículo</div>
  `;
  document.body.appendChild(modal);
  setTimeout(_devsScanStart, 100);
}

async function _devsScanStart() {
  if (typeof Html5Qrcode === 'undefined') {
    alert('Librería del escáner no cargada. Inténtalo de nuevo.');
    _devsCerrarEscaner();
    return;
  }
  try {
    _devsHtml5Qr = new Html5Qrcode('devsScanVisor', { verbose: false });
    const config = {
      fps: 15,
      qrbox: (vw, vh) => {
        if (!vw || !vh || vw < 100 || vh < 100) return { width: 260, height: 160 };
        const min = Math.min(vw, vh);
        return {
          width:  Math.max(200, Math.round(min * 0.85)),  // ancho generoso para barras
          height: Math.max(120, Math.round(min * 0.45))
        };
      },
      aspectRatio: 1.0,
      formatsToSupport: [0, 1, 2, 3, 7]  // QR_CODE=0, EAN_13=1, EAN_8=2, CODE_128=3, CODE_39=7
    };
    await _devsHtml5Qr.start({ facingMode: 'environment' }, config, _devsOnScan, () => {});
  } catch(e) {
    console.error('[Devs] Error escáner:', e);
    alert('No se pudo abrir la cámara: ' + (e.message||e));
    _devsCerrarEscaner();
  }
}

async function _devsCerrarEscaner() {
  try {
    if (_devsHtml5Qr) {
      const state = _devsHtml5Qr.getState ? _devsHtml5Qr.getState() : null;
      // Solo parar si está escaneando (state 2) o pausado (state 3)
      if (state === 2 || state === 3 || state === null) {
        await _devsHtml5Qr.stop();
      }
      _devsHtml5Qr.clear();
    }
  } catch(e) {
    console.warn('[Devs] Warn al cerrar escáner:', e);
  }
  _devsHtml5Qr = null;
  // Forzar cierre de streams de cámara huérfanos (iPhone bug)
  document.querySelectorAll('[data-modal="devs-scan"] video').forEach(v => {
    try {
      const tracks = v.srcObject?.getTracks?.();
      if (tracks) tracks.forEach(t => t.stop());
      v.srcObject = null;
    } catch{}
  });
  document.querySelectorAll('[data-modal="devs-scan"]').forEach(m => m.remove());
}

async function _devsOnScan(decodedText) {
  if (!decodedText || _devsScanBusy) return;
  _devsScanBusy = true; // anti-rebote: una sola lectura por apertura
  await _devsCerrarEscaner();
  _mostradorBeep && _mostradorBeep('ok');
  // Buscar artículo igual que mostrador (permisivo)
  const art = _mostradorBuscarArticuloPorCodigo
    ? _mostradorBuscarArticuloPorCodigo(decodedText)
    : (articulos||[]).find(a => (a.codigo||'').trim()===decodedText.trim() || (a.ean||'').trim()===decodedText.trim());
  if (!art) {
    _mostradorBeep && _mostradorBeep('err');
    if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
    _scanCodigoNoEncontrado(decodedText, 'devs');
    return;
  }
  _devsAbrirFicha({ id: art.id, codigo: art.codigo||'', nombre: art.nombre||'' });
}

function _devsFichaQty(delta) {
  const i = document.getElementById('devsQty'); if (!i) return;
  const v = (parseFloat(i.value)||1) + delta;
  i.value = Math.max(0.01, +v.toFixed(2));
}

function _devsCerrarFicha() {
  document.querySelectorAll('[data-modal="devs-ficha"]').forEach(m => m.remove());
}

// ── Acción: OK al stock ──────────────────────────────────
async function _devsConfirmarOk(art, seguirEscaneando) {
  const cant = parseFloat(document.getElementById('devsQty')?.value || '1');
  if (!cant || cant <= 0) { alert('Cantidad inválida'); return; }
  try {
    if (navigator.onLine) {
      const almDestino = _mostradorAlmacenes.find(a => a.id === _devs.almacenDestinoId);
      // 1) Restar de la furgoneta
      const { data: stockFurgo } = await sb.from('stock').select('*')
        .eq('empresa_id', EMPRESA.id).eq('articulo_id', art.id).eq('almacen_id', _devs.furgonetaId).maybeSingle();
      if (stockFurgo) {
        await sb.from('stock').update({
          cantidad: Math.max(0, (stockFurgo.cantidad||0) - cant),
          updated_at: new Date().toISOString()
        }).eq('id', stockFurgo.id);
      }
      await sb.from('movimientos_stock').insert({
        empresa_id: EMPRESA.id,
        articulo_id: art.id,
        almacen_id: _devs.furgonetaId,
        tipo: 'devolucion_furgoneta_salida',
        delta: -Math.abs(cant),
        cantidad: Math.abs(cant),
        notas: `Devolución de ${_devs.operarioNombre||'operario'} → ${almDestino?.nombre||''}`,
        fecha: new Date().toISOString().slice(0,10),
        usuario_id: CU?.id || null,
        usuario_nombre: CU?.nombre || 'Almacén'
      });
      // 2) Sumar al almacén destino
      const { data: stockAlm } = await sb.from('stock').select('*')
        .eq('empresa_id', EMPRESA.id).eq('articulo_id', art.id).eq('almacen_id', _devs.almacenDestinoId).maybeSingle();
      if (stockAlm) {
        await sb.from('stock').update({
          cantidad: (stockAlm.cantidad||0) + cant,
          updated_at: new Date().toISOString()
        }).eq('id', stockAlm.id);
      } else {
        await sb.from('stock').insert({
          empresa_id: EMPRESA.id,
          articulo_id: art.id,
          almacen_id: _devs.almacenDestinoId,
          cantidad: cant
        });
      }
      await sb.from('movimientos_stock').insert({
        empresa_id: EMPRESA.id,
        articulo_id: art.id,
        almacen_id: _devs.almacenDestinoId,
        tipo: 'devolucion_furgoneta_entrada',
        delta: Math.abs(cant),
        cantidad: Math.abs(cant),
        notas: `Devolución de ${_devs.operarioNombre||'operario'} (${_devs.furgonetaNombre})`,
        fecha: new Date().toISOString().slice(0,10),
        usuario_id: CU?.id || null,
        usuario_nombre: CU?.nombre || 'Almacén'
      });
    } else {
      // Offline: encolar
      await syncQueueAdd({ table: '_devs', action: 'devs_ok', data: {
        art: { id: art.id, codigo: art.codigo, nombre: art.nombre },
        cant, almacenDestinoId: _devs.almacenDestinoId, furgonetaId: _devs.furgonetaId,
        furgonetaNombre: _devs.furgonetaNombre, operarioNombre: _devs.operarioNombre,
        empresa_id: EMPRESA.id, usuario: { id: CU?.id, nombre: CU?.nombre },
        fecha: new Date().toISOString().slice(0,10)
      }, timestamp: Date.now() });
      toast('✅ OK guardado offline — se subirá con conexión', 'info');
    }
    _devs.resumen.ok++;
    _devs.resumen.uds += cant;
    _devs.items.unshift({ tipo:'ok', codigo:art.codigo||'', nombre:art.nombre||'', cantidad:cant, ts:Date.now() });
    if (navigator.vibrate) navigator.vibrate(40);
    _devsCerrarFicha();
    renderAlmacenDevoluciones(document.getElementById('appBody'));
    if (seguirEscaneando) setTimeout(() => _devsAbrirEscaner(), 400);
  } catch(e) {
    console.error('[Devs] OK error:', e);
    alert('❌ Error al procesar OK:\n\n' + (e.message || JSON.stringify(e)));
  }
}

  try {
    const incData = {
      empresa_id: EMPRESA.id,

      articulo_nombre: `[DEVOLUCIÓN DEFECTUOSA] ${art.nombre||''}`,

      almacen_id: _devs.furgonetaId,
      almacen_nombre: _devs.furgonetaNombre,
