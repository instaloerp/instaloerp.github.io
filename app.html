      <button onclick="_medGuardarItemBano(true)" class="tap" style="flex:1;padding:11px;background:#10B981;color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13px">✓ Validar</button>`;
  }

  const ov = document.createElement('div');
  ov.id = '_medModalItem';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
  ov.innerHTML = `
    <div style="background:#fff;width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:92vh;display:flex;flex-direction:column">
      <div style="padding:14px 16px;border-bottom:1px solid var(--gris-100);display:flex;align-items:center;justify-content:space-between;${validado?'background:#ECFDF5':''}">
        <div style="font-weight:700;font-size:15px">${tituloModal}</div>
        <button onclick="document.getElementById('_medModalItem').remove()" class="tap" style="background:none;border:none;font-size:22px;color:var(--gris-400);cursor:pointer;padding:0">✕</button>
      </div>
      <div style="padding:14px 16px;overflow-y:auto;flex:1;${validado?'background:#FAFEFA':''}" id="medBanoBody">
        ${_medRenderBanoForm(it)}

    </div>`;
  document.body.appendChild(ov);
  // Calcular m² al abrir (cuando ya hay valores en los inputs)
  setTimeout(() => {
    if (typeof _medBanoRecalcular === 'function') _medBanoRecalcular();
    // Si el item está validado: deshabilitar inputs/selects/textareas pero permitir scroll
    if (validado) {

          el.style.cursor = 'default';

        body.querySelectorAll('input, select, textarea').forEach(el => { el.style.opacity = '.75'; });
      }
    }
  }, 30);
}

// Crear copia editable de un baño validado (archiva el original)
async function _medCrearCopiaBano(idx) {
  if (!_medActual) return;
  const items = [...(_medActual.items || [])];
  const original = items[idx];
  if (!original) return;
  // Asignar grupo de versiones si no existe
  const grupo = original.version_grupo || ('g' + Date.now() + Math.random().toString(36).slice(2,5));
  if (!original.version_grupo) original.version_grupo = grupo;
  // Calcular siguiente versión dentro del grupo
  const versiones = items.filter(x => x.version_grupo === grupo).map(x => x.version || 1);
  const nuevaVer = Math.max(...versiones, 1) + 1;
  // Archivar la versión actual y crear la nueva
  original.archivado = true;
  const copia = JSON.parse(JSON.stringify(original));
  copia.validado = false;
  copia.archivado = false;   // la nueva es la activa
  copia.version = nuevaVer;
  copia.version_grupo = grupo;
  items.push(copia);
  _medActual.items = items;
  await _medGuardar(_medActual.id, { items });
  document.getElementById('_medModalItem')?.remove();
  renderMedicionDetalle(document.getElementById('appBody'));
  setTimeout(() => _medEditItem(items.length - 1), 100);
}

// Archivar manualmente un item (lo oculta de la lista activa)
async function _medArchivarItem(idx) {
  if (!_medActual) return;
  if (!confirm('¿Archivar este baño? Quedará oculto de la lista pero podrás recuperarlo desde "Versiones anteriores".')) return;
  const items = [...(_medActual.items || [])];
  if (!items[idx]) return;
  // Si no tiene grupo, asignarle uno (para poder verlo después en historial)
  if (!items[idx].version_grupo) {
    items[idx].version_grupo = 'g' + Date.now() + Math.random().toString(36).slice(2,5);
  }
  items[idx].archivado = true;
  _medActual.items = items;
  await _medGuardar(_medActual.id, { items });
  document.getElementById('_medModalItem')?.remove();
  renderMedicionDetalle(document.getElementById('appBody'));
  toast('Baño archivado', 'ok');
}

// Restaurar una versión archivada (la convierte en activa, archiva la actual)
async function _medRestaurarVersion(idx) {
  if (!_medActual) return;
  if (!confirm('¿Restaurar esta versión? La versión actual quedará archivada.')) return;
  const items = [...(_medActual.items || [])];
  const versionRestaurar = items[idx];
  if (!versionRestaurar) return;
  const grupo = versionRestaurar.version_grupo;
  // Archivar la versión activa actual del mismo grupo
  items.forEach(it => {
    if (it.version_grupo === grupo && !it.archivado) it.archivado = true;
  });
  versionRestaurar.archivado = false;
  _medActual.items = items;
  await _medGuardar(_medActual.id, { items });
  document.getElementById('_medHistorialModal')?.remove();
  renderMedicionDetalle(document.getElementById('appBody'));
  toast('Versión restaurada', 'ok');
}

// Ver versiones archivadas de un grupo
function _medVerHistorial(grupo) {
  if (!_medActual) return;
  const items = _medActual.items || [];
  const archivadas = items.map((it, i) => ({...it, _idx: i})).filter(it => it.version_grupo === grupo && it.archivado);
  if (!archivadas.length) { toast('No hay versiones anteriores', 'info'); return; }
  archivadas.sort((a,b) => (b.version||1) - (a.version||1));
  const html = archivadas.map(it => {
    const desc = (window.MED_PLANTILLAS?.bano?.descripcionItem)?.(it) || it.ubicacion || '';
    return `<div style="padding:11px 12px;border:1px solid var(--gris-200);border-radius:9px;margin-bottom:6px;background:#FAFBFC">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="background:#F3F4F6;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;color:var(--gris-700)">v${it.version||1}</span>
        ${it.validado ? '<span style="background:#D1FAE5;color:#065F46;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700">🔒 validado</span>' : ''}
        <span style="flex:1;font-size:12.5px;color:var(--gris-700)">${_medEsc(desc)}</span>
      </div>
      <div style="display:flex;gap:5px">
        <button onclick="_medEditItem(${it._idx});document.getElementById('_medHistorialModal').remove()" class="tap" style="flex:1;padding:8px;background:#fff;border:1.5px solid var(--gris-300);color:var(--gris-700);border-radius:7px;font-size:11.5px;font-weight:600">👁 Ver</button>
        <button onclick="_medRestaurarVersion(${it._idx})" class="tap" style="flex:1;padding:8px;background:#3B82F6;color:#fff;border:none;border-radius:7px;font-size:11.5px;font-weight:700">↺ Restaurar</button>
      </div>
    </div>`;
  }).join('');
  const ov = document.createElement('div');
  ov.id = '_medHistorialModal';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;display:flex;align-items:flex-end;justify-content:center';
  ov.innerHTML = `
    <div style="background:#fff;width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:80vh;display:flex;flex-direction:column">
      <div style="padding:14px 16px;border-bottom:1px solid var(--gris-100);display:flex;align-items:center;justify-content:space-between">
        <div style="font-weight:700;font-size:14px">📜 Versiones anteriores (${archivadas.length})</div>
        <button onclick="document.getElementById('_medHistorialModal').remove()" class="tap" style="background:none;border:none;font-size:22px;color:var(--gris-400);cursor:pointer">✕</button>
      </div>
      <div style="padding:12px 14px;overflow-y:auto;flex:1">${html}</div>
    </div>`;
  document.body.appendChild(ov);
}

function _medBanoBloque(key, titulo, bodyHtml, opts = {}) {
  const st = window._medBanoState;
  const tieneToggle = opts.toggle != null;
  const toggleOn = tieneToggle ? !!opts.toggle : true;
  // Si tiene toggle y está OFF, el body se oculta y no hay flecha (no se puede plegar)
  const abierto = toggleOn && st.bloques_abiertos[key];
  const arrow = toggleOn ? (abierto ? '▾' : '▸') : '';
  const headerBg = tieneToggle ? '#FFFBEB' : '#F3F4F6';
  const headOnclick = toggleOn ? `_medBanoToggleBloque('${key}')` : '';
  const cursor = toggleOn ? 'cursor:pointer' : 'cursor:default';
  return `<div style="border:1px solid var(--gris-200);border-radius:10px;margin-bottom:8px;overflow:hidden">
    <div onclick="${headOnclick}" class="tap" style="padding:11px 14px;background:${headerBg};display:flex;align-items:center;gap:8px;${cursor}">
      ${tieneToggle ? `<input type="checkbox" id="mb_toggle_${key}" ${opts.toggle ? 'checked' : ''} onclick="event.stopPropagation();_medBanoToggleActivo('${opts.toggleKey}','${key}')" style="width:17px;height:17px">` : ''}
      <div style="font-weight:700;font-size:13px;flex:1;color:#1F2937">${titulo}</div>
      <span style="color:#6B7280;font-size:13px">${arrow}</span>
    </div>
    <div id="mb_body_${key}" style="${abierto?'':'display:none;'}padding:12px 14px;background:#fff">${bodyHtml}</div>
  </div>`;
}

// Helper: selección única en grupo de botones (data-singleselect)
function _medBanoSelOpt(btn, callback) {
  const grupo = btn.closest('[data-singleselect="1"]');
  if (!grupo) return;
  const valor = btn.dataset.v;
  grupo.dataset.value = valor;
  // Repintar todos los botones del grupo
  grupo.querySelectorAll('button[data-v]').forEach(b => {
    const a = b.dataset.v === valor;
    if (b.textContent.includes('RAL')) {
      // Es un botón de paleta de color: solo cambia el borde
      b.style.borderWidth = a ? '2.5px' : '1.5px';
      b.style.borderColor = a ? '#3B82F6' : '#E5E7EB';
      b.style.fontWeight = a ? '700' : '600';
    } else {
      b.style.borderWidth = a ? '2px' : '1.5px';
      b.style.borderColor = a ? '#3B82F6' : '#E5E7EB';
      b.style.background  = a ? '#EFF6FF' : '#fff';
      b.style.color       = a ? '#1E40AF' : 'var(--gris-700)';
      b.style.fontWeight  = a ? '700' : '500';
    }
  });
  if (callback && typeof window[callback] === 'function') window[callback](valor);
}

// Toggle sub-bloques de Instalaciones
function _medBanoToggleSubInst(key, val) {
  const map = { elec: 'inst_elec_activo', font: 'inst_font_activo', des: 'inst_des_activo' };
  const stKey = map[key];
  if (!stKey) return;
  window._medBanoState[stKey] = val;
  const body = document.getElementById('mbInst' + (key==='elec'?'Elec':key==='font'?'Font':'Des') + 'Body');
  if (body) body.style.display = val ? '' : 'none';
}

// Toggle Esquineros
function _medBanoToggleEsq(val) {
  window._medBanoState.esquineros_activo = val;
  const body = document.getElementById('mbEsqBody');
  if (body) body.style.display = val ? '' : 'none';
}

function _medBanoToggleBloque(key) {
  const st = window._medBanoState;
  st.bloques_abiertos[key] = !st.bloques_abiertos[key];
  const body = document.getElementById('mb_body_' + key);
  if (body) body.style.display = st.bloques_abiertos[key] ? '' : 'none';
  // Actualizar flecha
  const head = body?.previousElementSibling;
  if (head) {
    const arrow = head.querySelector('span:last-child');
    if (arrow) arrow.textContent = st.bloques_abiertos[key] ? '▾' : '▸';
  }
}

function _medBanoToggleActivo(toggleKey, blkKey) {
  const st = window._medBanoState;
  st[toggleKey] = !st[toggleKey];
  // Mostrar/ocultar el body del bloque + flecha + permitir o no plegar
  const body = document.getElementById('mb_body_' + blkKey);
  const head = body?.previousElementSibling;
  if (st[toggleKey]) {
    st.bloques_abiertos[blkKey] = true;
    if (body) body.style.display = '';
    if (head) {
      head.style.cursor = 'pointer';
      head.setAttribute('onclick', `_medBanoToggleBloque('${blkKey}')`);
      const arrow = head.querySelector('span:last-child');
      if (arrow) arrow.textContent = '▾';
    }
  } else {
    if (body) body.style.display = 'none';
    if (head) {
      head.style.cursor = 'default';
      head.removeAttribute('onclick');
      const arrow = head.querySelector('span:last-child');
      if (arrow) arrow.textContent = '';
    }
  }
}

// Calcula m² suelo y m² paredes (alicatado) al teclear medidas — en cm
function _medBanoRecalcular() {
  const a = parseFloat(document.getElementById('mbAncho')?.value) || 0;
  const l = parseFloat(document.getElementById('mbLargo')?.value) || 0;
  const h = parseFloat(document.getElementById('mbAlto')?.value) || 0;
  const suelo  = (a/100) * (l/100);
  const paredes = h ? ((2*(a+l)/100) * (h/100)) : 0;
  const out1 = document.getElementById('mbCalcSuelo');
  const out2 = document.getElementById('mbCalcParedes');
  if (out1) out1.textContent = suelo  ? suelo.toFixed(2)  + ' m²' : '— m²';
  if (out2) out2.textContent = paredes ? paredes.toFixed(2) + ' m²' : '— m²';
}
document.addEventListener('input', e => {
  if (!window._medBanoState) return;
  if (['mbAncho','mbLargo','mbAlto'].includes(e.target.id)) _medBanoRecalcular();
  if (e.target.id === 'mbMamAlto') {
    const txt = document.getElementById('mbMamAltoTxt');
    if (!txt) return;
    const v = parseFloat(e.target.value) || 0;
    txt.textContent = v ? '⚠ A medida' : '✓ Altura estándar';
    txt.style.color = v ? '#92400E' : '#065F46';
  }
});

// Función PURA reutilizable: calcula paneles SPC por acabado.
// Devuelve { porColor: { 'Acabado X': {ancho_total, paneles, sobrantes:[]} }, total: N }
function _medBanoCalcPanelesSpc(paredes, modo) {
  const PANEL_CM = 117.5;
  modo = modo || 'aprovechar';
  const porColor = {};
  paredes.forEach(p => {
    const a = parseFloat(p.ancho) || 0;
    if (!a) return;
    const c = (p.color || 'Sin acabado').trim() || 'Sin acabado';
    if (!porColor[c]) porColor[c] = { paños: [], ancho_total: 0 };
    porColor[c].paños.push(a);
    porColor[c].ancho_total += a;
  });
  let total = 0;
  const calcCoste = (aEff) => {
    if (aEff <= 0.01) return { paneles: 0, nuevoSob: 0 };
    const enteros = Math.floor(aEff / PANEL_CM);
    const resto = +(aEff - enteros * PANEL_CM).toFixed(2);
    if (resto < 0.01) return { paneles: enteros, nuevoSob: 0 };
    return { paneles: enteros + 1, nuevoSob: +(PANEL_CM - resto).toFixed(2) };
  };
  for (const color in porColor) {
    const paños = porColor[color].paños; // orden de entrada
    let paneles = 0;
    const sobrantes = [];
    paños.forEach(ancho => {
      if (modo === 'esteticas') {
        let bestIdx = -1, bestSize = Infinity;
        for (let i = 0; i < sobrantes.length; i++) {
          if (sobrantes[i] >= ancho && sobrantes[i] < bestSize) { bestIdx = i; bestSize = sobrantes[i]; }
        }
        if (bestIdx >= 0) { sobrantes.splice(bestIdx, 1); return; }
        const c = calcCoste(ancho);
        paneles += c.paneles;
        if (c.nuevoSob > 0.01) sobrantes.push(c.nuevoSob);
      } else {
        const opciones = [{ ...calcCoste(ancho), idx: -1 }];
        for (let i = 0; i < sobrantes.length; i++) {
          opciones.push({ ...calcCoste(+(ancho - sobrantes[i]).toFixed(2)), idx: i });
        }
        opciones.sort((a,b) => a.paneles - b.paneles || b.nuevoSob - a.nuevoSob);
        const m = opciones[0];
        paneles += m.paneles;
        if (m.idx >= 0) sobrantes.splice(m.idx, 1);
        if (m.nuevoSob > 0.01) sobrantes.push(m.nuevoSob);
      }
    });
    porColor[color].paneles = paneles;
    porColor[color].sobrantes = sobrantes;
    total += paneles;
  }
  return { porColor, total, estrategia: modo };
}

// Cálculo de paneles SPC con dos estrategias:
//   'aprovechar': minimiza paneles usando sobrantes al inicio del paño (más uniones)
//   'esteticas':  minimiza uniones — sobrantes solo cubren paño completo, sin combinarlos
function _medBanoCalcSpc() {
  const PANEL_CM = 117.5;
  const st = window._medBanoState;
  const modo = (st && st.spc_estrategia) || 'aprovechar';
  const paredes = st?.paredes_spc || [];
  const porColor = {};
  paredes.forEach(p => {
    const a = parseFloat(p.ancho) || 0;
    if (!a) return;
    const c = (p.color || 'Sin acabado').trim() || 'Sin acabado';
    if (!porColor[c]) porColor[c] = [];
    porColor[c].push(a);
  });

  let totalPaneles = 0;
  let detalle = '';
  for (const color in porColor) {
    // Respetar el orden de instalación (machihembrado): NO reordenamos
    const paños = porColor[color].slice();
    const totalAncho = paños.reduce((s,x) => s+x, 0);
    let paneles = 0;
    const sobrantes = [];

    const calcCoste = (aEff) => {
      if (aEff <= 0.01) return { paneles: 0, nuevoSob: 0 };
      const enteros = Math.floor(aEff / PANEL_CM);
      const resto = +(aEff - enteros * PANEL_CM).toFixed(2);
      if (resto < 0.01) return { paneles: enteros, nuevoSob: 0 };
      return { paneles: enteros + 1, nuevoSob: +(PANEL_CM - resto).toFixed(2) };
    };

    paños.forEach(ancho => {
      if (modo === 'esteticas') {
        // Solo permitir sobrante que cubra COMPLETO el paño (best-fit)
        let bestIdx = -1, bestSize = Infinity;
        for (let i = 0; i < sobrantes.length; i++) {
          if (sobrantes[i] >= ancho && sobrantes[i] < bestSize) {
            bestIdx = i; bestSize = sobrantes[i];
          }
        }
        if (bestIdx >= 0) {
          sobrantes.splice(bestIdx, 1);
          return;
        }
        // Si no, paneles enteros + recorte final (solo 1 unión visible máximo)
        const c = calcCoste(ancho);
        paneles += c.paneles;
        if (c.nuevoSob > 0.01) sobrantes.push(c.nuevoSob);
      } else {
        // Modo aprovechamiento: sobrante al inicio + paneles enteros + recorte final
        const opciones = [];
        const c0 = calcCoste(ancho);
        opciones.push({ ...c0, idx: -1 });
        for (let i = 0; i < sobrantes.length; i++) {
          const S = sobrantes[i];
          const aEff = +(ancho - S).toFixed(2);
          const c = calcCoste(aEff);
          opciones.push({ ...c, idx: i });
        }
        opciones.sort((a,b) => a.paneles - b.paneles || b.nuevoSob - a.nuevoSob);
        const mejor = opciones[0];
        paneles += mejor.paneles;
        if (mejor.idx >= 0) sobrantes.splice(mejor.idx, 1);
        if (mejor.nuevoSob > 0.01) sobrantes.push(mejor.nuevoSob);
      }
    });

    totalPaneles += paneles;
    const sobMostrar = sobrantes.length ? ` (sobra: ${sobrantes.map(x => x+'cm').join(', ')})` : '';
    detalle += `<div style="display:flex;justify-content:space-between;align-items:flex-start"><span>· <strong>${color}</strong>: ${totalAncho} cm<span style="font-size:10px;color:#6B7280;display:block">${sobMostrar}</span></span><span><strong>${paneles}</strong> panel${paneles>1?'es':''}</span></div>`;
  }

  if (!detalle) detalle = '<div style="color:#6B7280;font-style:italic">Añade paños para calcular…</div>';
  const out  = document.getElementById('mbSpcDetalle');
  const out2 = document.getElementById('mbSpcTotal');
  const out3 = document.getElementById('mbSpcPaneles');
  if (out)  out.innerHTML = detalle;
  if (out2) out2.style.display = 'none';
  if (out3) out3.textContent = totalPaneles ? totalPaneles : '—';
}

async function _medGuardarItemBano(validar) {
  if (!_medActual) return;
  const v = id => (document.getElementById(id)?.value || '').trim();
  const c = id => document.getElementById(id)?.checked || false;
  const n = id => parseInt(v(id)) || null;
  const chips = id => Array.from(document.getElementById(id)?.querySelectorAll('.on') || []).map(b => b.dataset.v);
  // Para selección única (botones data-singleselect): leemos data-value del contenedor
  const single = id => document.getElementById(id)?.dataset?.value || '';
  const st = window._medBanoState;
  // Para mantener version del item original (si edita)
  const itemPrev = (_medItemEditIdx != null && _medActual.items?.[_medItemEditIdx]) || {};

  const anchoCm = n('mbAncho');
  const largoCm = n('mbLargo');
  const altoCm  = n('mbAlto');
  if (!anchoCm || !largoCm) { toast('Faltan medidas (ancho × largo)', 'error'); return; }

  const m2 = +((anchoCm/100) * (largoCm/100)).toFixed(2);
  // Helper para guardar tanto _cm como _mm (compat)
  const dim = cm => cm ? { cm, mm: cm * 10 } : { cm: null, mm: null };
  const dPlatoA = dim(n('mbPlatoAncho')), dPlatoL = dim(n('mbPlatoLargo'));
  const dBanA   = dim(n('mbBanAncho')),   dBanL   = dim(n('mbBanLargo'));
  const dMamA   = dim(n('mbMamAncho')),   dMamH   = dim(n('mbMamAlto')),   dMamL1 = dim(n('mbMamLat1')), dMamL2 = dim(n('mbMamLat2'));
  const dMueA   = dim(n('mbMueAncho')),   dMueF   = dim(n('mbMueFondo'));
  const dEspA   = dim(n('mbEspAncho')),   dEspH   = dim(n('mbEspAlto'));

  const obj = {
    ubicacion: v('mbUbic'),
    validado: validar === true,
    version: itemPrev.version || 1,
    version_de: itemPrev.version_de,
    version_grupo: itemPrev.version_grupo,
    archivado: false,  // un item que se guarda es la versión activa
    ancho_cm: anchoCm, largo_cm: largoCm, alto_cm: altoCm,
    ancho_mm: anchoCm * 10, largo_mm: largoCm * 10, alto_mm: altoCm ? altoCm * 10 : null,
    metros: m2,                  // compat con desc legacy
    tipo_trabajo: st.tipo_trabajo || '',
    alcance_libre: v('mbAlcanceLibre'),
    demolicion: c('mbDemolicion') ? 'Sí' : 'No',
    pavimento: {
      tipo: single('mbPavTipo'),
    },
    paredes: (function(){
      const tipo = single('mbParTipo');
      const esSpc = tipo === 'Forrado con paneles SPC';
      const paredesSpc = esSpc ? (st.paredes_spc || []).filter(p => p.ancho) : null;
      const calcSpc = esSpc && paredesSpc?.length ? _medBanoCalcPanelesSpc(paredesSpc, st.spc_estrategia || 'aprovechar') : null;
      return {
        tipo,
        observ: v('mbParObserv'),
        paredes_spc: paredesSpc,
        spc_estrategia: esSpc ? (st.spc_estrategia || 'aprovechar') : null,
        spc_calc: calcSpc,  // {porColor:{...}, total, estrategia}
        esquineros_n: st.esquineros_activo ? n('mbEsqN') : null,
        esquineros_color: st.esquineros_activo ? single('mbEsqColor') : null,
      };
    })(),
    techo: {
      tipo: single('mbTecTipo'),
      pintar: single('mbTecPintar') === 'Sí' ? true : (single('mbTecPintar') === 'No' ? false : null),
    },
    plato: !st.plato_activo ? null : {
      ancho_cm: dPlatoA.cm, ancho_mm: dPlatoA.mm,
      largo_cm: dPlatoL.cm, largo_mm: dPlatoL.mm,
      tipo: single('mbPlatoTipo') || 'Carga mineral',
      color: single('mbPlatoTipo') === 'Carga mineral' ? (single('mbPlatoColor') || 'Blanco') : null,
    },
    banera: !st.banera_activa ? null : {
      largo_cm: dBanL.cm, largo_mm: dBanL.mm,
      ancho_cm: dBanA.cm, ancho_mm: dBanA.mm,
      tipo: single('mbBanTipo'),
      posicion: single('mbBanPos'),
      hidromasaje: single('mbBanHidro') === 'Sí' ? true : (single('mbBanHidro') === 'No' ? false : null),
    },
    mampara: !st.mampara_activa ? null : {
      uso: single('mbMamUso'),
      posicion: single('mbMamPos'),
      ancho_cm: dMamA.cm, ancho_mm: dMamA.mm,
      alto_cm:  dMamH.cm, alto_mm:  dMamH.mm,
      lateral1_cm: dMamL1.cm, lateral1_mm: dMamL1.mm,
      lateral2_cm: dMamL2.cm, lateral2_mm: dMamL2.mm,
      config_frente: single('mbMamFrente'),
      config_lat1:   single('mbMamLat1Conf'),
      config_lat2:   single('mbMamLat2Conf'),
      perfileria:    single('mbMamPerfil'),
    },
    sanit_activo: st.sanit_activo,
    gri_activo:   st.gri_activo,
    acc_activo:   st.acc_activo,
    inodoro:               !st.sanit_activo ? '' : single('mbInodoro'),
    inodoro_tipo:          (!st.sanit_activo || single('mbInodoro') !== 'Suelo') ? null : single('mbInoSueloTipo'),
    inodoro_salida:        (!st.sanit_activo || single('mbInodoro') !== 'Suelo') ? null : single('mbInoSalida'),
    inodoro_alimentacion:  (!st.sanit_activo || single('mbInodoro') !== 'Suelo') ? null : single('mbInoAlim'),
    lavabo: !st.sanit_activo ? '' : single('mbLavabo'),
    bide:   !st.sanit_activo ? '' : single('mbBide'),
    griferia: !st.gri_activo ? null : {
      ducha:   single('mbGriDucha'),
      lavabo:  single('mbGriLavabo'),
      acabado: single('mbGriAcab'),
    },
    mueble: !st.mueble_activo ? null : {
      ancho_cm: dMueA.cm, ancho_mm: dMueA.mm,
      fondo_cm: dMueF.cm, fondo_mm: dMueF.mm,
      posicion: single('mbMuePos'),
      apertura_tipo: single('mbMueAperturaTipo'),
      apertura_n:    n('mbMueNum'),
      gama: single('mbMueGama'),
    },
    espejo: !c('mbEspActivo') ? null : {
      ancho_cm: dEspA.cm, ancho_mm: dEspA.mm,
      alto_cm:  dEspH.cm, alto_mm:  dEspH.mm,
      extras: chips('mbEspExtras'),
    },
    accesorios: !st.acc_activo ? [] : chips('mbAccesorios'),
    acc_observ: !st.acc_activo ? '' : v('mbAccObserv'),
    instalaciones: {
      elec_n:        st.inst_elec_activo ? n('mbInsElecN') : null,
      iluminacion:   st.inst_elec_activo ? chips('mbTecLuz') : [],
      font_puntos:   st.inst_font_activo ? chips('mbInsFontPuntos') : [],
      des_puntos:    st.inst_des_activo  ? chips('mbInsDesPuntos')  : [],
    },
    observaciones: v('mbObserv'),
  };

  const items = [...(_medActual.items || [])];
  if (_medItemEditIdx == null) items.push(obj);
  else items[_medItemEditIdx] = obj;
  _medActual.items = items;
  await _medGuardar(_medActual.id, { items, estado: 'medido' });
  document.getElementById('_medModalItem')?.remove();
  renderMedicionDetalle(document.getElementById('appBody'));
}

// Constantes de cálculo
const _MED_CLIMA_W_AISLAMIENTO = { 'Bueno': 55, 'Normal': 75, 'Malo': 95 };
const _MED_CLIMA_W_FRIO_BASE = 80; // W/m²
const _MED_CLIMA_FACTOR_SEG_DEFAULT = 15; // %

// Catálogo de radiadores — cargado de window.RADIADORES_CAT (js/obras/radiadores_catalogo.js)
// Estructura: BAXI (aluminio por elementos) · JAGA_STRADA · JAGA_TEMPO · AQUABIT (paneles baja T)

// Devuelve ΔT medio recomendado según generador (en ºC, EN442)
function _medClimaDtRecomendado(generadorTipo, calderaCondensacion) {
  if (window.RADIADORES_CAT) return window.RADIADORES_CAT.deltaTRecomendado(generadorTipo, calderaCondensacion);
  // Fallback básico
  if (['bdc_aire_agua','geotermia','aerotermia'].includes(generadorTipo)) return 22.5;
  if (generadorTipo === 'caldera_combust' && calderaCondensacion) return 30;
  if (generadorTipo === 'biomasa') return 30;
  return 50;
}

// Devuelve etiqueta legible del ΔT
function _medClimaDtLabel(dt) {
  if (dt <= 23) return 'ΔT 22.5 (45/40 ºC)';
  if (dt <= 28) return 'ΔT 27.5 (50/45 ºC)';
  if (dt <= 35) return 'ΔT 30 (55/45 ºC)';
  return 'ΔT 50 (75/65 ºC)';
}

// Cálculo automático de configuración óptima según marca/modelo/potencia/ΔT
// Retorna {tipo:'baxi'|'jaga'|'aquabit', ...detalles, descripcion}
function _medClimaAutoCalcEmisor(marcaKey, potencia_w, dt, opts) {
  if (!window.RADIADORES_CAT || !potencia_w) return null;
  opts = opts || {};
  const C = window.RADIADORES_CAT;
  // BAXI ALUMINIO (DUBAL · ASTRAL · CONDAL)
  const baxiMap = { 'baxi_dubal':'DUBAL', 'baxi_astral':'ASTRAL', 'baxi_condal':'CONDAL' };
  if (baxiMap[marcaKey]) {
    const modeloKey = baxiMap[marcaKey];
    const altura = opts.altura || 60;
    const r = C.buscarMinimoBaxi(modeloKey, altura, dt, potencia_w);
    if (!r) return null;
    return {
      tipo: 'baxi', marca: 'Baxi', modelo: modeloKey, altura_cm: altura,
      elementos: r.elementos, w_real: r.w_real, w_elem: r.w_elem,
      n_oficial: r.n_oficial,
      sobre_dim_pct: r.sobre_dim_pct,
      descripcion: `Baxi ${modeloKey} H${altura} · ${r.elementos} elem · ${r.w_real} W`,
    };
  }
  // JAGA STRADA / TEMPO
  if (marcaKey === 'jaga_strada' || marcaKey === 'jaga_tempo') {
    const modelo = (marcaKey === 'jaga_strada') ? C.JAGA_STRADA : C.JAGA_TEMPO;
    // Default H65 (Strada no tiene H60) o H60 (Tempo)
    const alturaKey = opts.alturaKey || (marcaKey === 'jaga_strada' ? '065_est' : '060_est');
    const r = C.buscarMinimoJaga(modelo, alturaKey, dt, potencia_w, opts.tipoFijo, !!opts.dbh);
    const altObj = modelo.alturas[alturaKey];
    if (!r) {
      const altLab = altObj ? `H${altObj.altura_cm}${altObj.twin?' Twin':''}` : alturaKey;
      return {
        tipo: 'jaga', marca: 'Jaga',
        modelo: marcaKey === 'jaga_strada' ? 'Strada' : 'Tempo',
        altura_cm: altObj?.altura_cm,
        insuficiente: true,
        descripcion: `${altLab} no cubre ${(potencia_w/1000).toFixed(2)} kW${opts.dbh?' (incluso con DBH)':''}`,
      };
    }
    return {
      tipo: 'jaga', marca: 'Jaga', modelo: marcaKey === 'jaga_strada' ? 'Strada' : 'Tempo',
      altura_cm: altObj.altura_cm, twin: altObj.twin, alturaKey,
      longitud_cm: parseInt(r.longitud), tipo_intercambiador: r.tipo,
      w_real: r.potencia_real, w_estatico: r.potencia_estatica, factor_dbh: r.factor_dbh,
      sobre_dim_pct: r.sobre_dim_pct, dbh: !!opts.dbh,
      descripcion: `Jaga ${marcaKey === 'jaga_strada' ? 'Strada' : 'Tempo'} H${altObj.altura_cm}${altObj.twin?' Twin':''} L${r.longitud} T${r.tipo}${opts.dbh?' + DBH':''} · ${r.potencia_real} W`,
    };
  }
  // AQUABIT
  if (marcaKey === 'aquabit_landro' || marcaKey === 'aquabit_eume') {
    const modeloKey = opts.modeloKey;
    if (!modeloKey) return null;
    const r = C.buscarMinimoAquabit(modeloKey, dt, potencia_w);
    if (!r) return null;
    return {
      tipo: 'aquabit', marca: 'Aquabit', modelo: modeloKey, ancho_cm: r.ancho,
      w_real: r.potencia_real, sobre_dim_pct: r.sobre_dim_pct,
      insuficiente: r.insuficiente,
      kit_dinamico: !!opts.kit_dinamico,
      descripcion: `Aquabit ${modeloKey} L${r.ancho} · ${r.potencia_real} W${opts.kit_dinamico?' + kit dinámico':''}${r.insuficiente?' ⚠️ insuficiente':''}`,
    };
  }
  return null;
}

function _medAbrirModalClima(it) {
  if (!_medActual) return;
  const estancias0 = (it.estancias && it.estancias.length) ? it.estancias.map(e => ({...e})) : [];
  // Derivar plantas existentes + permitir plantas vacías
  const plantasGuardadas = it.plantas || [];
  const plantasDerivadas = [...new Set(estancias0.map(e => e.planta || 'Vivienda'))];
  const plantas = plantasGuardadas.length ? plantasGuardadas : (plantasDerivadas.length ? plantasDerivadas : ['Vivienda']);
  // Asegurar que cada estancia tiene su planta asignada explícitamente (para que el reset por planta funcione)
  estancias0.forEach(es => { if (!es.planta) es.planta = plantas[0]; });
  // Migración legacy: si hay sistema_emisor en estancias y no config_plantas, construirlo
  let configPlantas = it.config_plantas ? {...it.config_plantas} : {};
  if (Object.keys(configPlantas).length === 0) {
    estancias0.forEach(es => {
      const p = es.planta || plantas[0] || 'Vivienda';
      if (!configPlantas[p] && es.sistema_emisor) {
        configPlantas[p] = {
          sistema: es.sistema_emisor,
          sr_paso: es.sr_paso || 15,
          sr_plancha: es.sr_plancha || 'PN45_50',
          sr_tubo: es.sr_tubo || '16x2.0',
        };
      }
    });
  }
  // Inicializar bloques_abiertos: TODOS cerrados, salvo el primer NO validado
  const _ord = ['trab','est','sis','gen','dist','ctrl','obra','perm','obs'];
  const _val = it.validados ? {...it.validados} : {};
  const _bloquesAb = Object.fromEntries(_ord.map(k => [k, false]));
  for (const k of _ord) { if (!_val[k]) { _bloquesAb[k] = true; break; } }
  window._medClimaState = {
    tipo_trabajo:  it.tipo_trabajo || 'vivienda_nueva',
    factor_seg:    it.factor_seg != null ? it.factor_seg : _MED_CLIMA_FACTOR_SEG_DEFAULT,
    t_ambiente:    it.t_ambiente != null ? it.t_ambiente : 21, // RITE
    plantas:       plantas,
    config_plantas: configPlantas,
    estancias:     estancias0,
    sistema:       it.sistema || '',
    generador:     it.generador ? {...it.generador} : {},
    distribucion:  it.distribucion ? {...it.distribucion} : {},
    bloques_abiertos: _bloquesAb,
    validados: _val,
  };
  const ov = document.createElement('div');
  ov.id = '_medModalItem';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
  // Render con captura de errores para que el modal nunca quede roto sin abrir
  let bodyHtml = '';
  try {
    bodyHtml = _medRenderClimaForm(it);
  } catch (e) {
    console.error('[Clima] Error renderizando formulario:', e);
    bodyHtml = `<div style="padding:20px;background:#FEE2E2;color:#991B1B;border-radius:8px;font-size:12.5px;line-height:1.5">
      <div style="font-weight:700;margin-bottom:8px">⚠️ Error al cargar el formulario</div>
      <div style="font-family:monospace;font-size:11px;background:#fff;padding:8px;border-radius:5px;overflow:auto">${(e && e.message) || e}</div>
      <div style="margin-top:10px;font-size:11px">Captura este mensaje y avísame para arreglarlo. Mientras tanto, puedes pulsar el botón rojo de abajo para eliminar este item y crear uno nuevo.</div>
    </div>`;
  }
  ov.innerHTML = `
    <div style="background:#fff;width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:92vh;display:flex;flex-direction:column">
      <div style="padding:14px 16px;border-bottom:1px solid var(--gris-100);display:flex;align-items:center;justify-content:space-between">
        <div style="font-weight:700;font-size:15px">❄️ ${_medItemEditIdx==null ? 'Nueva climatización' : 'Editar climatización'}</div>
        <button onclick="document.getElementById('_medModalItem').remove()" class="tap" style="background:none;border:none;font-size:22px;color:var(--gris-400);cursor:pointer;padding:0">✕</button>
      </div>
      <div style="padding:14px 16px;overflow-y:auto;flex:1" id="medClimaBody">
        ${bodyHtml}
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--gris-100);display:flex;gap:7px">
        ${_medItemEditIdx!=null ? '<button onclick="_medBorrarItem()" class="tap" style="padding:11px;background:#fff;border:1.5px solid #ef4444;color:#ef4444;border-radius:9px;font-weight:700;font-size:12.5px">Eliminar</button>' : ''}
        <button onclick="_medGuardarItemClima()" class="tap" style="flex:1;padding:11px;background:#3B82F6;color:#fff;border:none;border-radius:9px;font-weight:700;font-size:14px">${_medItemEditIdx==null ? 'Añadir' : 'Guardar'}</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  setTimeout(() => _medClimaRecalcularTotales(), 30);
}

function _medClimaBloque(key, titulo, bodyHtml, opciones) {
  const st = window._medClimaState;
  opciones = opciones || {};
  const validado = !!(st.validados && st.validados[key]);
  // El estado bloques_abiertos manda siempre (independiente de validación)
  const abierto = !!st.bloques_abiertos[key];
  const resumen = opciones.resumen || '';
  const headerBg = validado ? '#DCFCE7' : '#F3F4F6';
  const headerColor = validado ? '#065F46' : '#1F2937';
  const headerIcon = validado ? (abierto?'▾ ✓':'✓') : (abierto?'▾':'▸');
  const headerIconColor = validado ? '#16A34A' : '#6B7280';
  const validable = opciones.validable !== false;
  const bodyExtra = (validable && !validado) ? `
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--gris-200)">
      <button type="button" onclick="event.stopPropagation();_medClimaValidarBloque('${key}')" class="tap" style="width:100%;padding:9px;background:#16A34A;color:#fff;border:none;border-radius:7px;font-weight:700;font-size:12.5px;cursor:pointer">✓ Validar bloque</button>
    </div>` : (validable && validado) ? `
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #BBF7D0">
      <button type="button" onclick="event.stopPropagation();_medClimaInvalidarBloque('${key}')" class="tap" style="width:100%;padding:7px;background:#fff;color:#16A34A;border:1.5px solid #16A34A;border-radius:7px;font-weight:700;font-size:11.5px;cursor:pointer">↻ Modificar (volver a editar)</button>
    </div>` : '';
  return `<div style="border:1px solid ${validado?'#86EFAC':'var(--gris-200)'};border-radius:10px;margin-bottom:8px;overflow:hidden">
    <div onclick="_medClimaToggleBloque('${key}')" class="tap" style="padding:11px 14px;background:${headerBg};display:flex;align-items:center;gap:8px;cursor:pointer">
      <div style="font-weight:700;font-size:13px;flex:1;color:${headerColor}">${titulo}${validado&&resumen?`<div style="font-weight:400;font-size:11.5px;color:#15803D;margin-top:2px">${resumen}</div>`:''}</div>
      <span style="color:${headerIconColor};font-size:14px;font-weight:700">${headerIcon}</span>
    </div>
    <div id="mc_body_${key}" style="${abierto?'':'display:none;'}padding:12px 14px;background:#fff">${bodyHtml}${bodyExtra}</div>
  </div>`;
}
function _medClimaToggleBloque(key) {
  const st = window._medClimaState;
  st.bloques_abiertos[key] = !st.bloques_abiertos[key];
  _medRefrescarClimaForm();
}
function _medClimaValidarBloque(key) {
  const st = window._medClimaState;
  if (!st.validados) st.validados = {};
  st.validados[key] = true;
  st.bloques_abiertos[key] = false;
  // Auto-abrir el siguiente bloque no validado
  const orden = ['trab','est','sis','gen','dist','ctrl','obra','perm','obs'];
  const idx = orden.indexOf(key);
  for (let j = idx + 1; j < orden.length; j++) {
    if (!st.validados[orden[j]]) {
      st.bloques_abiertos[orden[j]] = true;
      break;
    }
  }
  _medRefrescarClimaForm();
}
function _medClimaInvalidarBloque(key) {
  const st = window._medClimaState;
  if (st.validados) delete st.validados[key];
  st.bloques_abiertos[key] = true;
  _medRefrescarClimaForm();
}

function _medRenderClimaForm(it) {
  const st = window._medClimaState;
  const e = _medEsc;
  let html = '';

  // ── Ubicación / referencia
  html += `<div style="margin-bottom:8px"><div style="font-size:9.5px;color:var(--gris-500);margin-bottom:3px">Referencia / ubicación general</div>
    <input id="mcUbic" type="text" value="${e(it.ubicacion||'')}" placeholder="Vivienda completa, planta 2…" style="width:100%;padding:10px;border:1.5px solid var(--gris-200);border-radius:9px;font-size:13px;box-sizing:border-box"></div>`;

  // ── Bloque 1: Tipo de trabajo (define método de distribución por defecto)

    {k:'rehabilitacion',     l:'Rehabilitación',                ico:'🔨'},

  let body1 = `<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px">`;
  for (const t of tipos) {
    const a = st.tipo_trabajo === t.k;
    body1 += `<button type="button" class="tap" onclick="window._medClimaState.tipo_trabajo='${t.k}';_medRefrescarClimaForm()" style="padding:10px 12px;border:${a?'2px':'1.5px'} solid ${a?'#3B82F6':'var(--gris-200)'};background:${a?'#EFF6FF':'#fff'};color:${a?'#1E40AF':'var(--gris-700)'};border-radius:8px;font-weight:${a?'700':'500'};font-size:12px;text-align:left">${t.ico} ${t.l}</button>`;
  }
  body1 += `</div>`;
  // Factor de seguridad

    <div style="display:flex;align-items:center;gap:8px">

  // Resumen para vista validada

  html += _medClimaBloque('trab', '🛠️ Tipo de trabajo', body1, { resumen: `${tipoTrabLab} · factor seguridad +${st.factor_seg}%` });

  // ── Bloque 2: Plantas y estancias (jerarquía: plantas → estancias dentro)
  let body2 = `<div id="mcEstanciasLista">${_medClimaRenderEstancias()}</div>
    <button type="button" onclick="_medClimaAddPlanta()" style="width:100%;padding:9px;background:#fff;color:#10B981;border:1.5px dashed #10B981;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px">+ Añadir planta</button>
    <div id="mcTotales" style="background:#EFF6FF;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:11.5px;color:#1E40AF;line-height:1.7">

      Calor: <strong id="mcTotCalor">— kW / — kcal/h</strong><br>
      Frío: <strong id="mcTotFrio">— kW / — kcal/h</strong>
    </div>`;
  // Resumen plantas/estancias
  let _totCalorW = 0, _totFrioW = 0;
  st.estancias.forEach(es => {
    const c = _medClimaCalcCargasEstancia(es, st.factor_seg);
    _totCalorW += c.calor_w; _totFrioW += c.frio_w;
  });
  const _resPE = `${(st.plantas||[]).length} planta${(st.plantas||[]).length===1?'':'s'} · ${st.estancias.length} estancia${st.estancias.length===1?'':'s'}${_totCalorW?` · 🔥 ${(_totCalorW/1000).toFixed(2)} kW`:''}${_totFrioW?` · ❄️ ${(_totFrioW/1000).toFixed(2)} kW`:''}`;
  html += _medClimaBloque('est', '🏠 Plantas y estancias', body2, { resumen: _resPE });

  // ── Bloque 3: Generador
  // 5 generadores principales + tipos compatibles de emisor
  const GENERADORES = [

    {k:'bdc_aire_agua',  l:'Bomba de calor aire / agua',       f:'❄️🔥💧', emisores:['fancoils','suelo_radiante','radiadores_baja_temp']},

  }
  body3 += `</div>`;
  // Sub-detalle generador — solo si hay tipo elegido
  if (st.generador?.tipo) {
    const gen = st.generador;

    // ── CALDERA: sub-selector combustible + tipo gas
    if (gen.tipo === 'caldera_combust') {
      body3 += `<div style="background:#FEF3C7;border-radius:7px;padding:8px 10px;margin-bottom:6px">
        <div style="font-size:10px;color:#92400E;font-weight:700;margin-bottom:5px">Combustible</div>
        <div style="display:flex;gap:5px;margin-bottom:6px">
          ${['Gas','Gasóleo'].map(c => {
            const a = gen.caldera_combustible === c;
            return `<button type="button" onclick="window._medClimaState.generador.caldera_combustible='${c}';if('${c}'!=='Gas')delete window._medClimaState.generador.caldera_gas_tipo;_medRefrescarClimaForm()" style="flex:1;padding:8px;border-radius:6px;font-size:11.5px;font-weight:${a?'700':'500'};border:${a?'2px':'1.5px'} solid ${a?'#92400E':'#FDE68A'};background:${a?'#FEF3C7':'#fff'};color:#92400E;cursor:pointer">${c}</button>`;
          }).join('')}

        ${gen.caldera_combustible === 'Gas' ? `
          <div style="font-size:10px;color:#92400E;font-weight:700;margin-bottom:5px">Tipo de gas</div>
          <div style="display:flex;gap:5px">
            ${['Natural','Propano'].map(c => {
              const a = gen.caldera_gas_tipo === c;
              return `<button type="button" onclick="window._medClimaState.generador.caldera_gas_tipo='${c}';_medRefrescarClimaForm()" style="flex:1;padding:7px;border-radius:6px;font-size:11px;font-weight:${a?'700':'500'};border:${a?'2px':'1px'} solid ${a?'#92400E':'#FDE68A'};background:${a?'#FEF3C7':'#fff'};color:#92400E;cursor:pointer">${c}</button>`;
            }).join('')}
          </div>` : ''}
      </div>`;
    }

    // ── BdC AIRE/AIRE: sub-selector tipo de instalación
    if (gen.tipo === 'bdc_aire_aire') {
      body3 += `<div style="background:#DBEAFE;border-radius:7px;padding:8px 10px;margin-bottom:6px">
        <div style="font-size:10px;color:#1E40AF;font-weight:700;margin-bottom:5px">Tipo de instalación</div>

// Añadir planta nueva
function _medClimaAddPlanta() {
  const sugeridas = ['Planta baja','Planta 1','Planta 2','Planta 3','Sótano','Ático','Bajo cubierta'];
  const usadas = window._medClimaState.plantas || [];
  const sugerida = sugeridas.find(s => !usadas.includes(s)) || `Planta ${usadas.length+1}`;
  const nombre = prompt('Nombre de la planta:', sugerida);
  if (!nombre || !nombre.trim()) return;
  window._medClimaState.plantas.push(nombre.trim());
  document.getElementById('mcEstanciasLista').innerHTML = _medClimaRenderEstancias();
  _medClimaRecalcularTotales();
}

// Renombrar planta (afecta también a las estancias que la usaban)
function _medClimaRenombrarPlanta(plantaIdx) {
  const st = window._medClimaState;
  const actual = st.plantas[plantaIdx];
  if (!actual) return;
  const nuevo = prompt('Nuevo nombre de la planta:', actual);
  if (!nuevo || !nuevo.trim() || nuevo.trim() === actual) return;
  st.plantas[plantaIdx] = nuevo.trim();
  st.estancias.forEach(es => { if (es.planta === actual) es.planta = nuevo.trim(); });
  document.getElementById('mcEstanciasLista').innerHTML = _medClimaRenderEstancias();
  _medClimaRecalcularTotales();
}

// Quitar planta (con sus estancias)
function _medClimaQuitarPlanta(plantaIdx) {
  const st = window._medClimaState;
  const planta = st.plantas[plantaIdx];
  if (!planta) return;
  const nEst = st.estancias.filter(es => es.planta === planta).length;
  if (nEst > 0 && !confirm(`La planta "${planta}" tiene ${nEst} estancia${nEst>1?'s':''}. ¿Quitar planta y estancias?`)) return;
  if (nEst === 0 && st.plantas.length === 1) { toast?.('Tiene que quedar al menos una planta', 'error'); return; }
  st.estancias = st.estancias.filter(es => es.planta !== planta);
  st.plantas.splice(plantaIdx, 1);
  if (!st.plantas.length) st.plantas.push('Vivienda');
  document.getElementById('mcEstanciasLista').innerHTML = _medClimaRenderEstancias();
  _medClimaRecalcularTotales();
}

// Cambia la planta de una estancia (con prompt si elige "Otra…")
function _medClimaCambiarPlanta(idx, valor) {
  if (valor === '__OTRA__') {
    const nueva = prompt('Nombre de la planta:', 'Anejo');
    if (!nueva || !nueva.trim()) {
      // Cancelar: re-render para revertir el select
      document.getElementById('mcEstanciasLista').innerHTML = _medClimaRenderEstancias();
      _medClimaRecalcularTotales();
      return;
    }
    window._medClimaState.estancias[idx].planta = nueva.trim();
  } else {
    window._medClimaState.estancias[idx].planta = valor;
  }
  document.getElementById('mcEstanciasLista').innerHTML = _medClimaRenderEstancias();
  _medClimaRecalcularTotales();
}

function _medClimaAddEstancia() {
  // Compat: añadir a la primera planta disponible
  const st = window._medClimaState;
  const planta = st.plantas?.[0] || 'Vivienda';
  _medClimaAddEstanciaPlanta(planta);
}

// Añadir estancia a una planta concreta
function _medClimaAddEstanciaPlanta(planta) {
  const st = window._medClimaState;
  st.estancias.push({ nombre:'', planta, ancho_cm:0, largo_cm:0, aislamiento:'Normal', calor:true, frio:false });
  document.getElementById('mcEstanciasLista').innerHTML = _medClimaRenderEstancias();
  _medClimaRecalcularTotales();
}
function _medClimaRemEstancia(i) {
  window._medClimaState.estancias.splice(i, 1);
  document.getElementById('mcEstanciasLista').innerHTML = _medClimaRenderEstancias();
  _medClimaRecalcularTotales();
}

// Devuelve true si el subtipo de emisor corresponde a un radiador (Aluminio, BT, Fundición, Chapa…)
function _medClimaEsRadiador(emisorTipo) {
  if (!emisorTipo) return false;
  const t = emisorTipo.toLowerCase();
  return t.includes('aluminio') || t.includes('baja temperatura') || t.includes('baja t') ||
         t.includes('acero') || t.includes('fundición') || t.includes('fundicion') || t.includes('chapa');
}

// Detecta si una estancia es baño/aseo/wc por su nombre
function _medClimaEsBano(nombre) {
  if (!nombre) return false;
  const n = nombre.toLowerCase();
  return n.includes('baño') || n.includes('bano') || n.includes('aseo') || n.includes('wc') || n.includes('lavadero');
}

// Constantes REHAU PN para suelo radiante
// Pasos prácticos en obra con panel PN: 15 (general) y 10 (baños / zonas frías)
// Si en el futuro se usa otro panel que admita 7.5, se ajustará a [15, 7.5]
const _MED_SR_PASOS = [15, 10];
const _MED_SR_TUBOS = [
  { k:'16x1.5', l:'RAUTHERM 16×1.5' },
  { k:'16x2.0', l:'RAUTHERM 16×2.0' },
  { k:'17x2.0', l:'RAUTHERM 17×2.0' },
  { k:'20x2.0', l:'RAUTHERM 20×2.0' },
];
const _MED_SR_PLANCHAS = [
  { k:'PN45_35', l:'PN 45 mm · dens. 35 kg/m³' },
  { k:'PN45_50', l:'PN 45 mm · dens. 50 kg/m³' },
  { k:'PN60_50', l:'PN 60 mm · dens. 50 kg/m³' },
];
const _MED_SR_PANEL_M2 = 1.2 * 0.7; // 1200×700 mm = 0.84 m² útil
const _MED_SR_FACTOR_CURVAS = 1.10; // +10% por curvas y conexión a colector
const _MED_SR_TUBO_MAX_CIRCUITO = 100; // ml

// Paso por defecto según tipo de estancia: baño → 10 (paso reducido), resto → 15
// Con panel REHAU PN solo hay 2 pasos prácticos: 15 (general) y 10 (baños)
function _medClimaPasoDefault(generadorTipo, esBano) {
  return esBano ? 10 : 15;
}

// Cálculo suelo radiante por estancia
function _medClimaCalcSueloRadiante(es) {
  const m2 = (parseFloat(es.ancho_cm)||0) * (parseFloat(es.largo_cm)||0) / 10000;
  const perim = (((parseFloat(es.ancho_cm)||0) + (parseFloat(es.largo_cm)||0)) * 2) / 100; // ml
  const paso = es.sr_paso || 15;
  const tuboML = +(m2 * (100/paso) * _MED_SR_FACTOR_CURVAS).toFixed(1);
  const planchas = m2 ? Math.ceil(m2 / _MED_SR_PANEL_M2) : 0;
  const circuitos = tuboML ? Math.ceil(tuboML / _MED_SR_TUBO_MAX_CIRCUITO) : 0;
  return { m2:+m2.toFixed(2), perim:+perim.toFixed(1), paso, tuboML, planchas, circuitos };
}

// ── RENDER: Radiador principal (selector marca/modelo + auto-cálculo)
// cfgPlanta = config compartida de la planta (defaults heredables)
// nRads = número total de radiadores en la estancia (1 + adicionales). Si >1 muestra banner reparto.
function _medClimaRenderRadiador(es, i, dtRec, potNeed, cfgPlanta, nRads) {
  cfgPlanta = cfgPlanta || {};
  nRads = nRads || 1;
  const e = _medEsc;
  // Banner de potencia asignada si hay >1 radiador en la estancia
  let potBanner = '';
  if (nRads > 1) {
    const potKw = +(potNeed/1000).toFixed(2);
    potBanner = `<div style="background:#FEF3C7;color:#92400E;padding:5px 8px;border-radius:5px;font-size:10.5px;margin-bottom:5px;display:flex;align-items:center;gap:6px">
      <span style="flex:1">Radiador 1 de ${nRads} · reparto auto</span>
      <input type="number" step="0.1" value="${potKw}" onchange="window._medClimaState.estancias[${i}].pot_main_w=Math.round((parseFloat(this.value)||0)*1000);_medRefrescarClimaForm()" style="width:60px;padding:3px 5px;border:1px solid #FDE68A;border-radius:4px;font-size:11px;text-align:center;font-weight:700;color:#92400E;box-sizing:border-box"> kW
    </div>`;
  }
  // Tecnología (Aluminio / Baja temperatura / Otro) — heredar de planta
  const tecnologias = ['Aluminio', 'Baja temperatura', 'Otro'];
  const tec = es.rad_tecnologia || cfgPlanta.rad_tecnologia || (es.emisor_tipo ? (_medClimaEsRadiador(es.emisor_tipo) ? (es.emisor_tipo.toLowerCase().includes('baja') ? 'Baja temperatura' : 'Aluminio') : 'Otro') : 'Aluminio');
  let html = `<div style="background:#fff;border:1px solid #BFDBFE;border-radius:7px;padding:8px;margin-top:4px">
    ${potBanner}
    <div style="display:flex;gap:4px;margin-bottom:6px">
      ${tecnologias.map(t => {
        const a = tec === t;
        return `<button type="button" onclick="window._medClimaState.estancias[${i}].rad_tecnologia='${t}';delete window._medClimaState.estancias[${i}].rad_marca;_medRefrescarClimaForm()" style="flex:1;padding:6px;border:${a?'2px':'1px'} solid ${a?'#1E40AF':'#BFDBFE'};background:${a?'#EFF6FF':'#fff'};color:#1E40AF;border-radius:5px;font-size:10.5px;font-weight:${a?'700':'500'};cursor:pointer">${e(t)}</button>`;
      }).join('')}
    </div>`;
  if (tec === 'Otro') {
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
      <input type="text" placeholder="Marca/modelo (Fundición, Chapa…)" value="${e(es.emisor_modelo||'')}" oninput="window._medClimaState.estancias[${i}].emisor_modelo=this.value" style="padding:6px;border:1px solid var(--gris-200);border-radius:5px;font-size:11.5px">
      <input type="number" step="0.1" placeholder="kW" value="${es.emisor_kw||''}" oninput="window._medClimaState.estancias[${i}].emisor_kw=parseFloat(this.value)||0" style="padding:6px;border:1px solid var(--gris-200);border-radius:5px;font-size:11.5px;text-align:center;font-weight:700">
    </div></div>`;
    return html;
  }
  if (!window.RADIADORES_CAT) {
    return html + '<div style="font-size:10.5px;color:#9CA3AF;font-style:italic">Catálogo no cargado</div></div>';
  }
  const C = window.RADIADORES_CAT;
  let marcasFiltro = C.marcas();
  if (tec === 'Aluminio')          marcasFiltro = marcasFiltro.filter(m => m.tipo === 'aluminio');
  else if (tec === 'Baja temperatura') marcasFiltro = marcasFiltro.filter(m => m.tipo === 'baja_temp');
  // Heredar de cfgPlanta si la estancia no tiene valor propio
  const marcaK = es.rad_marca || cfgPlanta.rad_marca || marcasFiltro[0]?.k || '';
  // ΔT viene del generador (T impulsión + T ambiente) — ya no es editable por radiador
  const dt = dtRec;
  html += `<div style="margin-bottom:5px">
    <select onchange="window._medClimaState.estancias[${i}].rad_marca=this.value;delete window._medClimaState.estancias[${i}].rad_altura;delete window._medClimaState.estancias[${i}].rad_modelo_aquabit;_medRefrescarClimaForm()" style="width:100%;padding:6px;border:1px solid var(--gris-200);border-radius:5px;font-size:11px;background:#fff;box-sizing:border-box">
      <option value="">— marca / modelo —</option>
      ${marcasFiltro.map(m => `<option value="${m.k}" ${marcaK===m.k?'selected':''}>${e(m.marca+' '+m.modelo)}</option>`).join('')}
    </select>
  </div>`;
  if (!marcaK) { html += `<div style="font-size:10.5px;color:#6B7280;font-style:italic">Selecciona marca</div></div>`; return html; }
  let opts = {};
  if (marcaK === 'baxi_dubal' || marcaK === 'baxi_astral' || marcaK === 'baxi_condal') {
    const modeloKey = marcaK === 'baxi_dubal' ? 'DUBAL' : (marcaK === 'baxi_astral' ? 'ASTRAL' : 'CONDAL');
    const alturasDisp = Object.keys(C.BAXI.modelos[modeloKey].alturas);
    const alturaSel = es.rad_altura || cfgPlanta.rad_altura || C.BAXI.modelos[modeloKey].altura_default;
    opts.altura = parseInt(alturaSel);
    html += `<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px"><span style="font-size:10px;color:#6B7280">Altura</span><select onchange="window._medClimaState.estancias[${i}].rad_altura=parseInt(this.value);_medRefrescarClimaForm()" style="flex:1;padding:5px;border:1px solid var(--gris-200);border-radius:5px;font-size:11px;background:#fff">${alturasDisp.map(a => `<option value="${a}" ${parseInt(alturaSel)===parseInt(a)?'selected':''}>${a} cm (entrec. ${C.BAXI.modelos[modeloKey].alturas[a].ec} mm)</option>`).join('')}</select></div>`;
  } else if (marcaK === 'jaga_strada' || marcaK === 'jaga_tempo') {
    const modeloObj = (marcaK === 'jaga_strada') ? C.JAGA_STRADA : C.JAGA_TEMPO;

    const [cmStr, modo] = alturaKey0.split('_');
    let altCm = parseInt(cmStr);
    let twin = (modo === 'twin');
    // Buscar la altura realmente disponible
    let alturaKey = `${cmStr}_${twin?'twin':'est'}`;
    if (!modeloObj.alturas[alturaKey]) {
      // Si no existe esa variante, fallback a la otra
      alturaKey = `${cmStr}_${twin?'est':'twin'}`;
      if (!modeloObj.alturas[alturaKey]) alturaKey = alturaDef;

    }
    const altObj = modeloObj.alturas[alturaKey];
    altCm = altObj.altura_cm;
    // Listar alturas únicas (cm) del modelo
    const alturasCm = [...new Set(Object.keys(modeloObj.alturas).map(k => parseInt(k.split('_')[0])))].sort((a,b)=>a-b);
    // Tipo (profundidad) disponible para esta variante
    const tiposDisp = altObj.tipos_disponibles;
    // Default "auto" (calcula la profundidad óptima automáticamente)
    const tipoSel = es.rad_tipo != null ? es.rad_tipo : (cfgPlanta.rad_tipo != null ? cfgPlanta.rad_tipo : '');
    const tipoFijo = tiposDisp.includes(tipoSel) ? tipoSel : null; // null/empty → Auto
    opts.alturaKey = alturaKey;
    opts.tipoFijo = tipoFijo;
    // UI: altura (cm) · Estándar/Twin · profundidad
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
      <div><div style="font-size:9px;color:#6B7280;margin-bottom:2px">Altura</div>

          ${alturasCm.map(cm => `<option value="${String(cm).padStart(3,'0')}" ${altCm===cm?'selected':''}>H${cm} cm</option>`).join('')}
        </select>
      </div>
      <div><div style="font-size:9px;color:#6B7280;margin-bottom:2px">Profundidad (tipo)</div>
        <select onchange="window._medClimaState.estancias[${i}].rad_tipo=this.value;_medRefrescarClimaForm()" style="width:100%;padding:5px;border:1px solid var(--gris-200);border-radius:5px;font-size:11px;background:#fff;box-sizing:border-box">
          <option value="" ${!tipoFijo?'selected':''}>Auto (óptimo)</option>
          ${tiposDisp.map(t => `<option value="${t}" ${tipoFijo===t?'selected':''}>Tipo ${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <label class="tap" style="display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid var(--gris-200);border-radius:5px;font-size:10.5px;cursor:pointer;margin-bottom:4px">

    const modelosDisp = Object.keys(C.AQUABIT.modelos).filter(k => k.startsWith(prefijo));

    if (auto.insuficiente) info = `<strong>⚠️ ${auto.descripcion || 'Configuración insuficiente'}</strong>`;
    else if (auto.tipo === 'baxi')    info = `<strong>${auto.elementos} elementos</strong> · ${auto.w_real} W · sobredim. ${auto.sobre_dim_pct}%`;
    else if (auto.tipo === 'jaga') info = `<strong>L${auto.longitud_cm} · Tipo ${auto.tipo_intercambiador}</strong> · ${auto.w_real} W · sobredim. ${auto.sobre_dim_pct}%`;
    else if (auto.tipo === 'aquabit') info = `<strong>Ancho ${auto.ancho_cm} cm</strong> · ${auto.w_real} W · sobredim. ${auto.sobre_dim_pct}%${auto.kit_dinamico?' · kit DBH':''}`;

    setTimeout(() => {
      const stE = window._medClimaState?.estancias?.[i];
      if (stE) {
        stE.rad_calc = auto;
        stE.emisor_modelo = auto.descripcion;

    html += `<div style="background:#FEF3C7;color:#92400E;border-radius:6px;padding:7px 9px;font-size:11px">Selecciona altura/modelo para auto-calcular</div>`;

  }
  html += `</div>`;
  return html;
}

// Propaga un cambio de config-planta a TODAS las estancias de esa planta:
// limpia los campos individuales para que vuelvan a heredar del default-planta.
// camposRad = campos de radiador a borrar de cada estancia (incluye sus rad_adicionales)
function _medClimaResetEstanciasPlanta(planta, camposRad) {
  const st = window._medClimaState;
  if (!st || !st.estancias) return;
  const fallback = (st.plantas && st.plantas[0]) || 'Vivienda';
  st.estancias.forEach(es => {
    // Match con fallback: si es.planta está vacío y mostramos como st.plantas[0], coincide
    const esPlanta = es.planta || fallback;
    if (esPlanta !== planta) return;
    // Asegurar que es.planta tenga valor explícito a partir de ahora
    es.planta = planta;
    camposRad.forEach(c => delete es[c]);
    // También resetear los campos en cada radiador adicional de la estancia
    if (Array.isArray(es.rad_adicionales)) {
      es.rad_adicionales.forEach(rad => camposRad.forEach(c => delete rad[c]));
    }
  });
}

// ── HELPER: reparte la potencia de la estancia entre N emisores (main + extras) a partes iguales
// Devuelve potencia asignada al main; los extras heredan la misma proporción si no tienen kW manual
function _medClimaPotAsignadaMain(es, potNeed) {
  const nExtras = (es.extras || []).length;
  if (nExtras === 0) return potNeed;
  // Si el usuario ha asignado manualmente, respetarlo
  if (es.pot_main_w != null) return es.pot_main_w;
  return Math.round(potNeed / (1 + nExtras));
}
function _medClimaPotAsignadaExtra(es, potNeed, idxExtra) {
  const nExtras = (es.extras || []).length;
  const ex = es.extras?.[idxExtra];
  if (!ex) return 0;
  if (ex.kw != null && ex.kw > 0) return Math.round(ex.kw * 1000); // kw → W
  return Math.round(potNeed / (1 + nExtras));
}

          <button type="button" onclick="window._medClimaState.estancias[${i}].extras.splice(${idx},1);_medRefrescarClimaForm()" style="width:22px;height:22px;background:#FEE2E2;color:#DC2626;border:none;border-radius:4px;font-size:11px;cursor:pointer">✕</button>
        </div>
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:5px">
          <input type="text" placeholder="Marca / modelo" value="${e(ex.modelo||'')}" oninput="window._medClimaState.estancias[${i}].extras[${idx}].modelo=this.value" style="padding:5px;border:1px solid #FDE68A;border-radius:4px;font-size:11px;box-sizing:border-box">
          <input type="number" step="0.1" placeholder="kW" value="${ex.kw||''}" oninput="window._medClimaState.estancias[${i}].extras[${idx}].kw=parseFloat(this.value)||0" style="padding:5px;border:1px solid #FDE68A;border-radius:4px;font-size:11px;text-align:center;font-weight:700;box-sizing:border-box">
        </div>
      </div>`;
    });
  }
  html += `<button type="button" onclick="(window._medClimaState.estancias[${i}].extras=window._medClimaState.estancias[${i}].extras||[]).push({tipo:'toallero'});_medRefrescarClimaForm()" style="width:100%;padding:6px;background:#fff;border:1px dashed #FDE68A;color:#92400E;border-radius:5px;font-size:10.5px;font-weight:700;cursor:pointer">+ Añadir extra (toallero, fancoil aux…)</button>
  </div>`;
  return html;
}

// ── RENDER: Radiador adicional dentro de la misma estancia (mismo selector que main)
// Escribe en es.rad_adicionales[idxAdic] y persiste el cálculo
function _medClimaRenderRadiadorAdicional(es, i, idxAdic, dtRec, potShare, cfgPlanta, nRads) {
  cfgPlanta = cfgPlanta || {};
  const e = _medEsc;
  const rad = es.rad_adicionales[idxAdic] || {};
  const tecnologias = ['Aluminio', 'Baja temperatura', 'Otro'];
  const tec = rad.rad_tecnologia || cfgPlanta.rad_tecnologia || 'Aluminio';
  const potKw = +(potShare/1000).toFixed(2);
  let html = `<div style="background:#fff;border:1px solid #BFDBFE;border-radius:7px;padding:8px;margin-top:5px">
    <div style="background:#FEF3C7;color:#92400E;padding:5px 8px;border-radius:5px;font-size:10.5px;margin-bottom:5px;display:flex;align-items:center;gap:6px">
      <span style="flex:1">Radiador ${idxAdic+2} de ${nRads}</span>
      <input type="number" step="0.1" value="${potKw}" onchange="window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].pot_w=Math.round((parseFloat(this.value)||0)*1000);_medRefrescarClimaForm()" style="width:60px;padding:3px 5px;border:1px solid #FDE68A;border-radius:4px;font-size:11px;text-align:center;font-weight:700;color:#92400E;box-sizing:border-box"> kW
      <button type="button" onclick="window._medClimaState.estancias[${i}].rad_adicionales.splice(${idxAdic},1);_medRefrescarClimaForm()" title="Quitar" style="width:22px;height:22px;background:#FEE2E2;color:#DC2626;border:none;border-radius:4px;font-size:11px;cursor:pointer">✕</button>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:6px">
      ${tecnologias.map(t => {
        const a = tec === t;
        return `<button type="button" onclick="window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].rad_tecnologia='${t}';delete window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].rad_marca;_medRefrescarClimaForm()" style="flex:1;padding:6px;border:${a?'2px':'1px'} solid ${a?'#1E40AF':'#BFDBFE'};background:${a?'#EFF6FF':'#fff'};color:#1E40AF;border-radius:5px;font-size:10.5px;font-weight:${a?'700':'500'};cursor:pointer">${e(t)}</button>`;
      }).join('')}
    </div>`;
  if (tec === 'Otro') {
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
      <input type="text" placeholder="Marca/modelo" value="${e(rad.modelo||'')}" oninput="window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].modelo=this.value" style="padding:6px;border:1px solid var(--gris-200);border-radius:5px;font-size:11.5px">
      <input type="number" step="0.1" placeholder="kW" value="${rad.kw||''}" oninput="window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].kw=parseFloat(this.value)||0" style="padding:6px;border:1px solid var(--gris-200);border-radius:5px;font-size:11.5px;text-align:center;font-weight:700">
    </div></div>`;
    return html;
  }
  if (!window.RADIADORES_CAT) return html + '</div>';
  const C = window.RADIADORES_CAT;
  let marcasFiltro = C.marcas();
  if (tec === 'Aluminio') marcasFiltro = marcasFiltro.filter(m => m.tipo === 'aluminio');
  else if (tec === 'Baja temperatura') marcasFiltro = marcasFiltro.filter(m => m.tipo === 'baja_temp');
  const marcaK = rad.rad_marca || cfgPlanta.rad_marca || marcasFiltro[0]?.k || '';
  // ΔT viene del generador — ya no es editable por radiador
  const dt = dtRec;
  html += `<div style="margin-bottom:5px">
    <select onchange="window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].rad_marca=this.value;delete window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].rad_altura;delete window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].rad_modelo_aquabit;_medRefrescarClimaForm()" style="width:100%;padding:6px;border:1px solid var(--gris-200);border-radius:5px;font-size:11px;background:#fff;box-sizing:border-box">
      ${marcasFiltro.map(m => `<option value="${m.k}" ${marcaK===m.k?'selected':''}>${e(m.marca+' '+m.modelo)}</option>`).join('')}
    </select>
  </div>`;
  let opts = {};
  if (marcaK === 'baxi_dubal' || marcaK === 'baxi_astral' || marcaK === 'baxi_condal') {
    const modeloKey = marcaK === 'baxi_dubal' ? 'DUBAL' : (marcaK === 'baxi_astral' ? 'ASTRAL' : 'CONDAL');
    const alturasDisp = Object.keys(C.BAXI.modelos[modeloKey].alturas);
    const alturaSel = rad.rad_altura || cfgPlanta.rad_altura || C.BAXI.modelos[modeloKey].altura_default;
    opts.altura = parseInt(alturaSel);
    html += `<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px"><span style="font-size:10px;color:#6B7280">Altura</span><select onchange="window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].rad_altura=parseInt(this.value);_medRefrescarClimaForm()" style="flex:1;padding:5px;border:1px solid var(--gris-200);border-radius:5px;font-size:11px;background:#fff">${alturasDisp.map(a => `<option value="${a}" ${parseInt(alturaSel)===parseInt(a)?'selected':''}>${a} cm</option>`).join('')}</select></div>`;
  } else if (marcaK === 'jaga_strada' || marcaK === 'jaga_tempo') {
    const modeloObj = (marcaK === 'jaga_strada') ? C.JAGA_STRADA : C.JAGA_TEMPO;
    const alturaDef = (marcaK === 'jaga_strada') ? '065_est' : '060_est';
    let alturaKey = rad.rad_altura || cfgPlanta.rad_altura || alturaDef;
    if (typeof alturaKey !== 'string' || !modeloObj.alturas[alturaKey]) alturaKey = alturaDef;
    const altObj = modeloObj.alturas[alturaKey];
    const altCm = altObj.altura_cm;
    const twin = !!altObj.twin;
    const alturasCm = [...new Set(Object.keys(modeloObj.alturas).map(k => parseInt(k.split('_')[0])))].sort((a,b)=>a-b);
    const tiposDisp = altObj.tipos_disponibles;
    // Default Auto · usuario puede fijar
    const tipoSel = rad.rad_tipo != null ? rad.rad_tipo : (cfgPlanta.rad_tipo != null ? cfgPlanta.rad_tipo : '');
    const tipoFijo = tiposDisp.includes(tipoSel) ? tipoSel : null;
    opts.alturaKey = alturaKey;
    opts.tipoFijo = tipoFijo;
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">

        </select>
      </div>
      <div><div style="font-size:9px;color:#6B7280;margin-bottom:2px">Profundidad</div>
        <select onchange="window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].rad_tipo=this.value;_medRefrescarClimaForm()" style="width:100%;padding:5px;border:1px solid var(--gris-200);border-radius:5px;font-size:11px;background:#fff;box-sizing:border-box">
          <option value="" ${!tipoFijo?'selected':''}>Auto (óptimo)</option>
          ${tiposDisp.map(t => `<option value="${t}" ${tipoFijo===t?'selected':''}>Tipo ${t}</option>`).join('')}
        </select>

    </div>
    <label class="tap" style="display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid var(--gris-200);border-radius:5px;font-size:10.5px;cursor:pointer;margin-bottom:4px">
      <input type="checkbox" ${twin?'checked':''} onchange="(()=>{const stE=window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}];const cur=stE.rad_altura||'${alturaKey}';const cm=cur.split('_')[0];stE.rad_altura=cm+(this.checked?'_twin':'_est');delete stE.rad_tipo;_medRefrescarClimaForm()})()">
      Twin (refrigeración)
    </label>
    <label class="tap" style="display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid var(--gris-200);border-radius:5px;font-size:10.5px;cursor:pointer;margin-bottom:5px">
      <input type="checkbox" ${(rad.rad_dbh != null ? rad.rad_dbh : cfgPlanta.rad_dbh)?'checked':''} onchange="window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].rad_dbh=this.checked;_medRefrescarClimaForm()">
      DBH/DBE (boost ventilador · ×${(window.RADIADORES_CAT?.factorDBH?.(dt)||2.2).toFixed(1)} a ΔT ${dt})
    </label>`;
    opts.dbh = !!(rad.rad_dbh != null ? rad.rad_dbh : cfgPlanta.rad_dbh);
  } else if (marcaK === 'aquabit_landro' || marcaK === 'aquabit_eume') {
    const prefijo = marcaK === 'aquabit_landro' ? 'LANDRO' : 'EUME';
    const modelosDisp = Object.keys(C.AQUABIT.modelos).filter(k => k.startsWith(prefijo));
    const modSel = rad.rad_modelo_aquabit || cfgPlanta.rad_modelo_aquabit || modelosDisp[0];
    opts.modeloKey = modSel;
    html += `<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px"><span style="font-size:10px;color:#6B7280">Modelo</span><select onchange="window._medClimaState.estancias[${i}].rad_adicionales[${idxAdic}].rad_modelo_aquabit=this.value;_medRefrescarClimaForm()" style="flex:1;padding:5px;border:1px solid var(--gris-200);border-radius:5px;font-size:11px;background:#fff">${modelosDisp.map(m => `<option value="${e(m)}" ${modSel===m?'selected':''}>${e(m)}</option>`).join('')}</select></div>`;
  }
  const auto = _medClimaAutoCalcEmisor(marcaK, potShare, dt, opts);
  if (auto) {
    const colorBg = auto.insuficiente ? '#FEE2E2' : '#DCFCE7';
    const colorTx = auto.insuficiente ? '#991B1B' : '#15803D';
    let info = '';
    if (auto.tipo === 'baxi') info = `<strong>${auto.elementos} elementos</strong> · ${auto.w_real} W · sobredim. ${auto.sobre_dim_pct}%`;
    else if (auto.tipo === 'jaga') info = `<strong>L${auto.longitud_cm} · Tipo ${auto.tipo_intercambiador}</strong> · ${auto.w_real} W · sobredim. ${auto.sobre_dim_pct}%`;
    else if (auto.tipo === 'aquabit') info = `<strong>Ancho ${auto.ancho_cm} cm</strong> · ${auto.w_real} W · sobredim. ${auto.sobre_dim_pct}%`;
    html += `<div style="background:${colorBg};color:${colorTx};border-radius:6px;padding:7px 9px;font-size:11px;line-height:1.4">${info}<div style="font-size:9.5px;opacity:.8;margin-top:2px">Calculado a ΔT ${dt} (T. impulsión actual)</div></div>`;

      const stE = window._medClimaState?.estancias?.[i]?.rad_adicionales?.[idxAdic];
      if (stE) { stE.calc = auto; stE.modelo = auto.descripcion; stE.kw = +(auto.w_real/1000).toFixed(2); }
    }, 0);
  }
  html += `</div>`;
  return html;
}

// ── DISTRIBUCIÓN ────────────────────────────────────────────────
// Constantes para selectores
const _MED_DIST_MATERIALES = ['Multicapa REHAU','PEX','Cobre','Acero negro','Acero galvanizado'];
const _MED_DIST_DIAMETROS = ['16','20','25','32','40','50'];
const _MED_DIST_MODOS = [
  { k:'empotrada', l:'🧱 Empotrada' },
  { k:'vista',     l:'👁️ Vista' },
  { k:'mixta',     l:'🔀 Mixta' },
];

// Resumen breve para cabecera validada
function _medClimaResumenDistribucion(st) {
  const d = st.distribucion || {};
  if (!d.modo && !d.material && !(d.diametros||[]).length && !d.tuberia_ml) return 'Sin configurar';
  const partes = [];
  if (d.modo) partes.push((_MED_DIST_MODOS.find(m=>m.k===d.modo)||{}).l || d.modo);
  if (d.material) partes.push(d.material);
  if (d.tuberia_ml) partes.push(`${d.tuberia_ml} ml`);
  if (d.aislamiento) partes.push(`aisl. ${d.aislamiento_mm||9}mm`);
  return partes.join(' · ');
}

// Render del bloque distribución
function _medClimaRenderDistribucion(st) {
  const e = _medEsc;
  const d = st.distribucion;
  // Cuántos circuitos suelo radiante hay por planta (auto)
  const circuitosPorPlanta = {};
  (st.plantas||[]).forEach(p => circuitosPorPlanta[p] = 0);
  st.estancias.forEach(es => {
    const cfg = st.config_plantas?.[es.planta || st.plantas[0]];
    if (cfg?.sistema === 'suelo_radiante' && es.sr_calc?.circuitos) {
      circuitosPorPlanta[es.planta || st.plantas[0]] += es.sr_calc.circuitos;

// Cálculo de carga térmica por estancia + totales
function _medClimaCalcCargasEstancia(es, factorSegPct) {
  const m2 = (parseFloat(es.ancho_cm)||0) * (parseFloat(es.largo_cm)||0) / 10000;
  const wm2_calor = _MED_CLIMA_W_AISLAMIENTO[es.aislamiento || 'Normal'] || 75;
  const factor = 1 + (factorSegPct || 0) / 100;
  const calor_w = es.calor !== false ? Math.round(m2 * wm2_calor * factor) : 0;
  const frio_w  = es.frio === true  ? Math.round(m2 * _MED_CLIMA_W_FRIO_BASE * factor) : 0;
  return {
    m2,
    calor_w,
    calor_kw: +(calor_w/1000).toFixed(2),
    calor_kcal: Math.round(calor_w * 0.86),
    frio_w,
    frio_kw: +(frio_w/1000).toFixed(2),
    frio_kcal: Math.round(frio_w * 0.86),
  };
}

function _medClimaRecalcularTotales() {
  const st = window._medClimaState;
  if (!st) return;
  let totalCalorW = 0, totalFrioW = 0;
  st.estancias.forEach((es, i) => {
    const c = _medClimaCalcCargasEstancia(es, st.factor_seg);
    totalCalorW += c.calor_w;
    totalFrioW  += c.frio_w;
    // Mostrar m² actualizado
    const m2El = document.getElementById('mcM2_' + i);
    if (m2El) m2El.textContent = c.m2 ? c.m2.toFixed(2) : '—';
    // Mostrar cargas por estancia
    const cargasEl = document.getElementById('mcCargas_' + i);
    if (cargasEl) {
      const partes = [];
      if (c.calor_w) partes.push(`🔥 ${c.calor_kw} kW · ${c.calor_kcal} kcal/h`);
      if (c.frio_w)  partes.push(`❄️ ${c.frio_kw} kW · ${c.frio_kcal} kcal/h`);
      cargasEl.innerHTML = partes.length ? partes.join('<br>') : '<em style="color:#9CA3AF">Sin cargas</em>';
    }
  });
  const tCal = document.getElementById('mcTotCalor');
  const tFri = document.getElementById('mcTotFrio');
  if (tCal) tCal.textContent = totalCalorW ? `${(totalCalorW/1000).toFixed(2)} kW · ${Math.round(totalCalorW*0.86)} kcal/h` : '— kW / — kcal/h';
  if (tFri) tFri.textContent = totalFrioW  ? `${(totalFrioW/1000).toFixed(2)} kW · ${Math.round(totalFrioW*0.86)} kcal/h`   : '— kW / — kcal/h';
}

// Re-render completo (cambio de tipo de trabajo)
function _medRefrescarClimaForm() {
  const it = (_medItemEditIdx != null && _medActual?.items?.[_medItemEditIdx]) || {};
  const ubic = document.getElementById('mcUbic')?.value || '';
  const obs  = document.getElementById('mcObserv')?.value || '';
  document.getElementById('medClimaBody').innerHTML = _medRenderClimaForm({ ...it, ubicacion: ubic, observaciones: obs });
  _medClimaRecalcularTotales();
}

async function _medGuardarItemClima() {
  if (!_medActual) return;
  const v = id => (document.getElementById(id)?.value || '').trim();
  const st = window._medClimaState;
  // Calcular totales para guardar
  let totalCalorW = 0, totalFrioW = 0;
  const estanciasGuardar = st.estancias.map(es => {
    const c = _medClimaCalcCargasEstancia(es, st.factor_seg);
    totalCalorW += c.calor_w;
    totalFrioW  += c.frio_w;
    return { ...es, m2: c.m2, calor_w: c.calor_w, frio_w: c.frio_w, calor_kw: c.calor_kw, frio_kw: c.frio_kw };
  });
  const obj = {
    ubicacion: v('mcUbic'),
    tipo_trabajo: st.tipo_trabajo,
    factor_seg: st.factor_seg,
    t_ambiente: st.t_ambiente != null ? st.t_ambiente : 21,
    plantas: st.plantas || ['Vivienda'],
    config_plantas: st.config_plantas || {},
    estancias: estanciasGuardar,
    sistema: st.sistema || '',
    generador: st.generador || {},
    distribucion: st.distribucion || {},
    validados: st.validados || {},
    totales: {
      calor_w:  totalCalorW,
      calor_kw: +(totalCalorW/1000).toFixed(2),
      calor_kcal: Math.round(totalCalorW * 0.86),
      frio_w:   totalFrioW,
      frio_kw:  +(totalFrioW/1000).toFixed(2),
      frio_kcal: Math.round(totalFrioW * 0.86),
    },
    observaciones: v('mcObserv'),
  };
  const items = [...(_medActual.items || [])];
  if (_medItemEditIdx == null) items.push(obj);
  else items[_medItemEditIdx] = obj;
  _medActual.items = items;
  await _medGuardar(_medActual.id, { items, estado: 'medido' });
  document.getElementById('_medModalItem')?.remove();
  renderMedicionDetalle(document.getElementById('appBody'));
}

async function _medGuardarItem() {
  if (!_medActual) return;
  const pl = MED_PLANTILLAS[_medActual.tipo] || MED_PLANTILLAS.otra;
  const obj = {};
  for (const c of pl.campos) {
    const el = document.getElementById('medi_' + c.key);
    if (!el) continue;
    if (el.dataset.multiselect === '1') {
      obj[c.key] = [...el.querySelectorAll('button.on')].map(b => b.dataset.v);
    } else {
      obj[c.key] = el.value;
    }
  }
  const items = [...(_medActual.items || [])];
  if (_medItemEditIdx == null) items.push(obj);
  else items[_medItemEditIdx] = obj;
  _medActual.items = items;
  await _medGuardar(_medActual.id, { items, estado: 'medido' });
  document.getElementById('_medModalItem')?.remove();
  renderMedicionDetalle(document.getElementById('appBody'));
}

async function _medBorrarItem() {
  if (!_medActual || _medItemEditIdx == null) return;
  const items = [...(_medActual.items || [])];
  items.splice(_medItemEditIdx, 1);
  _medActual.items = items;
  await _medGuardar(_medActual.id, { items });
  document.getElementById('_medModalItem')?.remove();
  renderMedicionDetalle(document.getElementById('appBody'));
}

// ── Helpers comunes para presupuesto/exportar ──────────────────────
function _medConstruirLineas(m) {
  const pl = MED_PLANTILLAS[m.tipo] || MED_PLANTILLAS.otra;
  return (m.items || []).map(it => {
    let cantidad = parseFloat(it.cantidad) || 1;
    if (m.tipo === 'suelo') {
      const l = parseFloat(it.largo) || 0, a = parseFloat(it.ancho) || 0;
      if (l && a) cantidad = parseFloat((l*a).toFixed(2));
    } else if (m.tipo === 'pintura' && it.metros) {
      cantidad = parseFloat(it.metros) || 1;
    } else if (m.tipo === 'bano' && it.metros) {
      cantidad = parseFloat(it.metros) || 1;
    }
    return {
      desc: pl.descripcionItem(it),
      cant: cantidad,
      precio: 0,
      iva: 21,
      dto: 0,
      observaciones: it.observaciones || '',
    };
  });
}

// ── Generar presupuesto en el ERP ──────────────────────────────────
async function _medGenerarPresupuesto() {
  if (!_medActual) return;
  const m = _medActual;
  const pl = MED_PLANTILLAS[m.tipo] || MED_PLANTILLAS.otra;
  if (!(m.items || []).length) { toast('Añade al menos un item antes de generar', 'error'); return; }
  if (!m.cliente_id) { toast('Asigna un cliente antes de generar el presupuesto', 'error'); return; }

  const lineas = _medConstruirLineas(m);
  const cliente = (Array.isArray(clientes) ? clientes : []).find(c => c.id === m.cliente_id);

  // Generar número provisional (igual que en el ERP escritorio)
  const ahora = new Date();
  const yy = String(ahora.getFullYear()).slice(-2);
  const numero = `PR${yy}-${String(Date.now()).slice(-5)}`;

  const obj = {
    empresa_id: EMPRESA.id,
    numero,
    cliente_id: m.cliente_id,
    cliente_nombre: cliente?.nombre || '',
    fecha: ahora.toISOString().split('T')[0],
    titulo: `${pl.label} · ${lineas.length} item${lineas.length!==1?'s':''}`,
    observaciones: (m.notas || '') + (m.notas ? '\n\n' : '') + 'Generado desde medición #' + m.id,
    base_imponible: 0,
    total_iva: 0,
    total: 0,
    lineas,
    estado: 'borrador',
  };

  const { data, error } = await sb.from('presupuestos').insert(obj).select().single();
  if (error) { toast('Error generando presupuesto: ' + error.message, 'error'); return; }

  await _medGuardar(m.id, { estado: 'presupuestado', resultado_tipo: 'presupuesto', resultado_id: data?.id || null });
  toast('📑 Presupuesto ' + numero + ' creado ✓', 'success');
  navigateTo('mediciones');
}
