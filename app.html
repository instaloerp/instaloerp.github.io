    ${p.albaranes_compra && p.albaranes_compra.length ? `<div style="margin-bottom:12px;padding:12px;background:#FFF7ED;border-radius:8px;border:1px solid #FDBA74">
      <div style="font-weight:700;font-size:12px;margin-bottom:8px;color:#92400E">🛒 Compras externas (${p.albaranes_compra.length} albarán(es))</div>
      ${p.albaranes_compra.map(a => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #FDE68A">
        <span style="font-size:12px;font-weight:600">${a.numero || 'Sin número'}</span>
        ${a.foto ? '<a href="' + a.foto + '" target="_blank" style="font-size:11px;color:#1D4ED8">📸 Ver foto</a>' : '<span style="font-size:10px;color:var(--rojo)">Sin foto</span>'}
      </div>`).join('')}
    </div>` : ''}

    ${p.mano_obra && p.mano_obra.length ? `<div style="margin-bottom:12px;padding:12px;background:var(--violeta-light);border-radius:8px">
      <div style="font-weight:700;font-size:12px;margin-bottom:8px">👷 Mano de obra</div>
      ${p.mano_obra.map(mo => `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12.5px;border-bottom:1px solid var(--gris-100)">
        <span>${mo.descripcion||'Trabajo'}${mo.es_desplazamiento ? ` · ${mo.km||0} km` : ` · ${mo.minutos||0} min`}${esJefe ? ` × ${(mo.precio_hora||0).toFixed(2)}€/${mo.es_desplazamiento?'km':'h'}` : ''}</span>
        ${esJefe ? `<span style="font-weight:700">${(parseFloat(mo.total)||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>` : ''}
      </div>`).join('')}
      ${esJefe ? `<div style="display:flex;justify-content:space-between;padding:8px 0 0;font-weight:800;font-size:13px">
        <span>Total mano obra:</span>
        <span>${p.mano_obra.reduce((s,mo) => s+(parseFloat(mo.total)||0), 0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
      </div>` : ''}
    </div>` : ''}

    <!-- Formulario asociado (renderizado por pfApp_*) -->
    <div id="pfApp_wrap" style="margin-bottom:12px"></div>

    ${['completado','revisado','facturado','pendiente_firma_cliente'].includes(p.estado) && p.firma_url ? `<div style="margin-bottom:12px">
      <div style="font-weight:700;font-size:12px;margin-bottom:4px">✍️ Firma cliente${p.cliente_nombre_firma ? ' — ' + p.cliente_nombre_firma : ''}${p.cliente_dni ? ' · ' + p.cliente_dni : ''}</div>
      <img src="${p.firma_url}" style="max-width:100%;max-height:120px;border:1px solid var(--gris-200);border-radius:8px;background:#fff">
    </div>` : ''}

    ${['completado','revisado','facturado','pendiente_firma_cliente'].includes(p.estado) && p.firma_operario_url ? `<div style="margin-bottom:12px">
      <div style="font-weight:700;font-size:12px;margin-bottom:4px">👷 Firma operario${p.operario_nombre_firma ? ' — ' + p.operario_nombre_firma : ''}</div>
      <img src="${p.firma_operario_url}" style="max-width:100%;max-height:120px;border:1px solid var(--gris-200);border-radius:8px;background:#fff">
    </div>` : ''}

    ${p.ubicacion_inicio ? `<div style="margin-bottom:12px;padding:8px 12px;background:var(--verde-light);border-radius:8px;font-size:12px">
      <span style="font-weight:700">📍 Ubicación inicio:</span>
      <a href="https://maps.google.com/?q=${p.ubicacion_inicio.lat},${p.ubicacion_inicio.lng}" target="_blank" style="color:var(--azul)">${p.ubicacion_inicio.lat.toFixed(5)}, ${p.ubicacion_inicio.lng.toFixed(5)}</a>
      ${p.inicio_at ? ` · ${new Date(p.inicio_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}` : ''}
    </div>` : ''}

    ${p.ubicacion_fin ? `<div style="margin-bottom:12px;padding:8px 12px;background:var(--verde-light);border-radius:8px;font-size:12px">
      <span style="font-weight:700">🏁 Ubicación fin:</span>
      <a href="https://maps.google.com/?q=${p.ubicacion_fin.lat},${p.ubicacion_fin.lng}" target="_blank" style="color:var(--azul)">${p.ubicacion_fin.lat.toFixed(5)}, ${p.ubicacion_fin.lng.toFixed(5)}</a>
      ${p.completado_at ? ` · ${new Date(p.completado_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}` : ''}
    </div>` : ''}

    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--gris-200)">
    ${(p.estado === 'programado' || p.estado === 'borrador') ? `<button class="btn btn-primary" style="background:var(--acento)" onclick="iniciarParteConGPS(${p.id})">🔧 Iniciar trabajo</button>` : ''}
    ${p.estado === 'en_curso' ? `<button class="btn btn-primary" style="background:var(--verde)" onclick="openInformarWizard(${p.id})">📋 Informar parte</button>` : ''}
    ${p.estado === 'pendiente_firma_cliente' ? `
      <div style="padding:14px;background:#F5F3FF;border:1.5px solid #DDD6FE;border-radius:12px;margin-bottom:8px">
        <div style="text-align:center;margin-bottom:10px">
          <span style="font-size:28px">✍️</span>
          <div style="font-weight:800;font-size:14px;color:#7C3AED;margin-top:4px">Pendiente de firma del cliente</div>
          <div style="font-size:12px;color:var(--gris-500);margin-top:2px">El enlace de firma fue enviado${p.firma_remota_enviado_at ? ' el ' + new Date(p.firma_remota_enviado_at).toLocaleDateString('es-ES') : ''}</div>
        </div>
        <button class="btn btn-primary" style="width:100%;background:#7C3AED" onclick="reenviarFirmaRemota(${p.id})">📱 Reenviar enlace de firma por WhatsApp</button>
      </div>
    ` : ''}
    ${['completado','revisado','facturado'].includes(p.estado) ? `<div style="text-align:center;padding:12px;color:var(--gris-400);font-size:13px;font-style:italic">🔒 Parte informado — no editable</div>` : ''}
    ${esJefe && p.estado !== 'facturado' ? `
      <select onchange="if(this.value){cambiarEstado(${p.id},this.value)}" style="padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font)">
        <option value="">Cambiar estado manualmente...</option>
        ${Object.keys(PT_ESTADOS).filter(e=>e!==p.estado).map(e=>`<option value="${e}">${PT_ESTADOS[e].ico} ${PT_ESTADOS[e].label}</option>`).join('')}
      </select>
    ` : ''}
    </div>
  `;

  document.getElementById('modalContent').innerHTML = html;
  openModal('Parte ' + (p.numero || ''));

  // Cargar formulario asociado en el wrap (no bloquea el render del modal)
  if (typeof pfApp_init === 'function') { pfApp_init(p.id, p.estado).catch(e => console.warn('[pfApp_init]', e)); }
}

// ═══════════════════════════════════════════════════════════════
// WIZARD: COMPLETAR PARTE (paso a paso)
// Pasos: 1) Descripción  2) Fotos  3) Materiales  4) Firma
// ═══════════════════════════════════════════════════════════════

let WIZ_STEPS = [
  { id:'desc',  ico:'📝', label:'Descripción' },
  { id:'fotos', ico:'📷', label:'Fotos' },
  { id:'mat',   ico:'🔧', label:'Materiales' },
  { id:'firma', ico:'✍️', label:'Firma' },
];

// Reconstruye WIZ_STEPS según si el parte tiene formulario asociado.
// El paso 'formulario' va entre 'desc' y 'fotos'.
function _wizSetSteps(tieneFormulario) {
  WIZ_STEPS = [
    { id:'desc',  ico:'📝', label:'Descripción' },
    ...(tieneFormulario ? [{ id:'formulario', ico:'📋', label:'Formulario' }] : []),
    { id:'fotos', ico:'📷', label:'Fotos' },
    { id:'mat',   ico:'🔧', label:'Materiales' },
    { id:'firma', ico:'✍️', label:'Firma' },
  ];
}

function openCompletarWizard(id) {
  // Legacy — redirigir a openInformarWizard
  openInformarWizard(id);
}

function renderWizStep() {
  const p = misPartes.find(x => x.id === _wiz.parteId);
  if (!p) return;
  const step = _wiz.step;
  const isLast = step === WIZ_STEPS.length - 1;

  // Stepper — trackear paso máximo alcanzado
  if (!_wiz.maxStep || _wiz.maxStep < step) _wiz.maxStep = step;
  const stepper = WIZ_STEPS.map((s, i) => {
    const isDone = i < step || (i <= _wiz.maxStep && i !== step);
    const cls = i === step ? 'active' : (isDone ? 'done' : '');
    const clickable = isDone ? `onclick="wizGoToStep(${i})"` : '';
    return `<div class="wiz-step ${cls}" ${clickable}>${isDone ? '✓' : s.ico}<br>${s.label}</div>`;
  }).join('');

  let content = '';
  const stepId = WIZ_STEPS[step]?.id;

  // ── STEP 1: Descripción ──
  if (stepId === 'desc') {
    content = `
      <div class="field">
        <label>🔧 Trabajo realizado *</label>
        <textarea id="wz_desc" rows="4" placeholder="Describe el trabajo que has realizado..." style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${_wiz.desc}</textarea>
      </div>
      <div class="field">
        <label style="display:flex;align-items:center;gap:10px;margin-bottom:8px;font-weight:600;font-size:14px;cursor:pointer">
          <input id="wz_pend_check" type="checkbox" style="width:20px;height:20px;flex-shrink:0" ${_wiz.pendientes_checked ? 'checked' : ''} onchange="wizSaveCurrentStep();_wiz.pendientes_checked=this.checked;document.getElementById('wz_pend_gremios').style.display=this.checked?'block':'none';">
          <span>Quedan trabajos pendientes</span>
        </label>
        <div id="wz_pend_gremios" style="display:${_wiz.pendientes_checked?'block':'none'};margin-top:8px">
          <div style="font-size:12px;color:var(--gris-500);margin-bottom:8px">Selecciona los gremios necesarios y describe el trabajo pendiente:</div>
          ${GREMIOS.map(g => {
            const checked = _wiz.gremios_pendientes && _wiz.gremios_pendientes[g.id];
            const desc = (checked && checked.descripcion) || '';
            return `<div style="margin-bottom:8px;border:1.5px solid ${checked?'var(--azul)':'var(--gris-200)'};border-radius:10px;overflow:hidden;transition:border-color .2s" id="wz_gremio_wrap_${g.id}">
              <label style="display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;background:${checked?'#EFF6FF':'#fff'}" onclick="event.stopPropagation()">
                <input type="checkbox" class="wz_gremio_chk" data-gremio="${g.id}" style="width:18px;height:18px;flex-shrink:0" ${checked?'checked':''} onchange="wizToggleGremio('${g.id}',this.checked)">
                <span style="font-size:18px">${g.ico}</span>
                <span style="font-weight:600;font-size:13px">${g.label}</span>
              </label>
              <div id="wz_gremio_desc_${g.id}" style="display:${checked?'block':'none'};padding:0 12px 10px">
                <textarea rows="2" placeholder="¿Qué queda pendiente de ${g.label.toLowerCase()}?" data-gremio="${g.id}" class="wz_gremio_txt" style="width:100%;padding:8px 10px;border:1px solid var(--gris-200);border-radius:8px;font-size:13px;font-family:var(--font);resize:vertical">${desc}</textarea>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="field">
        <label>📝 Notas internas</label>
        <textarea id="wz_obs" rows="2" placeholder="Notas adicionales..." style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font);resize:vertical">${_wiz.observaciones}</textarea>
        <div style="font-size:11px;color:var(--gris-500);font-style:italic;margin-top:4px">Solo visible para la empresa, el cliente no las ve.</div>
      </div>
    `;
  }

  // ── STEP: Formulario (solo si el parte tiene plantilla asociada) ──
  if (stepId === 'formulario') {
    content = `<div id="pfApp_wrap_wiz"></div>`;
  }

  // ── STEP 2: Fotos ──
  if (stepId === 'fotos') {
    const allFotos = [..._wiz.fotos, ..._wiz.fotosNuevas];
    content = `
      <div style="margin-bottom:12px">
        <p style="font-size:13px;color:var(--gris-500)">Añade fotos del trabajo realizado. En dispositivos móviles, podrás usar la cámara o la galería.</p>
      </div>
      <div class="foto-grid">
        ${allFotos.map((f, i) => `
          <div class="foto-thumb">
            <img src="${typeof f === 'object' ? f.data : f}" alt="Foto ${i+1}">
            <button class="del" onclick="wizRemoveFoto(${i})">✕</button>
          </div>
        `).join('')}
        <div class="foto-add" onclick="wizAbrirSelectorFoto()" style="background:var(--azul-light);border-color:var(--azul)">
          <span style="font-size:28px;color:var(--azul)">+</span>
          <span style="color:var(--azul);font-weight:700">Añadir foto</span>
        </div>
      </div>
      <p style="font-size:11px;color:var(--gris-400);text-align:center">${allFotos.length} foto${allFotos.length!==1?'s':''}</p>
    `;
  }

  // ── STEP 3: Materiales + Mano de obra ──
  if (stepId === 'mat') {
    const manoObra = _wiz.manoObra || [];
    const totalMat = _wiz.materiales.reduce((s,m) => s + (parseFloat(m.total)||0), 0);
    const totalMO = manoObra.reduce((s,mo) => s + (parseFloat(mo.total)||0), 0);
    content = `
      <div style="margin-bottom:12px">
        <p style="font-size:13px;color:var(--gris-500)">Añade materiales del catálogo y registra la mano de obra.</p>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-weight:800;font-size:13px;color:var(--azul)">🔧 Materiales</span>
        ${miFurgoneta ? `<span style="font-size:10px;color:var(--gris-400)">🚐 ${miFurgoneta.nombre}</span>` : ''}
      </div>
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="wizAddMermaRotura('merma')" style="font-size:11px;color:#92400E;border-color:#FDE68A">⚠️ Merma</button>
        <button class="btn btn-ghost btn-sm" onclick="wizAddMermaRotura('rotura')" style="font-size:11px;color:#991B1B;border-color:#FECACA">💥 Rotura</button>
        <button class="btn btn-ghost btn-sm" onclick="wizOCRScan()" style="font-size:11px;color:#1D4ED8;border-color:#93C5FD" id="btnOcrScan">📷 Escanear documento</button>
        <input type="file" id="ocrWizFileInput" accept="image/*" capture="environment" style="display:none" onchange="_wizOCRFileSelected(this)">
      </div>
      <div class="mat-search" style="margin-bottom:12px">
        <input id="wz_mat_buscar" type="text" placeholder="🔍 Buscar artículo o escribir nombre..."
          style="width:100%;padding:12px;border:1.5px solid var(--gris-200);border-radius:10px;font-size:14px;font-family:var(--font)"
          oninput="wizSearchMat(this.value)" onfocus="wizSearchMat(this.value)">
        <div id="wz_mat_results" class="mat-search-results"></div>
      </div>
      <div id="wz_mat_list">
        ${_wiz.materiales.length ? _wiz.materiales.map((m, i) => renderWizMatRow(m, i)).join('') : '<div style="text-align:center;padding:12px;color:var(--gris-400);font-size:12px">Sin materiales</div>'}
      </div>
      ${esJefe ? `<div style="margin-top:8px;padding:8px 12px;background:var(--gris-50);border-radius:8px;display:flex;justify-content:space-between">
        <span style="font-weight:700;font-size:12px">Total materiales:</span>
        <span style="font-weight:800;font-size:13px">${totalMat.toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
      </div>` : ''}

      <!-- Compras externas: se gestionan via OCR escanear albarán -->

      ${esJefe ? `<div style="margin-top:20px;padding-top:16px;border-top:2px solid var(--gris-200)">
        <div style="font-weight:800;font-size:13px;margin-bottom:8px;color:var(--violeta)">👷 Mano de obra</div>
        <div id="wz_mo_list">
          ${manoObra.length ? manoObra.map((mo, i) => renderWizMORow(mo, i)).join('') : '<div style="text-align:center;padding:12px;color:var(--gris-400);font-size:12px">Sin mano de obra registrada</div>'}
        </div>
        <button class="btn btn-secondary btn-sm" onclick="wizAddManoObra()" style="margin-top:8px;width:100%">➕ Añadir mano de obra</button>
        <div style="margin-top:8px;padding:8px 12px;background:var(--violeta-light);border-radius:8px;display:flex;justify-content:space-between">
          <span style="font-weight:700;font-size:12px">Total mano obra:</span>
          <span style="font-weight:800;font-size:13px">${totalMO.toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
        </div>
      </div>

      <div style="margin-top:16px;padding:12px;background:var(--azul-light);border-radius:8px;display:flex;justify-content:space-between">
        <span style="font-weight:800;font-size:14px">TOTAL:</span>
        <span style="font-weight:800;font-size:15px;color:var(--azul)">${(totalMat + totalMO).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>
      </div>` : ''}
    `;
  }

  // ── STEP 4: Firma ──
  if (stepId === 'firma') {
    const operarioNombre = CP?.nombre || 'Operario';
    // Si el parte tiene firma_opcional, mostrar aviso y no pedir firmas
    const _parteActual = misPartes.find(x => x.id === _wiz.parteId);
    if (_parteActual?.firma_opcional) {
      content = `
        <div style="padding:30px 20px;text-align:center">
          <div style="font-size:48px;margin-bottom:12px">✅</div>
          <h3 style="font-size:16px;font-weight:700;margin-bottom:8px;color:var(--gris-700)">Este parte no requiere firma</h3>
          <p style="font-size:13px;color:var(--gris-500)">El administrador ha marcado este parte como exento de firma del cliente y operario.</p>
          <p style="font-size:12px;color:var(--gris-400);margin-top:12px">Puedes completar directamente el parte pulsando el botón de abajo.</p>
        </div>
      `;
    } else {
    content = `
      <div style="margin-bottom:12px">
        <p style="font-size:13px;color:var(--gris-500)">Firmas para cerrar el parte.</p>
      </div>

      <!-- Firma persona responsable en la visita (expandible, cerrado por defecto) -->
      <div style="margin-top:12px;border:2px solid ${_wiz.firmaData_validated ? 'var(--verde)' : 'var(--azul)'};border-radius:12px;overflow:hidden" id="firmaClienteContainer">
        <div onclick="toggleFirmaPanel('cliente')" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:${_wiz.firmaData_validated ? 'var(--verde-light)' : 'var(--azul-light)'};cursor:pointer">
          <span style="font-size:13px;font-weight:700;color:${_wiz.firmaData_validated ? 'var(--verde)' : 'var(--azul)'}">✍️ Persona responsable en la visita <span style="color:var(--rojo)">*</span></span>
          <span id="firmaClienteToggle" style="font-size:18px;transition:transform .3s">${_wiz.firmaData_validated ? '✅' : '▼'}</span>

        <div id="firmaClientePanel" style="display:none;padding:12px">
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <div style="flex:1">
              <label style="font-size:11px;font-weight:700;color:var(--gris-500)">NOMBRE COMPLETO <span style="color:var(--rojo)">*</span></label>
              <input id="wz_cli_nombre" type="text" placeholder="Nombre y dos apellidos" value="${_wiz.clienteNombre}"
                autocomplete="off" spellcheck="false"
                style="width:100%;padding:10px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:14px;font-family:var(--font)">
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <div style="flex:1">
              <label style="font-size:11px;font-weight:700;color:var(--gris-500)">DNI / NIF <span style="color:var(--rojo)">*</span></label>
              <input id="wz_cli_dni" type="text" placeholder="12345678A" value="${_wiz.clienteDni||''}"
                autocomplete="off" spellcheck="false" inputmode="text"
                style="width:100%;padding:10px;border:1.5px solid var(--gris-200);border-radius:8px;font-size:14px;font-family:var(--font);text-transform:uppercase"
                maxlength="10" oninput="this.value=this.value.toUpperCase()">
            </div>
          </div>
          <div id="firmaClientePreview" style="border:2px dashed var(--gris-200);border-radius:12px;padding:20px;text-align:center;background:var(--gris-50);min-height:80px;display:flex;align-items:center;justify-content:center">
            ${_wiz.firmaData_validated ? '<img src="'+_wiz.firmaData+'" style="max-width:100%;max-height:120px;border-radius:8px"><div style="color:var(--verde);font-weight:700;font-size:12px;margin-top:6px">✅ Firma validada</div>' : (_wiz.firmaData ? '<img src="'+_wiz.firmaData+'" style="max-width:100%;max-height:120px;border-radius:8px">' : '<span style="color:var(--gris-400)">Sin firma todavía</span>')}

function _closeMaterialSearch(e) {

function wizToggleGremio(gremioId, checked) {
  const wrap = document.getElementById('wz_gremio_wrap_' + gremioId);
  const descDiv = document.getElementById('wz_gremio_desc_' + gremioId);
  if (wrap) {
    wrap.style.borderColor = checked ? 'var(--azul)' : 'var(--gris-200)';
    wrap.querySelector('label').style.background = checked ? '#EFF6FF' : '#fff';
  }
  if (descDiv) descDiv.style.display = checked ? 'block' : 'none';
  // Focus en textarea si se activa
  if (checked && descDiv) {
    const ta = descDiv.querySelector('textarea');
    if (ta) setTimeout(() => ta.focus(), 100);
  }
  wizSaveCurrentStep();
}

function _buildPendientesText() {
  if (!_wiz.gremios_pendientes) return '';
  const lines = [];
  GREMIOS.forEach(g => {
    const data = _wiz.gremios_pendientes[g.id];
    if (data) {
      lines.push(`${g.ico} ${g.label}: ${data.descripcion || '(sin descripción)'}`);
    }
  });
  return lines.join('\n');
}

function wizSaveCurrentStep() {
  const _stepId = WIZ_STEPS[_wiz.step]?.id;
  if (_stepId === 'desc') {
    _wiz.desc = document.getElementById('wz_desc')?.value || '';
    _wiz.pendientes_checked = document.getElementById('wz_pend_check')?.checked || false;
    _wiz.observaciones = document.getElementById('wz_obs')?.value || '';
    // Guardar gremios seleccionados con sus descripciones
    if (!_wiz.gremios_pendientes) _wiz.gremios_pendientes = {};
    document.querySelectorAll('.wz_gremio_chk').forEach(chk => {
      const gid = chk.dataset.gremio;
      if (chk.checked) {
        const txt = document.querySelector(`.wz_gremio_txt[data-gremio="${gid}"]`)?.value || '';
        _wiz.gremios_pendientes[gid] = { descripcion: txt };
      } else {
        delete _wiz.gremios_pendientes[gid];
      }
    });
    // Generar texto plano de pendientes para compatibilidad
    _wiz.pendientes = _buildPendientesText();
  }
  if (_stepId === 'firma') {
    _wiz.clienteNombre = document.getElementById('wz_cli_nombre')?.value || '';
    _wiz.clienteDni = document.getElementById('wz_cli_dni')?.value?.toUpperCase()?.trim() || '';
    // Email se gestiona en el modal de envío post-completado, no aquí
    // Firmas se capturan en cerrarFirmaFullscreen()
  }
  // Paso formulario: las respuestas se autoguardan via pfApp_save (debounce).
  // Forzamos un save final inmediato al avanzar.
  if (_stepId === 'formulario' && typeof pfApp_save === 'function') {
    pfApp_save().catch(()=>{});
  }
}

function _wizAutoSave() {
  try {
    // Guardar estado del wizard en localStorage (sin firmas base64 para no saturar)
    const save = Object.assign({}, _wiz);
    delete save.firmaData;
    delete save.firmaOperario;
    delete save.fotosNuevas; // Las fotos nuevas son blobs, no se pueden serializar
    localStorage.setItem('instalo_wiz_' + _wiz.parteId, JSON.stringify(save));
  } catch(e) { console.warn('Auto-save wizard error:', e); }
}

function _wizClearAutoSave(parteId) {
  try { localStorage.removeItem('instalo_wiz_' + parteId); } catch(e) {}
}

function _wizLoadAutoSave(parteId) {
  try {
    const saved = localStorage.getItem('instalo_wiz_' + parteId);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}

function wizNext() {
  wizSaveCurrentStep();
  const _stepId = WIZ_STEPS[_wiz.step]?.id;
  // Validar paso actual (obligatorio en modo informar, no en edición)
  if (_stepId === 'desc') {
    if (!_wiz.desc.trim()) {
      toast('⚠️ Debes describir el trabajo realizado', 'error'); return;
    }
  }
  // Validar paso formulario: bloquear si quedan obligatorios visibles vacíos
  if (_stepId === 'formulario' && typeof pfApp_validar === 'function') {
    const v = pfApp_validar();
    if (!v.ok) {
      toast('⚠️ Faltan campos obligatorios: ' + v.faltantes.slice(0,2).join(', ') + (v.faltantes.length>2 ? ` y ${v.faltantes.length-2} más` : ''), 'error', 5500);
      return;
    }
  }
  document.removeEventListener('click', _closeMaterialSearch);
  _wiz.step++;
  _wizAutoSave();
  renderWizStep();
}

function wizPrev() {
  wizSaveCurrentStep();
  document.removeEventListener('click', _closeMaterialSearch);
  _wiz.step--;
  _wizAutoSave();
  renderWizStep();
}

// Navegar a un paso ya visitado (verde)
function wizGoToStep(targetStep) {
  if (targetStep === _wiz.step) return; // Ya estás ahí
  if (targetStep > _wiz.maxStep) return; // No se puede ir a pasos no visitados
  wizSaveCurrentStep();
  document.removeEventListener('click', _closeMaterialSearch);
  _wiz.step = targetStep;
  _wizAutoSave();
  renderWizStep();
}

// Crea un input file NUEVO cada vez para que el móvil siempre muestre el selector
// (cámara / galería / archivos) sin recordar la última elección
function wizAbrirSelectorFoto() {
  const old = document.getElementById('wz_foto_gal');
  if (old) old.remove();
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.id = 'wz_foto_gal';
  inp.accept = 'image/*';
  inp.multiple = true;
  inp.style.display = 'none';
  inp.onchange = function() { wizAddFotos(this.files); };
  document.body.appendChild(inp);
  inp.click();
}

function wizAddFotos(files) {
  Array.from(files).forEach(f => {
    const reader = new FileReader();
    reader.onload = (e) => {
      _wiz.fotosNuevas.push({ data: e.target.result, name: f.name });
      renderWizStep();
    };
    reader.readAsDataURL(f);
  });
}

function wizRemoveFoto(idx) {
  const existentes = _wiz.fotos.length;
  if (idx < existentes) {
    _wiz.fotos.splice(idx, 1);
  } else {
    _wiz.fotosNuevas.splice(idx - existentes, 1);
  }
  renderWizStep();
}

// ── OCR: Normalizar nombre para matching flexible ──
function _ocrNormalizeName(str) {
  if (!str) return '';
  return str
    .toUpperCase()
    .replace(/[\/\\\-_.·,:;()[\]{}'"´`]/g, '') // quitar puntuación y separadores
    .replace(/\s+/g, ' ')                        // colapsar espacios
    .trim();
}

function _ocrFindArticulo(nombre, codigo) {
  const codLow = (codigo || '').toLowerCase().trim();
  const nomLow = (nombre || '').toLowerCase().trim();
  const normBusca = _ocrNormalizeName(nombre);
  // Código limpio para comparación fuzzy (sin puntuación ni espacios)
  const codLimpio = codLow.replace(/[\s\-_./\\,;:()[\]{}'"]/g, '');

  // 1. Match exacto por código de artículo → seguro
  if (codLow) {
    const byCode = articulos.find(a => a.codigo && a.codigo.toLowerCase().trim() === codLow);
    if (byCode) return byCode;
  }

  // 2. Match por referencia_fabricante (código del proveedor en el albarán) — exacto + fuzzy
  if (codLow) {
    const byRef = articulos.find(a => a.referencia_fabricante && a.referencia_fabricante.toLowerCase().trim() === codLow);
    if (byRef) return byRef;
    // Fuzzy: limpiar puntuación y comparar
    if (codLimpio) {
      const byRefFuzzy = articulos.find(a => a.referencia_fabricante && a.referencia_fabricante.replace(/[\s\-_./\\,;:()[\]{}'"]/g, '').toLowerCase() === codLimpio);
      if (byRefFuzzy) return byRefFuzzy;
    }
  }

  // 3. Scoring multicritério: código proveedor + nombre normalizado
  //    Si coinciden 2+ criterios → match seguro
  let bestMatch = null, bestScore = 0;
  for (const a of articulos) {
    let score = 0;
    // Criterio A: código coincide con referencia_fabricante
    if (codLow && a.referencia_fabricante && a.referencia_fabricante.toLowerCase().trim() === codLow) score++;
    // Criterio B: código coincide con código artículo
    if (codLow && a.codigo && a.codigo.toLowerCase().trim() === codLow) score++;
    // Criterio C: nombre normalizado coincide
    if (normBusca.length >= 5) {
      const normArt = _ocrNormalizeName(a.nombre);
      if (normArt === normBusca || (normArt.length >= 5 && (normArt.includes(normBusca) || normBusca.includes(normArt)))) score++;
    }
    // Criterio D: nombre parcial (primeros 15 chars)
    if (nomLow.length >= 8 && a.nombre && a.nombre.toLowerCase().includes(nomLow.substring(0, 15))) score++;

    if (score >= 2 && score > bestScore) { bestScore = score; bestMatch = a; }
  }
  if (bestMatch) return bestMatch;

  // 4. Fallback: match solo por nombre normalizado (1 criterio, pero fuerte)
  if (normBusca.length >= 8) {
    const byNorm = articulos.find(a => {
      const normArt = _ocrNormalizeName(a.nombre);
      return normArt === normBusca;
    });
    if (byNorm) return byNorm;
  }

  return null;
}

// ── OCR: Escanear documento desde el wizard de materiales ──
function wizOCRScan() {
  if (!EMPRESA?.anthropic_api_key) {
    toast('⚠️ Configura la API key de IA en Ajustes del ERP', 'error');
    return;
  }
  document.getElementById('ocrWizFileInput')?.click();
}

async function _wizOCRFileSelected(input) {
  const file = input.files?.[0];
  if (!file) return;
  input.value = ''; // Reset para poder repetir

  const btn = document.getElementById('btnOcrScan');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Procesando...'; }
  showLoading('📷 Procesando documento con IA...');

  try {
    // Convertir a base64
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    const mimeMatch = base64.match(/^data:([^;]+);/);
    const mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';
    const b64Data = base64.split(',')[1];

    // Decodificar API key (puede estar en base64)
    let apiKey;
    try { apiKey = decodeURIComponent(escape(atob(EMPRESA.anthropic_api_key))); }
    catch(_) { apiKey = EMPRESA.anthropic_api_key; }

    // Llamar Edge Function OCR
    const resp = await fetch('https://gskkqqhbpnycvuioqetj.supabase.co/functions/v1/ocr-documento', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-anthropic-key': apiKey },
      body: JSON.stringify({
        imagen_base64: b64Data,
        media_type: mimeType,
        tipo: 'albaran',
        empresa_id: EMPRESA.id,
        empresa_nombre: EMPRESA.nombre || '',
        empresa_cif: EMPRESA.cif || ''
      })
    });

    const result = await resp.json();
    if (!result.success) throw new Error(result.error || 'Error procesando documento');

    const data = result.data || {};
    const lineas = data.lineas || [];
    if (!lineas.length) {
      toast('⚠️ No se han detectado materiales en el documento', 'warning');
      return;
    }

    // Detectar número de documento
    const numDoc = (data.numero_documento || data.numero || '').trim();

    // Comprobar duplicados: parte actual + albaranes + facturas + partes
    if (numDoc) {
      // 1. En el parte actual (wizard)
      if (!_wiz.albaranes_compra) _wiz.albaranes_compra = [];
      const enParte = _wiz.albaranes_compra.find(a => a.numero && a.numero === numDoc);
      if (enParte) {
        toast(`⚠️ El documento nº ${numDoc} ya está en este parte`, 'error');
        return;
      }
      // 2. En las tablas de COMPRA del ERP + documentos OCR pendientes + otros partes
      try {
        const eid = EMPRESA.id;
        const [resRecep, resFactProv, resPedidos, resPresCom, resOcr, resPartes] = await Promise.all([
          sb.from('recepciones').select('id,numero').eq('empresa_id', eid).eq('numero', numDoc).limit(1),
          sb.from('facturas_proveedor').select('id,numero').eq('empresa_id', eid).eq('numero', numDoc).limit(1),
          sb.from('pedidos_compra').select('id,numero').eq('empresa_id', eid).eq('numero', numDoc).limit(1),
          sb.from('presupuestos_compra').select('id,numero').eq('empresa_id', eid).eq('numero', numDoc).limit(1),
          sb.from('documentos_ocr').select('id,estado,datos_extraidos').eq('empresa_id', eid).in('estado', ['completado','procesando','pendiente']),
          sb.from('partes_trabajo').select('id,numero,albaranes_compra').eq('empresa_id', eid).not('albaranes_compra', 'is', null)
        ]);
        if (resRecep.data?.length) {
          toast(`⚠️ Ya existe una recepción nº ${numDoc}`, 'error');
          return;
        }
        if (resFactProv.data?.length) {
          toast(`⚠️ Ya existe una factura de proveedor nº ${numDoc}`, 'error');
          return;
        }
        if (resPedidos.data?.length) {
          toast(`⚠️ Ya existe un pedido de compra nº ${numDoc}`, 'error');
          return;
        }
        if (resPresCom.data?.length) {
          toast(`⚠️ Ya existe un presupuesto de compra nº ${numDoc}`, 'error');
          return;
        }
        // Documentos OCR ya procesados (pendientes de validar)
        if (resOcr.data) {
          for (const doc of resOcr.data) {
            const ext = doc.datos_extraidos;
            if (ext && (ext.numero_documento === numDoc || ext.numero === numDoc)) {
              toast(`⚠️ Documento nº ${numDoc} ya escaneado (pendiente de validar en OCR)`, 'error');
              return;
            }
          }
        }
        // Documento ya subido en otro parte
        if (resPartes.data) {
          for (const pt of resPartes.data) {
            const albs = Array.isArray(pt.albaranes_compra) ? pt.albaranes_compra : [];
            if (albs.find(a => a.numero && a.numero === numDoc)) {
              toast(`⚠️ Documento nº ${numDoc} ya en parte ${pt.numero || pt.id}`, 'error');
              return;
            }
          }
        }
      } catch(e) { console.warn('Error comprobando duplicados:', e); }
    }

    // Preparar líneas con match de catálogo para preview
    const lineasProcesadas = lineas.map((linea, i) => {
      const nombre = linea.descripcion || linea.nombre || '';
      const codigo = linea.codigo || '';
      const cantidad = parseFloat(linea.cantidad) || 1;
      const precio = parseFloat(linea.precio_unitario) || 0;

      let artMatch = _ocrFindArticulo(nombre, codigo);

      return {
        idx: i, page: 0,
        nombre: artMatch?.nombre || nombre || 'Material OCR',
        codigo: artMatch?.codigo || codigo,
        cantidad, precio: artMatch?.precio_venta || precio,
        unidad: linea.unidad || artMatch?.unidad || 'ud',
        artMatch, selected: true
      };
    });

    // Inicializar estructura multipágina — un solo documento con N fotos
    _ocrPreviewData = {
      numDocumento: numDoc,
      pages: [{ foto: base64, b64Data, mimeType }],
      allLineas: lineasProcesadas,
      ocrResult: data,
      proveedor: data.proveedor?.nombre || (typeof data.proveedor === 'string' ? data.proveedor : '') || '',
      tipoDocumento: data.tipo_documento || 'albaran'
    };

    // Mostrar pantalla de preview
    _ocrRenderPreview();

  } catch(e) {
    console.error('[OCR Wizard]', e);
    toast('Error procesando imagen: ' + (e.message || 'desconocido'), 'error');
  } finally {
    hideLoading();
    if (btn) { btn.disabled = false; btn.textContent = '📷 Escanear documento'; }
  }
}

// ── OCR Preview: pantalla de selección de materiales detectados (multipágina) ──
let _ocrPreviewData = null; // { pages: [{foto, lineas}], allLineas: [{idx,nombre,...,selected}] }

function _ocrRenderPreview() {
  const d = _ocrPreviewData;
  if (!d) return;

  const body = document.getElementById('ocrPreviewBody');
  const totalLineas = d.allLineas.length;
  const numPages = d.pages.length;

  // Título dinámico
  const titleEl = document.getElementById('ocrPreviewTitle');
  if (titleEl) titleEl.textContent = `📋 Materiales detectados` + (numPages > 1 ? ` (${numPages} págs)` : '');

  let html = '';

  // Resumen — en modo wizard se puede seleccionar cuáles van al parte
  const isWizMode = !d._fabMode;
  if (isWizMode) {
    const selCount = d.allLineas.filter(l => l.selected).length;
    html += `<div style="font-size:12px;color:var(--gris-500);margin-bottom:4px;font-weight:600">📦 ${totalLineas} material${totalLineas > 1 ? 'es' : ''} → todos a furgoneta (cantidad recibida)</div>`;
    html += `<div style="font-size:11px;color:#1D4ED8;margin-bottom:10px">🔧 Marca los que van a este parte y ajusta la cantidad (<span id="ocrSelCount">${selCount}</span>/${totalLineas})</div>`;
  } else {
    html += `<div style="font-size:12px;color:var(--gris-500);margin-bottom:10px;font-weight:600">${totalLineas} material${totalLineas > 1 ? 'es' : ''} — todos entrarán en furgoneta como provisional</div>`;
  }

  // Agrupar por página si hay varias
  if (numPages > 1) {
    for (let p = 0; p < numPages; p++) {
      const pageLineas = d.allLineas.filter(l => l.page === p);
      if (!pageLineas.length) continue;
      html += `<div class="ocr-page-badge">Página ${p + 1}</div>`;
      for (const l of pageLineas) html += _ocrRenderLine(l);
    }
  } else {
    for (const l of d.allLineas) html += _ocrRenderLine(l);
  }

  body.innerHTML = html;

  // Botón confirmar
  const btn = document.getElementById('ocrPreviewConfirmBtn');
  if (btn) {
    if (isWizMode) {
      const selCount = d.allLineas.filter(l => l.selected).length;
      btn.textContent = `Confirmar (${selCount} al parte · ${totalLineas} a furgoneta)`;
    } else {
      btn.textContent = `Confirmar ${totalLineas} material${totalLineas > 1 ? 'es' : ''}`;
    }
    btn.disabled = totalLineas === 0;
  }

  document.getElementById('ocrPreviewOverlay').classList.add('active');
}

function _ocrRenderLine(l) {
  const isWizMode = _ocrPreviewData && !_ocrPreviewData._fabMode;
  const checked = l.selected ? 'checked' : '';
  const dimStyle = (!l.selected && isWizMode) ? 'opacity:0.45;' : '';
  // En modo wizard: cantidadParte = lo que va al parte (por defecto = cantidad)
  if (isWizMode && l.cantidadParte === undefined) l.cantidadParte = l.cantidad;
  return `<div class="ocr-line-item selected" id="ocrLine${l.idx}" style="${dimStyle}">
    ${isWizMode ? `<label style="display:flex;align-items:center;padding:2px 6px 2px 0;cursor:pointer;flex-shrink:0">
      <input type="checkbox" ${checked} onchange="_ocrToggleSel(${l.idx}, this.checked)"
        style="width:18px;height:18px;accent-color:#1D4ED8;cursor:pointer">
    </label>` : ''}
    <div class="ocr-line-detail" style="width:100%">
      <div class="ocr-line-name">${l.nombre}${l.artMatch ? ` <span style="font-size:9px;color:var(--verde);font-weight:700">✓ catálogo</span>` : ''}</div>
      ${isWizMode ? `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        <div class="ocr-line-qty" style="flex:1">
          <span style="font-size:11px;color:#666">📦 Recibido:</span>
          <input type="number" value="${l.cantidad}" min="0.01" step="any" onchange="_ocrUpdateQty(${l.idx}, this.value)"
            style="width:60px">
          <span>${l.unidad}</span>
        </div>
        <div class="ocr-line-qty" style="flex:1">
          <span style="font-size:11px;color:#1D4ED8">🔧 Al parte:</span>
          <input type="number" value="${l.cantidadParte}" min="0" step="any" onchange="_ocrUpdateQtyParte(${l.idx}, this.value)"
            style="width:60px;border-color:#1D4ED8">
          <span>${l.unidad}</span>
        </div>
      </div>` : `
      <div class="ocr-line-qty">
        <span>Cant:</span>
        <input type="number" value="${l.cantidad}" min="0.01" step="any" onchange="_ocrUpdateQty(${l.idx}, this.value)">
        <span>${l.unidad}</span>
      </div>`}
    </div>
  </div>`;
}

function _ocrToggleSel(idx, checked) {
  if (!_ocrPreviewData) return;
  const l = _ocrPreviewData.allLineas.find(x => x.idx === idx);
  if (l) l.selected = checked;
  // Actualizar visual de la línea
  const row = document.getElementById('ocrLine' + idx);
  if (row) row.style.opacity = checked ? '1' : '0.45';
  // Actualizar contador
  const selCount = _ocrPreviewData.allLineas.filter(x => x.selected).length;
  const cEl = document.getElementById('ocrSelCount');
  if (cEl) cEl.textContent = selCount;
  // Actualizar botón
  const btn = document.getElementById('ocrPreviewConfirmBtn');
  if (btn) {
    const total = _ocrPreviewData.allLineas.length;
    btn.textContent = `Confirmar (${selCount} al parte · ${total} a furgoneta)`;
  }
}

function _ocrUpdateQty(idx, val) {
  if (!_ocrPreviewData) return;
  const l = _ocrPreviewData.allLineas.find(x => x.idx === idx);
  if (l) {
    l.cantidad = parseFloat(val) || 1;
    // Si cantidadParte > cantidad recibida, ajustar
    if (l.cantidadParte !== undefined && l.cantidadParte > l.cantidad) {
      l.cantidadParte = l.cantidad;
    }
  }
}

function _ocrUpdateQtyParte(idx, val) {
  if (!_ocrPreviewData) return;
  const l = _ocrPreviewData.allLineas.find(x => x.idx === idx);
  if (l) {
    let v = parseFloat(val) || 0;
    if (v > l.cantidad) v = l.cantidad; // No puede superar lo recibido
    l.cantidadParte = v;
  }
}

function ocrPreviewCerrar() {
  document.getElementById('ocrPreviewOverlay').classList.remove('active');
  _ocrPreviewData = null;
  _fabOcrData = null;
}

// ── Añadir otra página al mismo documento ──
function ocrPreviewAddPage() {
  if (_ocrPreviewData?._fabMode) {
    document.getElementById('fabOcrPageInput')?.click();
  } else {
    document.getElementById('ocrAddPageInput')?.click();
  }
}

async function _ocrAddPageSelected(input) {
  const file = input.files?.[0];
  if (!file) return;
  input.value = '';

  showLoading('📷 Procesando página adicional...');
  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    const mimeMatch = base64.match(/^data:([^;]+);/);
    const mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';
    const b64Data = base64.split(',')[1];

    let apiKey;
    try { apiKey = decodeURIComponent(escape(atob(EMPRESA.anthropic_api_key))); }
    catch(_) { apiKey = EMPRESA.anthropic_api_key; }

    const resp = await fetch('https://gskkqqhbpnycvuioqetj.supabase.co/functions/v1/ocr-documento', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-anthropic-key': apiKey },
      body: JSON.stringify({
        imagen_base64: b64Data, media_type: mimeType, tipo: 'albaran',
        empresa_id: EMPRESA.id, empresa_nombre: EMPRESA.nombre || '', empresa_cif: EMPRESA.cif || ''
      })
    });
    const result = await resp.json();
    if (!result.success) throw new Error(result.error || 'Error procesando documento');

    const data = result.data || {};
    const lineas = data.lineas || [];
    if (!lineas.length) { toast('⚠️ No se detectaron materiales en esta página', 'warning'); return; }

    // Añadir página y líneas al preview existente
    const pageIdx = _ocrPreviewData.pages.length;
    _ocrPreviewData.pages.push({ foto: base64 });

    const baseIdx = _ocrPreviewData.allLineas.length;
    lineas.forEach((linea, i) => {
      const nombre = linea.descripcion || linea.nombre || '';
      const codigo = linea.codigo || '';
      const cantidad = parseFloat(linea.cantidad) || 1;
      const precio = parseFloat(linea.precio_unitario) || 0;

      let artMatch = _ocrFindArticulo(nombre, codigo);

      _ocrPreviewData.allLineas.push({
        idx: baseIdx + i,
        page: pageIdx,
        nombre: artMatch?.nombre || nombre || 'Material OCR',
        codigo: artMatch?.codigo || codigo,
        cantidad, precio: artMatch?.precio_venta || precio,
        unidad: linea.unidad || artMatch?.unidad || 'ud',
        artMatch, selected: true
      });
    });

    toast(`✅ Página ${pageIdx + 1}: ${lineas.length} material(es) detectado(s)`, 'success');
    _ocrRenderPreview();

  } catch(e) {
    console.error('[OCR AddPage]', e);
    toast('Error procesando página: ' + (e.message || 'desconocido'), 'error');
  } finally {
    hideLoading();
  }
}

async function ocrPreviewConfirmar() {
  if (!_ocrPreviewData) return;
  const d = _ocrPreviewData;
  const todos = d.allLineas; // Siempre todos los materiales

  if (!todos.length) {
    toast('⚠️ No se detectaron materiales', 'warning');
    return;
  }

  // Bifurcar: modo flotante (FAB) vs modo wizard (parte)
  if (d._fabMode) {
    await _fabOcrConfirmar(todos);
    return;
  }

  // ── Modo wizard: misma lógica que FAB (furgoneta + bandeja OCR) + añadir al parte ──

  // 1. Añadir solo materiales SELECCIONADOS al parte de trabajo (con cantidadParte)
  const seleccionadosParte = todos.filter(l => l.selected && (l.cantidadParte || 0) > 0);
  for (const l of seleccionadosParte) {
    const qParte = l.cantidadParte || l.cantidad;
    _wiz.materiales.push({
      articulo_id: l.artMatch?.id || null,
      nombre: l.nombre,
      codigo: l.codigo,
      cantidad: qParte,
      precio: l.precio,
      unidad: l.unidad,
      total: qParte * l.precio,
      _ocr: true,
    });
  }

  // Guardar referencia del documento en el parte
  if (!_wiz.albaranes_compra) _wiz.albaranes_compra = [];
  _wiz.albaranes_compra.push({
    numero: d.numDocumento || 'Sin número',
    fotos: d.pages.map(pg => pg.foto)
  });

  // 2. Reutilizar el flujo FAB para: subir fotos + documentos_ocr + stock furgoneta + tarea oficina
  // Inyectamos los datos necesarios en _fabOcrData temporalmente
  const prevFabData = _fabOcrData;
  _fabOcrData = {
    numDocumento: d.numDocumento,
    tipoDocumento: 'albaran',
    proveedor: d.proveedor || '',
    pages: d.pages,
    allLineas: todos,
    ocrResult: d.ocrResult || {}
  };
  await _fabOcrConfirmar(todos, true);
  _fabOcrData = prevFabData;

  // 2b. Actualizar articulo_id en _wiz.materiales (se crearon DESPUÉS del push)
  for (const l of seleccionadosParte) {
    if (l.artMatch?.id) {
      const matWiz = _wiz.materiales.find(m => m._ocr && m.codigo === l.codigo && m.nombre === l.nombre && !m.articulo_id);
      if (matWiz) matWiz.articulo_id = l.artMatch.id;
    }
  }

  // 3. Cerrar preview y refrescar wizard
  const nParte = seleccionadosParte.length;
  const nFurg = todos.length;
  const qParte = seleccionadosParte.reduce((s, l) => s + (l.cantidadParte || l.cantidad), 0);
  const qFurg = todos.reduce((s, l) => s + l.cantidad, 0);
  toast(`✅ ${nParte} material(es) al parte (${qParte} uds) · ${nFurg} a furgoneta (${qFurg} uds)`, 'success');
  document.getElementById('ocrPreviewOverlay').classList.remove('active');
  _ocrPreviewData = null;
  renderWizStep();
}

// ── Modo FAB: subir a documentos_ocr + stock provisional en furgoneta ──
async function _fabOcrConfirmar(seleccionados, _skipCleanup) {
  const d = _fabOcrData;
  if (!d) { toast('❌ _fabOcrData es null — sin datos OCR', 'error'); return; }

  // ── Fusionar líneas ECORAEE: mismo código, diferente descripción (eco-tax + producto) ──
  const _codigoMap = {};
  for (const l of seleccionados) {
    const cod = (l.codigo || '').trim().toUpperCase();
    if (!cod) continue;
    if (!_codigoMap[cod]) _codigoMap[cod] = [];
    _codigoMap[cod].push(l);
  }
  for (const [cod, items] of Object.entries(_codigoMap)) {
    if (items.length <= 1) continue;
    // Detectar cuál es ECORAEE y cuál es el producto principal
    const ecoIdx = items.findIndex(l => /eco.?ra|raee|ecotasa/i.test(l.nombre || ''));
    if (ecoIdx === -1) continue; // no es caso ECORAEE, dejar como está
    const eco = items[ecoIdx];
    const principal = items.find((l, i) => i !== ecoIdx) || items[0];
    // Sumar precio eco al principal y anotar
    const ecoPrice = eco.precioUnit || eco.precio || 0;
    principal.precioUnit = (principal.precioUnit || principal.precio || 0) + ecoPrice;
    principal.precio = principal.precioUnit;
    principal.nombre = (principal.nombre || '') + ' (inc. ECORAEE ' + ecoPrice.toFixed(2) + '€)';
    // Eliminar la línea eco de seleccionados
    const removeIdx = seleccionados.indexOf(eco);
    if (removeIdx !== -1) seleccionados.splice(removeIdx, 1);
    toast(`♻️ ECORAEE fusionado: ${cod} (+${ecoPrice.toFixed(2)}€)`, 'info');
  }

  toast(`🔧 OCR Confirmar: ${seleccionados.length} items, furgoneta=${miFurgoneta?.nombre||'NINGUNA'}`, 'info');
  showLoading('Guardando en furgoneta...');

  try {
    const eid = EMPRESA.id;

    // Si miFurgoneta es null, intentar recargarla automáticamente
    if (!miFurgoneta) {
      toast('🔄 Recargando furgoneta...', 'info');
      await loadMiFurgoneta();
      if (miFurgoneta) {
        toast(`✅ Furgoneta recuperada: ${miFurgoneta.nombre}`, 'success');
      }
    }
    const almacenId = miFurgoneta?.id;

    // 1. Subir fotos al Storage y crear registro documentos_ocr
    const fotosUrls = [];
    for (let i = 0; i < d.pages.length; i++) {
      const pg = d.pages[i];
      const blob = await (await fetch(pg.foto)).blob();
      const ahora = new Date();
      const fileName = `ocr_${ahora.toISOString().slice(0,10)}_${ahora.toTimeString().slice(0,5).replace(':','-')}_p${i}_${Math.random().toString(36).substr(2,4)}.jpg`;
      const storagePath = `${eid}/ocr/${fileName}`;

      const { error: upErr } = await sb.storage.from('documentos').upload(storagePath, blob, { contentType: pg.mimeType || 'image/jpeg' });
      if (!upErr) {
        const { data: urlData } = sb.storage.from('documentos').getPublicUrl(storagePath);
        fotosUrls.push({ path: storagePath, url: urlData?.publicUrl });
      }
    }

    // Registro en documentos_ocr — BORRADOR hasta que oficina valide
    const docInsert = {
      empresa_id: eid,
      usuario_id: CP?.id || CU?.id || null,
      archivo_path: fotosUrls[0]?.path || '',
      archivo_nombre: `Doc_OCR_${d.numDocumento || new Date().toISOString().slice(0,10)}`,
      estado: 'pendiente',
      tipo_documento: d.tipoDocumento || 'albaran',
      datos_extraidos: {
        ...d.ocrResult,
        paginas: d.pages.length,
        fotos_urls: fotosUrls.map(f => f.url),
        operario: CP?.nombre || CU?.email || '',
        operario_id: CP?.id || null,
        furgoneta: miFurgoneta?.nombre || '',
        furgoneta_id: miFurgoneta?.id || null,
        materiales_seleccionados: seleccionados.map(l => ({
          nombre: l.nombre, codigo: l.codigo, cantidad: l.cantidad,
          unidad: l.unidad, precio: l.precioUnit || l.precio || 0,
          articulo_id: l.artMatch?.id || null,
          en_catalogo: !!l.artMatch
        }))
      },
      created_at: new Date().toISOString()
    };
    let docCreado = null;
    const { data: docData, error: docErr } = await sb.from('documentos_ocr').insert(docInsert).select().single();
    if (docErr) { console.warn('documentos_ocr insert:', docErr.message); toast('⚠️ No se pudo enviar al ERP: ' + docErr.message, 'error'); }
    else { docCreado = docData; toast('📤 Documento enviado a Bandeja OCR del ERP', 'success'); }

    // 2. Meter TODOS los materiales como stock provisional en furgoneta
    // Extraer proveedor del OCR (si lo detectó)
    const _provRaw = d.ocrResult?.proveedor || d.ocrResult?.emisor || null;
    const proveedorOcr = _provRaw
      ? (typeof _provRaw === 'object' ? (_provRaw.nombre || _provRaw.name || '') : String(_provRaw)).trim()
      : null;
    const cifOcr = (typeof _provRaw === 'object' ? (_provRaw.cif || _provRaw.nif || '') : '')
      || d.ocrResult?.cif || d.ocrResult?.nif || null;
    let proveedorId = null;
    if (proveedorOcr) {
      toast(`🏭 Proveedor detectado: ${proveedorOcr}`, 'info');
      // Buscar proveedor existente por nombre (búsqueda flexible)
      const { data: provs } = await sb.from('proveedores').select('id,nombre')
        .eq('empresa_id', eid).ilike('nombre', `%${proveedorOcr}%`).limit(1);
      if (provs?.length) {
        proveedorId = provs[0].id;
      } else {
        // CREAR proveedor automáticamente si no existe
        const { data: nuevoP, error: provErr } = await sb.from('proveedores').insert({
          empresa_id: eid,
          nombre: proveedorOcr,
          cif: cifOcr || null,
          observaciones: `Creado automáticamente desde OCR — doc ${d.numDocumento || 'sin nº'}`
        }).select().single();
        if (!provErr && nuevoP) {
          proveedorId = nuevoP.id;
          toast(`✅ Proveedor creado: ${nuevoP.nombre}`, 'success');
        } else {
          toast(`❌ Error proveedor: ${provErr?.message || 'desconocido'}`, 'error');
        }
      }
    }

    toast(`📦 Procesando ${seleccionados.length} materiales...`, 'info');
    let _artCreados = 0, _artErrores = 0, _stockOk = 0;
    if (almacenId) {
      for (let _idx = 0; _idx < seleccionados.length; _idx++) {
        const l = seleccionados[_idx];
        try {
          toast(`🔄 Material ${_idx+1}/${seleccionados.length}: ${(l.nombre||'').substring(0,25)}...`, 'info');
          const artId = l.artMatch?.id || null;
          let artIdFinal = artId;

          // Material SIN catálogo: buscar duplicado en BD (nombre normalizado + ref proveedor)
          if (!artIdFinal) {
            const _normNombre = _ocrNormalizeName(l.nombre);
            const _codBusca = (l.codigo || '').trim().toLowerCase();
            // Código limpio sin puntuación/espacios para comparación fuzzy
            const _codLimpio = _codBusca.replace(/[\s\-_./\\,;:()[\]{}'"]/g, '');

            // A) Buscar por referencia_fabricante (exacto + fuzzy)
            if (_codBusca) {
              const { data: byRef } = await sb.from('articulos').select('id,nombre,codigo,referencia_fabricante')
                .eq('empresa_id', eid).eq('activo', true).ilike('referencia_fabricante', `%${_codBusca}%`).limit(5);
              if (byRef?.length) {
                // Preferir match exacto, sino el primero que coincida limpiando puntuación
                const exacto = byRef.find(a => (a.referencia_fabricante||'').trim().toLowerCase() === _codBusca);
                const fuzzy = !exacto && _codLimpio ? byRef.find(a => (a.referencia_fabricante||'').replace(/[\s\-_./\\,;:()[\]{}'"]/g, '').toLowerCase() === _codLimpio) : null;
                const found = exacto || fuzzy || byRef[0];
                artIdFinal = found.id;
                l.artMatch = found;
                toast(`🔗 "${l.nombre}" → por ref: ${found.nombre}`, 'info');
              }
            }

            // B) Buscar por ref en articulos_proveedores
            if (!artIdFinal && _codBusca) {
              const { data: byApRef } = await sb.from('articulos_proveedores').select('articulo_id,articulos(id,nombre,codigo)')
                .eq('empresa_id', eid).ilike('ref_proveedor', `%${_codBusca}%`).limit(5);
              if (byApRef?.length) {
                const found = byApRef.find(a => a.articulos && (a.articulos.codigo||'').toLowerCase().includes(_codLimpio)) || byApRef[0];
                if (found?.articulos) {
                  artIdFinal = found.articulos.id;
                  l.artMatch = found.articulos;
                  toast(`🔗 "${l.nombre}" → por ref prov: ${found.articulos.nombre}`, 'info');
                }
              }
            }

            // C) Buscar por nombre normalizado (más flexible: incluye parcial)
            if (!artIdFinal && _normNombre.length >= 5) {
              const searchTerm = (l.nombre || '').substring(0, Math.min(15, (l.nombre||'').length));
              const { data: candidatos } = await sb.from('articulos').select('id,nombre,codigo,referencia_fabricante')
                .eq('empresa_id', eid).eq('activo', true).ilike('nombre', `%${searchTerm}%`).limit(15);
              if (candidatos?.length) {
                // Primero match exacto normalizado
                let dup = candidatos.find(c => _ocrNormalizeName(c.nombre) === _normNombre);
                // Segundo: match parcial (uno contiene al otro)
                if (!dup && _normNombre.length >= 10) {
                  dup = candidatos.find(c => {
                    const normC = _ocrNormalizeName(c.nombre);
                    return normC.length >= 8 && (normC.includes(_normNombre) || _normNombre.includes(normC));
                  });
                }
                if (dup) {
                  artIdFinal = dup.id;
                  l.artMatch = dup;
                  toast(`🔗 "${l.nombre}" → existente: ${dup.nombre}`, 'info');
                }
              }
            }
          }
          if (!artIdFinal) {
            // ── ÚLTIMA PROTECCIÓN: buscar en BD por código proveedor antes de crear ──
            const _codRef = (l.codigo || '').trim();
            if (_codRef) {
              const { data: dbCheck } = await sb.from('articulos').select('id,nombre,codigo,referencia_fabricante')
                .eq('empresa_id', eid).eq('activo', true).ilike('referencia_fabricante', _codRef).limit(1);
              if (dbCheck?.length) {
                artIdFinal = dbCheck[0].id;
                l.artMatch = dbCheck[0];
                toast(`🔗 BD: "${l.nombre}" → ${dbCheck[0].nombre}`, 'info');
              }
              // También buscar en articulos_proveedores
              if (!artIdFinal) {
                const { data: apCheck } = await sb.from('articulos_proveedores').select('articulo_id,articulos(id,nombre)')
                  .eq('empresa_id', eid).ilike('ref_proveedor', _codRef).limit(1);
                if (apCheck?.length && apCheck[0].articulos) {
                  artIdFinal = apCheck[0].articulos.id;
                  l.artMatch = apCheck[0].articulos;
                  toast(`🔗 BD prov: "${l.nombre}" → ${apCheck[0].articulos.nombre}`, 'info');
                }
              }
            }
          }
          if (!artIdFinal) {
            const _codigoBase = (l.codigo || '').replace(/[^a-zA-Z0-9-]/g, '').toUpperCase();
            const _sufijo = Math.random().toString(36).substr(2, 4).toUpperCase();
            const codigoAuto = 'OCR-' + (_codigoBase ? _codigoBase + '-' + _sufijo : Date.now().toString(36).toUpperCase() + _sufijo);

            const _precioCosteOcr = l.precioUnit || l.precio || 0;
            const { data: nuevoArt, error: artErr } = await sb.from('articulos').insert({
              empresa_id: eid,
              codigo: codigoAuto,
              nombre: l.nombre || 'Material OCR',
              referencia_fabricante: l.codigo || null,
              precio_coste: _precioCosteOcr,
              precio_venta: Math.round(_precioCosteOcr * (1 + cfgMargenOcr()) * 100) / 100,
              es_activo: false,
              activo: true,
              proveedor_id: proveedorId || null,
              observaciones: `Creado automáticamente desde OCR — doc ${d.numDocumento || 'sin nº'}`
            }).select().single();

            if (!artErr && nuevoArt) {
              artIdFinal = nuevoArt.id;
              l.artMatch = nuevoArt;
              _artCreados++;

              // Vincular artículo al proveedor con su ref y precio
              if (proveedorId) {
                await sb.from('articulos_proveedores').insert({
                  empresa_id: eid,
                  articulo_id: artIdFinal,
                  proveedor_id: proveedorId,
                  ref_proveedor: l.codigo || null,
                  precio_proveedor: l.precioUnit || l.precio || 0,
                  es_principal: true
                });
                // ignorar error de vinculación
              }
            } else {
              _artErrores++;
              toast('❌ Error art [' + (_idx+1) + ']: ' + (artErr?.message||'desconocido'), 'error');
              continue; // siguiente item
            }
          } else if (proveedorId) {
            const { data: existeVinc } = await sb.from('articulos_proveedores')
              .select('id').eq('articulo_id', artIdFinal).eq('proveedor_id', proveedorId).eq('empresa_id', eid).limit(1);
            if (!existeVinc?.length) {
              await sb.from('articulos_proveedores').insert({
                empresa_id: eid, articulo_id: artIdFinal, proveedor_id: proveedorId,
                ref_proveedor: l.codigo || null, precio_proveedor: l.precioUnit || l.precio || 0,
                es_principal: false
              });
            }
          }

          // Meter stock provisional en furgoneta
          if (artIdFinal) {
            const stockExistente = miFurgonetaStock.find(s => s.articulo_id === artIdFinal);
            if (stockExistente) {
              const nuevoProvisional = (stockExistente.stock_provisional || 0) + l.cantidad;
              await sb.from('stock').update({ stock_provisional: nuevoProvisional })
                .eq('almacen_id', almacenId).eq('articulo_id', artIdFinal).eq('empresa_id', eid);
              _stockOk++;
            } else {
              const { error: stockErr } = await sb.from('stock').insert({
                empresa_id: eid, almacen_id: almacenId, articulo_id: artIdFinal,
                cantidad: 0, stock_provisional: l.cantidad, stock_reservado: 0
              });
              if (stockErr) { toast('⚠️ Stock [' + (_idx+1) + ']: ' + stockErr.message, 'error'); }
              else { _stockOk++; }
            }

            await sb.from('movimientos_stock').insert({
              empresa_id: eid, articulo_id: artIdFinal, almacen_id: almacenId,
              tipo: 'entrada_provisional', cantidad: l.cantidad,
              delta: l.cantidad,
              notas: `OCR provisional: ${l.nombre} — doc ${d.numDocumento || 'sin nº'}`,
              tipo_stock: 'provisional',
              fecha: new Date().toISOString().slice(0,10),
              usuario_id: CU?.id, usuario_nombre: CP?.nombre || CU?.email
            });
            // ignorar error de movimiento stock
          }
        } catch(loopErr) {
          _artErrores++;
          toast('💥 Error fatal item ' + (_idx+1) + ': ' + (loopErr.message||loopErr), 'error');
          console.error('[OCR loop error] item', _idx, l.nombre, loopErr);
        }
      }

      toast(`📊 Resultado: ${_artCreados} creados, ${_artErrores} errores, ${_stockOk} stock OK`, _artErrores ? 'warning' : 'success');
      await loadStockFurgoneta(almacenId);

      // Recargar lista de artículos en memoria para que sean buscables
      if (_artCreados > 0) {
        const { data: artFresh } = await sb.from('articulos').select('*').eq('empresa_id', eid).eq('activo', true).order('nombre');
        if (artFresh) { articulos = artFresh; await idbSaveAll('articulos', artFresh); }
      }

      // ── Actualizar documentos_ocr con los articulo_id correctos (se crearon después del insert) ──
      if (docCreado?.id) {
        const matActualizados = seleccionados.map(l => ({
          nombre: l.nombre, codigo: l.codigo, cantidad: l.cantidad,
          unidad: l.unidad, precio: l.precioUnit || l.precio || 0,
          articulo_id: l.artMatch?.id || null,
          en_catalogo: !!l.artMatch
        }));
        const datosActualizados = { ...docCreado.datos_extraidos, materiales_seleccionados: matActualizados };
        await sb.from('documentos_ocr').update({ datos_extraidos: datosActualizados }).eq('id', docCreado.id);
      }
    } else {
      toast('⚠️ No hay furgoneta asignada (almacenId null)', 'error');
    }

    // 3. Crear tarea pendiente para oficina
    const numDocLabel = d.numDocumento || 'sin número';
    const tipoLabel = d.tipoDocumento === 'factura' ? 'Factura' : 'Albarán';
    const { error: tareaErr } = await sb.from('tareas_pendientes').insert({
      empresa_id: eid,
      entidad_tipo: 'documento_ocr',
      entidad_id: docCreado?.id || null,
      entidad_nombre: `${tipoLabel} ${numDocLabel}`,
      titulo: `📷 Nuevo documento escaneado: ${tipoLabel} ${numDocLabel} (${CP?.nombre || 'operario'})`,
      campos_faltantes: ['validar_materiales', 'revisar_articulos_ocr', 'vincular_proveedor'],
      origen: 'auto',
      rol_asignado: 'admin',
      estado: 'pendiente',
      usuario_creador_id: CU?.id || null
    });
    if (tareaErr) console.warn('Tarea pendiente:', tareaErr.message);

    if (!_skipCleanup) {
      toast(`✅ ${seleccionados.length} material(es) provisional(es) en furgoneta`, 'success');

      // Cerrar overlay
      document.getElementById('ocrPreviewOverlay').classList.remove('active');
      _ocrPreviewData = null;
      _fabOcrData = null;

      // Refrescar vista si estamos en furgoneta
      if (currentTab === 'inicio' || currentTab === 'furgoneta') {
        const body = document.getElementById('appBody');
        if (body) renderMiFurgoneta();
      }
    }

  } catch(e) {
    console.error('[FAB OCR Confirmar]', e);
    toast('Error: ' + (e.message || 'desconocido'), 'error');
  } finally {
    hideLoading();
  }
}

function renderWizMatRow(m, idx) {
  // Stock check en furgoneta del operario
  let stockWarning = '';
  let stockBadge = '';
  if (m.articulo_id && miFurgoneta) {
    const st = getStockFurgoneta(m.articulo_id);
    if (m.cantidad > st.disponible) {
      stockWarning = `<div style="font-size:10px;color:#DC2626;padding:4px 10px;background:#FEF2F2;border-radius:6px;margin-top:2px">⚠️ Stock insuficiente en furgoneta (disponible: ${st.disponible}) — se creará incidencia</div>`;
    } else if (st.disponible > 0) {
      stockBadge = `<span style="font-size:9px;color:var(--verde);font-weight:700">(${st.disponible})</span>`;
    }
  }

  // Tipo de consumo (consumo / merma / rotura)
  const tipoTag = m._tipo && m._tipo !== 'consumo'
    ? `<span style="font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;background:${m._tipo==='merma'?'#FEF3C7;color:#92400E':'#FEE2E2;color:#991B1B'}">${m._tipo.toUpperCase()}</span>`
    : '';

  return `<div class="mat-row">
    <div class="mat-name">${m.nombre}${m.codigo ? ` <span style="color:var(--gris-400);font-size:10px">(${m.codigo})</span>` : ''} ${stockBadge} ${tipoTag}</div>
    <input type="number" value="${m.cantidad}" min="0.01" step="0.01"
      style="width:60px;padding:6px;border:1px solid var(--gris-200);border-radius:6px;text-align:center;font-size:13px;font-family:var(--font)"
      onchange="wizUpdateMatQty(${idx},this.value)">
    <span style="font-size:11px;color:var(--gris-400)">${m.unidad||'ud'}</span>
    ${esJefe ? `<input type="number" value="${m.precio}" min="0" step="0.01"
      style="width:70px;padding:6px;border:1px solid var(--gris-200);border-radius:6px;text-align:right;font-size:13px;font-family:var(--font)"
      onchange="wizUpdateMatPrice(${idx},this.value)">
    <span style="font-size:11px;color:var(--gris-400)">€</span>
    <span class="mat-qty">${(parseFloat(m.total)||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>` : ''}
    <button class="mat-del" onclick="wizRemoveMat(${idx})">🗑️</button>
  </div>
  ${stockWarning}`;
}

function wizUpdateMatQty(idx, val) {
  const m = _wiz.materiales[idx];
  if (!m) return;
  m.cantidad = parseFloat(val) || 0;
  m.total = m.cantidad * (m.precio || 0);
  renderWizStep();
}

function wizUpdateMatPrice(idx, val) {
  const m = _wiz.materiales[idx];
  if (!m) return;
  m.precio = parseFloat(val) || 0;
  m.total = (m.cantidad || 0) * m.precio;
  renderWizStep();
}

function wizRemoveMat(idx) {
  _wiz.materiales.splice(idx, 1);
  renderWizStep();
}

function wizAddMermaRotura(tipo) {
  // Mostrar búsqueda de artículo para seleccionar merma/rotura
  const nombre = prompt(`${tipo === 'merma' ? '⚠️ MERMA' : '💥 ROTURA'}\nDescribe el material (o búscalo después):`);
  if (!nombre) return;
  const motivo = prompt(`Motivo de la ${tipo}:`);
  if (!motivo) { toast('El motivo es obligatorio para ' + tipo, 'error'); return; }
  _wiz.materiales.push({
    articulo_id: null,
    nombre: nombre,
    codigo: '',
    cantidad: 1,
    precio: 0,
    unidad: 'ud',
    total: 0,
    _tipo: tipo,
    _motivo: motivo
  });
  renderWizStep();
}

        onchange="wizUpdateMO(${idx},'descripcion',this.value)">
      <div style="display:flex;gap:6px;align-items:center">

        <input type="number" value="${mo.minutos||0}" min="0" step="1"
          style="width:60px;padding:6px;border:1px solid var(--gris-200);border-radius:6px;text-align:center;font-size:12px;font-family:var(--font)"
          onchange="wizUpdateMO(${idx},'minutos',this.value)">
        ${esJefe ? `<label style="font-size:10px;color:var(--gris-500);white-space:nowrap">€/h:</label>
        <input type="number" value="${mo.precio_hora||0}" min="0" step="0.5"
          style="width:60px;padding:6px;border:1px solid var(--gris-200);border-radius:6px;text-align:right;font-size:12px;font-family:var(--font)"
          onchange="wizUpdateMO(${idx},'precio_hora',this.value)">
        <span style="font-size:12px;font-weight:700;color:var(--violeta);min-width:60px;text-align:right">${(parseFloat(mo.total)||0).toLocaleString('es-ES',{style:'currency',currency:'EUR'})}</span>` : ''}
        <button class="mat-del" onclick="wizRemoveMO(${idx})">🗑️</button>
      </div>

}

function wizAddManoObra() {
  if (!_wiz.manoObra) _wiz.manoObra = [];
  _wiz.manoObra.push({
    descripcion: 'Trabajo realizado',
    minutos: 60,
    precio_hora: esJefe ? cfgTarifaHora() : 0,
    total: esJefe ? cfgTarifaHora() : 0,
  });
  renderWizStep();
}

function wizUpdateMO(idx, field, val) {
  const mo = (_wiz.manoObra || [])[idx];
  if (!mo) return;
  if (field === 'descripcion') {
    mo.descripcion = val;
  } else if (field === 'km') {
    mo.km = parseFloat(val) || 0;
    mo.total = mo.km * (mo.precio_hora || cfgTarifaKm());
  } else if (field === 'minutos') {
    mo.minutos = parseFloat(val) || 0;
    const horas = mo.minutos / 60;
    mo.total = horas * (mo.precio_hora || 0);
  } else if (field === 'precio_hora') {
    mo.precio_hora = parseFloat(val) || 0;
    if (mo.es_desplazamiento) {
      mo.total = (mo.km || 0) * mo.precio_hora;
    } else {
      const horas = (mo.minutos || 0) / 60;
      mo.total = horas * mo.precio_hora;
    }
  }
  renderWizStep();
}

function wizRemoveMO(idx) {
  if (_wiz.manoObra) _wiz.manoObra.splice(idx, 1);
  renderWizStep();
}

// ── FIRMA DIGITAL (FULLSCREEN) ──
let _fsCtx = null;
let _fsDrawing = false;
let _fsHasTouched = false;
let _fsTipo = null; // 'cliente' o 'operario'

function toggleFirmaPanel(tipo) {
  const panel = document.getElementById(tipo === 'cliente' ? 'firmaClientePanel' : 'firmaOperarioPanel');
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? 'block' : 'none';
}

// Abrir overlay fullscreen para firmar
function abrirFirmaFullscreen(tipo) {
  _fsTipo = tipo;
  _fsDrawing = false;
  _fsHasTouched = false;

  const overlay = document.createElement('div');
  overlay.className = 'firma-fullscreen';
  overlay.id = 'firmaFullscreenOverlay';

  const titulo = tipo === 'cliente' ? 'Firma de la persona responsable' : 'Firma del operario';
  const color = tipo === 'cliente' ? 'var(--azul)' : 'var(--violeta)';

  overlay.innerHTML = `
    <div class="firma-fs-header" style="background:${color}">
      <h3>${titulo}</h3>
      <button onclick="cerrarFirmaFullscreen(false)" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 14px;border-radius:6px;font-weight:700;font-size:14px">✕ Cancelar</button>
    </div>
    <div class="firma-fs-canvas-wrap">
      <canvas id="firmaFSCanvas"></canvas>
      <div class="firma-fs-placeholder" id="firmaFSPlaceholder">Firme aquí con el dedo</div>
    </div>
    <div class="firma-fs-actions">
      <button onclick="limpiarFirmaFS()" style="flex:1;padding:14px;border-radius:8px;border:2px solid var(--gris-300);background:#fff;font-weight:700;font-size:15px;cursor:pointer">🗑️ Borrar</button>
      <button onclick="cerrarFirmaFullscreen(true)" style="flex:2;padding:14px;border-radius:8px;border:none;background:var(--verde);color:#fff;font-weight:700;font-size:15px;cursor:pointer">✅ Validar firma</button>
    </div>
  `;

  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';

  // Inicializar canvas al tamaño real del contenedor
  setTimeout(() => {
    const canvas = document.getElementById('firmaFSCanvas');
    const wrap = canvas.parentElement;
    canvas.width = wrap.offsetWidth * 2;  // Retina
    canvas.height = wrap.offsetHeight * 2;
    canvas.style.width = wrap.offsetWidth + 'px';
    canvas.style.height = wrap.offsetHeight + 'px';
    _fsCtx = canvas.getContext('2d');
    _fsCtx.scale(2, 2); // Retina scaling
    _fsCtx.strokeStyle = '#1E293B';
    _fsCtx.lineWidth = 2.5;
    _fsCtx.lineCap = 'round';
    _fsCtx.lineJoin = 'round';

    // Si ya tiene firma previa, dibujarla
    const prevData = tipo === 'cliente' ? _wiz.firmaData : _wiz.firmaOperario;
    if (prevData) {
      const img = new Image();
      img.onload = () => {
        _fsCtx.drawImage(img, 0, 0, wrap.offsetWidth, wrap.offsetHeight);
        _fsHasTouched = true;
        document.getElementById('firmaFSPlaceholder').style.display = 'none';
      };
      img.src = prevData;
    }

    canvas.addEventListener('touchstart', _fsStart, { passive: false });
    canvas.addEventListener('touchmove', _fsMove, { passive: false });
    canvas.addEventListener('touchend', _fsEnd);
    canvas.addEventListener('mousedown', _fsStart);
    canvas.addEventListener('mousemove', _fsMove);
    canvas.addEventListener('mouseup', _fsEnd);
    canvas.addEventListener('mouseleave', _fsEnd);
  }, 50);
}

function _fsPos(e) {
  const canvas = document.getElementById('firmaFSCanvas');
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top
  };
}

function _fsStart(e) {
  e.preventDefault();
  _fsDrawing = true;
  _fsHasTouched = true;
  const ph = document.getElementById('firmaFSPlaceholder');
  if (ph) ph.style.display = 'none';
  const pos = _fsPos(e);
  _fsCtx.beginPath();
  _fsCtx.moveTo(pos.x, pos.y);
}

function _fsMove(e) {
  if (!_fsDrawing) return;
  e.preventDefault();
  const pos = _fsPos(e);
  _fsCtx.lineTo(pos.x, pos.y);
  _fsCtx.stroke();
}

function _fsEnd() { _fsDrawing = false; }

function limpiarFirmaFS() {
  const canvas = document.getElementById('firmaFSCanvas');
  const wrap = canvas.parentElement;
  _fsCtx.clearRect(0, 0, wrap.offsetWidth, wrap.offsetHeight);
  _fsHasTouched = false;
  document.getElementById('firmaFSPlaceholder').style.display = 'flex';
}

// Validar nombre + DNI antes de abrir firma del cliente
function wizIniciarFirmaCliente() {
  const nombre = (document.getElementById('wz_cli_nombre')?.value || '').trim();
  const palabras = nombre.split(/\s+/).filter(w => w.length > 0);
  if (palabras.length < 3) {
    toast('⚠️ El nombre debe tener al menos 3 palabras (nombre + 2 apellidos)', 'error');
    document.getElementById('wz_cli_nombre')?.focus();
    return;
  }
  _wiz.clienteNombre = nombre;

  const dni = (document.getElementById('wz_cli_dni')?.value || '').toUpperCase().trim();
  if (!_validarDNI(dni)) {
    toast('⚠️ Documento no válido. Acepta: DNI, NIE, CIF', 'error');
    document.getElementById('wz_cli_dni')?.focus();
    return;
  }
  _wiz.clienteDni = dni;

  // Todo OK → abrir firma fullscreen
  abrirFirmaFullscreen('cliente');
}

function cerrarFirmaFullscreen(guardar) {
  if (guardar) {
    if (!_fsHasTouched) {
      toast('Debes firmar primero', 'error');
      return;
    }
    const canvas = document.getElementById('firmaFSCanvas');
    const dataUrl = canvas.toDataURL('image/png');
    if (_fsTipo === 'cliente') {
      _wiz.firmaData = dataUrl;
      _wiz.firmaData_validated = true;
      toast('✅ Firma validada', 'success');
    } else if (_fsTipo === 'guardada') {
      // Guardar firma del operario en su perfil (Supabase)
      _guardarFirmaPerfil(dataUrl);
      const overlay = document.getElementById('firmaFullscreenOverlay');
      if (overlay) overlay.remove();
      document.body.style.overflow = '';
      return; // No re-render wizard
    } else {
      _wiz.firmaOperario = dataUrl;
      _wiz.firmaOperario_validated = true;
      toast('✅ Firma del operario validada', 'success');
    }
  }

  const overlay = document.getElementById('firmaFullscreenOverlay');
  if (overlay) overlay.remove();
  document.body.style.overflow = '';

  // Re-render para actualizar estado visual (verde/check)
  if (typeof renderWizStep === 'function' && _wiz?.parteId) renderWizStep();
}

async function _guardarFirmaPerfil(dataUrl) {
  toast('Guardando firma...', '');
  try {
    const eid = EMPRESA?.id || 'default';
    const blob = await (await fetch(dataUrl)).blob();
    const filename = `${eid}/firmas/firma_${CP.id}_${Date.now()}.png`;
    const { error: upErr } = await sb.storage.from('fotos-partes').upload(filename, blob, { upsert: true });
    if (upErr) { toast('Error subiendo firma: ' + upErr.message, 'error'); return; }
    const { data: urlData } = sb.storage.from('fotos-partes').getPublicUrl(filename);
    const firmaUrl = urlData?.publicUrl;
    if (!firmaUrl) { toast('Error obteniendo URL', 'error'); return; }

    // Guardar en perfil
    const { error } = await sb.from('perfiles').update({ firma_guardada: firmaUrl }).eq('id', CP.id);
    if (error) { toast('Error guardando: ' + error.message, 'error'); return; }

    CP.firma_guardada = firmaUrl;
    toast('✅ Firma guardada correctamente', 'success');
    // Refrescar la pestaña
    navigateTo('mas');
  } catch(e) {
    console.error('Error guardando firma:', e);
    toast('Error: ' + e.message, 'error');
  }
}

function _validarDNI(dni) {
  if (!dni) return false;
  dni = dni.toUpperCase().trim().replace(/[\s\-\.]/g, '');
  const letras = 'TRWAGMYFPDXBNJZSQVHLCKE';

  // ── DNI: 8 dígitos + letra (con verificación de letra) ──
  let match = dni.match(/^(\d{8})([A-Z])$/);
  if (match) {
    return letras[parseInt(match[1]) % 23] === match[2];
  }

  // ── NIE: X/Y/Z + 7 dígitos + letra (con verificación de letra) ──
  match = dni.match(/^([XYZ])(\d{7})([A-Z])$/);
  if (match) {
    const prefix = { X: '0', Y: '1', Z: '2' }[match[1]];
    return letras[parseInt(prefix + match[2]) % 23] === match[3];
  }

  // ── NIF especial: K/L/M + 7 dígitos + letra ──
  // K = menores 14 años, L = españoles en extranjero, M = extranjeros sin NIE
  match = dni.match(/^([KLM])(\d{7})([A-Z])$/);
  if (match) {
    return letras[parseInt(match[2]) % 23] === match[3];
  }

  // ── CIF: letra + 7 dígitos + dígito/letra de control (verificación completa) ──
  // A=SA, B=SL, C=Colectiva, D=Comanditaria, E=Comunidad de bienes,
  // F=Cooperativa, G=Asociación, H=Comunidad propietarios, J=Sociedad civil,
  // N=Entidad extranjera, P=Corporación local, Q=Organismo público,
  // R=Congregación religiosa, S=Admón Estado, U=UTE, V=Otros, W=Establec. permanente
  match = dni.match(/^([ABCDEFGHJNPQRSUVW])(\d{7})([0-9A-J])$/);
  if (match) {
    const tipo = match[1];
    const nums = match[2];
    const control = match[3];

    // Algoritmo de control CIF
    let sumPar = 0, sumImpar = 0;
    for (let i = 0; i < 7; i++) {
      const d = parseInt(nums[i]);
      if (i % 2 === 0) {
        // Posiciones impares (1ª,3ª,5ª,7ª): multiplicar por 2, sumar dígitos
        const doble = d * 2;
        sumImpar += Math.floor(doble / 10) + (doble % 10);
      } else {
        // Posiciones pares (2ª,4ª,6ª): sumar directamente
        sumPar += d;
      }
    }
    const total = sumPar + sumImpar;
    const digitoControl = (10 - (total % 10)) % 10;
    const letraControl = 'JABCDEFGHI'[digitoControl];

    // Según tipo de entidad: control es dígito, letra, o ambos
    const soloDigito = 'ABEH';    // Siempre dígito de control
    const soloLetra = 'KPQS';     // Siempre letra de control
    // El resto (C,D,F,G,J,N,R,U,V,W): aceptan dígito o letra

    if (soloDigito.includes(tipo)) {
      return control === String(digitoControl);
    } else if (soloLetra.includes(tipo)) {
      return control === letraControl;
    } else {
      return control === String(digitoControl) || control === letraControl;
    }
  }

  return false;
}
